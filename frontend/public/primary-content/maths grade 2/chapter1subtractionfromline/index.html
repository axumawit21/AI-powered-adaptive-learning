<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Back | ምጉዳል ብምቝጻር</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF5722;
            --secondary: #8CC63F;
            --accent: #F7931E;
            --danger: #ED1C24;
            --sky: #E1F5FE;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(180deg, #FFB74D 0%, #FFE0B2 50%, #DCEDC8 50%, #81C784 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
        }

        .sun {
            position: absolute; top: 50px; left: 10%; width: 80px; height: 80px;
            background: #FFEB3B; border-radius: 50%;
            box-shadow: 0 0 40px #FFF176;
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        header {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .nav-group { display: flex; gap: 15px; align-items: center; }

        .score-pill {
            background: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; font-size: 1.4rem; color: var(--primary);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px;
        }

        .lang-select {
            padding: 10px 15px; border-radius: 20px; border: 2px solid white;
            font-family: inherit; font-weight: bold; cursor: pointer; outline: none;
            background: var(--primary); color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .container {
            flex: 1; width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; gap: 30px; z-index: 10;
        }

        .game-card {
            background: var(--card-bg); border-radius: 40px; padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 8px solid white;
            text-align: center; display: flex; flex-direction: column; gap: 40px;
            position: relative;
        }

        .instruction { font-size: 2rem; font-weight: 700; color: #555; line-height: 1.2; }

        .problem-row {
            display: flex; justify-content: center; align-items: center;
            gap: 20px; font-size: 5.5rem; font-weight: 900; color: var(--primary);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.05);
        }

        .ans-placeholder {
            min-width: 140px; height: 100px; background: #f0f4f8;
            border-radius: 25px; border: 6px dashed #ccc;
            display: flex; align-items: center; justify-content: center;
            color: var(--secondary); transition: all 0.3s;
        }
        .ans-placeholder.filled { border-style: solid; border-color: var(--secondary); background: white; }

        .number-line-container {
            width: 100%; background: #fdfdfd; padding: 60px 40px;
            border-radius: 35px; border: 5px solid #f1f1f1; overflow-x: auto;
            position: relative; min-height: 250px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.02);
        }

        .number-line {
            display: flex; justify-content: space-between; align-items: center;
            position: relative; width: 100%; min-width: 800px; padding-top: 80px;
        }

        .line-axis {
            position: absolute; top: 130px; left: 0; width: 100%; height: 8px;
            background: #cbd5e0; border-radius: 4px;
        }

        .tick-container { display: flex; justify-content: space-between; width: 100%; position: relative; }

        .tick { 
            display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; 
            cursor: pointer; transition: transform 0.2s; z-index: 5;
        }
        .tick:hover { transform: translateY(-10px); }
        .tick:hover .tick-label { color: var(--primary); transform: scale(1.2); }

        .tick-mark { width: 5px; height: 25px; background: #a0aec0; border-radius: 3px; }
        .tick-label { font-size: 2.2rem; font-weight: 800; color: #718096; transition: all 0.2s; }
        
        .tick.active .tick-label { color: var(--secondary); transform: scale(1.4); }
        .tick.wrong .tick-label { color: var(--danger); animation: shake 0.4s; }

        .jump-arrow {
            position: absolute; top: 20px; height: 100px;
            border-top: 8px solid var(--accent); border-radius: 100% 100% 0 0;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none; opacity: 0;
            z-index: 2;
        }
        .jump-arrow.visible { opacity: 1; }
        .jump-arrow::after {
            content: '◀'; position: absolute; left: -10px; bottom: -10px;
            color: var(--accent); font-size: 24px; transform: rotate(-90deg);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @media (max-width: 600px) {
            .problem-row { font-size: 3.2rem; }
            .ans-placeholder { min-width: 80px; height: 70px; }
            .game-card { padding: 30px 15px; }
            .tick-label { font-size: 1.5rem; }
            .tick-mark { height: 15px; }
            .instruction { font-size: 1.4rem; }
            .number-line-container { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div class="sun"></div>

    <header>
        <div class="nav-group">
            <button class="lang-select" id="langBtn" onclick="toggleLangMenu()">ትግርኛ</button>
        </div>
        <div class="score-pill">🔥 <span id="streakVal">0</span></div>
    </header>

    <div class="container">
        <div class="game-card">
            <div class="instruction" id="txtInstr">ነቲ ትኽክለኛ መልሲ ኣብቲ መስመር ቑፅሪ ጠውቖ!</div>
            
            <div class="problem-row">
                <span id="num1">30</span>
                <span>-</span>
                <span id="num2">8</span>
                <span>=</span>
                <div class="ans-placeholder" id="ansBox">?</div>
            </div>

            <div class="number-line-container">
                <div class="number-line">
                    <div class="line-axis"></div>
                    <div class="jump-arrow" id="jumpArrow"></div>
                    <div class="tick-container" id="tickContainer">
                        <!-- Ticks generated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            ti: { instr: "ነቲ ትኽክለኛ መልሲ ኣብቲ መስመር ቑፅሪ ጠውቖ!", correct: "ንኡድ ስራሕ!", wrong: "ጌጋ እዩ! እንደገና ፈትን" },
            am: { instr: "ትክክለኛውን መልስ በቁጥር መስመሩ ላይ ይጫኑ!", correct: "ድንቅ ስራ!", wrong: "ተሳስተሃል! እንደገና ሞክር" },
            en: { instr: "Click the correct answer on the number line!", correct: "Great Job!", wrong: "Try Again!" },
            om: { instr: "Deebii sirrii sarara lakkoofsaa irratti cuqaasi!", correct: "Hojii Gaarii!", wrong: "Ammas yaali!" },
            so: { instr: "Guji jawaabta saxda ah ee xariiqda nambarka!", correct: "Shaqo Fiican!", wrong: "Mar kale isku day!" }
        };

        let currentLang = 'ti';
        let n1, n2, ans;
        let streak = 0;
        let particles = [];
        let isAnswering = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            if (type === 'tap') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); osc.frequency.setValueAtTime(783, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.value = 150;
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
            osc.connect(gain); gain.connect(audioCtx.destination);
        }

        function generateProblem() {
            isAnswering = false;
            // Subtraction: Tens - Ones format
            n1 = (Math.floor(Math.random() * 9) + 1) * 10; // 10, 20, ... 90
            n2 = Math.floor(Math.random() * 9) + 1; // 1 - 9
            ans = n1 - n2;

            document.getElementById('num1').innerText = n1;
            document.getElementById('num2').innerText = n2;
            
            const box = document.getElementById('ansBox');
            box.innerText = "?";
            box.classList.remove('filled');
            box.style.borderColor = '';
            box.style.color = '';

            renderNumberLine();
        }

        function renderNumberLine() {
            const container = document.getElementById('tickContainer');
            container.innerHTML = '';
            
            // For subtraction, show range from n1-10 to n1
            const startVal = n1 - 10;
            for (let i = 0; i <= 10; i++) {
                const val = startVal + i;
                const tick = document.createElement('div');
                tick.className = 'tick';
                tick.id = `tick-${val}`;
                tick.innerHTML = `<div class="tick-label">${val}</div><div class="tick-mark"></div>`;
                tick.onclick = () => checkAnswer(val);
                container.appendChild(tick);
            }

            const arrow = document.getElementById('jumpArrow');
            arrow.classList.remove('visible');
            arrow.style.width = '0%';
            arrow.style.left = '0%';
        }

        function checkAnswer(val) {
            if (isAnswering) return;
            
            const tickEl = document.getElementById(`tick-${val}`);

            if (val === ans) {
                isAnswering = true;
                streak++;
                document.getElementById('streakVal').innerText = streak;
                playSound('correct');
                fireConfetti();
                
                const box = document.getElementById('ansBox');
                box.innerText = ans;
                box.classList.add('filled');

                animateJump();
                
                setTimeout(generateProblem, 2800);
            } else {
                playSound('wrong');
                if(tickEl) {
                    tickEl.classList.add('wrong');
                    setTimeout(() => {
                        tickEl.classList.remove('wrong');
                    }, 600);
                }
            }
        }

        function animateJump() {
            const arrow = document.getElementById('jumpArrow');
            const startTick = document.getElementById(`tick-${n1}`);
            const endTick = document.getElementById(`tick-${ans}`);
            
            const sRect = startTick.getBoundingClientRect();
            const eRect = endTick.getBoundingClientRect();
            const cRect = document.getElementById('tickContainer').getBoundingClientRect();

            // From N1 (Right) to Result (Left)
            const left = ((eRect.left + eRect.width/2) - cRect.left);
            const width = ((sRect.left + sRect.width/2) - (eRect.left + eRect.width/2));
            
            arrow.style.left = (left / cRect.width * 100) + '%';
            arrow.style.width = (width / cRect.width * 100) + '%';
            arrow.classList.add('visible');

            // Highlight intermediate steps for visual counting backward
            for(let i = n1; i >= ans; i--) {
                const delay = (n1 - i) * 150;
                setTimeout(() => {
                    const t = document.getElementById(`tick-${i}`);
                    if(t) t.classList.add('active');
                }, delay);
            }
        }

        function toggleLangMenu() {
            const codes = Object.keys(i18n);
            const next = codes[(codes.indexOf(currentLang) + 1) % codes.length];
            currentLang = next;
            document.getElementById('langBtn').innerText = currentLang === 'ti' ? 'ትግርኛ' : next.toUpperCase();
            document.getElementById('txtInstr').innerText = i18n[currentLang].instr;
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#FF5722', '#8CC63F', '#F7931E', '#FFF176', '#FFFFFF'];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height + 20,
                    vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.8) * 45,
                    size: Math.random() * 10 + 5, color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0, rot: Math.random() * 360, rv: (Math.random() - 0.5) * 12
                });
            }
            if(!window.confettiActive) { window.confettiActive = true; animateConfetti(); }
        }

        function animateConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life > 0) {
                    alive = true; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.vx *= 0.98;
                    p.life -= 0.012; p.rot += p.rv;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                } else { particles.splice(i, 1); }
            }
            if(alive) requestAnimationFrame(animateConfetti);
            else window.confettiActive = false;
        }

        window.onload = generateProblem;
    </script>
</body>
</html>

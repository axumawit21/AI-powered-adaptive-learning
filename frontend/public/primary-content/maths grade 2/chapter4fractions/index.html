<!DOCTYPE html>
<html lang="ti">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Fun | ናይ ክፍልፋል ጸወታ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary: #6366f1; 
        --secondary: #f59e0b; 
        --success: #22c55e; 
        --error: #ef4444; 
        --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        --card: #ffffff;
        --accent-glow: rgba(99, 102, 241, 0.2);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Fredoka', system-ui, -apple-system, sans-serif;
        background: var(--bg-gradient);
        background-attachment: fixed;
        color: #334155;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Animated decorative elements */
      .bg-bubble {
        position: fixed;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 50%;
        z-index: -1;
        pointer-events: none;
        animation: floatBubble 20s infinite linear;
      }
      @keyframes floatBubble {
        0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
      }

      #root {
        width: 100%;
        max-width: 1100px;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      .card {
        background: var(--card);
        border-radius: 40px;
        box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.15), 0 10px 20px -5px rgba(0, 0, 0, 0.1);
        padding: 50px;
        text-align: center;
        border: 10px solid white;
        transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        width: 100%;
        position: relative;
        overflow: hidden;
        animation: cardAppear 0.8s ease-out;
      }

      @keyframes cardAppear {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      .card.compact {
        max-width: 900px;
        padding: 40px;
      }
      
      h1 { font-size: 3.5rem; margin-bottom: 20px; color: var(--primary); font-weight: 800; letter-spacing: -1px; }
      p { font-size: 1.5rem; line-height: 1.6; color: #64748b; font-weight: 500; }

      .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 20px 50px;
        font-size: 1.5rem;
        font-weight: 700;
        border-radius: 60px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 8px 0 #4f46e5;
        margin-top: 30px;
        display: inline-block;
        font-family: inherit;
      }

      .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 0 #4f46e5; }
      .btn:active { transform: translateY(6px); box-shadow: 0 2px 0 #4f46e5; }

      .btn-secondary { background: var(--secondary); box-shadow: 0 8px 0 #d97706; }
      .btn-secondary:hover { box-shadow: 0 10px 0 #d97706; }
      .btn-secondary:active { box-shadow: 0 2px 0 #d97706; }

      .btn-error { background: var(--error); box-shadow: 0 8px 0 #b91c1c; }
      .btn-error:hover { box-shadow: 0 10px 0 #b91c1c; }
      .btn-error:active { box-shadow: 0 2px 0 #b91c1c; }

      .fraction-text { 
        font-size: 5.5rem; 
        font-weight: 800; 
        display: inline-flex; 
        flex-direction: column; 
        align-items: center; 
        line-height: 1; 
        color: var(--primary);
        text-shadow: 3px 3px 0 rgba(0,0,0,0.05);
      }
      .fraction-line { width: 120%; height: 8px; background: currentColor; margin: 12px 0; border-radius: 10px; }

      .clickable-path { cursor: pointer; transition: transform 0.2s, filter 0.2s; }
      .clickable-path:hover { filter: brightness(1.1); transform: scale(1.02); }
      
      .bar-container {
        display: flex;
        border: 8px solid #334155;
        border-radius: 25px;
        overflow: hidden;
        height: 130px;
        width: 100%;
        max-width: 600px;
        margin: 30px auto;
        background: white;
        box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      }
      .bar-part {
        flex: 1;
        background-color: #fff7ed;
        border-right: 4px solid #cbd5e1;
        cursor: pointer;
        transition: all 0.2s;
      }
      .bar-part:last-child { border-right: none; }
      .bar-part.filled { background-color: #3b82f6; }
      .bar-part:hover { transform: scale(1.02); z-index: 1; }

      input[type="number"] {
        width: 120px;
        height: 120px;
        font-size: 3.5rem;
        text-align: center;
        border: 6px solid #e2e8f0;
        border-radius: 30px;
        margin: 0 15px;
        font-weight: 800;
        color: var(--primary);
        outline: none;
        transition: border-color 0.2s, background-color 0.2s;
        font-family: inherit;
        background: #f8fafc;
      }
      input[type="number"]:focus { border-color: var(--primary); background: white; }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-15px); }
        75% { transform: translateX(15px); }
      }
      .shake { animation: shake 0.4s ease-in-out; border-color: var(--error); }

      @keyframes pop {
        0% { transform: scale(0.8); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      .pop-in { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

      @keyframes slide-pop {
        0% { transform: translateX(100px) scale(0.8) rotate(-15deg); opacity: 0; }
        60% { transform: translateX(-20px) scale(1.1) rotate(5deg); opacity: 1; }
        100% { transform: translateX(0) scale(1) rotate(0deg); opacity: 1; }
      }
      
      .pizza-slide {
        animation: slide-pop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .confetti-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255,255,255,0.98);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2000;
        animation: pop 0.3s ease-out;
      }
      
      .control-btn {
        padding: 15px 30px;
        border-radius: 20px;
        border: 4px solid #6366f1;
        background: white;
        color: #6366f1;
        cursor: pointer;
        font-weight: 800;
        margin: 10px;
        font-size: 1.4rem;
        transition: all 0.2s;
        font-family: inherit;
        box-shadow: 0 4px 0 #6366f1;
      }
      .control-btn:hover { background: #e0e7ff; transform: translateY(-2px); }
      .control-btn:active { transform: translateY(4px); box-shadow: none; }
      .control-btn.active {
        background: #6366f1;
        color: white;
        transform: scale(1.1);
        box-shadow: 0 6px 15px rgba(99, 102, 241, 0.4);
      }

      /* Navigation */
      .top-nav {
        position: fixed;
        top: 25px;
        right: 25px;
        display: flex;
        gap: 15px;
        z-index: 50;
      }
      
      .bottom-nav {
        position: fixed;
        bottom: 25px;
        right: 25px;
        display: flex;
        gap: 20px;
        z-index: 50;
        background: white;
        padding: 15px 30px;
        border-radius: 60px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        align-items: center;
        border: 4px solid #f8fafc;
      }

      .nav-btn {
        background: white;
        border: 4px solid #f1f5f9;
        color: #64748b;
        width: 65px;
        height: 65px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 6px 15px rgba(0,0,0,0.05);
      }
      .nav-btn:hover {
        transform: scale(1.15);
        border-color: var(--primary);
        color: var(--primary);
      }

      .streak-badge {
        display: flex;
        align-items: center;
        font-weight: 900;
        color: var(--secondary);
        font-size: 1.8rem;
      }

      .lang-container {
        position: fixed;
        top: 25px;
        left: 25px;
        z-index: 60;
      }
      .lang-dropdown {
        position: absolute;
        top: 75px;
        left: 0;
        background: white;
        border: 4px solid #f1f5f9;
        border-radius: 25px;
        padding: 15px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        display: none;
        flex-direction: column;
        gap: 10px;
        width: 200px;
      }
      .lang-dropdown.open {
        display: flex;
        animation: pop 0.3s ease-out;
      }
      .lang-option {
        padding: 12px 20px;
        cursor: pointer;
        border-radius: 15px;
        font-weight: 700;
        color: #64748b;
        transition: all 0.2s;
        text-align: left;
        font-family: inherit;
        font-size: 1.1rem;
      }
      .lang-option:hover {
        background: #f1f5f9;
        color: var(--primary);
      }
      .lang-option.selected {
        background: #e0e7ff;
        color: var(--primary);
      }

      @media (max-width: 850px) {
        #root { padding: 20px 10px; }
        .card { padding: 40px 20px; border-radius: 35px; border-width: 6px; }
        h1 { font-size: 2.5rem; }
        .fraction-text { font-size: 3.5rem; }
        .btn { padding: 15px 35px; font-size: 1.3rem; }
        input[type="number"] { width: 90px; height: 90px; font-size: 2.5rem; }
        .bar-container { height: 90px; }
        .nav-btn { width: 50px; height: 50px; font-size: 1.4rem; }
      }

      @media (max-width: 600px) {
        .top-nav { top: 15px; right: 15px; }
        .lang-container { top: 15px; left: 15px; }
        .bottom-nav { bottom: 15px; right: 15px; padding: 10px 20px; }
        .streak-badge { font-size: 1.4rem; }
      }

    </style>
  </head>
  <body>
    <!-- Background Bubbles -->
    <div class="bg-bubble" style="width: 100px; height: 100px; left: 10%; animation-delay: 0s;"></div>
    <div class="bg-bubble" style="width: 150px; height: 150px; left: 30%; animation-delay: 5s;"></div>
    <div class="bg-bubble" style="width: 80px; height: 80px; left: 70%; animation-delay: 2s;"></div>
    <div class="bg-bubble" style="width: 120px; height: 120px; left: 85%; animation-delay: 8s;"></div>

    <div class="lang-container">
      <button class="nav-btn" id="btn-lang" title="Language">🌐</button>
      <div class="lang-dropdown" id="lang-menu">
        <div class="lang-option" data-lang="ti">ትግርኛ</div>
        <div class="lang-option" data-lang="en">English</div>
        <div class="lang-option" data-lang="am">አማርኛ</div>
        <div class="lang-option" data-lang="om">Afaan Oromoo</div>
        <div class="lang-option" data-lang="so">Soomaali</div>
      </div>
    </div>

    <div class="top-nav">
      <button class="nav-btn" id="btn-home" title="Home">🏠</button>
      <button class="nav-btn" id="btn-back" title="Back">⬅️</button>
    </div>

    <div class="bottom-nav">
      <div class="streak-badge">
        🔥 <span id="streak-val" style="margin-left:8px;">0</span>
      </div>
      <div style="width: 4px; height: 35px; background: #f1f5f9; margin: 0 10px; border-radius: 2px;"></div>
      <button class="nav-btn" id="btn-sound" title="Toggle Sound" style="border:none; box-shadow:none;">🔊</button>
    </div>

    <div id="root"></div>

    <script>
      const STRINGS = {

        am: {

          top: "ተካፋይ ቁጥር(Numerator):",
          slices: "ያለን ቁርጥራጭ።",
          bottom: "መቁጠሪያ (Denominator):",
          total: "ጠቅላላ ቁርጥራጭ።",

          question: "ጥያቄ",
          of: "ከ",
          tryAgain: "አይደለም! እንደገና ሞክር ↺",
          check: "መልሱን ፈትሽ",
          correct: "ትክክል! 🎉",
          next: "ቀጣይ ጥያቄ ➜",
          finished: "ጨርሰሃል! ጎበዝ።",

        },

          title: "Seensa Firaakshinii",
          intro: "Firaakshiniin kutaa waan guutuu ti.",

          slices: "Kutaa qabnu.",
          bottom: "Jala (Denominator):",
          total: "Kutaa waliigalaa.",
          start: "Qormaata Jalqabi 🚀",
          question: "Gaaffii",
          of: "/",
          tryAgain: "Dogoggora! Ammas Yaali ↺",
          check: "Deebii Ilaali",
          correct: "Sirrii! 🎉",
          next: "Gaaffii Itti Aanuu ➜",
          finished: "Xumurtee! Hojii gaarii.",
          color: "Halluu Dibi",
          fill: "Guuti",
          whatFrac: "Firaakshinii meeqatu",
          colored: "halluu dibame",
          red: "diimaa",
          blue: "cuquliisa",
          pizza: "pizza",

        },
        so: {
          title: "Hordhaca Jajabka",
          intro: "Jajabku waa qayb ka mid ah wax dhan.",
          top: "Sare (Numerator):",
          slices: "Qaybaha aan haysano.",
          bottom: "Hoose (Denominator):",
          total: "Wadarta qaybaha.",
          start: "Bilow Imtixaanka 🚀",
          question: "Su'aal",
          of: "ee",
          tryAgain: "Qaldan! Isku Day Mar Kale ↺",
          check: "Hubi Jawaabta",
          correct: "Sax! 🎉",
          next: "Su'aasha Xigta ➜",
          finished: "Waad dhameysay! Shaqo fiican.",
          color: "Rinjeey",
          fill: "Buuxi",
          whatFrac: "Jajabkee ayaa",
          colored: "rinjeysan",
          red: "guduudan",
          blue: "buluug ah",
          pizza: "pizza",
          bar: "bar-ka",
          whole: "wax dhan"
        }
      };

      const QUESTIONS_DATA = [
        { id: 1, type: 'COLOR', shape: 'PIZZA', num: 1, den: 2, color: 'red' },
        { id: 2, type: 'INPUT', shape: 'BAR', num: 2, den: 3, color: 'blue' },
        { id: 3, type: 'COLOR', shape: 'BAR', num: 3, den: 4, color: 'blue' },
        { id: 4, type: 'INPUT', shape: 'PIZZA', num: 5, den: 6, color: 'red' },
        { id: 5, type: 'COLOR', shape: 'PIZZA', num: 1, den: 3, color: 'red' },
        { id: 6, type: 'INPUT', shape: 'BAR', num: 3, den: 5, color: 'blue' },
        { id: 7, type: 'COLOR', shape: 'BAR', num: 2, den: 5, color: 'blue' },
        { id: 8, type: 'INPUT', shape: 'PIZZA', num: 3, den: 8, color: 'red' },
        { id: 9, type: 'COLOR', shape: 'PIZZA', num: 4, den: 6, color: 'red' },
        { id: 10, type: 'INPUT', shape: 'BAR', num: 1, den: 4, color: 'blue' },
        { id: 11, type: 'COLOR', shape: 'BAR', num: 5, den: 8, color: 'blue' },
        { id: 12, type: 'INPUT', shape: 'PIZZA', num: 7, den: 8, color: 'red' },
        { id: 13, type: 'COLOR', shape: 'PIZZA', num: 4, den: 5, color: 'red' },
        { id: 14, type: 'INPUT', shape: 'BAR', num: 6, den: 8, color: 'blue' },
        { id: 15, type: 'COLOR', shape: 'BAR', num: 2, den: 6, color: 'blue' },
        { id: 16, type: 'INPUT', shape: 'PIZZA', num: 1, den: 6, color: 'red' },
        { id: 17, type: 'COLOR', shape: 'PIZZA', num: 1, den: 8, color: 'red' },
        { id: 18, type: 'INPUT', shape: 'BAR', num: 2, den: 4, color: 'blue' },
        { id: 19, type: 'COLOR', shape: 'PIZZA', num: 5, den: 6, color: 'red' },
        { id: 20, type: 'INPUT', shape: 'BAR', num: 2, den: 2, color: 'blue' },
      ];

      const DENOMINATORS = [2, 4, 6, 8];

      function getQuestionText(q, lang) {
        const t = STRINGS[lang];
        const shapeName = q.shape === 'PIZZA' ? t.pizza : t.bar;
        const fraction = `${q.num}/${q.den}`;

        if (q.type === 'COLOR') {
            if (lang === 'en') return `${t.color} ${fraction} ${t.of} the ${shapeName}!`;
            if (lang === 'ti') return `ናይቲ ${shapeName} ${fraction} ${t.color}!`; 
            if (lang === 'am') return `ከ${shapeName}ው ${fraction} ${t.color}!`;
            if (lang === 'om') return `${shapeName} irraa ${fraction} ${t.color}!`;
            if (lang === 'so') return `${t.color} ${fraction} oo ${shapeName} ah!`;
        } else {
            const colorName = q.color === 'red' ? t.red : t.blue;
            if (q.num === q.den) {
                return lang === 'en' ? `What fraction represents ${t.whole}?` :
                       lang === 'am' ? `${t.whole} የሚወክለው ክፍልፋይ ምንድን ነው?` :
                       lang === 'ti' ? `ን${t.whole} ዝውክል ክፍልፋል ኣየናይ እዩ?` :
                       lang === 'om' ? `Firaakshinii isa kamtu ${t.whole} bakka bu'a?` :
                       `${t.whatFrac} u taagan ${t.whole}?`;
            }
            
            if (lang === 'en') return `${t.whatFrac} ${colorName}?`;
            return `${t.whatFrac} ${t.colored}?`;
        }
        return "Question";
      }

      const state = {
        view: 'LECTURE', 
        language: 'ti',
        lecture: { num: 1, den: 4, intervalId: null },
        lastDen: 4, 
        quiz: {
          index: 0,
          filled: [],
          inputNum: '',
          inputDen: '',
          status: 'IDLE' 
        },
        streak: 0,
        soundEnabled: true
      };

      let audioCtx;
      function initAudio() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!audioCtx && AudioContext) {
            audioCtx = new AudioContext();
        }
      }

      function playSound(type) {
        if (!state.soundEnabled) return;
        initAudio();
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'win') {
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, now); 
          osc.frequency.setValueAtTime(659.25, now + 0.1); 
          osc.frequency.setValueAtTime(783.99, now + 0.2); 
          osc.frequency.setValueAtTime(1046.50, now + 0.3); 
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.linearRampToValueAtTime(0, now + 0.6);
          osc.start(); osc.stop(now + 0.6);
        } else if (type === 'lose') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, now);
          osc.frequency.linearRampToValueAtTime(100, now + 0.3);
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.linearRampToValueAtTime(0, now + 0.3);
          osc.start(); osc.stop(now + 0.3);
        }
      }

      function generatePizzaSVG(parts, filledArr, isInteractive, size = 350, extraClass = '') {
        let paths = '';
        for (let i = 0; i < parts; i++) {
          const startAngle = (i * 360) / parts - 90;
          const endAngle = ((i + 1) * 360) / parts - 90;
          const rad = Math.PI / 180;
          const x1 = 50 + 50 * Math.cos(startAngle * rad);
          const y1 = 50 + 50 * Math.sin(startAngle * rad);
          const x2 = 50 + 50 * Math.cos(endAngle * rad);
          const y2 = 50 + 50 * Math.sin(endAngle * rad);
          const largeArc = (endAngle - startAngle) > 180 ? 1 : 0;
          const color = filledArr[i] ? '#ef4444' : '#fff7ed'; 
          const cls = isInteractive ? 'clickable-path' : '';
          paths += `<path d="M 50 50 L ${x1} ${y1} A 50 50 0 ${largeArc} 1 ${x2} ${y2} Z" 
                      fill="${color}" stroke="#fbbf24" stroke-width="2" 
                      class="${cls}" data-index="${i}" />`;
        }
        return `<svg class="${extraClass}" viewBox="0 0 100 100" style="width: 100%; max-width: ${size}px; height: auto; margin: 30px auto; display: block;">
            <circle cx="50" cy="50" r="49" fill="#fef3c7" />
            ${paths}
          </svg>`;
      }

      function generateBarHTML(parts, filledArr, isInteractive) {
        let divs = '';
        for (let i = 0; i < parts; i++) {
          const cls = `bar-part ${filledArr[i] ? 'filled' : ''}`;
          divs += `<div class="${cls}" data-index="${i}"></div>`;
        }
        return `<div class="bar-container">${divs}</div>`;
      }

      function render() {
        const root = document.getElementById('root');
        const t = STRINGS[state.language];

        document.getElementById('streak-val').textContent = state.streak;
        document.getElementById('btn-sound').textContent = state.soundEnabled ? '🔊' : '🔇';
        document.querySelectorAll('.lang-option').forEach(el => {
            el.classList.toggle('selected', el.dataset.lang === state.language);
        });

        if (state.view === 'LECTURE') {
            stopSlideshow();
            startSlideshow();
            root.innerHTML = '';
            renderLecture(root, t);
        } else {
            stopSlideshow();
            root.innerHTML = '';
            renderQuiz(root, t);
        }
      }

      function startSlideshow() {
        if (state.lecture.intervalId) return;
        state.lecture.intervalId = setInterval(() => {
            const currentIdx = DENOMINATORS.indexOf(state.lecture.den);
            const nextIdx = (currentIdx + 1) % DENOMINATORS.length;
            state.lecture.den = DENOMINATORS[nextIdx];
            state.lecture.num = Math.min(state.lecture.num, state.lecture.den);
            render();
        }, 5000); 
      }

      function stopSlideshow() {
        if (state.lecture.intervalId) {
            clearInterval(state.lecture.intervalId);
            state.lecture.intervalId = null;
        }
      }

      function renderLecture(root, t) {
        const filled = Array.from({length: state.lecture.den}, (_, i) => i < state.lecture.num);
        const animClass = state.lecture.den !== state.lastDen ? 'pizza-slide' : '';
        const svgHTML = generatePizzaSVG(state.lecture.den, filled, false, 350, animClass);
        
        root.innerHTML = `
          <div id="lecture-card" class="card pop-in">
            <h1>🍕 ${t.title}</h1>
            <p>${t.intro}</p>
            
            <div style="display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 40px; margin: 40px 0;">
              <div style="flex: 1; min-width: 300px;">${svgHTML}</div>
              <div class="fraction-text">
                <span>${state.lecture.num}</span>
                <span class="fraction-line"></span>
                <span style="color: #94a3b8;">${state.lecture.den}</span>
              </div>
            </div>

            <div class="card" style="background: #f8fafc; box-shadow: none; border: 4px solid #e2e8f0; padding: 30px;">
              <p><strong>${t.top}</strong> ${t.slices}</p>
              <input type="range" id="lecture-num-slider" min="0" max="${state.lecture.den}" value="${state.lecture.num}" style="width:100%; cursor:pointer; height: 16px; margin: 20px 0;">
              
              <p style="margin-top:20px;"><strong>${t.bottom}</strong> ${t.total}</p>
              <div class="row" id="den-buttons" style="gap:15px; margin-top:15px;">
                 ${[2, 4, 6, 8].map(d => 
                   `<button class="control-btn ${d === state.lecture.den ? 'active' : ''}" data-den="${d}">${d}</button>`
                 ).join('')}
              </div>
            </div>

            <button id="start-quiz-btn" class="btn">${t.start}</button>
          </div>
        `;

        document.getElementById('start-quiz-btn').addEventListener('click', () => {
          state.view = 'QUIZ';
          startQuizQuestion(0);
          render();
        });

        document.getElementById('lecture-num-slider').addEventListener('input', (e) => {
             stopSlideshow(); startSlideshow();
             state.lecture.num = parseInt(e.target.value);
             render();
        });

        document.getElementById('den-buttons').addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') {
                stopSlideshow(); startSlideshow();
                state.lecture.den = parseInt(e.target.dataset.den);
                state.lecture.num = Math.min(state.lecture.num, state.lecture.den);
                render();
            }
        });
        state.lastDen = state.lecture.den;
      }

      function renderQuiz(root, t) {
        const qData = QUESTIONS_DATA[state.quiz.index];
        const isError = state.quiz.status === 'WRONG';
        const questionText = getQuestionText(qData, state.language);
        const isInteractive = (qData.type === 'COLOR' && state.quiz.status !== 'CORRECT');

        let visualHTML = qData.shape === 'PIZZA' ? 
            generatePizzaSVG(qData.den, state.quiz.filled, isInteractive, 350) : 
            generateBarHTML(qData.den, state.quiz.filled, isInteractive);

        let inputsHTML = qData.type === 'INPUT' ? `
            <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin: 40px 0;">
              <input type="number" id="input-num" placeholder="?" value="${state.quiz.inputNum}">
              <span style="font-size: 5rem; color: #cbd5e1; transform: rotate(15deg); font-weight:800;">/</span>
              <input type="number" id="input-den" placeholder="?" value="${state.quiz.inputDen}">
            </div>` : '';

        let actionArea = state.quiz.status === 'WRONG' ? `
            <p style="color: #ef4444; font-weight: 800; font-size: 1.5rem; margin-bottom: 20px;">${t.tryAgain}</p>
            <button id="try-again-btn" class="btn btn-error">${t.tryAgain}</button>` : 
            `<button id="check-btn" class="btn">${t.check}</button>`;

        root.innerHTML = `
          <div class="card pop-in ${isError ? 'shake' : ''}">
            <div style="display: flex; justify-content: space-between; margin-bottom: 30px; color: #94a3b8; font-weight: 800; font-size: 1.2rem;">
              <span>${t.question} ${state.quiz.index + 1} / ${QUESTIONS_DATA.length}</span>
            </div>

            <h2 style="font-size: 2.5rem; margin-bottom: 20px; font-weight:800;">${questionText}</h2>
            <div id="quiz-visual-container">${visualHTML}</div>
            ${inputsHTML}
            <div style="margin-top:40px;">${actionArea}</div>
          </div>
        `;

        if (state.quiz.status === 'CORRECT') {
          const overlay = document.createElement('div');
          overlay.className = 'confetti-overlay';
          overlay.innerHTML = `
            <h1 style="color: #22c55e; font-size: 5rem; margin:0;">${t.correct}</h1>
            <div style="font-size: 7rem; animation: pop 1s infinite alternate; margin: 20px 0;">⭐</div>
            <button id="next-btn" class="btn btn-secondary">${t.next}</button>
          `;
          root.appendChild(overlay);
          document.getElementById('next-btn').addEventListener('click', nextQuestion);
        }

        const checkBtn = document.getElementById('check-btn');
        if (checkBtn) checkBtn.addEventListener('click', checkAnswer);

        const tryAgainBtn = document.getElementById('try-again-btn');
        if (tryAgainBtn) tryAgainBtn.addEventListener('click', () => { state.quiz.status = 'IDLE'; render(); });

        if (qData.type === 'INPUT') {
          document.getElementById('input-num').addEventListener('input', (e) => state.quiz.inputNum = e.target.value);
          document.getElementById('input-den').addEventListener('input', (e) => state.quiz.inputDen = e.target.value);
        }

        if (isInteractive) {
          document.getElementById('quiz-visual-container').addEventListener('click', (e) => {
            const idx = e.target.closest('[data-index]')?.getAttribute('data-index');
            if (idx !== undefined) {
              state.quiz.filled[parseInt(idx)] = !state.quiz.filled[parseInt(idx)];
              render(); 
            }
          });
        }
      }

      function startQuizQuestion(index) {
        state.quiz.index = index;
        state.quiz.status = 'IDLE';
        state.quiz.inputNum = '';
        state.quiz.inputDen = '';
        const q = QUESTIONS_DATA[index];
        state.quiz.filled = q.type === 'COLOR' ? new Array(q.den).fill(false) : Array.from({length: q.den}, (_, i) => i < q.num);
      }

      function checkAnswer() {
        const q = QUESTIONS_DATA[state.quiz.index];
        let isCorrect = q.type === 'COLOR' ? 
            state.quiz.filled.filter(Boolean).length === q.num : 
            parseInt(state.quiz.inputNum) === q.num && parseInt(state.quiz.inputDen) === q.den;

        if (isCorrect) {
          state.quiz.status = 'CORRECT';
          state.streak++;
          playSound('win');
        } else {
          state.quiz.status = 'WRONG';
          state.streak = 0;
          playSound('lose');
        }
        render();
      }

      function nextQuestion() {
        if (state.quiz.index < QUESTIONS_DATA.length - 1) {
          startQuizQuestion(state.quiz.index + 1);
          render();
        } else {
          alert(STRINGS[state.language].finished);
          state.view = 'LECTURE';
          render();
        }
      }

      document.getElementById('btn-home').addEventListener('click', () => { state.view = 'LECTURE'; render(); });
      document.getElementById('btn-back').addEventListener('click', () => {
        if (state.view === 'QUIZ') {
          if (state.quiz.index > 0) startQuizQuestion(state.quiz.index - 1);
          else state.view = 'LECTURE';
        }
        render();
      });
      document.getElementById('btn-sound').addEventListener('click', () => { state.soundEnabled = !state.soundEnabled; render(); });

      const btnLang = document.getElementById('btn-lang');
      const langMenu = document.getElementById('lang-menu');
      btnLang.addEventListener('click', (e) => { e.stopPropagation(); langMenu.classList.toggle('open'); });
      document.addEventListener('click', (e) => { if (!langMenu.contains(e.target)) langMenu.classList.remove('open'); });
      document.querySelectorAll('.lang-option').forEach(option => {
        option.addEventListener('click', (e) => {
            state.language = e.target.dataset.lang;
            langMenu.classList.remove('open');
            render();
        });
      });
      
      window.onload = render;
    </script>
  </body>
</html>

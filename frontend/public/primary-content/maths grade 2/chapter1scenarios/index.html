<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Problem Adventure | ዓለም ሕቶታት ቃላት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00AEEF;
            --secondary: #8CC63F;
            --accent: #F7931E;
            --danger: #ED1C24;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(135deg, #FFEB3B 0%, #FFF9C4 50%, #E0F7FA 50%, #81D4FA 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
        }

        header {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .lang-select {
            padding: 10px 15px; border-radius: 20px; border: 2px solid white;
            font-family: inherit; font-weight: bold; cursor: pointer; outline: none;
            background: var(--primary); color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .score-pill {
            background: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; font-size: 1.4rem; color: var(--primary);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px;
        }

        .container {
            flex: 1; width: 100%; max-width: 900px;
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; gap: 20px; z-index: 10;
        }

        /* Character & Story Bubble */
        .story-section {
            display: flex; align-items: flex-end; gap: 20px; margin-bottom: 20px;
        }

        .character-img { font-size: 5rem; animation: bounce 3s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .bubble {
            background: white; border-radius: 30px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative;
            flex: 1; border: 4px solid #eee;
        }
        .bubble::after {
            content: ''; position: absolute; left: -20px; bottom: 20px;
            width: 0; height: 0; border-right: 25px solid white;
            border-top: 15px solid transparent; border-bottom: 15px solid transparent;
        }
        .story-text { font-size: 1.6rem; font-weight: 600; color: #333; line-height: 1.4; }

        /* Visual Aid Box */
        .visual-aid {
            background: rgba(255,255,255,0.6); border-radius: 30px; padding: 20px;
            min-height: 150px; display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; align-content: center; border: 4px dashed #ccc;
        }
        .aid-item { font-size: 2.2rem; transition: transform 0.3s; }
        .aid-item.faded { opacity: 0.2; transform: scale(0.8); }

        /* Keypad Area - Stacked Layout */
        .interaction-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: white; padding: 30px; border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 8px solid white;
        }

        .ans-display {
            font-size: 4rem; font-weight: 900; color: var(--primary);
            background: #f0f4f8; border-radius: 25px; border: 4px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            height: 120px;
            width: 100%;
        }

        .keypad {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            width: 100%;
        }
        .key {
            width: 100%; height: 80px; background: white; border: none;
            border-radius: 20px; font-size: 2.2rem; font-weight: 800;
            color: #444; cursor: pointer; box-shadow: 0 6px 0 #ddd;
            transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 #ddd; }
        .key.hint { background: #E1F5FE; color: var(--primary); box-shadow: 0 6px 0 #BBDEFB; }
        .key.del { background: #ffebee; color: var(--danger); box-shadow: 0 6px 0 #ffcdd2; }
        
        /* Full width wide check button */
        .key.check { 
            grid-column: span 4; 
            background: var(--secondary); 
            color: white; 
            box-shadow: 0 6px 0 #689f38;
            height: 90px;
            font-size: 2.2rem;
            margin-top: 5px;
        }

        /* Equations Overlay */
        .hint-text {
            font-size: 2rem; font-weight: 800; color: #999;
            margin-top: 10px; text-align: center;
        }

        @media (max-width: 600px) {
            .story-text { font-size: 1.1rem; }
            .character-img { font-size: 3rem; }
            .interaction-area { padding: 20px; border-radius: 30px; }
            .ans-display { height: 80px; font-size: 2.5rem; }
            .key { height: 60px; font-size: 1.5rem; border-radius: 15px; }
            .key.check { height: 70px; font-size: 1.8rem; }
            .hint-text { font-size: 1.4rem; }
        }
    </style>
</head>

        let currentIdx = 0;
        let userAns = "";
        let streak = 0;
        let currentLang = 'ti';
        let particles = [];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            if (type === 'tap') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); osc.frequency.setValueAtTime(783, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.value = 150;
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
            osc.connect(gain); gain.connect(audioCtx.destination);
        }

        function loadLevel() {
            const problem = STORIES[currentIdx];
            document.getElementById('txtStory').innerText = problem.text[currentLang] || problem.text['en'];
            document.getElementById('charEmoji').innerText = problem.emoji;
            document.getElementById('ansDisplay').innerText = "?";
            document.getElementById('hintBox').style.display = 'none';
            document.getElementById('btnCheck').innerText = i18n[currentLang].check;
            userAns = "";
            
            // Visual Aid Generation
            const aid = document.getElementById('visualAid');
            aid.innerHTML = '';
            
            let count = problem.op === 'missing' ? problem.val2 : (problem.op === '+' ? (problem.val1 + problem.val2) : problem.val1);
            if (count > 40) count = 40; 

            for (let i = 0; i < count; i++) {
                const item = document.createElement('div');
                item.className = 'aid-item';
                item.innerText = problem.char;
                if (problem.op === '-' && i >= (problem.val1 - problem.val2)) item.classList.add('faded');
                if (problem.op === 'missing' && i < problem.val1) item.classList.add('faded');
                aid.appendChild(item);
            }

            // Hint Logic
            let hintStr = "";
            if(problem.op === '+') hintStr = `${problem.val1} + ${problem.val2} = ?`;
            if(problem.op === '-') hintStr = `${problem.val1} - ${problem.val2} = ?`;
            if(problem.op === 'missing') hintStr = `${problem.val1} + ? = ${problem.val2}`;
            document.getElementById('hintBox').innerText = hintStr;
        }

        function pressKey(k) {
            if (k === 'back') {
                userAns = userAns.slice(0, -1);
            } else {
                if (userAns.length < 3) userAns += k;
            }
            document.getElementById('ansDisplay').innerText = userAns || "?";
            playSound('tap');
        }

        function toggleHint() {
            const box = document.getElementById('hintBox');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
            playSound('tap');
        }

        function checkAnswer() {
            const problem = STORIES[currentIdx];
            if (parseInt(userAns) === problem.ans) {
                streak++;
                document.getElementById('streakVal').innerText = streak;
                playSound('correct');
                fireConfetti();
                
                setTimeout(() => {
                    currentIdx = (currentIdx + 1) % STORIES.length;
                    loadLevel();
                }, 2500);
            } else {
                playSound('wrong');
                document.getElementById('ansDisplay').style.borderColor = 'var(--danger)';
                setTimeout(() => {
                    document.getElementById('ansDisplay').style.borderColor = '';
                    userAns = "";
                    document.getElementById('ansDisplay').innerText = "?";
                }, 800);
            }
        }

        function toggleLangMenu() {
            const codes = ['ti', 'am', 'en', 'om', 'so'];
            const next = codes[(codes.indexOf(currentLang) + 1) % codes.length];
            currentLang = next;
            document.getElementById('langBtn').innerText = currentLang === 'ti' ? 'ትግርኛ' : next.toUpperCase();
            loadLevel();
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#00AEEF', '#8CC63F', '#F7931E', '#FFF176', '#FFFFFF'];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height + 20,
                    vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.8) * 45,
                    size: Math.random() * 10 + 5, color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0, rot: Math.random() * 360, rv: (Math.random() - 0.5) * 12
                });
            }
            if(!window.confettiActive) { window.confettiActive = true; animateConfetti(); }
        }

        function animateConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life > 0) {
                    alive = true; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.vx *= 0.98;
                    p.life -= 0.012; p.rot += p.rv;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                } else { particles.splice(i, 1); }
            }
            if(alive) requestAnimationFrame(animateConfetti);
            else window.confettiActive = false;
        }

        window.onload = loadLevel;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Data Detective | መርማሪ መረዳእታ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #10b981;
            --danger: #ef4444;
            --amber: #f59e0b;
            --glass: rgba(255, 255, 255, 0.95);
            --bg-deep: #2e1065;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-deep);
            background-image: 
                radial-gradient(at 0% 0%, #7e22ce 0px, transparent 50%),
                radial-gradient(at 100% 0%, #db2777 0px, transparent 50%),
                radial-gradient(at 100% 100%, #1e1b4b 0px, transparent 50%),
                radial-gradient(at 0% 100%, #064e3b 0px, transparent 50%),
                radial-gradient(at 50% 50%, #4c1d95 0px, transparent 50%);
            background-size: 200% 200%;
            animation: moveBg 15s infinite alternate ease-in-out;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #fff;
        }

        @keyframes moveBg { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 850px; padding: 15px 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 10px;
        }

        .header-stats { display: flex; gap: 10px; flex-wrap: wrap; }

        .stat-pill {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 8px 18px; border-radius: 50px; font-weight: 800; font-size: 1rem; color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; gap: 6px;
        }
        .stat-label { opacity: 0.8; font-size: 0.8rem; text-transform: uppercase; }
        .stat-val { color: #fff; }

        .lang-select {
            padding: 8px 15px; border-radius: 15px; border: none; font: inherit; font-weight: bold; cursor: pointer;
            background: white; color: var(--primary); box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-size: 0.9rem;
        }

        .container {
            flex: 1; width: 100%; max-width: 700px; display: flex; flex-direction: column; 
            padding: 10px 20px; gap: 15px; z-index: 10; justify-content: center;
        }

        .game-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 35px; padding: 25px; 
            border: 8px solid transparent;
            background-clip: padding-box;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 20px;
            animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #1e293b;
        }
        
        .game-card::before {
            content: ''; position: absolute; top: -8px; bottom: -8px; left: -8px; right: -8px;
            background: linear-gradient(45deg, #8b5cf6, #ec4899, #10b981, #f59e0b);
            z-index: -1; border-radius: 40px;
        }

        @keyframes slideUp { from { transform: translateY(40px) scale(0.95); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* Item Display Area */
        .items-display {
            background: #f8fafc; border-radius: 25px; padding: 20px;
            min-height: 180px; display: flex; flex-wrap: wrap; 
            justify-content: center; align-content: center; gap: 10px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
            border: 3px solid #e2e8f0;
        }

        .item-icon {
            font-size: 2.8rem;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.2s;
            cursor: pointer;
        }
        .item-icon:hover { transform: scale(1.2) rotate(10deg); }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .story-box {
            background: #f5f3ff; border-radius: 20px; padding: 18px; border-left: 8px solid var(--primary);
            text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .story-text { font-size: 1.3rem; font-weight: 700; color: #4c1d95; line-height: 1.4; }

        /* Answer Input Area */
        .ans-area { display: flex; flex-direction: column; align-items: center; gap: 20px; }

        .digit-slot {
            width: 120px; height: 85px; background: white; border: 5px dashed #cbd5e1;
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 2.8rem; font-weight: 900; color: var(--primary); cursor: pointer; transition: 0.3s;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.05);
        }
        .digit-slot.active { border-style: solid; border-color: var(--primary); transform: scale(1.08); background: #f5f3ff; box-shadow: 0 0 25px rgba(139, 92, 246, 0.2); }
        .digit-slot.wrong { border-color: var(--danger) !important; color: var(--danger) !important; background: #fee2e2 !important; }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 450px; }
        .key {
            height: 60px; background: white; border: none; border-radius: 18px;
            font-size: 1.6rem; font-weight: 800; color: #475569; cursor: pointer;
            box-shadow: 0 5px 0 #e2e8f0; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(3px); box-shadow: 0 2px 0 #e2e8f0; }
        .key.del { background: #fff1f2; color: #ef4444; box-shadow: 0 5px 0 #fecdd3; }
        .key.check { 
            grid-column: span 4; background: linear-gradient(135deg, var(--secondary), #059669); 
            color: white; box-shadow: 0 6px 0 #064e3b; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 2px;
            height: 75px; margin-top: 5px;
        }
        .key.check:active { transform: translateY(5px); box-shadow: 0 1px 0 #064e3b; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-12px); } 40%, 80% { transform: translateX(12px); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        .wrong-flash { background-color: rgba(239, 68, 68, 0.4) !important; }

        /* Success Overlay */
        #success-overlay {
            position: fixed; inset: 0; background: rgba(16, 185, 129, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: white; text-align: center;
            backdrop-filter: blur(10px);
        }
        #success-overlay h2 { font-size: 3.5rem; margin-top: 15px; text-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.3);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 12rem; color: white; opacity: 0.8; }

        @media (max-width: 600px) {
            .story-text { font-size: 1.1rem; }
            .digit-slot { width: 90px; height: 75px; font-size: 2.2rem; }
            .key { height: 50px; font-size: 1.3rem; border-radius: 14px; }
            .key.check { font-size: 1.4rem; height: 65px; }
            .game-card { padding: 20px 15px; border-radius: 30px; }
            header { padding: 10px; justify-content: center; }
            .item-icon { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-stats">
            <div class="stat-pill">
                <span id="highLabel" class="stat-label">ዝለዓለ</span>
                <span id="highScoreVal" class="stat-val">0</span>
            </div>
            <div class="stat-pill">
                <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                <span id="scoreVal" class="stat-val">0</span>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <div class="story-box">
                <p class="story-text" id="storyText">...</p>
            </div>

            <div class="items-display" id="itemsDisplay">
                <!-- Items injected here -->
            </div>

            <div class="ans-area">
                <div class="digit-slot active" id="ansSlot">?</div>

                <div class="keypad">
                    <button class="key" onclick="press(1)">1</button>
                    <button class="key" onclick="press(2)">2</button>
                    <button class="key" onclick="press(3)">3</button>
                    <button class="key del" onclick="press('bk')">⌫</button>
                    <button class="key" onclick="press(4)">4</button>
                    <button class="key" onclick="press(5)">5</button>
                    <button class="key" onclick="press(6)">6</button>
                    <button class="key" onclick="press(0)">0</button>
                    <button class="key" onclick="press(7)">7</button>
                    <button class="key" onclick="press(8)">8</button>
                    <button class="key" onclick="press(9)">9</button>
                    <button class="key check" id="btnCheck" onclick="check()">ፈትሽ (Check)</button>
                </div>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 8rem; animation: bounce 1s infinite alternate;">🔍</div>
        <h2 id="txtWin">ንኡድ ስራሕ!</h2>
        <p style="font-size: 1.5rem;" id="txtWinSub">ብትኽክል መሊስካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { check: "አረጋግፅ", win: "ንኡድ ስራሕ!", winsub: "ብትኽክል መሊስካዮ ኣለኻ!", highest: "ዝለዓለ", score: "ነጥቢ", types: { students: ["ተምሃሮ", "ደቂ ተባዕትዮ", "ደቂ ኣንስትዮ"], farm: ["እንስሳ", "ላሕሚ", "በጊዕ"], garden: ["ተኽሊ", "ኦም", "ዕምባባ"], fruits: ["ፍረታት", "ኣፕል", "ባኒ"] }, qCount: "ኣብዚ ክንደይ {t} ኣለዉ?", qDiff: "በዝሒ {a} ካብ በዝሒ {b} ብኽንደይ ይበልፅ?", qSum: "ብሓፈሻ ክንደይ {a}ን {b}ን ኣለዉ?" },
            am: { check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", highest: "ከፍተኛ", score: "ነጥብ", types: { students: ["ተማሪዎች", "ወንዶች", "ሴቶች"], farm: ["እንሰሳት", "ላም", "በግ"], garden: ["ተክሎች", "ዛፍ", "አበባ"], fruits: ["ፍራፍሬዎች", "ኣፕል", "ሙዝ"] }, qCount: "እዚህ ስንት {t} አሉ?", qDiff: "የ{a} ብዛት ከ{b} ብዛት በስንት ይበልጣል?", qSum: "በጥቅሉ ስንት {a} እና {b} አሉ?" },
            en: { check: "Check", win: "Great Job!", winsub: "You answered correctly!", highest: "Highest", score: "Score", types: { students: ["Students", "Boys", "Girls"], farm: ["Animals", "Cows", "Sheep"], garden: ["Plants", "Trees", "Flowers"], fruits: ["Fruits", "Apples", "Bananas"] }, qCount: "How many {t} are here?", qDiff: "How many more {a} than {b} are there?", qSum: "How many {a} and {b} are there in total?" },
            om: { check: "Mirkaneessi", win: "Guddina!", winsub: "Sirriitti deebisteetta!", highest: "Olaanaa", score: "Qabxii", types: { students: ["Barattoota", "Dhiira", "Dubra"], farm: ["Beeyilada", "Sa'a", "Hoolaa"], garden: ["Biqiltuu", "Mukkeen", "Ababaa"], fruits: ["Ija mukaa", "Appilii", "Muuzii"] }, qCount: "{t} meeqatu jira?", qDiff: "Baay'inni {a} kan {b} irራ meeqaan caala?", qSum: "Waliigala {a} fi {b} meeqatu jira?" },
            so: { check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad uga jawaabtay!", highest: "Sare", score: "Dhibco", types: { students: ["Arday", "Wiilal", "Gabdho"], farm: ["Xoolo", "Lo' ", "Ido"], garden: ["Dhirta", "Geedo", "Ubaxyo"], fruits: ["Miraha", "Tufaax", "Moos"] }, qCount: "Halkan imisa {t} ayaa jooga?", qDiff: "Imisa ayay {a} kaga badan yihiin {b}?", qSum: "Wadarta {a} iyo {b} waa imisa?" }
        };

        const THEMES = [
            { id: 'students', icons: ['👦', '👧'] },
            { id: 'farm', icons: ['🐄', '🐑'] },
            { id: 'garden', icons: ['🌳', '🌸'] },
            { id: 'fruits', icons: ['🍎', '🍌'] }
        ];

        let score = 0, lang = 'ti', userVal = "", particles = [];
        let highScore = parseInt(localStorage.getItem('data_high_score')) || 0;
        let currentProblem = null;
        let lastAns = -1;

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.5);
                g.gain.setValueAtTime(0.15, n); g.gain.linearRampToValueAtTime(0, n + 0.5);
                o.start(); o.stop(n + 0.5);
            }
        }

        function generateProblem() {
            const theme = THEMES[Math.floor(Math.random() * THEMES.length)];
            const countA = Math.floor(Math.random() * 8) + 3;
            const countB = Math.floor(Math.random() * 6) + 2;
            
            const qType = Math.floor(Math.random() * 3); // 0: count single, 1: diff, 2: sum
            let ans = 0, qStr = "";
            const t = i18n[lang];
            const terms = t.types[theme.id];

            if (qType === 0) {
                const pickA = Math.random() > 0.5;
                ans = pickA ? countA : countB;
                qStr = t.qCount.replace('{t}', pickA ? terms[1] : terms[2]);
            } else if (qType === 1) {
                const isAMore = countA >= countB;
                ans = Math.abs(countA - countB);
                qStr = t.qDiff.replace('{a}', isAMore ? terms[1] : terms[2]).replace('{b}', isAMore ? terms[2] : terms[1]);
            } else {
                ans = countA + countB;
                qStr = t.qSum.replace('{a}', terms[1]).replace('{b}', terms[2]);
            }

            // Prevent repetition of same numerical answer twice
            if (ans === lastAns) return generateProblem();
            lastAns = ans;

            currentProblem = { theme, countA, countB, ans, qStr };
            userVal = "";
            renderDisplay();
            updateUI();
        }

        function renderDisplay() {
            const display = document.getElementById('itemsDisplay');
            display.innerHTML = '';
            const { theme, countA, countB } = currentProblem;
            
            let pool = [];
            for (let i = 0; i < countA; i++) pool.push(theme.icons[0]);
            for (let i = 0; i < countB; i++) pool.push(theme.icons[1]);
            pool.sort(() => Math.random() - 0.5);

            pool.forEach((icon, i) => {
                const el = document.createElement('div');
                el.className = 'item-icon';
                el.innerText = icon;
                el.style.animationDelay = `${i * 0.05}s`;
                display.appendChild(el);
            });

            document.getElementById('storyText').innerText = currentProblem.qStr;
            document.getElementById('ansSlot').innerText = "?";
        }

        function press(n) {
            sfx('tap');
            if (n === 'bk') userVal = userVal.slice(0, -1);
            else if (userVal.length < 3) userVal += n;
            document.getElementById('ansSlot').innerText = userVal || "?";
        }

        function check() {
            if (userVal === "") return;
            if (parseInt(userVal) === currentProblem.ans) {
                score += 10;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('data_high_score', highScore);
                }
                sfx('win');
                burst(500);
                
                const overlay = document.getElementById('success-overlay');
                document.getElementById('txtWin').innerText = i18n[lang].win;
                document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
                overlay.style.display = 'flex';

                setTimeout(() => {
                    overlay.style.display = 'none';
                    generateProblem();
                }, 2000);
            } else {
                sfx('err');
                const card = document.getElementById('gameCard');
                const errScreen = document.getElementById('error-screen');
                card.classList.add('shake', 'wrong-flash');
                errScreen.style.display = 'flex';
                document.getElementById('ansSlot').classList.add('wrong');
                
                setTimeout(() => {
                    card.classList.remove('shake', 'wrong-flash');
                    errScreen.style.display = 'none';
                    document.getElementById('ansSlot').classList.remove('wrong');
                    userVal = "";
                    document.getElementById('ansSlot').innerText = "?";
                }, 800);
            }
        }

        function changeLang(l) {
            lang = l;
            generateProblem();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('scoreLabel').innerText = t.score;
            document.getElementById('highLabel').innerText = t.highest;
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#8b5cf6', '#ec4899', '#10b981', '#f59e0b', '#3b82f6', '#ffffff'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20,
                vx: (Math.random()-0.5)*40, vy: (Math.random()-0.9)*55,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*25
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); 
                        x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = generateProblem;
    </script>
</body>
</html>

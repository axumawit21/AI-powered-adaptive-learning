<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertical Subtraction | ምጉዳል</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9C27B0;
            --secondary: #00BCD4;
            --accent: #FF4081;
            --danger: #F44336;
            --paper: #FFF;
            --text: #37474F;
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
        }

        header {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .lang-select {
            padding: 10px 15px; border-radius: 20px; border: 2px solid white;
            font-family: inherit; font-weight: bold; cursor: pointer; outline: none;
            background: var(--primary); color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .score-pill {
            background: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; font-size: 1.4rem; color: var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 8px;
        }

        .container {
            flex: 1; width: 100%; max-width: 800px;
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; gap: 30px; z-index: 10;
        }

        .math-card {
            background: white; border-radius: 40px; padding: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08); border: 8px solid #fce4ec;
            display: flex; flex-direction: column; align-items: center;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .vertical-math {
            display: inline-flex; flex-direction: column; align-items: flex-end;
            font-size: 6rem; font-weight: 900; color: var(--text);
            line-height: 1; position: relative; padding: 0 40px;
        }

        .num-top { margin-bottom: 10px; letter-spacing: 15px; }
        .num-bottom { margin-bottom: 20px; letter-spacing: 15px; position: relative; }
        .minus-sign { position: absolute; left: -80px; top: 0; color: var(--accent); font-size: 5rem; }
        
        .line { width: 125%; height: 8px; background: var(--text); margin-bottom: 20px; border-radius: 4px; }

        .answer-row { display: flex; gap: 15px; justify-content: flex-end; width: 100%; }
        
        .digit-input {
            width: 90px; height: 110px; background: #f3e5f5;
            border: 4px solid #e1bee7; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; font-weight: 900; color: var(--primary);
            cursor: pointer; transition: all 0.2s;
        }
        .digit-input.active { 
            border-color: var(--primary); 
            background: white; 
            box-shadow: 0 0 0 6px rgba(156, 39, 176, 0.2); 
            transform: scale(1.05);
        }
        .digit-input.wrong { border-color: var(--danger); background: #ffebee; color: var(--danger); animation: shake 0.4s; }

        .keypad-section { width: 100%; display: flex; flex-direction: column; gap: 20px; }

        .check-btn {
            width: 100%; padding: 20px; border-radius: 25px; border: none;
            background: var(--secondary); color: white; font-size: 2rem;
            font-weight: 800; cursor: pointer; box-shadow: 0 8px 0 #0097a7;
            transition: all 0.1s;
        }
        .check-btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #0097a7; }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .key {
            height: 70px; background: white; border: none; border-radius: 15px;
            font-size: 2rem; font-weight: 800; color: #444; cursor: pointer;
            box-shadow: 0 6px 0 #ddd; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 #ddd; }
        .key.del { background: #f5f5f5; color: var(--danger); }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        @media (max-width: 600px) {
            .vertical-math { font-size: 4rem; }
            .num-top, .num-bottom { letter-spacing: 5px; }
            .minus-sign { font-size: 3rem; left: -50px; }
            .digit-input { width: 65px; height: 85px; font-size: 3rem; }
            .check-btn { font-size: 1.5rem; }
            .key { height: 60px; font-size: 1.5rem; }
            .math-card { padding: 30px 20px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="nav-group">
            <button class="lang-select" id="langBtn" onclick="toggleLangMenu()">ትግርኛ</button>
        </div>
        <div class="score-pill">🔥 <span id="scoreVal">0</span></div>
    </header>

    <div class="container">
        <div class="math-card">
            <div class="vertical-math">
                <div class="num-top" id="topNum">36</div>
                <div class="num-bottom">
                    <span class="minus-sign">-</span>
                    <span id="bottomNum">12</span>
                </div>
                <div class="line"></div>
                <div class="answer-row">
                    <div class="digit-input" id="digit1" onclick="setActive(1)">?</div>
                    <div class="digit-input" id="digit0" onclick="setActive(0)">?</div>
                </div>
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad">
                <button class="key" onclick="pressNum(1)">1</button>
                <button class="key" onclick="pressNum(2)">2</button>
                <button class="key" onclick="pressNum(3)">3</button>
                <button class="key del" onclick="pressNum('back')">⌫</button>
                <button class="key" onclick="pressNum(4)">4</button>
                <button class="key" onclick="pressNum(5)">5</button>
                <button class="key" onclick="pressNum(6)">6</button>
                <button class="key" onclick="pressNum(0)">0</button>
                <button class="key" onclick="pressNum(7)">7</button>
                <button class="key" onclick="pressNum(8)">8</button>
                <button class="key" onclick="pressNum(9)">9</button>
            </div>
            <button class="check-btn" id="btnCheck" onclick="checkAnswer()">ፈትሽ</button>
        </div>
    </div>

    <script>
        const i18n = {
            ti: { check: "ፈትሽ", congrats: "ጣዕሚ!", next: "ቀጻሊ" },
            am: { check: "አረጋግጥ", congrats: "ድንቅ ስራ!", next: "ቀጣይ" },
            en: { check: "Check", congrats: "Great Job!", next: "Next" },
            om: { check: "Mirkaneessi", congrats: "Hojii Gaarii!", next: "Itti fufi" },
            so: { check: "Hubi", congrats: "Shaqo Fiican!", next: "Xiga" }
        };

        const PROBLEMS = [
            [36, 12], [38, 12], [45, 23], [67, 45], [99, 36], 
            [54, 21], [88, 55], [76, 34], [49, 18],
            [35, 15], [62, 41], [87, 24], [59, 37]
        ];

        let currentIdx = 0;
        let score = 0;
        let activeDigit = 1; // 1 = Tens (Left), 0 = Units (Right)
        let userDigits = ["?", "?"];
        let currentLang = 'ti';
        let particles = [];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            if (type === 'tap') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); osc.frequency.setValueAtTime(783, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.value = 150;
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
            osc.connect(gain); gain.connect(audioCtx.destination);
        }

        function loadProblem() {
            const [n1, n2] = PROBLEMS[currentIdx];
            document.getElementById('topNum').innerText = n1;
            document.getElementById('bottomNum').innerText = n2;
            userDigits = ["?", "?"];
            activeDigit = 1; // Always start with Left box
            updateDisplay();
            document.getElementById('btnCheck').innerText = i18n[currentLang].check;
        }

        function updateDisplay() {
            document.getElementById('digit0').innerText = userDigits[0];
            document.getElementById('digit1').innerText = userDigits[1];
            
            // Visual indicators for focus
            document.getElementById('digit0').classList.toggle('active', activeDigit === 0);
            document.getElementById('digit1').classList.toggle('active', activeDigit === 1);
            
            document.getElementById('digit0').classList.remove('wrong');
            document.getElementById('digit1').classList.remove('wrong');
        }

        function setActive(d) {
            activeDigit = d;
            playSound('tap');
            updateDisplay();
        }

        function pressNum(n) {
            playSound('tap');
            if (n === 'back') {
                userDigits[activeDigit] = "?";
                // Move back if we deleted Units
                if (activeDigit === 0 && userDigits[0] === "?") activeDigit = 1;
            } else {
                userDigits[activeDigit] = n;
                // Move from Left to Right automatically
                if (activeDigit === 1) activeDigit = 0;
            }
            updateDisplay();
        }

        function checkAnswer() {
            const [n1, n2] = PROBLEMS[currentIdx];
            const correctAns = n1 - n2;
            
            // Reconstruct user answer: Tens (idx 1) * 10 + Units (idx 0)
            const tens = userDigits[1] === "?" ? 0 : parseInt(userDigits[1]);
            const units = userDigits[0] === "?" ? 0 : parseInt(userDigits[0]);
            const userAns = (tens * 10) + units;

            if (userAns === correctAns) {
                score += 10;
                document.getElementById('scoreVal').innerText = score;
                playSound('correct');
                fireConfetti();
                
                setTimeout(() => {
                    currentIdx = (currentIdx + 1) % PROBLEMS.length;
                    loadProblem();
                }, 2000);
            } else {
                playSound('wrong');
                document.getElementById('digit0').classList.add('wrong');
                document.getElementById('digit1').classList.add('wrong');
                setTimeout(() => {
                    userDigits = ["?", "?"];
                    activeDigit = 1;
                    updateDisplay();
                }, 600);
            }
        }

        function toggleLangMenu() {
            const codes = ['ti', 'am', 'en', 'om', 'so'];
            const next = codes[(codes.indexOf(currentLang) + 1) % codes.length];
            currentLang = next;
            document.getElementById('langBtn').innerText = currentLang === 'ti' ? 'ትግርኛ' : next.toUpperCase();
            document.getElementById('btnCheck').innerText = i18n[currentLang].check;
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#9C27B0', '#00BCD4', '#FF4081', '#E91E63', '#FFFFFF'];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height + 20,
                    vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.8) * 45,
                    size: Math.random() * 10 + 5, color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0, rot: Math.random() * 360, rv: (Math.random() - 0.5) * 12
                });
            }
            if(!window.confettiActive) { window.confettiActive = true; animateConfetti(); }
        }

        function animateConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life > 0) {
                    alive = true; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.vx *= 0.98;
                    p.life -= 0.012; p.rot += p.rv;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                } else { particles.splice(i, 1); }
            }
            if(alive) requestAnimationFrame(animateConfetti);
            else window.confettiActive = false;
        }

        window.onload = loadProblem;
    </script>
</body>
</html>

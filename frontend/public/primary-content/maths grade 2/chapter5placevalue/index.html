<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place Value Architect | ዋጋ ዓድታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --h-color: #9333ea; /* Purple for 100s */
            --t-color: #0284c7; /* Blue for 10s */
            --o-color: #ea580c; /* Orange for 1s */
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.95);
            --success: #22c55e;
            --danger: #ef4444;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes float { 0% { transform: translate(0, 0); } 50% { transform: translate(10px, 15px); } 100% { transform: translate(0, 0); } }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(135deg, #bae6fd 0%, #fef3c7 50%, #f9a8d4 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #1e293b;
            position: relative;
        }

        /* Decorative "Stickers" */
        .sticker {
            position: fixed; font-size: 4rem; opacity: 0.2; pointer-events: none; z-index: 0;
            animation: float 6s infinite ease-in-out;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2000; }

        header {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .badges-container {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .score-pill {
            background: white; padding: 10px 25px; border-radius: 50px;
            font-weight: 800; font-size: 1.4rem; color: #6366f1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 4px solid #e0e7ff;
            display: flex; align-items: center; gap: 8px;
        }

        .high-score-pill {
            border-color: #fde68a;
            color: #d97706;
            font-size: 1.2rem;
            padding: 8px 20px;
        }

        .lang-select {
            padding: 10px 20px; border-radius: 20px; border: 3px solid #fff; font: inherit; font-weight: bold; cursor: pointer;
            background: rgba(255, 255, 255, 0.8); color: #6366f1; box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            outline: none;
        }

        .container {
            flex: 1; width: 100%; max-width: 950px; display: flex; flex-direction: column; 
            justify-content: flex-start; align-items: center; padding: 10px 20px; gap: 20px; z-index: 10;
        }

        .main-number-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 50px; padding: 40px; border: 10px solid white;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15); width: 100%;
            text-align: center; display: flex; flex-direction: column; gap: 20px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .main-number-card.wrong-flash {
            background-color: #fee2e2;
            border-color: #fca5a5;
        }

        @keyframes bounceIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .target-number { 
            font-size: 7rem; font-weight: 900; letter-spacing: 12px; color: #1e293b; 
            text-shadow: 6px 6px 0 rgba(0,0,0,0.05);
            margin: 10px 0;
            background: linear-gradient(to bottom, #1e293b, #475569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .instruction { font-size: 1.8rem; font-weight: 800; color: #64748b; }

        /* Place Value Grid */
        .pv-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; width: 100%;
            margin: 20px 0;
        }

        .pv-col { display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .pv-input {
            width: 100%; height: 110px; background: #f1f5f9; border: 8px dashed #cbd5e1;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 4rem; font-weight: 900; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer;
        }
        .pv-input.active { border-style: solid; transform: scale(1.1); background: white; }
        
        .h-input.active { border-color: var(--h-color); color: var(--h-color); box-shadow: 0 0 40px rgba(147, 51, 234, 0.3); }
        .t-input.active { border-color: var(--t-color); color: var(--t-color); box-shadow: 0 0 40px rgba(2, 132, 199, 0.3); }
        .o-input.active { border-color: var(--o-color); color: var(--o-color); box-shadow: 0 0 40px rgba(234, 88, 12, 0.3); }

        .pv-label { font-weight: 900; font-size: 1.3rem; color: #475569; text-transform: uppercase; background: #fff; padding: 5px 15px; border-radius: 12px; box-shadow: 0 4px 0 #e2e8f0; }

        /* Visual Building Area */
        .visual-building {
            width: 100%; height: 140px; display: flex; gap: 20px; margin-top: 15px;
        }
        .building-tower { 
            flex: 1; display: flex; flex-direction: column-reverse; align-items: center; gap: 6px; 
            padding: 15px; background: rgba(255,255,255,0.4); border-radius: 25px; min-height: 150px;
        }
        
        .block-h { width: 60px; height: 12px; background: linear-gradient(to right, #a855f7, var(--h-color)); border-radius: 4px; border: 2px solid white; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .block-t { width: 14px; height: 40px; background: linear-gradient(to bottom, #38bdf8, var(--t-color)); border-radius: 6px; border: 2px solid white; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .block-o { width: 22px; height: 22px; background: linear-gradient(135deg, #fb923c, var(--o-color)); border-radius: 6px; border: 2px solid white; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; width: 100%; max-width: 650px; margin-top: 20px; }
        .key {
            height: 80px; background: white; border: none; border-radius: 22px;
            font-size: 2.2rem; font-weight: 800; color: #475569; cursor: pointer;
            box-shadow: 0 8px 0 #e2e8f0; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 4px 0 #e2e8f0; }
        .key.del { background: #fff1f2; color: #ef4444; box-shadow: 0 8px 0 #fecdd3; }
        .key.check { 
            grid-column: span 5; background: linear-gradient(to bottom, #22c55e, #16a34a); color: white; 
            box-shadow: 0 8px 0 #14532d; font-size: 2.2rem; height: 90px; margin-top: 15px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .key.check:active { transform: translateY(6px); box-shadow: 0 2px 0 #14532d; }

        @keyframes shake { 0%,100% {transform:translateX(0);} 25% {transform:translateX(-15px);} 75% {transform:translateX(15px);} }
        .shake { animation: shake 0.4s ease-in-out; }

        /* Fullscreen Wrong Overlay */
        #wrong-mark {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2);
            display: none; align-items: center; justify-content: center;
            z-index: 1500; pointer-events: none;
        }
        #wrong-mark span { font-size: 20rem; color: white; text-shadow: 0 0 50px rgba(0,0,0,0.5); opacity: 0.8; }

        @media (max-width: 600px) {
            .target-number { font-size: 4rem; letter-spacing: 6px; }
            .pv-input { height: 80px; font-size: 2.8rem; }
            .pv-label { font-size: 0.9rem; padding: 5px 10px; }
            .key { height: 65px; font-size: 1.6rem; border-radius: 15px; }
            .instruction { font-size: 1.3rem; }
            .main-number-card { padding: 25px 15px; border-radius: 35px; border-width: 6px; }
            .building-tower { height: 120px; }
            .high-score-pill { font-size: 1rem; padding: 6px 12px; }
            .score-pill { font-size: 1.1rem; padding: 6px 15px; }
        }
    </style>
</head>
<body>
    <div class="sticker" style="top: 10%; left: 5%;">🎨</div>
    <div class="sticker" style="top: 15%; right: 10%; animation-delay: 1s;">🧩</div>
    <div class="sticker" style="bottom: 20%; left: 8%; animation-delay: 2s;">🎈</div>
    <div class="sticker" style="bottom: 15%; right: 5%; animation-delay: 3s;">🧸</div>

    <canvas id="confetti-canvas"></canvas>
    
    <div id="wrong-mark"><span>❌</span></div>

    <header>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
        <div class="badges-container">
            <div class="score-pill high-score-pill">🌟 <span id="highScoreVal">0</span></div>
            <div class="score-pill">🏆 <span id="scoreVal">0</span></div>
        </div>
    </header>

    <div class="container">
        <div class="main-number-card" id="gameCard">
            <p class="instruction" id="txtInstr">ነቲ ቑፅሪ ኣብ ዓድታቱ መቅሎ!</p>
            <div class="target-number" id="targetNum">810</div>
            
            <div class="pv-grid">
                <div class="pv-col">
                    <div class="pv-input h-input active" id="input-h" onclick="setFocus('h')">?</div>
                    <span class="pv-label" id="lbl-h">ዓዲ 100</span>
                    <div class="building-tower" id="tower-h"></div>
                </div>
                <div class="pv-col">
                    <div class="pv-input t-input" id="input-t" onclick="setFocus('t')">?</div>
                    <span class="pv-label" id="lbl-t">ዓዲ 10</span>
                    <div class="building-tower" id="tower-t"></div>
                </div>
                <div class="pv-col">
                    <div class="pv-input o-input" id="input-o" onclick="setFocus('o')">?</div>
                    <span class="pv-label" id="lbl-o">ዓዲ 1</span>
                    <div class="building-tower" id="tower-o"></div>
                </div>
            </div>

            <div class="keypad" id="kp">
                <!-- Keys 1-9, 0, Del -->
            </div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ኣረጋግፅ (Check)</button>
        </div>
    </div>

    <script>
        const i18n = {
            ti: { instr: "ነቲ ቑፅሪ ኣብ ዓድታቱ ኣቀምጥዎ!", h: "ዓዲ 100", t: "ዓዲ 10", o: "ዓዲ 1", check: "ኣረጋግፅ", win: "ንፉዕ!" },
            am: { instr: "ቁጥሩን በየቤቱ ከፋፍል!", h: "የመቶ ቤት", t: "የአስር ቤት", o: "የአንድ ቤት", check: "አረጋግጥ", win: "ድንቅ!" },
            en: { instr: "Break down the number into places!", h: "Hundreds", t: "Tens", o: "Ones", check: "Check", win: "Correct!" },
            om: { instr: "Lakkoofsa kana iddoo isaatti hiriirsi!", h: "Dhibba", t: "Kudhan", o: "Tokko", check: "Mirkaneessi", win: "Sirrii!" },
            so: { instr: "U qaybi tirada meelaha ay ku jirto!", h: "Boqol", t: "Toban", o: "Kow", check: "Hubi", win: "Sax!" }
        };

        let state = {
            lang: 'ti',
            score: 0,
            highScore: parseInt(localStorage.getItem('place_value_high_score')) || 0,
            target: 0,
            inputs: { h: "?", t: "?", o: "?" },
            focus: 'h',
            particles: []
        };

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(500, n); o.frequency.exponentialRampToValueAtTime(200, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046, 1318].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.7);
                o.start(); o.stop(n + 0.7);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function generate() {
            state.target = Math.floor(Math.random() * 900) + 100;
            state.inputs = { h: "?", t: "?", o: "?" };
            state.focus = 'h';
            
            document.getElementById('targetNum').innerText = state.target;
            updateUI();
            updateTowers();
        }

        function setFocus(f) {
            state.focus = f;
            sfx('tap');
            updateUI();
        }

        function pressKey(k) {
            sfx('tap');
            if(k === 'bk') {
                state.inputs[state.focus] = "?";
            } else {
                state.inputs[state.focus] = k;
                // Auto advance logic
                if(state.focus === 'h') state.focus = 't';
                else if(state.focus === 't') state.focus = 'o';
            }
            updateUI();
            updateTowers();
        }

        function updateUI() {
            const t = i18n[state.lang];
            document.getElementById('txtInstr').innerText = t.instr;
            document.getElementById('lbl-h').innerText = t.h;
            document.getElementById('lbl-t').innerText = t.t;
            document.getElementById('lbl-o').innerText = t.o;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('scoreVal').innerText = state.score;
            document.getElementById('highScoreVal').innerText = state.highScore;

            ['h', 't', 'o'].forEach(p => {
                const el = document.getElementById(`input-${p}`);
                el.innerText = state.inputs[p];
                el.classList.toggle('active', state.focus === p);
                el.style.borderColor = ''; // Reset error colors
            });
        }

        function updateTowers() {
            ['h', 't', 'o'].forEach(p => {
                const tower = document.getElementById(`tower-${p}`);
                tower.innerHTML = '';
                const val = state.inputs[p] === "?" ? 0 : parseInt(state.inputs[p]);
                for(let i=0; i<val; i++) {
                    const b = document.createElement('div');
                    b.className = `block-${p}`;
                    b.style.animation = `popIn 0.3s ${i * 0.05}s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards`;
                    tower.appendChild(b);
                }
            });
        }

        function checkAnswer() {
            const h = parseInt(state.target.toString()[0]);
            const t = parseInt(state.target.toString()[1]);
            const o = parseInt(state.target.toString()[2]);

            const userH = state.inputs.h === "?" ? -1 : parseInt(state.inputs.h);
            const userT = state.inputs.t === "?" ? -1 : parseInt(state.inputs.t);
            const userO = state.inputs.o === "?" ? -1 : parseInt(state.inputs.o);

            if(userH === h && userT === t && userO === o) {
                state.score += 10;
                
                if (state.score > state.highScore) {
                    state.highScore = state.score;
                    localStorage.setItem('place_value_high_score', state.highScore);
                }

                sfx('win');
                // LOTS OF CONFETTI
                burst(250); 
                setTimeout(() => burst(250), 300);
                setTimeout(() => burst(250), 600);
                
                setTimeout(generate, 2500);
            } else {
                sfx('err');
                const card = document.getElementById('gameCard');
                const mark = document.getElementById('wrong-mark');
                
                // NOTICABLE WRONG FEEDBACK
                card.classList.add('shake', 'wrong-flash');
                mark.style.display = 'flex';
                
                setTimeout(() => {
                    card.classList.remove('shake', 'wrong-flash');
                    mark.style.display = 'none';
                }, 800);

                // Highlight wrong inputs specifically
                if(userH !== h) document.getElementById('input-h').style.borderColor = '#ef4444';
                if(userT !== t) document.getElementById('input-t').style.borderColor = '#ef4444';
                if(userO !== o) document.getElementById('input-o').style.borderColor = '#ef4444';
                
                setTimeout(() => {
                    state.inputs = { h: "?", t: "?", o: "?" };
                    state.focus = 'h';
                    updateUI();
                    updateTowers();
                }, 1200);
            }
        }

        function changeLang(l) {
            state.lang = l;
            updateUI();
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#a855f7', '#0284c7', '#facc15', '#22c55e', '#ef4444', '#f472b6', '#ffffff'];
            for(let i=0; i<count; i++) state.particles.push({
                x: c.width/2, y: c.height/2,
                vx: (Math.random()-0.5)*40, vy: (Math.random()-0.6)*40,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 1.5, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=state.particles.length-1; i>=0; i--){
                    const p=state.particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.6; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else state.particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('kp');
            [1, 2, 3, 4, 5, 6, 7, 8, 9, 0].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key';
                b.innerText = k;
                b.onclick = () => pressKey(k);
                kp.appendChild(b);
            });
            const bDel = document.createElement('button');
            bDel.className = 'key del';
            bDel.innerText = '⌫';
            bDel.onclick = () => pressKey('bk');
            kp.appendChild(bDel);

            generate();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Equation Bridge | ድልድል ሕቶታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9C27B0;
            --secondary: #8CC63F;
            --accent: #F7931E;
            --danger: #ED1C24;
            --sky: #E1F5FE;
            --wood: #795548;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(180deg, #CE93D8 0%, #E1F5FE 40%, #B2FF59 40%, #7CB342 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
        }

        header {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .nav-group { display: flex; gap: 15px; align-items: center; }

        .score-pill {
            background: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; font-size: 1.4rem; color: var(--primary);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1); display: flex; align-items: center; gap: 8px;
        }

        .lang-select {
            padding: 10px 15px; border-radius: 20px; border: 2px solid white;
            font-family: inherit; font-weight: bold; cursor: pointer; outline: none;
            background: var(--primary); color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .container {
            flex: 1; width: 100%; max-width: 900px;
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; gap: 30px; z-index: 10;
        }

        .game-card {
            background: var(--card-bg); border-radius: 40px; padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1); border: 8px solid white;
            text-align: center; display: flex; flex-direction: column; gap: 30px;
            position: relative;
        }

        .instruction { font-size: 1.8rem; font-weight: 700; color: #555; }

        .equation-row {
            display: flex; justify-content: center; align-items: center;
            gap: 15px; font-size: 4rem; font-weight: 900; color: var(--primary);
        }

        .unknown-box {
            width: 100px; height: 100px; background: #f0f4f8;
            border: 6px dashed #ccc; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            color: var(--accent); transition: all 0.3s;
        }
        .unknown-box.filled { border-style: solid; border-color: var(--accent); background: white; }

        /* Bridge Visual */
        .bridge-container {
            width: 100%; height: 200px; background: rgba(0,0,0,0.03);
            border-radius: 30px; position: relative; overflow: hidden;
            display: flex; align-items: flex-end; padding-bottom: 40px;
        }

        .track {
            position: absolute; bottom: 40px; left: 5%; width: 90%; height: 8px;
            background: #cbd5e0; border-radius: 4px;
        }

        .block {
            position: absolute; bottom: 48px; height: 60px;
            border-radius: 10px; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 1.5rem;
        }

        .block.start { background: var(--primary); left: 5%; z-index: 2; }
        .block.gap { background: #eee; border: 4px dashed #ccc; z-index: 1; color: transparent; }
        .block.gap.correct { background: var(--accent); border-style: solid; border-color: white; color: white; opacity: 1; }
        .block.target { background: #4a5568; left: 95%; width: 40px; height: 80px; transform: translateX(-100%); z-index: 3; }
        .block.target::after { content: '🚩'; position: absolute; top: -40px; font-size: 2rem; }

        /* Character */
        .character {
            position: absolute; bottom: 108px; left: 5%; font-size: 3rem;
            transition: all 1s ease-in-out; z-index: 10;
        }

        /* Choice List */
        .choices {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 12px; max-width: 600px; margin: 0 auto;
        }

        .choice-btn {
            width: 70px; height: 70px; background: white; border: none;
            border-radius: 20px; font-size: 2rem; font-weight: 800;
            color: #444; cursor: pointer; box-shadow: 0 6px 0 #ddd;
            transition: all 0.1s;
        }
        .choice-btn:hover { transform: translateY(-3px); box-shadow: 0 9px 0 #ddd; }
        .choice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #ddd; }
        .choice-btn.wrong { background: #ffebee; color: var(--danger); box-shadow: 0 6px 0 #ffcdd2; animation: shake 0.4s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        @media (max-width: 600px) {
            .equation-row { font-size: 2.2rem; }
            .unknown-box { width: 60px; height: 60px; border-radius: 15px; }
            .choice-btn { width: 55px; height: 55px; font-size: 1.5rem; }
            .instruction { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="nav-group">
            <button class="lang-select" id="langBtn" onclick="toggleLangMenu()">ትግርኛ</button>
        </div>
        <div class="score-pill">🔥 <span id="streakVal">0</span></div>
    </header>

    <div class="container">
        <div class="game-card">
            <div class="instruction" id="txtInstr">ነቲ ዝጎደለ ቁፅሪ ብምምላእ ማዕረ ግበሮ!</div>
            
            <div class="equation-row">
                <span id="num1">13</span>
                <span>+</span>
                <div class="unknown-box" id="ansBox">?</div>
                <span>=</span>
                <span id="num3">19</span>
            </div>

            <div class="bridge-container">
                <div class="track"></div>
                <div class="character" id="char">🤖</div>
                <div class="block start" id="blockStart">13</div>
                <div class="block gap" id="blockGap">?</div>
                <div class="block target"></div>
            </div>

            <div class="choices" id="choiceContainer">
                <!-- Buttons 0-10 -->
            </div>
        </div>
    </div>

    <script>
        const i18n = {
            ti: { instr: "ነቲ ዝጎደለ ቁፅሪ ብምምላእ ማዕረ ግበሮ!", correct: "ንኡድ ስራሕ!", wrong: "ጌጋ እዩ! እንደገና ፈትን" },
            am: { instr: "የጎደለውን ቁጥር በመሙላት እኩል አድርገው!", correct: "ድንቅ ስራ!", wrong: "ተሳስተሃል! እንደገና ሞክር" },
            en: { instr: "Fill the gap to balance the equation!", correct: "Great Job!", wrong: "Try Again!" },
            om: { instr: "Lakkoofsa hir'ate guutuun qixxeessi!", correct: "Hojii Gaarii!", wrong: "Ammas yaali!" },
            so: { instr: "Buuxi meesha bannaan si aad isku dheellitirto isla'egta!", correct: "Shaqo Fiican!", wrong: "Mar kale isku day!" }
        };

        let currentLang = 'ti';
        let n1, n2, ans;
        let streak = 0;
        let particles = [];
        let busy = false;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            if (type === 'tap') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); osc.frequency.setValueAtTime(783, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.value = 150;
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
            osc.connect(gain); gain.connect(audioCtx.destination);
        }

        function generateProblem() {
            busy = false;
            // Equations like A + X = C, where C <= 20
            ans = Math.floor(Math.random() * 9) + 1; // X is 1-9
            n1 = Math.floor(Math.random() * 11) + 1; // A is 1-11
            const total = n1 + ans;

            document.getElementById('num1').innerText = n1;
            document.getElementById('num3').innerText = total;
            document.getElementById('ansBox').innerText = "?";
            document.getElementById('ansBox').classList.remove('filled');
            
            updateBridgeVisuals(n1, ans, total);
            renderChoices();
        }

        function updateBridgeVisuals(a, x, c) {
            const containerWidth = 90; // % of screen
            const unit = containerWidth / 20;

            const bStart = document.getElementById('blockStart');
            const bGap = document.getElementById('blockGap');
            const char = document.getElementById('char');

            bStart.style.width = (a * unit) + '%';
            bStart.innerText = a;

            bGap.style.left = (5 + a * unit) + '%';
            bGap.style.width = (x * unit) + '%';
            bGap.innerText = "?";
            bGap.classList.remove('correct');

            char.style.left = '5%';
            char.innerText = "🤖";
        }

        function renderChoices() {
            const container = document.getElementById('choiceContainer');
            container.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerText = i;
                btn.onclick = () => checkAnswer(i, btn);
                container.appendChild(btn);
            }
        }

        function checkAnswer(val, btn) {
            if (busy) return;

            if (val === ans) {
                busy = true;
                streak++;
                document.getElementById('streakVal').innerText = streak;
                playSound('correct');
                fireConfetti();
                
                document.getElementById('ansBox').innerText = ans;
                document.getElementById('ansBox').classList.add('filled');
                
                const bGap = document.getElementById('blockGap');
                bGap.innerText = ans;
                bGap.classList.add('correct');

                animateVictory();
                
                setTimeout(generateProblem, 3000);
            } else {
                playSound('wrong');
                btn.classList.add('wrong');
                setTimeout(() => btn.classList.remove('wrong'), 500);
            }
        }

        function animateVictory() {
            const char = document.getElementById('char');
            const targetPos = 5 + (n1 + ans) * (90/20);
            char.innerText = "🚀";
            char.style.left = (targetPos - 5) + '%';
        }

        function toggleLangMenu() {
            const codes = Object.keys(i18n);
            const next = codes[(codes.indexOf(currentLang) + 1) % codes.length];
            currentLang = next;
            document.getElementById('langBtn').innerText = currentLang === 'ti' ? 'ትግርኛ' : next.toUpperCase();
            document.getElementById('txtInstr').innerText = i18n[currentLang].instr;
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#9C27B0', '#8CC63F', '#F7931E', '#E1F5FE', '#FFFFFF'];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height + 20,
                    vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.8) * 45,
                    size: Math.random() * 10 + 5, color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0, rot: Math.random() * 360, rv: (Math.random() - 0.5) * 12
                });
            }
            if(!window.confettiActive) { window.confettiActive = true; animateConfetti(); }
        }

        function animateConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life > 0) {
                    alive = true; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.vx *= 0.98;
                    p.life -= 0.012; p.rot += p.rv;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                } else { particles.splice(i, 1); }
            }
            if(alive) requestAnimationFrame(animateConfetti);
            else window.confettiActive = false;
        }

        window.onload = generateProblem;
    </script>
</body>
</html>

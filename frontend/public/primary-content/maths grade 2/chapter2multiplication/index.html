<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplication Fun!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
body {
    font-family: 'Open Sans', sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #87CEEB, #4CAF50);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #333;
    overflow-x: hidden;
}

#confetti-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 2000;
}

.game-container {
    background-color: rgba(255, 255, 255, 0.95);
    border-radius: 25px;
    box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
    padding: 30px 20px;
    text-align: center;
    max-width: 800px;
    width: 95%;
    position: relative;
    overflow: hidden;
    z-index: 10;
}

h1 {
    font-family: 'Fredoka', cursive;
    font-weight: 700;
    font-size: 2.2rem;
    color: #007bff;
    margin-top: 0;
    margin-bottom: 20px;
    text-shadow: 2px 2px #a8d9ff;
    letter-spacing: 1px;
}

.problem-area {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 30px;
    gap: 10px;
}

.number-input-box {
    background-color: #e0f2f7;
    border: 2px solid #a8d9ff;
    border-radius: 12px;
    padding: 10px;
    min-width: 60px;
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Fredoka', cursive;
    font-weight: 700;
    font-size: 2rem;
    color: #333;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1);
}

.number-input-box.answer-box {
    background-color: #fffacd;
    border-color: #ffd700;
}

.problem-area input[type="number"] {
    width: 100%;
    background: none;
    border: none;
    text-align: center;
    font-family: 'Fredoka', cursive;
    font-weight: 700;
    font-size: 1em;
    color: #333;
    outline: none;
    padding: 0;
}

.operator {
    font-family: 'Fredoka', cursive;
    font-weight: 700;
    font-size: 2rem;
    color: #ff6f91;
}

.visual-counters {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    min-height: 100px;
    flex-wrap: wrap;
}

.counter-group {
    display: grid;
    gap: 6px;
    padding: 10px;
    border-radius: 15px;
    background-color: rgba(0, 0, 0, 0.03);
}

.counter-dot {
    width: 30px;
    height: 30px;
    background: linear-gradient(135deg, #7cb342, #558b2f);
    border-radius: 50%;
    border: 2px solid #33691e;
    box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3);
}

.feedback-message {
    font-size: 1.5rem;
    font-weight: bold;
    margin-top: 15px;
    min-height: 1.8rem;
    color: #555;
}

.game-controls {
    margin-top: 20px;
    display: flex;
    justify-content: center;
}

.control-btn {
    background-color: #007bff;
    color: white;
    padding: 15px 40px;
    border: none;
    border-radius: 15px;
    font-family: 'Fredoka', cursive;
    font-weight: 700;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 6px 0 #0056b3;
    transition: all 0.1s;
}

.control-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #0056b3;
}

.celebration-img {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60%;
    max-width: 250px;
    pointer-events: none;
    z-index: 10;
    display: none;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-10px); }
    40%, 80% { transform: translateX(10px); }
}

.game-container.shake {
    animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

#languageSelect {
    padding: 8px 12px;
    border-radius: 12px;
    border: 2px solid #007bff;
    background: #ffffff;
    font-family: inherit;
    font-weight: bold;
    cursor: pointer;
}

/* Mobile Specific Adjustments */
@media (max-width: 600px) {
    h1 { font-size: 1.6rem; }
    .number-input-box { width: 50px; height: 50px; font-size: 1.5rem; }
    .operator { font-size: 1.5rem; }
    .counter-dot { width: 22px; height: 22px; }
    .feedback-message { font-size: 1.2rem; }
    .control-btn { font-size: 1.1rem; padding: 12px 30px; }
}
</style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div class="game-container">
        <div style="text-align: right; margin-bottom: 15px;">
            <select id="languageSelect">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Afan Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
        <h1 id="titleText">ምብዛሕ</h1>

        <div class="problem-area">
            <div class="number-input-box">
                <span id="factor1Display">?</span>
            </div>
            <span class="operator">×</span>
            <div class="number-input-box">
                <span id="factor2Display">?</span>
            </div>
            <span class="operator">=</span>
            <div class="number-input-box answer-box">
                <input type="number" id="answerInput" placeholder="?" min="0" inputmode="numeric">
            </div>
        </div>

        <div id="visualGroup1" class="counter-group"></div>

        <p id="feedback" class="feedback-message"></p>

        <div class="game-controls">
            <button id="checkBtn" class="control-btn">ፈትን</button>
        </div>
        
        <img id="celebrationImg" src="assets/clap.gif" alt="Celebration!" class="celebration-img">
    </div>

    <script>
        const factor1Display = document.getElementById('factor1Display');
        const factor2Display = document.getElementById('factor2Display');
        const answerInput = document.getElementById('answerInput');
        const visualGroup1 = document.getElementById('visualGroup1');
        const feedbackP = document.getElementById('feedback');
        const checkBtn = document.getElementById('checkBtn');
        const gameContainer = document.querySelector('.game-container'); 
        const celebrationImg = document.getElementById('celebrationImg'); 
        const titleText = document.getElementById('titleText');
        const languageSelect = document.getElementById('languageSelect');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        const translations = {
            ti: { title: 'ምብዛሕ', check: 'ፈትን', enterNumber: 'ቁጽሪ ኣእትው!', correct: 'ጽቡቕ ስራሕ!', tryAgain: 'ጌጋ እዩ እንደገና ፈትን!' },
            am: { title: 'ማባዛት', check: 'አረጋግጥ', enterNumber: 'እባክህ ቁጥር አስገባ!', correct: 'ትክክል ነው!', tryAgain: 'ተሳስተሃል እንደገና ሞክር!' },
            en: { title: 'Multiplication', check: 'Check', enterNumber: 'Please enter a number!', correct: 'Correct! Great job!', tryAgain: 'Oops! Try again!' },
            om: { title: 'Baayʼina', check: 'Mirkaneessi', enterNumber: 'Mee lakkoofsa galchi!', correct: 'Sirriidha!', tryAgain: 'Dogoggora! Ammas yaali!' },
            so: { title: 'Isku-darid', check: 'Hubi', enterNumber: 'Fadlan tiro geli!', correct: 'Sax baa tahay!', tryAgain: 'Khalad! Mar kale isku day!' }
        };

        let currentFactor1, currentFactor2, correctAnswer;
        let currentLanguage = 'ti';
        let isProcessing = false;
        let particles = [];

        // Web Audio API Synth Sounds
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;

            if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.exponentialRampToValueAtTime(880, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, now);
                osc.frequency.linearRampToValueAtTime(100, now + 0.4);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
            osc.connect(gain); gain.connect(audioCtx.destination);
        }

        // --- Confetti Logic ---
        function fireConfetti(count = 150) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#FFD93D', '#6BCB77', '#FF6B6B', '#4D96FF', '#ffffff', '#FF5F7E', '#007bff'];
            
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height + 20,
                    vx: (Math.random() - 0.5) * 25,
                    vy: (Math.random() - 0.8) * 35,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0,
                    rotation: Math.random() * 360,
                    rVel: (Math.random() - 0.5) * 10
                });
            }

            if(!window.confettiRunning) {
                window.confettiRunning = true;
                animateConfetti();
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life > 0) {
                    alive = true;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.6; // gravity
                    p.vx *= 0.99;
                    p.life -= 0.01;
                    p.rotation += p.rVel;
                    
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                } else {
                    particles.splice(i, 1);
                }
            }
            if(alive) requestAnimationFrame(animateConfetti);
            else {
                window.confettiRunning = false;
                particles = [];
            }
        }

        function applyLanguage(lang) {
            const t = translations[lang] || translations['ti'];
            titleText.textContent = t.title;
            checkBtn.textContent = t.check;
        }

        function generateProblem() {
            isProcessing = false;
            currentFactor1 = Math.floor(Math.random() * 5) + 1; 
            currentFactor2 = Math.floor(Math.random() * 5) + 1; 
            correctAnswer = currentFactor1 * currentFactor2;

            factor1Display.textContent = currentFactor1;
            factor2Display.textContent = currentFactor2;
            answerInput.value = '';
            feedbackP.textContent = '';
            feedbackP.style.color = 'inherit';

            visualGroup1.innerHTML = '';
            visualGroup1.style.display = 'grid';
            visualGroup1.style.gridTemplateColumns = `repeat(${currentFactor2}, 1fr)`;
            visualGroup1.style.justifyContent = 'center';
            visualGroup1.style.margin = '0 auto';
            visualGroup1.style.width = 'max-content';

            for (let i = 0; i < correctAnswer; i++) {
                const dot = document.createElement('div');
                dot.classList.add('counter-dot');
                visualGroup1.appendChild(dot);
            }

            celebrationImg.style.display = 'none';
            gameContainer.classList.remove('shake');
            answerInput.focus();
        }

        function checkAnswer() {
            if (isProcessing) return;
            const userAnswer = parseInt(answerInput.value);
            const t = translations[currentLanguage] || translations['ti'];

            if (isNaN(userAnswer)) {
                feedbackP.textContent = t.enterNumber;
                feedbackP.style.color = 'orange';
                return;
            }

            if (userAnswer === correctAnswer) {
                isProcessing = true;
                feedbackP.textContent = t.correct;
                feedbackP.style.color = '#4CAF50';
                playSound('success');
                fireConfetti(300); // Massive confetti burst
                celebrationImg.style.display = 'block'; 
                
                setTimeout(() => {
                    generateProblem();
                }, 2000); 
            } else {
                feedbackP.textContent = t.tryAgain;
                feedbackP.style.color = '#f44336';
                playSound('wrong');
                gameContainer.classList.add('shake');
                setTimeout(() => gameContainer.classList.remove('shake'), 500);
            }
        }

        checkBtn.addEventListener('click', checkAnswer);
        languageSelect.addEventListener('change', function() {
            currentLanguage = languageSelect.value;
            applyLanguage(currentLanguage);
        });
        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAnswer();
        });

        window.onload = () => {
            applyLanguage(currentLanguage);
            generateProblem();
        };
    </script>
</body>
</html>

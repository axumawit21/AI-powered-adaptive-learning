<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertical Addition | ምድማር (ብምስጋር)</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --grad-primary: linear-gradient(135deg, #6366F1 0%, #A855F7 100%);
            --grad-secondary: linear-gradient(135deg, #10B981 0%, #3B82F6 100%);
            --grad-accent: linear-gradient(135deg, #F472B6 0%, #FB923C 100%);
            --grad-danger: linear-gradient(135deg, #F43F5E 0%, #FB7185 100%);
            --grad-carry: linear-gradient(135deg, #FDE047 0%, #FACC15 100%);
            --text: #1E293B;
            --bg-mesh: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                       radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                       radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
        }

        * {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: #EEF2FF;
            background-image: 
                radial-gradient(at 0% 0%, #C7D2FE 0px, transparent 50%),
                radial-gradient(at 100% 0%, #FBCFE8 0px, transparent 50%),
                radial-gradient(at 100% 100%, #CCFBF1 0px, transparent 50%),
                radial-gradient(at 0% 100%, #Fef3c7 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        #confetti-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 2000;
        }

        header {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100;
        }

        .lang-select {
            padding: 10px 20px; border-radius: 20px; border: none;
            font-family: inherit; font-weight: bold; cursor: pointer; outline: none;
            background: var(--grad-primary); color: white; 
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }

        .score-pill {
            background: white; padding: 10px 25px; border-radius: 50px;
            font-weight: 800; font-size: 1.4rem; color: #6366F1;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 8px;
            border: 2px solid #E0E7FF;
        }

        .container {
            flex: 1; width: 100%; max-width: 800px;
            display: flex; flex-direction: column; justify-content: center;
            padding: 20px; gap: 30px; z-index: 10;
        }

        .math-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 50px; padding: 50px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1); 
            border: 10px solid white;
            display: flex; flex-direction: column; align-items: center;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes bounceIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .vertical-math {
            display: inline-flex; flex-direction: column; align-items: flex-end;
            font-size: 7rem; font-weight: 900; color: var(--text);
            line-height: 1; position: relative; padding: 0 20px;
        }

        /* Carry box with gradient */
        .carry-row { display: flex; justify-content: flex-end; width: 100%; margin-bottom: 10px; padding-right: 25px; }
        .carry-box {
            width: 60px; height: 60px; border: 4px dashed #CBD5E1; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; color: #B45309; cursor: pointer; background: #FFFBEB;
            transition: all 0.3s;
        }
        .carry-box.active { 
            border: 4px solid #FACC15;
            background: var(--grad-carry);
            color: white;
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.5);
            transform: scale(1.1);
        }

        .num-top { margin-bottom: 10px; letter-spacing: 20px; text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
        .num-bottom { margin-bottom: 25px; letter-spacing: 20px; position: relative; text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
        .plus-sign { position: absolute; left: -90px; top: 0; color: #F43F5E; font-size: 6rem; }
        
        .line { width: 140%; height: 12px; background: #334155; margin-bottom: 25px; border-radius: 10px; }

        .answer-row { display: flex; gap: 15px; justify-content: flex-end; width: 100%; }
        
        .digit-input {
            width: 100px; height: 130px; background: #F8FAFC;
            border: 5px solid #E2E8F0; border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; font-weight: 900; color: #6366F1;
            cursor: pointer; transition: all 0.2s;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }
        .digit-input.active { 
            border: 5px solid #6366F1;
            background: white; 
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
            transform: scale(1.08);
            color: #4F46E5;
        }
        .digit-input.wrong { border-color: #F43F5E; background: #FFF1F2; color: #E11D48; animation: shake 0.4s; }
        .digit-input.hidden { display: none; }

        /* Keypad Styles */
        .keypad-section { width: 100%; display: flex; flex-direction: column; gap: 20px; }

        .check-btn {
            width: 100%; padding: 22px; border-radius: 30px; border: none;
            background: var(--grad-secondary); color: white; font-size: 2.2rem;
            font-weight: 800; cursor: pointer; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
            transition: all 0.2s;
        }
        .check-btn:active { transform: translateY(5px); box-shadow: 0 4px 10px rgba(16, 185, 129, 0.4); }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .key {
            height: 80px; background: white; border: none; border-radius: 20px;
            font-size: 2.2rem; font-weight: 800; color: #475569; cursor: pointer;
            box-shadow: 0 8px 0 #E2E8F0; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 #E2E8F0; }
        
        /* Colorful keys */
        .key:nth-child(1), .key:nth-child(5), .key:nth-child(9) { background: #EEF2FF; color: #6366F1; }
        .key:nth-child(2), .key:nth-child(6), .key:nth-child(10) { background: #ECFDF5; color: #10B981; }
        .key:nth-child(3), .key:nth-child(7), .key:nth-child(11) { background: #FFFBEB; color: #F59E0B; }
        .key.del { background: #FFF1F2; color: #F43F5E; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px); } 75% { transform: translateX(12px); } }

        @media (max-width: 600px) {
            .vertical-math { font-size: 4rem; }
            .num-top, .num-bottom { letter-spacing: 10px; }
            .plus-sign { font-size: 3.5rem; left: -60px; }
            .digit-input { width: 70px; height: 100px; font-size: 3rem; }
            .carry-box { width: 45px; height: 45px; font-size: 1.8rem; }
            .check-btn { font-size: 1.8rem; }
            .key { height: 65px; font-size: 1.8rem; }
            .math-card { padding: 40px 20px; border-radius: 35px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="nav-group">
            <button class="lang-select" id="langBtn" onclick="toggleLangMenu()">ትግርኛ</button>
        </div>
        <div class="score-pill">🌟 <span id="scoreVal">0</span></div>
    </header>

    <div class="container">
        <div class="math-card">
            <div class="vertical-math">
                <div class="carry-row">
                    <div class="carry-box" id="carry0" onclick="setActive('carry')">?</div>
                </div>
                <div class="num-top" id="topNum">48</div>
                <div class="num-bottom">
                    <span class="plus-sign">+</span>
                    <span id="bottomNum">35</span>
                </div>
                <div class="line"></div>
                <div class="answer-row">
                    <div class="digit-input" id="digit2" onclick="setActive(2)">?</div>
                    <div class="digit-input" id="digit1" onclick="setActive(1)">?</div>
                    <div class="digit-input" id="digit0" onclick="setActive(0)">?</div>
                </div>
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad">
                <button class="key" onclick="pressNum(1)">1</button>
                <button class="key" onclick="pressNum(2)">2</button>
                <button class="key" onclick="pressNum(3)">3</button>
                <button class="key del" onclick="pressNum('back')">⌫</button>
                <button class="key" onclick="pressNum(4)">4</button>
                <button class="key" onclick="pressNum(5)">5</button>
                <button class="key" onclick="pressNum(6)">6</button>
                <button class="key" onclick="pressNum(0)">0</button>
                <button class="key" onclick="pressNum(7)">7</button>
                <button class="key" onclick="pressNum(8)">8</button>
                <button class="key" onclick="pressNum(9)">9</button>
            </div>
            <button class="check-btn" id="btnCheck" onclick="checkAnswer()">ፈትሽ</button>
        </div>
    </div>

    <script>
        const i18n = {
            ti: { check: "ፈትሽ", congrats: "ንኡድ ስራሕ!", next: "ቀጻሊ" },
            am: { check: "አረጋግጥ", congrats: "ድንቅ ስራ!", next: "ቀጣይ" },
            en: { check: "Check", congrats: "Great Job!", next: "Next" },
            om: { check: "Mirkaneessi", congrats: "Hojii Gaarii!", next: "Itti fufi" },
            so: { check: "Hubi", congrats: "Shaqo Fiican!", next: "Xiga" }
        };

        const PROBLEMS = [
            [48, 35], [76, 29], [65, 38], [57, 14], [95, 15], 
            [88, 13], [34, 47], [59, 26], [72, 19], [44, 48],
            [125, 85], [176, 44], [99, 11], [55, 55], [89, 22]
        ];

        let currentIdx = 0;
        let score = 0;
        let activeElement = 0; // 0=Units, 'carry', 1=Tens, 2=Hundreds
        let userDigits = ["?", "?", "?"]; // index 0=Units, 1=Tens, 2=Hundreds
        let userCarry = "?";
        let currentLang = 'ti';
        let particles = [];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;
            if (type === 'tap') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(); osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.1); osc.frequency.setValueAtTime(783, now + 0.2);
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(); osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth'; osc.frequency.value = 150;
                gain.gain.setValueAtTime(0.1, now); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(); osc.stop(now + 0.3);
            }
            osc.connect(gain); gain.connect(audioCtx.destination);
        }

        function loadProblem() {
            const [n1, n2] = PROBLEMS[currentIdx];
            document.getElementById('topNum').innerText = n1;
            document.getElementById('bottomNum').innerText = n2;
            
            userDigits = ["?", "?", "?"];
            userCarry = "?";
            activeElement = 0; // Start at Units (rightmost)
            
            const sum = n1 + n2;
            if (sum < 100) {
                document.getElementById('digit2').classList.add('hidden');
            } else {
                document.getElementById('digit2').classList.remove('hidden');
            }

            updateDisplay();
            document.getElementById('btnCheck').innerText = i18n[currentLang].check;
        }

        function updateDisplay() {
            document.getElementById('digit0').innerText = userDigits[0];
            document.getElementById('digit1').innerText = userDigits[1];
            document.getElementById('digit2').innerText = userDigits[2];
            document.getElementById('carry0').innerText = userCarry;

            document.getElementById('digit0').classList.toggle('active', activeElement === 0);
            document.getElementById('carry0').classList.toggle('active', activeElement === 'carry');
            document.getElementById('digit1').classList.toggle('active', activeElement === 1);
            document.getElementById('digit2').classList.toggle('active', activeElement === 2);

            document.getElementById('digit0').classList.remove('wrong');
            document.getElementById('digit1').classList.remove('wrong');
            document.getElementById('digit2').classList.remove('wrong');
        }

        function setActive(d) {
            activeElement = d;
            playSound('tap');
            updateDisplay();
        }

        function pressNum(n) {
            playSound('tap');
            if (n === 'back') {
                if (activeElement === 'carry') {
                    userCarry = "?";
                    activeElement = 0; // Go back to Units
                }
                else if (activeElement === 0) {
                    userDigits[0] = "?";
                }
                else if (activeElement === 1) {
                    userDigits[1] = "?";
                    activeElement = 'carry'; // Go back to Carry
                }
                else if (activeElement === 2) {
                    userDigits[2] = "?";
                    activeElement = 1; // Go back to Tens
                }
            } else {
                if (activeElement === 0) {
                    userDigits[0] = n;
                    activeElement = 'carry'; // Advance to Carry (remainder)
                } 
                else if (activeElement === 'carry') {
                    userCarry = n;
                    activeElement = 1; // Advance to Tens
                }
                else if (activeElement === 1) {
                    userDigits[1] = n;
                    if (!document.getElementById('digit2').classList.contains('hidden')) {
                        activeElement = 2; // Advance to Hundreds
                    }
                }
                else if (activeElement === 2) {
                    userDigits[2] = n;
                }
            }
            updateDisplay();
        }

        function checkAnswer() {
            const [n1, n2] = PROBLEMS[currentIdx];
            const correctAns = n1 + n2;
            
            const h = userDigits[2] === "?" ? 0 : parseInt(userDigits[2]);
            const t = userDigits[1] === "?" ? 0 : parseInt(userDigits[1]);
            const u = userDigits[0] === "?" ? 0 : parseInt(userDigits[0]);
            const userAns = (h * 100) + (t * 10) + u;

            if (userAns === correctAns) {
                score += 10;
                document.getElementById('scoreVal').innerText = score;
                playSound('correct');
                fireConfetti();
                
                setTimeout(() => {
                    currentIdx = (currentIdx + 1) % PROBLEMS.length;
                    loadProblem();
                }, 2000);
            } else {
                playSound('wrong');
                document.getElementById('digit0').classList.add('wrong');
                document.getElementById('digit1').classList.add('wrong');
                document.getElementById('digit2').classList.add('wrong');
                setTimeout(() => {
                    userDigits = ["?", "?", "?"];
                    userCarry = "?";
                    activeElement = 0; // Reset focus to Units
                    updateDisplay();
                }, 600);
            }
        }

        function toggleLangMenu() {
            const codes = ['ti', 'am', 'en', 'om', 'so'];
            const next = codes[(codes.indexOf(currentLang) + 1) % codes.length];
            currentLang = next;
            document.getElementById('langBtn').innerText = currentLang === 'ti' ? 'ትግርኛ' : next.toUpperCase();
            document.getElementById('btnCheck').innerText = i18n[currentLang].check;
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#6366F1', '#10B981', '#F472B6', '#FBBF24', '#FFFFFF'];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: canvas.width / 2, y: canvas.height + 20,
                    vx: (Math.random() - 0.5) * 30, vy: (Math.random() - 0.8) * 45,
                    size: Math.random() * 10 + 5, color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0, rot: Math.random() * 360, rv: (Math.random() - 0.5) * 12
                });
            }
            if(!window.confettiActive) { window.confettiActive = true; animateConfetti(); }
        }

        function animateConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life > 0) {
                    alive = true; p.x += p.vx; p.y += p.vy; p.vy += 0.8; p.vx *= 0.98;
                    p.life -= 0.012; p.rot += p.rv;
                    ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
                } else { particles.splice(i, 1); }
            }
            if(alive) requestAnimationFrame(animateConfetti);
            else window.confettiActive = false;
        }

        window.onload = loadProblem;
    </script>
</body>
</html>

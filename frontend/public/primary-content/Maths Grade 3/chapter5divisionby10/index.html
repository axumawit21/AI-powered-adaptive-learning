
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Submarine Division - ሓዱሽ ምስጢር ምምቃል</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0c4a6e;
            --ocean-light: #0ea5e9;
            --bubble-glow: #38bdf8;
            --primary: #f43f5e;
            --secondary: #fbbf24;
            --success: #22c55e;
            --text-light: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(180deg, #0ea5e9 0%, #0c4a6e 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Ocean Background --- */
        .ocean-decor { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
        .bubble { position: absolute; background: rgba(255, 255, 255, 0.2); border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); animation: float var(--d) infinite linear; }
        @keyframes float { 
            0% { transform: translateY(110vh) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(12, 74, 110, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 4px solid var(--ocean-light);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--primary); color: white; width: 50px; height: 50px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem; border: 3px solid white;
            box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4); transform: rotate(-5deg);
        }

        h1 { margin: 0; color: white; font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--ocean-light);
            height: 40px; background: white; border-radius: 20px;
            width: 160px; border: 2px solid var(--ocean-light);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 15px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #f0f9ff; color: var(--ocean-light); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 800px;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 25px;
        }

        .score-board { display: flex; gap: 20px; }
        .score-pill {
            background: rgba(255, 255, 255, 0.1); padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: white;
            border: 2px solid var(--ocean-light);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.1rem; backdrop-filter: blur(5px);
        }

        /* --- Division Stage --- */
        .div-card {
            background: var(--glass); padding: 40px; border-radius: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 100%; display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        .instruction { font-size: 1.5rem; font-weight: 800; color: var(--secondary); margin-bottom: 25px; text-align: center; }

        .equation-layout {
            display: flex; align-items: center; gap: 20px;
            font-size: 4rem; font-weight: 900; color: white;
            margin-bottom: 30px; flex-wrap: wrap; justify-content: center;
        }

        .bubble-number {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), var(--bubble-glow));
            color: var(--deep-blue); width: 220px; height: 180px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50% 50% 45% 45%; border: 4px solid white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2), inset -5px -5px 15px rgba(0,0,0,0.1);
            position: relative; animation: wobble 3s infinite ease-in-out;
        }
        @keyframes wobble { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .zero-digit { color: var(--primary); display: inline-block; transition: all 0.5s; }
        .zero-popped { transform: scale(3); opacity: 0; filter: blur(5px); }

        .divisor-tag {
            background: var(--primary); color: white; padding: 10px 25px;
            border-radius: 15px; font-size: 2.5rem; border: 4px solid white;
            box-shadow: 0 8px 0 #9f1239;
        }

        /* --- Input Area --- */
        .input-wrap { display: flex; align-items: center; gap: 15px; margin-top: 10px; }
        input[type="number"] {
            width: 180px; height: 90px; font-size: 3.5rem; text-align: center;
            border: 5px solid white; background: rgba(255,255,255,0.95);
            border-radius: 25px; color: var(--deep-blue); font-weight: 900; outline: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input:focus { border-color: var(--secondary); transform: scale(1.05); }

        .btn-action {
            width: 100%; max-width: 400px; padding: 20px; border-radius: 40px;
            font-size: 1.8rem; font-weight: 900; color: white;
            border: none; cursor: pointer; margin-top: 15px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.2);
        }
        .btn-check { background: var(--success); box-shadow: 0 10px 0 #15803d; }
        .btn-check:active { transform: translateY(4px); box-shadow: none; }

        /* --- Reactions --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(12, 74, 110, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(15px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 10px solid var(--ocean-light);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 20px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--deep-blue); margin-bottom: 15px; }
        .modal-body { font-size: 1.4rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--ocean-light); color: white; border: none;
            padding: 18px 50px; border-radius: 40px; font-weight: 900;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 8px 0 #0369a1;
        }
        .btn-modal:active { transform: translateY(4px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 600px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.2rem; }
            .equation-layout { font-size: 2.5rem; }
            .bubble-number { width: 140px; height: 120px; font-size: 2.2rem; }
            .divisor-tag { font-size: 1.6rem; padding: 8px 15px; }
            input[type="number"] { width: 120px; height: 70px; font-size: 2.5rem; }
            .btn-action { font-size: 1.4rem; padding: 15px; }
            .instruction { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="ocean-decor" id="ocean-decor"></div>
<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Submarine Division</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="div-card">
        <div class="instruction" id="lbl-instr">Pop the trailing zero!</div>

        <div class="equation-layout">
            <div class="bubble-number" id="bubble-dividend">
                <span id="digit-base">45</span><span id="digit-zero" class="zero-digit">0</span>
            </div>
            <div style="font-size: 3rem">÷</div>
            <div class="divisor-tag">10</div>
            <div style="font-size: 3rem">=</div>
        </div>

        <div class="input-wrap">
            <input type="number" id="user-ans" placeholder="?" inputmode="numeric">
        </div>
        
        <button class="btn-action btn-check" onclick="checkAnswer()" id="btn-check">Check ✔️</button>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🫧💎</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ዜሮ ኣጥፊእካዮ።</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--primary);">
        <span class="modal-icon">🛑</span>
        <div class="modal-title" id="fail-title">እንደገና ፈትን!</div>
        <div class="modal-body" id="fail-body">መልሲ ጌጋ እዩ። ንዜሮ ንምጥፋእ ሕሰብ።</div>
        <button class="btn-modal" onclick="closeFail()" id="btn-retry" style="background:var(--primary); box-shadow: 0 8px 0 #9f1239;">እንደገና ፈትን 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ምምቃል ብ 10", record: "ዝለዓለ", score: "ነጥቢ", instr: "ነቲ ኣብ መወዳእታ ዘሎ ዜሮ ኣጥፍእ!",
            check: "ፈትሽ ✔️", win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ዜሮ ኣጥፊእካዮ።",
            fail: "እንደገና ፈትን!", failSub: "መልሲ ጌጋ እዩ። ንዜሮ ብምጥፋእ ሕሰብ።",
            next: "ቀፃሊ ➡", retry: "እንደገና ፈትን 🔄"
        },
        am: {
            title: "በ 10 ማካፈል", record: "ከፍተኛ", score: "ውጤት", instr: "መጨረሻ ላይ ያለውን ዜሮ አጥፉ!",
            check: "ፈትሽ ✔️", win: "ትክክል!", winSub: "በጣም ጎበዝ! ዜሮውን አጥፍተሃል።",
            fail: "እንደገና ይሞክሩ!", failSub: "መልሱ ልክ አይደለም። ዜሮውን በማጥፋት አስቡ።",
            next: "ቀጣይ ➡", retry: "እንደገና ሞክር 🔄"
        },
        en: {
            title: "Division by 10", record: "Record", score: "Score", instr: "Pop the trailing zero!",
            check: "Check ✔️", win: "Correct!", winSub: "Excellent! You popped the zero.",
            fail: "Try Again!", failSub: "Oops! Just remove the last zero to divide by 10.",
            next: "Next Level ➡", retry: "Try Again 🔄"
        },
        om: {
            title: "10'n Hiru", record: "Rikardii", score: "Qabxii", instr: "Zeeroo dhumaa balleessi!",
            check: "Mirkaneessi ✔️", win: "Sirrii!", winSub: "Baay'ee gaariidha! Zeeroo balleessiteetta.",
            fail: "Irra deebi'ii yaali!", failSub: "Deebiin dogoggora. Zeeroo balleessuun hiri.",
            next: "Itti Aanu ➡", retry: "Irra deebi'ii 🔄"
        },
        so: {
            title: "Qaybinta 10", record: "Rikoodh", score: "Dhibco", instr: "Tirada eberka ah ka saar!",
            check: "Hubi ✔️", win: "Sax!", winSub: "Aad u fiican! Eberkii waad ka saartay.",
            fail: "Khalad!", failSub: "Isku day mar kale. Eberka uun ka saar.",
            next: "Xiga ➡", retry: "Mar kale isku day 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('submarineDivHigh_V1') || 0;
    let dividend, expectedAns;
    let isConfettiActive = false;

    function init() {
        createDecorBubbles();
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function createDecorBubbles() {
        const container = document.getElementById('ocean-decor');
        for(let i=0; i<20; i++) {
            const b = document.createElement('div');
            b.className = 'bubble';
            const size = Math.random() * 40 + 10;
            b.style.width = size + 'px';
            b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.setProperty('--d', (Math.random() * 10 + 5) + 's');
            b.style.animationDelay = (Math.random() * 10) + 's';
            container.appendChild(b);
        }
    }

    function generateProblem() {
        document.getElementById('digit-zero').classList.remove('zero-popped');
        
        // Multiples of 10 up to 10,000 for Grade 5
        let base = Math.floor(Math.random() * 950) + 5; 
        expectedAns = base;
        dividend = base * 10;

        document.getElementById('digit-base').textContent = base;
        document.getElementById('user-ans').value = '';
        document.getElementById('user-ans').focus();
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('user-ans').value);
        if (isNaN(userAns)) return;

        if (userAns === expectedAns) {
            score += 20;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('submarineDivHigh_V1', highScore);
            }
            updateScoreUI();
            
            // Animation
            document.getElementById('digit-zero').classList.add('zero-popped');
            playSound('pop');
            
            setTimeout(() => {
                startConfetti();
                playSound('win');
                document.getElementById('overlay-win').classList.add('show');
            }, 600);
        } else {
            playSound('fail');
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function closeFail() {
        document.getElementById('overlay-fail').classList.remove('show');
    }

    function nextLevel() {
        stopConfetti();
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-instr').textContent = t.instr;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('btn-retry').textContent = t.retry;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, t); osc.frequency.exponentialRampToValueAtTime(880, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else if (type === 'pop') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, t); osc.frequency.exponentialRampToValueAtTime(100, t + 0.1);
            gain.gain.setValueAtTime(0.15, t); gain.gain.linearRampToValueAtTime(0, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    // --- Confetti ---
    let pieces = [];
    function startConfetti() {
        isConfettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pieces = [];
        for(let i=0; i<150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 3,
                color: `hsl(${Math.random()*360}, 100%, 70%)`,
                size: Math.random() * 8 + 4
            });
        }
        function anim() {
            if (!isConfettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y > canvas.height) p.y = -20;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }
    function stopConfetti() {
        isConfettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    window.onload = init;
</script>
</body>
</html>

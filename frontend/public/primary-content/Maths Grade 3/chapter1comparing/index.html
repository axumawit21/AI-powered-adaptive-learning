
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gator Chomp! - Swamp Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #a2d2ff;
            --water-blue: #0077b6;
            --gator-green: #2d6a4f;
            --lily-green: #74c69d;
            --accent-yellow: #ffea00;
            --pink: #ff85a1;
            --text-dark: #1b4332;
            --card-shadow: 0 12px 24px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, #caf0f8 60%, var(--water-blue) 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        /* --- Background Elements --- */
        .cloud {
            position: absolute; background: white; border-radius: 50px;
            opacity: 0.8; animation: moveClouds 40s linear infinite;
            z-index: 1;
        }
        .cloud::after, .cloud::before {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        .cloud-1 { width: 120px; height: 50px; top: 15%; left: -150px; }
        .cloud-1::after { width: 60px; height: 60px; top: -25px; left: 20px; }
        .cloud-1::before { width: 50px; height: 50px; top: -15px; left: 60px; }
        
        @keyframes moveClouds {
            from { transform: translateX(-200px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        .ripple {
            position: absolute; bottom: 20%; width: 250px; height: 50px;
            border-radius: 50%; border: 3px solid rgba(255,255,255,0.25);
            animation: rippleAnim 5s linear infinite; pointer-events: none;
            z-index: 1;
        }
        @keyframes rippleAnim {
            0% { transform: scale(0.5); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* --- Header: Balanced 3-Column Layout --- */
        header {
            width: 100%;
            padding: 20px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* Ensures left/right are flexible and center is static */
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            z-index: 100;
            border-bottom: 2px solid rgba(255,255,255,0.6);
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--pink); color: white; width: 50px; height: 50px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem; border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; color: var(--text-dark); font-size: 2.5rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px; font-weight: bold; color: var(--water-blue);
            height: 48px; background: white; border-radius: 24px;
            width: 180px; border: 2px solid var(--water-blue);
            box-shadow: 0 4px 0 rgba(0, 119, 182, 0.2);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 18px; padding: 6px; box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #f0f9ff; color: var(--water-blue); }

        /* --- Main Game Area --- */
        .container {
            flex: 1; width: 100%; max-width: 1100px;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; z-index: 10;
            justify-content: center;
            gap: 60px; /* Significant gaps between all main game elements */
        }

        .score-board {
            display: flex; gap: 40px;
        }
        .score-pill {
            background: white; padding: 15px 35px; border-radius: 40px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--lily-green);
            box-shadow: 0 10px 0 rgba(116, 198, 157, 0.4);
            display: flex; align-items: center; gap: 12px;
            font-size: 1.5rem;
        }

        .instruction {
            font-size: 1.7rem; font-weight: 700; color: var(--text-dark);
            background: rgba(255,255,255,0.7); padding: 18px 50px;
            border-radius: 70px; text-align: center;
            border: 3px dashed var(--lily-green);
            max-width: 90%;
        }

        /* --- Stage: Lily Pads & Numbers --- */
        .stage {
            display: flex; align-items: center; justify-content: center;
            gap: 50px; 
        }
        
        .pad-wrapper { position: relative; animation: float 5s ease-in-out infinite; }
        .pad-wrapper:nth-child(3) { animation-delay: 1.5s; }

        .lily-pad {
            width: 200px; height: 200px; background: var(--lily-green);
            border-radius: 50%; border: 10px solid #52b788;
            display: flex; align-items: center; justify-content: center;
            position: relative; box-shadow: 0 18px 0 #40916c;
        }
        .lily-pad::after {
            content: ''; position: absolute; top: 0; right: 30px;
            width: 60px; height: 60px; background: inherit;
            border-radius: 50%; transform: rotate(45deg); clip-path: polygon(0 0, 100% 0, 100% 100%);
        }

        .number-text {
            font-size: 5rem; font-weight: 900; color: white;
            text-shadow: 5px 5px 0 #2d6a4f; z-index: 5;
        }

        .slot {
            width: 140px; height: 140px; background: rgba(255, 255, 255, 0.2);
            border: 8px dashed white; border-radius: 40px;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; font-weight: 900; color: var(--accent-yellow);
            text-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transform: translateY(-10px);
        }

        /* --- Action Area --- */
        .action-area {
            background: rgba(255,255,255,0.45); backdrop-filter: blur(12px);
            padding: 35px 70px; border-radius: 70px;
            border: 4px solid white; display: flex; gap: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
        }

        .gator-btn {
            width: 140px; height: 140px; cursor: pointer; border: none; background: white;
            border-radius: 45px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 12px 0 #e2e8f0; position: relative;
        }
        .gator-btn:hover { transform: translateY(-12px); box-shadow: 0 20px 0 #e2e8f0; }
        .gator-btn:active { transform: translateY(4px); box-shadow: none; }
        .gator-btn svg { width: 85%; height: 85%; }

        .gator-body { fill: #40916c; stroke: #1b4332; stroke-width: 2.5; }
        .gator-eye { fill: white; stroke: #1b4332; stroke-width: 1.5; }
        .gator-pupil { fill: black; }
        .gator-teeth { fill: white; }

        /* --- Overlays --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(27, 67, 50, 0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.4s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 500px; width: 95%;
            border: 12px solid var(--lily-green);
            box-shadow: 0 35px 80px rgba(0,0,0,0.5);
            position: relative;
        }
        
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 30px; animation: bounceIn 0.8s; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.6rem; color: #555; margin-bottom: 40px; line-height: 1.5; }

        .btn-game {
            background: var(--water-blue); color: white; border: none;
            padding: 22px 70px; border-radius: 50px; font-weight: 800;
            font-size: 1.8rem; cursor: pointer; box-shadow: 0 12px 0 #005f8d;
        }
        .btn-game:hover { transform: scale(1.05); }
        .btn-game:active { transform: translateY(4px); box-shadow: none; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }

        @keyframes bounceIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 850px) {
            header { padding: 15px 20px; grid-template-columns: auto 1fr auto; gap: 10px; }
            h1 { font-size: 1.6rem; }
            .grade-badge { width: 40px; height: 40px; font-size: 1.3rem; }
            .custom-select__trigger { width: 140px; height: 40px; font-size: 0.9rem; padding: 0 10px; }
            
            .lily-pad { width: 130px; height: 130px; border-width: 6px; }
            .number-text { font-size: 3rem; }
            .slot { width: 90px; height: 90px; font-size: 2.8rem; }
            .gator-btn { width: 90px; height: 90px; border-radius: 25px; }
            .action-area { gap: 20px; padding: 25px 35px; }
            .instruction { font-size: 1.2rem; padding: 15px 30px; }
            .container { gap: 30px; padding: 20px 10px; }
            .stage { gap: 20px; }
            .score-pill { font-size: 1.1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- Background Decor -->
<div class="cloud cloud-1"></div>
<div class="cloud cloud-1" style="animation-delay: -15s; top: 25%;"></div>
<div class="cloud cloud-1" style="animation-delay: -30s; top: 10%; opacity: 0.4; transform: scale(0.6);"></div>
<div class="ripple" style="left: 15%; bottom: 10%; animation-delay: 0s;"></div>
<div class="ripple" style="right: 20%; bottom: 15%; animation-delay: 2.5s;"></div>

<header>
    <div class="header-item-left">
        <div class="grade-badge">3</div>
    </div>
    
    <h1 id="app-title">Gator Chomp!</h1>
    
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score">0</span></div>
    </div>

    <div class="instruction" id="lbl-instr">ዝዓበየ ቁፅሪ ዝበልዕ ሓረግ ምረፅ!</div>

    <div class="stage">
        <div class="pad-wrapper">
            <div class="lily-pad"><span class="number-text" id="num1">0</span></div>
        </div>
        
        <div class="slot" id="drop-slot">?</div>
        
        <div class="pad-wrapper">
            <div class="lily-pad"><span class="number-text" id="num2">0</span></div>
        </div>
    </div>

    <div class="action-area">
        <!-- LESS THAN GATOR -->
        <button class="gator-btn" onclick="handleChoice('<')">
            <svg viewBox="0 0 100 100">
                <path d="M10,50 Q40,30 90,10 L90,30 Q55,50 10,50 Z" class="gator-body" />
                <path d="M10,50 Q40,70 90,90 L90,70 Q55,50 10,50 Z" class="gator-body" />
                <circle cx="25" cy="40" r="5" class="gator-eye" />
                <circle cx="25" cy="40" r="2" class="gator-pupil" />
                <path d="M40,40 L45,50 L50,40 L55,50 L60,40" class="gator-teeth" />
            </svg>
        </button>

        <!-- EQUAL GATOR -->
        <button class="gator-btn" onclick="handleChoice('=')">
            <svg viewBox="0 0 100 100">
                <rect x="10" y="30" width="80" height="15" rx="5" class="gator-body" />
                <rect x="10" y="55" width="80" height="15" rx="5" class="gator-body" />
                <circle cx="20" cy="20" r="3" class="gator-pupil" />
                <circle cx="80" cy="20" r="3" class="gator-pupil" />
            </svg>
        </button>

        <!-- GREATER THAN GATOR -->
        <button class="gator-btn" onclick="handleChoice('>')">
            <svg viewBox="0 0 100 100">
                <path d="M90,50 Q60,30 10,10 L10,30 Q45,50 90,50 Z" class="gator-body" />
                <path d="M90,50 Q60,70 10,90 L10,70 Q45,50 90,50 Z" class="gator-body" />
                <circle cx="75" cy="40" r="5" class="gator-eye" />
                <circle cx="75" cy="40" r="2" class="gator-pupil" />
                <path d="M60,40 L55,50 L50,40 L45,50 L40,40" class="gator-teeth" />
            </svg>
        </button>
    </div>
</div>

<!-- Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🐊✨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ጀግና! ቀፅል</div>
        <button class="btn-game" onclick="nextQuestion()" id="btn-next">ቀፅል</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--pink);">
        <span class="modal-icon">🤕</span>
        <div class="modal-title" id="fail-title">ተጋግዩ!</div>
        <div class="modal-body">
            <span id="fail-body">ጸወታ ተወዲኡ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:var(--pink); font-weight:900;">0</span>
        </div>
        <button class="btn-game" onclick="restartGame()" id="btn-restart" style="background:var(--pink); box-shadow: 0 8px 0 #d63384;">እንደገና ጀምር</button>
    </div>
</div>

<script>
    // --- Data ---
    const translations = {
        ti: {
            title: "ና ሓርገፅ ጨዋታ ",
            instr: "ዝዓበየ ቁፅሪ ዝበልዕ ሓርገፅ ምረፅ!",
            score: "ነጥቢ",
            record: "ክብረ ወሰን",
            win: "ትኽክል!",
            winSub: "ጀግና! ቀፅል",
            fail: "ተጋግዩ!",
            failSub: "ጸወታ ተወዲኡ።",
            final: "ውፅኢትካ",
            next: "ቀፅል ➡",
            restart: "እንደገና ጀምር 🔄"
        },
        am: {
            title: "የአዞ ጨዋታ",
            instr: "ትልቁን ቁጥር የሚበላውን አዞ ይምረጡ!",
            score: "ውጤት",
            record: "ከፍተኛ",
            win: "ትክክል!",
            winSub: "ጎበዝ! ቀጥል",
            fail: "ስህተት!",
            failSub: "ጨዋታው አብቅቷል።",
            final: "የእርስዎ ውጤት",
            next: "ቀጣይ ➡",
            restart: "እንደገና ጀምር 🔄"
        },
        en: {
            title: "Gator Chomp!",
            instr: "Choose the gator that eats the bigger number!",
            score: "Score",
            record: "Record",
            win: "Correct!",
            winSub: "Awesome! Keep going",
            fail: "Oops!",
            failSub: "Game Over.",
            final: "Your Score",
            next: "Next ➡",
            restart: "Restart Game 🔄"
        },
        om: {
            title: "Tapha Naachaa",
            instr: "Naachaa lakkoofsa guddaa nyaatu filadhu!",
            score: "Qabxii",
            record: "Rikardii",
            win: "Sirrii!",
            winSub: "Baay'ee gaarii! Itti fufi",
            fail: "Dogoggora!",
            failSub: "Tapha dhumate.",
            final: "Qabxii Keessan",
            next: "Itti Aanu ➡",
            restart: "Irra deebi'i 🔄"
        },
        so: {
            title: "Ciyaarta Yaxaaska",
            instr: "Dooro yaxaaska cunaya lambarka weyn!",
            score: "Dhibco",
            record: "Rikoodh",
            win: "Sax!",
            winSub: "Shaqo fiican! Horay u soco",
            fail: "Khalad!",
            failSub: "Ciyaartu way dhammaatay.",
            final: "Dhibcahaaga",
            next: "Xiga ➡",
            restart: "Dib u billow 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('gatorChompHighScore') || 0;
    let num1, num2;

    // --- Core Logic ---

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function generateProblem() {
        // Difficulty scaling
        let max = 100;
        if (score > 100) max = 1000;
        if (score > 300) max = 1000000;

        num1 = Math.floor(Math.random() * max);
        num2 = Math.floor(Math.random() * max);
        
        // Equal numbers 20% of time
        if (Math.random() > 0.8) num2 = num1;

        document.getElementById('num1').textContent = formatNum(num1);
        document.getElementById('num2').textContent = formatNum(num2);
        document.getElementById('drop-slot').textContent = "?";
        document.getElementById('drop-slot').style.color = "var(--accent-yellow)";
    }

    function formatNum(n) {
        if(n > 9999) return (n/1000).toFixed(0) + "k";
        return n.toLocaleString();
    }

    function handleChoice(symbol) {
        let correct = false;
        if (symbol === '>' && num1 > num2) correct = true;
        else if (symbol === '<' && num1 < num2) correct = true;
        else if (symbol === '=' && num1 === num2) correct = true;

        document.getElementById('drop-slot').textContent = symbol;

        if (correct) {
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('gatorChompHighScore', highScore);
            }
            updateScoreBoard();
            showWin();
        } else {
            showFail();
        }
    }

    function showWin() {
        triggerConfetti();
        playSound('win');
        document.getElementById('overlay-win').classList.add('show');
    }

    function showFail() {
        playSound('fail');
        document.getElementById('final-score-val').textContent = score;
        document.getElementById('overlay-fail').classList.add('show');
    }

    function nextQuestion() {
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreBoard();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreBoard() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    // --- UI/UX ---

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-instr').textContent = t.instr;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-record').textContent = t.record;
        
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.toggle('open'));

    options.forEach(opt => {
        opt.addEventListener('click', function() {
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target)) dropdown.querySelector('.custom-select').classList.remove('open');
    });

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);

        if (type === 'win') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, t);
            osc.frequency.exponentialRampToValueAtTime(800, t + 0.15);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
        } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, t);
            osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const pieces = [];
        for(let i=0; i<80; i++) {
            pieces.push({
                x: canvas.width / 2,
                y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20 - 5,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                size: Math.random() * 8 + 4
            });
        }

        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let alive = false;
            pieces.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5;
                if (p.y < canvas.height) {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    alive = true;
                }
            });
            if (alive) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>


<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Circle Garden - ሓዱሽ ምስጢር ክቢ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pond-blue: #00b4d8;
            --pond-deep: #0077b6;
            --grass-green: #4ade80;
            --lily-green: #22c55e;
            --primary: #f43f5e;
            --secondary: #8b5cf6;
            --accent: #fbbf24;
            --text-dark: #1e293b;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(180deg, #bae6fd 0%, #4ade80 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Clouds --- */
        .cloud-container { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; animation: moveCloud var(--d) infinite linear; }
        .cloud::after, .cloud::before { content: ''; position: absolute; background: inherit; border-radius: 50%; }
        .cloud::after { width: 50px; height: 50px; top: -20px; left: 20px; }
        .cloud::before { width: 40px; height: 40px; top: -10px; left: 5px; }
        @keyframes moveCloud { from { left: -200px; } to { left: 110vw; } }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 5px solid var(--lily-green);
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--secondary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #5b21b6; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--lily-green); font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--lily-green);
            height: 48px; background: white; border-radius: 24px;
            width: 170px; border: 2px solid var(--lily-green);
            box-shadow: 0 4px 10px var(--shadow);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 20px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #f0fdf4; color: var(--lily-green); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 20px;
        }

        .score-board { display: flex; gap: 20px; margin-bottom: 10px; }
        .score-pill {
            background: white; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--pond-blue);
            box-shadow: 0 8px 0 rgba(0, 180, 216, 0.1);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }

        .mission-bubble {
            background: white; color: var(--text-dark);
            padding: 20px 50px; border-radius: 40px;
            font-size: 1.8rem; font-weight: 800;
            box-shadow: 0 10px 0 var(--lily-green);
            text-align: center; max-width: 90%;
            border: 4px solid var(--lily-green);
            position: relative;
            animation: bounceSmall 3s infinite;
        }
        @keyframes bounceSmall { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* --- Lilypad Options --- */
        .pond-stage {
            display: flex; gap: 40px; justify-content: center;
            width: 100%; margin: 30px 0; flex-wrap: wrap;
            perspective: 1000px;
        }

        .lilypad {
            width: 220px; height: 200px;
            background: radial-gradient(circle at 30% 30%, #4ade80, #166534);
            border-radius: 50% 50% 50% 20%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2), inset 0 0 20px rgba(0,0,0,0.2);
            cursor: pointer; position: relative;
            animation: floatLily var(--f) infinite ease-in-out alternate;
        }
        @keyframes floatLily { from { transform: translateY(0) rotate(-2deg); } to { transform: translateY(-15px) rotate(2deg); } }

        .lilypad:hover { transform: scale(1.1) rotate(0deg) !important; filter: brightness(1.1); }
        .lilypad:active { transform: scale(0.95) !important; }

        .circle-viz {
            width: 150px; height: 150px;
            background: rgba(255,255,255,0.2);
            border: 4px solid white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative; pointer-events: none;
        }
        .viz-line {
            position: absolute; background: white;
            border-radius: 4px; box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* --- Frog Character --- */
        .frog {
            position: fixed; bottom: 40px; right: 50px;
            font-size: 5rem; z-index: 50; pointer-events: none;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
        }
        .frog.jumping { animation: jumpToTarget 0.8s ease-in-out forwards; }
        @keyframes jumpToTarget {
            0% { bottom: 40px; right: 50px; transform: scale(1) rotate(0); }
            50% { bottom: 300px; transform: scale(1.4) rotate(-20deg); }
            100% { bottom: var(--ty); left: var(--tx); transform: scale(1) rotate(0); opacity: 0; }
        }

        /* --- Overlays --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(12px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 12px solid var(--lily-green);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.4rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--lily-green); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #166534;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 800px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.4rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .lilypad { width: 160px; height: 140px; }
            .circle-viz { width: 100px; height: 100px; }
            .mission-bubble { font-size: 1.3rem; padding: 15px 30px; }
            .score-pill { padding: 8px 18px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="cloud-container" id="clouds"></div>
<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Circle</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:8px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:8px">0</span></div>
    </div>

    <div class="mission-bubble" id="mission-txt">ኣየናይ እዩ ሬዲየስ (Radius)?</div>

    <div class="pond-stage" id="options-container">
        <!-- Lilypads injected here -->
    </div>
</div>

<div class="frog" id="frog-char">🐸</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🐸💎</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ጀግና ጂኦሜትሪ።</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--primary);">
        <span class="modal-icon">💧</span>
        <div class="modal-title" id="fail-title">ተጋግዩ!</div>
        <div class="modal-body">
            <span id="fail-body">እንደገና ፈትን። ንክቢ ኣጸቢቕካ ርኣዮ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:var(--primary); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="restartGame()" id="btn-restart" style="background:var(--primary); box-shadow: 0 10px 0 #9f1239; color:white;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ክቢ",
            qRad: "ኣየናይ እዩ ሬዲየስ (Radius)?",
            qDia: "ኣየናይ እዩ ዲያሜትር (Diameter)?",
            qCho: "ኣየናይ እዩ ኮርድ (Chord)?",
            score: "ነጥቢ", record: "ዝለዓለ",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ጀግና።",
            fail: "ተጋግዩ!", failSub: "እንደገና ፈትን። ንክቢ ኣጸቢቕካ ርኣዮ።", final: "ውፅኢትካ",
            next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄"
        },
        am: {
            title: "ክብ",
            qRad: "ራዲየስ (Radius) የትኛው ነው?",
            qDia: "ዲያሜትር (Diameter) የትኛው ነው?",
            qCho: "ኮርድ (Chord) የትኛው ነው?",
            score: "ውጤት", record: "ከፍተኛ",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! የጂኦሜትሪ ጀግና።",
            fail: "ተሳስተሃል!", failSub: "እንደገና ሞክር። ክቡን በደንብ ተመልከት።", final: "የእርስዎ ውጤት",
            next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄"
        },
        en: {
            title: "Circle",
            qRad: "Identify the Radius!",
            qDia: "Identify the Diameter!",
            qCho: "Identify the Chord!",
            score: "Score", record: "Record",
            win: "Correct!", winSub: "Splash! You are a Geometry Hero.",
            fail: "Oops!", failSub: "Try again! Look closely at the circle.", final: "Your Score",
            next: "Next Level ➡", restart: "Restart Game 🔄"
        },
        om: {
            title: "Madda Geengoo",
            qRad: "Raadiyasiin (Radius) isa kami?",
            qDia: "Diyaameetira (Diameter) isa kami?",
            qCho: "Koordii (Chord) isa kami?",
            score: "Qabxii", record: "Rikardii",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Goota herregaati.",
            fail: "Dogoggora!", failSub: "Irra deebi'ii yaali. Geengoo sirriitti ilaali.", final: "Qabxii Keessan",
            next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄"
        },
        so: {
            title: "Beeraha Goobada",
            qRad: "Waa kuwee Raadiyasi (Radius)?",
            qDia: "Waa kuwee Dhexroor (Diameter)?",
            qCho: "Waa kuwee Koodh (Chord)?",
            score: "Dhibco", record: "Rikoodh",
            win: "Sax!", winSub: "Aad u fiican! Waxaad tahay geesi xisaabeed.",
            fail: "Khalad!", failSub: "Isku day mar kale. Goobada si fiican u eeg.", final: "Dhibcahaaga",
            next: "Xiga ➡", restart: "Dib u billow 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('circleGardenHigh_V1') || 0;
    let currentProblem = {};
    let targetType = 'radius'; 

    function init() {
        document.getElementById('val-high').textContent = highScore;
        createClouds();
        updateLanguage();
        generateLevel();
    }

    function createClouds() {
        const container = document.getElementById('clouds');
        for(let i=0; i<6; i++) {
            const c = document.createElement('div');
            c.className = 'cloud';
            const w = Math.random() * 100 + 80;
            c.style.width = w + 'px';
            c.style.height = (w * 0.4) + 'px';
            c.style.top = Math.random() * 40 + '%';
            c.style.setProperty('--d', (Math.random() * 30 + 30) + 's');
            c.style.animationDelay = (Math.random() * 30) + 's';
            container.appendChild(c);
        }
    }

    function generateLevel() {
        const types = ['radius', 'diameter', 'chord'];
        targetType = types[Math.floor(Math.random() * types.length)];
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // Shuffle options
        const pool = [...types].sort(() => Math.random() - 0.5);
        
        pool.forEach((type, idx) => {
            const pad = document.createElement('div');
            pad.className = 'lilypad';
            pad.style.setProperty('--f', (3 + Math.random() * 2) + 's');
            pad.onclick = (e) => checkAnswer(type, e);
            
            const viz = document.createElement('div');
            viz.className = 'circle-viz';
            
            // Add lines to viz
            const line = document.createElement('div');
            line.className = 'viz-line';
            if(type === 'radius') {
                line.style.width = '50%'; line.style.height = '4px'; line.style.left = '50%'; line.style.top = '50%';
                viz.appendChild(createCenterDot());
            } else if (type === 'diameter') {
                line.style.width = '100%'; line.style.height = '4px'; line.style.left = '0'; line.style.top = '50%';
                viz.appendChild(createCenterDot());
            } else {
                line.style.width = '70%'; line.style.height = '4px'; line.style.left = '15%'; line.style.top = '25%';
                viz.appendChild(createCenterDot()); // Center dot is still there for context
            }
            
            viz.appendChild(line);
            pad.appendChild(viz);
            container.appendChild(pad);
        });

        updateMissionText();
    }

    function createCenterDot() {
        const dot = document.createElement('div');
        dot.style.position = 'absolute'; dot.style.width = '8px'; dot.style.height = '8px';
        dot.style.background = 'white'; dot.style.borderRadius = '50%';
        dot.style.left = '50%'; dot.style.top = '50%'; dot.style.transform = 'translate(-50%, -50%)';
        dot.style.zIndex = '10';
        return dot;
    }

    function updateMissionText() {
        const t = translations[currentLang];
        if(targetType === 'radius') document.getElementById('mission-txt').textContent = t.qRad;
        else if(targetType === 'diameter') document.getElementById('mission-txt').textContent = t.qDia;
        else document.getElementById('mission-txt').textContent = t.qCho;
    }

    function checkAnswer(type, event) {
        if (type === targetType) {
            score += 20;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('circleGardenHigh_V1', highScore);
            }
            updateScoreUI();
            
            // Jump Animation
            const frog = document.getElementById('frog-char');
            const rect = event.currentTarget.getBoundingClientRect();
            document.documentElement.style.setProperty('--tx', (rect.left + 50) + 'px');
            document.documentElement.style.setProperty('--ty', (rect.top - 20) + 'px');
            frog.classList.add('jumping');

            playSound('splash');
            triggerConfetti();
            
            setTimeout(() => {
                document.getElementById('overlay-win').classList.add('show');
                frog.classList.remove('jumping');
                frog.style.opacity = '1';
            }, 800);
        } else {
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function nextLevel() {
        document.getElementById('overlay-win').classList.remove('show');
        generateLevel();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateLevel();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
        if(targetType) updateMissionText();
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'splash') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(800, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<80; i++) {
            pieces.push({
                x: canvas.width / 2, y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 5,
                color: `hsl(${Math.random()*360}, 100%, 70%)`, size: Math.random() * 10 + 5
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let alive = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.6;
                if (p.y < canvas.height) {
                    ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                    alive = true;
                }
            });
            if (alive) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>

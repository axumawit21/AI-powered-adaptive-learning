
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraction Master Chef - ጉዚታት ፒዛ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf2f0;
            --primary: #e63946;
            --secondary: #f4a261;
            --accent: #2a9d8f;
            --cheese: #ffb703;
            --text-dark: #1d3557;
            --white: #ffffff;
            --shadow: rgba(29, 53, 87, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--secondary) 0.5px, transparent 0.5px),
                radial-gradient(var(--secondary) 0.5px, var(--bg-color) 0.5px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            user-select: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--primary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #941b2c; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--text-dark); font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--primary);
            height: 48px; background: white; border-radius: 24px;
            width: 170px; border: 2px solid var(--primary);
            box-shadow: 0 4px 10px var(--shadow);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 20px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #fff1f2; color: var(--primary); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; z-index: 10;
            justify-content: flex-start;
            gap: 20px;
        }

        .score-board { display: flex; gap: 20px; margin-bottom: 5px; }
        .score-pill {
            background: white; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--primary);
            box-shadow: 0 8px 0 rgba(230, 57, 70, 0.1);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }

        /* Order Ticket */
        .order-ticket {
            background: white; border: 3px dashed #cbd5e1;
            padding: 20px 50px; border-radius: 20px;
            text-align: center; position: relative;
            box-shadow: 0 15px 30px var(--shadow);
            transform: rotate(-1deg);
        }
        .ticket-label { font-size: 1rem; color: #64748b; text-transform: uppercase; font-weight: 700; margin-bottom: 5px; }
        .fraction-main { font-size: 4rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .ticket-sub { font-size: 1.2rem; font-weight: 800; color: var(--text-dark); margin-top: 5px; }

        /* Pizza Visual */
        .pizza-visual {
            position: relative; width: 340px; height: 340px;
            display: flex; justify-content: center; align-items: center;
            margin: 20px 0;
        }
        .plate {
            position: absolute; width: 360px; height: 360px;
            background: #fff; border-radius: 50%;
            border: 1px solid #e2e8f0; box-shadow: 0 10px 40px var(--shadow);
        }
        #pizza-svg { width: 320px; height: 320px; z-index: 5; border-radius: 50%; overflow: hidden; }
        .slice { cursor: pointer; transition: filter 0.2s, transform 0.1s; transform-origin: center; }
        .slice:hover { filter: brightness(1.1); }
        .slice:active { transform: scale(0.96); }

        /* Controls */
        .controls-card {
            width: 100%; max-width: 500px;
            background: white; padding: 25px; border-radius: 35px;
            box-shadow: 0 20px 40px var(--shadow);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            border: 6px solid white;
        }
        .step-info { font-weight: 800; color: var(--accent); font-size: 1.2rem; }
        
        .counter-group {
            display: flex; align-items: center; gap: 20px;
            background: #f1f5f9; padding: 8px; border-radius: 40px;
        }
        .btn-round {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: white; color: var(--primary); font-size: 1.8rem;
            font-weight: 900; cursor: pointer; box-shadow: 0 4px 0 #ddd;
        }
        .btn-round:active { transform: translateY(2px); box-shadow: none; }
        .counter-val { font-size: 2.2rem; font-weight: 900; color: var(--text-dark); min-width: 40px; text-align: center; }

        .btn-action {
            width: 100%; background: var(--primary); color: white;
            border: none; padding: 20px; border-radius: 50px;
            font-size: 1.5rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 0 #941b2c; margin-top: 5px;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        /* Reactions Overlays */
        .overlay {
            position: fixed; inset: 0; background: rgba(29, 53, 87, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 12px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.4rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #941b2c;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 600px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.2rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .pizza-visual { width: 280px; height: 280px; }
            .plate { width: 300px; height: 300px; }
            #pizza-svg { width: 260px; height: 260px; }
            .fraction-main { font-size: 3rem; }
            .score-pill { padding: 8px 15px; font-size: 0.9rem; }
            .btn-action { font-size: 1.2rem; padding: 15px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">5</div></div>
    <h1 id="app-title">Fraction Master Chef</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="order-ticket">
        <div class="ticket-label" id="lbl-order">Order Ticket</div>
        <div class="fraction-main"><span id="target-num">3</span>/<span id="target-den">4</span></div>
        <div class="ticket-sub" id="lbl-toppings">slices with pepperoni</div>
    </div>

    <div class="pizza-visual">
        <div class="plate"></div>
        <svg id="pizza-svg" viewBox="0 0 200 200">
            <!-- Dynamic pizza drawn here -->
        </svg>
    </div>

    <div class="controls-card">
        <div id="step-1-ui" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:10px;">
            <div class="step-info" id="lbl-step1">Step 1: How many slices total?</div>
            <div class="counter-group">
                <button class="btn-round" onclick="adjustDenominator(-1)">-</button>
                <span class="counter-val" id="val-den-input">1</span>
                <button class="btn-round" onclick="adjustDenominator(1)">+</button>
            </div>
            <button class="btn-action" onclick="cutPizza()" id="btn-cut">✂️ Cut Pizza</button>
        </div>

        <div id="step-2-ui" style="width:100%; display:none; flex-direction:column; align-items:center; gap:10px;">
            <div class="step-info" id="lbl-step2">Step 2: Tap slices for pepperoni!</div>
            <div style="height:40px; display:flex; align-items:center; font-weight:800; color:#475569;">
                <span id="lbl-selected">Selected</span>: <span id="val-num-input" style="color:var(--primary); margin-left:8px; font-size:1.5rem">0</span>
            </div>
            <button class="btn-action" onclick="checkAnswer()" id="btn-serve">🛎️ Serve Order</button>
            <button style="background:none; border:none; color:#94a3b8; text-decoration:underline; cursor:pointer; font-weight:700;" onclick="resetToStep1()" id="btn-reset">Reset Pizza</button>
        </div>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🍕✨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ዝዓበየ ቁራፅ ረኺብካዮ።</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--primary);">
        <span class="modal-icon">👨‍🍳💨</span>
        <div class="modal-title" id="fail-title">ተጋግዩ!</div>
        <div class="modal-body">
            <span id="fail-body">እንደገና ፈትን። ኬክ ክንደይ ምዃኑ ርአ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:var(--primary); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="restartGame()" id="btn-restart" style="background:var(--primary); box-shadow: 0 10px 0 #941b2c;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "Fraction Master Chef", order: "ትእዛዝ ዓሚል", toppings: "ቅመም ዝውሰኮም",
            step1: "ደረጃ 1: ጠቕላላ ክንደይ ቁራፅ?", step2: "ደረጃ 2: ቅመም ዝውሰከሎም ቁራፃት ፒዛ ንካዮም!",
            cut: "✂️ ፒዛ ቁረፅ", serve: "🛎️ ንዓሚል ሃብ", reset: "እንደገና ጀምር",
            score: "ነጥቢ", record: "ዝለዓለ", selected: "ዝተመረፁ",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ቆንጆ ዝኾነ ፒዛ ሰሪሕካ።",
            fail: "ተጋግዩ!", failSub: "ትእዛዝ ዓሚል ርአ። ጉዚታት ማዕረ ኣይኮኑን።",
            final: "ውፅኢትካ", next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄"
        },
        am: {
            title: "Fraction Master Chef", order: "የትዕዛዝ ወረቀት", toppings: "ቅመም ሚጨመርባቸው",
            step1: "ደረጃ 1: በጠቅላላ ስንት ቁራጭ?", step2: "ደረጃ 2: ቅመም ሚጨመርባቸው ፒዛዎች ይንኩ!",
            cut: "✂️ ፒዛውን ቁረጥ", serve: "🛎️ ትዕዛዙን አቅርብ", reset: "እንደገና ጀምር",
            score: "ውጤት", record: "ከፍተኛ", selected: "የተመረጡ",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! ትክክለኛውን ፒዛ ሰርተሃል።",
            fail: "ስህተት!", failSub: "ትዕዛዙን በደንብ ይመልከቱ። ክፍልፋዩ አልተስተካከለም።",
            final: "የእርስዎ ውጤት", next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄"
        },
        en: {
            title: "Fraction Master Chef", order: "Order Ticket", toppings: "slices with pepperoni",
            step1: "Step 1: How many slices total?", step2: "Step 2: Tap slices for pepperoni!",
            cut: "✂️ Cut Pizza", serve: "🛎️ Serve Order", reset: "Reset Pizza",
            score: "Score", record: "Record", selected: "Selected",
            win: "Correct!", winSub: "Delicious! You made the perfect pizza.",
            fail: "Oops!", failSub: "Check the order again. The fractions don't match!",
            final: "Your Score", next: "Next Level ➡", restart: "Restart Game 🔄"
        },
        om: {
            title: "Fraction Master Chef", order: "Waraqaa Ajajaa", toppings: "kutaa peeperoonii qabu",
            step1: "Sadarkaa 1: Waliigala kutaa meeqa?", step2: "Sadarkaa 2: Peperoonii itti dabaluuf tuqi!",
            cut: "✂️ Piizaa Qori", serve: "🛎️ Ajaja Kenni", reset: "Irra deebi'i",
            score: "Qabxii", record: "Rikardii", selected: "Kan Filatame",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Piizaa guutuu hojjetteetta.",
            fail: "Dogoggora!", failSub: "Ajaja sana irra deebi'ii ilaali. Piizaan hin sirreessine.",
            final: "Qabxii Keessan", next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄"
        },
        so: {
            title: "Fraction Master Chef", order: "Tikidhka Dalabka", toppings: "xabbadood oo peperoni leh",
            step1: "Tallaabada 1: Immisa jeex oo wadartu tahay?", step2: "Tallaabada 2: Taabo jeexyada peperoniga!",
            cut: "✂️ Jar Piisada", serve: "🛎️ Keen Dalabka", reset: "Dib u deji",
            score: "Dhibco", record: "Rikoodh", selected: "La doortay",
            win: "Sax!", winSub: "Aad u macaan! Waxaad samaysay piisadii ugu fiicnayd.",
            fail: "Khalad!", failSub: "Fiiri dalabka mar kale. Jajabku isma laha!",
            final: "Dhibcahaaga", next: "Xiga ➡", restart: "Dib u billow 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('pizzaFractionsHigh_V1') || 0;
    let targetNum, targetDen;
    let userDen = 1;
    let selectedSlices = new Set();
    let isConfettiActive = false;

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateOrder();
    }

    function generateOrder() {
        const denominators = [2, 3, 4, 5, 6, 8, 10, 12];
        targetDen = denominators[Math.floor(Math.random() * denominators.length)];
        targetNum = Math.floor(Math.random() * (targetDen - 1)) + 1;
        
        document.getElementById('target-num').textContent = targetNum;
        document.getElementById('target-den').textContent = targetDen;
        resetToStep1();
    }

    function resetToStep1() {
        userDen = 1;
        selectedSlices.clear();
        document.getElementById('val-den-input').textContent = userDen;
        document.getElementById('step-1-ui').style.display = 'flex';
        document.getElementById('step-2-ui').style.display = 'none';
        
        const svg = document.getElementById('pizza-svg');
        svg.innerHTML = `
            <circle cx="100" cy="100" r="95" fill="#fef3c7" stroke="#fbbf24" stroke-width="4"/>
            <text x="100" y="105" text-anchor="middle" font-size="18" fill="#d97706" font-weight="900" opacity="0.3">DOUGH</text>
        `;
    }

    function adjustDenominator(delta) {
        userDen = Math.max(1, Math.min(12, userDen + delta));
        document.getElementById('val-den-input').textContent = userDen;
        playSound('click');
    }

    function cutPizza() {
        document.getElementById('step-1-ui').style.display = 'none';
        document.getElementById('step-2-ui').style.display = 'flex';
        document.getElementById('val-num-input').textContent = '0';
        drawPizza(userDen);
        playSound('cut');
    }

    function drawPizza(count) {
        const svg = document.getElementById('pizza-svg');
        svg.innerHTML = '';
        const cx = 100, cy = 100, r = 95;

        if (count === 1) {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", cx); circle.setAttribute("cy", cy); circle.setAttribute("r", r);
            circle.setAttribute("fill", "#fbbf24"); circle.setAttribute("stroke", "#92400e"); circle.setAttribute("stroke-width", "3");
            circle.onclick = () => toggleSlice(0, circle);
            svg.appendChild(circle);
            return;
        }

        for (let i = 0; i < count; i++) {
            const startAngle = (i * 360) / count - 90;
            const endAngle = ((i + 1) * 360) / count - 90;
            const x1 = cx + r * Math.cos(Math.PI * startAngle / 180);
            const y1 = cy + r * Math.sin(Math.PI * startAngle / 180);
            const x2 = cx + r * Math.cos(Math.PI * endAngle / 180);
            const y2 = cy + r * Math.sin(Math.PI * endAngle / 180);

            const pathData = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("fill", "#fbbf24"); // Cheese base
            path.setAttribute("stroke", "#fff");
            path.setAttribute("stroke-width", "2");
            path.classList.add('slice');
            path.onclick = () => toggleSlice(i, path);
            svg.appendChild(path);
        }
    }

    function toggleSlice(idx, el) {
        if (selectedSlices.has(idx)) {
            selectedSlices.delete(idx);
            el.setAttribute('fill', '#fbbf24');
            playSound('pop');
        } else {
            selectedSlices.add(idx);
            el.setAttribute('fill', '#e63946'); // Sauce/Pepperoni color
            playSound('squish');
        }
        document.getElementById('val-num-input').textContent = selectedSlices.size;
    }

    function checkAnswer() {
        if (userDen === targetDen && selectedSlices.size === targetNum) {
            score += 25;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('pizzaFractionsHigh_V1', highScore);
            }
            updateScoreUI();
            startConfetti();
            playSound('win');
            document.getElementById('overlay-win').classList.add('show');
        } else {
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function nextLevel() {
        stopConfetti();
        document.getElementById('overlay-win').classList.remove('show');
        generateOrder();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateOrder();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-order').textContent = t.order;
        document.getElementById('lbl-toppings').textContent = t.toppings;
        document.getElementById('lbl-step1').textContent = t.step1;
        document.getElementById('btn-cut').textContent = t.cut;
        document.getElementById('lbl-step2').textContent = t.step2;
        document.getElementById('lbl-selected').textContent = t.selected;
        document.getElementById('btn-serve').textContent = t.serve;
        document.getElementById('btn-reset').textContent = t.reset;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523, t); osc.frequency.exponentialRampToValueAtTime(1046, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, t);
            gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    }

    // --- Confetti Rain ---
    let pieces = [];
    function startConfetti() {
        isConfettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pieces = [];
        for(let i=0; i<150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 2,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                size: Math.random() * 8 + 4
            });
        }
        function anim() {
            if (!isConfettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y > canvas.height) p.y = -20;
                if (p.x > canvas.width) p.x = 0;
                if (p.x < 0) p.x = canvas.width;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }
    function stopConfetti() {
        isConfettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    window.onload = init;
</script>

</body>

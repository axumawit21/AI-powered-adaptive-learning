
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Numerator & Denominator - Bubble Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0077be;
            --primary: #00f2ff;
            --secondary: #ff007f;
            --accent: #ffeb3b;
            --bubble-bg: rgba(255, 255, 255, 0.2);
            --text-light: #f0f9ff;
            --text-dark: #003049;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(180deg, #4fc3f7 0%, #0077be 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            position: relative;
        }

        /* --- Animated Bubbles Background --- */
        .ocean-bg {
            position: fixed; inset: 0; pointer-events: none; z-index: 1;
            overflow: hidden;
        }
        .bg-bubble {
            position: absolute; bottom: -100px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%; border: 2px solid rgba(255, 255, 255, 0.3);
            animation: rise var(--d) infinite linear;
        }
        @keyframes rise {
            to { transform: translateY(-120vh) translateX(var(--x)); }
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 4px solid var(--primary);
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--secondary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #9d0208; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: white; font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-align: center; text-shadow: 2px 2px 4px var(--shadow); }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--text-dark);
            height: 48px; background: white; border-radius: 24px;
            width: 170px; border: 2px solid var(--primary);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 20px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #f0f9ff; color: var(--primary); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 25px;
        }

        .score-board { display: flex; gap: 20px; }
        .score-pill {
            background: rgba(255, 255, 255, 0.2); padding: 12px 30px; border-radius: 35px;
            font-weight: 900; color: white;
            border: 3px solid var(--primary);
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; gap: 12px;
            font-size: 1.4rem; backdrop-filter: blur(5px);
        }

        .mission-bubble {
            background: white; color: var(--text-dark);
            padding: 20px 40px; border-radius: 40px;
            font-size: 1.8rem; font-weight: 800;
            box-shadow: 0 10px 0 #b0bec5;
            text-align: center; max-width: 90%;
            border: 4px solid var(--primary);
            position: relative;
        }
        .mission-bubble::after {
            content: ''; position: absolute; bottom: -20px; left: 50%;
            transform: translateX(-50%); border-left: 20px solid transparent;
            border-right: 20px solid transparent; border-top: 20px solid white;
        }

        /* --- Fraction Display --- */
        .fraction-zone {
            display: flex; gap: 60px; align-items: center; justify-content: center;
            width: 100%; margin: 40px 0; flex-wrap: wrap;
        }

        .fraction-card {
            display: flex; flex-direction: column; align-items: center;
            font-size: 8rem; font-weight: 900; color: white; line-height: 1;
            text-shadow: 4px 4px 0px var(--shadow);
        }
        .frac-num, .frac-den { 
            padding: 10px 30px; border-radius: 30px; cursor: pointer;
            border: 6px solid transparent;
        }
        .frac-num:hover, .frac-den:hover { background: rgba(255,255,255,0.2); border-color: white; }
        .frac-line { width: 140px; height: 12px; background: white; border-radius: 6px; margin: 10px 0; }

        .viz-box {
            width: 280px; height: 280px;
            background: rgba(255,255,255,0.15);
            border: 6px solid white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 20px 40px var(--shadow);
            position: relative; overflow: hidden;
        }
        #viz-svg { width: 90%; height: 90%; transform: rotate(-90deg); }
        .slice { stroke: white; stroke-width: 2; transition: fill 0.4s ease; }

        /* --- Overlays --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(0, 48, 73, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(12px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 500px; width: 95%;
            border: 12px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.4rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--primary); color: var(--text-dark); border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #0091ea;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 800px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.4rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .fraction-card { font-size: 5rem; }
            .viz-box { width: 200px; height: 200px; }
            .mission-bubble { font-size: 1.2rem; padding: 15px 25px; }
            .score-pill { padding: 8px 18px; font-size: 1rem; }
            .frac-line { width: 100px; height: 8px; }
        }
    </style>
</head>
<body>

<div class="ocean-bg" id="bubble-container"></div>
<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Bubble Explorer</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:8px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:8px">0</span></div>
    </div>

    <div class="mission-bubble" id="mission-txt">ኣየናይ እዩ ቆፃሪ? (Which is the Numerator?)</div>

    <div class="fraction-zone">
        <div class="viz-box">
            <svg id="viz-svg" viewBox="0 0 100 100"></svg>
        </div>

        <div class="fraction-card">
            <div class="frac-num" id="btn-num" onclick="checkAnswer('num')">1</div>
            <div class="frac-line"></div>
            <div class="frac-den" id="btn-den" onclick="checkAnswer('den')">3</div>
        </div>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🐚✨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ቀፅል</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--secondary);">
        <span class="modal-icon">💨</span>
        <div class="modal-title" id="fail-title">እንደገና ፈትን!</div>
        <div class="modal-body">
            <span id="fail-body">ጸወታ ተወዲኡ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:var(--secondary); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="restartGame()" id="btn-restart" style="background:var(--secondary); box-shadow: 0 10px 0 #9d0208; color:white;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ጉዚ",
            qNum: "ኣየናይ እዩ ቆፃሪ (Numerator)?",
            qDen: "ኣየናይ እዩ ረቛሒ (Denominator)?",
            score: "ነጥቢ", record: "ዝለዓለ",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ጎበዝ ተምሃራይ።",
            fail: "ተጋግዩ!", failSub: "እንደገና ፈትን።", final: "ውፅኢትካ",
            next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄"
        },
        am: {
            title: "የክፍልፋይ መለያ",
            qNum: "ቆጣሪ (Numerator) የትኛው ነው?",
            qDen: "ረቛሒ (Denominator) የትኛው ነው?",
            score: "ውጤት", record: "ከፍተኛ",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! ድንቅ ተማሪ።",
            fail: "ተሳስተሃል!", failSub: "እንደገና ሞክር።", final: "የእርስዎ ውጤት",
            next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄"
        },
        en: {
            title: "Bubble Explorer",
            qNum: "Identify the Numerator!",
            qDen: "Identify the Denominator!",
            score: "Score", record: "Record",
            win: "Correct!", winSub: "Ocean explorer! Great job.",
            fail: "Oops!", failSub: "Try again! Look closely.", final: "Your Score",
            next: "Next Level ➡", restart: "Restart Game 🔄"
        },
        om: {
            title: "Madda Firakshinii",
            qNum: "Numeratorii (ቆፃሪ) eenyu?",
            qDen: "Denominatorii (ረቛሒ) eenyu?",
            score: "Qabxii", record: "Rikardii",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Itti fufi.",
            fail: "Dogoggora!", failSub: "Irra deebi'ii yaali.", final: "Qabxii Keessan",
            next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄"
        },
        so: {
            title: "Fashilka Jajabka",
            qNum: "Waa kuwee Sareeye (Numerator)?",
            qDen: "Waa kuwee Hooseeye (Denominator)?",
            score: "Dhibco", record: "Rikoodh",
            win: "Sax!", winSub: "Shaqo fiican! Aad baad u fiican tahay.",
            fail: "Khalad!", failSub: "Isku day mar kale.", final: "Dhibcahaaga",
            next: "Xiga ➡", restart: "Dib u billow 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('bubbleNumeratorHigh_V1') || 0;
    let currentProblem = {};
    let targetType = 'num'; // 'num' or 'den'

    function init() {
        document.getElementById('val-high').textContent = highScore;
        createBgBubbles();
        updateLanguage();
        generateProblem();
    }

    function createBgBubbles() {
        const container = document.getElementById('bubble-container');
        for(let i=0; i<20; i++) {
            const b = document.createElement('div');
            b.className = 'bg-bubble';
            const size = Math.random() * 60 + 20;
            b.style.width = size + 'px';
            b.style.height = size + 'px';
            b.style.left = Math.random() * 100 + '%';
            b.style.setProperty('--d', (Math.random() * 10 + 10) + 's');
            b.style.setProperty('--x', (Math.random() * 200 - 100) + 'px');
            b.style.animationDelay = (Math.random() * 15) + 's';
            container.appendChild(b);
        }
    }

    function generateProblem() {
        const denominators = [2, 3, 4, 5, 6, 8, 10];
        const den = denominators[Math.floor(Math.random() * denominators.length)];
        const num = Math.floor(Math.random() * (den - 1)) + 1;
        targetType = Math.random() > 0.5 ? 'num' : 'den';
        
        currentProblem = { num, den };
        document.getElementById('btn-num').textContent = num;
        document.getElementById('btn-den').textContent = den;
        
        updateMissionText();
        renderViz(num, den);
    }

    function renderViz(num, den) {
        const svg = document.getElementById('viz-svg');
        svg.innerHTML = '';
        const cx = 50, cy = 50, r = 45;

        for (let i = 0; i < den; i++) {
            const startAngle = (i * 360) / den;
            const endAngle = ((i + 1) * 360) / den;
            const x1 = cx + r * Math.cos(Math.PI * startAngle / 180);
            const y1 = cy + r * Math.sin(Math.PI * startAngle / 180);
            const x2 = cx + r * Math.cos(Math.PI * endAngle / 180);
            const y2 = cy + r * Math.sin(Math.PI * endAngle / 180);

            const pathData = `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            path.setAttribute("d", pathData);
            path.setAttribute("class", "slice");
            path.setAttribute("fill", i < num ? 'var(--secondary)' : 'rgba(255,255,255,0.3)');
            svg.appendChild(path);
        }
    }

    function updateMissionText() {
        const t = translations[currentLang];
        document.getElementById('mission-txt').textContent = targetType === 'num' ? t.qNum : t.qDen;
    }

    function checkAnswer(type) {
        if (type === targetType) {
            score += 20;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('bubbleNumeratorHigh_V1', highScore);
            }
            updateScoreUI();
            playSound('win');
            triggerConfetti();
            document.getElementById('overlay-win').classList.add('show');
        } else {
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function nextLevel() {
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
        if(currentProblem.num) updateMissionText();
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523, t); osc.frequency.exponentialRampToValueAtTime(1046, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, t);
            gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<100; i++) {
            pieces.push({
                x: canvas.width / 2, y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 10,
                color: `hsl(${Math.random()*360}, 100%, 70%)`, size: Math.random() * 10 + 5
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let alive = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.6;
                if (p.y < canvas.height) {
                    ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                    alive = true;
                }
            });
            if (alive) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>
</body>
</html>

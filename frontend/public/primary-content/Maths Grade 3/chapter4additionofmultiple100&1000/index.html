
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Addition Express - ሓዱሽ ባቡር ድምር</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #a5f3fc;
            --grass: #4ade80;
            --track: #475569;
            --primary: #ef4444;
            --secondary: #3b82f6;
            --accent: #facc15;
            --success: #22c55e;
            --text-dark: #1e293b;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(to bottom, var(--sky-blue) 0%, #e0f2fe 50%, var(--grass) 50%, #166534 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 5px solid var(--secondary);
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--primary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #991b1b; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--text-dark); font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--secondary);
            height: 48px; background: white; border-radius: 24px;
            width: 170px; border: 2px solid var(--secondary);
            box-shadow: 0 4px 10px var(--shadow);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 20px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #eff6ff; color: var(--secondary); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; z-index: 10;
            justify-content: flex-start;
            gap: 20px;
        }

        .score-board { display: flex; gap: 20px; margin-bottom: 5px; }
        .score-pill {
            background: white; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--secondary);
            box-shadow: 0 8px 0 rgba(59, 130, 246, 0.1);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }

        /* --- Railway Area --- */
        .railway-stage {
            width: 100%; height: 320px;
            position: relative; overflow: hidden;
            display: flex; align-items: flex-end; justify-content: center;
        }

        .track-line {
            position: absolute; bottom: 40px; width: 200%; height: 20px;
            background: var(--track); border-top: 4px solid #1e293b;
            z-index: 1;
        }
        .railway-ties {
            position: absolute; bottom: 30px; width: 200%; height: 40px;
            background-image: linear-gradient(90deg, #451a03 15px, transparent 15px);
            background-size: 50px 100%;
            z-index: 0;
        }

        .train {
            display: flex; align-items: flex-end; gap: 10px;
            position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        .train.arriving { animation: trainEnter 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .train.departing { animation: trainExit 1.5s ease-in forwards; }

        @keyframes trainEnter { from { transform: translateX(-200%); } to { transform: translateX(-50%); } }
        @keyframes trainExit { from { transform: translateX(-50%); } to { transform: translateX(200%); } }

        .engine {
            width: 140px; height: 110px; background: var(--primary);
            border-radius: 25px 40px 5px 5px; border: 5px solid #991b1b;
            position: relative; display: flex; align-items: center; justify-content: center;
        }
        .chimney {
            position: absolute; top: -35px; left: 20px; width: 30px; height: 45px;
            background: #334155; border-radius: 5px 5px 0 0;
        }
        .smoke-particle {
            position: absolute; width: 20px; height: 20px; background: #fff;
            border-radius: 50%; opacity: 0; top: -50px; left: 25px;
            animation: smokeRise 2s infinite;
        }
        @keyframes smokeRise {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-100px) scale(3); opacity: 0; }
        }

        .cargo-car {
            width: 160px; height: 80px; background: var(--secondary);
            border: 5px solid #1e40af; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 900; color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
        }
        .cargo-car::before {
            content: ''; position: absolute; left: -15px; bottom: 20px;
            width: 15px; height: 8px; background: #1e293b;
        }

        .wheel {
            position: absolute; bottom: -20px; width: 40px; height: 40px;
            background: #1e293b; border-radius: 50%; border: 4px solid #94a3b8;
            animation: spin 1s linear infinite;
        }
        .wheel::after { content: ''; position: absolute; inset: 6px; border: 2px dashed #cbd5e1; border-radius: 50%; }
        .w-left { left: 15px; } .w-right { right: 15px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Control Panel --- */
        .controls-card {
            width: 100%; max-width: 500px;
            background: white; padding: 30px; border-radius: 40px;
            box-shadow: 0 20px 40px var(--shadow);
            display: flex; flex-direction: column; align-items: center; gap: 20px;
            border: 8px solid white;
        }

        .equation-box { font-size: 2.2rem; font-weight: 900; color: var(--text-dark); display: flex; align-items: center; gap: 15px; }
        .input-wrap { display: flex; align-items: center; gap: 10px; }
        input[type="number"] {
            width: 220px; height: 85px; font-size: 3rem; text-align: center;
            border: 5px solid #e2e8f0; border-radius: 25px; outline: none;
            font-weight: 900; color: var(--secondary); background: #f8fafc;
        }
        input::-webkit-inner-spin-button { -webkit-appearance: none; }
        input:focus { border-color: var(--secondary); background: white; transform: scale(1.05); }

        .btn-action {
            width: 100%; background: var(--success); color: white;
            border: none; padding: 20px; border-radius: 50px;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 0 #15803d;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        /* --- Reactions --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(30, 41, 59, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 12px solid var(--secondary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.5rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--secondary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #1e40af;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 600px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.2rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .railway-stage { height: 220px; }
            .engine { width: 90px; height: 75px; }
            .cargo-car { width: 100px; height: 60px; font-size: 1.5rem; }
            .chimney { width: 20px; height: 30px; top: -25px; }
            .wheel { width: 30px; height: 30px; bottom: -15px; }
            .equation-box { font-size: 1.5rem; }
            input[type="number"] { width: 170px; height: 65px; font-size: 2rem; }
            .btn-action { font-size: 1.4rem; padding: 15px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Addition Express</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="railway-stage">
        <div class="railway-ties"></div>
        <div class="track-line"></div>
        
        <div class="train arriving" id="express-train">
            <div class="engine">
                <div class="chimney">
                    <div class="smoke-particle"></div>
                    <div class="smoke-particle" style="animation-delay: 0.7s"></div>
                    <div class="smoke-particle" style="animation-delay: 1.4s"></div>
                </div>
                <div class="wheel w-left"></div>
                <div class="wheel w-right"></div>
            </div>
            <div class="cargo-car">
                <span id="val-1">500</span>
                <div class="wheel w-left"></div>
                <div class="wheel w-right"></div>
            </div>
            <div class="cargo-car" style="background:#22c55e; border-color:#15803d">
                <span id="val-2">300</span>
                <div class="wheel w-left"></div>
                <div class="wheel w-right"></div>
            </div>
        </div>
    </div>

    <div class="controls-card">
        <div class="equation-box">
            <span id="eq-val1">500</span> + <span id="eq-val2">300</span> = ?
        </div>
        <div class="input-wrap">
            <input type="number" id="user-ans" placeholder="?" inputmode="numeric">
        </div>
        <button class="btn-action" onclick="checkAnswer()" id="btn-check">Check Result ✔️</button>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🚂✨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ባቡር ክትኸይድ እያ።</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--primary);">
        <span class="modal-icon">🛑</span>
        <div class="modal-title" id="fail-title">ተጋግዩ!</div>
        <div class="modal-body">
            <span id="fail-body">እንደገና ፈትን። ቁፅሪ ኣሃዱታት ርአ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:var(--primary); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="restartGame()" id="btn-restart" style="background:var(--primary); box-shadow: 0 10px 0 #991b1b;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ምድማር 100ታትን 1000ን", score: "ነጥቢ", record: "ዝለዓለ",
            check: "ኣረጋግጽ ✔️", win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ባቡር ክትኸይድ እያ።",
            fail: "ተጋግዩ!", failSub: "መልሲ ጌጋ እዩ። እንደገና ፈትሽ!",
            final: "ውፅኢትካ", next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄"
        },
        am: {
            title: "የ100 እና 1000 ቤቶች መደመር", score: "ውጤት", record: "ከፍተኛ",
            check: "አረጋግጥ ✔️", win: "ትክክል!", winSub: "በጣም ጎበዝ! ባቡሩ ይሄዳል።",
            fail: "ስህተት!", failSub: "መልሱ ልክ አይደለም። እንደገና ይሞክሩ!",
            final: "የእርስዎ ውጤት", next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄"
        },
        en: {
            title: "Addition of 100s & 1000s", score: "Score", record: "Record",
            check: "Check Result ✔️", win: "Correct!", winSub: "Excellent! The train is ready to go.",
            fail: "Oops!", failSub: "Incorrect answer. Check the place values!",
            final: "Your Score", next: "Next Express ➡", restart: "Restart Game 🔄"
        },
        om: {
            title: "Ida'ama 100 fi 1000", score: "Qabxii", record: "Rikardii",
            check: "Mirkaneessi ✔️", win: "Sirrii!", winSub: "Baay'ee gaariidha! Baaburri ni deema.",
            fail: "Dogoggora!", failSub: "Deebiin dogoggora. Irra deebi'ii yaali!",
            final: "Qabxii Keessan", next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄"
        },
        so: {
            title: "Isku-darka 100-yada & 1000-yada", score: "Dhibco", record: "Rikoodh",
            check: "Hubi ✔️", win: "Sax!", winSub: "Aad u fiican! Tareenku wuu baxayaa.",
            fail: "Khalad!", failSub: "Jawaabtu waa qalad. Isku day mar kale!",
            final: "Dhibcahaaga", next: "Xiga ➡", restart: "Dib u billow 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('additionExpressHigh_V1') || 0;
    let val1, val2, correctAns;
    let isConfettiActive = false;

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function generateProblem() {
        const train = document.getElementById('express-train');
        train.classList.remove('arriving', 'departing');
        void train.offsetWidth; // trigger reflow
        train.classList.add('arriving');

        // Logic for 100s or 1000s
        const isThousand = Math.random() > 0.5;
        if (isThousand) {
            val1 = (Math.floor(Math.random() * 8) + 1) * 1000;
            val2 = (Math.floor(Math.random() * (9 - (val1/1000))) + 1) * 1000;
        } else {
            val1 = (Math.floor(Math.random() * 25) + 5) * 100;
            val2 = (Math.floor(Math.random() * 15) + 5) * 100;
        }
        
        correctAns = val1 + val2;
        
        document.getElementById('val-1').textContent = val1;
        document.getElementById('val-2').textContent = val2;
        document.getElementById('eq-val1').textContent = val1;
        document.getElementById('eq-val2').textContent = val2;
        document.getElementById('user-ans').value = '';
        document.getElementById('user-ans').focus();
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('user-ans').value);
        if (isNaN(userAns)) return;

        if (userAns === correctAns) {
            score += 25;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('additionExpressHigh_V1', highScore);
            }
            updateScoreUI();
            
            // Animation
            const train = document.getElementById('express-train');
            train.classList.remove('arriving');
            void train.offsetWidth;
            train.classList.add('departing');
            
            playSound('win');
            startConfetti();
            setTimeout(() => {
                document.getElementById('overlay-win').classList.add('show');
            }, 1200);
        } else {
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function nextLevel() {
        stopConfetti();
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // Audio Engine
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, t); osc.frequency.exponentialRampToValueAtTime(880, t + 0.15);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    // Confetti
    let pieces = [];
    function startConfetti() {
        isConfettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pieces = [];
        for(let i=0; i<120; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 3,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                size: Math.random() * 8 + 4
            });
        }
        function anim() {
            if (!isConfettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y > canvas.height) p.y = -20;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }
    function stopConfetti() {
        isConfettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    window.onload = init;
</script>
</body>
</html>

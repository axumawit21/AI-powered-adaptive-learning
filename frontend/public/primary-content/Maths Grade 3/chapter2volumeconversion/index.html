
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Volume Conversion Lab - መዐቀኒ ትሕዝቶ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF3E0;
            --primary: #FF9800;
            --secondary: #0891b2;
            --accent: #42A5F5;
            --liquid-orange: #FF5722;
            --text-dark: #3E2723;
            --white: #ffffff;
            --pitcher-width: 180px;
            --pitcher-height: 280px;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#FFE0B2 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto; /* Ensure scrollable on mobile */
            user-select: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--primary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #b45309; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--text-dark); font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--primary);
            height: 48px; background: white; border-radius: 24px;
            width: 170px; border: 2px solid var(--primary);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 20px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #fff7ed; color: var(--primary); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 1100px;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 30px;
        }

        .score-board { display: flex; gap: 20px; }
        .score-pill {
            background: white; padding: 12px 30px; border-radius: 35px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--primary);
            box-shadow: 0 8px 0 rgba(255, 152, 0, 0.1);
            display: flex; align-items: center; gap: 12px;
            font-size: 1.4rem;
        }

        .formula-banner {
            background: var(--primary); color: white;
            padding: 15px 50px; border-radius: 40px;
            font-size: 2rem; font-weight: 900;
            box-shadow: 0 10px 0 #e65100;
            margin-bottom: 10px;
        }

        /* --- Lab Interaction Area --- */
        .lab-workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 100%;
            align-items: center;
        }

        .control-side {
            background: white; padding: 40px; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 6px solid white; text-align: center;
        }

        .q-text { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 30px; }
        .highlight { color: var(--liquid-orange); background: #fff7ed; padding: 0 15px; border-radius: 15px; }

        .input-group { display: flex; align-items: center; justify-content: center; gap: 18px; }
        input[type="number"] {
            width: 230px; height: 90px; font-size: 3.5rem;
            text-align: center; border: 4px solid #e2e8f0;
            border-radius: 25px; outline: none; font-weight: 900;
            color: var(--primary); background: #f8fafc;
        }
        input:focus { border-color: var(--primary); transform: scale(1.05); background: white; }
        .unit-lbl { font-size: 2.2rem; font-weight: 900; color: #94a3b8; }

        .visual-side {
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.4); border-radius: 50px; padding: 40px;
            min-height: 450px;
        }

        .pitcher-container {
            position: relative;
            width: var(--pitcher-width);
            height: var(--pitcher-height);
            background: rgba(255, 255, 255, 0.2);
            border: 8px solid rgba(255, 255, 255, 0.8);
            border-top: none;
            border-radius: 15px 15px 60px 60px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1), inset 0 0 30px rgba(255,255,255,0.5);
            display: flex; align-items: flex-end;
            overflow: visible;
        }
        .pitcher-container::after {
            content: ''; position: absolute; top: 40px; right: -50px;
            width: 50px; height: 140px;
            border: 8px solid rgba(255, 255, 255, 0.8);
            border-left: none; border-radius: 0 40px 40px 0;
        }

        .liquid {
            width: 100%; height: 0%;
            background: linear-gradient(to top, var(--liquid-orange), #fdba74);
            border-radius: 0 0 45px 45px;
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            opacity: 0.9;
        }
        .liquid::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 15px;
            background: rgba(255,255,255,0.3); border-radius: 50%; transform: translateY(-50%);
        }

        .tick-marks {
            position: absolute; left: 0; top: 0; bottom: 0; width: 30px;
            display: flex; flex-direction: column-reverse; justify-content: space-between;
            padding: 0 5px; pointer-events: none; z-index: 10;
        }
        .tick { width: 100%; height: 4px; background: rgba(0,0,0,0.3); position: relative; }
        .tick-label { position: absolute; left: 40px; top: -10px; font-weight: 900; font-size: 1.1rem; color: #5d4037; }

        .btn-pour {
            background: var(--primary); color: white; border: none;
            padding: 22px 100px; border-radius: 60px; font-size: 2.5rem;
            font-weight: 900; cursor: pointer; box-shadow: 0 10px 0 #e65100;
            margin-top: 10px;
        }
        .btn-pour:active { transform: translateY(4px); box-shadow: none; }

        /* --- Overlays --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 500px; width: 95%;
            border: 12px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.6rem; color: #555; margin-bottom: 40px; font-weight: bold; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #e65100;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 950px) {
            .lab-workspace { grid-template-columns: 1fr; }
            .grade-badge { width: 50px; height: 50px; font-size: 1.4rem; }
            h1 { font-size: 1.5rem; }
            .formula-banner { font-size: 1.4rem; padding: 10px 30px; }
            .q-text { font-size: 2.2rem; }
            input[type="number"] { width: 190px; height: 70px; font-size: 2.5rem; }
            .unit-lbl { font-size: 1.5rem; }
            .visual-side { height: auto; padding: 20px; }
            .score-pill { padding: 8px 20px; font-size: 1rem; }
            .btn-pour { font-size: 1.8rem; padding: 15px 60px; }
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left">
        <div class="grade-badge">3</div>
    </div>
    
    <h1 id="app-title">Volume Lab</h1>
    
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:8px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:8px">0</span></div>
    </div>

    <div class="formula-banner" id="formula-txt">1 ሊ = 1000 ሚ.ሊ</div>

    <div class="lab-workspace">
        <div class="control-side">
            <div class="q-text" id="q-display">--</div>
            <div class="input-group">
                <input type="number" id="user-input" placeholder="?" inputmode="numeric">
                <span class="unit-lbl" id="lbl-unit-target">ሚ.ሊ</span>
            </div>
        </div>

        <div class="visual-side">
            <div class="pitcher-container">
                <div class="tick-marks" id="pitcher-ticks">
                    <!-- JS generated -->
                </div>
                <div class="liquid" id="liquid-fill"></div>
            </div>
        </div>
    </div>

    <button class="btn-pour" id="btn-pour" onclick="checkAnswer()">ነዳ (Pour) 🧃</button>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🧃✨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ቀፅል</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: #ef4444;">
        <span class="modal-icon">🍂</span>
        <div class="modal-title" id="fail-title">እንደገና ፈትን!</div>
        <div class="modal-body">
            <span id="fail-body">ጸወታ ተወዲኡ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:#ef4444; font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="restartGame()" id="btn-restart" style="background:#ef4444; box-shadow: 0 10px 0 #991b1b;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "መዐቀኒ ትሕዝቶ",
            formula: "1 ሊ = 1000 ሚ.ሊ",
            unit: "ሚ.ሊ",
            pour: "ቅዳሕ (Pour) 🧃",
            score: "ነጥቢ", record: "ዝለዓለ",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ቀፅል",
            fail: "እንደገና ፈትን!", failSub: "ጸወታ ተወዲኡ።", final: "ውፅኢትካ",
            next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄",
            q1: "{v} ሊ = ",
            q2: "{v1} ሊ + {v2} ሚ.ሊ = "
        },
        am: {
            title: "የይዘት መለኪያ",
            formula: "1 ሊ = 1000 ሚ.ሊ",
            unit: "ሚ.ሊ",
            pour: "ቅዳ (Pour) 🧃",
            score: "ውጤት", record: "ከፍተኛ",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! ቀጥል",
            fail: "እንደገና ሞክር!", failSub: "ጨዋታው ተጠናቋል።", final: "የእርስዎ ውጤት",
            next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄",
            q1: "{v} ሊ = ",
            q2: "{v1} ሊ + {v2} ሚ.ሊ = "
        },
        en: {
            title: "Volume Conversion",
            formula: "1 L = 1000 mL",
            unit: "mL",
            pour: "Pour 🧃",
            score: "Score", record: "Record",
            win: "Correct!", winSub: "Great mixing! Keep it up",
            fail: "Oops!", failSub: "Game Over.", final: "Your Score",
            next: "Next Level ➡", restart: "Restart Game 🔄",
            q1: "{v} L = ",
            q2: "{v1} L + {v2} mL = "
        },
        om: {
            title: "Safara Qabiyyee",
            formula: "1 L = 1000 mL",
            unit: "mL",
            pour: "Naqi 🧃",
            score: "Qabxii", record: "Rikardii",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Itti fufi",
            fail: "Irra deebi'ii!", failSub: "Tapha dhumate.", final: "Qabxii Keessan",
            next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄",
            q1: "{v} L = ",
            q2: "{v1} L + {v2} mL = "
        },
        so: {
            title: "Beddelka Mugga",
            formula: "1 L = 1000 mL",
            unit: "mL",
            pour: "Shub 🧃",
            score: "Dhibco", record: "Rikoodh",
            win: "Sax!", winSub: "Shaqo fiican! Horay u soco",
            fail: "Isku day mar kale!", failSub: "Ciyaartu way dhammaatay.", final: "Dhibcahaaga",
            next: "Xiga ➡", restart: "Dib u billow 🔄",
            q1: "{v} L = ",
            q2: "{v1} L + {v2} mL = "
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('volumeConvHigh_V2') || 0;
    let currentProblem = {};
    const MAX_L = 5;

    // Confetti state
    let confettiRunning = false;
    let confettiPieces = [];
    let confettiAnimationId = null;

    function init() {
        document.getElementById('val-high').textContent = highScore;
        initTicks();
        updateLanguage();
        generateProblem();
    }

    function initTicks() {
        const container = document.getElementById('pitcher-ticks');
        container.innerHTML = '';
        for(let i=0; i<=MAX_L; i++) {
            const tick = document.createElement('div');
            tick.className = 'tick';
            if (i > 0) {
                const label = document.createElement('span');
                label.className = 'tick-label';
                label.textContent = i + 'L';
                tick.appendChild(label);
            }
            container.appendChild(tick);
        }
    }

    function generateProblem() {
        const type = Math.random() > 0.5 ? 1 : 2;
        const t = translations[currentLang];
        let qText, ans, fillLevel;

        if (type === 1) {
            const l = Math.floor(Math.random() * (MAX_L - 1)) + 1;
            qText = t.q1.replace('{v}', `<span class="highlight">${l}</span>`);
            ans = l * 1000;
            fillLevel = l;
        } else {
            const l = Math.floor(Math.random() * 3) + 1;
            const ml = (Math.floor(Math.random() * 5) + 1) * 100;
            qText = t.q2.replace('{v1}', `<span class="highlight">${l}</span>`).replace('{v2}', `<span class="highlight">${ml}</span>`);
            ans = (l * 1000) + ml;
            fillLevel = l + (ml / 1000);
        }

        currentProblem = { ans, fillLevel };
        document.getElementById('q-display').innerHTML = qText;
        document.getElementById('user-input').value = '';
        document.getElementById('liquid-fill').style.height = '0%';
        document.getElementById('user-input').focus();
    }

    function checkAnswer() {
        const val = parseInt(document.getElementById('user-input').value);
        if (isNaN(val)) return;

        // Visual animation
        document.getElementById('liquid-fill').style.height = ((currentProblem.fillLevel / MAX_L) * 100) + '%';
        playSound('pour');

        setTimeout(() => {
            if (val === currentProblem.ans) {
                score += 20;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('volumeConvHigh_V2', highScore);
                }
                updateScoreUI();
                startConfettiRain();
                playSound('win');
                document.getElementById('overlay-win').classList.add('show');
            } else {
                playSound('fail');
                document.getElementById('final-score-val').textContent = score;
                document.getElementById('overlay-fail').classList.add('show');
            }
        }, 1000);
    }

    function nextLevel() {
        stopConfettiRain();
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        stopConfettiRain();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('formula-txt').textContent = t.formula;
        document.getElementById('lbl-unit-target').textContent = t.unit;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('btn-pour').textContent = t.pour;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
        
        if(currentProblem.ans !== undefined) {
             const isMixed = document.getElementById('q-display').innerHTML.includes('+');
             if(!isMixed) {
                 const l = currentProblem.ans / 1000;
                 document.getElementById('q-display').innerHTML = t.q1.replace('{v}', `<span class="highlight">${l}</span>`);
             } else {
                 const l = Math.floor(currentProblem.ans / 1000);
                 const ml = currentProblem.ans % 1000;
                 document.getElementById('q-display').innerHTML = t.q2.replace('{v1}', `<span class="highlight">${l}</span>`).replace('{v2}', `<span class="highlight">${ml}</span>`);
             }
        }
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523, t); osc.frequency.exponentialRampToValueAtTime(1046, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else if (type === 'pour') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(800, t + 1);
            gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t + 1);
            osc.start(t); osc.stop(t + 1);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    function resizeConfettiCanvas() {
        const canvas = document.getElementById('confetti-canvas');
        if (!canvas) return;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function startConfettiRain() {
        if (confettiRunning) return;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        resizeConfettiCanvas();
        confettiRunning = true;
        confettiPieces = [];

        const colors = ['#f97316', '#22c55e', '#0ea5e9', '#e11d48', '#a855f7', '#facc15'];

        function addConfettiRow() {
            // spawn a row of pieces across the top
            const count = 40;
            for (let i = 0; i < count; i++) {
                confettiPieces.push({
                    x: Math.random() * canvas.width,
                    y: -10 - Math.random() * 40,
                    vx: (Math.random() - 0.5) * 2,
                    vy: 2 + Math.random() * 3,
                    size: 4 + Math.random() * 6,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * Math.PI * 2,
                    vr: (Math.random() - 0.5) * 0.2
                });
            }
        }

        function loop() {
            if (!confettiRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Occasionally add new confetti at the top
            if (Math.random() < 0.3) {
                addConfettiRow();
            }

            const gravity = 0.15;
            const wind = 0.02;

            confettiPieces.forEach(p => {
                p.vy += gravity;
                p.vx += (Math.random() - 0.5) * wind;
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.vr;
            });

            // Draw and keep only visible pieces
            confettiPieces = confettiPieces.filter(p => p.y < canvas.height + 50);
            confettiPieces.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();
            });

            confettiAnimationId = requestAnimationFrame(loop);
        }

        loop();
    }

    function stopConfettiRain() {
        confettiRunning = false;
        if (confettiAnimationId) {
            cancelAnimationFrame(confettiAnimationId);
            confettiAnimationId = null;
        }
        const canvas = document.getElementById('confetti-canvas');
        if (canvas && canvas.getContext) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        confettiPieces = [];
    }

    window.addEventListener('resize', () => {
        resizeConfettiCanvas();
    });

    window.onload = init;
</script>

</body>

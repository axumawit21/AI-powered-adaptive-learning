
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pizza Delivery Division - ምምቃል ርባሓት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-pizzeria: #fff7ed;
            --primary: #ea580c;    /* Pizza Orange */
            --secondary: #dc2626;  /* Oven Red */
            --accent: #fbbf24;     /* Cheese Yellow */
            --success: #22c55e;    /* Fresh Basil Green */
            --text-dark: #451a03;
            --white: #ffffff;
            --box-color: #fcd34d;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg-pizzeria);
            /* Chequered Tablecloth Pattern */
            background-image: 
                linear-gradient(45deg, #ffedd5 25%, transparent 25%, transparent 75%, #ffedd5 75%, #ffedd5),
                linear-gradient(45deg, #ffedd5 25%, transparent 25%, transparent 75%, #ffedd5 75%, #ffedd5);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--secondary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #991b1b; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--primary); font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px; font-weight: 800; color: var(--primary);
            height: 45px; background: white; border-radius: 22px;
            width: 170px; border: 2px solid var(--primary);
            box-shadow: 0 4px 0 rgba(234, 88, 12, 0.1);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 15px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #fff7ed; color: var(--primary); }

        /* --- Main Content --- */
        .container {
            flex: 1; width: 100%; max-width: 800px;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 20px;
        }

        .score-board { display: flex; gap: 20px; margin-bottom: 5px; }
        .score-pill {
            background: white; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--accent);
            box-shadow: 0 8px 0 rgba(251, 191, 36, 0.1);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }

        /* --- Oven Display --- */
        .oven-card {
            background: var(--secondary); padding: 30px; border-radius: 40px;
            box-shadow: 0 15px 0 #991b1b, 0 25px 50px rgba(0,0,0,0.2);
            width: 100%; max-width: 500px; text-align: center;
            border: 8px solid #7f1d1d;
        }
        .oven-display {
            background: #1e293b; padding: 25px; border-radius: 20px;
            color: var(--accent); font-family: 'Courier New', monospace;
            font-size: 3.5rem; font-weight: 900; letter-spacing: 2px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            border: 4px solid #475569; margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
        }
        .knobs { display: flex; justify-content: center; gap: 25px; }
        .knob { width: 25px; height: 25px; background: #334155; border-radius: 50%; box-shadow: 0 4px 0 #000; }

        /* --- Delivery Scene --- */
        .delivery-scene {
            width: 100%; height: 200px;
            display: flex; align-items: flex-end; justify-content: space-around;
            position: relative; margin: 20px 0;
        }
        .scooter-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            position: relative;
        }
        .scooter-icon { font-size: 4rem; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }
        .scooter-label { background: white; padding: 4px 12px; border-radius: 12px; font-weight: 800; font-size: 0.9rem; box-shadow: 0 4px 0 rgba(0,0,0,0.05); }
        
        .scooter-wrapper.driving { animation: driveAway 1.2s forwards; }
        @keyframes driveAway { to { transform: translateX(100vw); opacity: 0; } }

        /* --- Input Area --- */
        .input-card {
            width: 100%; max-width: 450px; background: white; padding: 25px;
            border-radius: 35px; box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
            border: 6px solid white;
        }
        .input-row { display: flex; align-items: center; gap: 15px; }
        input[type="number"] {
            width: 180px; height: 90px; font-size: 3.5rem; text-align: center;
            border: 4px solid #e2e8f0; border-radius: 20px; outline: none;
            font-weight: 900; color: var(--primary); background: #f8fafc;
        }
        input::-webkit-inner-spin-button { -webkit-appearance: none; }
        input:focus { border-color: var(--primary); background: white; transform: scale(1.05); }

        .btn-action {
            width: 100%; background: var(--success); color: white;
            border: none; padding: 20px; border-radius: 50px;
            font-size: 1.8rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 10px 0 #16a34a;
        }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        /* --- Reactions --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(69, 26, 3, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(12px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 12px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.4rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #9a3412;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.2rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .oven-display { font-size: 2rem; padding: 15px; }
            input[type="number"] { width: 120px; height: 70px; font-size: 2.2rem; }
            .btn-action { font-size: 1.4rem; padding: 15px; }
            .scooter-icon { font-size: 3rem; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Pizza Delivery</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="oven-card">
        <div class="oven-display" id="oven-display">-- ÷ --</div>
        <div class="knobs"><div class="knob"></div><div class="knob"></div><div class="knob"></div></div>
    </div>

    <div class="delivery-scene" id="scooters-area">
        <!-- Scooters Injected -->
    </div>

    <div class="input-card">
        <div class="input-row">
            <input type="number" id="user-ans" placeholder="?" inputmode="numeric">
        </div>
        <button class="btn-action" onclick="checkAnswer()" id="btn-check">Deliver Orders 🍕</button>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🛵🍕</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ፒዛ ተላኢኹ እዩ።</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--secondary);">
        <span class="modal-icon">🛑</span>
        <div class="modal-title" id="fail-title">እንደገና ፈትን!</div>
        <div class="modal-body" id="fail-body">መልሲ ጌጋ እዩ። እንደገና ፈትሽ።</div>
        <button class="btn-modal" onclick="closeFail()" id="btn-retry" style="background:var(--secondary); box-shadow: 0 10px 0 #991b1b;">እንደገና ፈትን 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ምምቃል ርባሓት", score: "ነጥቢ", record: "ዝለዓለ",
            check: "ፒዛ ልኣኽ 🍕", win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ፒዛ ተላኢኹ እዩ።",
            fail: "እንደገና ፈትን!", failSub: "መልሲ ጌጋ እዩ። እንደገና ፈትሽ።",
            next: "ቀፃሊ ➡", retry: "እንደገና ፈትን 🔄", bike: "ባይክ"
        },
        am: {
            title: "የብዛቶች ማካፈል", score: "ውጤት", record: "ከፍተኛ",
            check: "ፒዛውን ላክ 🍕", win: "ትክክል!", winSub: "በጣም ጎበዝ! ፒዛው ተልኳል።",
            fail: "እንደገና ይሞክሩ!", failSub: "መልሱ ልክ አይደለም። እንደገና ይሞክሩ።",
            next: "ቀጣይ ➡", retry: "እንደገና ሞክር 🔄", bike: "ባይክ"
        },
        en: {
            title: "Pizza Delivery", score: "Score", record: "Record",
            check: "Deliver Orders 🍕", win: "Correct!", winSub: "Excellent! The pizza is on its way.",
            fail: "Oops!", failSub: "Incorrect answer. Check your math and try again!",
            next: "Next Delivery ➡", retry: "Try Again 🔄", bike: "Bike"
        },
        om: {
            title: "Hiru Magaalichaa", score: "Qabxii", record: "Rikardii",
            check: "Piizzaa Ergi 🍕", win: "Sirrii!", winSub: "Baay'ee gaariidha! Piizzaan ergamaa jira.",
            fail: "Dogoggora!", failSub: "Deebiin dogoggora. Irra deebi'ii yaali.",
            next: "Itti Aanu ➡", retry: "Irra deebi'ii 🔄", bike: "Bike"
        },
        so: {
            title: "Qaybinta Pizza-ha", score: "Dhibco", record: "Rikoodh",
            check: "Pizza-ha Dir 🍕", win: "Sax!", winSub: "Aad u fiican! Pizza-hu waa socdaa.",
            fail: "Khalad!", failSub: "Jawaabtu waa qalad. Isku day mar kale!",
            next: "Xiga ➡", retry: "Mar kale isku day 🔄", bike: "Moto"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('pizzaDeliveryHigh_V1') || 0;
    let dividend, divisor, expectedAns;
    let isConfettiActive = false;

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function generateProblem() {
        // Hundreds or Thousands multiples
        const type = Math.random() > 0.5 ? 100 : 1000;
        const base = (Math.floor(Math.random() * 8) + 1) * type;
        divisor = Math.floor(Math.random() * 4) + 2; 
        
        // Ensure clean division
        dividend = Math.ceil(base / (divisor * type)) * (divisor * type);
        expectedAns = dividend / divisor;

        document.getElementById('oven-display').textContent = `${dividend} ÷ ${divisor}`;
        document.getElementById('user-ans').value = '';
        document.getElementById('user-ans').focus();
        
        renderScooters();
    }

    function renderScooters() {
        const area = document.getElementById('scooters-area');
        area.innerHTML = '';
        const t = translations[currentLang];
        // Show up to 4 scooters visually
        const count = Math.min(4, divisor);
        for(let i=0; i<count; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'scooter-wrapper';
            wrap.innerHTML = `
                <div class="scooter-label">${t.bike} ${i+1}</div>
                <div class="scooter-icon">🛵</div>
            `;
            area.appendChild(wrap);
        }
    }

    function checkAnswer() {
        const userAns = parseInt(document.getElementById('user-ans').value);
        if (isNaN(userAns)) return;

        if (userAns === expectedAns) {
            score += 30;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('pizzaDeliveryHigh_V1', highScore);
            }
            updateScoreUI();
            
            // Animation
            document.querySelectorAll('.scooter-wrapper').forEach((s, idx) => {
                setTimeout(() => s.classList.add('driving'), idx * 150);
            });
            
            playSound('win');
            startConfetti();
            setTimeout(() => {
                document.getElementById('overlay-win').classList.add('show');
            }, 1000);
        } else {
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function closeFail() {
        document.getElementById('overlay-fail').classList.remove('show');
    }

    function nextLevel() {
        stopConfetti();
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('btn-retry').textContent = t.retry;
        
        if (dividend) renderScooters();
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, t); osc.frequency.exponentialRampToValueAtTime(880, t + 0.15);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    // --- Confetti ---
    let pieces = [];
    function startConfetti() {
        isConfettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pieces = [];
        for(let i=0; i<150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 3,
                color: `hsl(${Math.random()*360}, 100%, 70%)`,
                size: Math.random() * 10 + 4
            });
        }
        function anim() {
            if (!isConfettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y > canvas.height) p.y = -20;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }
    function stopConfetti() {
        isConfettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    window.onload = init;
</script>
</body>
</html>

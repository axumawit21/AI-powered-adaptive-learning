
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Half & Quarter - Sweet Treat Bakery</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf2f8;
            --primary: #db2777;
            --secondary: #9333ea;
            --accent: #f59e0b;
            --plate: #ffffff;
            --text-dark: #4d0429;
            --white: #ffffff;
            --shadow: rgba(219, 39, 119, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--primary) 0.5px, transparent 0.5px),
                radial-gradient(var(--primary) 0.5px, #fdf2f8 0.5px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 20px var(--shadow);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--primary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #9d174d; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--text-dark); font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--primary);
            height: 48px; background: white; border-radius: 24px;
            width: 170px; border: 2px solid var(--primary);
            box-shadow: 0 4px 10px var(--shadow);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 20px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #fff1f2; color: var(--primary); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 1000px;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 25px;
        }

        .score-board { display: flex; gap: 20px; margin-bottom: 5px; }
        .score-pill {
            background: white; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--primary);
            box-shadow: 0 8px 0 rgba(219, 39, 119, 0.1);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }

        .instruction-box {
            background: white; padding: 15px 40px; border-radius: 40px;
            font-size: 1.4rem; font-weight: 800; color: var(--text-dark);
            box-shadow: 0 10px 20px var(--shadow); text-align: center;
            border: 4px solid var(--primary);
            max-width: 90%;
        }

        /* --- Bakery Stage --- */
        .bakery-stage {
            flex: 1; width: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        .main-tray {
            width: 300px; height: 300px;
            background: #fff; border: 8px solid #fdf2f8;
            border-radius: 50%; box-shadow: 0 20px 50px var(--shadow);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: visible;
        }
        
        .items-grid {
            display: grid; gap: 10px; justify-items: center; align-items: center;
            padding: 20px;
        }
        .item-donut { font-size: 3.5rem; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }

        .knife {
            position: absolute; top: -50px; left: 50%;
            width: 12px; height: 180px;
            background: linear-gradient(to right, #e2e8f0, #cbd5e1);
            border-radius: 6px; transform: translateX(-50%);
            opacity: 0; z-index: 50;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
        }
        .knife::after {
            content: ''; position: absolute; top: -50px; left: -14px;
            width: 40px; height: 70px; background: #334155; border-radius: 8px;
        }
        .cut-anim { animation: slice 0.6s ease-in-out; }
        @keyframes slice {
            0% { top: -200px; opacity: 1; }
            50% { top: 60px; }
            100% { top: -200px; opacity: 0; }
        }

        /* Distribution Area */
        .distribution-area {
            display: flex; gap: 20px; width: 100%;
            justify-content: center; min-height: 150px; margin-top: 30px;
            flex-wrap: wrap;
        }
        .mini-plate {
            width: 100px; height: 100px; background: white;
            border-radius: 50%; border: 4px solid #f1f5f9;
            display: flex; flex-wrap: wrap; justify-content: center;
            align-items: center; padding: 5px; position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .mini-plate.highlight { border-color: var(--secondary); transform: scale(1.15); box-shadow: 0 10px 30px rgba(147, 51, 234, 0.2); }
        .plate-label {
            position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%);
            background: var(--text-dark); color: white; padding: 2px 12px;
            border-radius: 10px; font-weight: bold; font-size: 0.8rem;
        }

        /* --- Buttons --- */
        .action-tray {
            width: 100%; max-width: 500px;
            display: flex; gap: 20px; margin-top: 20px;
        }
        .btn-split {
            flex: 1; height: 80px; border: none; border-radius: 25px;
            font-size: 1.4rem; font-weight: 900; color: white; cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1); position: relative;
        }
        .btn-split:active { transform: translateY(4px); box-shadow: none; }
        .btn-half { background: var(--primary); box-shadow: 0 8px 0 #9d174d; }
        .btn-quarter { background: var(--secondary); box-shadow: 0 8px 0 #6b21a8; }

        /* --- Reactions --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(77, 4, 41, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(12px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 12px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.4rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #9d174d;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 600px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.2rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .main-tray { width: 220px; height: 220px; }
            .mini-plate { width: 70px; height: 70px; }
            .item-donut { font-size: 2rem; }
            .action-tray { flex-direction: column; gap: 15px; }
            .btn-split { height: 60px; font-size: 1.2rem; border-radius: 9999px; }
            .instruction-box { font-size: 1.1rem; padding: 10px 20px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Sweet Bakery</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="instruction-box" id="lbl-instr">ነዞም ዶናት ናብ ማዕረ ክፋላት ምቐልዎም!</div>

    <div class="bakery-stage">
        <div class="knife" id="knife"></div>
        <div class="main-tray">
            <div class="items-grid" id="main-items">
                <!-- Items Injected -->
            </div>
        </div>

        <div class="distribution-area" id="plates-area">
            <!-- Target Plates Injected -->
        </div>
    </div>

    <div class="action-tray">
        <button class="btn-split btn-half" onclick="attemptSplit(2)" id="btn-half">ፍርቂ (1/2)</button>
        <button class="btn-split btn-quarter" onclick="attemptSplit(4)" id="btn-quarter">ርብዕ (1/4)</button>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🍩✨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ማዕረ ክፋላት ሰሪሕካ።</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: #ef4444;">
        <span class="modal-icon">🍪💨</span>
        <div class="modal-title" id="fail-title">ተጋግዩ!</div>
        <div class="modal-body">
            <span id="fail-body">እንደገና ፈትን። ቁፅሪ ዶናት ርአ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4.5rem; color:#ef4444; font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="retryLevel()" id="btn-restart" style="background:#ef4444; box-shadow: 0 10px 0 #991b1b;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ፍርቅን ርብዕን", instr: "ነዞም ዶናት ናብ ማዕረ ክፋላት ምቐልዎም!",
            score: "ነጥቢ", record: "ዝለዓለ",
            half: "ፍርቂ (1/2)", quarter: "ርብዕ (1/4)",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ማዕረ ክፋላት ሰሪሕካ።",
            fail: "ተጋግዩ!", failSub: "እንደገና ፈትን። ቁፅሪ ዶናት ርአ።",
            final: "ውፅኢትካ", next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄"
        },
        am: {
            title: "ግማሽ እና ሩብ", instr: "እነዚህን ዶናቶች በእኩል ክፍሎች ይከፋፍሏቸው!",
            score: "ውጤት", record: "ከፍተኛ",
            half: "ግማሽ (1/2)", quarter: "ሩብ (1/4)",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! እኩል ክፍሎችን ሰርተሃል።",
            fail: "ስህተት!", failSub: "እንደገና ይሞክሩ። የዶናቶቹን ብዛት ይመልከቱ።",
            final: "የእርስዎ ውጤት", next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄"
        },
        en: {
            title: "Half & Quarter", instr: "Split these treats into equal parts!",
            score: "Score", record: "Record",
            half: "Half (1/2)", quarter: "Quarter (1/4)",
            win: "Correct!", winSub: "Delicious! You made perfect equal parts.",
            fail: "Oops!", failSub: "Check the count! Try again.",
            final: "Your Score", next: "Next Level ➡", restart: "Restart Game 🔄"
        },
        om: {
            title: "Walakkaa fi Rubuu", instr: "Doonatoota kanneen bakka qixxeetti qoodi!",
            score: "Qabxii", record: "Rikardii",
            half: "Walakkaa (1/2)", quarter: "Rubuu (1/4)",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Qooda qixxee hojjetteetta.",
            fail: "Dogoggora!", failSub: "Irra deebi'ii yaali. Baay'ina doonatii ilaali.",
            final: "Qabxii Keessan", next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄"
        },
        so: {
            title: "Nus iyo Rubuc", instr: "U qaybi doonatyadan qaybo siman!",
            score: "Dhibco", record: "Rikoodh",
            half: "Nus (1/2)", quarter: "Rubuc (1/4)",
            win: "Sax!", winSub: "Shaqo fiican! Waxaad samaysay qaybo siman.",
            fail: "Khalad!", failSub: "Fiiri tirada doonatyada. Isku day mar kale.",
            final: "Dhibcahaaga", next: "Xiga ➡", restart: "Dib u billow 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('sweetBakeryHigh_V1') || 0;
    let currentTotal = 0;
    const donutIcons = ['🍩', '🍪', '🧁', '🍰', '🥨'];
    let currentIcon = '';
    let isConfettiActive = false;

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateOrder();
    }

    function generateOrder() {
        // Decide total (must be divisible by 2 or 4)
        const possible = [2, 4, 6, 8, 10, 12, 16];
        currentTotal = possible[Math.floor(Math.random() * possible.length)];
        currentIcon = donutIcons[Math.floor(Math.random() * donutIcons.length)];
        
        const grid = document.getElementById('main-items');
        grid.innerHTML = '';
        const cols = currentTotal > 8 ? 4 : 3;
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

        for(let i=0; i<currentTotal; i++) {
            const el = document.createElement('div');
            el.className = 'item-donut';
            el.textContent = currentIcon;
            el.style.animation = `float ${2+Math.random()}s ease-in-out infinite alternate`;
            grid.appendChild(el);
        }

        document.getElementById('plates-area').innerHTML = '';
    }

    function attemptSplit(divisor) {
        // Small click sound whenever a button is pressed
        playSound('click');

        if (currentTotal % divisor === 0) {
            // SUCCESS
            const knife = document.getElementById('knife');
            knife.classList.remove('cut-anim');
            void knife.offsetWidth; // trigger reflow
            knife.classList.add('cut-anim');
            playSound('slice');

            setTimeout(() => {
                animateDistribution(divisor);
            }, 500);
        } else {
            // FAIL
            handleFail();
        }
    }

    function animateDistribution(divisor) {
        const grid = document.getElementById('main-items');
        grid.innerHTML = '';
        
        const area = document.getElementById('plates-area');
        area.innerHTML = '';
        const plates = [];
        for(let i=0; i<divisor; i++) {
            const p = document.createElement('div');
            p.className = 'mini-plate';
            p.innerHTML = `<div class="plate-label">${i+1}</div>`;
            area.appendChild(p);
            plates.push(p);
        }

        const countPerPlate = currentTotal / divisor;
        let count = 0;

        const interval = setInterval(() => {
            if (count >= currentTotal) {
                clearInterval(interval);
                handleSuccess();
                return;
            }
            const target = plates[count % divisor];
            const item = document.createElement('div');
            item.className = 'item-donut';
            item.style.fontSize = '1.5rem';
            item.textContent = currentIcon;
            target.appendChild(item);
            target.classList.add('highlight');
            setTimeout(() => target.classList.remove('highlight'), 150);
            playSound('pop');
            count++;
        }, 220); // slower so students can see the counting clearly
    }

    function handleSuccess() {
        score += 25;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('sweetBakeryHigh_V1', highScore);
        }
        updateScoreUI();
        startConfetti();
        playSound('win');
        document.getElementById('overlay-win').classList.add('show');
    }

    function handleFail() {
        playSound('fail');
        document.getElementById('final-score-val').textContent = score;
        document.getElementById('overlay-fail').classList.add('show');
    }

    function nextLevel() {
        stopConfetti();
        document.getElementById('overlay-win').classList.remove('show');
        generateOrder();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateOrder();
    }

    function retryLevel() {
        // Close the fail overlay but keep the same donuts so the player can try again
        document.getElementById('overlay-fail').classList.remove('show');
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-instr').textContent = t.instr;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('btn-half').textContent = t.half;
        document.getElementById('btn-quarter').textContent = t.quarter;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // Audio
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523, t); osc.frequency.exponentialRampToValueAtTime(1046, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else if (type === 'slice') {
            osc.type = 'square'; osc.frequency.setValueAtTime(800, t); osc.frequency.linearRampToValueAtTime(200, t + 0.3);
            gain.gain.setValueAtTime(0.02, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
            osc.start(t); osc.stop(t + 0.3);
        } else {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, t);
            gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    }

    // Confetti
    let pieces = [];
    function startConfetti() {
        isConfettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pieces = [];
        for(let i=0; i<120; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 3,
                color: `hsl(${Math.random()*360}, 100%, 60%)`,
                size: Math.random() * 8 + 4
            });
        }
        function anim() {
            if (!isConfettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y > canvas.height) p.y = -20;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }
    function stopConfetti() {
        isConfettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    window.onload = init;
</script>
</body>

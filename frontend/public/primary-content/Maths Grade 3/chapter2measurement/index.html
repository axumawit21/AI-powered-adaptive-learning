
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Measurement Lab - መዐቀኒ ትኽክለኛነት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #37474F;
            --accent: #00E676;
            --ruler-yellow: #FFD54F;
            --wood: #8D6E63;
            --blueprint: #1A237E;
            --text-light: #F8F9FA;
            --cm-scale: 50px; /* Large scale for accuracy */
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background-color: #263238;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
            touch-action: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 2px solid rgba(255,255,255,0.1);
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--accent); color: #1B5E20; width: 50px; height: 50px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem; border: 3px solid white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        h1 { margin: 0; color: var(--text-light); font-size: 2.2rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text-light);
            height: 45px; background: rgba(255,255,255,0.1); border-radius: 22px;
            width: 160px; border: 2px solid rgba(255,255,255,0.3);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: #fff; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 15px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 700; color: #333; font-size: 0.9rem; }
        .custom-option:hover { background: #f0f9ff; color: var(--accent); }

        /* --- Game Area --- */
        .container {
            flex: 1; width: 100%; max-width: 1200px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; z-index: 10;
            justify-content: space-between;
        }

        .score-board { display: flex; gap: 20px; margin-bottom: 10px; }
        .score-pill {
            background: rgba(0,0,0,0.4); padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-light);
            border: 2px solid var(--accent);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.1rem;
        }

        /* Workbench */
        .workbench {
            width: 100%; flex: 1; position: relative;
            background: var(--blueprint); border: 10px solid #283593;
            border-radius: 40px; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 20px 0; overflow: hidden;
        }

        /* Object Spawner */
        .object-zone { position: relative; margin-bottom: 120px; transition: width 0.3s; z-index: 20; }
        .object-svg { height: 120px; width: 100%; filter: drop-shadow(10px 10px 10px rgba(0,0,0,0.4)); }

        /* Alignment Guides */
        .guide-line {
            position: absolute; top: 100%; height: 200px; width: 4px;
            background: rgba(255,255,255,0.2); transition: background 0.3s;
            pointer-events: none; border-radius: 2px;
        }
        .guide-line.active { background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        #guide-start { left: -2px; }
        #guide-end { right: -2px; }

        /* Giant Ruler */
        #ruler {
            position: absolute; top: 60%; left: 20px;
            width: min(780px, 100% - 40px); height: 100px;
            background: var(--ruler-yellow);
            border: 2px solid #FBC02D; border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.8);
            z-index: 100; cursor: grab; display: flex; align-items: flex-end;
            padding-left: 20px; padding-bottom: 10px; box-sizing: border-box;
        }
        #ruler.dragging { cursor: grabbing; transform: scale(1.02); opacity: 0.9; }

        .ruler-unit {
            position: absolute;
            bottom: 8px;
            right: 15px;
            font-weight: 900;
            font-size: 1.2rem;
            color: #5D4037;
        }

        .cm-mark {
            width: var(--cm-scale); height: 100%; border-left: 3px solid rgba(0,0,0,0.7);
            position: relative; flex-shrink: 0;
        }
        .cm-mark[data-val="0"] { border-left-color: #D32F2F; border-left-width: 5px; }
        .cm-mark::after {
            content: attr(data-val); position: absolute; top: 20px; left: -10px;
            width: 20px; text-align: center; font-weight: 900; font-size: 1.4rem; color: #333;
        }
        .mm-marks {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 25px;
            display: flex; justify-content: space-evenly;
        }
        .mm-tick { width: 1px; height: 100%; background: rgba(0,0,0,0.4); }
        .mm-tick.mid { height: 150%; width: 2px; background: rgba(0,0,0,0.6); }

        /* Control Panel */
        .input-panel {
            width: 100%; max-width: 600px; padding: 20px;
            background: white; border-radius: 30px;
            display: flex; gap: 20px; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .input-group { display: flex; align-items: center; gap: 10px; }
        input[type="number"] {
            width: 120px; height: 70px; font-size: 3rem; text-align: center;
            border: 4px solid #eee; border-radius: 20px; outline: none;
            font-weight: 900; color: var(--primary); background: #f8fafc;
        }
        input:focus { border-color: var(--accent); background: white; }

        .btn-check {
            background: var(--accent); color: #1B5E20; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 1.6rem;
            font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #00C853;
        }
        .btn-check:active { transform: translateY(4px); box-shadow: none; }

        /* Modals */
        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        .modal {
            background: white; padding: 40px; border-radius: 40px;
            text-align: center; max-width: 450px; width: 95%;
            border: 10px solid var(--accent);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 6rem; display: block; margin-bottom: 20px; }
        .modal-title { font-size: 2.2rem; font-weight: 900; color: #222; margin-bottom: 10px; }
        .modal-btn {
            background: var(--accent); color: #1B5E20; border: none;
            padding: 15px 50px; border-radius: 50px; font-weight: 900;
            font-size: 1.4rem; cursor: pointer; box-shadow: 0 6px 0 #00C853;
            margin-top: 20px; width: 100%;
        }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 850px) {
            header { padding: 10px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.4rem; }
            :root { --cm-scale: 30px; }
            #ruler { height: 80px; }
            .object-svg { height: 80px; }
            .object-zone { margin-bottom: 80px; }
            input[type="number"] { width: 80px; height: 50px; font-size: 1.8rem; }
            .btn-check { font-size: 1.1rem; padding: 10px 25px; }
        }

        @media (max-width: 500px) {
            .score-board { flex-direction: column; align-items: stretch; }
            .score-pill { justify-content: center; font-size: 1rem; }
            .input-panel { flex-direction: column; gap: 12px; padding: 15px; }
            .input-group { width: 100%; justify-content: center; }
            #ruler { top: 65%; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">5</div></div>
    <h1 id="app-title">Measurement Lab</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score">0</span></div>
    </div>

    <div class="workbench" id="workbench">
        <div class="object-zone" id="object-zone">
            <div id="guide-start" class="guide-line"></div>
            <div id="guide-end" class="guide-line"></div>
            <div id="svg-container"></div>
        </div>

        <div id="ruler">
            <div id="ticks-container" style="display:flex; height:100%; align-items:flex-end;"></div>
            <div class="ruler-unit">cm</div>
        </div>
    </div>

    <div class="input-panel">
        <div class="input-group">
            <input type="number" id="user-input" placeholder="?" inputmode="numeric">
            <span style="font-size:2rem; font-weight:900; color:#555">cm</span>
        </div>
        <button class="btn-check" id="btn-check" onclick="checkAnswer()">ፈትሽ (Check) ✔️</button>
    </div>
</div>

<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🛠️💎</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <button class="modal-btn" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-wrong">
    <div class="modal">
        <span class="modal-icon">❌</span>
        <div class="modal-title" id="wrong-title">Not quite.</div>
        <p id="wrong-score" style="font-size:1.6rem; font-weight:700; margin-top:10px; margin-bottom:0; color:#444;">
            Score: 0
        </p>
        <button class="modal-btn" onclick="restartGame()" id="btn-restart">Start again 🔁</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "መዐቀኒ", record: "ዝለዓለ", score: "ነጥቢ", check: "ፈትሽ ✔️", next: "ቀፃሊ ➡", win: "ትኽክል!", wrong: "ተጋግዮም!", restart: "ደጊምካ ጀምር",
            objs: ["እርሳስ", "መጋዝ", "ጣውላ", "መክፈቲ", "ምስማር"]
        },
        am: {
            title: "የመለኪያ ትክክለኛነት", record: "ከፍተኛ", score: "ውጤት", check: "ፈትሽ ✔️", next: "ቀጣይ ➡", win: "ትክክል!", wrong: "አይደለም", restart: "እንደገና መጀመር",
            objs: ["እርሳስ", "መጋዝ", "እንጨት", "መፍቻ", "ምስማር"]
        },
        en: {
            title: "Measurement Lab", record: "Record", score: "Score", check: "Check ✔️", next: "Next ➡", win: "Correct!", wrong: "Not quite right.", restart: "Start again",
            objs: ["Pencil", "Saw", "Board", "Wrench", "Nail"]
        },
        om: {
            title: "Safara Sirrii", record: "Rikardii", score: "Qabxii", check: "Mirkaneessi ✔️", next: "Itti Aanu ➡", win: "Sirrii!", wrong: "Dogoggora, irra deebiin yaali!", restart: "Irraa jalqabaa",
            objs: ["Irsaasii", "Hoomachuu", "Booddii", "Furtuu", "Mismaara"]
        },
        so: {
            title: "Cabbirka Saxda ah", record: "Rikoodh", score: "Dhibco", check: "Hubi ✔️", next: "Xiga ➡", win: "Sax!", wrong: "Kuma sax ma aha.", restart: "Dib u bilow",
            objs: ["Qalin", "Miishaar", "Loox", "Fure", "Musbaar"]
        }
    };

    // Single measuring tool (pencil) that stretches with the container width
    const SVGS = [
        `<svg class="object-svg" viewBox="0 0 400 100" preserveAspectRatio="none">
            <rect x="0" y="20" width="40" height="60" fill="#EF5350" rx="5"/>
            <rect x="40" y="20" width="320" height="60" fill="#FBC02D"/>
            <polygon points="360,20 400,50 360,80" fill="#FFE082"/>
            <polygon points="390,40 400,50 390,60" fill="#333"/>
        </svg>`
    ];

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('measureLabHigh_V1') || 0;
    let currentLen = 0;
    let ruler = document.getElementById('ruler');
    let objZone = document.getElementById('object-zone');

    function init() {
        document.getElementById('val-high').textContent = highScore;
        initRuler();
        updateLanguage();
        generateProblem();
        makeDraggable(ruler);
    }

    function initRuler() {
        const c = document.getElementById('ticks-container');
        c.innerHTML = '';
        for(let i=0; i<=15; i++) {
            const mark = document.createElement('div');
            mark.className = 'cm-mark';
            mark.setAttribute('data-val', i);
            if(i < 15) {
                const mms = document.createElement('div');
                mms.className = 'mm-marks';
                for(let j=1; j<10; j++) {
                    const tick = document.createElement('div');
                    tick.className = 'mm-tick' + (j===5 ? ' mid' : '');
                    mms.appendChild(tick);
                }
                mark.appendChild(mms);
            }
            c.appendChild(mark);
        }
    }

    function generateProblem() {
        currentLen = Math.floor(Math.random() * 10) + 4; // 4 to 14 cm
        const cmScale = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cm-scale'));
        objZone.style.width = (currentLen * cmScale) + 'px';
        document.getElementById('svg-container').innerHTML = SVGS[0];
        
        ruler.style.left = '100px';
        ruler.style.top = '60%';
        document.getElementById('user-input').value = '';
        checkAlignment();
    }

    function checkAlignment() {
        const rRect = ruler.getBoundingClientRect();
        const oRect = objZone.getBoundingClientRect();
        const offset = 20; // Ruler padding-left
        const diff = Math.abs((rRect.left + offset) - oRect.left);
        
        if(diff < 10) {
            document.getElementById('guide-start').classList.add('active');
            document.getElementById('guide-end').classList.add('active');
        } else {
            document.getElementById('guide-start').classList.remove('active');
            document.getElementById('guide-end').classList.remove('active');
        }
    }

    function checkAnswer() {
        const val = parseInt(document.getElementById('user-input').value);
        if (isNaN(val)) return;

        if (val === currentLen) {
            score += 25;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('measureLabHigh_V1', highScore);
            }
            updateScoreUI();
            playSound('win');
            triggerConfetti();
            document.getElementById('overlay-win').classList.add('show');
        } else {
            playSound('fail');
            showWrongOverlay();
        }
    }

    function nextLevel() {
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('btn-next').textContent = t.next;
        const wrongTitle = document.getElementById('wrong-title');
        const wrongScore = document.getElementById('wrong-score');
        const restartBtn = document.getElementById('btn-restart');
        if (wrongTitle) wrongTitle.textContent = t.wrong;
        if (wrongScore) wrongScore.textContent = `${t.score}: ${score}`;
        if (restartBtn) restartBtn.textContent = t.restart;
    }

    function showWrongOverlay() {
        const t = translations[currentLang];
        const wrongTitle = document.getElementById('wrong-title');
        const wrongScore = document.getElementById('wrong-score');
        if (wrongTitle) wrongTitle.textContent = t.wrong;
        if (wrongScore) wrongScore.textContent = `${t.score}: ${score}`;
        document.getElementById('overlay-wrong').classList.add('show');
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-wrong').classList.remove('show');
        generateProblem();
    }

    function makeDraggable(el) {
        let px=0, py=0, x=0, y=0;
        el.onmousedown = dragStart;
        el.ontouchstart = dragStart;

        function dragStart(e) {
            e.preventDefault();
            el.classList.add('dragging');
            const touch = e.type === 'touchstart' ? e.touches[0] : e;
            x = touch.clientX; y = touch.clientY;
            document.onmousemove = dragMove;
            document.ontouchmove = dragMove;
            document.onmouseup = dragEnd;
            document.ontouchend = dragEnd;
        }

        function dragMove(e) {
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            px = x - touch.clientX; py = y - touch.clientY;
            x = touch.clientX; y = touch.clientY;
            el.style.top = (el.offsetTop - py) + "px";
            el.style.left = (el.offsetLeft - px) + "px";
            checkAlignment();
        }

        function dragEnd() {
            el.classList.remove('dragging');
            document.onmousemove = null; document.ontouchmove = null;
            document.onmouseup = null; document.ontouchend = null;
        }
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(523, t); osc.frequency.exponentialRampToValueAtTime(1046, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<140; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: -20,
                vx: (Math.random() - 0.5) * 10,
                vy: Math.random() * 8 + 4,
                color: `hsl(${Math.random()*360}, 100%, 50%)`, size: Math.random() * 10 + 5
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let alive = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.4;
                if (p.y < canvas.height) {
                    ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                    alive = true;
                }
            });
            if (alive) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>

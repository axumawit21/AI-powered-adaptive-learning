
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Length Conversion - Highway Trip</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #0ea5e9;
            --sky-bottom: #bae6fd;
            --grass: #22c55e;
            --road: #334155;
            --sign-green: #14532d;
            --primary: #4361ee;
            --secondary: #f72585;
            --accent: #fbbf24;
            --text-dark: #0f172a;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 50%, var(--grass) 50%, #166534 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 4px solid var(--text-dark);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--secondary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #9f1239; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--text-dark); font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--text-dark);
            height: 48px; background: white; border-radius: 24px;
            width: 170px; border: 2px solid var(--text-dark);
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 20px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #f0f9ff; color: var(--sky-top); }

        /* --- Game Area --- */
        .container {
            flex: 1; width: 100%; max-width: 1100px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; z-index: 10;
            justify-content: flex-start;
            gap: 25px;
        }

        .score-board { display: flex; gap: 20px; }
        .score-pill {
            background: white; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--text-dark);
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }

        .formula-card {
            background: #fef9c3; color: #854d0e;
            padding: 12px 40px; border-radius: 20px;
            font-size: 1.4rem; font-weight: 800;
            border: 3px solid #facc15;
            box-shadow: 0 5px 0 rgba(0,0,0,0.05);
            text-align: center;
        }

        /* --- Highway Sign --- */
        .sign-pole { width: 12px; height: 100px; background: #94a3b8; border-radius: 5px; margin-bottom: -5px; }
        .highway-sign {
            background: var(--sign-green);
            color: white; border: 4px solid white;
            padding: 30px 50px; border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            text-align: center;
            min-width: 350px;
            position: relative;
        }

        .q-display { font-size: 3rem; font-weight: 900; margin-bottom: 20px; text-shadow: 2px 2px 0 rgba(0,0,0,0.4); }
        .highlight { color: var(--accent); }

        .input-group { display: flex; align-items: center; justify-content: center; gap: 15px; }
        input[type="number"] {
            width: 150px; height: 80px; font-size: 3rem;
            text-align: center; border: 4px solid #fff;
            border-radius: 15px; outline: none; font-weight: 900;
            color: var(--sign-green); background: #f0fdf4;
        }
        .unit-lbl { font-size: 2rem; font-weight: 900; color: #bbf7d0; }

        /* --- Road Scene --- */
        .road-container {
            width: 100%; height: 160px;
            background: var(--road);
            border-top: 6px solid #475569; border-bottom: 6px solid #475569;
            position: relative; overflow: hidden;
            display: flex; align-items: center;
            margin: 20px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .road-stripes {
            width: 100%; height: 4px;
            background: repeating-linear-gradient(90deg, #fbbf24 0, #fbbf24 40px, transparent 40px, transparent 80px);
            position: absolute; top: 50%; transform: translateY(-50%);
        }
        .car-emoji {
            font-size: 5rem; position: absolute; left: 20px;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            transition: left 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 50;
        }

        .btn-drive {
            background: #f97316; color: white; border: none;
            padding: 20px 80px; border-radius: 60px; font-size: 2.2rem;
            font-weight: 900; cursor: pointer; box-shadow: 0 10px 0 #ea580c;
            margin-top: 10px;
        }
        .btn-drive:active { transform: translateY(4px); box-shadow: none; }

        /* --- Overlays --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 500px; width: 95%;
            border: 12px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.6rem; color: #555; margin-bottom: 40px; font-weight: bold; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #023e8a;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 850px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.3rem; }
            .highway-sign { min-width: 90%; padding: 20px; }
            .q-display { font-size: 2rem; }
            input[type="number"] { width: 110px; height: 60px; font-size: 2rem; }
            .unit-lbl { font-size: 1.4rem; }
            .car-emoji { font-size: 3.5rem; }
            .btn-drive { font-size: 1.6rem; padding: 15px 50px; }
            .score-pill { padding: 8px 15px; font-size: 0.9rem; }
            .formula-card { font-size: 1rem; padding: 8px 20px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Highway Trip</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="formula-card" id="formula-txt">1 ሜ = 100 ሳ.ሜ | 1 ኪ.ሜ = 1000 ሜ</div>

    <div style="display:flex; flex-direction:column; align-items:center;">
        <div class="sign-pole"></div>
        <div class="highway-sign">
            <div class="q-display" id="q-text">--</div>
            <div class="input-group">
                <input type="number" id="user-input" placeholder="?" inputmode="numeric">
                <span class="unit-lbl" id="target-unit">--</span>
            </div>
        </div>
    </div>

    <div class="road-container">
        <div class="road-stripes"></div>
        <div class="car-emoji" id="player-car">🚗</div>
    </div>

    <button class="btn-drive" id="btn-drive" onclick="checkAnswer()">ነዳ (Drive) 🏎️</button>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🏎️💨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ቀፅል</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--secondary);">
        <span class="modal-icon">🏚️</span>
        <div class="modal-title" id="fail-title">እንደገና ፈትን!</div>
        <div class="modal-body">
            <span id="fail-body">ጸወታ ተወዲኡ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:var(--secondary); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="restartGame()" id="btn-restart" style="background:var(--secondary); box-shadow: 0 10px 0 #9f1239;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ምቅያር ኣሃዱታት",
            formula: "1 ሜ = 100 ሳ.ሜ | 1 ኪ.ሜ = 1000 ሜ",
            score: "ነጥቢ", record: "ዝለዓለ", drive: "ሸፍር🏎️",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ቀፅል",
            fail: "እንደገና ፈትን!", failSub: "ጸወታ ተወዲኡ።", final: "ውፅኢትካ",
            next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄",
            units: { m: "ሜ", cm: "ሳ.ሜ", km: "ኪ.ሜ" }
        },
        am: {
            title: "የመለኪያ ክፍሎች",
            formula: "1 ሜ = 100 ሳ.ሜ | 1 ኪ.ሜ = 1000 ሜ",
            score: "ውጤት", record: "ከፍተኛ", drive: "ንዳ 🏎️",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! ቀጥል",
            fail: "እንደገና ሞክር!", failSub: "ጨዋታው ተጠናቋል።", final: "የእርስዎ ውጤት",
            next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄",
            units: { m: "ሜ", cm: "ሳ.ሜ", km: "ኪ.ሜ" }
        },
        en: {
            title: "Highway Trip",
            formula: "1 m = 100 cm | 1 km = 1000 m",
            score: "Score", record: "Record", drive: "Drive 🏎️",
            win: "Correct!", winSub: "Vroom! Excellent job",
            fail: "Oops!", failSub: "Game Over.", final: "Your Score",
            next: "Next Level ➡", restart: "Restart Game 🔄",
            units: { m: "m", cm: "cm", km: "km" }
        },
        om: {
            title: "Safara Dheerinaa",
            formula: "1 m = 100 cm | 1 km = 1000 m",
            score: "Qabxii", record: "Rikardii", drive: "Konkolaachisi 🏎️",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Itti fufi",
            fail: "Irra deebi'ii!", failSub: "Tapha dhumate.", final: "Qabxii Keessan",
            next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄",
            units: { m: "m", cm: "cm", km: "km" }
        },
        so: {
            title: "Cabbirka Dhererka",
            formula: "1 m = 100 cm | 1 km = 1000 m",
            score: "Dhibco", record: "Rikoodh", drive: "Kaxee 🏎️",
            win: "Sax!", winSub: "Shaqo fiican! Horay u soco",
            fail: "Isku day mar kale!", failSub: "Ciyaartu way dhammaatay.", final: "Dhibcahaaga",
            next: "Xiga ➡", restart: "Dib u billow 🔄",
            units: { m: "m", cm: "cm", km: "km" }
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('highwayTripHigh_V1') || 0;
    let currentProblem = { ans: 0 };

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function generateProblem() {
        const type = Math.floor(Math.random() * 4);
        const t = translations[currentLang];
        let qText, targetUnit, ans;

        if (type === 0) { // m -> cm
            let m = Math.floor(Math.random() * 9) + 1;
            qText = `<span class="highlight">${m}</span> ${t.units.m} = `;
            targetUnit = t.units.cm;
            ans = m * 100;
        } else if (type === 1) { // km -> m
            let km = Math.floor(Math.random() * 9) + 1;
            qText = `<span class="highlight">${km}</span> ${t.units.km} = `;
            targetUnit = t.units.m;
            ans = km * 1000;
        } else if (type === 2) { // Mixed addition m + cm
            let m = Math.floor(Math.random() * 5) + 1;
            let cm = Math.floor(Math.random() * 80) + 10;
            qText = `<span class="highlight">${m}</span> ${t.units.m} + <span class="highlight">${cm}</span> ${t.units.cm} = `;
            targetUnit = t.units.cm;
            ans = (m * 100) + cm;
        } else { // Mixed addition km + m
            let km = Math.floor(Math.random() * 5) + 1;
            let m = Math.floor(Math.random() * 800) + 100;
            qText = `<span class="highlight">${km}</span> ${t.units.km} + <span class="highlight">${m}</span> ${t.units.m} = `;
            targetUnit = t.units.m;
            ans = (km * 1000) + m;
        }

        currentProblem = { ans };
        document.getElementById('q-text').innerHTML = qText;
        document.getElementById('target-unit').textContent = targetUnit;
        document.getElementById('user-input').value = '';
        document.getElementById('player-car').style.left = '20px';
        document.getElementById('user-input').focus();
    }

    function checkAnswer() {
        const val = parseInt(document.getElementById('user-input').value);
        if (isNaN(val)) return;

        if (val === currentProblem.ans) {
            // Success
            score += 20;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('highwayTripHigh_V1', highScore);
            }
            updateScoreUI();
            
            // Drive animation
            const car = document.getElementById('player-car');
            const roadWidth = document.querySelector('.road-container').offsetWidth;
            car.style.left = (roadWidth - 100) + 'px';
            
            playSound('win');
            triggerConfetti();
            setTimeout(() => {
                document.getElementById('overlay-win').classList.add('show');
            }, 1000);
        } else {
            // Fail
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function nextLevel() {
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('formula-txt').textContent = t.formula;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('btn-drive').textContent = t.drive;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
            generateProblem(); // Re-gen to update unit text
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, t); osc.frequency.exponentialRampToValueAtTime(880, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<100; i++) {
            pieces.push({
                x: canvas.width / 2, y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 25, vy: (Math.random() - 0.5) * 25 - 10,
                color: `hsl(${Math.random()*360}, 100%, 50%)`, size: Math.random() * 10 + 5
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let alive = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.7;
                if (p.y < canvas.height) {
                    ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                    alive = true;
                }
            });
            if (alive) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>

</body>
</html>

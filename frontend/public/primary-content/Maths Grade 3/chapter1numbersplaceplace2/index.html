
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Expanded Form - Fruit Market Adventure</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --market-bg: #fdf0d5;
            --wood-dark: #6d4c41;
            --wood-light: #a1887f;
            --apple: #d62828;
            --basket: #f9c74f;
            --crate: #ae8b70;
            --pallet: #5d4037;
            --primary: #4361ee;
            --secondary: #f72585;
            --success: #06d6a0;
            --text-dark: #2b2d42;
        }

        * { box-sizing: border-box; transition: all 0.2s ease-out; }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--market-bg);
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(67, 97, 238, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 90%, rgba(247, 37, 133, 0.05) 0%, transparent 20%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        header {
            width: 100%;
            padding: 12px 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            z-index: 100;
            border-bottom: 4px solid var(--wood-dark);
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--secondary); color: white; width: 45px; height: 45px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.4rem; border: 3px solid white;
            box-shadow: 0 3px 0 #b5179e; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--wood-dark); font-size: 1.6rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--wood-dark);
            height: 40px; background: white; border-radius: 20px;
            width: 150px; border: 2px solid var(--wood-dark);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 15px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 2px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 8px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #444; font-size: 0.9rem; }
        .custom-option:hover { background: #f0f9ff; color: var(--primary); }

        /* Main Container */
        .container {
            flex: 1; width: 100%; max-width: 1100px;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; z-index: 10;
            justify-content: center;
            gap: 20px;
        }

        .score-board { display: flex; gap: 15px; }
        .score-pill {
            background: white; padding: 8px 20px; border-radius: 25px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--wood-dark);
            box-shadow: 0 4px 0 rgba(109, 76, 65, 0.1);
            display: flex; align-items: center; gap: 8px;
            font-size: 1.1rem;
        }

        .instruction {
            font-size: 1.2rem; font-weight: 700; color: var(--text-dark);
            background: rgba(255,255,255,0.85); padding: 12px 30px;
            border-radius: 40px; text-align: center;
            border: 3px dashed var(--wood-dark);
            max-width: 90%;
        }

        .sample-hint {
            font-size: 0.9rem; color: #7f5539; font-weight: 800;
            background: #fefae0; padding: 6px 18px; border-radius: 12px;
            border: 2px solid #e9edc9;
            animation: fadeIn 0.5s ease forwards;
        }
        .sample-hint.hidden { display: none; }

        /* --- The Market Shelf --- */
        .market-shelf {
            display: flex; width: 100%; justify-content: center;
            align-items: flex-end; gap: 12px;
            background: var(--wood-dark); padding: 25px 12px 12px 12px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            position: relative; flex-wrap: wrap;
        }

        .shelf-column {
            flex: 1; min-width: 100px; display: flex; flex-direction: column-reverse;
            align-items: center; min-height: 180px; position: relative; z-index: 2;
        }

        .column-label {
            position: absolute; bottom: -45px;
            background: var(--wood-light); color: white;
            padding: 4px 10px; border-radius: 8px; font-weight: 800;
            font-size: 0.8rem; white-space: nowrap;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        /* Scaled Visuals */
        .item-visual { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; opacity: 0; }
        
        .pallet-1000 {
            width: 90px; height: 60px; background: #8d6e63;
            border: 4px solid #4e342e; border-radius: 8px; margin-bottom: 4px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #3e2723; font-size: 1rem;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }

        .crate-100 {
            width: 75px; height: 50px; background: #ae8b70;
            border: 3px solid #5d4037; border-radius: 6px; margin-bottom: 3px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #3e2723; font-size: 0.9rem;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .basket-10 {
            width: 60px; height: 45px; background: #fbc02d;
            border: 3px solid #f57f17; border-radius: 4px 4px 12px 12px; margin-bottom: 3px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #e65100; font-size: 1rem;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }

        .apple-1 {
            width: 32px; height: 32px; background: radial-gradient(circle at 30% 30%, #ff5252, #d32f2f);
            border-radius: 50%; border: 2px solid #b71c1c; margin-bottom: 2px;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2); position: relative;
        }
        .apple-1::after { content: ''; position: absolute; top: -4px; left: 50%; width: 5px; height: 4px; background: #4caf50; border-radius: 50% 0; transform: translateX(-50%); }

        @keyframes popIn { 0% { transform: scale(0) translateY(10px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

        /* --- Equation Area --- */
        .equation-bar {
            display: flex; align-items: center; justify-content: center;
            flex-wrap: wrap; gap: 10px; background: white;
            padding: 20px; border-radius: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            width: 100%; border: 3px solid white;
        }

        .input-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .input-label { font-size: 0.75rem; font-weight: 800; color: #999; text-transform: uppercase; }

        input[type="text"] {
            width: 95px; height: 60px;
            font-size: 1.8rem; text-align: center;
            border: 3px solid #e2e8f0; border-radius: 18px;
            font-family: inherit; font-weight: 900; outline: none;
            color: var(--wood-dark); background: #f8fafc;
        }
        input[type="text"]:focus { border-color: var(--primary); background: white; transform: scale(1.05); }
        
        .symbol { font-size: 1.8rem; font-weight: 900; color: var(--wood-light); margin: 0 4px; }
        .input-total { width: 140px !important; border-color: var(--success) !important; background: #f0fff4 !important; color: var(--success) !important; }

        .btn-check-main {
            width: 100%; max-width: 350px;
            background: var(--success); color: white; border: none;
            padding: 16px; border-radius: 40px; font-size: 1.6rem;
            font-weight: 900; cursor: pointer; box-shadow: 0 6px 0 #047857;
            margin-top: 5px;
        }
        .btn-check-main:active { transform: translateY(4px); box-shadow: none; }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; background: rgba(43, 45, 66, 0.92);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(10px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 40px; border-radius: 40px;
            text-align: center; max-width: 450px; width: 95%;
            border: 10px solid var(--primary);
            box-shadow: 0 30px 100px rgba(0,0,0,0.5);
        }
        
        .modal-icon { font-size: 6rem; display: block; margin-bottom: 20px; }
        .modal-title { font-size: 2.5rem; font-weight: 900; color: var(--text-dark); margin-bottom: 10px; }
        .modal-body { font-size: 1.3rem; color: #555; margin-bottom: 30px; font-weight: bold; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 15px 50px; border-radius: 50px; font-weight: 900;
            font-size: 1.4rem; cursor: pointer; box-shadow: 0 6px 0 #3046bd;
        }
        .btn-modal:active { transform: translateY(4px); box-shadow: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 700px) {
            header { grid-template-columns: auto 1fr auto; gap: 10px; }
            h1 { font-size: 1.2rem; }
            .grade-badge { width: 38px; height: 38px; font-size: 1.1rem; }
            /* Keep 1000s, 100s, 10s, 1s in one parallel row */
            .market-shelf { gap: 8px; padding-bottom: 40px; flex-wrap: nowrap; overflow-x: auto; }
            .shelf-column { min-width: 80px; min-height: 150px; margin-bottom: 30px; }
            .equation-bar { flex-direction: column; border-radius: 20px; gap: 8px; padding: 15px; width: 100%; }
            .input-group { width: 100%; flex-direction: row; justify-content: space-between; padding: 0 5px; }
            input[type="text"] { width: 120px; height: 50px; font-size: 1.5rem; }
            .symbol { font-size: 1.4rem; margin: 0; transform: rotate(90deg); display: none; }
            .input-label { margin-left: 5px; }
            .score-pill { font-size: 0.9rem; padding: 6px 15px; }
            .instruction { font-size: 1rem; padding: 10px 20px; }
        }

        /* Extra-small phones */
        @media (max-width: 400px) {
            .container { padding: 15px 10px; }
            .market-shelf { padding: 16px 6px 32px 6px; }
            /* Slightly smaller columns so four fit better side by side */
            .shelf-column { min-width: 70px; min-height: 140px; }
            input[type="text"] { width: 105px; height: 46px; font-size: 1.3rem; }
            .btn-check-main { font-size: 1.4rem; padding: 14px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Expanded Form</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="instruction" id="lbl-instr">ዝተረፉ ሳንዱቅ መሊእኩም ድምር ድለዩ!</div>
    <div class="sample-hint" id="sample-hint">Sample: 2000 + 300 + 40 + 5 = 2345</div>

    <div class="market-shelf">
        <div class="shelf-column" id="col-1000"><div class="column-label" id="lbl-1000s">1000s</div></div>
        <div class="shelf-column" id="col-100"><div class="column-label" id="lbl-100s">100s</div></div>
        <div class="shelf-column" id="col-10"><div class="column-label" id="lbl-10s">10s</div></div>
        <div class="shelf-column" id="col-1"><div class="column-label" id="lbl-1s">1s</div></div>
    </div>

    <div class="equation-bar">
        <div class="input-group">
            <span class="input-label" id="il-1000">1000s</span>
            <input type="text" id="in-1000" placeholder="" inputmode="numeric">
        </div>
        <span class="symbol">+</span>
        <div class="input-group">
            <span class="input-label" id="il-100">100s</span>
            <input type="text" id="in-100" placeholder="" inputmode="numeric">
        </div>
        <span class="symbol">+</span>
        <div class="input-group">
            <span class="input-label" id="il-10">10s</span>
            <input type="text" id="in-10" placeholder="" inputmode="numeric">
        </div>
        <span class="symbol">+</span>
        <div class="input-group">
            <span class="input-label" id="il-1">1s</span>
            <input type="text" id="in-1" placeholder="" inputmode="numeric">
        </div>
        <span class="symbol">=</span>
        <div class="input-group">
            <span class="input-label" id="il-tot">Total</span>
            <input type="text" id="in-total" class="input-total" placeholder="" inputmode="numeric">
        </div>
    </div>

    <button class="btn-check-main" id="btn-check" onclick="checkAnswer()">ፈትሽ (Check) ✔️</button>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🍎💎</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ቀፅል</div>
        <button class="btn-modal" onclick="nextLevel()" id="btn-next">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--secondary);">
        <span class="modal-icon">🍂</span>
        <div class="modal-title" id="fail-title">እንደገና ፈትን!</div>
        <div class="modal-body">
            <span id="fail-body">ጸወታ ተወዲኡ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4rem; color:var(--secondary); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="restartGame()" id="btn-restart" style="background:var(--secondary); box-shadow: 0 10px 0 #b5179e;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ዓድታት ቁፅሪ",
            instr: "ዝተረፉ ሳንዱቅ መሊእኩም ድምር ድለዩ!",
            lbl1000s: "ሽሓት (1000s)", lbl100s: "ሚኢትታት (100s)", lbl10s: "ዓሰርተታት (10s)", lbl1s: "ሓደታት (1s)",
            score: "ነጥቢ", record: "ክብረወሰን", win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ቀፅል",
            fail: "እንደገና ፈትን!", failSub: "ጸወታ ተወዲኡ።", final: "ውፅኢትካ",
            next: "ቀፃሊ ➡", restart: "እንደገና ጀምር 🔄", check: "ፈትሽ ✔️", total: "ድምር",
            sample: "ኣብነት: 2000 + 300 + 40 + 5 = 2345"
        },
        am: {
            title: "የቁጥር ቤቶች",
            instr: "ባዶዎቹን ሳጥኖች ሞልተው ድምሩን ይፈልጉ!",
            lbl1000s: "ሺዎች (1000s)", lbl100s: "መቶዎች (100s)", lbl10s: "አስሮች (10s)", lbl1s: "አንዶች (1s)",
            score: "ውጤት", record: "ከፍተኛ", win: "ትክክል!", winSub: "በጣም ጎበዝ! ቀጥል",
            fail: "እንደገና ሞክር!", failSub: "ጨዋታው ተጠናቋል።", final: "የእርስዎ ውጤት",
            next: "ቀጣይ ➡", restart: "እንደገና ጀምር 🔄", check: "ፈትሽ ✔️", total: "ድምር",
            sample: "ምሳሌ: 2000 + 300 + 40 + 5 = 2345"
        },
        en: {
            title: "Expanded Form",
            instr: "Fill in the numbers and find the total!",
            lbl1000s: "Thousands", lbl100s: "Hundreds", lbl10s: "Tens", lbl1s: "Ones",
            score: "Score", record: "Record", win: "Correct!", winSub: "Awesome job! Keep going",
            fail: "Try Again!", failSub: "Game Over.", final: "Your Score",
            next: "Next Level ➡", restart: "Restart Game 🔄", check: "Check ✔️", total: "Total",
            sample: "Sample: 2000 + 300 + 40 + 5 = 2345"
        },
        om: {
            title: "Iddoo Lakkoofsaa",
            instr: "Saanduqa madaalaa guutiitii ida'ama barbaadi!",
            lbl1000s: "Kuma (1000s)", lbl100s: "Dhibba (100s)", lbl10s: "Kudhan (10s)", lbl1s: "Tokko (1s)",
            score: "Qabxii", record: "Rikardii", win: "Sirrii!", winSub: "Baay'ee gaariidha! Itti fufi",
            fail: "Irra deebi'ii!", failSub: "Tapha dhumate.", final: "Qabxii Keessan",
            next: "Itti Aanu ➡", restart: "Irra deebi'i 🔄", check: "Mirkaneessi ✔️", total: "Waliigala",
            sample: "Fakkeenya: 2000 + 300 + 40 + 5 = 2345"
        },
        so: {
            title: "Tirada La Fidiyey",
            instr: "Buuxi sanduuqyada oo soo saar wadarta!",
            lbl1000s: "Kumayaal", lbl100s: "Boqollo", lbl10s: "Tobanle", lbl1s: "Kow",
            score: "Dhibco", record: "Rikoodh", win: "Sax!", winSub: "Shaqo fiican! Horay u soco",
            fail: "Isku day mar kale!", failSub: "Ciyaartu way dhammaatay.", final: "Dhibcahaaga",
            next: "Xiga ➡", restart: "Dib u billow 🔄", check: "Hubi ✔️", total: "Wadar",
            sample: "Tusaale: 2000 + 300 + 40 + 5 = 2345"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('expandedFormHighScore_G3_V5') || 0;
    let currentV = { th:0, h:0, t:0, o:0 };
    let firstRound = true;

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function generateProblem() {
        let maxTh = score < 60 ? 3 : (score < 180 ? 6 : 9);
        currentV.th = Math.floor(Math.random() * maxTh) + 1;
        currentV.h  = Math.floor(Math.random() * 8);
        currentV.t  = Math.floor(Math.random() * 9);
        currentV.o  = Math.floor(Math.random() * 9) + 1;

        renderItems('col-1000', currentV.th, 'pallet-1000', '1000');
        renderItems('col-100', currentV.h, 'crate-100', '100');
        renderItems('col-10', currentV.t, 'basket-10', '10');
        renderItems('col-1', currentV.o, 'apple-1', '');

        document.querySelectorAll('input').forEach(i => {
            i.value = '';
            i.style.borderColor = "#e2e8f0";
        });
        document.getElementById('in-1000').focus();
    }

    function renderItems(id, count, cls, txt) {
        const container = document.getElementById(id);
        const label = container.querySelector('.column-label');
        container.innerHTML = '';
        container.appendChild(label);
        for(let i=0; i<count; i++) {
            const item = document.createElement('div');
            item.className = `item-visual ${cls}`;
            item.style.animationDelay = `${i * 0.05}s`;
            if(txt) item.innerText = txt;
            container.appendChild(item);
        }
    }

    const parseIn = (id) => {
        let raw = document.getElementById(id).value;
        let clean = raw.replace(/[^0-9]/g, '');
        return clean === "" ? 0 : parseInt(clean);
    };

    function checkAnswer() {
        const inTh = parseIn('in-1000');
        const inH  = parseIn('in-100');
        const inT  = parseIn('in-10');
        const inO  = parseIn('in-1');
        const inTot = parseIn('in-total');

        const targetTh = currentV.th * 1000;
        const targetH  = currentV.h * 100;
        const targetT  = currentV.t * 10;
        const targetO  = currentV.o;
        const targetTot = targetTh + targetH + targetT + targetO;

        let ok = (inTh === targetTh) && (inH === targetH) && (inT === targetT) && (inO === targetO) && (inTot === targetTot);

        // Remove sample and example placeholders after first attempt
        if (firstRound) {
            firstRound = false;
            document.getElementById('sample-hint').classList.add('hidden');
            document.getElementById('in-1000').placeholder = '';
            document.getElementById('in-100').placeholder = '';
            document.getElementById('in-10').placeholder = '';
            document.getElementById('in-1').placeholder = '';
            document.getElementById('in-total').placeholder = '';
        }

        if(ok) {
            score += 15;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('expandedFormHighScore_G3_V5', highScore);
            }
            updateScoreUI();
            showWin();
        } else {
            showFail();
        }
    }

    function showWin() {
        playSound('win');
        triggerConfetti();
        document.getElementById('overlay-win').classList.add('show');
    }

    function showFail() {
        playSound('fail');
        document.getElementById('final-score-val').textContent = score;
        document.getElementById('overlay-fail').classList.add('show');
    }

    function nextLevel() {
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-instr').textContent = t.instr;
        document.getElementById('sample-hint').textContent = t.sample;
        document.getElementById('lbl-1000s').textContent = t.lbl1000s;
        document.getElementById('lbl-100s').textContent = t.lbl100s;
        document.getElementById('lbl-10s').textContent = t.lbl10s;
        document.getElementById('lbl-1s').textContent = t.lbl1s;
        document.getElementById('il-1000').textContent = t.lbl1000s;
        document.getElementById('il-100').textContent = t.lbl100s;
        document.getElementById('il-10').textContent = t.lbl10s;
        document.getElementById('il-1').textContent = t.lbl1s;
        document.getElementById('il-tot').textContent = t.total;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    // Dropdown Logic
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const optionsList = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    optionsList.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523, t); osc.frequency.exponentialRampToValueAtTime(1046, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<60; i++) {
            pieces.push({
                x: canvas.width / 2, y: canvas.height / 2,
                vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 8,
                color: `hsl(${Math.random()*360}, 100%, 50%)`, size: Math.random() * 8 + 4
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let alive = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.8;
                if (p.y < canvas.height) {
                    ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
                    alive = true;
                }
            });
            if (alive) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>

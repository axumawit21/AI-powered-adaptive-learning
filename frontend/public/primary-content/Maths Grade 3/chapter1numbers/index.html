
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Abacus - Grade 5 Math</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361EE;   /* Blue */
            --secondary: #F72585; /* Pink */
            --accent: #FFBE0B;    /* Sunny Yellow */
            --success: #06D6A0;   /* Mint Green */
            --purple: #8338EC;    /* Purple */
            --text: #2B2D42;
            --white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            
            --rod-color: #8D6E63;
            --th-color: #E74C3C;
            --h-color: #F1C40F;
            --t-color: #2ECC71;
            --o-color: #3498DB;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--secondary);
            border-radius: 0 0 25px 25px;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        .header-center { flex: 2; text-align: center; display: flex; justify-content: center; }

        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(247, 37, 133, 0.3);
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--purple);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            background: rgba(255,255,255,0.6);
            padding: 5px 20px;
            border-radius: 20px;
        }

        /* Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text);
            height: 45px; background: white; 
            border-radius: 25px;
            width: 160px; transition: 0.2s;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 0 rgba(67, 97, 238, 0.2);
        }
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 5px;
            border-radius: 15px; padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #eee;
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .custom-option:hover { background: #FFE5EC; color: var(--secondary); }
        .arrow { border: solid var(--primary); border-width: 0 3px 3px 0; padding: 3px; transform: rotate(45deg); margin-bottom: 2px; }

        /* --- Main Content --- */
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; text-align: center; }

        /* Score Board */
        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .score-pill {
            background: white;
            border: 3px solid #eee;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            display: flex; gap: 10px; align-items: center;
        }
        .score-pill.high { border-color: var(--accent); color: #B7791F; background: #FFFBEB; }
        .score-pill.curr { border-color: var(--primary); color: var(--primary); background: #E3F2FD; }

        /* Target Display */
        #target-display {
            background: white;
            padding: 20px 40px;
            border-radius: 30px;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text);
            margin: 0 auto 30px;
            display: inline-flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 10px 0 #eee;
            border: 4px solid var(--secondary);
            animation: float 4s ease-in-out infinite;
        }
        .target-label { font-size: 1.2rem; color: #718096; text-transform: uppercase; font-weight: 800; }

        /* Abacus Frame */
        .abacus-frame {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 30px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 6px solid white;
            margin-bottom: 100px; /* Space for controls */
        }

        .rod-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 120px;
        }

        .rod-stick {
            width: 16px;
            height: 350px;
            background: linear-gradient(to right, #8D6E63, #5D4037);
            border-radius: 10px 10px 0 0;
            position: absolute;
            bottom: 85px;
            z-index: 1;
            box-shadow: inset 2px 0 5px rgba(0,0,0,0.2);
        }

        .bead-stack {
            height: 350px;
            width: 100%;
            display: flex;
            flex-direction: column-reverse;
            justify-content: flex-start;
            align-items: center;
            z-index: 2;
            margin-bottom: 10px;
        }

        .bead {
            width: 90px;
            height: 32px;
            border-radius: 12px;
            margin-bottom: 2px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2), inset 0 2px 5px rgba(255,255,255,0.4);
            border: 1px solid rgba(0,0,0,0.1);
            position: relative;
            animation: slideDown 0.3s ease-out;
        }
        
        .bead::after {
            content: '';
            position: absolute; top: 3px; left: 6px;
            width: 45px; height: 6px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
        }

        .island-base {
            width: 130px;
            height: 110px;
            background: white;
            border-radius: 30px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 #eee;
            border: 3px solid #f8f9fa;
        }

        .count-display {
            font-size: 2.8rem;
            font-weight: 900;
            line-height: 1;
        }
        .place-value-label {
            font-size: 0.9rem;
            font-weight: 800;
            color: #718096;
            margin-top: 5px;
        }

        .rod-controls {
            position: absolute;
            bottom: -80px;
            display: flex;
            gap: 15px;
        }

        .ctrl-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            font-size: 1.8rem;
            font-weight: 900;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
        }
        .ctrl-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-plus { background: var(--success); }
        .btn-minus { background: var(--secondary); }

        /* Equation Bar */
        #equation-bar {
            background: white;
            padding: 20px 50px;
            border-radius: 40px;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 0 #eee;
            margin-top: 40px;
            border: 4px solid var(--purple);
        }
        .eq-total { color: var(--success); margin-left: 15px; font-size: 2.5rem; }

        .btn-check-main {
            background: var(--success);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 0 #047857;
            margin-top: 30px;
            display: block;
            margin-left: auto; margin-right: auto;
        }
        .btn-check-main:active { transform: translateY(6px); box-shadow: none; }

        /* Feedback Overlay */
        .feedback-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 500;
            animation: fadeIn 0.3s;
        }
        .feedback-overlay.show { display: flex; }
        .fb-icon { font-size: 8rem; margin-bottom: 20px; }
        .fb-title { font-size: 3.5rem; font-weight: 900; margin-bottom: 10px; }
        .fb-msg { font-size: 1.6rem; color: #718096; margin-bottom: 40px; font-weight: bold; }
        
        .fb-btn {
            background: var(--primary);
            color: white;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #1D4ED8;
        }

        /* Rod Specific Colors */
        .rod-th .count-display { color: var(--th-color); }
        .rod-h .count-display { color: var(--h-color); }
        .rod-t .count-display { color: var(--t-color); }
        .rod-o .count-display { color: var(--o-color); }

        .rod-th .bead { background: radial-gradient(circle at 30% 30%, var(--th-color), #c0392b); }
        .rod-h .bead { background: radial-gradient(circle at 30% 30%, var(--h-color), #f39c12); }
        .rod-t .bead { background: radial-gradient(circle at 30% 30%, var(--t-color), #27ae60); }
        .rod-o .bead { background: radial-gradient(circle at 30% 30%, var(--o-color), #2980b9); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes slideDown { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }

        @media (max-width: 768px) {
            header { padding: 10px; flex-wrap: wrap; }
            h1 { font-size: 1.3rem; }
            .abacus-frame { gap: 15px; padding: 20px; flex-wrap: wrap; margin-bottom: 120px; }
            .rod-column { width: 90px; }
            .bead { width: 70px; height: 26px; }
            .rod-stick { height: 280px; }
            .bead-stack { height: 280px; }
            .island-base { width: 100px; height: 90px; }
            .count-display { font-size: 2rem; }
            #target-display { font-size: 2.2rem; padding: 15px 30px; }
            #equation-bar { font-size: 1.4rem; padding: 15px 25px; }
            .ctrl-btn { width: 45px; height: 45px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="title-main">Virtal Abacus</h1>
    </div>
    <div class="header-right">
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div class="arrow"></div>
                </div>
                <div class="custom-select__options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill high"><span id="lbl-high">Record</span>: <span id="highscore-val">0</span></div>
        <div class="score-pill curr"><span id="lbl-score">Score</span>: <span id="score-val">0</span></div>
    </div>

    <div id="target-display">
        <span class="target-label" id="target-label">Target</span>
        <span id="target-number">0</span>
    </div>

    <div class="abacus-frame">
        <div class="rod-column rod-th">
            <div class="rod-stick"></div>
            <div class="bead-stack" id="stack-th"></div>
            <div class="island-base">
                <div class="count-display" id="disp-th">0</div>
                <div class="place-value-label" id="label-th">1000s</div>
            </div>
            <div class="rod-controls">
                <button class="ctrl-btn btn-minus" onclick="modifyBead('th', -1)">-</button>
                <button class="ctrl-btn btn-plus" onclick="modifyBead('th', 1)">+</button>
            </div>
        </div>

        <div class="rod-column rod-h">
            <div class="rod-stick"></div>
            <div class="bead-stack" id="stack-h"></div>
            <div class="island-base">
                <div class="count-display" id="disp-h">0</div>
                <div class="place-value-label" id="label-h">100s</div>
            </div>
            <div class="rod-controls">
                <button class="ctrl-btn btn-minus" onclick="modifyBead('h', -1)">-</button>
                <button class="ctrl-btn btn-plus" onclick="modifyBead('h', 1)">+</button>
            </div>
        </div>

        <div class="rod-column rod-t">
            <div class="rod-stick"></div>
            <div class="bead-stack" id="stack-t"></div>
            <div class="island-base">
                <div class="count-display" id="disp-t">0</div>
                <div class="place-value-label" id="label-t">10s</div>
            </div>
            <div class="rod-controls">
                <button class="ctrl-btn btn-minus" onclick="modifyBead('t', -1)">-</button>
                <button class="ctrl-btn btn-plus" onclick="modifyBead('t', 1)">+</button>
            </div>
        </div>

        <div class="rod-column rod-o">
            <div class="rod-stick"></div>
            <div class="bead-stack" id="stack-o"></div>
            <div class="island-base">
                <div class="count-display" id="disp-o">0</div>
                <div class="place-value-label" id="label-o">1s</div>
            </div>
            <div class="rod-controls">
                <button class="ctrl-btn btn-minus" onclick="modifyBead('o', -1)">-</button>
                <button class="ctrl-btn btn-plus" onclick="modifyBead('o', 1)">+</button>
            </div>
        </div>
    </div>

    <div id="equation-bar">
        <span id="eq-text">0 + 0 + 0 + 0</span> 
        <span class="eq-total" id="eq-total-label">= <span id="eq-total-val">0</span></span>
    </div>

    <button id="btn-check" class="btn-check-main" onclick="checkAnswer()">✓ Check</button>
</div>

<div class="feedback-overlay" id="feedback">
    <div class="fb-icon" id="fb-icon">🎉</div>
    <div class="fb-title" id="fb-title">Correct!</div>
    <p class="fb-msg" id="fb-msg"></p>
    <button class="fb-btn" onclick="closeFeedback()" id="btn-fb-close">Next ➡</button>
</div>

<script>
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playPop() { this.playTone(600, 'sine', 0.1); },
        playSuccess() { 
            this.playTone(500, 'sine', 0.1); 
            setTimeout(() => this.playTone(700, 'sine', 0.1), 100);
            setTimeout(() => this.playTone(900, 'sine', 0.2), 200);
        },
        playError() { 
            this.playTone(150, 'sawtooth', 0.3); 
            setTimeout(() => this.playTone(100, 'sawtooth', 0.3), 150);
        }
    };

    const LANG_STRINGS = {
        ti: {
            title: 'ሙሉእ ቁፅርታት',
            targetLabel: 'ዕላማ:',
            thousands: 'ሽሕ (1000s)',
            hundreds: 'ሚኢቲ (100s)',
            tens: 'ዓሰርተ (10s)',
            ones: 'ሓደ (1s)',
            check: '✓ ኣረጋግጽ',
            scoreLabel: 'ነጥቢ',
            highScoreLabel: 'ክብረ ወሰን',
            correctTitle: 'ትኽክል! 🎉',
            correctMsg: 'ብጣዕሚ ጽቡቕ! ቁፅሪ ብትኽክል ምህናጽካ።',
            gameOverTitle: 'ጌጋ! ጸወታ ተወዲኡ።',
            gameOverMsg: (s) => `ውጽኢትካ ${s} ነጥቢ እዩ። እንደገና ፈትን።`,
            next: 'ቀፃሊ ➡'
        },
        am: {
            title: 'ሙሉ ቁጥሮች',
            targetLabel: 'ዒላማ:',
            thousands: 'ሺህ (1000s)',
            hundreds: 'መቶ (100s)',
            tens: 'አስር (10s)',
            ones: 'አንድ (1s)',
            check: '✓ አረጋግጥ',
            scoreLabel: 'ውጤት',
            highScoreLabel: 'ከፍተኛ',
            correctTitle: 'ትክክል ነው! 🎉',
            correctMsg: 'ጥሩ ስራ! ቁጥሩን በትክክል ሠርተሃል።',
            gameOverTitle: 'ስህተት! ጨዋታው ተጠናቋል።',
            gameOverMsg: (s) => `ውጤትህ ${s} ነው። እንደገና ሞክር።`,
            next: 'ቀጣይ ➡'
        },
        en: {
            title: 'whole numbers',
            targetLabel: 'Target:',
            thousands: 'Thousands',
            hundreds: 'Hundreds',
            tens: 'Tens',
            ones: 'Ones',
            check: '✓ Check',
            scoreLabel: 'Score',
            highScoreLabel: 'High Score',
            correctTitle: 'Correct! 🎉',
            correctMsg: 'Great job! You built the number.',
            gameOverTitle: 'Game Over!',
            gameOverMsg: (s) => `Your score was ${s} points. Try again!`,
            next: 'Next ➡'
        },
        om: {
            title: 'Abakusii Herregaa',
            targetLabel: 'Kaayyoo:',
            thousands: 'Kuma',
            hundreds: 'Dhibba',
            tens: 'Kudhan',
            ones: 'Tokko',
            check: '✓ Mirkaneessi',
            scoreLabel: 'Qabxii',
            highScoreLabel: 'Olaanaa',
            correctTitle: 'Sirrii dha! 🎉',
            correctMsg: 'Hojiin kee bareedaa dha!',
            gameOverTitle: 'Tapha Dhumate!',
            gameOverMsg: (s) => `Qabxiin kee ${s} dha. Irra deebi'i.`,
            next: 'Itti Aanu ➡'
        },
        so: {
            title: 'Xisaabta Abacus',
            targetLabel: 'Lambarka:',
            thousands: 'Kumayaal',
            hundreds: 'Boqollo',
            tens: 'Tobanle',
            ones: 'Keli',
            check: '✓ Hubi',
            scoreLabel: 'Dhibco',
            highScoreLabel: 'Rikoodh',
            correctTitle: 'Sax baad tahay! 🎉',
            correctMsg: 'Aad baad u fiican tahay!',
            gameOverTitle: 'Ciyaartu way dhamaatay!',
            gameOverMsg: (s) => `Dhibcahaagu waxay ahaayeen ${s}.`,
            next: 'Xiga ➡'
        }
    };

    let state = { th: 0, h: 0, t: 0, o: 0 };
    let targetNumber = 0;
    let score = 0;
    let highScore = localStorage.getItem('abacusHighScore') || 0;
    let currentLang = 'ti';
    let isPendingNext = false;

    function init() {
        document.getElementById('highscore-val').textContent = highScore;
        applyLanguage();
        generateNewTarget();
    }

    function applyLanguage() {
        const t = LANG_STRINGS[currentLang];
        document.getElementById('title-main').textContent = t.title;
        document.getElementById('target-label').textContent = t.targetLabel;
        document.getElementById('label-th').textContent = t.thousands;
        document.getElementById('label-h').textContent = t.hundreds;
        document.getElementById('label-t').textContent = t.tens;
        document.getElementById('label-o').textContent = t.ones;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('lbl-score').textContent = t.scoreLabel;
        document.getElementById('lbl-high').textContent = t.highScoreLabel;
        document.getElementById('btn-fb-close').textContent = t.next;
        render();
    }

    function generateNewTarget() {
        targetNumber = Math.floor(Math.random() * 1999) + 1;
        document.getElementById('target-number').textContent = targetNumber;
        state = { th: 0, h: 0, t: 0, o: 0 };
        isPendingNext = false;
        render();
    }

    function modifyBead(place, amount) {
        if(isPendingNext) return;
        let newVal = state[place] + amount;
        if (newVal >= 0 && newVal <= 9) {
            state[place] = newVal;
            AudioEngine.playPop();
            render();
        }
    }

    function render() {
        ['th', 'h', 't', 'o'].forEach(p => {
            const stack = document.getElementById(`stack-${p}`);
            stack.innerHTML = '';
            for (let i = 0; i < state[p]; i++) {
                const bead = document.createElement('div');
                bead.className = 'bead';
                stack.appendChild(bead);
            }
            document.getElementById(`disp-${p}`).textContent = state[p];
        });

        const vTh = state.th * 1000, vH = state.h * 100, vT = state.t * 10, vO = state.o;
        const total = vTh + vH + vT + vO;
        document.getElementById('eq-text').textContent = `${vTh} + ${vH} + ${vT} + ${vO}`;
        document.getElementById('eq-total-val').textContent = total;
        document.getElementById('eq-total-val').style.color = (total === targetNumber) ? 'var(--success)' : 'var(--text)';
    }

    function checkAnswer() {
        if(isPendingNext) return;
        const total = (state.th * 1000) + (state.h * 100) + (state.t * 10) + state.o;
        const t = LANG_STRINGS[currentLang];
        const fb = document.getElementById('feedback');
        
        if (total === targetNumber) {
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('abacusHighScore', highScore);
            }
            AudioEngine.playSuccess();
            fireConfetti();
            document.getElementById('fb-icon').textContent = '🎉';
            document.getElementById('fb-title').textContent = t.correctTitle;
            document.getElementById('fb-title').style.color = 'var(--success)';
            document.getElementById('fb-msg').textContent = t.correctMsg;
        } else {
            AudioEngine.playError();
            document.getElementById('fb-icon').textContent = '❌';
            document.getElementById('fb-title').textContent = t.gameOverTitle;
            document.getElementById('fb-title').style.color = 'var(--secondary)';
            document.getElementById('fb-msg').textContent = t.gameOverMsg(score);
            score = 0;
        }
        
        document.getElementById('score-val').textContent = score;
        document.getElementById('highscore-val').textContent = highScore;
        isPendingNext = true;
        fb.classList.add('show');
    }

    function closeFeedback() {
        document.getElementById('feedback').classList.remove('show');
        generateNewTarget();
    }

    // Custom Dropdown Logic
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', () => selectCustom.classList.toggle('open'));

    options.forEach(opt => {
        opt.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                document.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                currentLang = this.dataset.value;
                document.getElementById('current-lang-label').textContent = "🗺️ " + this.textContent;
                applyLanguage();
            }
        });
    });

    window.addEventListener('click', (e) => {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function fireConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const parts = [];
        for(let i=0; i<80; i++) {
            parts.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15 - 5,
                c: `hsl(${Math.random()*360}, 100%, 50%)`, r: Math.random()*6+4
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            parts.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.4;
                if(p.y < canvas.height) {
                    active = true;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                    ctx.fillStyle = p.c; ctx.fill();
                }
            });
            if(active) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;
</script>
</body>
</html>

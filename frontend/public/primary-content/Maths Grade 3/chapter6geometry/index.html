
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Sorter - Grade 3 Math</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2c3e50;
            --conveyor: #95a5a6;
            --bin-parallel: #e74c3c;
            --bin-perp: #f1c40f;
            --bin-tri: #2ecc71;
            --bin-quad: #3498db;
            --text-light: #ecf0f1;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg-color);
            /* Gear Background Pattern */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.05) 10%, transparent 10.2%),
                radial-gradient(circle at 90% 80%, rgba(255,255,255,0.05) 10%, transparent 10.2%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }

        /* Header */
        header {
            width: 100%; padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box; z-index: 100;
        }
        h1 { margin: 0; font-size: 1.4rem; color: var(--text-light); text-shadow: 2px 2px 0 #000; text-align: center; }
        .nav-btn {
            background: #34495e; color: white; text-decoration: none;
            padding: 8px 15px; border-radius: 20px; font-weight: bold;
            border: 2px solid #7f8c8d;
        }

        /* Custom Dropdown (Language) */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 14px; font-weight: 700; color: #f1c40f;
            height: 38px; background: #2c3e50; border-radius: 19px;
            min-width: 150px; border: 2px solid #f1c40f;
            box-shadow: 0 3px 0 rgba(0,0,0,0.4);
            font-size: 0.85rem;
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: #ecf0f1; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 12px; padding: 4px; box-shadow: 0 12px 30px rgba(0,0,0,0.4);
            border: 1px solid #bdc3c7; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 8px 10px; border-radius: 8px; cursor: pointer; font-weight: 600; color: #2c3e50; font-size: 0.85rem; }
        .custom-option:hover { background: #f1c40f; color: #2c3e50; }

        /* Game Area */
        #game-container {
            flex: 1; width: 100%; max-width: 800px;
            position: relative;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding-bottom: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px 0 20px;
            z-index: 50;
        }

        /* Score */
        .score-panel {
            background: rgba(0,0,0,0.5); padding: 5px 15px;
            border-radius: 15px; color: #f1c40f; font-size: 1.2rem;
            font-weight: bold; border: 2px solid #f1c40f;
        }

        /* Spawn Area (Conveyor Top) */
        .spawner {
            height: 150px; width: 100%;
            display: flex; justify-content: center; align-items: center;
            position: relative;
            background: repeating-linear-gradient(
                45deg,
                #34495e,
                #34495e 10px,
                #2c3e50 10px,
                #2c3e50 20px
            );
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            border-bottom: 5px solid #7f8c8d;
        }
        
        /* The Draggable Item */
        .shape-item {
            width: 100px; height: 100px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex; justify-content: center; align-items: center;
            cursor: grab;
            position: absolute;
            transition: transform 0.1s;
            z-index: 100;
            border: 4px solid white;
        }
        .shape-item:active { cursor: grabbing; transform: scale(1.1); }
        
        .shape-svg { width: 80%; height: 80%; pointer-events: none; }

        /* Bins Area */
        .bins-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .bin {
            position: relative;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            border: 4px dashed rgba(255,255,255,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .bin.hover {
            background: rgba(255,255,255,0.2);
            transform: scale(1.02);
            border-style: solid;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .bin-icon { font-size: 3rem; margin-bottom: 5px; opacity: 0.8; }
        .bin-label { 
            font-size: 1rem; color: white; font-weight: bold; 
            text-align: center; text-shadow: 1px 1px 2px black;
        }
        .bin-sub { font-size: 0.8rem; color: #ccc; }

        /* Specific Bin Colors */
        #bin-parallel { border-color: var(--bin-parallel); }
        #bin-parallel .bin-icon { color: var(--bin-parallel); }
        
        #bin-perp { border-color: var(--bin-perp); }
        #bin-perp .bin-icon { color: var(--bin-perp); }

        #bin-tri { border-color: var(--bin-tri); }
        #bin-tri .bin-icon { color: var(--bin-tri); }

        #bin-quad { border-color: var(--bin-quad); }
        #bin-quad .bin-icon { color: var(--bin-quad); }

        /* Animations */
        @keyframes pop { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .spawn-anim { animation: pop 0.5s ease-out; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake-anim { animation: shake 0.3s ease-in-out; }

        /* Modal */
        #feedback-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #feedback-modal.show { opacity: 1; pointer-events: all; }
        .modal-content {
            background: white; padding: 30px; border-radius: 20px;
            text-align: center; width: 80%; max-width: 300px;
            transform: scale(0.8); transition: 0.3s;
            border: 5px solid #f1c40f;
        }
        #feedback-modal.show .modal-content { transform: scale(1); }
        .modal-emoji { font-size: 4rem; display: block; margin-bottom: 10px; }
        .modal-btn {
            background: #2ecc71; color: white; border: none; padding: 10px 20px;
            border-radius: 20px; font-size: 1.2rem; font-weight: bold; cursor: pointer;
            margin-top: 15px;
        }

        /* Mobile layout adjustments */
        @media (min-width: 600px) {
            .bins-container {
                grid-template-columns: repeat(4, 1fr);
                grid-template-rows: 1fr;
            }
            .spawner { height: 200px; }
        }
    </style>
</head>
<body>

    <header>
        <h1 id="app-title">Geometry Sorter</h1>
    </header>

    <div id="game-container">
        <div class="top-bar">
            <div class="custom-select-wrapper" id="lang-dropdown">
                <div class="custom-select">
                    <div class="custom-select__trigger">
                        <span id="current-lang-text">🗺️ ትግርኛ</span>
                        <span style="font-size:0.7rem">▼</span>
                    </div>
                    <div class="custom-options">
                        <div class="custom-option" data-value="ti">ትግርኛ</div>
                        <div class="custom-option" data-value="am">አማርኛ</div>
                        <div class="custom-option" data-value="en">English</div>
                        <div class="custom-option" data-value="om">Afan Oromoo</div>
                        <div class="custom-option" data-value="so">Soomaali</div>
                    </div>
                </div>
            </div>

            <div class="score-panel"><span id="lbl-score">Score</span>: <span id="score">0</span></div>
        </div>

        <div class="spawner" id="spawner-zone">
            <!-- Shape spawns here -->
        </div>

        <div class="bins-container">
            <!-- Bucket 1: Parallel -->
            <div class="bin" id="bin-parallel" data-type="parallel">
                <div class="bin-icon">∥</div>
                <div class="bin-label" id="lbl-parallel-main">ተመዓዳደውቲ</div>
                <div class="bin-sub" id="lbl-parallel-sub">Parallel</div>
            </div>

            <!-- Bucket 2: Perpendicular -->
            <div class="bin" id="bin-perp" data-type="perp">
                <div class="bin-icon">⊥</div>
                <div class="bin-label" id="lbl-perp-main">ትኹል</div>
                <div class="bin-sub" id="lbl-perp-sub">Perpendicular</div>
            </div>

            <!-- Bucket 3: Triangle -->
            <div class="bin" id="bin-tri" data-type="triangle">
                <div class="bin-icon">△</div>
                <div class="bin-label" id="lbl-tri-main">ስሉስ ኩርናዕ</div>
                <div class="bin-sub" id="lbl-tri-sub">Triangle</div>
            </div>

            <!-- Bucket 4: Quadrilateral -->
            <div class="bin" id="bin-quad" data-type="quad">
                <div class="bin-icon">□</div>
                <div class="bin-label" id="lbl-quad-main">ርቡዕ ኩርናዕ</div>
                <div class="bin-sub" id="lbl-quad-sub">Square/Rect</div>
            </div>
        </div>
    </div>

    <div id="feedback-modal">
        <div class="modal-content">
            <span class="modal-emoji">🏆</span>
            <h2 id="modal-title">Great Job!</h2>
            <p id="modal-body">You sorted all the shapes!</p>
            <button class="modal-btn" id="btn-modal" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const translations = {
            ti: {
                title: "ጂዮሜትሪ",
                score: "ነጥቢ",
                parallelMain: "ተመዓዳደውቲ መስመራት",
                parallelSub: "Parallel",
                perpMain: "ትኹል መስመራት",
                perpSub: "Perpendicular",
                triMain: "ስሉስ ኩርናዕ",
                triSub: "Triangle",
                quadMain: "ርቡዕ ኩርናዕ",
                quadSub: "Square/Rect",
                winTitle: "ብጣዕሚ ጽቡቕ!",
                winBody: "ኩሎም ቅርፃት ትክክል ኣርኢኻ።",
                btnModal: "እንደገና ጨወት 🔁"
            },
            am: {
                title: "ጂዮሜትሪ",
                score: "ውጤት",
                parallelMain: "አማዳይ መስመሮች",
                parallelSub: "Parallel",
                perpMain: "ትክክለኛ መስመሮች",
                perpSub: "Perpendicular",
                triMain: "ሦስት ጎኖች (ትራይንግል)",
                triSub: "Triangle",
                quadMain: "አራት ጎኖች",
                quadSub: "Square/Rect",
                winTitle: "እጅግ ጥሩ!",
                winBody: "ሁሉንም ቅርፃት ትክክለኛ አስተካክለህ!",
                btnModal: "እንደገና ተጫወት 🔁"
            },
            en: {
                title: "Geometry Sorter",
                score: "Score",
                parallelMain: "Parallel Lines",
                parallelSub: "Parallel",
                perpMain: "Right Angles",
                perpSub: "Perpendicular",
                triMain: "Triangles",
                triSub: "Triangle",
                quadMain: "Quadrilaterals",
                quadSub: "Square/Rect",
                winTitle: "Great Job!",
                winBody: "You sorted all the shapes!",
                btnModal: "Play Again"
            },
            om: {
                title: "Jeeomatrii Qindeessaa",
                score: "Qabxii",
                parallelMain: "Xiyyoo wal-simoo",
                parallelSub: "Parallel",
                perpMain: "Xiyyoo wal-dorgomaa",
                perpSub: "Perpendicular",
                triMain: "Sadi-godaan (Triyangeel)",
                triSub: "Triangle",
                quadMain: "Afur-godaan",
                quadSub: "Square/Rect",
                winTitle: "Hojiin kee bareedaa dha!",
                winBody: "Saxatoowwan hunda sirrii ta'een qindeessite!",
                btnModal: "Irra deebi'ii taphadhu 🔁"
            },
            so: {
                title: "Kala-soocidda Joomatari",
                score: "Dhibco",
                parallelMain: "Khadadka is-barbar socda",
                parallelSub: "Parallel",
                perpMain: "Khadadka is-gooya",
                perpSub: "Perpendicular",
                triMain: "Sad-xaglo (Triangle)",
                triSub: "Triangle",
                quadMain: "Afargeesyo",
                quadSub: "Square/Rect",
                winTitle: "Shaqo Wacan!",
                winBody: "Waad kala soocday dhammaan jaantusyada!",
                btnModal: "Mar kale ciyaar 🔁"
            }
        };

        let currentLang = 'ti';

        function updateLanguage() {
            const t = translations[currentLang] || translations.en;
            document.getElementById('app-title').textContent = t.title;
            document.getElementById('lbl-score').textContent = t.score;
            document.getElementById('lbl-parallel-main').textContent = t.parallelMain;
            document.getElementById('lbl-parallel-sub').textContent = t.parallelSub;
            document.getElementById('lbl-perp-main').textContent = t.perpMain;
            document.getElementById('lbl-perp-sub').textContent = t.perpSub;
            document.getElementById('lbl-tri-main').textContent = t.triMain;
            document.getElementById('lbl-tri-sub').textContent = t.triSub;
            document.getElementById('lbl-quad-main').textContent = t.quadMain;
            document.getElementById('lbl-quad-sub').textContent = t.quadSub;
            document.getElementById('modal-title').textContent = t.winTitle;
            document.getElementById('modal-body').textContent = t.winBody;
            document.getElementById('btn-modal').textContent = t.btnModal;
        }

        /* 
           Shape Definitions using SVG paths
           types: parallel, perp, triangle, quad
        */
        const shapes = [
            { type: 'parallel', svg: '<path d="M20,80 L80,20 M40,90 L100,30" stroke="#e74c3c" stroke-width="8" stroke-linecap="round" />' },
            { type: 'parallel', svg: '<path d="M20,20 L20,80 M80,20 L80,80" stroke="#e74c3c" stroke-width="8" stroke-linecap="round" />' },
            { type: 'perp', svg: '<path d="M50,10 L50,90 M10,50 L90,50" stroke="#f1c40f" stroke-width="8" stroke-linecap="round" />' },
            { type: 'perp', svg: '<path d="M20,80 L80,80 M80,80 L80,20" stroke="#f1c40f" stroke-width="8" stroke-linecap="round" fill="none"/>' }, // L shape
            { type: 'triangle', svg: '<polygon points="50,15 85,85 15,85" fill="#2ecc71" stroke="#27ae60" stroke-width="4"/>' },
            { type: 'triangle', svg: '<polygon points="15,15 15,85 85,85" fill="#2ecc71" stroke="#27ae60" stroke-width="4"/>' },
            { type: 'quad', svg: '<rect x="20" y="20" width="60" height="60" fill="#3498db" stroke="#2980b9" stroke-width="4"/>' }, // Square
            { type: 'quad', svg: '<rect x="15" y="30" width="70" height="40" fill="#3498db" stroke="#2980b9" stroke-width="4"/>' }, // Rect
            { type: 'quad', svg: '<polygon points="30,20 80,20 70,80 20,80" fill="#3498db" stroke="#2980b9" stroke-width="4"/>' } // Parallelogram
        ];

        let currentShape = null;
        let score = 0;
        let rounds = 0;
        const maxRounds = 10;

        const spawner = document.getElementById('spawner-zone');
        const bins = document.querySelectorAll('.bin');
        const scoreEl = document.getElementById('score');

        const dropdown = document.getElementById('lang-dropdown');
        const trigger = dropdown.querySelector('.custom-select__trigger');
        const options = dropdown.querySelectorAll('.custom-option');

        trigger.addEventListener('click', (e) => {
            dropdown.querySelector('.custom-select').classList.toggle('open');
            e.stopPropagation();
        });

        options.forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.stopPropagation();
                currentLang = this.dataset.value;
                document.getElementById('current-lang-text').textContent = '🗺️ ' + this.textContent;
                dropdown.querySelector('.custom-select').classList.remove('open');
                updateLanguage();
            });
        });

        window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

        window.onload = function() {
            updateLanguage();
            spawnShape();
        };

        function spawnShape() {
            if (rounds >= maxRounds) {
                showWin();
                return;
            }

            // Create DOM element
            const data = shapes[Math.floor(Math.random() * shapes.length)];
            const el = document.createElement('div');
            el.className = 'shape-item spawn-anim';
            el.dataset.type = data.type;
            el.innerHTML = `<svg class="shape-svg" viewBox="0 0 100 100">${data.svg}</svg>`;
            
            // Random slight rotation for fun
            el.style.transform = `rotate(${Math.random()*20 - 10}deg)`;

            spawner.appendChild(el);
            currentShape = el;
            
            makeDraggable(el);
        }

        function makeDraggable(elmnt) {
            let pos1=0, pos2=0, pos3=0, pos4=0;
            let startX = 0, startY = 0;

            elmnt.onmousedown = dragMouseDown;
            elmnt.ontouchstart = dragMouseDown;

            function dragMouseDown(e) {
                e.preventDefault();
                // Get start pos
                startX = elmnt.offsetLeft;
                startY = elmnt.offsetTop;
                
                pos3 = e.type==='touchstart'?e.touches[0].clientX:e.clientX;
                pos4 = e.type==='touchstart'?e.touches[0].clientY:e.clientY;
                
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
                document.ontouchend = closeDragElement;
                document.ontouchmove = elementDrag;
                
                elmnt.style.transition = 'none'; // Disable transition during drag
                elmnt.style.zIndex = 1000;
            }

            function elementDrag(e) {
                let cx = e.type==='touchmove'?e.touches[0].clientX:e.clientX;
                let cy = e.type==='touchmove'?e.touches[0].clientY:e.clientY;
                
                pos1 = pos3 - cx;
                pos2 = pos4 - cy;
                pos3 = cx;
                pos4 = cy;

                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";

                // Highlight drop target
                checkHover(elmnt);
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
                document.ontouchend = null;
                document.ontouchmove = null;

                // Check drop
                const droppedBin = getDroppedBin(elmnt);
                
                if (droppedBin) {
                    if (droppedBin.dataset.type === elmnt.dataset.type) {
                        // Correct
                        handleCorrect(droppedBin);
                    } else {
                        // Wrong
                        handleWrong(elmnt, startX, startY);
                    }
                } else {
                    // Return to start
                    returnToStart(elmnt); // Reset to spawner center roughly
                }
                
                bins.forEach(b => b.classList.remove('hover'));
            }
        }

        function checkHover(dragEl) {
            const rect = dragEl.getBoundingClientRect();
            const center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            
            bins.forEach(bin => {
                const bRect = bin.getBoundingClientRect();
                if (center.x > bRect.left && center.x < bRect.right &&
                    center.y > bRect.top && center.y < bRect.bottom) {
                    bin.classList.add('hover');
                } else {
                    bin.classList.remove('hover');
                }
            });
        }

        function getDroppedBin(dragEl) {
            const rect = dragEl.getBoundingClientRect();
            const center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            
            for (let bin of bins) {
                const bRect = bin.getBoundingClientRect();
                if (center.x > bRect.left && center.x < bRect.right &&
                    center.y > bRect.top && center.y < bRect.bottom) {
                    return bin;
                }
            }
            return null;
        }

        function handleCorrect(bin) {
            playSound('correct');
            currentShape.remove();
            currentShape = null;
            score += 10;
            rounds++;
            scoreEl.innerText = score;
            
            // Visual pop on bin
            bin.style.transform = "scale(1.1)";
            setTimeout(() => bin.style.transform = "scale(1)", 200);

            setTimeout(spawnShape, 500);
        }

        function handleWrong(el, startX, startY) {
            playSound('wrong');
            el.classList.add('shake-anim');
            setTimeout(() => {
                el.classList.remove('shake-anim');
                returnToStart(el);
            }, 400);
        }

        function returnToStart(el) {
            el.style.transition = "all 0.3s ease-out";
            el.style.top = "25px"; // Center in spawner
            el.style.left = "calc(50% - 50px)";
        }

        function playSound(type) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            }
        }

        function showWin() {
            document.getElementById('feedback-modal').classList.add('show');
        }

        function resetGame() {
            document.getElementById('feedback-modal').classList.remove('show');
            score = 0;
            rounds = 0;
            scoreEl.innerText = "0";
            if(currentShape) currentShape.remove();
            spawnShape();
        }

    </script>
</body>
</html>

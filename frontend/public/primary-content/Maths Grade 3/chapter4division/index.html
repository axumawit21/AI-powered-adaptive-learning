
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Division Galaxy - ሓዱሽ ምስጢር ምምቃል</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-deep: #0f172a;
            --primary: #38bdf8;
            --secondary: #c084fc;
            --accent: #fbbf24;
            --success: #4ade80;
            --error: #f87171;
            --text-light: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Animated Stars --- */
        .stars-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.5); } }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 3px solid var(--primary);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--secondary); color: white; width: 50px; height: 50px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem; border: 3px solid white;
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.5); transform: rotate(-5deg);
        }

        h1 { margin: 0; color: white; font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--primary);
            height: 40px; background: rgba(255,255,255,0.1); border-radius: 20px;
            width: 160px; border: 2px solid var(--primary);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: #1e293b; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 15px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 1px solid var(--primary); z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #cbd5e1; }
        .custom-option:hover { background: rgba(56, 189, 248, 0.2); color: var(--primary); }

        /* --- Main Container --- */
        .container {
            flex: 1; width: 100%; max-width: 800px;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 20px;
        }

        .score-board { display: flex; gap: 20px; }
        .score-pill {
            background: rgba(255, 255, 255, 0.05); padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: white;
            border: 2px solid var(--primary);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.1rem; backdrop-filter: blur(5px);
        }

        /* --- Division Stage --- */
        .division-card {
            background: var(--glass); padding: 40px; border-radius: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            width: 100%; display: flex; flex-direction: column; align-items: center;
            position: relative;
        }

        .division-layout {
            display: flex; align-items: flex-end; gap: 10px;
            font-size: 4rem; font-weight: 900; color: white;
            position: relative; margin-bottom: 20px;
        }

        .divisor-area { color: var(--accent); padding-bottom: 5px; }

        .problem-area { display: flex; flex-direction: column; align-items: flex-start; }

        .quotient-row {
            display: flex; gap: 5px; border-bottom: 6px solid var(--primary);
            padding-bottom: 8px; margin-bottom: 8px; padding-left: 10px;
            min-height: 80px;
        }

        .dividend-row {
            display: flex; gap: 5px; padding-left: 10px;
            border-left: 6px solid var(--primary); border-top-left-radius: 20px;
        }

        .digit-box { width: 65px; height: 75px; display: flex; align-items: center; justify-content: center; }
        .digit-box.active-step {
            box-shadow: 0 0 20px var(--accent);
            border-radius: 15px;
        }

        input[type="number"] {
            width: 60px; height: 75px; font-size: 3rem; text-align: center;
            border: 3px dashed var(--primary); background: rgba(255,255,255,0.05);
            border-radius: 15px; color: var(--success); font-weight: 900; outline: none;
        }
        input[type="number"].step-input {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input:focus { border-style: solid; background: rgba(255,255,255,0.15); box-shadow: 0 0 20px var(--primary); }
        .input-correct { border-style: solid !important; color: var(--success) !important; border-color: var(--success) !important; }

        .remainder-row {
            display: flex; align-items: center; gap: 15px; margin-top: 20px;
            background: rgba(255,255,255,0.05); padding: 15px 30px; border-radius: 20px;
            font-size: 1.5rem; font-weight: 800; border: 2px solid var(--secondary);
        }
        #val-rem { width: 80px; height: 65px; font-size: 2.5rem; }

        /* --- Hint / Walkthrough --- */
        .hint-box {
            width: 100%; max-width: 600px; background: #fffbeb; color: #92400e;
            padding: 20px 30px; border-radius: 25px; font-size: 1.2rem;
            font-weight: 700; border-left: 10px solid var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: 20px;
            display: none; animation: slideUp 0.4s ease; line-height: 1.4;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Actions --- */
        .btn-group { display: flex; gap: 15px; width: 100%; margin-top: 10px; }
        .btn-action {
            flex: 1; padding: 18px; border-radius: 20px; font-size: 1.3rem; font-weight: 900;
            border: none; cursor: pointer; color: white; box-shadow: 0 8px 0 rgba(0,0,0,0.2);
        }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }
        .btn-check { background: var(--success); box-shadow: 0 8px 0 #15803d; }
        .btn-hint { background: var(--accent); color: #92400e; box-shadow: 0 8px 0 #b45309; }
        .btn-next { background: var(--primary); box-shadow: 0 8px 0 #0369a1; }

        /* --- Reactions --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(15px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 10px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 20px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: #1e293b; margin-bottom: 15px; }
        .modal-body { font-size: 1.4rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 18px 50px; border-radius: 40px; font-weight: 900;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 8px 0 #0369a1;
        }
        .btn-modal:active { transform: translateY(4px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @media (max-width: 600px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.2rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .division-layout { font-size: 2.5rem; }
            .digit-box, input[type="number"] { width: 45px; height: 60px; font-size: 2rem; }
            .remainder-row { font-size: 1.1rem; padding: 10px 20px; }
            #val-rem { width: 60px; height: 50px; font-size: 1.8rem; }
            .btn-action { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>

<div class="stars-container" id="stars"></div>
<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Division Galaxy</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="division-card">
        <div class="division-layout">
            <div class="divisor-area" id="divisor-disp">5</div>
            <div class="problem-area">
                <div class="quotient-row" id="quotient-row">
                    <!-- Inputs -->
                </div>
                <div class="dividend-row" id="dividend-row">
                    <!-- Dividend digits -->
                </div>
            </div>
        </div>

        <div class="remainder-row">
            <span id="lbl-rem-text">Remainder (ተረፍ):</span>
            <input type="number" id="val-rem" placeholder="?">
        </div>

        <div class="hint-box" id="hint-text"></div>

        <div class="btn-group">
            <button class="btn-action btn-check" onclick="checkAnswer()" id="btn-check">Check ✔️</button>
            <button class="btn-action btn-hint" onclick="provideHint()" id="btn-hint">💡 Hint</button>
            <button class="btn-action btn-next" onclick="generateProblem()" id="btn-next">Next ↻</button>
        </div>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🚀💎</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ጀግና ሕሳብ።</div>
        <button class="btn-modal" onclick="nextLevel()">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--error);">
        <span class="modal-icon">💥</span>
        <div class="modal-title" id="fail-title">ተጋግዩ!</div>
        <div class="modal-body">
            <span id="fail-body">እንደገና ፈትን። ንዝተረፈ ቁፅሪ ክትሕዝዎ ኣይትረስዑ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4.5rem; color:var(--error); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" onclick="retryLevel()" style="background:var(--error); box-shadow: 0 8px 0 #991b1b;">እንደገና ሞክር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ምምቃል", record: "ዝለዓለ", score: "ነጥቢ", rem: "ተረፍ (R):",
            check: "ፈትሽ ✔️", hint: "ሓገዝ 💡", next: "ቀፃሊ ↻",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ጀግና ናይ ሒሳብ።",
            fail: "ተጋግዩ!", failSub: "መልሲ ጌጋ እዩ። እንደገና ፈትሽ!",
            final: "ውፅኢትካ", nextBtn: "ቀፃሊ ➡",
            hintExpl: "{w} ውሽጢ ክንደይ {d} ኣለው? መልሲ {q} እዩ፣ ተረፍ ድማ {r}።"
        },
        am: {
            title: "ማካፈል", record: "ከፍተኛ", score: "ውጤት", rem: "ተረፍ (R):",
            check: "ፈትሽ ✔️", hint: "ፍንጭ 💡", next: "ቀጣይ ↻",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! የሂሳብ ጀግና ነህ።",
            fail: "ስህተት!", failSub: "እንደገና ይሞክሩ።",
            final: "የእርስዎ ውጤት", nextBtn: "ቀጣይ ➡",
            hintExpl: "በ {w} ውስጥ ስንት {d} አሉ? መልሱ {q} ነው፣ ቀሪው {r}።"
        },
        en: {
            title: "Division Galaxy", record: "Record", score: "Score", rem: "Remainder (R):",
            check: "Check ✔️", hint: "Hint 💡", next: "Next ↻",
            win: "Correct!", winSub: "Excellent! You are a Math Hero.",
            fail: "Oops!", failSub: "Try again! Look at the steps.",
            final: "Your Score", nextBtn: "Next ➡",
            hintExpl: "How many {d}'s go into {w}? Answer is {q}, with {r} left over."
        },
        om: {
            title: "Hiru", record: "Rikardii", score: "Qabxii", rem: "Haftee (R):",
            check: "Mirkaneessi ✔️", hint: "Gargaarsa 💡", next: "Itti Aanu ↻",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Goota herregaati.",
            fail: "Dogoggora!", failSub: "Irra deebi'ii yaali.",
            final: "Qabxii Keessan", nextBtn: "Itti Aanu ➡",
            hintExpl: "{w} keessa {d} meeqatu jira? Deebiin {q}, hafteen {r}."
        },
        so: {
            title: "Qaybin", record: "Rikoodh", score: "Dhibco", rem: "Haraa (R):",
            check: "Hubi ✔️", hint: "Tusaale 💡", next: "Xiga ↻",
            win: "Sax!", winSub: "Shaqo fiican! Waxaad tahay geesi xisaabeed.",
            fail: "Khalad!", failSub: "Isku day mar kale!",
            final: "Dhibcahaaga", nextBtn: "Xiga ➡",
            hintExpl: "Immisa {d} ayaa ku jira {w}? Jawaabtu waa {q}, haraaguna waa {r}."
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('divisionGalaxyHigh_V1') || 0;
    let dividend, divisor, currentStep = 0;
    let expectedQs = [], remainders = [];

    function init() {
        createStars();
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function createStars() {
        const container = document.getElementById('stars');
        for(let i=0; i<100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 1;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
            container.appendChild(star);
        }
    }

    function generateProblem() {
        document.getElementById('hint-text').style.display = 'none';
        currentStep = 0;
        
        // Grade 3-4 suitable: 2 or 3 digits by 1 digit
        dividend = Math.floor(Math.random() * 800) + 100; 
        divisor = Math.floor(Math.random() * 8) + 2; 

        document.getElementById('divisor-disp').textContent = divisor;
        
        const divStr = dividend.toString();
        const qRow = document.getElementById('quotient-row');
        const dRow = document.getElementById('dividend-row');
        qRow.innerHTML = '';
        dRow.innerHTML = '';

        expectedQs = [];
        remainders = [];
        let tempDividend = 0;

        for(let i=0; i<divStr.length; i++) {
            // Setup Dividend UI
            const dBox = document.createElement('div');
            dBox.className = 'digit-box';
            dBox.textContent = divStr[i];
            dRow.appendChild(dBox);

            // Setup Quotient UI
            const qInp = document.createElement('input');
            qInp.type = 'number';
            qInp.id = `q-inp-${i}`;
            qRow.appendChild(qInp);

            // Calculate Logic
            tempDividend = (tempDividend * 10) + parseInt(divStr[i]);
            const q = Math.floor(tempDividend / divisor);
            expectedQs.push(q);
            remainders.push(tempDividend % divisor);
            tempDividend = tempDividend % divisor;
        }

        document.getElementById('val-rem').value = '';
        document.getElementById('q-inp-0').focus();
    }

    function provideHint() {
        const t = translations[currentLang];
        const divStr = dividend.toString();
        
        if (currentStep >= expectedQs.length) {
            // Remainder hint
            document.getElementById('hint-text').textContent = `Final remainder is ${dividend % divisor}.`;
            document.getElementById('hint-text').style.display = 'block';
            document.getElementById('val-rem').value = dividend % divisor;
            document.getElementById('val-rem').classList.add('input-correct');
            // clear any step highlight
            document.querySelectorAll('.digit-box').forEach(el => el.classList.remove('active-step'));
            document.querySelectorAll('.quotient-row input').forEach(el => el.classList.remove('step-input'));
            return;
        }

        // highlight current working digit and its quotient box
        document.querySelectorAll('.digit-box').forEach(el => el.classList.remove('active-step'));
        document.querySelectorAll('.quotient-row input').forEach(el => el.classList.remove('step-input'));

        const prevRem = (currentStep > 0) ? remainders[currentStep-1] : 0;
        const workingNum = (prevRem * 10) + parseInt(divStr[currentStep]);
        const q = expectedQs[currentStep];
        const r = remainders[currentStep];

        const expl = t.hintExpl
            .replace('{w}', workingNum)
            .replace('{d}', divisor)
            .replace('{q}', q)
            .replace('{r}', r);

        document.getElementById('hint-text').textContent = expl;
        document.getElementById('hint-text').style.display = 'block';
        
        const inp = document.getElementById(`q-inp-${currentStep}`);
        inp.value = q;
        inp.classList.add('input-correct');
        inp.classList.add('step-input');

        const dBoxes = document.querySelectorAll('.digit-box');
        if (dBoxes[currentStep]) dBoxes[currentStep].classList.add('active-step');
        currentStep++;
        
        playSound('pop');
    }

    function checkAnswer() {
        let allCorrect = true;
        // Build overall user quotient from all non-empty inputs (order preserved)
        let digitStr = '';
        const inputs = [];
        for(let i=0; i<expectedQs.length; i++) {
            const inp = document.getElementById(`q-inp-${i}`);
            inputs.push(inp);
            const raw = inp.value.trim();
            if (raw !== '') digitStr += raw;
        }

        const exactQuot = Math.floor(dividend / divisor);
        const userQuot = digitStr === '' ? NaN : parseInt(digitStr, 10);

        if (userQuot !== exactQuot) {
            allCorrect = false;
            // mark all quotient boxes as needing attention
            inputs.forEach(inp => inp.style.borderColor = 'var(--error)');
        } else {
            // mark the boxes that the learner actually used as correct
            inputs.forEach(inp => {
                if (inp.value.trim() !== '') inp.classList.add('input-correct');
            });
        }

        const remVal = parseInt(document.getElementById('val-rem').value);
        if (remVal !== (dividend % divisor)) {
            allCorrect = false;
            document.getElementById('val-rem').style.borderColor = 'var(--error)';
        }

        if (allCorrect) {
            score += 30;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('divisionGalaxyHigh_V1', highScore);
            }
            updateScoreUI();
            startConfetti();
            playSound('win');
            document.getElementById('overlay-win').classList.add('show');
        } else {
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function nextLevel() {
        stopConfetti();
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function retryLevel() {
        // Close the fail overlay but keep the same division question
        document.getElementById('overlay-fail').classList.remove('show');
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-rem-text').textContent = t.rem;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('btn-hint').textContent = t.hint;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(440, t); osc.frequency.exponentialRampToValueAtTime(880, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, t);
            gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    }

    // --- Confetti Rain ---
    let pieces = [];
    let isConfettiActive = false;
    function startConfetti() {
        isConfettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pieces = [];
        for(let i=0; i<150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 2,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                size: Math.random() * 8 + 4
            });
        }
        function anim() {
            if (!isConfettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y > canvas.height) p.y = -20;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }
    function stopConfetti() {
        isConfettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    window.onload = init;
</script>

</body>


<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Addition - ሰማያዊ ድምር</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-top: #00d2ff;
            --sky-bottom: #92e1e2;
            --primary: #4361ee;
            --secondary: #f72585;
            --accent: #fbbf24;
            --success: #06d6a0;
            --text-dark: #2b2d42;
            --cloud-white: #ffffff;
            --carry-bg: #fff9c4;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        body {
            margin: 0; padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-bottom) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            user-select: none;
        }

        /* --- Header --- */
        header {
            width: 100%;
            padding: 15px 30px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 5px solid var(--primary);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: sticky; top: 0;
        }

        .header-item-left { display: flex; justify-content: flex-start; }
        .header-item-right { display: flex; justify-content: flex-end; }

        .grade-badge {
            background: var(--secondary); color: white; width: 55px; height: 55px;
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.8rem; border: 3px solid white;
            box-shadow: 0 5px 0 #9f1239; transform: rotate(-5deg);
        }

        h1 { margin: 0; color: var(--primary); font-size: 2rem; font-weight: 900; letter-spacing: -1px; text-align: center; }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 18px; font-weight: 800; color: var(--primary);
            height: 45px; background: white; border-radius: 22px;
            width: 170px; border: 2px solid var(--primary);
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }
        .custom-options {
            position: absolute; top: 115%; right: 0; left: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column;
            border-radius: 15px; padding: 6px; box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            border: 1px solid #eee; z-index: 200;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #444; }
        .custom-option:hover { background: #f0f7ff; color: var(--primary); }

        /* --- Main Content --- */
        .container {
            flex: 1; width: 100%; max-width: 800px;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; z-index: 10;
            justify-content: flex-start;
            gap: 20px;
        }

        .score-board { display: flex; gap: 20px; margin-bottom: 5px; }
        .score-pill {
            background: white; padding: 10px 25px; border-radius: 30px;
            font-weight: 900; color: var(--text-dark);
            border: 3px solid var(--primary);
            box-shadow: 0 8px 0 rgba(0,0,0,0.05);
            display: flex; align-items: center; gap: 10px;
            font-size: 1.2rem;
        }

        .instruction-banner {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 40px; border-radius: 40px;
            font-size: 1.4rem; font-weight: 800; color: var(--primary);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center; max-width: 90%;
            border: 4px dashed var(--primary);
        }

        /* --- The Magic Grid --- */
        .magic-card {
            background: white; padding: 35px; border-radius: 50px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            width: 100%; max-width: 500px;
            position: relative; border: 8px solid white;
        }
        .operator {
            position: absolute; left: 20px; top: 180px;
            font-size: 3.5rem; font-weight: 900; color: var(--secondary);
        }

        .addition-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 12px; position: relative;
            padding-left: 20px;
        }

        .col-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            padding: 10px 5px; border-radius: 20px;
        }
        .col-wrapper.highlight { background: #f0f7ff; transform: scale(1.05); box-shadow: 0 0 20px rgba(67, 97, 238, 0.1); }

        .unit-label { font-size: 0.8rem; font-weight: 900; color: #94a3b8; text-transform: uppercase; }

        .digit-box {
            width: 100%; height: 75px;
            background: #f8fafc; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; color: var(--text-dark);
            border: 1px solid #e2e8f0;
        }

        input[type="number"] {
            width: 100%; height: 75px; font-size: 2.8rem;
            text-align: center; border: 4px solid #e2e8f0;
            border-radius: 20px; outline: none; font-weight: 900;
            color: var(--primary); background: #f1f5f9;
        }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
        input:focus { border-color: var(--primary); background: white; }

        .carry-input {
            width: 50px !important; height: 50px !important;
            font-size: 1.5rem !important; border-radius: 50% !important;
            border: 3px dashed var(--accent) !important;
            background: var(--carry-bg) !important; color: #b45309 !important;
        }

        .result-input { border-color: var(--success) !important; color: var(--success); }

        .grid-line {
            grid-column: span 4; height: 6px; background: var(--text-dark);
            border-radius: 3px; margin: 5px 0;
        }

        /* --- Buttons --- */
        .btn-group {
            display: flex; gap: 20px; width: 100%; max-width: 500px;
            margin-top: 10px;
        }
        .btn-action {
            flex: 1; padding: 20px; border-radius: 50px;
            font-size: 1.5rem; font-weight: 900; color: white;
            border: none; cursor: pointer;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }
        .btn-check { background: var(--success); box-shadow: 0 10px 0 #059669; }
        .btn-next { background: var(--primary); box-shadow: 0 10px 0 #3a56d4; }

        /* --- Reactions --- */
        .overlay {
            position: fixed; inset: 0; background: rgba(43, 45, 66, 0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; backdrop-filter: blur(12px); padding: 20px;
        }
        .overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        
        .modal {
            background: white; padding: 50px; border-radius: 50px;
            text-align: center; max-width: 480px; width: 95%;
            border: 12px solid var(--primary);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .modal-icon { font-size: 8rem; display: block; margin-bottom: 25px; }
        .modal-title { font-size: 3rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px; }
        .modal-body { font-size: 1.5rem; color: #555; margin-bottom: 40px; font-weight: 700; line-height: 1.4; }

        .btn-modal {
            background: var(--primary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-weight: 900;
            font-size: 1.6rem; cursor: pointer; box-shadow: 0 10px 0 #3a56d4;
        }
        .btn-modal:active { transform: translateY(6px); box-shadow: none; }

        #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1100; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            header { padding: 10px 15px; grid-template-columns: auto 1fr auto; }
            h1 { font-size: 1.3rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.4rem; }
            .digit-box, input[type="number"] { height: 60px; font-size: 2rem; }
            .carry-input { width: 35px !important; height: 35px !important; font-size: 1.1rem !important; }
            .operator { font-size: 2.5rem; top: 140px; }
            .instruction-banner { font-size: 1.1rem; padding: 10px 25px; }
            .btn-action { font-size: 1.2rem; padding: 15px; }
        }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<header>
    <div class="header-item-left"><div class="grade-badge">3</div></div>
    <h1 id="app-title">Magic Addition</h1>
    <div class="header-item-right">
        <div class="custom-select-wrapper" id="lang-dropdown">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-text">🗺️ ትግርኛ</span>
                    <span style="font-size:0.8rem">▼</span>
                </div>
                <div class="custom-options">
                    <div class="custom-option" data-value="ti">ትግርኛ</div>
                    <div class="custom-option" data-value="am">አማርኛ</div>
                    <div class="custom-option" data-value="en">English</div>
                    <div class="custom-option" data-value="om">Afan Oromoo</div>
                    <div class="custom-option" data-value="so">Soomaali</div>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill">🏅 <span id="lbl-record">Record</span>: <span id="val-high" style="margin-left:5px">0</span></div>
        <div class="score-pill">⭐ <span id="lbl-score">Score</span>: <span id="val-score" style="margin-left:5px">0</span></div>
    </div>

    <div class="instruction-banner" id="lbl-instr">ካብ የማን ጀሚርኩም ደምሩ!</div>

    <div class="magic-card">
        <div class="operator">+</div>
        <div class="addition-grid">
            <!-- Th -->
            <div class="col-wrapper" id="cw-3">
                <div class="unit-label" id="lbl-th">Th</div>
                <input type="number" class="carry-input" id="c-3" placeholder="" onfocus="highlightCol(3)">
                <div class="digit-box" id="n1-3"></div>
                <div class="digit-box" id="n2-3"></div>
                <div class="grid-line"></div>
                <input type="number" class="result-input" id="r-3" placeholder="" onfocus="highlightCol(3)">
            </div>
            <!-- H -->
            <div class="col-wrapper" id="cw-2">
                <div class="unit-label" id="lbl-h">H</div>
                <input type="number" class="carry-input" id="c-2" placeholder="" onfocus="highlightCol(2)">
                <div class="digit-box" id="n1-2"></div>
                <div class="digit-box" id="n2-2"></div>
                <div class="grid-line"></div>
                <input type="number" class="result-input" id="r-2" placeholder="" onfocus="highlightCol(2)">
            </div>
            <!-- T -->
            <div class="col-wrapper" id="cw-1">
                <div class="unit-label" id="lbl-t">T</div>
                <input type="number" class="carry-input" id="c-1" placeholder="" onfocus="highlightCol(1)">
                <div class="digit-box" id="n1-1"></div>
                <div class="digit-box" id="n2-1"></div>
                <div class="grid-line"></div>
                <input type="number" class="result-input" id="r-1" placeholder="" onfocus="highlightCol(1)">
            </div>
            <!-- O -->
            <div class="col-wrapper" id="cw-0">
                <div class="unit-label" id="lbl-o">O</div>
                <div style="height:50px"></div> <!-- Spacer no carry for ones -->
                <div class="digit-box" id="n1-0"></div>
                <div class="digit-box" id="n2-0"></div>
                <div class="grid-line"></div>
                <input type="number" class="result-input" id="r-0" placeholder="" onfocus="highlightCol(0)">
            </div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-action btn-check" onclick="checkAnswer()" id="btn-check">Check ✔️</button>
        <button class="btn-action btn-check" onclick="explainAnswer()" id="btn-explain">Explain 💡</button>
        <button class="btn-action btn-next" onclick="generateProblem()" id="btn-next">Next ↻</button>
    </div>
</div>

<!-- Reactions Overlays -->
<div class="overlay" id="overlay-win">
    <div class="modal">
        <span class="modal-icon">🌈✨</span>
        <div class="modal-title" id="win-title">ትኽክል!</div>
        <div class="modal-body" id="win-body">ብጣዕሚ ጽቡቕ! ጀግና ሕሳብ።</div>
        <button class="btn-modal" id="btn-win-next" onclick="nextLevel()">ቀፃሊ ➡</button>
    </div>
</div>

<div class="overlay" id="overlay-fail">
    <div class="modal" style="border-color: var(--secondary);">
        <span class="modal-icon">☁️💨</span>
        <div class="modal-title" id="fail-title">ተጋግዩ!</div>
        <div class="modal-body">
            <span id="fail-body">እንደገና ፈትን። ንዝተረፈ ቁፅሪ ክትሕዝዎ ኣይትረስዑ።</span><br><br>
            <span id="lbl-final-score" style="font-weight: 800;">ውፅኢትካ</span>: <span id="final-score-val" style="font-size:4.5rem; color:var(--secondary); font-weight:900;">0</span>
        </div>
        <button class="btn-modal" id="btn-fail-retry" onclick="retryLevel()" style="background:var(--secondary); box-shadow: 0 10px 0 #9f1239;">እንደገና ጀምር 🔄</button>
    </div>
</div>

<script>
    const translations = {
        ti: {
            title: "ምድማር", instr: "ካብ የማን ጀሚርኩም ደምሩ!",
            th: "ሽሓት", h: "ሚኢቲ", t: "ዓሰርተ", o: "ሓደ",
            score: "ነጥቢ", record: "ዝለዓለ", check: "ፈትሽ ✔️", explain: "መረድኢ 💡", next: "ቀፃሊ ↻",
            win: "ትኽክል!", winSub: "ብጣዕሚ ጽቡቕ! ጀግና ናይ ሒሳብ።",
            fail: "ተጋግዩ!", failSub: "እንደገና ፈትን። ንዝተረፈ ቁፅሪ ክትሕዝዎ ኣይትረስዑ።",
            final: "ውፅኢትካ", nextBtn: "ቀፃሊ ➡", retryBtn: "እንደገና ሞክር 🔄"
        },
        am: {
            title: "መደመር", instr: "ከቀኝ በመጀመር ይደምሩ!",
            th: "ሺህ", h: "መቶ", t: "አስር", o: "አንድ",
            score: "ውጤት", record: "ከፍተኛ", check: "ፈትሽ ✔️", explain: "አስረዳ 💡", next: "ቀጣይ ↻",
            win: "ትክክል!", winSub: "በጣም ጎበዝ! የሂሳብ ጀግና ነህ።",
            fail: "ስህተት!", failSub: "እንደገና ይሞክሩ። ተረፍ ቁጥሮችን መያዝ አይርሱ።",
            final: "የእርስዎ ውጤት", nextBtn: "ቀጣይ ➡", retryBtn: "ደግመክ ሞክር ➡"
        },
        en: {
            title: "Addition", instr: "Start adding from the right side!",
            th: "Th", h: "H", t: "T", o: "O",
            score: "Score", record: "Record", check: "Check ✔️", explain: "Explain 💡", next: "Next ↻",
            win: "Correct!", winSub: "Excellent! You are a Math Hero.",
            fail: "Oops!", failSub: "Try again! Don't forget the carries.",
            final: "Your Score", nextBtn: "Next ➡", retryBtn: "Try again ➡"
        },
        om: {
            title: "Ida'ama", instr: "Mirga irraa jalqabi ida'i!",
            th: "Kuma", h: "Dhibba", t: "Kudhan", o: "Tokko",
            score: "Qabxii", record: "Rikardii", check: "Mirkaneessi ✔️", explain: "Ibsi 💡", next: "Itti Aanu ↻",
            win: "Sirrii!", winSub: "Baay'ee gaariidha! Goota herregaati.",
            fail: "Dogoggora!", failSub: "Irra deebi'ii yaali. Karrayii (carry) kessan hin irraanfatinaa.",
            final: "Qabxii Keessan", nextBtn: "Itti Aanu ➡", retryBtn: "Irra deebi'ii yaali ➡"
        },
        so: {
            title: "Isku-dar", instr: "Ka bilow isku-darka dhinaca midig!",
            th: "Kun", h: "Boqol", t: "Toban", o: "Kow",
            score: "Dhibco", record: "Rikoodh", check: "Hubi ✔️", explain: "Sharax 💡", next: "Xiga ↻",
            win: "Sax!", winSub: "Shaqo fiican! Waxaad tahay geesi xisaabeed.",
            fail: "Khalad!", failSub: "Isku day mar kale! Ha ilaawin lambarrada kuu haray.",
            final: "Dhibcahaaga", nextBtn: "Xiga ➡", retryBtn: "Isku day mar kale ➡"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('magicAdditionHigh_V1') || 0;
    let num1Digits = [], num2Digits = [];
    let isConfettiActive = false;

    function init() {
        document.getElementById('val-high').textContent = highScore;
        updateLanguage();
        generateProblem();
    }

    function generateProblem() {
        // Generate digits that likely cause carries
        num1Digits = [Math.floor(Math.random()*4), Math.floor(Math.random()*9), Math.floor(Math.random()*9), Math.floor(Math.random()*9+1)];
        num2Digits = [Math.floor(Math.random()*4), Math.floor(Math.random()*9), Math.floor(Math.random()*9), Math.floor(Math.random()*9+1)];

        for(let i=0; i<4; i++) {
            document.getElementById(`n1-${i}`).textContent = num1Digits[3-i] || (i===3 ? '' : '0');
            document.getElementById(`n2-${i}`).textContent = num2Digits[3-i] || (i===3 ? '' : '0');
            document.getElementById(`r-${i}`).value = '';
            const carry = document.getElementById(`c-${i}`);
            if(carry) carry.value = '';
        }
        highlightCol(0);
        document.getElementById('r-0').focus();
    }

    function highlightCol(idx) {
        document.querySelectorAll('.col-wrapper').forEach(cw => cw.classList.remove('highlight'));
        document.getElementById(`cw-${idx}`).classList.add('highlight');
    }

    function checkAnswer() {
        let carry = 0;
        let allCorrect = true;

        for(let i=0; i<4; i++) {
            const d1 = num1Digits[3-i];
            const d2 = num2Digits[3-i];
            const expectedSum = d1 + d2 + carry;      // carry is the value brought from the previous (right) column
            const expectedDigit = expectedSum % 10;
            const carryOut = Math.floor(expectedSum / 10);

            const userDigit = parseInt(document.getElementById(`r-${i}`).value);
            const userCarry = i > 0 ? parseInt(document.getElementById(`c-${i}`).value) || 0 : 0;

            // Result digit must match
            if (userDigit !== expectedDigit) allCorrect = false;
            // Carry shown above this column should equal the carry that came *into* this column
            if (i > 0 && carry > 0 && userCarry !== carry) allCorrect = false;

            carry = carryOut; // pass carry to the next (left) column
        }

        if (allCorrect) {
            score += 30;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('magicAdditionHigh_V1', highScore);
            }
            updateScoreUI();
            startConfetti();
            playSound('win');
            document.getElementById('overlay-win').classList.add('show');
        } else {
            playSound('fail');
            document.getElementById('final-score-val').textContent = score;
            document.getElementById('overlay-fail').classList.add('show');
        }
    }

    function explainAnswer() {
        // Fill in correct carries (into each column) and result digits for the current problem
        let carry = 0;
        for (let i = 0; i < 4; i++) {
            const d1 = num1Digits[3 - i];
            const d2 = num2Digits[3 - i];
            const expectedSum = d1 + d2 + carry;  // carry is what comes from the previous column
            const expectedDigit = expectedSum % 10;
            const carryOut = Math.floor(expectedSum / 10);

            const resultInput = document.getElementById(`r-${i}`);
            if (resultInput) resultInput.value = expectedDigit;

            // For columns other than ones (i > 0), show the carry that comes *into* this column
            if (i > 0) {
                const carryInput = document.getElementById(`c-${i}`);
                if (carryInput) carryInput.value = carry > 0 ? carry : '';
            }

            carry = carryOut; // pass carry to the next (left) column
        }
    }

    function nextLevel() {
        stopConfetti();
        document.getElementById('overlay-win').classList.remove('show');
        generateProblem();
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        document.getElementById('overlay-fail').classList.remove('show');
        generateProblem();
    }

    function retryLevel() {
        // Close the fail overlay but keep the same question so the learner can try again
        document.getElementById('overlay-fail').classList.remove('show');
    }

    function updateScoreUI() {
        document.getElementById('val-score').textContent = score;
        document.getElementById('val-high').textContent = highScore;
    }

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('lbl-instr').textContent = t.instr;
        document.getElementById('lbl-th').textContent = t.th;
        document.getElementById('lbl-h').textContent = t.h;
        document.getElementById('lbl-t').textContent = t.t;
        document.getElementById('lbl-o').textContent = t.o;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('btn-explain').textContent = t.explain;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('win-title').textContent = t.win;
        document.getElementById('win-body').textContent = t.winSub;
        document.getElementById('fail-title').textContent = t.fail;
        document.getElementById('fail-body').textContent = t.failSub;
        document.getElementById('lbl-final-score').textContent = t.final;
        document.getElementById('btn-win-next').textContent = t.nextBtn;
        document.getElementById('btn-fail-retry').textContent = t.retryBtn;
    }

    // Dropdown Handling
    const dropdown = document.getElementById('lang-dropdown');
    const trigger = dropdown.querySelector('.custom-select__trigger');
    const options = dropdown.querySelectorAll('.custom-option');

    trigger.addEventListener('click', (e) => {
        dropdown.querySelector('.custom-select').classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(opt => {
        opt.addEventListener('click', function(e) {
            e.stopPropagation();
            currentLang = this.dataset.value;
            document.getElementById('current-lang-text').textContent = "🗺️ " + this.textContent;
            dropdown.querySelector('.custom-select').classList.remove('open');
            updateLanguage();
        });
    });

    window.addEventListener('click', () => dropdown.querySelector('.custom-select').classList.remove('open'));

    // --- Audio ---
    function playSound(type) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        const ctx = new AudioContext();
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'win') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523, t); osc.frequency.exponentialRampToValueAtTime(1046, t + 0.1);
            gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
            osc.start(t); osc.stop(t + 0.5);
        } else if (type === 'fail') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.linearRampToValueAtTime(80, t + 0.4);
            gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        } else {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, t);
            gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
            osc.start(t); osc.stop(t + 0.1);
        }
    }

    // --- Confetti Rain ---
    let pieces = [];
    function startConfetti() {
        isConfettiActive = true;
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        pieces = [];
        for(let i=0; i<150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                vx: (Math.random() - 0.5) * 4,
                vy: Math.random() * 5 + 2,
                color: `hsl(${Math.random()*360}, 100%, 50%)`,
                size: Math.random() * 8 + 4
            });
        }
        function anim() {
            if (!isConfettiActive) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.y > canvas.height) p.y = -20;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            requestAnimationFrame(anim);
        }
        anim();
    }
    function stopConfetti() {
        isConfettiActive = false;
        const canvas = document.getElementById('confetti-canvas');
        canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    }

    window.onload = init;
</script>
</body>

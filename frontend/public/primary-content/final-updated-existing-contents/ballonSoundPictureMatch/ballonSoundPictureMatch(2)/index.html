<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>


<body>
    <div class="container">
        <div class="header">Sound to Picture Matching</div>
        <div class="itemWrapper"></div>
        <div class="feedback-center" aria-hidden="true" style="display:none;">
            <img class="feedback-img" alt="feedback" />
        </div>
        <div class="question">
            <div class="readAgain" title="Read Again"></div>
        </div>
        <div class="nav-controls" role="navigation" aria-label="Page navigation">
            <select class="lang-select" aria-label="Language selector" title="Language">
                <option value="en">English</option>
                <option value="am">አማርኛ</                <option value="ti">ትግርኛ</option>
                <option value="om">Afan Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
            <button class="btn nav back" title="Back" aria-label="Back">⬅</button>
            <button class="btn nav home" title="Home" aria-label="Home">🏠</button>
        </div>
        <div class="controls">
            <button class="btn mute-toggle" aria-pressed="false" title="Mute/Unmute">🔊</button>
            <button class="btn streak" disabled title="Streak">🔥 <span class="streak-count">0</span></button>
        </div>
        <audio class="result" autoplay></audio>
        <audio class="again" autoplay></audio>
    </div>
</body>

<script>
    function storeData(title, ques, ans, status, hint = false) {
        let data = localStorage.getItem(title);
        if (!data) {
            let d = {
                title,
                data: [{ ques, status, ans, hint, date: Date.now() }]
            }
            localStorage.setItem(title, JSON.stringify(d))
        } else {
            let d = JSON.parse(data)
            let s = { ques, ans, status, hint, date: Date.now() }
            d.data.push(s)
            localStorage.setItem(title, JSON.stringify(d))
        }
    }
    var arrOfStr = ["chocolate", "donute", "heart"];//end-var

    const itemWrapper = document.getElementsByClassName("itemWrapper")[0]
    const balloon = document.getElementsByClassName("balloon");
    const fishs = document.getElementsByClassName("fishs");
    const fishImg = document.getElementsByClassName("fishImg");
    const bubble = document.getElementsByClassName("bubble");

    let pageTitle = ["Sound to Picture Matching"];//end-var
    function setPageTitle(selector) {
        let titleElt = document.querySelector(selector);
        let title = document.querySelector("title");
        title.innerText = pageTitle[0];
        if (titleElt) {
            titleElt.innerText = pageTitle[0];
        }
    }
    setPageTitle('.header');
    // ----- Mute/Unmute, Streak, and Navigation -----
    const muteBtn = document.querySelector('.mute-toggle');
    const streakEl = document.querySelector('.streak .streak-count');
    const backBtn = document.querySelector('.nav-controls .back');
    const homeBtn = document.querySelector('.nav-controls .home');
    const langSelect = document.querySelector('.nav-controls .lang-select');

    // ----- Language / i18n -----
    let currentLang = 'en';
    try { currentLang = localStorage.getItem('spm_lang') || 'en'; } catch(e) {}
    const i18n = {
        en: { title: 'Sound to Picture Matching', back: 'Back', home: 'Home', mute: 'Mute/Unmute', readAgain: 'Read Again', streak: 'Streak' },
        am: { title: 'ድምፅን ከምስል ጋር ማዛመድ', back: 'ተመለስ', home: 'መነሻ', mute: 'ድምፅ ማቆም/መክፈት', readAgain: 'እንደገና አንብብ', streak: 'ተከታታይ' },
        ti: { title: 'ድምጺ ምስ ምስሊ ምምሳሰል', back: 'ተመለስ', home: 'መነሻ', mute: 'ድምጺ ኣቕሓ/ኣፍታሕ', readAgain: 'ዳግማይ ኣንብብ', streak: 'ተኸታታይ' },
        om: { title: 'Sagalee fa akka suuraa walitti fiduu', back: 'Duubatti', home: 'Mana', mute: 'Sagalee Ciibsii/Afuri', readAgain: 'Irradeebi’i dubbisi', streak: 'Itti fufinsa' },
        so: { title: 'Dhawaqa iyo sawirka iswaafaji', back: 'Dib u noqo', home: 'Guri', mute: 'Aamus/Dami', readAgain: 'Dib u akhri', streak: 'Isku xigxig' }
    };
    function applyLanguage(){
        const t = (key)=> (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || '';
        pageTitle[0] = t('title');
        setPageTitle('.header');
        if(backBtn){ backBtn.title = t('back'); backBtn.setAttribute('aria-label', t('back')); }
        if(homeBtn){ homeBtn.title = t('home'); homeBtn.setAttribute('aria-label', t('home')); }
        if(muteBtn){ muteBtn.title = t('mute'); }
        const ra = document.querySelector('.readAgain');
        if(ra){ ra.title = t('readAgain'); }
        const streakBtn = document.querySelector('.streak');
        if(streakBtn){ streakBtn.title = t('streak'); }
        try{ document.documentElement.setAttribute('lang', currentLang); }catch(e){}
        if(langSelect){ langSelect.value = currentLang; }
    }
    if(langSelect){ langSelect.addEventListener('change', (e)=>{ currentLang = e.target.value || 'en'; try{ localStorage.setItem('spm_lang', currentLang);}catch(err){} applyLanguage(); }); }
    applyLanguage();
    // Persist only mute; streak should reset on refresh
    try { window.__muted = JSON.parse(localStorage.getItem('spm_muted')||'false'); } catch(e){ window.__muted=false; }
    let streakCount = 0; // always start at 0 on load
    function updateStreakDisplay(){ if(streakEl){ streakEl.textContent = String(streakCount); } }
    function applyMuteState(){
        document.querySelectorAll('audio').forEach(a=>{ try{ a.muted = !!window.__muted; a.volume = window.__muted ? 0 : 1; }catch(e){} });
        if(muteBtn){ muteBtn.setAttribute('aria-pressed', window.__muted ? 'true':'false'); muteBtn.textContent = window.__muted ? '🔇' : '🔊'; muteBtn.title = window.__muted ? 'Unmute' : 'Mute'; }
        try{ localStorage.setItem('spm_muted', JSON.stringify(!!window.__muted)); }catch(e){}
    }
    if(muteBtn){ muteBtn.addEventListener('click', ()=>{ window.__muted = !window.__muted; applyMuteState(); }); }
    if(backBtn){ backBtn.addEventListener('click', ()=>{ if(window.history.length>1){ window.history.back(); } }); }
    if(homeBtn){ homeBtn.addEventListener('click', ()=>{ let url=null; try{ url = localStorage.getItem('homeUrl')||null; }catch(e){} if(!url){ const entered = window.prompt('Enter Home URL or file path (saved):'); if(entered){ try{ localStorage.setItem('homeUrl', entered);}catch(e){} url = entered; } } if(url){ window.location.assign(url); } }); }
    applyMuteState();
    updateStreakDisplay();

    const colors = ['red', 'yellow', 'rgb(0, 102, 255)', 'rgb(81, 255, 0)', 'rgb(217, 0, 236)', 'orangered', 'pink']
    let randomX;
    let randomY;

    createElements()
    assignLetters();
    checkAnswer()
    readAgain()

    document.getElementsByTagName("body")[0].onload = function () {
        dynamics();
        dynamics2();
        setInterval(dynamics, 3000)
        setInterval(dynamics2, 4000)

    }
    function createElements() {
        // Balloons and bubbles are decorative background elements, their count can remain
        for (let i = 0; i < 8; i++) {
            const balloon = document.createElement("div")
            balloon.className = "balloon"
            balloon.id = "balloon" + (i + 1)
            itemWrapper.appendChild(balloon)
            const bubble = document.createElement("div")
            bubble.className = "bubble"
            itemWrapper.appendChild(bubble)
        }
        document.getElementsByClassName("bubble")[0].id = "bubble1"
        document.getElementsByClassName('bubble')[1].id = "bubble2"
        // The number of 'fishs' elements should match the number of items in arrOfStr
        for (let i = 0; i < arrOfStr.length; i++) { // Modified loop count
            const fish = document.createElement("div")
            const fishImg = document.createElement("img")
            fishImg.className = "fishImg"
            fish.className = "fishs"
            fish.appendChild(fishImg)
            itemWrapper.appendChild(fish)
        }
    }

    function dynamics() {
        for (let i = 0; i < balloon.length; i++) {
            randomX = Math.floor(Math.random() * 80)
            randomY = Math.floor(Math.random() * 60)
            balloon[i].style.top = randomY + "%";
            balloon[i].style.left = randomX + "%";
            if (balloon[i].style.left > "70%") {
                balloon[i].style.transform = "rotateY(180deg)"
            }
        }
        for (let i = 0; i < bubble.length; i++) {
            randomX = Math.floor(Math.random() * 100)
            randomY = Math.floor(Math.random() * 70)
            bubble[i].style.top = randomY + "%";
            bubble[i].style.left = randomX + "%";
        }

    }
    function dynamics2() {
        for (let i = 0; i < fishs.length; i++) {
            randomX = Math.floor(Math.random() * 80)
            randomY = Math.floor(Math.random() * 60)
            fishs[i].style.top = randomY + "%";
            fishs[i].style.left = randomX + "%";
            fishs[i].style.background = "rgba(255, 255, 255, 0.6)"
            fishs[i].style.border = `solid 2px ${colors[i % colors.length]} ` // Use modulo to cycle colors if arrOfStr > colors.length
            fishs[i].style.backgroundSize = "100%"
        }
    }


    var randomFidelGroup;
    var slicedFidelGroup

    function assignLetters() {
        slicedFidelGroup = arrOfStr.slice(0); // Create a mutable copy of arrOfStr
        randomFidelGroup = Math.floor(Math.random() * slicedFidelGroup.length);
        document.getElementsByClassName("again")[0].src = `./assets/${slicedFidelGroup[randomFidelGroup]}.mp3`
        // document.getElementsByClassName("questionImg")[0].src = `./assets/${slicedFidelGroup[randomFidelGroup]}.png`
        
        // Populate fish images with items from slicedFidelGroup
        // Ensure the loop runs for the correct number of fish elements (which is arrOfStr.length)
        let tempOptions = arrOfStr.slice(); // Copy arrOfStr for options
        for (let i = 0; i < fishs.length; i++) { // Modified loop count to match actual fish elements
            let sliceRand = Math.floor(Math.random() * tempOptions.length)
            fishImg[i].src = `./assets/${tempOptions[sliceRand]}.png`
            tempOptions.splice(sliceRand, 1) // Remove assigned option to ensure uniqueness
        }
    }

    function readAgain() {
        document.getElementsByClassName("readAgain")[0].onclick = function () {
            const a = document.getElementsByClassName("again")[0];
            try { a.muted = !!window.__muted; a.volume = window.__muted ? 0 : 1; } catch(e){}
            a.play()
        }
    }


    function checkAnswer() {
        for (let i = 0; i < fishs.length; i++) {
            fishs[i].onclick = function () {
                randomX = Math.floor(Math.random() * 1000)
                randomY = Math.floor(Math.random() * 500)
                fishs[i].style.top = randomY + "px";
                fishs[i].style.left = randomX + "px";
                fishs[i].style.background = colors[Math.floor(Math.random() * colors.length)]
                let d = fishImg[i].src.split('/');

                if (arrOfStr[randomFidelGroup] == d[d.length - 1].split('.')[0]) {
                    storeData(`${currentLang}-soundPictureMatch`, arrOfStr[randomFidelGroup], d[d.length - 1].split('.')[0], "correct")
                    let applauses = ['goodJob', 'amazing', 'intelligent', 'phenomenal']
                    let randomApplause = Math.floor(Math.random() * applauses.length)
                    document.getElementsByClassName("question")[0].style.color = "rgb(81, 255, 0)";
                    const fb = document.querySelector('.feedback-center');
                    const fbi = document.querySelector('.feedback-center .feedback-img');
                    if(fb && fbi){ fbi.src = './assets/yes.jpg'; fb.style.display = 'flex'; }
                    const res = document.getElementsByClassName("result")[0];
                    try { res.muted = !!window.__muted; res.volume = window.__muted ? 0 : 1; } catch(e){}
                    res.src = "./assets/" + applauses[randomApplause] + ".mp3"
                    // update streak
                    streakCount += 1; updateStreakDisplay();
                    setTimeout(function () {
                        document.getElementsByClassName("question")[0].style.color = "black";
                        const fb = document.querySelector('.feedback-center'); if(fb){ fb.style.display = 'none'; }
                        assignLetters()
                    }, 1500)
                }
                else {
                    storeData(`${currentLang}-soundPictureMatch`, arrOfStr[randomFidelGroup], d[d.length - 1].split('.')[0], "wrong")

                    let wrong = ['a_aa', 'nope', 'goodtry', 'tryagain']
                    randomApplause = Math.floor(Math.random() * wrong.length)
                    document.getElementsByClassName("question")[0].style.color = "red";
                    const fbWrong = document.querySelector('.feedback-center');
                    const fbiWrong = document.querySelector('.feedback-center .feedback-img');
                    if(fbWrong && fbiWrong){ fbiWrong.src = './assets/no.jpg'; fbWrong.style.display = 'flex'; }
                    const res = document.getElementsByClassName("result")[0];
                    try { res.muted = !!window.__muted; res.volume = window.__muted ? 0 : 1; } catch(e){}
                    res.src = "./assets/" + wrong[randomApplause] + ".mp3"
                    // reset streak
                    streakCount = 0; updateStreakDisplay();
                    setTimeout(function(){ const fb = document.querySelector('.feedback-center'); if(fb){ fb.style.display = 'none'; } document.getElementsByClassName("question")[0].style.color = "black"; }, 1200);
                }
            }
        }
    }
</script>

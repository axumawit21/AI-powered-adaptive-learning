<body>
  <div class="app">

<script>
    let changeMin = 51;//end-var
    let changeMax = 75;//end-var

    let pageTitle = ["ቀዲሙ ዝርከብ ቁፅሪ"];//end-var

    function setPageTitle(selector) {
        let titleElt = document.querySelector(selector);
        let title = document.querySelector("title");
        title.innerText = pageTitle[0];
        if (titleElt) {
            titleElt.innerText = pageTitle[0];
        }
    }
    setPageTitle('h1');

    function storeData(title, ques, ans, status, hint = false) {
        let data = localStorage.getItem(title);
        if (!data) {
            let d = {
                title,
                data: [{ ques, status, ans, hint, date: Date.now() }]
            }
            localStorage.setItem(title, JSON.stringify(d))
        } else {
            let d = JSON.parse(data)
            let s = { ques, ans, status, hint, date: Date.now() }
            d.data.push(s)
            localStorage.setItem(title, JSON.stringify(d))
        }
    }

    getRandQue();

    getElement("#music").volume = .3;
    getElement("#music").play();

    getElement("#inputNum").focus();

    function clears() {
        let inputAns = getElement("#inputNum");
        inputAns.value = "";
    }

    function vals(e) {
        let inputAns = getElement("#inputNum");
        if (inputAns) {
            inputAns.value = inputAns.value.length>1?inputAns.value:inputAns.value + e;
        }
    }

    function screenWriteInto(e) {
        if (+e.key || +e.key === 0) {
            vals(+e.key);
        }
    }

    function keypadWrite(e) {
        vals(+e.innerText);
    }

    function answer() {
        let first = getElement("#first");
        let ans = getElement("#inputNum");

        if(+first.innerText - 1 === +ans.value) {
            storeData("math-succedingNumber", first.innerText + "_", first.innerText + " " + ans.value, "correct");
            celebrate();
        } else {
            storeData("math-succedingNumber", first.innerText + "_", first.innerText + " " + ans.value, "wrong");
            celebrate(0);
        }
        getElement("#inputNum").focus();
    }

    function updateScore(bool=1) {
        let elm = getElement("#inHS");
        if(bool) {
            elm.innerText = +elm.innerText + 1;
        }
        else {
            if(+elm.innerText > 0) elm.innerText = +elm.innerText - 1;
        }
    }

    function getRandQue() {
        let first = getElement("#first");
        let n = randInt(changeMin, changeMax);
        if (n==0) getRandQue()
        else first.innerText = n; 
    }

    function celebrate(status=1) {
        let panda = pandaNews(status);
        if(status) {
            celebrateDog();
            updateScore();
            setTimeout(()=>{
                getRandQue();
            }, 1000);
        } else {
            document.querySelector('.app').appendChild(panda);
            updateScore(0);
            playAudio(getElement("#status"), "assets/wrong.wav");
        }
        setTimeout(()=>{
            panda.remove();
            clears();
        }, 1000)
    }
</script>
<script>
    const translations = {
        ti: { title: "ቀዲሙ ዝርከብ ቁፅሪ", highScore: "ውፅኢት", answer: "መልስ", clear: "ሰርዝ" },
        am: { title: "ቀደሙ ቁጥር", highScore: "ውጤት", answer: "መልስ", clear: "አስወግድ" },
        en: { title: "Previous Number", highScore: "Score", answer: "Answer", clear: "Clear" },
        om: { title: "Lakkoofsa Duraa", highScore: "Bu'aa", answer: "Deebii", clear: "Haqi" },
        so: { title: "Lambarka Hore", highScore: "Dhibco", answer: "Jawaab", clear: "Tirtir" }
    };

    function applyLanguage(lang) {
        const t = translations[lang] || translations.ti;
        const titleElt = document.querySelector('h1.title');
        const docTitle = document.querySelector('title');
        const hsLabel = document.getElementById('labelHighScore');
        const answerBtn = document.getElementById('answerBtn');
        // keep clear button as 'x' icon
        if (docTitle) docTitle.innerText = t.title;
        if (titleElt) titleElt.innerText = t.title;
        if (hsLabel) hsLabel.innerText = t.highScore;
        if (answerBtn) answerBtn.innerText = t.answer;
        // update pageTitle so existing setPageTitle stays consistent if used elsewhere
        pageTitle[0] = t.title;
    }

    document.addEventListener('DOMContentLoaded', () => {
        setPageTitle('h1.title');
        const sel = document.getElementById('langSelect');
        applyLanguage(sel ? sel.value : 'ti');
        if (sel) sel.addEventListener('change', (e) => applyLanguage(e.target.value));
        document.addEventListener('keydown', screenWriteInto);
    });
</script>

<!DOCTYPE html>
<html lang="ti">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <title>Word Jumble Fun!</title>
</head>

<body>
    <div class="game-container">
        <div class="header">
            <h1 data-i18n="title">Word Jumble Fun!</h1>
            <div class="lang-switcher">
                <label for="langSelect" class="visually-hidden">Language</label>
                <button id="muteBtn" type="button" class="mute-btn" aria-label="Mute" title="Mute">
                    <i class="fas fa-volume-up"></i>
                </button>
                <select id="langSelect" aria-label="Language" class="lang-select">
                    <option value="ti">ትግርኛ</option>
                    <option value="am">አማርኛ</option>
                    <option value="en">English</option>
                    <option value="om">Afaan Oromoo</option>
                    <option value="so">Soomaali</option>
                </select>
            </div>
            <div class="score-container">
                <div class="score">
                    <span class="reward-label" data-i18n="rewards">Rewards:</span>
                    <div class="rewards-container" id="rewards-container">
                        <i class="fas fa-star empty"></i>
                    </div>
                </div>
                <div class="level"><span data-i18n="level">Level:</span> <span id="level">1</span></div>
            </div>
        </div>
        <div class="main-game">
            <div class="ans-div">
                <p class="instruction" data-i18n="dragHere">Drag letters here to form the word</p>
                <div class="answer-slots"></div>
            </div>
            <div class="ques-div">
                <p class="instruction" data-i18n="dragFrom">Drag from here</p>
                <div class="letter-tiles"></div>
            </div>
        </div>
        <div class="feedback">
            <div id="feedback" class="feedback-message">
                <div class="success-container hidden">
                    <div class="checkmark">
                        <div class="check-icon">
                            <span class="icon-line line-tip"></span>
                            <span class="icon-line line-long"></span>
                        </div>
                    </div>
                    <h2 class="success-message" data-i18n="greatJob">Great Job!</h2>
                    <p class="encouragement" data-i18n="encouragement">You're doing amazing!</p>
                </div>
            </div>
        </div>
    </div>
    <audio src="" id="sound" autoplay></audio>
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <!-- Completion Modal -->
    <div id="completionModal" class="modal">
        <div class="modal-content">
            <h2 data-i18n="congrats">Congratulations! 🎉</h2>
            <p data-i18n="completed">You've completed all the words!</p>
            <div class="final-stars">
                <i class="fas fa-star"></i>
                <span id="finalScore">0</span> <span data-i18n="starsCollected">Stars Collected</span>
            </div>
            <button id="restartButton" data-i18n="playAgain">Play Again</button>
        </div>
    </div>
</body>

    function randInt(min, max) {
        return Math.floor(min + Math.random() * (max + 1 - min));
    }

    function myRandom(arr) {

    }

    function getArrOfInt(start = 0, end = 0, inclusive = 0) {
        let arr = [];
        for (let i = start; i < end + inclusive; i++) {
            arr.push(i);
        }
        return arr;

    HTMLCollection.prototype.clone = function () {
        let elems = [];
        for (let i = 0; i < this.length; i++) {
            elems.push(this[i]);
        }
        return elems;
    }

    NodeList.prototype.clone = function () {
        let elems = [];
        for (let i = 0; i < this.length; i++) {
            elems.push(this[i]);
        }
        return elems;
    }

    Array.prototype.randomize = function () {
        let _arr = [].concat(this);
        _arr.forEach((item, index, __arr) => {
            let a = Math.floor(Math.random() * __arr.length);
            let tempA = __arr[a];
            _arr[index] = tempA;
            _arr[a] = item
        })
        return _arr;
    }

    String.prototype.forEachStr = function (func) {
        for (let i = 0; i < this.length; i++) {
            func(this.slice(i, i + 1));
        }
    }
</script>

        completed: 'Dhammaan erayadii ayaad dhammaystirtay!',
        starsCollected: 'Xiddigo la ururiyay',
        playAgain: 'Ciyaar mar kale'
      }
    };

    let currentLang = (localStorage.getItem('lang') || 'ti');

    let isMuted = (localStorage.getItem('muted') === '1');

    function updateMuteButton() {
      const btn = document.getElementById('muteBtn');
      if (!btn) return;
      btn.innerHTML = isMuted
        ? '<i class="fas fa-volume-mute"></i>'
        : '<i class="fas fa-volume-up"></i>';
      btn.setAttribute('aria-label', isMuted ? 'Unmute' : 'Mute');
      btn.setAttribute('title', isMuted ? 'Unmute' : 'Mute');
    }

    function applyMuteState() {
      const audio = document.getElementById('sound');
      if (audio) audio.muted = isMuted;
    }

    function toggleMute() {
      isMuted = !isMuted;
      localStorage.setItem('muted', isMuted ? '1' : '0');
      applyMuteState();
      updateMuteButton();
    }

    function applyLanguage(lang) {
      currentLang = translations[lang] ? lang : 'en';
      document.documentElement.lang = currentLang;
      const els = document.querySelectorAll('[data-i18n]');
      els.forEach(el => {
        const key = el.getAttribute('data-i18n');
        const val = (translations[currentLang] && translations[currentLang][key]) || translations.en[key];
        if (val) el.textContent = val;
      });
      setPageTitle();
    }

    // Ensure selector reflects stored language and bind change
    document.addEventListener('DOMContentLoaded', () => {
      const sel = document.getElementById('langSelect');
      if (sel) {
        sel.value = currentLang;
        sel.addEventListener('change', (e) => {
          const val = e.target.value;
          localStorage.setItem('lang', val);
          applyLanguage(val);
        });
      }

      const muteBtn = document.getElementById('muteBtn');
      if (muteBtn) {
        muteBtn.addEventListener('click', toggleMute);
      }
      applyMuteState();
      updateMuteButton();

      applyLanguage(currentLang);
    });

    let pageTitle = ["WordSentences"];//end-var
    function setPageTitle() {
      let title = document.querySelector("title");
      const t = (translations[currentLang] && translations[currentLang]['title']) || translations.en['title'] || pageTitle[0];
      title.innerText = t;
    }
    // h1 is updated via i18n; title tag is set in applyLanguage -> setPageTitle
    let arrOfStr = ["ኣይተ", "ጳውሎስ", "ደቆም", "እንዳ", "ስፌት", "ከዱ", "ሳፌታ", "ፍሽኽ", "እናበለ", "ድልየቶም", "ሓተቶም"];//end-var
    let chosen = [];
    let correctAnswers = 0;
    let currentLevel = 1;
    let maxWordLength = 2; // Start with 2-letter words
    let randSent;
    getRandomSent()

    let active = null;

    createBoth();

    function returnLetterToTiles(box) {
        const letter = box.querySelector('.box-span');
        if (letter) {
            // Find the first empty tile in the letters area (JS-based, mobile-friendly)
            const emptyTile = getFirstEmptyQuesTile();
            if (emptyTile) {
                emptyTile.appendChild(letter);
                // Reset the box
                box.innerHTML = '';
                box.classList.remove('filled');
                // Play sound
                getElement("#sound").src = "./assets/click1.mp3";
                getElement("#sound").play().catch(e => console.log("Audio play failed:", e));
            }
        }
    }

    function sendTileToFirstEmptyAnswer(tileSpan) {
        const emptyAnswerBox = getFirstEmptyAnswerBox();
        if (emptyAnswerBox && tileSpan) {
            emptyAnswerBox.appendChild(tileSpan);
            emptyAnswerBox.classList.add('filled');
            getElement("#sound").src = "./assets/click1.mp3";
            getElement("#sound").play().catch(e => console.log("Audio play failed:", e));
            checkAnswer();
        }
    }

    function getFirstEmptyAnswerBox() {
        const boxes = document.querySelectorAll('.box-div');
        for (const b of boxes) {
            if (!b.querySelector('.box-span')) return b;
        }
        return null;
    }

    function getFirstEmptyQuesTile() {
        const tiles = document.querySelectorAll('.ques-box-div');
        for (const t of tiles) {
            if (!t.querySelector('.box-span')) return t;
        }
        return null;
    }

    function createAnsweringDiv(mainDiv) {
        let ansDiv = getElement(".answer-slots");
        ansDiv.innerHTML = ''; // Clear any existing content

        randSent.split("").forEach((_box, index, arr) => {
            let box = createElement("div", "box-div", "");
            box.ondrop = drop;
            box.ondragover = allowDrop;
            box.onclick = () => returnLetterToTiles(box);
            box.setAttribute("maxlength", 1);
            ansDiv.appendChild(box);
        });
    }

    function createQuesDiv() {
        let letterTiles = getElement(".letter-tiles");
        letterTiles.innerHTML = ''; // Clear any existing content

        let arr = randSent.split("").randomize();
        arr.forEach((word, index) => {
            let box = createElement("div", "ques-box-div", "");
            let boxSpan = createElement("span", "box-span", "");
            boxSpan.innerText = word;
            boxSpan.setAttribute("draggable", true);
            boxSpan.ondragstart = dragStart;
            boxSpan.dataset.index = index;
            box.appendChild(boxSpan);
            box.onclick = () => {
                const currentSpan = box.querySelector('.box-span');
                if (currentSpan) sendTileToFirstEmptyAnswer(currentSpan);
            };
            letterTiles.appendChild(box);
        });
    }

    function createBoth() {
        createAnsweringDiv();
        createQuesDiv();
    }

    function dragStart(event) {
        active = event.target;
        event.dataTransfer.setData("Text", event.target.id);
    }

    function allowDrop(event) {
        event.preventDefault();
    }

    function drop(event) {
        event.preventDefault();
        var data = event.dataTransfer.getData("Text");
        getElement("#sound").src = "./assets/click1.mp3";
        
        // If dropping onto an answer box
        if (event.target.className === "box-div") {
            // If the box already has a letter, return it to tiles first
            if (event.target.hasChildNodes()) {
                returnLetterToTiles(event.target);
            }
            event.target.appendChild(active);
            event.target.classList.add('filled');
        } 
        // If dropping back to tiles area
        else if (active.className === 'box-span' && event.target.className === "ques-box-div") {
            event.target.appendChild(active);
            // Find and remove the 'filled' class from the box the letter came from
            const boxes = document.querySelectorAll('.box-div');
            boxes.forEach(box => {
                if (box.contains(active)) {
                    box.classList.remove('filled');
                }
            });
        }
        
        checkAnswer();
    }

    function checkAnswer() {
        let boxDiv = getElements(".box-div").clone();
        let sent = boxDiv.map(item => item.innerText);
        if (sent.indexOf("") === -1) {
            effect(sent);
        }
    }

    function getRandomSent() {
        // Filter words by current level (word length)
        const availableWords = arrOfStr.filter(word => word.length === maxWordLength);
        
        if (availableWords.length === 0) {
            // If no words of current length, try next length
            maxWordLength++;
            if (maxWordLength > 10) { // Arbitrary max word length
                showCompletionModal();
                return;
            }
            return getRandomSent();
        }
        
        const randomIndex = randInt(0, availableWords.length - 1);
        randSent = availableWords[randomIndex];
        
        // Remove the selected word from the array
        const index = arrOfStr.indexOf(randSent);
        if (index > -1) {
            arrOfStr.splice(index, 1);
        }
        
        chosen.push(randSent);
    }

    function showCompletionModal() {
        const modal = document.getElementById('completionModal');
        const finalScore = document.querySelectorAll('.rewards-container i:not(.empty)').length;
        document.getElementById('finalScore').textContent = finalScore;
        modal.style.display = 'flex';
        
        // Restart button handler
        document.getElementById('restartButton').onclick = function() {
            location.reload();
        };
    }
    
    function showSuccessMessage() {
        const successContainer = document.querySelector('.success-container');
        const feedback = document.getElementById('feedback');
        
        // Show success message
        successContainer.classList.remove('hidden');
        feedback.classList.add('show-feedback');
        
        // Update correct answers and check level up
        correctAnswers++;
        if (correctAnswers % 2 === 0) {
            currentLevel++;
            document.getElementById('level').textContent = currentLevel;
        }
        
        // After a delay, hide the message and load next question
        setTimeout(() => {
            successContainer.classList.add('hidden');
            feedback.classList.remove('show-feedback');
            
            // Load next question
            if (arrOfStr.length > 0) {
                getRandomSent();
                createBoth();
            } else if (chosen.length > 0) {
                // If no more words but there are chosen ones, reset with chosen words
                arrOfStr = [].concat(chosen);
                chosen = [];
                getRandomSent();
                createBoth();
            } else {
                // No more words at all, show completion
                showCompletionModal();
            }
        }, 1500); // 1.5 seconds delay
    }

    function updateScore(points) {
        const rewardsContainer = document.getElementById('rewards-container');
        const currentStars = rewardsContainer.querySelectorAll('.fas.fa-star:not(.empty)').length;
        
        // Add a new star for each point
        for (let i = 0; i < points; i++) {
            const newStar = document.createElement('i');
            newStar.className = 'fas fa-star';
            newStar.style.animationDelay = `${i * 0.1}s`;
            newStar.style.opacity = '0';
            
            // Replace the first empty star or append to the end
            const emptyStar = rewardsContainer.querySelector('.empty');
            if (emptyStar) {
                rewardsContainer.replaceChild(newStar, emptyStar);
            } else {
                rewardsContainer.appendChild(document.createTextNode(' '));
                rewardsContainer.appendChild(newStar);
            }
            
            // Trigger animation
            setTimeout(() => {
                newStar.style.transition = 'opacity 0.3s ease-in';
                newStar.style.opacity = '1';
                newStar.classList.add('reward-added');
                setTimeout(() => newStar.classList.remove('reward-added'), 800);
            }, 50);
        }
        
        // Add pulse effect to the container
        rewardsContainer.classList.add('reward-pulse');
        setTimeout(() => rewardsContainer.classList.remove('reward-pulse'), 800);
    }
    
    function effect(arr) {
        if (arr.join("") === randSent) {
            celebrateStarfish("#sound", true);
            updateScore(1);
            showSuccessMessage();
        } else {
            celebrateStarfish("#sound", false);
        }
    }

    function reset() {
        getElement(".main-div").remove();
    }
</script>

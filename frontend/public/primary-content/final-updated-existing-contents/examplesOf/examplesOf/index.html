<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animal Explorer</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 0% 0%, rgba(96, 165, 250, 0.5), transparent 55%),
                radial-gradient(circle at 100% 0%, rgba(168, 85, 247, 0.45), transparent 55%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.35), transparent 55%),
                #f1f5f9;
            display: flex;
            justify-content: center;
            padding: 16px;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 980px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 22px;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.15);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            backdrop-filter: blur(6px);
            flex: 0 0 auto;
        }

        .title-wrap {
            min-width: 0;
        }

        .title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.02em;
            color: #0f172a;
            line-height: 1.1;
        }

        .subtitle {
            color: #475569;
            font-size: 13px;
            margin-top: 4px;
            font-weight: 600;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 999px;
            background: rgba(219, 234, 254, 0.85);
            border: 1px solid rgba(59, 130, 246, 0.22);
            color: #1d4ed8;
            font-weight: 900;
            font-size: 13px;
            white-space: nowrap;
        }

        .lang-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: rgba(255, 255, 255, 0.85);
            color: #0f172a;
            padding: 10px 36px 10px 12px;
            border-radius: 999px;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            background-image:
                linear-gradient(45deg, transparent 50%, rgba(15, 23, 42, 0.6) 50%),
                linear-gradient(135deg, rgba(15, 23, 42, 0.6) 50%, transparent 50%),
                linear-gradient(to right, transparent, transparent);
            background-position:
                calc(100% - 18px) calc(50% - 3px),
                calc(100% - 12px) calc(50% - 3px),
                0 0;
            background-size:
                6px 6px,
                6px 6px,
                100% 100%;
            background-repeat: no-repeat;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(34, 197, 94, 0.25);
        }

        .icon-btn.muted {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 10px 24px rgba(239, 68, 68, 0.25);
        }

        .card {
            flex: 1 1 auto;
            min-height: 0;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.18);
            padding: 18px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.12), transparent 55%),
                        radial-gradient(circle at 100% 0%, rgba(168, 85, 247, 0.12), transparent 55%);
            pointer-events: none;
        }

        .viewer {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            align-items: center;
            min-height: 0;
        }

        .animal-image {
            width: 100%;
            height: min(52vh, 420px);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 20px;
            background-color: rgba(241, 245, 249, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.3);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.4);
        }

        .animal-name {
            font-size: 34px;
            font-weight: 1000;
            color: #0f172a;
            text-transform: capitalize;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .play-wrap {
            display: flex;
            justify-content: center;
        }

        .sound-btn {
            width: 76px;
            height: 76px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 18px 34px rgba(29, 78, 216, 0.28);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .sound-btn:active {
            transform: scale(0.98);
        }

        .nav {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        .nav-btn {
            border: none;
            border-radius: 18px;
            padding: 14px 14px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            color: #ffffff;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            box-shadow: 0 16px 30px rgba(236, 72, 153, 0.18);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        .nav-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.02);
        }

        .nav-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .counter {
            text-align: center;
            font-size: 14px;
            font-weight: 800;
            color: #64748b;
            margin-top: 6px;
            position: relative;
            z-index: 1;
        }

        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(15, 23, 42, 0.4);
            z-index: 9999;
        }

        .modal.open {
            display: flex;
        }

        .modal-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.35);
            border-radius: 26px;
            box-shadow: 0 22px 60px rgba(15, 23, 42, 0.35);
            padding: 18px;
            text-align: center;
        }

        .modal-title {
            font-size: 28px;
            font-weight: 1000;
            color: #0f172a;
        }

        .modal-sub {
            margin-top: 6px;
            color: #475569;
            font-weight: 700;
        }

        .modal-actions {
            margin-top: 14px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .primary-btn {
            border: none;
            border-radius: 18px;
            padding: 14px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 16px 30px rgba(34, 197, 94, 0.18);
        }

        .confetti {
            position: fixed;
            top: -20px;
            left: 0;
            width: 10px;
            height: 10px;
            z-index: 99999;
            pointer-events: none;
            animation: confettiFall 2.8s linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .bounce {
            animation: bounce 0.8s;
        }

        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .title {
                font-size: 18px;
            }

            .subtitle {
                font-size: 12px;
            }

            .chip {
                padding: 8px 10px;
                font-size: 12px;
            }

            .icon-btn {
                width: 42px;
                height: 42px;
            }

            .animal-image {
                height: min(44vh, 320px);
            }

            .animal-name {
                font-size: 28px;
            }

            .sound-btn {
                width: 70px;
                height: 70px;
                font-size: 26px;
            }

            .nav {
                position: fixed;
                left: 12px;
                right: 12px;
                bottom: 12px;
                background: rgba(255, 255, 255, 0.9);
                border: 1px solid rgba(148, 163, 184, 0.3);
                border-radius: 22px;
                padding: 12px;
                box-shadow: 0 -10px 24px rgba(15, 23, 42, 0.12);
                backdrop-filter: blur(6px);
                margin-top: 0;
            }

            .counter {
                margin-bottom: 84px;
            }
        }

        @media (min-width: 1000px) {
            .title {
                font-size: 30px;
            }

            .subtitle {
                font-size: 14px;
            }

            .animal-name {
                font-size: 42px;
            }

            .animal-image {
                height: min(56vh, 520px);
            }

            .sound-btn {
                width: 88px;
                height: 88px;
                font-size: 32px;
            }

            .nav-btn {
                padding: 16px;
                font-size: 20px;
            }

            .nav {
                margin-top: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="title-wrap">
                <div class="title" id="pageTitle">Animal Explorer</div>
                <div class="subtitle" id="pageSubtitle">Tap the button to hear the animal sound.</div>
            </div>
            <div class="top-actions">
                <select class="lang-select" id="langSelect" aria-label="Language">
                    <option value="en">English</option>
                    <option value="am">Amharic</option>
                    <option value="tg">Tigrinya</option>
                    <option value="om">Oromo</option>
                    <option value="so">Somali</option>
                </select>
                <div class="chip" id="progressChip">1 / 15</div>
                <button class="icon-btn" id="muteBtn" title="Sound">🔊</button>
            </div>
        </div>

        <div class="card">
            <div class="viewer">
                <div class="animal-image" id="animalImage"></div>
                <div class="animal-name" id="animalName"></div>
                <div class="play-wrap">
                    <button class="sound-btn" id="soundBtn" title="Play sound">▶</button>
                </div>
            </div>

            <div class="nav">
                <button class="nav-btn" id="prevBtn">Previous</button>
                <button class="nav-btn" id="nextBtn">Next</button>
            </div>

            <div class="counter" id="counter">1 / 15</div>
        </div>
    </div>

    <div class="modal" id="completionModal">
        <div class="modal-card">
            <div class="modal-title" id="modalTitle">Great job!</div>
            <div class="modal-sub" id="modalSubtitle">You explored all the animals.</div>
            <div class="modal-actions">
                <button class="primary-btn" id="restartBtn">Restart</button>
            </div>
        </div>
    </div>
    
    <audio src="" id="animalSound"></audio>
    
    <script>
        const animals = [
            { name: 'fish', sound: 'fish.mp3', image: 'fish.png' },
            { name: 'bear', sound: 'bear.mp3', image: 'bear.png' },
            { name: 'elephant', sound: 'elephant.mp3', image: 'elephant.png' },
            { name: 'cat', sound: 'cat.mp3', image: 'cat.png' },
            { name: 'goat', sound: 'goat.mp3', image: 'goat.png' },
            { name: 'monkey', sound: 'monkey.mp3', image: 'monkey.png' },
            { name: 'lion', sound: 'lion.mp3', image: 'lion.png' },
            { name: 'cow', sound: 'cow.mp3', image: 'cow.png' },
            { name: 'hen', sound: 'hen.mp3', image: 'hen.png' },
            { name: 'donkey', sound: 'donkey.mp3', image: 'donkey.png' },
            { name: 'horse', sound: 'horse.mp3', image: 'horse.png' },
            { name: 'panda', sound: 'panda.mp3', image: 'panda.png' },
            { name: 'pig', sound: 'pig.mp3', image: 'pig.png' },
            { name: 'rabbit', sound: 'rabbit.mp3', image: 'rabbit.png' },
            { name: 'rat', sound: 'rat.mp3', image: 'rat.png' }
        ];
        
        let currentIndex = 0;
        let muted = false;
        const animalImage = document.getElementById('animalImage');
        const animalName = document.getElementById('animalName');
        const animalSound = document.getElementById('animalSound');
        const soundBtn = document.getElementById('soundBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const counter = document.getElementById('counter');
        const progressChip = document.getElementById('progressChip');
        const muteBtn = document.getElementById('muteBtn');
        const completionModal = document.getElementById('completionModal');
        const restartBtn = document.getElementById('restartBtn');
        const langSelect = document.getElementById('langSelect');
        const pageTitle = document.getElementById('pageTitle');
        const pageSubtitle = document.getElementById('pageSubtitle');
        const modalTitle = document.getElementById('modalTitle');
        const modalSubtitle = document.getElementById('modalSubtitle');

        const translations = {
            en: {
                title: 'Animal Explorer',
                subtitle: 'Tap the button to hear the animal sound.',
                previous: 'Previous',
                next: 'Next',
                finish: 'Finish',
                greatJob: 'Great job!',
                completed: 'You explored all the animals.',
                restart: 'Restart'
            },
            am: {
                title: 'እንስሳት',
                subtitle: 'የእንስሳውን ድምፅ ለመስማት ቁልፉን ይጫኑ።',
                previous: 'ቀድሞ',
                next: 'ቀጣይ',
                finish: 'ጨርስ',
                greatJob: 'በጣም ጥሩ!',
                completed: 'ሁሉንም እንስሳት ተመልከትሃል።',
                restart: 'እንደገና ጀምር'
            },
            tg: {
                title: 'እንስሳታት',
                subtitle: 'ድምጺ እንስሳ ንምስማዕ እታ ናይ ድምጺ ይጠውቁዋ።',
                previous: 'ተመለስ',
                next: 'ቀጻሊ',
                finish: 'ጨርስ',
                greatJob: 'ጽቡቕ ስራሕ!',
                completed: 'ኩሎም እንስሳታት።',
                restart: 'ዳግማይ ይጀምሩ'
            },
            om: {
                title: 'Qorannoo Bineensotaa',
                subtitle: 'Sagalee bineensaa dhaggeeffachuuf button cuqaasi.',
                previous: 'Duraa',
                next: 'Itti Aanu',
                finish: 'Xumuri',
                greatJob: 'Gaarii!',
                completed: 'Bineensota hunda argite.',
                restart: 'Irra Deebi\'i'
            },
            so: {
                title: 'Sahamiyaha Xayawaanka',
                subtitle: 'Riix badhanka si aad u maqasho codka xayawaanka.',
                previous: 'Hore',
                next: 'Xiga',
                finish: 'Dhammee',
                greatJob: 'Shaqo Wacan!',
                completed: 'Waxaad sahamisay dhammaan xayawaanka.',
                restart: 'Dib u Bilow'
            }
        };

        let currentLang = 'en';

        function t(key) {
            const dict = translations[currentLang] || translations.en;
            return dict[key] || translations.en[key] || '';
        }

        function applyLanguage(lang) {
            currentLang = translations[lang] ? lang : 'en';
            document.documentElement.lang = currentLang;
            if (pageTitle) pageTitle.textContent = t('title');
            if (pageSubtitle) pageSubtitle.textContent = t('subtitle');
            if (modalTitle) modalTitle.textContent = t('greatJob');
            if (modalSubtitle) modalSubtitle.textContent = t('completed');
            if (restartBtn) restartBtn.textContent = t('restart');
            if (prevBtn) prevBtn.textContent = t('previous');
            updateButtons();
        }

        function createConfetti() {
            const colors = ['#ff0', '#f0f', '#0ff', '#f80', '#8f0', '#22c55e', '#60a5fa'];
            for (let i = 0; i < 140; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 10 + 6 + 'px';
                confetti.style.height = Math.random() * 10 + 6 + 'px';
                confetti.style.opacity = String(Math.random() * 0.5 + 0.5);
                confetti.style.animationDelay = Math.random() * 0.6 + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 3000);
            }
        }

        function openCompletion() {
            if (completionModal) {
                completionModal.classList.add('open');
            }
            createConfetti();
        }

        function closeCompletion() {
            if (completionModal) {
                completionModal.classList.remove('open');
            }
        }

        function playSound() {
            if (muted) return;
            animalSound.currentTime = 0;
            const p = animalSound.play();
            if (p && typeof p.catch === 'function') {
                p.catch(() => {});
            }
        }
        
        // Initialize the first animal
        function showAnimal(index) {
            const animal = animals[index];
            animalImage.style.backgroundImage = `url('./assets/${animal.image}')`;
            animalName.textContent = animal.name;
            animalSound.src = `./assets/${animal.sound}`;
            updateCounter();
            updateButtons();
            
            // Add bounce animation
            soundBtn.classList.add('bounce');
            setTimeout(() => soundBtn.classList.remove('bounce'), 1000);
        }
        
        function updateCounter() {
            const text = `${currentIndex + 1} / ${animals.length}`;
            counter.textContent = text;
            if (progressChip) progressChip.textContent = text;
        }
        
        function updateButtons() {
            prevBtn.disabled = currentIndex === 0;
            if (currentIndex === animals.length - 1) {
                nextBtn.disabled = false;
                nextBtn.textContent = t('finish');
            } else {
                nextBtn.disabled = false;
                nextBtn.textContent = t('next');
            }
        }
        
        // Event listeners
        soundBtn.addEventListener('click', () => {
            playSound();
            soundBtn.classList.add('bounce');
            setTimeout(() => soundBtn.classList.remove('bounce'), 1000);
        });

        if (muteBtn) {
            muteBtn.addEventListener('click', () => {
                muted = !muted;
                muteBtn.textContent = muted ? '🔇' : '🔊';
                muteBtn.classList.toggle('muted', muted);
            });
        }

        if (restartBtn) {
            restartBtn.addEventListener('click', () => {
                closeCompletion();
                currentIndex = 0;
                showAnimal(currentIndex);
            });
        }

        if (completionModal) {
            completionModal.addEventListener('click', (e) => {
                if (e.target === completionModal) closeCompletion();
            });
        }
        
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                showAnimal(currentIndex);
            }
        });
        
        nextBtn.addEventListener('click', () => {
            if (currentIndex === animals.length - 1) {
                openCompletion();
                return;
            }
            currentIndex++;
            showAnimal(currentIndex);
        });
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                currentIndex--;
                showAnimal(currentIndex);
            } else if (e.key === 'ArrowRight' && currentIndex < animals.length - 1) {
                currentIndex++;
                showAnimal(currentIndex);
            } else if (e.key === 'Escape') {
                closeCompletion();
            } else if (e.key === ' ' || e.key === 'Enter') {
                playSound();
                soundBtn.classList.add('bounce');
                setTimeout(() => soundBtn.classList.remove('bounce'), 1000);
            }
        });
        
        // Initialize
        if (langSelect) {
            const savedLang = localStorage.getItem('examplesOf_language');
            const initialLang = savedLang || 'en';
            langSelect.value = translations[initialLang] ? initialLang : 'en';
            langSelect.addEventListener('change', () => {
                const selected = langSelect.value;
                localStorage.setItem('examplesOf_language', selected);
                applyLanguage(selected);
            });
            applyLanguage(langSelect.value);
        } else {
            applyLanguage('en');
        }
        showAnimal(0);
    </script>
</body>
</html>

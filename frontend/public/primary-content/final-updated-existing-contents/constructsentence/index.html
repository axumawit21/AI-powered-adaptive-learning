<!DOCTYPE html>
<html lang="ti">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <title>ሃናጺ ሓረጋት - Sentence Builder</title>
    <style>
        :root {
            --bg-color: #FFDEE9;
            --bg-gradient: linear-gradient(0deg, #FFDEE9 0%, #B5FFFC 100%);
            --primary: #FF5722;
            --secondary: #2196F3;
            --success: #4CAF50;
            --danger: #F44336;
            --fridge-color: #fcfcfc;
            --magnet-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow: hidden;
        }

        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2000;
        }

        .game-wrapper {
            background: var(--fridge-color);
            width: 100%;
            max-width: 600px;
            height: 94vh;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 12px solid #e0e0e0;
            position: relative;
            background-image: 
                radial-gradient(#eee 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Stickers on fridge */
        .sticker {
            position: absolute;
            font-size: 2.5rem;
            z-index: 1;
            opacity: 0.8;
            pointer-events: none;
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
            z-index: 10;
        }

        .top-row {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-btn {
            background: #fff;
            border: 3px solid #ddd;
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.4rem;
            color: #555;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #ccc;
        }
        .nav-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #ccc; }

        .controls-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lang-select {
            padding: 6px 10px;
            border-radius: 12px;
            border: 3px solid #ddd;
            background: white;
            font-weight: bold;
            color: #333;
            outline: none;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .score-box {
            background: #FFC107;
            color: #3E2723;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 0 #FFA000;
        }

        h1 {
            font-size: 1.6rem;
            color: #333;
            text-align: center;
            margin: 5px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Built Sentence Area */
        .sentence-preview {
            width: 100%;
            min-height: 80px;
            background: #fff;
            border: 4px dashed #ddd;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            font-size: 1.5rem;
            color: #444;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .sentence-preview.success {
            background: #E8F5E9;
            border-color: var(--success);
            color: #2E7D32;
            border-style: solid;
        }

        .sentence-preview.error {
            background: #FFEBEE;
            border-color: var(--danger);
            color: #C62828;
            border-style: solid;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .game-board {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            padding: 5px;
            z-index: 10;
        }

        .label-text {
            font-size: 0.8rem;
            font-weight: bold;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-align: center;
        }

        .slots-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            min-height: 60px;
            padding: 15px;
            background: rgba(0,0,0,0.03);
            border-radius: 20px;
        }

        .slot {
            min-width: 80px;
            height: 55px;
            border: 3px dashed #bbb;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            transition: all 0.2s;
        }

        .slot.active {
            border-color: var(--secondary);
            background: #E1F5FE;
            border-style: solid;
        }

        .pool-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }

        /* Colorful Magnet Magnets */
        .magnet {
            padding: 12px 20px;
            background: white;
            border-radius: 12px;
            box-shadow: var(--magnet-shadow);
            cursor: pointer;
            font-size: 1.3rem;
            font-weight: bold;
            color: #333;
            border: 3px solid #eee;
            transition: transform 0.1s, box-shadow 0.1s;
            user-select: none;
            touch-action: none;
            display: inline-block;
            position: relative;
        }

        .magnet:active { transform: translateY(2px); box-shadow: 1px 1px 0px rgba(0,0,0,0.1); }

        .m-red { background: #FFCDD2; border-color: #EF5350; color: #B71C1C; }
        .m-blue { background: #BBDEFB; border-color: #42A5F5; color: #0D47A1; }
        .m-green { background: #C8E6C9; border-color: #66BB6A; color: #1B5E20; }
        .m-yellow { background: #FFF9C4; border-color: #FBC02D; color: #F57F17; }
        .m-purple { background: #E1BEE7; border-color: #AB47BC; color: #4A148C; }
        .m-orange { background: #FFE0B2; border-color: #FFA726; color: #E65100; }

        /* Completion Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: white;
            border-radius: 40px;
            padding: 40px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            animation: bounceIn 0.8s;
            border: 8px solid #FFC107;
        }

        .modal-content h2 { color: #333; font-size: 2.2rem; margin-bottom: 10px; }
        .modal-content p { color: #666; margin-bottom: 25px; font-size: 1.1rem; }

        .btn-restart {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 #2E7D32;
            transition: all 0.1s;
            width: 100%;
        }

        .btn-restart:active { transform: translateY(4px); box-shadow: 0 2px 0 #2E7D32; }

        @media (max-width: 480px) {
            .game-wrapper { height: 96vh; padding: 15px; border-width: 8px; }
            h1 { font-size: 1.3rem; }
            .magnet { font-size: 1.1rem; padding: 8px 14px; }
            .slot { min-width: 70px; height: 50px; }
            .sentence-preview { min-height: 70px; font-size: 1.2rem; }
            .sticker { font-size: 1.8rem; }
        }
    </style>
</head>

<body>
    <canvas id="confetti-canvas"></canvas>

    <div class="game-wrapper">
        <!-- Decoration -->
        <div class="sticker" style="top: 15%; left: 5%;">🍎</div>
        <div class="sticker" style="top: 12%; right: 8%;">⭐</div>
        <div class="sticker" style="bottom: 5%; right: 10%;">🦖</div>
        <div class="sticker" style="bottom: 8%; left: 10%;">🚀</div>

        <div class="header">
            <div class="top-row">
                <button class="nav-btn" onclick="initGame()" title="Reset">↻</button>
                <div class="controls-right">
                    <button class="nav-btn" id="mute-btn" onclick="toggleMute()" title="Mute/Unmute">🔊</button>
                    <select id="langSelect" class="lang-select">
                        <option value="ti" selected>ትግርኛ</option>
                        <option value="am">አማርኛ</option>
                        <option value="en">English</option>
                        <option value="om">Afaan Oromoo</option>
                        <option value="so">Soomaali</option>
                    </select>
                    <div class="score-box">
                        <span>★</span>
                        <span id="score">0</span>
                    </div>
                </div>
            </div>
            <h1 id="title-text">ሃናጺ ሓረጋት</h1>
        </div>

        <div class="sentence-preview" id="preview-box">
            ቃላት ብምጥቃም ሓረግ ስራሕ!
        </div>

        <div class="game-board">
            <div class="section">
                <div class="label-text" id="slot-label">ቦታ ሓረግ</div>
                <div class="slots-grid" id="slots-row"></div>
            </div>

            <div class="section">
                <div class="label-text" id="pool-label">ቃላት ምረጽ</div>
                <div class="pool-grid" id="magnets-pool"></div>
            </div>
        </div>
    </div>

    <div id="winModal" class="modal">
        <div class="modal-content">
            <div style="font-size: 4rem; margin-bottom: 10px;">🏆</div>
            <h2 id="modal-congrats">እንቋዕ ተሓጎስካ!</h2>
            <p id="modal-msg">ነዚ ሓረግ ብትኽክል ሰሪሕካዮ ኣለኻ።</p>
            <div id="final-sentence" style="font-size: 1.5rem; font-weight: bold; color: var(--success); margin-bottom: 25px; padding: 10px; background: #f9f9f9; border-radius: 15px;"></div>
            <button class="btn-restart" id="next-btn">ቀጻሊ ሓረግ</button>
        </div>
    </div>

    <script>
        const tigrinyaSentences = [
            ["ኣይተ", "ጳውሎስ", "ምስ", "ደቆም", "ከዱ"],
            ["እቲ", "ስፌት", "ጽቡቕ", "እዩ"],
            ["ንሕና", "ትምህርቲ", "ንፈቱ"],
            ["ኣንበሳ", "ሓያል", "እንስሳ", "እዩ"],
            ["ማይ", "ንጥዕና", "ኣዝዩ", "ጠቓሚ", "እዩ"],
            ["ኣብ", "ትምህርቲ", "ንጡፋት", "ንኹን"],
            ["ጽሬት", "ንጥዕና", "መሰረት", "እዩ"],
            ["ሓረስታይ", "መሬቱ", "ይሓርስ"],
            ["መጽሓፍ", "ብምንባብ", "ፍልጠት", "ትረክብ"],
            ["ቆልዑ", "ኣብ", "ሜዳ", "ይጻወቱ"],
            ["ኣደይ", "ጥዑም", "ምግቢ", "ሰሪሓ"]
        ];

        const languages = {
            ti: { title: "ምሉእ ሓሳባት ምህናጽ", placeholder: "ቃላት ብምጥቃም ሙሉእ ሓሳብ ስራሕ!", slots: "ናይ ምሉእ ሓሳብ ቦታ", pool: "ቃላት ምረጽ", congrats: "ብጣዕሚ ጎበዝ!", msg: "ነዚ ሙሉእ ሓሳብ ብትኽክል ሰሪሕካዮ ኣለኻ።", next: "ቀጻሊ ሙሉእ ሓሳብ" },
            am: { title: "አረፍተ ነገር ገንቢ", placeholder: "ቃላትን በመጠቀም አረፍተ ነገር ይገንቡ!", slots: "የአረፍተ ነገር ቦታዎች", pool: "ቃላትን ይምረጡ", congrats: "እንኳን ደስ አለዎት!", msg: "አረፍተ ነገሩን በትክክል ገንብተዋል።", next: "ቀጣይ አረፍተ ነገር" },
            en: { title: "Sentence Builder", placeholder: "Build a sentence by clicking words!", slots: "Sentence Slots", pool: "Pick Words", congrats: "Great Job!", msg: "You have built the sentence correctly.", next: "Next Sentence" },
            om: { title: "Ijaarsa Himaa", placeholder: "Jechoota fayyadamuun hima ijaari!", slots: "Bakka Himaa", pool: "Jechoota filadhu", congrats: "Baga gammaddan!", msg: "Hima kana sirriitti ijaarteetta.", next: "Hima itti aanu" },
            so: { title: "Dhisidda Weedhaha", placeholder: "Erayada isticmaal si aad weedh u dhistid!", slots: "Meelaha Weedha", pool: "Dooro Erayada", congrats: "Hambalyo!", msg: "Waxaad si sax ah u dhistay weedha.", next: "Weedha xigta" }
        };

        let currentSentence = [];
        let score = 0;
        let isMuted = false;
        let particles = [];
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        // Synthesized Sounds using Web Audio API
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (isMuted) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now); // C5
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, now + 0.2); // G5
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(50, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
        }

        function updateTexts() {
            const lang = document.getElementById('langSelect').value;
            const t = languages[lang];
            document.getElementById('title-text').textContent = t.title;
            document.getElementById('slot-label').textContent = t.slots;
            document.getElementById('pool-label').textContent = t.pool;
            document.getElementById('modal-congrats').textContent = t.congrats;
            document.getElementById('modal-msg').textContent = t.msg;
            document.getElementById('next-btn').textContent = t.next;
            updatePreview(); // Refresh placeholder if empty
        }

        function initGame() {
            currentSentence = tigrinyaSentences[Math.floor(Math.random() * tigrinyaSentences.length)];
            const slotsRow = document.getElementById('slots-row');
            const magnetsPool = document.getElementById('magnets-pool');
            
            slotsRow.innerHTML = '';
            magnetsPool.innerHTML = '';
            updatePreview();

            // Create Slots
            currentSentence.forEach((_, i) => {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.dataset.index = i;
                slotsRow.appendChild(slot);
            });

            // Create Word Magnets
            const colors = ['m-red', 'm-blue', 'm-green', 'm-yellow', 'm-purple', 'm-orange'];
            const shuffled = [...currentSentence].sort(() => Math.random() - 0.5);
            shuffled.forEach((word, i) => {
                const magnet = document.createElement('div');
                magnet.className = `magnet ${colors[i % colors.length]}`;
                magnet.textContent = word;
                magnet.id = `mag-${Math.random().toString(36).substr(2, 9)}`;
                magnet.onclick = () => handleMagnetClick(magnet);
                magnetsPool.appendChild(magnet);
            });
        }

        function handleMagnetClick(magnet) {
            const parent = magnet.parentElement;

            if (parent.classList.contains('pool-grid')) {
                // Moving to slots
                const emptySlot = Array.from(document.querySelectorAll('.slot')).find(s => !s.hasChildNodes());
                if (emptySlot) {
                    playSound('click');
                    emptySlot.appendChild(magnet);
                    emptySlot.classList.add('active');
                    updatePreview();
                    checkComplete();
                }
            } else {
                // Returning to pool
                playSound('click');
                const pool = document.getElementById('magnets-pool');
                pool.appendChild(magnet);
                parent.classList.remove('active');
                updatePreview();
            }
        }

        function updatePreview() {
            const lang = document.getElementById('langSelect').value;
            const placeholder = languages[lang].placeholder;
            const slots = document.querySelectorAll('.slot');
            const words = Array.from(slots).map(s => s.textContent.trim()).filter(w => w !== '');
            const preview = document.getElementById('preview-box');
            
            if (words.length > 0) {
                preview.textContent = words.join(' ');
                preview.classList.remove('error');
            } else {
                preview.textContent = placeholder;
            }
        }

        function checkComplete() {
            const slots = document.querySelectorAll('.slot');
            const userWords = Array.from(slots).map(s => s.textContent.trim());
            
            // Only check if all slots are filled
            if (userWords.every(w => w !== '')) {
                if (userWords.join(' ') === currentSentence.join(' ')) {
                    handleSuccess();
                } else {
                    handleError();
                }
            }
        }

        function handleSuccess() {
            score += 10;
            document.getElementById('score').textContent = score;
            const preview = document.getElementById('preview-box');
            preview.className = 'sentence-preview success';
            playSound('correct');
            fireConfetti(200);

            setTimeout(() => {
                const modal = document.getElementById('winModal');
                document.getElementById('final-sentence').textContent = currentSentence.join(' ');
                modal.style.display = 'flex';
            }, 1000);
        }

        function handleError() {
            playSound('wrong');
            const preview = document.getElementById('preview-box');
            preview.className = 'sentence-preview error';
            
            const slots = document.querySelectorAll('.slot');
            slots.forEach(s => {
                s.classList.add('animate__animated', 'animate__headShake');
                setTimeout(() => s.classList.remove('animate__animated', 'animate__headShake'), 500);
            });

            // Delay and then reset the sentence built to pool as requested
            setTimeout(() => {
                const magnets = document.querySelectorAll('.slot .magnet');
                const pool = document.getElementById('magnets-pool');
                magnets.forEach(m => {
                    m.parentElement.classList.remove('active');
                    pool.appendChild(m);
                });
                updatePreview();
                preview.classList.remove('error');
            }, 800);
        }

        function fireConfetti(count) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const colors = ['#FFDEE9', '#B5FFFC', '#FFC107', '#2196F3', '#4CAF50', '#F44336'];
            for(let i=0; i<count; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height + 20,
                    vx: (Math.random() - 0.5) * 30,
                    vy: (Math.random() - 0.8) * 45,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0,
                    rotation: Math.random() * 360,
                    rVel: (Math.random() - 0.5) * 12
                });
            }
            if(!window.confettiLoopActive) {
                window.confettiLoopActive = true;
                animateConfetti();
            }
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life > 0) {
                    alive = true;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.7; 
                    p.vx *= 0.98;
                    p.life -= 0.01;
                    p.rotation += p.rVel;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                } else {
                    particles.splice(i, 1);
                }
            }
            if(alive) requestAnimationFrame(animateConfetti);
            else window.confettiLoopActive = false;
        }

        document.getElementById('next-btn').onclick = () => {
            document.getElementById('winModal').style.display = 'none';
            initGame();
        };

        document.getElementById('langSelect').addEventListener('change', updateTexts);

        window.onload = () => {
            updateTexts();
            initGame();
        };
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Sequence Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f0c29;
            --bg-mid: #302b63;
            --bg-light: #24243e;
            --accent-neon: #00f2fe;
            --accent-glow: #4facfe;
            --correct: #00ff88;
            --wrong: #ff4b2b;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark), var(--bg-mid), var(--bg-light));
            height: 100vh;
            color: white;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s, filter 0.5s;
        }

        body.error-flash {
            background: radial-gradient(circle, #4a0000 0%, var(--bg-dark) 100%);
        }

        body.victory-glow {
            filter: saturate(1.5) brightness(1.1);
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
        }

        /* Confetti Canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        /* Animated Star Field */
        #stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Header */
        header {
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .back-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .back-btn:hover { background: var(--glass-border); border-color: var(--accent-neon); }

        .level-badge {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--accent-neon);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            color: var(--accent-neon);
            font-weight: 700;
        }

        /* Styled Language Selector */
        .lang-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        select#langSelect {
            background: #1a1a2e; /* Solid background for visibility */
            color: white;
            border: 1px solid var(--glass-border);
            padding: 6px 24px 6px 10px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            appearance: none;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        select#langSelect option {
            background: #1a1a2e;
            color: white;
            padding: 10px;
        }

        .lang-wrapper::after {
            content: '▼';
            font-size: 0.5rem;
            position: absolute;
            right: 8px;
            pointer-events: none;
            color: var(--accent-neon);
        }

        .score-capsule {
            background: linear-gradient(90deg, var(--accent-glow), var(--accent-neon));
            padding: 6px 15px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
            color: #000;
            font-size: 0.85rem;
        }

        /* Main Game Area */
        #game-container {
            flex: 1;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 10px;
            z-index: 5;
        }

        .mission-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 35px 20px;
            width: 95%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .quest-title {
            font-size: clamp(1.5rem, 2.4vw, 2.2rem);
            margin-bottom: 25px;
            color: var(--accent-neon);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.5);
        }

        .sequence-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .node {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border);
            transition: all 0.3s;
        }

        .node.fixed {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-neon);
            color: var(--accent-neon);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .node.input-node {
            cursor: pointer;
            border-style: dashed;
            color: white;
            position: relative;
        }

        .node.input-node.active {
            border-style: solid;
            border-color: var(--accent-glow);
            background: rgba(79, 172, 254, 0.1);
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
            transform: scale(1.1);
        }

        .node.incorrect {
            border-color: var(--wrong);
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.5);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .comma { font-size: 1.8rem; color: var(--glass-border); }

        /* Keypad */
        .keypad-dock {
            width: 95%;
            max-width: 500px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            padding: 15px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            margin-bottom: 35px;
            z-index: 20;
        }

        .key {
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .key:active { transform: scale(0.9); background: var(--accent-glow); color: #000; }
        
        .key.action { background: rgba(79, 172, 254, 0.2); color: var(--accent-neon); }
        .key.submit { background: var(--correct); color: #000; grid-column: span 2; }

        /* Completion Overlay */
        #completion-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 12, 41, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
        }
        
        .success-icon { font-size: 5rem; margin-bottom: 20px; }
        
        @media (max-width: 600px) {
            header { padding: 10px; }
            .header-right { gap: 5px; }
            .node { width: 52px; height: 52px; font-size: 1.4rem; }
            .mission-card { padding: 25px 15px; }
            .key { height: 45px; }
            select#langSelect { font-size: 0.8rem; max-width: 90px; }
            .keypad-dock { margin-bottom: 50px; }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>
    <div id="stars-container"></div>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v7h-7"/></svg>
                <span id="backText">መነሻ</span>
            </a>
            <div class="level-badge" id="levelDisplay">Range: 1-5</div>
        </div>
        <div class="header-right">
            <div class="lang-wrapper">
                <select id="langSelect" onchange="applyLanguage(this.value)">
                    <option value="ti">ትግርኛ</option>
                    <option value="am">አማርኛ</option>
                    <option value="en">English</option>
                    <option value="om">Afan Oromoo</option>
                    <option value="so">Soomaali</option>
                </select>
            </div>
            <div class="score-capsule">
                <span id="scoreLabel">ውፅኢት</span>
                <span id="scoreVal">0</span>
            </div>
        </div>
    </header>

    <div id="game-container">
        <div class="mission-card">
            <div class="quest-title" id="questTitle">ዝጎደሉ ቁፅሪታት</div>
            <div class="sequence-row" id="sequenceRow">
                <!-- Injected by JS -->
            </div>
        </div>
    </div>

    <div class="keypad-dock">
        <button class="key" onclick="pressKey('1')">1</button>
        <button class="key" onclick="pressKey('2')">2</button>
        <button class="key" onclick="pressKey('3')">3</button>
        <button class="key" onclick="pressKey('4')">4</button>
        <button class="key" onclick="pressKey('5')">5</button>
        <button class="key" onclick="pressKey('6')">6</button>
        <button class="key" onclick="pressKey('7')">7</button>
        <button class="key" onclick="pressKey('8')">8</button>
        <button class="key" onclick="pressKey('9')">9</button>
        <button class="key" onclick="pressKey('0')">0</button>
        <button class="key action" onclick="pressKey('clear')">⌫</button>
        <button class="key action" onclick="moveActive(-1)">←</button>
        <button class="key action" onclick="moveActive(1)">→</button>
        <button class="key submit" id="btnSubmit" onclick="checkAnswer()">ኣረጋግጽ</button>
    </div>

    <div id="completion-overlay">
        <div class="success-icon">✨🌌✨</div>
        <h2 id="completeMsg">ዝበለፀ ስራሕ! ኩሎም ተመሊሶም።</h2>
        <p style="font-size: 1.2rem; color: var(--accent-neon); margin-bottom: 20px;" id="levelCompleteInfo">Next range unlocked!</p>
        <button class="back-btn" style="padding: 15px 40px; font-size: 1.2rem; border-radius: 30px; background: var(--accent-glow); color: #000;" onclick="nextLevelRange()" id="btnPlayAgain">ቀጽል</button>
    </div>  

    <script>
        const languages = {
            ti: { title: "ዝጎደሉ ቁፅሪታት ምምላእ", score: "ነጥቢ", submit: "ኣረጋግጽ", complete: "ብሉጽ ስራሕ! ኩሎም ተመሊሶም!", again: "ቀጽል", back: "እንደገና", range: "ደረጃ" },
            am: { title: "የጎደሉ ቁጥሮች መሙላት", score: "ውጤት", submit: "አረጋግጥ", complete: "ድንቅ ስራ! ሁሉም ተመልሰዋል!", again: "ቀጣይ", back: "ድጋሜ", range: "ደረጃ" },
            en: { title: "Filling Missing Numbers", score: "Score", submit: "Check", complete: "Great Job! All answered.", again: "Continue", back: "Reset", range: "Range" },
            om: { title: "Lakkofsota Hir'atan", score: "Bu'aa", submit: "Mirkaneessi", complete: "Hojii gaarii! Hundi deebi'aniiru.", again: "Itti fufi", back: "Gara Manaa", range: "Sadarkaa" },
            so: { title: "Tirooyinka Maqan", score: "Dhibco", submit: "Hubi", complete: "Shaqo fiican! Dhammaan waa la helay.", again: "Sii wad", back: "Hoyga", range: "Heerka" }
        };

        let currentLang = 'ti';
        let sequenceMin = 1;
        let sequenceMax = 5;
        let score = 0;
        let activeIndex = -1;
        let patternsPool = [];
        let particles = [];
        const colors = ['#00f2fe', '#4facfe', '#00ff88', '#ffffff', '#ffd700', '#ff00ff', '#ff4b2b'];

        function createStars() {
            const container = document.getElementById('stars-container');
            for(let i=0; i<100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                container.appendChild(star);
            }
        }

        function applyLanguage(lang) {
            currentLang = lang;
            const data = languages[lang];
            document.getElementById('questTitle').innerText = data.title;
            document.getElementById('scoreLabel').innerText = data.score;
            document.getElementById('btnSubmit').innerText = data.submit;
            document.getElementById('completeMsg').innerText = data.complete;
            document.getElementById('btnPlayAgain').innerText = data.again;
            document.getElementById('backText').innerText = data.back;
            updateLevelBadge();
        }

        function updateLevelBadge() {
            const data = languages[currentLang];
            document.getElementById('levelDisplay').innerText = `${data.range}: ${sequenceMin}-${sequenceMax}`;
        }

        function generatePatterns() {
            const variations = [
                [0], [4], [1, 3], [2], [0, 4], [1, 2]
            ];
            return variations.sort(() => Math.random() - 0.5);
        }

        function drawSequence() {
            if (patternsPool.length === 0) {
                showCompletion();
                return;
            }

            const currentPattern = patternsPool.pop();
            const row = document.getElementById('sequenceRow');
            row.innerHTML = '';
            
            activeIndex = -1;
            const totalLen = 5;
            for(let i=0; i < totalLen; i++) {
                const isHidden = currentPattern.includes(i);
                const nodeValue = sequenceMin + i;
                const node = document.createElement('div');
                node.className = isHidden ? 'node input-node' : 'node fixed';
                node.innerText = isHidden ? '' : nodeValue;
                
                if(isHidden) {
                    node.dataset.index = i;
                    node.onclick = () => setActive(i);
                    if(activeIndex === -1) activeIndex = i;
                }
                
                row.appendChild(node);
                if(i < totalLen - 1) {
                    const comma = document.createElement('div');
                    comma.className = 'comma';
                    comma.innerText = ',';
                    row.appendChild(comma);
                }
            }
            setActive(activeIndex);
        }

        function setActive(idx) {
            const nodes = document.querySelectorAll('.input-node');
            nodes.forEach(n => n.classList.remove('active'));
            const target = Array.from(nodes).find(n => +n.dataset.index === idx);
            if(target) {
                target.classList.add('active');
                activeIndex = idx;
            }
        }

        function moveActive(dir) {
            const nodes = Array.from(document.querySelectorAll('.input-node'));
            if (nodes.length === 0) return;
            const currentIdxInNodes = nodes.findIndex(n => +n.dataset.index === activeIndex);
            let next = currentIdxInNodes + dir;
            if(next < 0) next = nodes.length - 1;
            if(next >= nodes.length) next = 0;
            setActive(+nodes[next].dataset.index);
        }

        function pressKey(key) {
            const nodes = Array.from(document.querySelectorAll('.input-node'));
            const node = nodes.find(n => +n.dataset.index === activeIndex);
            if(!node) return;

            if(key === 'clear') {
                node.innerText = '';
                return;
            }

            const expectedValue = sequenceMin + (+node.dataset.index);
            const expectedDigits = expectedValue.toString().length;

            if(node.innerText.length < expectedDigits) {
                node.innerText += key;
            } else {
                node.innerText = key; 
            }
            
            playSound('tap');

            if (node.innerText.length >= expectedDigits) {
                const currentIdxInNodes = nodes.findIndex(n => +n.dataset.index === activeIndex);
                if (currentIdxInNodes < nodes.length - 1) {
                    setTimeout(() => moveActive(1), 150);
                }
            }
        }

        function getConfettiCanvas() {
            const canvas = document.getElementById('confetti-canvas');
            if (!canvas) return null;
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            return canvas;
        }

        function checkAnswer() {
            const nodes = document.querySelectorAll('.input-node');
            let allCorrect = true;

            nodes.forEach(n => {
                const idx = +n.dataset.index;
                const expected = sequenceMin + idx;
                const actual = +n.innerText;

                if(actual !== expected) {
                    allCorrect = false;
                    n.classList.add('incorrect');
                    setTimeout(() => n.classList.remove('incorrect'), 600);
                }
            });

            if(allCorrect) {
                score += 10;
                document.getElementById('scoreVal').innerText = score;
                playSound('success');
                
                // MULTIPLE CONFETTI BURSTS for correct answer
                const canvas = getConfettiCanvas();
                const midX = canvas ? (canvas.width / 2) : (window.innerWidth / 2);
                const midY = canvas ? (canvas.height / 2) : (window.innerHeight / 2);
                
                fireConfetti(30, midX, midY);
                setTimeout(() => fireConfetti(25, midX - 100, midY - 50), 150);
                setTimeout(() => fireConfetti(25, midX + 100, midY - 50), 300);
                
                document.querySelector('.mission-card').style.animation = 'none';
                void document.querySelector('.mission-card').offsetWidth;
                document.querySelector('.mission-card').style.animation = 'fadeIn 0.5s';
                
                setTimeout(() => {
                    activeIndex = -1;
                    drawSequence();
                }, 800);
            } else {
                playSound('error');
                document.body.classList.add('error-flash');
                setTimeout(() => document.body.classList.remove('error-flash'), 400);
            }
        }

        function showCompletion() {
            document.getElementById('completion-overlay').style.display = 'flex';
            document.body.classList.add('victory-glow');
            
            // GRAND CELEBRATION
            const canvas = getConfettiCanvas();
            const w = canvas ? canvas.width : window.innerWidth;
            const h = canvas ? canvas.height : window.innerHeight;
            
            // Continuous bursts for several seconds
            let bursts = 0;
            const interval = setInterval(() => {
                fireConfetti(50, Math.random() * w, Math.random() * h);
                bursts++;
                if (bursts > 8) clearInterval(interval);
            }, 300);
            
            playSound('levelUp');
        }

        function nextLevelRange() {
            document.getElementById('completion-overlay').style.display = 'none';
            document.body.classList.remove('victory-glow');
            sequenceMin += 5;
            sequenceMax += 5;
            updateLevelBadge();
            patternsPool = generatePatterns();
            drawSequence();
        }

        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            
            if(type === 'tap') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } else if(type === 'success') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
                osc.start(); osc.stop(ctx.currentTime + 0.5);
            } else if(type === 'levelUp') {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'square';
                const now = ctx.currentTime;
                osc.frequency.setValueAtTime(261.63, now);
                osc.frequency.setValueAtTime(329.63, now + 0.1);
                osc.frequency.setValueAtTime(392.00, now + 0.2);
                osc.frequency.setValueAtTime(523.25, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(); osc.stop(now + 0.6);
            } else if(type === 'error') {
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const gain = ctx.createGain();
                osc1.type = 'sawtooth';
                osc2.type = 'sawtooth';
                osc1.frequency.setValueAtTime(110, ctx.currentTime);
                osc2.frequency.setValueAtTime(114, ctx.currentTime);
                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.5);
                osc1.connect(gain); osc2.connect(gain);
                gain.connect(ctx.destination);
                osc1.start(); osc2.start();
                osc1.stop(ctx.currentTime + 0.5); osc2.stop(ctx.currentTime + 0.5);
            }
        }

        function fireConfetti(count = 100, originX, originY) {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            
            // Resize if needed
            if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            const startX = originX !== undefined ? originX : canvas.width / 2;
            const startY = originY !== undefined ? originY : canvas.height / 2;
            
            for(let i=0; i<count; i++) {
                particles.push({
                    x: startX,
                    y: startY,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.7) * 25,
                    size: Math.random() * 8 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    life: 1.0,
                    gravity: 0.5
                });
            }

            if (!window.isConfettiLoopRunning) {
                window.isConfettiLoopRunning = true;
                requestAnimationFrame(animateConfetti);
            }
        }

        function animateConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let alive = false;
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if(p.life > 0) {
                    alive = true;
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += p.gravity;
                    p.life -= 0.008;
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    particles.splice(i, 1);
                }
            }
            
            if(alive) {
                requestAnimationFrame(animateConfetti);
            } else {
                window.isConfettiLoopRunning = false;
            }
        }

        window.onload = () => {
            createStars();
            applyLanguage('ti');
            patternsPool = generatePatterns();
            drawSequence();
        };

        window.addEventListener('keydown', (e) => {
            if(e.key >= '0' && e.key <= '9') pressKey(e.key);
            if(e.key === 'Backspace') pressKey('clear');
            if(e.key === 'ArrowLeft') moveActive(-1);
            if(e.key === 'ArrowRight') moveActive(1);
            if(e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>

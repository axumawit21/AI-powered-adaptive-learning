<script>
    function storeData(title, ques, ans, status, hint = false) {
        let data = localStorage.getItem(title);
        if (!data) {
            let d = {
                title,
                data: [{ ques, status, ans, hint, date: Date.now() }]
            }
            localStorage.setItem(title, JSON.stringify(d))
        } else {
            let d = JSON.parse(data)
            let s = { ques, ans, status, hint, date: Date.now() }
            d.data.push(s)
            localStorage.setItem(title, JSON.stringify(d))
        }
    }
    let activeInput
    let activeIndex = 0

    let changeMin = 21; //end-var
    let changeMax = 25; //end-var

    let sequenceMin = changeMin;
    let sequenceMax = changeMax;
    let allPatterns = [];
    let remainingPatterns = [];
    let patternsPerRound = 5; // The number of unique patterns to present per "round" before resetting

    let languages = {
        ti: {
            title: "ዝጎደሉ ቁፅሪታት",
            heading: "21 , _ , _ , _ , 25",
            scoreLabel: "ውፅኢት",
            answerBtn: "መልስ",
            completionText: "ኩሎም ብትክክል ተመሊሶም።",
            playAgain: "ደጊሞም ይጫወቱ!"
        },
        am: {
            title: "ቁጥር መሙላት",
            heading: "21 , _ , _ , _ , 25",
            scoreLabel: "ውጤት",
            answerBtn: "መልስ",
            completionText: "ሁሉም በትክክል ተመልሳል!",
            playAgain: "ደግመዉ ይጫወቱ"
        },
        en: {
            title: "Fill the Numbers",
            heading: "21 , _ , _ , _ , 25",
            scoreLabel: "Score",
            answerBtn: "Answer",
            completionText: "Congratulations! You have answered all the possibilities.",
            playAgain: "Play again"
        },
        om: {
            title: "Lakkofsota Guuti",
            heading: "21 , _ , _ , _ , 25",
            scoreLabel: "Bu'aa",
            answerBtn: "Deebii",
            completionText: "Galatoomi! Carraawwan hunda taphatteetta.",
            playAgain: "Irra deebi'i taphadhu"
        },
        so: {
            title: "Buuxi Tirooyinka",
            heading: "21 , _ , _ , _ , 25",
            scoreLabel: "Dhibco",
            answerBtn: "Jawaab",
            completionText: "Hambalyo! Dhammaan fursadihii ayaad ciyaartay.",
            playAgain: "Mar kale ciyaar"
        }
    };

    let currentLang = 'ti';

    function applyLanguage(lang) {
        currentLang = languages[lang] ? lang : 'ti';
        let data = languages[currentLang];

        let title = document.querySelector("title");
        let heading = document.querySelector("h1");
        let scoreLabel = document.querySelector("#scoreLabel");
        let answerBtn = document.querySelector(".clearAns .ansBtn:not(.x)");

        if (title) title.innerText = data.title;
        if (heading) heading.innerText = data.heading;
        if (scoreLabel) scoreLabel.innerText = data.scoreLabel;
        if (answerBtn) answerBtn.innerText = data.answerBtn;

        let langSelect = document.getElementById('langSelect');
        if (langSelect && langSelect.value !== currentLang) {
            langSelect.value = currentLang;
        }
    }

    function initLanguage() {
        applyLanguage(currentLang);
        let langSelect = document.getElementById('langSelect');
        if (langSelect) {
            langSelect.addEventListener('change', function () {
                applyLanguage(this.value);
            });
        }
    }

    initLanguage();

    HTMLCollection.prototype.clone = function () {
        let elems = [];
        for (let i = 0; i < this.length; i++) {
            elems.push(this[i]);
        }
        return elems;
    }

    function generateAllPatterns() {
        let len = sequenceMax - sequenceMin + 1; // Total numbers in the sequence (e.g., 21, 22, 23, 24, 25 is length 5)
        let patterns = [];
        // We typically want to fill numbers *between* the first and last.
        // So, indices 1 to len-2 are candidates for blanks.
        let candidateIndices = [];
        for (let i = 1; i < len - 1; i++) {
            candidateIndices.push(i);
        }

        // Generate all combinations of these candidate indices to be blank
        // At least one blank is required.
        for (let i = 1; i <= candidateIndices.length; i++) { // i is number of blanks
            let combinations = getCombinations(candidateIndices, i);
            patterns = patterns.concat(combinations);
        }
        return patterns;
    }

    // Helper function to get combinations
    function getCombinations(arr, k) {
        let result = [];
        function f(prefix, arr, k) {
            if (k === 0) {
                result.push(prefix);
                return;
            }
            if (arr.length === 0) {
                return;
            }
            f(prefix.concat(arr[0]), arr.slice(1), k - 1);
            f(prefix, arr.slice(1), k);
        }
        f([], arr, k);
        return result;
    }


    function resetPatterns() {
        if (!allPatterns.length) {
            allPatterns = generateAllPatterns();
        }
        let pool = allPatterns.slice();
        pool.sort(() => Math.random() - 0.5); // Shuffle
        remainingPatterns = pool.slice(0, Math.min(patternsPerRound, pool.length));
    }

    function pickNextPattern() {
        if (!remainingPatterns.length) return null;
        let idx = randInt(0, remainingPatterns.length - 1);
        let pattern = remainingPatterns[idx];
        remainingPatterns.splice(idx, 1);
        return pattern;
    }

    resetPatterns();
    drawQuestion();

    getElement("#music").volume = .3;
    getElement("#music").play();
    currentIndex()

    document.addEventListener('keydown', screenWriteInto);

    function clears() {
        let inputs = Array.from(getElements(".inputNum"));
        // find last filled input
        for (let i = inputs.length - 1; i >= 0; i--) {
            if (inputs[i].value !== "") {
                inputs[i].value = "";
                activeIndex = i;
                activeInput = inputs[i];
                activeInput.focus();
                return;
            }
        }
        // if none filled, keep focus on first input if exists
        if (inputs.length) {
            activeIndex = 0;
            activeInput = inputs[0];
            activeInput.focus();
        }
    }

    function clearActive() {
        if (activeInput && activeInput.value.length > 0) {
            activeInput.value = activeInput.value.slice(0, -1);
        }
        if (activeInput) activeInput.focus(); // Keep focus
    }


    function vals(e) {
        let inputAns = activeInput;
        if (inputAns) {
            if (inputAns.value.length < inputAns.maxLength) {
                inputAns.value += e; // Append the number
                // If the input is now full, move to the next blank
                if (inputAns.value.length === inputAns.maxLength) {
                    let inputs = Array.from(getElements(".inputNum"));
                    let idx = inputs.indexOf(inputAns);
                    if (idx > -1 && idx < inputs.length - 1) {
                        activeIndex = idx + 1;
                        activeInput = inputs[activeIndex];
                        activeInput.focus();
                    }
                }
            } else {
                // If current input is already full, move to next and set the value there
                let inputs = Array.from(getElements(".inputNum"));
                let idx = inputs.indexOf(inputAns);
                if (idx > -1 && idx < inputs.length - 1) {
                    activeIndex = idx + 1;
                    activeInput = inputs[activeIndex];
                    activeInput.focus();
                    activeInput.value = e; // Set the new digit to the next input
                } else {
                    // If it's the last input and full, just overwrite the last digit
                    inputAns.value = inputAns.value.substring(0, inputAns.maxLength - 1) + e;
                }
            }
            playAudio(getElement("#status"), "assets/setactive.mp3");
        }
    }

    function currentIndex(){
        let inputNums = getElements(".inputNum")
        for (let i = 0; i < inputNums.length; i++) {
            const currentNum = inputNums[i];
            if(currentNum.matches(':focus')){
                activeInput = currentNum
                activeIndex = i
            } 
        }
        if (!activeInput && inputNums.length > 0) { // Ensure there's at least one input num
            activeIndex = 0 
            activeInput = inputNums[activeIndex];
        }
        if (activeInput) activeInput.focus();
        return activeInput
    }

    function screenWriteInto(e) {
        if ((e.key >= '0' && e.key <= '9')) { // Check if it's a digit
            vals(+e.key);
        } else if (e.key === 'Backspace') {
            clearActive(); // Delete last character in active input
            e.preventDefault(); // Prevent browser back navigation
        } else if (e.key === 'ArrowRight') {
            switchNum('r');
            e.preventDefault();
        } else if (e.key === 'ArrowLeft') {
            switchNum('l');
            e.preventDefault();
        } else if (e.key === 'Enter') {
            answer();
            e.preventDefault();
        }
    }

    function keypadWrite(e) {
        vals(+e.innerText);
    }

    function checkIncorrect(inps, d) {
        inps.forEach((item, i)=>{
            if(d[i] !== 1) {
                item.classList.add("incorrect");
            }
        })

        setTimeout(()=>{
            inps.forEach(item=>{
                item.classList.remove("incorrect");
            })
        }, 2000);
    }

    function answer() {
        let inps = getElements(".inputNum");
        inps = Array.from(inps);
        let lenInp = inps.length;

        let d = inps.reduce((newArr, input) => {
            let idx = +input.dataset.index;
            let expected = sequenceMin + idx;
            let diff = +input.value - expected;
            return newArr.concat(diff === 0 ? 1 : 0);
        }, []);

        checkIncorrect(inps, d);

        let firstVal = sequenceMin;
        let lastVal = sequenceMax;
        let q = `${firstVal} - ${lastVal}`;
        let a = "";
        for (let i = 0; i <= (sequenceMax - sequenceMin); i++) {
            a += (sequenceMin + i) + ' ';
        }

        let sum = d.reduce((j, i) => j + i, 0);

        if (sum === lenInp) {
            storeData("math-fillBetween", q, a.trim(), "correct");
            celebrate();
        } else {
            storeData("math-fillBetween", q, a.trim(), "wrong");
            celebrate(0);
        }
    }

    function switchNum(side){
        let inputs = getElements(".inputNum");
        if (inputs.length === 0) return;

        let newIndex = activeIndex;
        if (side === 'r') {
            newIndex = (activeIndex + 1) % inputs.length;
        } else {
            newIndex = (activeIndex - 1 + inputs.length) % inputs.length;
        }
        
        activeIndex = newIndex;
        activeInput = inputs[activeIndex];
        activeInput.focus();
    }

    function updateScore(bool = 1) {
        let elm = getElement("#inHS");
        if (bool) {
            elm.innerText = +elm.innerText + 1;
        }
        else {
            if (+elm.innerText > 0) elm.innerText = +elm.innerText - 1;
        }
    }

    function getRandQue() {
        return { x: sequenceMin, b: sequenceMax - sequenceMin - 1, y: sequenceMax };
    }

    function drawQuestion() {
        let subdiv = getElement(".subdiv");

        if (!allPatterns.length) {
            allPatterns = generateAllPatterns();
        }

        if (!remainingPatterns.length) {
            showCompletion();
            return;
        }

        currentBlankPattern = pickNextPattern();
        if (!currentBlankPattern) { // Fallback if pickNextPattern returns null unexpectedly
             showCompletion();
             return;
        }
        
        let len = sequenceMax - sequenceMin + 1;

        subdiv.innerHTML = "";

        for (let i = 0; i < len; i++) {
            if (i > 0) {
                let commaSpan = createElement("span", "comma", "");
                commaSpan.innerText = ", ";
                subdiv.appendChild(commaSpan);
            }

            if (currentBlankPattern.includes(i)) { // Use .includes() for array check
                let inp = createElement("input", "inputNum", "");
                inp.setAttribute("type", "text");
                inp.setAttribute("maxlength", "2"); // Blanks receive two numbers
                inp.setAttribute("placeholder", "?");
                inp.dataset.index = i;
                subdiv.appendChild(inp);
            } else {
                let span = createElement("span", "ques", "");
                span.innerText = sequenceMin + i;
                subdiv.appendChild(span);
            }
        }

        let inputs = getElements(".inputNum");
        if (inputs.length) {
            activeIndex = 0;
            activeInput = inputs[0];
            activeInput.focus();
        }
    }

    function cleanBoard() {
        let subdiv = getElement(".subdiv");
        if (subdiv) {
            subdiv.innerHTML = '';
        }
    }

    function showCompletion() {
        let overlay = createElement("div", "completionOverlay", "");
        applyStyle(overlay, "position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; color: #fff;");

        let msg = createElement("div", "completionMessage", "");
        msg.innerText = (languages[currentLang] && languages[currentLang].completionText) ? languages[currentLang].completionText : "Congratulations! You have answered all the possibilities.";

        let btn = createElement("button", "ansBtn", "");
        btn.innerText = (languages[currentLang] && languages[currentLang].playAgain) ? languages[currentLang].playAgain : "Play again";
        btn.onclick = function () {
            overlay.remove();
            resetPatterns();
            cleanBoard();
            drawQuestion();
        };

        overlay.appendChild(msg);
        overlay.appendChild(btn);
        document.body.appendChild(overlay);
    }

    function celebrate(status = 1) {
        let panda = pandaNews(status);
        if (status) {
            celebrateDog();
            updateScore();
            setTimeout(() => {
                cleanBoard();
                drawQuestion();
            }, 1000);
        } else {
            document.body.appendChild(panda);
            updateScore(0);
            playAudio(getElement("#status"), "assets/wrong.wav");
        }
        setTimeout(() => {
            if (panda && panda.parentNode) { // Check if panda is still in the DOM
                panda.parentNode.removeChild(panda);
            }
        }, 1000)
    }
</script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styleBlank.css">
</head>


<body>
    <div class="container">
        <div class="header">Text to Picture Matching</div>
        <div class="itemWrapper"></div>
        <div class="question">
            <p class="questionText">
        </div>
        <div class="top-controls" role="group" aria-label="Language, volume and score controls">
            <select class="lang-select" aria-label="Language">
                <option value="ti">ትግርኛ</option>
                <option value="en">English</option>
                <option value="am">አማርኛ</option>
                <option value="om">Afan Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
            <button class="btn mute-toggle" aria-pressed="false" title="Mute/Unmute">🔊</button>
            <button class="btn score-btn" type="button">
                <span class="score-label">Score</span>:
                <span class="score-value">0</span>
            </button>
        </div>
        <div class="feedback-overlay" aria-hidden="true">
            <img class="feedback-image" alt="" />
        </div>
        <audio class="result" autoplay></audio>
    </div>
</body>

<script>
    function storeData(title, ques, ans, status, hint = false) {
        let data = localStorage.getItem(title);
        if (!data) {
            let d = {
                title,
                data: [{ ques, status, ans, hint, date: Date.now() }]
            }
            localStorage.setItem(title, JSON.stringify(d))
        } else {
            let d = JSON.parse(data)
            let s = { ques, ans, status, hint, date: Date.now() }
            d.data.push(s)
            localStorage.setItem(title, JSON.stringify(d))
        }
    }
    var arrOfStr = ["dog", "cat", "rat", "lion", "cow", "pig", "goat"];//end-var

    let pageTitle = ["Text to Picture Matching"];//end-var
    function setPageTitle(selector) {
        let titleElt = document.querySelector(selector);
        let title = document.querySelector("title");
        title.innerText = pageTitle[0];
        if (titleElt) {
            titleElt.innerText = pageTitle[0];
        }
    }
    setPageTitle('.header');

    // ----- Mute/Unmute and Language -----
    const muteBtn = document.querySelector('.mute-toggle');
    const langSelect = document.querySelector('.lang-select');
    const scoreBtn = document.querySelector('.score-btn');
    const scoreValueEl = document.querySelector('.score-value');
    const scoreLabelEl = document.querySelector('.score-label');
    // Persist only mute; streak should reset on refresh
    try { window.__muted = JSON.parse(localStorage.getItem('tpm_muted')||'false'); } catch(e){ window.__muted=false; }
    let streakCount = 0;
    let totalScore = 0;
    function updateStreakDisplay(){}
    function updateScoreDisplay(){ if(scoreValueEl){ scoreValueEl.textContent = String(totalScore); } }
    function applyMuteState(){
        document.querySelectorAll('audio').forEach(a=>{ try{ a.muted = !!window.__muted; a.volume = window.__muted ? 0 : 1; }catch(e){} });
        if(muteBtn){ muteBtn.setAttribute('aria-pressed', window.__muted ? 'true':'false'); muteBtn.textContent = window.__muted ? '🔇' : '🔊'; muteBtn.title = window.__muted ? 'Unmute' : 'Mute'; }
        try{ localStorage.setItem('tpm_muted', JSON.stringify(!!window.__muted)); }catch(e){}
    }
    if(muteBtn){ muteBtn.addEventListener('click', ()=>{ window.__muted = !window.__muted; applyMuteState(); }); }
    applyMuteState();
    updateStreakDisplay();
    updateScoreDisplay();

    const itemWrapper = document.getElementsByClassName("itemWrapper")[0]
    const balloon = document.getElementsByClassName("balloon");
    const fishs = document.getElementsByClassName("fishs");
    const fishImg = document.getElementsByClassName("fishImg");
    const bubble = document.getElementsByClassName("bubble");
    const feedbackOverlay = document.querySelector('.feedback-overlay');
    const feedbackImage = document.querySelector('.feedback-image');

    const colors = ['red', 'yellow', 'rgb(0, 102, 255)', 'rgb(81, 255, 0)', 'rgb(217, 0, 236)', 'orangered', 'pink']
    let randomX;
    let randomY;

    let currentLang = (function(){ try{ return localStorage.getItem('tpm_lang') || 'ti'; }catch(e){ return 'ti'; } })();
    const i18n = {
        en: { title: 'Text to Picture Matching', mute: ['Mute','Unmute'], streak: 'Streak', score: 'Score' },
        am: { title: 'ጽሑፍ ከሥዕል ጋር ማዛመድ', mute: ['ዝም','ክፍት'], streak: 'ተከታታይ', score: 'ነጥቢ' },
        ti: { title: 'ጽሑፍ ምስ ስእሊ ምዝማድ', mute: ['ምዕጻዉ','ምክፋት'], streak: 'ተከታታይ', score: 'ነጥቢ' },
        om: { title: 'Barruu fi Fakkii Walsimsiisi', mute: ['Sagalee Cufi','Bani'], streak: 'Hiriira', score: 'Buʼaa' },
        so: { title: 'Isku dhig Qoraal iyo Sawir', mute: ['Aamus','Fur'], streak: 'Guul isku xigta', score: 'Dhibco' }
    };
    const wordLabels = {
        dog: { en:'dog', am:'ውሻ', ti:'ከልቢ', om:'Saree', so:'Eey' },
        cat: { en:'cat', am:'ድመት', ti:'ድሙ', om:'Adurree', so:'Bisad' },
        rat: { en:'rat', am:'አይጥ', ti:'ኣንጭዋ', om:'Hindheessa', so:'Jiir' },
        lion:{ en:'lion',am:'አንበሳ', ti:'ኣንበሳ', om:'Leenca', so:'Libaax' },
        cow: { en:'cow', am:'ላም', ti:'ላሕሚ', om:'Sanyii', so:'Sacad' },
        pig: { en:'pig', am:'አሳማ', ti:'ሓሰማ', om:'Hoolaa boqqolloo', so:'Doofaar' },
        goat:{ en:'goat',am:'ፍየል', ti:'ጥየል', om:'Ree', so:'Riʼ' }
    };
    function labelFor(key){ const m = wordLabels[key]; return m ? (m[currentLang]||m.en) : key; }
    function applyLanguage(){
        const dict = i18n[currentLang] || i18n.en;
        pageTitle[0] = dict.title;
        setPageTitle('.header');
        if(langSelect){ langSelect.value = currentLang; }
        if(muteBtn){ const m = window.__muted ? dict.mute[1] : dict.mute[0]; muteBtn.title = m; }
        if(scoreLabelEl){ scoreLabelEl.textContent = dict.score || 'Score'; }
        const qt = document.querySelector('.questionText');
        if(qt && typeof window.__currentKey === 'string'){ qt.innerText = labelFor(window.__currentKey); }
        try{ localStorage.setItem('tpm_lang', currentLang); }catch(e){}
    }
    if(langSelect){ langSelect.addEventListener('change', function(){ currentLang = this.value || 'en'; applyLanguage(); }); }

    createElements()
    assignLetters();
    checkAnswer()

    document.getElementsByTagName("body")[0].onload = function () {
        dynamics();
        dynamics2();
        setInterval(dynamics, 3000)
        setInterval(dynamics2, 4000)

    }
    function createElements() {
        for (let i = 0; i < 8; i++) {
            const balloon = document.createElement("div")
            balloon.className = "balloon"
            balloon.id = "balloon" + (i + 1)
            itemWrapper.appendChild(balloon)
            const bubble = document.createElement("div")
            bubble.className = "bubble"
            itemWrapper.appendChild(bubble)
        }
        document.getElementsByClassName("bubble")[0].id = "bubble1"
        document.getElementsByClassName('bubble')[1].id = "bubble2"
        for (let i = 0; i < 7; i++) {
            const fish = document.createElement("div")
            const fishImg = document.createElement("img")
            fishImg.className = "fishImg"
            fish.className = "fishs"
            fish.appendChild(fishImg)
            itemWrapper.appendChild(fish)
        }
    }

    function dynamics() {
        for (let i = 0; i < balloon.length; i++) {
            randomX = Math.floor(Math.random() * 80)
            randomY = Math.floor(Math.random() * 60)
            balloon[i].style.top = randomY + "%";
            balloon[i].style.left = randomX + "%";
            if (balloon[i].style.left > "70%") {
                balloon[i].style.transform = "rotateY(180deg)"
            }
        }
        for (let i = 0; i < bubble.length; i++) {
            randomX = Math.floor(Math.random() * 100)
            randomY = Math.floor(Math.random() * 70)
            bubble[i].style.top = randomY + "%";
            bubble[i].style.left = randomX + "%";
        }

    }
    function dynamics2() {
        for (let i = 0; i < fishs.length; i++) {
            randomX = Math.floor(Math.random() * 80)
            randomY = Math.floor(Math.random() * 60)
            fishs[i].style.top = randomY + "%";
            fishs[i].style.left = randomX + "%";
            fishs[i].style.background = "rgba(255, 255, 255, 0.6)"
            fishs[i].style.border = `solid 2px ${colors[i]} `
            fishs[i].style.backgroundSize = "100%"
        }
    }


    var randomFidelGroup;
    var slicedFidelGroup

    function assignLetters() {
        slicedFidelGroup = arrOfStr.slice(0,)
        randomFidelGroup = Math.floor(Math.random() * slicedFidelGroup.length);
        window.__currentKey = slicedFidelGroup[randomFidelGroup];
        document.getElementsByClassName("questionText")[0].innerText = labelFor(window.__currentKey)
        // document.getElementsByClassName("questionImg")[0].src = `./assets/${slicedFidelGroup[randomFidelGroup]}.png`
        for (let i = 0; i < 7; i++) {
            let sliceRand = Math.floor(Math.random() * slicedFidelGroup.length)
            fishImg[i].src = `./assets/${slicedFidelGroup[sliceRand]}.png`
            slicedFidelGroup.splice(sliceRand, 1)
        }
    }


    function showFeedback(type){
        if(!feedbackOverlay||!feedbackImage) return;
        feedbackImage.src = type === 'correct' ? './assets/yes.jpg' : './assets/no.jpg';
        feedbackOverlay.setAttribute('aria-hidden','false');
        feedbackOverlay.style.display = 'flex';
        clearTimeout(window.__fb_to);
        window.__fb_to = setTimeout(function(){
            feedbackOverlay.style.display = 'none';
            feedbackOverlay.setAttribute('aria-hidden','true');
        }, 1200);
    }
    function triggerConfetti(){
        const existing = document.querySelector('.confetti-container');
        if(existing){ existing.remove(); }
        const container = document.createElement('div');
        container.className = 'confetti-container';
        for(let i=0;i<120;i++){
            const piece = document.createElement('div');
            piece.className = 'confetti-piece';
            piece.style.left = Math.random()*100 + 'vw';
            piece.style.backgroundColor = ['#ff0','#0ff','#f0f','#0f0','#f00','#00f'][Math.floor(Math.random()*6)];
            piece.style.animationDelay = (Math.random()*0.3)+'s';
            piece.style.opacity = (0.7 + Math.random()*0.3).toString();
            container.appendChild(piece);
        }
        document.body.appendChild(container);
        setTimeout(()=>{ container.remove(); }, 1500);
    }

    function checkAnswer() {
        for (let i = 0; i < fishs.length; i++) {
            fishs[i].onclick = function () {
                randomX = Math.floor(Math.random() * 1000)
                randomY = Math.floor(Math.random() * 500)
                fishs[i].style.top = randomY + "px";
                fishs[i].style.left = randomX + "px";
                fishs[i].style.background = colors[Math.floor(Math.random() * colors.length)]
                let d = fishImg[i].src.split('/');

                if (arrOfStr[randomFidelGroup] == d[d.length - 1].split('.')[0]) {
                    storeData("eng-textPictureMatch", arrOfStr[randomFidelGroup], d[d.length - 1].split('.')[0], "correct")
                    document.getElementsByClassName("question")[0].style.color = "rgb(81, 255, 0)"
                    const res = document.getElementsByClassName("result")[0];
                    try { res.muted = !!window.__muted; res.volume = window.__muted ? 0 : 1; } catch(e){}
                    res.src = "./assets/goodjob.mp3";
                    streakCount += 1; updateStreakDisplay();
                    totalScore += 1; updateScoreDisplay();
                    showFeedback('correct');
                    try{ triggerConfetti(); }catch(e){}

                    setTimeout(function () {
                        document.getElementsByClassName("question")[0].style.color = "black"
                        assignLetters()
                    }, 1500)
                }
                else {
                    storeData("eng-textPictureMatch", arrOfStr[randomFidelGroup], d[d.length - 1].split('.')[0], "wrong")
                    document.getElementsByClassName("question")[0].style.color = "red"
                    const res = document.getElementsByClassName("result")[0];
                    try { res.muted = !!window.__muted; res.volume = window.__muted ? 0 : 1; } catch(e){}
                    res.src = "./assets/tryagain.mp3";
                    streakCount = 0; updateStreakDisplay();
                    showFeedback('wrong');

                }
            }
        }
    }
    applyLanguage();
</script>
<style>
    * {
        padding: 0;
        margin: 0;
    }

    html, body {
        height: 100%;
    }
    body {
        background: url('./assets/bkg_fx2.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        overflow: hidden;
        font-family: sans-serif;
    }
    .container{
        position: relative;
        width: 100%;
        height: 100vh;
        max-height: 100dvh;
        overflow: hidden;
    }
    .itemWrapper{
        position: absolute;
        inset: 0;
    }

    .header {
        font-size: 2.8vw;
        color: #fff;
        text-align: center;
        margin-top: 1.5vw;
        font-weight: 800;
        text-shadow: 0 0.3vw 0.6vw rgba(0,0,0,0.6);
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }

    .balloon {
        position: absolute;
        top: 40%;
        left: 45%;
        width: 7.4vw;
        height: 7.4vw;
        background: url('./assets/fish.png') no-repeat;
        background-size: 100%;
        transition: 4s;
        text-align: center;
        color: rgb(255, 255, 255);
        font-size: 6vw;
        font-family: sans-serif;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #balloon1,
    #balloon2 {
        width: 14.7vw;
        height: 14.7vw;
        background: url('./assets/shark.png');
        background-size: 100%;
    }

    #balloon3 {
        width: 4.4vw;
        height: 4.4vw;
        background: url('./assets/fish2.png') no-repeat;
        background-size: 100%;
    }

    #balloon4,
    #balloon5 {
        width: 7.4vw;
        height: 7.4vw;
        background: url('./assets/jellyfish.png') no-repeat;
        background-size: 100%;
    }

    #balloon6,
    #balloon7 {
        width: 5.9vw;
        height: 5.9vw;
        background: url('./assets/starfish.png') no-repeat;
        background-size: 100%;
    }


    .fishs {
        position: absolute;
        top: 40%;
        left: 45%;
        width: 10vw;
        height: 10vw;
        background-size: 100%;
        transition: 5s;
        text-align: center;
        color: rgb(255, 255, 255);
        font-size: 4vw;
        font-family: sans-serif;
        font-weight: bold;
        cursor: pointer;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .fishImg {
        width: 100%;
    }

    .bubble {
        position: absolute;
        top: 100%;
        left: 45%;
        width: 1.47vw;
        height: 1.47vw;
        border-radius: 50%;
        background: url('./assets/bubble.png') no-repeat;
        background-size: 100%;
        transition: 4s;
        text-align: center;
        color: rgb(255, 255, 255);
        font-size: 6vw;
        font-family: sans-serif;
        font-weight: bold;
        cursor: pointer;
    }

    #bubble1,
    #bubble2 {
        width: 3.7vw;
        height: 3.7vw;
    }

    .question {
        position: absolute;
        top: 80%;
        height: 20%;
        width: 100%;
        background: white;
        border-top: solid rgb(81, 255, 0) 5px;
        color: rgb(57, 192, 181);
        font-size: 6vw;
        text-align: center;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
    }

    /* Controls (streak) */
    .controls{
        position: fixed;
        right: 1rem;
        bottom: calc(1rem + env(safe-area-inset-bottom));
        display: flex;
        gap: 0.5rem;
        z-index: 30;
    }
    .btn{
        background: rgba(255,255,255,0.9);
        border: 2px solid #0aa;
        color: #034;
        padding: 0.65rem 0.95rem;
        border-radius: 0.9rem;
        font-size: 1.05rem;
        line-height: 1;
        cursor: pointer;
    }
    .btn[disabled]{ opacity: 0.8; }

    /* Top-right language, volume, and score controls */
    .top-controls{
        position: fixed;
        top: calc(0.7rem + env(safe-area-inset-top));
        right: 2.2rem;
        display: flex;
        gap: 0.6rem;
        align-items: center;
        z-index: 40;
    }
    .lang-select{
        background: rgba(255,255,255,0.95);
        border: 2px solid #0aa;
        color: #034;
        padding: 0.45rem 0.9rem;
        border-radius: 0.85rem;
        font-size: 1.05rem;
        min-width: 7.5rem;
    }

    .score-btn{
        background: linear-gradient(135deg,#ffcc33,#ff8800);
        border-color: #ff8800;
        color: #4b1300;
        font-weight: 700;
        box-shadow: 0 0.2rem 0.5rem rgba(0,0,0,0.35);
        padding: 0.6rem 1.1rem;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        white-space: nowrap;
    }

    /* Responsive styles for mobile */
    @media (max-width: 600px) {

            overflow: hidden;
        }

            font-size: 7vw;
            margin-top: 16vw;
        }

            right: 2.5rem;
            gap: 1rem;
        }
        .lang-select{
            font-size: 4vw;
            padding: 1.5vw 3vw;

        }

        }

        }

            width: 28vw;

        }
        #balloon3 {
            width: 10vw;
            height: 10vw;
        }
        #balloon4, #balloon5 {
            width: 16vw;
            height: 16vw;
        }
        #balloon6, #balloon7 {
            width: 12vw;
            height: 12vw;
        }
        .fishs {
            width: 18vw;
            height: 22vw;
            font-size: 8vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            width: 4vw;
            height: 4vw;
            font-size: 8vw;
        }

        }

            justify-content: center;
            gap: 3vw;
            padding: 0 3vw;
        }

        .readAgain {
            width: 22vw;
            height: 22vw;
        }
    }
    /* Responsive styles for large desktop */
    @media (min-width: 1200px) {
        .header {
            font-size: 2vw;
        }
        .balloon {
            width: 5vw;
            height: 5vw;
            font-size: 4vw;
        }
        #balloon1, #balloon2 {
            width: 10vw;
            height: 10vw;
        }
        #balloon3 {
            width: 3vw;
            height: 3vw;
        }
        #balloon4, #balloon5 {
            width: 5vw;
            height: 5vw;
        }

            width: 4vw;
            height: 4vw;
        }

            width: 6vw;
            height: 8vw;

        }

            width: 2vw;

        }
        .question {
            font-size: 3vw;
            height: 10vw;
        }
        .readAgain {
            width: 8vw;
            height: 8vw;
        }
    }

    .readAgain {
        background: url("./assets/speakerphone.png") no-repeat;
        background-size: cover;
        width: 8vw;
        height: 8vw;
        cursor: pointer;
        background-color: rgb(255, 217, 0);
        border-radius: 50%;
        display: block;
        margin: auto;
        margin-top: 1vw;
    }

    .feedback-overlay{
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 50;
        pointer-events: none;
    }
    .feedback-image{
        max-width: 60%;
        max-height: 60%;
        object-fit: contain;
        border-radius: 0.5rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    /* Confetti effect */
    .confetti-container{
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 60;
    }
    .confetti-piece{
        position: absolute;
        top: -10vh;
        width: 0.5rem;
        height: 1.2rem;
        border-radius: 0.15rem;
        animation: confetti-fall 1.5s linear forwards;
    }
    @keyframes confetti-fall {
        0% { transform: translateY(0) rotateZ(0deg); }
        100% { transform: translateY(115vh) rotateZ(360deg); }
    }
</style>

</html>

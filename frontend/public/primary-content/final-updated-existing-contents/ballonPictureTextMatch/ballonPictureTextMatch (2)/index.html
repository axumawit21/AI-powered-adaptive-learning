<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="header">Picture to Text Matching</div>
        <div class="itemWrapper"></div>
        <div class="question"><img class="questionImg" src="" alt=""></div>
        <div class="nav-controls" role="navigation" aria-label="Page navigation">
            <select class="lang-select" aria-label="Language selector" title="Language">
                <option value="en">English</option>
                <option value="am">አማርኛ</option>
                <option value="ti">ትግርኛ</option>
                <option value="om">Afan Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
            <button class="btn nav back" title="Back" aria-label="Back">⬅</button>
            <button class="btn nav home" title="Home" aria-label="Home">🏠</button>
        </div>
        <div class="controls">
            <button class="btn mute-toggle" aria-pressed="false" title="Mute/Unmute">🔊</button>
            <button class="btn streak" disabled title="Streak">🔥 <span class="streak-count">0</span></button>
        </div>
        <audio src="./assets/water.mp3" autoplay loop></audio>
        <audio src="./assets/background_music.mp3" autoplay loop></audio>
        <audio class="result" autoplay></audio>
    </div>
</body>

<script>
    function storeData(title, ques, ans, status, hint = false) {
        let data = localStorage.getItem(title);
        if (!data) {
            let d = {
                title,
                data: [{ ques, status, ans, hint, date: Date.now() }]
            }
            localStorage.setItem(title, JSON.stringify(d))
        } else {
            let d = JSON.parse(data)
            let s = { ques, ans, status, hint, date: Date.now() }
            d.data.push(s)
            localStorage.setItem(title, JSON.stringify(d))
        }
    }

    var arrOfStr = ["chocolate", "donute", "frog", "heart"];//end-var

    let pageTitle = ["Picture to Text Matching"];//end-var
    function setPageTitle(selector) {
        let titleElt = document.querySelector(selector);
        let title = document.querySelector("title");
        title.innerText = pageTitle[0];
        if (titleElt) {
            titleElt.innerText = pageTitle[0];
        }
    }
    setPageTitle('.header');

    const itemWrapper = document.getElementsByClassName("itemWrapper")[0]
    const balloon = document.getElementsByClassName("balloon");
    const fishs = document.getElementsByClassName("fishs"); // These will be our interactive "balloons"
    const bubble = document.getElementsByClassName("bubble");

    const colors = ['red', 'yellow', 'rgb(0, 102, 255)', 'rgb(81, 255, 0)', 'rgb(217, 0, 236)',]
    let randomX;
    let randomY;

    let isMuted = false;
    let streakCount = 0;
    function setMuted(muted){
        isMuted = muted;
        try { window.__muted = muted; } catch(e){}
        const audios = document.querySelectorAll('audio');
        audios.forEach(function (audio) {
            audio.muted = muted;
            audio.volume = muted ? 0 : 1;
        });
        const btn = document.querySelector('.mute-toggle');
        if(btn){
            btn.setAttribute('aria-pressed', muted ? 'true' : 'false');
            btn.textContent = muted ? '🔇' : '🔊';
            const t = (typeof translations !== 'undefined' && translations[currentLang]) ? translations[currentLang] : translations['en'];
            btn.title = muted ? t.unmute : t.mute;
        }
        try { localStorage.setItem('muted', muted ? '1' : '0'); } catch(e){}
    }

    createElements()
    assignLetters();
    checkAnswer()

    document.getElementsByTagName("body")[0].onload = function () {
        dynamics();
        dynamics2();
        setInterval(dynamics, 3000)
        setInterval(dynamics2, 4000)

    }
    function createElements() {
        // Decorative balloons and bubbles (not interactive for this game)
        for (let i = 0; i < 8; i++) {
            const balloon = document.createElement("div")
            balloon.className = "balloon"
            balloon.id = "balloon" + (i + 1)
            itemWrapper.appendChild(balloon)
            const bubble = document.createElement("div")
            bubble.className = "bubble"
            itemWrapper.appendChild(bubble)
        }
        document.getElementsByClassName("bubble")[0].id = "bubble1"
        document.getElementsByClassName('bubble')[1].id = "bubble2"

        // Interactive "balloons" (fishs) for options, based on arrOfStr length
        for (let i = 0; i < arrOfStr.length; i++) { // Changed loop limit to arrOfStr.length
            const fish = document.createElement("div")
            fish.className = "fishs"
            itemWrapper.appendChild(fish)
        }
    }

    function dynamics() {
        for (let i = 0; i < balloon.length; i++) {
            const bottomSafe = (window.innerWidth <= 600) ? 30 : 18; // reserve space for bottom UI
            randomX = Math.floor(Math.random() * 80)
            randomY = Math.floor(Math.random() * (80 - bottomSafe))
            balloon[i].style.top = randomY + "%";
            balloon[i].style.left = randomX + "%";
            if (parseFloat(balloon[i].style.left) > 70) {
                balloon[i].style.transform = "rotateY(180deg)"
            }
        }
        for (let i = 0; i < bubble.length; i++) {
            const bottomSafe = (window.innerWidth <= 600) ? 30 : 18;
            randomX = Math.floor(Math.random() * 100)
            randomY = Math.max(0, Math.floor(Math.random() * (70 - bottomSafe)))
            bubble[i].style.top = randomY + "%";
            bubble[i].style.left = randomX + "%";
        }

    }
    function dynamics2() {
        // `fishs` elements are used as interactive "balloons"
        for (let i = 0; i < fishs.length; i++) {
            const bottomSafe = (window.innerWidth <= 600) ? 30 : 18;
            randomX = Math.floor(Math.random() * 80)
            randomY = Math.floor(Math.random() * (80 - bottomSafe))
            fishs[i].style.top = randomY + "%";
            fishs[i].style.left = randomX + "%";
            // Assign a random balloon image from assets to the fishs
            fishs[i].style.background = "url(./assets/balloon" + (Math.floor(Math.random() * 7) + 1) + ".png"
            fishs[i].style.backgroundSize = "100%"
        }
    }

    var randomFidelGroup; // Index of the correct answer in arrOfStr

    function assignLetters() {
        // 1. Select a random word from arrOfStr to be the question
        randomFidelGroup = Math.floor(Math.random() * arrOfStr.length);
        document.getElementsByClassName("questionImg")[0].src = `./assets/${arrOfStr[randomFidelGroup]}.png`; // Use the image for the selected word

        // 2. Create a shuffled array of all words in arrOfStr to be displayed as options
        let shuffledOptions = [...arrOfStr]; // Clone the array to shuffle
        for (let i = shuffledOptions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffledOptions[i], shuffledOptions[j]] = [shuffledOptions[j], shuffledOptions[i]];
        }

        // 3. Assign the shuffled words to the interactive "balloons" (fishs)
        for (let i = 0; i < fishs.length; i++) {
            fishs[i].innerText = shuffledOptions[i];
        }
    }

    function checkAnswer() {
        for (let i = 0; i < fishs.length; i++) {
            fishs[i].onclick = function () {
                randomX = Math.floor(Math.random() * 1000)
                randomY = Math.floor(Math.random() * 500)
                fishs[i].style.top = randomY + "px";
                fishs[i].style.left = randomX + "px";
                fishs[i].style.background = colors[Math.floor(Math.random() * colors.length)]
                if (arrOfStr[randomFidelGroup] == fishs[i].innerText) {
                    storeData("eng-pictureTextMatch", arrOfStr[randomFidelGroup], fishs[i].innerText, "correct")
                    let applauses = ['goodJob', 'amazing', 'intelligent', 'phenomenal']
                    let randomApplause = Math.floor(Math.random() * applauses.length)
                    document.getElementsByClassName("question")[0].style.color = "rgb(81, 255, 0)"
                    const resAudio = document.getElementsByClassName("result")[0];
                    resAudio.muted = isMuted;
                    resAudio.volume = isMuted ? 0 : 1;
                    document.getElementsByClassName("result")[0].src = "./assets/" + applauses[randomApplause] + ".mp3"
                    streakCount += 1; updateStreakDisplay();
                    setTimeout(function () {
                        document.getElementsByClassName("question")[0].style.color = "black"
                        assignLetters()
                    }, 1500)
                }
                else {
                    storeData("eng-pictureTextMatch", arrOfStr[randomFidelGroup], fishs[i].innerText, "wrong")
                    let wrong = ['a_aa', 'nope', 'goodtry', 'tryagain']
                    randomApplause = Math.floor(Math.random() * wrong.length)
                    document.getElementsByClassName("question")[0].style.color = "red"
                    const resAudio = document.getElementsByClassName("result")[0];
                    resAudio.muted = isMuted;
                    resAudio.volume = isMuted ? 0 : 1;
                    document.getElementsByClassName("result")[0].src = "./assets/" + wrong[randomApplause] + ".mp3"
                    streakCount = 0; updateStreakDisplay();
                }
            }
        }
    }

    function updateStreakDisplay() {
        document.querySelector('.streak-count').innerText = streakCount;
        document.querySelector('.streak').disabled = streakCount === 0;
    }

    var translations = {
        en: {
            pageTitle: 'Picture to Text Matching',
            header: 'Picture to Text Matching',
            back: 'Back',
            home: 'Home',
            mute: 'Mute',
            unmute: 'Unmute',
            streak: 'Streak'
        },
        am: {
            pageTitle: 'ስእል ከጽሑፍ ጋር ማመሳሰል',
            header: 'ስእል ከጽሑፍ ጋር ማመሳሰል',
            back: 'ወደ ኋላ',
            home: 'መነሻ',
            mute: 'ማጥፊያ',
            unmute: 'መክፈቻ',
            streak: 'ተከታታይ ስኬት'
        },
        ti: {
            pageTitle: 'ስእሊ ምስ ጽሑፍ ምዝማድ',
            header: 'ስእሊ ምስ ጽሑፍ ምዝማድ',
            back: 'ወደ ኋላ',
            home: 'ገዛ',
            mute: 'መዝጊያ',
            unmute: 'መክፈቻ',
            streak: 'ተኸታታይ ስኬት'
        },
        om: {
            pageTitle: 'Fakkii fi Barreeffama Walsimsiisuu',
            header: 'Fakkii fi Barreeffama Walsimsiisuu',
            back: 'Duuba',
            home: 'Mana',
            mute: 'Sagaleen Cufi',
            unmute: 'Sagaleen Bani',
            streak: 'Milkaa’ina Itti Fufaa'
        },
        so: {
            pageTitle: 'Isku Ekeynta Sawirka iyo Qoraalka',
            header: 'Isku Ekeynta Sawirka iyo Qoraalka',
            back: 'Dib',
            home: 'Guriga',
            mute: 'Aamus',
            unmute: 'Ka Aamusi',
            streak: 'Guul Joogto ah'
        }
    };
    var currentLang = 'en';
    function applyLanguage(lang){
        currentLang = translations[lang] ? lang : 'en';
        try { localStorage.setItem('lang', currentLang); } catch(e){}
        document.documentElement.lang = currentLang;
        var t = translations[currentLang];
        pageTitle[0] = t.pageTitle;
        setPageTitle('.header');
        var backBtn = document.querySelector('.nav-controls .back');
        if(backBtn){ backBtn.setAttribute('title', t.back); backBtn.setAttribute('aria-label', t.back); }
        var homeBtn = document.querySelector('.nav-controls .home');
        if(homeBtn){ homeBtn.setAttribute('title', t.home); homeBtn.setAttribute('aria-label', t.home); }
        var streakBtn = document.querySelector('.controls .streak');
        if(streakBtn){ streakBtn.setAttribute('title', t.streak); }
        var muteBtn = document.querySelector('.mute-toggle');
        if(muteBtn){ muteBtn.setAttribute('title', isMuted ? t.unmute : t.mute); }
        var langSel = document.querySelector('.lang-select');
        if(langSel){ langSel.value = currentLang; }
    }

    // Init controls and listeners
    (function initControls(){
        try { isMuted = (localStorage.getItem('muted') === '1'); } catch(e){}
        const muteBtn = document.querySelector('.mute-toggle');
        if(muteBtn){
            muteBtn.addEventListener('click', function(){ setMuted(!isMuted); });
        }
        const langSel = document.querySelector('.lang-select');
        if(langSel){
            try { currentLang = localStorage.getItem('lang') || 'en'; } catch(e) { currentLang = 'en'; }
            langSel.value = currentLang;
            langSel.addEventListener('change', function(){ applyLanguage(this.value); });
        }
        const backBtn = document.querySelector('.nav-controls .back');
        if(backBtn){
            backBtn.addEventListener('click', function(){
                if(window.history.length > 1){ window.history.back(); }
            });
        }
        const homeBtn = document.querySelector('.nav-controls .home');
        if(homeBtn){
            homeBtn.addEventListener('click', function(){
                let url = null;
                try { url = localStorage.getItem('homeUrl') || null; } catch(e){}
                if(!url){
                    const entered = window.prompt('Enter Home URL or file path (saved for next time):');
                    if(entered){
                        try { localStorage.setItem('homeUrl', entered); } catch(e){}
                        url = entered;
                    }
                }
                if(url){ window.location.assign(url); }
            });
        }
        applyLanguage(currentLang || 'en');
        setMuted(isMuted);
        updateStreakDisplay();
    })();
</script>

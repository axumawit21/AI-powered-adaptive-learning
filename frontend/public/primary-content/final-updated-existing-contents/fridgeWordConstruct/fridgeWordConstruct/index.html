<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construct Words</title>
</head>

<body>
    <!-- Controls Bar -->
    <div class="controls-bar">
        <button id="mute-btn" class="control-button" aria-label="Toggle mute">
            <!-- Initial icon: Speaker (unmuted) -->
            <svg id="mute-icon-speaker" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4z" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" /></svg>
            <!-- Muted icon -->
            <svg id="mute-icon-off" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" x2="23" y1="1" y2="23" /><path d="M15.54 8.46l-1.07 1.07M19.07 4.93l-1.07 1.07M11 5L6 9H2v6h4l2-2" /><path d="M15.54 8.46a5 5 0 0 1 0 7.07l-1.07-1.07M19.07 4.93a10 10 0 0 1 0 14.14l-1.07-1.07M4 15l2-2" /></svg>
        </button>
        <select id="language-select" class="language-select" aria-label="Select language">
            <option value="ti">ትግርኛ</option>
            <option value="en">English</option>
            <option value="am">አማርኛ</option>
            <option value="om">Afan Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </div>

    <h1 style="text-align: center;">Construct Words</h1>
    <div id="game-message" class="message-box"></div>
    <div class="blackboard-container">
        <div class="blackboard-frame">
            <div class="blackboard-hanger"></div>
            <!-- Letter slots will be created dynamically here -->
            <div class="letters"></div>
        </div>
    </div>
    <div class="letter-options"></div>

    <button id="check-word-btn" class="check-button" disabled>CHECK WORD</button>
    <div class="totalScore">0</div>

    <!-- Audio elements -->
    <!-- Note: Audio elements remain hidden but are muted/unmuted via JS -->
    <audio controls id="bg" autoplay loop style="display: none;">
        <source src="assets/musicmain.ogg" type="audio/ogg">
        <source src="assets/musicmain.ogg" type="audio/mpeg">
    </audio>
    <audio controls id="fidel" style="display: none;">
        <source src="assets/success.mp3" type="audio/mp3">
    </audio>
    <audio controls id="setactive" style="display: none;">
        <source src="assets/setactive.mp3" type="audio/mp3">
    </audio>
    <audio controls id="wrong-sound" style="display: none;">
        <source src="assets/aaa.mp3" type="audio/mp3">
    </audio>

    <img src="assets/stand.gif" alt="Game mascot" id="megaman">

</body>
<style>
    /* Global Styles */
    body {
        background: radial-gradient(#84d8ff, #1363db);
        min-height: 100vh;
        font-family: 'Gochi Hand', 'Patrick Hand', 'Chalkduster', 'Comic Sans MS', cursive;
        position: relative;
    }

    h1 {
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        color: rgb(255, 255, 255);
        text-align: center;
        margin-top: 10px;
        text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
    }

    /* Scoreboard */
    .totalScore {
        position: absolute;
        top: 10px;
        right: 5%;
        font-size: clamp(2.5rem, 6vw, 4.5rem);
        color: rgb(0, 255, 251);
        font-weight: bold;
        text-shadow: 0 0 10px rgba(0, 255, 251, 0.8);
    }
    
    /* New Styles for Controls */
    .controls-bar {
        position: absolute;
        top: 15px;
        left: 5%;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 10px;
        z-index: 50; /* Ensure controls are above other elements */
    }

    .control-button {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 8px;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .control-button svg {
        width: 24px;
        height: 24px;
        display: block;
    }
    .control-button:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.25);
        transform: translateY(-1px);
    }
    .control-button:active:not(:disabled) {
        transform: translateY(1px);
    }
    .control-button:disabled {
        opacity: 0.4;
        cursor: default;
    }

    /* Blackboard Container */
    .blackboard-container {
        position: relative;
        width: 90%;
        max-width: 700px;
        margin: 0% auto 4%; /* moved a bit higher on the page */
        perspective: 1000px;
        transform-style: preserve-3d;
    }
    
    .blackboard-frame {
        position: relative;
        padding: 10px;
        background: #5D4037;
        border-radius: 12px;
        box-shadow: 
            0 15px 35px rgba(0,0,0,0.5),
            inset 0 0 15px rgba(0,0,0,0.3);
        transform: translateZ(0);
    }
    
    .blackboard-hanger {
        /* ... existing styles ... */
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        width: 100px;
        height: 20px;
        background: #8B5A2B;
        border-radius: 10px 10px 0 0;
        box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
        z-index: 10;
    }
    
    .blackboard-hanger::before {
        content: '';
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 120%;
        height: 5px;
        background: #5D4037;
        border-radius: 3px;
    }
    
    .letters {
        width: 100%;
        box-sizing: border-box;
        min-height: 120px; /* Increased height for slots */
        margin: 0;
        padding: 15px 5px;
        position: relative;
        background: #111;
        display: flex; /* Use flex for arrangement */
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px; /* Space between slots */
        z-index: 2;
        border-radius: 5px;
    }

    .letters::before {
        /* Chalk dust effect */
        content: '';
        position: absolute;
        inset: 0;
        background: 
            radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 20%) 0 0 / 100% 100% no-repeat,
            radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04) 0%, transparent 25%) 0 0 / 100% 100% no-repeat;
        pointer-events: none;
        opacity: 0.8;
        mix-blend-mode: overlay;
    }
    
    /* Letter Slot Styles (The empty spaces on the board) */
    .letter-slot {
        width: clamp(30px, 12vw, 60px);
        height: clamp(40px, 15vw, 70px);
        background-color: rgba(255, 255, 255, 0.1);
        border: 3px dashed #777;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        color: #fff;
        cursor: pointer;
        transition: all 0.2s ease-in-out;
        user-select: none;
        font-weight: bold;
        text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    }
    
    /* Placed letter interaction */
    .letter-slot:not(.empty-slot):hover {
        background-color: rgba(255, 255, 255, 0.25);
        transform: scale(1.05);
    }

    /* Completed word display */
    .finished-word {
        font-size: clamp(2.5rem, 8vw, 4rem);
        color: #fff;
        text-shadow: 0 0 15px #fff184;
        transition: text-shadow 0.2s ease;
    }

    /* Letter options card styles */
    .letter-options {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 1em auto;
        min-height: 70px;
        max-width: 700px;
        width: 90%;
    }
    .letter-card {
        background: linear-gradient(135deg, #fffbe8 60%, #ffe0fa 100%);
        border-radius: 18px 22px 16px 20px / 16px 18px 22px 20px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.14), 0 1.5px 0 #d8b97f, 0 0 10px 2px #fffbe8aa;
        padding: 0.65em 1.3em;
        font-size: clamp(1.5rem, 4vw, 2.2rem);
        font-family: 'Gochi Hand', 'Patrick Hand', cursive;
        color: #222;
        font-weight: bold;
        cursor: pointer;
        user-select: none;
        transition: transform 0.18s cubic-bezier(0.4,1.6,0.4,1), box-shadow 0.18s, background 0.25s, filter 0.18s;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2.5px dashed #e2c17e;
        position: relative;
        filter: drop-shadow(0 0 6px #fff7d6cc);
        min-width: 40px;
        height: 40px;
        transform: rotate(var(--tilt, -3deg));
    }
    .letter-card:hover {
        background: linear-gradient(135deg, #fffbe8 40%, #ffe0fa 100%);
        transform: translateY(-5px) scale(1.1) rotate(var(--tilt, -5deg));
        box-shadow: 0 8px 24px 0 #ffe08a88, 0 0 18px #fffbe8cc;
        border-color: #ffe08a;
        filter: drop-shadow(0 0 10px #fff7d6ee);
    }
    .letter-card:active {
        background: #fbe7a0;
        transform: scale(0.96) rotate(var(--tilt, -2deg));
        filter: drop-shadow(0 0 4px #ffe08a);
    }
    .letter-card-used {
        filter: grayscale(100%);
        opacity: 0.5;
        pointer-events: none;
        transform: scale(0.9) rotate(var(--tilt, -1deg));
        cursor: default;
    }

    /* Check Button Style */
    .check-button {
        display: block;
        margin: 20px auto;
        padding: 15px 30px;
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
        background: linear-gradient(45deg, #ff416c, #ff4b2b);
        border: none;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        cursor: pointer;
        transition: all 0.3s ease;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    .check-button:hover:not(:disabled) {
        background: linear-gradient(45deg, #ff4b2b, #ff416c);
        box-shadow: 0 8px 20px rgba(255, 75, 43, 0.6);
        transform: translateY(-2px);
    }

    .check-button:active:not(:disabled) {
        transform: translateY(1px);
        box-shadow: 0 3px 10px rgba(255, 75, 43, 0.4);
    }

    .check-button:disabled {
        background: #999;
        cursor: default;
        opacity: 0.6;
    }

    @media (min-width: 769px) {
        .check-button {
            margin-top: 32px;
        }
    }

    /* Message Box Styles (For alerts/success) */
    .message-box {
        text-align: center;
        font-size: 1.5rem;
        font-weight: bold;
        color: #ffcc00;
        min-height: 2em;
        margin-top: 10px;
        text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
    }

    /* Mascot Image - Desktop/Tablet Default */
    #megaman {
        position: absolute;
        right: 5%;
        top: 80px;
        width: clamp(60px, 8vw, 100px);
        height: auto;
    }

    /* Hide the old, broken drag classes */
    div.letter, .letter-ondrag {
        display: none !important;
    }
    
    /* --- Mobile Responsiveness Adjustments (max-width: 640px) --- */
    @media (max-width: 640px) {
        /* Place Scoreboard inline with content */
        .totalScore {
            position: static;
            text-align: center;
            margin: 10px 0;
            font-size: 2rem;
        }

        /* Adjust controls bar position on mobile */
        .controls-bar {
            position: static;
            justify-content: center;
            margin: 10px auto;
            width: 90%;
            max-width: 100%;
        }

        /* Center the mascot at the bottom for small screens */
        #megaman {
            position: static;
            display: block;
            margin: 20px auto 0;
            width: 80px;
        }

        /* Adjust button padding to be slightly less overwhelming on mobile */
        .check-button {
            padding: 12px 20px;
            font-size: 1.2rem;
        }

        /* Reduce gap between letter options */
        .letter-options {
            gap: 5px;
        }
    }

    .language-select {
        background: rgba(255, 255, 255, 0.92);
        color: #0f172a;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        padding: 6px 8px;
        cursor: pointer;
        font-family: inherit;
        font-size: 0.9rem;
        outline: none;
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
    }

    .language-select option {
        background: white;
        color: #0f172a;
    }
</style>
<script>
    // --- Initial Data and Setup ---
    let pageTitle = ["Construct Words"];
    let arrOfStr = ['ጎማ', 'ኣራንሺ', 'ክራር', 'ጀልባ', 'ባኒ', 'ጉጋ', 'መጣበቂ', 'ነብሪ', 'ቀጭኔ', 'ፃዕዳሽንኩርቲ', 'ከበሮ', 'ቁልፊ', 'ጎያይት', 'ፈረስ', 'ኮምፒተር', 'ቆቢዕ', 'ዒፍ', 'ድሙ', 'ሽጉጥ', 'ገዛ', 'ንህቢ', 'መንፈሪ', 'ፃፀ', 'ኣንበሳ', 'እንቋቁሖ', 'ንጉስ', 'ጀላቲ', 'ለስላሳ', 'ዝብኢ', 'ምንጭር', 'እኖ', 'መፅረጊ', 'ነፋሪት', 'ካርታ', 'ሙዝ', 'ሆረየ', 'መኪና', 'ጃኬት', 'ሓርማዝ', 'ካራ', 'ካሮት', 'ፅምብላሊዕ', 'ማንጎ', 'ቡምባ', 'ካናቲራ', 'እስክርቢቶ', 'መብሰሊ', 'ስርናይ', 'ዓራት', 'መብራህቲ', 'ሸዊት', 'ኣቦ ጋቡየ', 'ሽኮር ድንሽ', 'ጓንቲ', 'ብዕራይ', 'ፅላል', 'ኣቦ', 'ጭንቁርባዕ', 'ጆክ', 'ኣድጊ', 'ዓሳ', 'ባኮ', 'መነፀር', 'ፀናፅል', 'ደርሆ', 'ባንዴራ', 'ዱባ', 'ሓርገፅ', 'ቅንጥሻራ', 'ሰብኣይ', 'ዱካን', 'ኣናናስ', 'ከልቢ', 'ንግስቲ', 'ማንቲለ', 'ብርጭቅ', 'ቀላዲ', 'ሌካሌካ', 'ሮጊድ', 'ወርሒ', 'ቃርያ', 'ከረሜላ', 'መንፀፊ', 'ብርጩቆ', 'ቆፅሊ', 'ሰዓት', 'ሽንኩርቲ', 'እርሳስ', 'ኮሚደረ', 'ሓሰማ', 'ቆልዓ', 'ቫዮሊን', 'ሓንሸኻ', 'ዕንበባ', 'ዛፍ', 'ሂበይ', 'ሸባቶ', 'ላሕሚ', 'ዓይኒ', 'ጉጂ ገዛ', 'ቀለበት', 'በጊዕ', 'ወይኒ', 'ሻሂ', 'ፀሓይ', 'መጉሐፊ', 'ቦርሳ', 'ድንሽ', 'ኮከብ', 'ኣንጭዋ', 'እግሪ', 'ዜብራ', 'ሎሚን', 'መዝሐሊ'];
    arrOfStr = arrOfStr.sort(() => Math.random() - 0.5); // Shuffle the starting words

    // Game State Variables
    let donearrOfStr = [];
    let targetWord = '';
    let letterSlots = []; // Array of {letter: 'X', originalIndex: 5} or null
    let isMuted = false;

    // Score
    let totalScore = 0;
    const scoreBoard = document.querySelector(".totalScore");

    // DOM Elements
    const lettersContainer = document.querySelector('.letters');
    const optionsContainer = document.querySelector('.letter-options');
    const checkBtn = document.querySelector('#check-word-btn');
    const messageBox = document.querySelector('#game-message');
    const megaman = document.querySelector("#megaman");
    
    // Control Button DOM
    const backBtn = document.querySelector('#back-btn');
    const muteBtn = document.querySelector('#mute-btn');
    const muteIconSpeaker = document.querySelector('#mute-icon-speaker');
    const muteIconOff = document.querySelector('#mute-icon-off');
    const languageSelect = document.querySelector('#language-select');

    // Audio and Visuals
    const bgMusic = document.querySelector("#bg");
    bgMusic.volume = .4;
    const success = document.querySelector("#fidel");
    const setactive = document.querySelector("#setactive");
    const wrongSound = document.querySelector("#wrong-sound");
    const candies = ["green.png", "red.png", "yellow.png", "orange.png", "blue.png", "purple.png"];

    // --- Language / i18n ---
    const translations = {
        en: {
            title: 'Construct Words',
            checkButton: 'CHECK WORD'
        },
        am: {
            title: 'ቃላት አሰናዳ',
            checkButton: 'ቃሉን አረጋግጥ'
        },
        ti: {
            title: 'ቃላት መስርቱ',
            checkButton: 'ቃል አረጋግጽ'
        },
        om: {
            title: 'Jecha ijaaruu',
            checkButton: 'JECHA MIRMADII' 
        },
        so: {
            title: 'Erayo dhis',
            checkButton: 'HUBI ERAYGA'
        }
    };

    let currentLang = 'ti';

    function applyLanguage() {
        const langConfig = translations[currentLang] || translations.en;
        const titleTag = document.querySelector('title');
        const h1Elt = document.querySelector('h1');
        if (titleTag) titleTag.innerText = langConfig.title;
        if (h1Elt) h1Elt.innerText = langConfig.title;
        if (checkBtn) checkBtn.textContent = langConfig.checkButton;
    }

    // --- Helper Functions ---
    function randint(min, max) {
        const num = Math.floor(Math.random() * (max - min + 1)) + min;
        return num;
    }

    function showMessage(text, isError = false) {
        messageBox.textContent = text;
        messageBox.style.color = isError ? '#ff416c' : '#a8ff78';
        // Clear message after a delay
        setTimeout(() => {
            messageBox.textContent = '';
        }, 2500);
    }

    function celebrateCandies() {
        let ncandies = randint(30, 50);
        for (let i = 0; i < ncandies; i++) {
            let src = `assets/${candies[Math.floor(Math.random() * candies.length)]}`;
            let candy = document.createElement("img");
            candy.src = src;
            candy.alt = "Candy celebration";
            // Random destination position
            let randTop = Math.floor(Math.random() * 90);
            let randLeft = Math.floor(Math.random() * 90);
            
            // Start position (from center of blackboard)
            const rect = lettersContainer.getBoundingClientRect();
            candy.style.position = "absolute";
            candy.style.top = rect.top + (rect.height / 2) + 'px';
            candy.style.left = rect.left + (rect.width / 2) + 'px';
            candy.style.width = '30px';
            candy.style.height = '30px';
            candy.style.transition = "transform 1.5s ease-out, opacity 1s 1.5s";
            candy.style.zIndex = "1001";
            
            document.body.appendChild(candy);

            // Animate candy toss
            setTimeout(() => {
                candy.style.top = randTop + "%";
                candy.style.left = randLeft + "%";
                // Random spin and scale
                candy.style.transform = `translate(-50%, -50%) rotate(${randint(-720, 720)}deg) scale(0.5)`;
                candy.style.opacity = '0';
            }, 50);

            // Cleanup
            setTimeout(() => {
                candy.remove();
            }, 3000);
        }
    }

    // --- Control Handlers ---
    function toggleMute() {
        isMuted = !isMuted;
        bgMusic.muted = isMuted;
        success.muted = isMuted;
        setactive.muted = isMuted;
        wrongSound.muted = isMuted;

        if (isMuted) {
            muteIconSpeaker.style.display = 'none';
            muteIconOff.style.display = 'block';
        } else {
            muteIconSpeaker.style.display = 'block';
            muteIconOff.style.display = 'none';
        }
    }

    function updateControlState() {
        // Update Back Button based on solved words list
        const isDisabled = donearrOfStr.length === 0;
        if (backBtn) {
            backBtn.disabled = isDisabled;
            backBtn.style.opacity = isDisabled ? '0.4' : '1';
        }
    }

    function handleBack() {
        if (donearrOfStr.length === 0) return;

        // 1. Put the CURRENT word back into the list of words to be solved
        if (targetWord) {
            // Unshift adds it to the front of the array, making it the next word if the user continues forward
            arrOfStr.unshift(targetWord);
        }

        // 2. Get the PREVIOUSLY solved word (from the back of the done list)
        const prevWord = donearrOfStr.pop();
        
        // 3. Update score and scoreboard
        totalScore = Math.max(0, totalScore - 1); // Prevent negative score
        scoreBoard.textContent = totalScore;

        // 4. Load the previous word for the user to solve again
        loopWord(prevWord);
        
        // 5. Update controls
        updateControlState();
        showMessage(`Moved back to previous word: ${prevWord}`, false);
    }

    // --- Game Logic Handlers ---
    function handleCardClick(event) {
        const card = event.currentTarget;
        const letter = card.textContent;
        // The original index identifies which specific card instance it is
        const originalIndex = parseInt(card.dataset.originalIndex, 10);

        // Find the first empty slot
        const emptySlotIndex = letterSlots.findIndex(slot => slot === null);

        if (emptySlotIndex !== -1) {
            // Place the letter in the slot array
            letterSlots[emptySlotIndex] = { letter, originalIndex };
            if (!isMuted) {
                setactive.currentTime = 0;
                setactive.play();
            }
            updateGameUI();
        } else {
            showMessage("All spaces are full!", true);
        }
    }

    function handleSlotClick(event) {
        const slotElement = event.currentTarget;
        const slotIndex = parseInt(slotElement.dataset.index, 10);
        const placedLetterData = letterSlots[slotIndex];

        if (placedLetterData) {
            // Find the original card in the options area
            const cardToReturn = optionsContainer.querySelector(`[data-original-index="${placedLetterData.originalIndex}"]`);
            
            // Remove the letter from the slot array
            letterSlots[slotIndex] = null;
            
            // Mark the card as available again
            if (cardToReturn) {
                cardToReturn.classList.remove('letter-card-used');
                // Re-add click listener (it's removed in updateGameUI for used cards)
                cardToReturn.addEventListener('click', handleCardClick); 
            }

            // Since we are using a simple slot array, we just update the UI.
            if (!isMuted) {
                setactive.currentTime = 0;
                setactive.play();
            }
            updateGameUI();
        }
    }

    function updateGameUI() {
        // 1. Update Blackboard Slots
        const slotElements = lettersContainer.querySelectorAll('.letter-slot');
        slotElements.forEach((slotEl, index) => {
            const placedData = letterSlots[index];
            // Clear existing listeners
            slotEl.removeEventListener('click', handleSlotClick);
            
            if (placedData) {
                slotEl.textContent = placedData.letter;
                slotEl.classList.remove('empty-slot');
                slotEl.style.backgroundColor = 'rgba(255, 255, 255, 0.2)'; // Highlight placed letter
                slotEl.addEventListener('click', handleSlotClick);
            } else {
                slotEl.textContent = '';
                slotEl.classList.add('empty-slot');
                slotEl.style.backgroundColor = 'rgba(255, 255, 255, 0.1)'; // Default empty slot
            }
        });

        // 2. Update Options Cards
        optionsContainer.querySelectorAll('.letter-card').forEach(card => {
            const originalIndex = parseInt(card.dataset.originalIndex, 10);
            
            // Check if this card's letter (by originalIndex) is currently placed in any slot
            const isUsed = letterSlots.some(slot => slot && slot.originalIndex === originalIndex);
            
            // Always remove the listener first to prevent duplicates
            card.removeEventListener('click', handleCardClick);
            
            if (isUsed) {
                card.classList.add('letter-card-used');
            } else {
                card.classList.remove('letter-card-used');
                card.addEventListener('click', handleCardClick);
            }
        });

        // 3. Update Check Button State
        const isFull = letterSlots.every(slot => slot !== null);
        checkBtn.disabled = !isFull;
        checkBtn.style.opacity = isFull ? '1' : '0.5';
    }

    function loopWord(word) {
        lettersContainer.innerHTML = '';
        optionsContainer.innerHTML = '';
        targetWord = word;
        letterSlots = new Array(word.length).fill(null);

        let wordLetters = word.split('');
        // Create an array of letter objects with original index for tracking (important for duplicate letters)
        let lettersWithIndex = wordLetters.map((letter, index) => ({ letter, originalIndex: index }));
        
        // Shuffle the letters for the options
        let shuffledLetters = lettersWithIndex.sort(() => Math.random() - 0.5);

        // Place empty slots on the blackboard
        for (let i = 0; i < word.length; i++) {
            let slot = document.createElement('div');
            slot.className = 'letter-slot empty-slot';
            slot.dataset.index = i;
            lettersContainer.appendChild(slot);
        }
        
        // Place the shuffled option letters in cards
        shuffledLetters.forEach((data, index) => {
            let card = document.createElement('div');
            card.className = 'letter-card';
            card.textContent = data.letter;
            card.dataset.originalIndex = data.originalIndex;
            card.style.setProperty('--tilt', `${randint(-3, 3)}deg`);
            
            card.addEventListener('click', handleCardClick);
            optionsContainer.appendChild(card);
        });
        
        updateGameUI();
    }

    function getNextWord() {
        if (arrOfStr.length === 0 && donearrOfStr.length > 0) {
            // Cycle back to the start if all words are done
            arrOfStr = donearrOfStr.splice(0, donearrOfStr.length).sort(() => Math.random() - 0.5);
            showMessage("Starting a new round with the words you learned!", false);
        }
        
        if (arrOfStr.length > 0) {
            // Pick and remove the next word
            const nextWord = arrOfStr.shift();
            loopWord(nextWord);
        } else {
            // Game finished
            showMessage(`Congratulations! You completed ${totalScore} words!`, false);
            checkBtn.disabled = true;
            lettersContainer.innerHTML = `<div class="finished-word">Game Over!</div>`;
        }
        updateControlState();
    }

    function checkWord() {
        // Construct the word from the current slots
        const currentWord = letterSlots.map(slot => slot ? slot.letter : '').join('');
        
        if (currentWord === targetWord) {
            celebrate(targetWord);
        } else {
            // Show a small wrong answer image over the answer box (blackboard)
            const frame = lettersContainer.parentElement;
            if (frame) {
                const overlay = document.createElement('div');
                overlay.style.position = 'absolute';
                overlay.style.top = '50%';
                overlay.style.left = '50%';
                overlay.style.transform = 'translate(-50%, -50%)';
                overlay.style.zIndex = '5';
                overlay.style.pointerEvents = 'none';

                const img = document.createElement('img');
                img.src = 'assets/wrong.jpg';
                img.alt = 'Wrong answer';
                img.style.width = '200px';
                img.style.height = 'auto';
                img.style.borderRadius = '8px';

                overlay.appendChild(img);
                frame.appendChild(overlay);

                // Automatically hide the image after a short delay
                setTimeout(() => {
                    overlay.remove();
                }, 1200);
            }

            if (!isMuted) {
                wrongSound.currentTime = 0;
                wrongSound.play();
            }
            megaman.src = "assets/stand.gif"; // Temporary damage/sad state using stand.gif (damage.gif does not exist)
            setTimeout(() => { megaman.src = "assets/stand.gif"; }, 1000);
        }
    }

    function celebrate(fidel) {
        megaman.src = "assets/happy.gif";
        checkBtn.disabled = true; // Disable button while celebrating
        
        // Move the completed word to the 'done' array
        donearrOfStr.push(fidel);
        
        // Display the word on the blackboard temporarily
        lettersContainer.innerHTML = `<div class="finished-word">${fidel}</div>`;
        
        celebrateCandies();

        success.play();
        
        totalScore++;
        scoreBoard.textContent = totalScore;

        const finishedWordEl = lettersContainer.querySelector('.finished-word');
        let i = 0;
        const shadow = setInterval(() => {
            if (i > 10) {
                clearInterval(shadow);
                megaman.src = "assets/stand.gif";
                getNextWord(); // Load the next word
            }
            if (finishedWordEl) {
                // Flash the word in celebration colors
                finishedWordEl.style.textShadow = (i % 2 === 0) 
                    ? "0 0 15px #fff184, 0 0 20px #fff, 0 0 25px #fff184" 
                    : "0 0 5px #84d8ff, 0 0 10px #1363db";
            }
            i++;
        }, 200);
    }

    // --- Game Initialization ---
    document.addEventListener('DOMContentLoaded', () => {
        // Attach game listeners
        checkBtn.addEventListener('click', checkWord);
        
        // Attach control listeners
        muteBtn.addEventListener('click', toggleMute);
        if (backBtn) {
            backBtn.addEventListener('click', handleBack);
        }

        if (languageSelect) {
            languageSelect.value = currentLang;
            languageSelect.addEventListener('change', (e) => {
                currentLang = e.target.value || 'ti';
                applyLanguage();
            });
        }

        // Apply default language
        applyLanguage();

        // Start the game by loading the first word
        getNextWord();
    });
</script>

</html>

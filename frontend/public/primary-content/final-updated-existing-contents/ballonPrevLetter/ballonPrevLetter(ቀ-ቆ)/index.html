<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <script src="./assets/celebrate.js"></script>
    <title>Document</title>
    <style>
*{
    padding: 0;
    margin: 0;
}
body{
    background: url('./assets/cartoon.jpg');
    background-size: cover;
    background-position: center;
    overflow-x: hidden;
    overflow-y: auto;
}
.container{ position: relative; min-height: 100vh; }
.header {
    font-size: 2.5vw;
    color: white;
    text-align: center;
    margin-top: 1vw;
    font-weight: bolder;
}
.balloon{
    position: absolute;
    top: 40%;
    left: 45%;
    width: 7.4vw;
    height: 7.4vw;
    background: url('./assets/fish.png') no-repeat;
    background-size: 100%;
    transition: 4s;
    text-align: center;
    color: rgb(255, 255, 255);
    font-size: 6vw;
    font-family: sans-serif;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}
#balloon1, #balloon2{
    width: 14.7vw;
    height: 14.7vw;
    background: url('./assets/shark.png');
    background-size: 100%;
}
#balloon3{
    width: 4.4vw;
    height: 4.4vw;
    background: url('./assets/fish2.png') no-repeat;
    background-size: 100%;
}
#balloon4, #balloon5{
    width: 7.4vw;
    height: 7.4vw;
    background: url('./assets/jellyfish.png') no-repeat;
    background-size: 100%;
}
#balloon6, #balloon7{
    width: 5.9vw;
    height: 5.9vw;
    background: url('./assets/starfish.png') no-repeat;
    background-size: 100%;
}
.fishs{
    position: absolute;
    top: 40%;
    left: 45%;
    width: 8.5vw;
    height: 11.4vw;
    background-size: 100%;
    transition: 5s;
    text-align: center;
    color: rgb(255, 255, 255);
    font-size: 5vw;
    font-family: sans-serif;
    font-weight: bold;
    cursor: pointer;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.bubble{
    position: absolute;
    top: 100%;
    left: 45%;
    width: 1.47vw;
    height: 1.47vw;
    border-radius: 50%;
    background: url('./assets/bubble.png') no-repeat;
    background-size: 100%;
    transition: 4s;
    text-align: center;
    color: rgb(255, 255, 255);
    font-size: 6vw;
    font-family: sans-serif;
    font-weight: bold;
    cursor: pointer;
}
#bubble1, #bubble2{
    width: 3.7vw;
    height: 3.7vw;
}
.question{
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 20%;
    width: 100%;
    background: white;
    border-top: solid rgb(81, 255, 0) 5px;
    color: black;
    font-size: 6vw;
    text-align: center;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 20;
}
#dash{
    border: none;
    outline: none;
    width: 8.8vw;
    height: 6.6vw;
    font-size: 6vw;
    border-bottom: blue 4px solid;
    text-align: center;
    font-weight: bold;
    border-radius: 0.5vw;
}
/* Responsive styles for mobile */
@media (max-width: 600px) {
    body {
        overflow-x: hidden;
        overflow-y: auto;
    }
    .header {
        font-size: 6vw;
        margin-top: calc(8vw + env(safe-area-inset-top));
    }
    .balloon {
        width: 16vw;
        height: 16vw;
        font-size: 10vw;
    }
    #balloon1, #balloon2 {
        width: 28vw;
        height: 28vw;
    }
    #balloon3 {
        width: 10vw;
        height: 10vw;
    }
    #balloon4, #balloon5 {
        width: 16vw;
        height: 16vw;
    }
    #balloon6, #balloon7 {
        width: 12vw;
        height: 12vw;
    }
    .fishs {
        width: 18vw;
        height: 22vw;
        font-size: 8vw;
    }
    .bubble {
        width: 4vw;
        height: 4vw;
        font-size: 8vw;
    }
    #bubble1, #bubble2 {
        width: 8vw;
        height: 8vw;
    }
    .question {
        font-size: 8vw;
        height: 24vw;
    }
    #dash {
        width: 18vw;
        height: 10vw;
        font-size: 8vw;
    }
}
/* Responsive styles for large desktop */
@media (min-width: 1200px) {
    .header {
        font-size: 2vw;
    }
    .balloon {
        width: 5vw;
        height: 5vw;
        font-size: 4vw;
    }
    #balloon1, #balloon2 {
        width: 10vw;
        height: 10vw;
    }
    #balloon3 {
        width: 3vw;
        height: 3vw;
    }
    #balloon4, #balloon5 {
        width: 5vw;
        height: 5vw;
    }
    #balloon6, #balloon7 {
        width: 4vw;
        height: 4vw;
    }
    .fishs {
        width: 6vw;
        height: 8vw;
        font-size: 3vw;
    }
    .bubble {
        width: 1vw;
        height: 1vw;
        font-size: 3vw;
    }
    #bubble1, #bubble2 {
        width: 2vw;
        height: 2vw;
    }
    .question {
        font-size: 3vw;
        height: 10vw;
    }
    #dash {
        width: 6vw;
        height: 4vw;
        font-size: 3vw;
    }
}
.controls{
    position: fixed;
    right: 1rem;
    bottom: calc(1rem + env(safe-area-inset-bottom));
    display: flex;
    gap: 0.5rem;
    z-index: 30;
}
.btn{
    background: rgba(255,255,255,0.9);
    border: 2px solid #0aa;
    color: #034;
    padding: 0.5rem 0.75rem;
    border-radius: 0.75rem;
    font-size: 1rem;
    line-height: 1;
}
.btn[disabled]{ opacity: 0.8; }
/* Top-right Home/Back navigation */
.nav-controls{
    position: fixed;
    top: calc(0.5rem + env(safe-area-inset-top));
    right: 1rem;
    display: flex;
    gap: 0.5rem;
    z-index: 40;
}
.btn.nav{
    background: rgba(255,255,255,0.9);
    border: 2px solid #0aa;
    color: #034;
    padding: 0.4rem 0.6rem;
    border-radius: 0.75rem;
    font-size: 0.95rem;
    line-height: 1;
}
.questionText{
    display: inline;
}
        .lang-select{
            font-size: 0.95rem;
        }
    </style>
</head>


<body>
    <div class="container">
        <div class="header">ቀዳማይ ፊደል ፀሓፉ</div>
        <div class="itemWrapper"></div>
        <div class="question"><p class="questionText"></p><input type="text" name="" id="dash" autofocus><p class="questionText"></p></div>
        <div class="nav-controls" role="navigation" aria-label="Page navigation">
            <select id="lang-select" class="btn nav lang-select" aria-label="Language">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Afan Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
            <button class="btn nav back" title="Back" aria-label="Back">⬅</button>
            <button class="btn nav home" title="Home" aria-label="Home">🏠</button>
        </div>
        <div class="controls">
            <button class="btn mute-toggle" aria-pressed="false" title="Mute/Unmute">🔊</button>
            <button class="btn streak" disabled title="Streak">🔥 <span class="streak-count">0</span></button>
        </div>
        <audio src="./assets/water.mp3"  autoplay loop></audio>
        <audio src="./assets/background_music.mp3" autoplay loop></audio>
        <audio class="result" autoplay></audio>
    </div>
</body>

<script>
    var arrOfStr = ["ቀ", "ቁ", "ቂ", "ቃ", "ቄ", "ቅ", "ቆ"]; //end-var

    // Lightweight i18n
    const i18n = {
        ti: { header: "ቀዳማይ ፊደል ፀሓፉ", back: "ተመለስ", home: "መነሻ" },
        am: { header: "የቀድሞውን ፊደል ጻፍ", back: "ተመለስ", home: "መነሻ" },
        en: { header: "Write the previous letter", back: "Back", home: "Home" },
        om: { header: "Quubee duraa barreessi", back: "Duubatti", home: "Mana" },
        so: { header: "Fartaantii hore qor", back: "Dib u noqo", home: "Guri" }
    };
    function getLang(){ return localStorage.getItem("lang") || "ti"; }
    function setLang(l){ localStorage.setItem("lang", l); document.documentElement.setAttribute("lang", l); }
    function applyLanguage(){
        const lang = getLang();
        const t = i18n[lang] || i18n.ti;
        const headerEl = document.querySelector('.header');
        if(headerEl) headerEl.innerText = t.header;
        const backBtn = document.querySelector('.btn.nav.back');
        const homeBtn = document.querySelector('.btn.nav.home');
        if(backBtn){ backBtn.title = t.back; backBtn.setAttribute('aria-label', t.back); }
        if(homeBtn){ homeBtn.title = t.home; homeBtn.setAttribute('aria-label', t.home); }
        const select = document.getElementById('lang-select');
        if(select){ select.value = lang; }
    }

        const itemWrapper = document.getElementsByClassName("itemWrapper")[0]
        const balloon = document.getElementsByClassName("balloon");
        const fishs = document.getElementsByClassName("fishs");
        const bubble = document.getElementsByClassName("bubble");
    
        const colors = ['red', 'yellow', 'rgb(0, 102, 255)', 'rgb(81, 255, 0)', 'rgb(217, 0, 236)',]
        let randomX;
        let randomY;
    
        createElements()
        assignLetters();
        checkAnswer()
    
        document.getElementsByTagName("body")[0].onload = function(){
            dynamics();
            dynamics2();
            setInterval(dynamics,3000)
            setInterval(dynamics2,4000)
            // language init
            setLang(getLang());
            applyLanguage();
            const select = document.getElementById('lang-select');
            if(select){
                select.addEventListener('change', (e)=>{ setLang(e.target.value); applyLanguage(); });
            }
        }
        function createElements(){
            for(let i=0;i<8;i++){
                const balloon = document.createElement("div")
                balloon.className = "balloon"
                balloon.id = "balloon" + (i+1)
                itemWrapper.appendChild(balloon)
                const bubble = document.createElement("div")
                bubble.className = "bubble"
                itemWrapper.appendChild(bubble)
            }
            document.getElementsByClassName("bubble")[0].id = "bubble1"
            document.getElementsByClassName('bubble')[1].id = "bubble2"
            for(let i=0;i<6;i++){
                const fish = document.createElement("div")
                fish.className = "fishs"
                itemWrapper.appendChild(fish)
            }
        }
    
        function dynamics(){
            for(let i=0;i<balloon.length;i++){
                randomX = Math.floor(Math.random()*80)
                randomY = Math.floor(Math.random()*60)
                balloon[i].style.top = randomY + "%";
                balloon[i].style.left = randomX + "%";
                if(balloon[i].style.left > "70%"){
                    balloon[i].style.transform = "rotateY(180deg)"
                }
            }
            for(let i=0;i<bubble.length;i++){
                randomX = Math.floor(Math.random()*100)
                randomY = Math.floor(Math.random()*70)
                bubble[i].style.top = randomY + "%";
                bubble[i].style.left = randomX + "%";
            }
    
        }
        function dynamics2(){
            for(let i=0;i<fishs.length;i++){
                randomX = Math.floor(Math.random()*80)
                randomY = Math.floor(Math.random()*60)
                fishs[i].style.top = randomY + "%";
                fishs[i].style.left = randomX + "%";
                fishs[i].style.background = "url(./assets/balloon" + (Math.floor(Math.random()*7)+1) + ".png"
                fishs[i].style.backgroundSize = "100%"
            }
        }
    
    
        var randomFidelGroup;
        var randomFidel;
        var slicedFidelGroup
        var pickedFidel;
        var forPicked;
    
        function assignLetters(){
            randomFidelGroup = Math.floor(Math.random()*arrOfStr.length);
            randomFidel = Math.floor(Math.random()*arrOfStr.length)
            slicedFidelGroup = arrOfStr.slice(0, )
            forPicked = slicedFidelGroup.slice(0,5)
            slicedFidelGroup.splice(randomFidel, 1)
            pickedFidel = forPicked.splice(randomFidel, 1)
            // document.getElementsByClassName("questionText")[0].innerText = pickedFidel;
            console.log(pickedFidel);
            if(pickedFidel[0] == arrOfStr[5]){
                document.getElementsByClassName("questionText")[1].innerText = ''
            }
            else{
                document.getElementsByClassName("questionText")[1].innerText = arrOfStr[arrOfStr.indexOf(pickedFidel[0]) +2];
            }
            for(let i=0;i<slicedFidelGroup.length;i++){
                fishs[i].innerText = slicedFidelGroup[i]
            }
        }
    
        function checkAnswer() {
            for(let i=0;i<fishs.length;i++){
                fishs[i].onclick = function(){
                    document.getElementById("dash").value = fishs[i].innerText
                    randomX = Math.floor(Math.random()*1000)
                    randomY = Math.floor(Math.random()*500)
                    fishs[i].style.top = randomY + "px";
                    fishs[i].style.left = randomX + "px";
                    fishs[i].style.background = colors[Math.floor(Math.random()*colors.length)]
                    if (arrOfStr.indexOf(pickedFidel[0]) == arrOfStr.indexOf(fishs[i].innerText)-1) {
                        // let applauses = ['goodJob','amazing','intelligent','phenomenal']
                        // let randomApplause = Math.floor(Math.random()*applauses.length)
                        document.getElementsByClassName("question")[0].style.color = "rgb(81, 255, 0)"
                        document.getElementById("dash").style.color = "rgb(81, 255, 0)"
                        celebrateDog()
                        setTimeout(function(){
                            document.getElementById("dash").value = ""
                            document.getElementsByClassName("question")[0].style.color = "black"
                            document.getElementById("dash").style.color = "black"
    
                             assignLetters()
                        },1500)
                    }
                    else{
                        let wrong = ['a_aa']
                        randomApplause = Math.floor(Math.random()*wrong.length)
                        document.getElementsByClassName("question")[0].style.color = "red"
                        document.getElementById("dash").style.color = "red"
                        document.getElementsByClassName("result")[0].src = "./assets/" + wrong[randomApplause] +  ".mp3"
                        showWrong();
                    }
                }
            }
        }

        function showWrong(){
            const img = document.createElement('img');
            img.src = './assets/no.jpg';
            img.setAttribute('style','position:absolute; left: 42%; top: 35%; z-index:2000; width: 220px; height: auto; transform: none; transition: none; pointer-events: none;');
            const backDrop = document.createElement('div');
            backDrop.setAttribute('style',`position:absolute; top:0; left:0; background-color:#000d; width:${window.innerWidth}px; height:${window.innerHeight}px;`);
            document.body.appendChild(img);
            document.body.appendChild(backDrop);
            setTimeout(()=>{ img.remove(); backDrop.remove(); }, 1200);
        }
</script>
</html>

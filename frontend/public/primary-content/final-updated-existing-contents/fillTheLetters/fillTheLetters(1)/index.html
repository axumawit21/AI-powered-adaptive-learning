  <script>
  function id(id){
  return document.getElementById(id);
}
function clas(clas){
  return document.getElementsByClassName(clas);
}

let isMuted = false;
const correctAudio = new Audio('assets/correct.mp3');
const incorrectAudio = new Audio('assets/incorrect.mp3');

function playSound(audio) {
  if (!isMuted && audio) {
    audio.currentTime = 0;
    audio.play();
  }
}

const muteButton = document.getElementById('muteButton');
const soundOnIcon = document.getElementById('soundOnIcon');
const soundOffIcon = document.getElementById('soundOffIcon');

if (muteButton && soundOnIcon && soundOffIcon) {
  muteButton.addEventListener('click', function () {
    isMuted = !isMuted;
    if (isMuted) {
      soundOnIcon.style.display = 'none';
      soundOffIcon.style.display = 'block';
    } else {
      soundOnIcon.style.display = 'block';
      soundOffIcon.style.display = 'none';
    }
  });
}

let pageTitle = ["Fill in the blank"];//end-var
    function setPageTitle(selector) {
      let titleElt = document.querySelector(selector);
      let title = document.querySelector("title");
      title.innerText = pageTitle[0];
      if (titleElt) {
        titleElt.innerText = pageTitle[0];
      }
    }
    setPageTitle('#header')

// ---- Language selection logic (only header, score, Answer) ----
const translations = {
  en: {
    header: 'Fill in the blank',
    score: 'Score',
    answer: 'Answer'
  },
  am: {
    header: 'ባዶውን ሙሉ',
    score: 'ነጥብ',
    answer: 'መልስ'
  },
  ti: {
    header: 'ባዶ ቦታ ሙሉ',
    score: 'ነጥቢ',
    answer: 'መልሲ'
  },
  om: {
    header: 'Iddoo duwwaa guuti',
    score: "Bu'aa",
    answer: 'Deebii'
  },
  so: {
    header: 'Buuxi meel madhan',
    score: 'Dhibco',
    answer: 'Jawaab'
  }
};

function applyLanguage(lang) {
  const t = translations[lang] || translations.en;

  // header + page title
  pageTitle[0] = t.header;
  setPageTitle('#header');

  const headerEl = document.getElementById('header');
  if (headerEl) headerEl.textContent = t.header;

  const scoreLabel = document.getElementById('score-label');
  if (scoreLabel) scoreLabel.textContent = t.score;

  const answerBtn = document.getElementById('btn');
  if (answerBtn) answerBtn.textContent = t.answer;
}

const languageSelect = document.getElementById('languageSelect');
if (languageSelect) {
  languageSelect.addEventListener('change', function () {
    applyLanguage(this.value);
  });
}

// initialize UI language
applyLanguage('en');

// MODIFIED: Updated arrOfStr based on requirements
var arrOfStr = ['Tiger', 'Wolf', 'Eagle', 'Giraffe', 'Zebra', 'Kangaroo', 'Penguin', 'Dolphin'];//end-var

let mainDiv = document.querySelector(".container");

function getRandHint(str) {
  var str = str;
  let len = parseInt(str.length * 0.7);
  let hint = [];
  for (let i = 0; i < len; i++) {
    let rand = parseInt(Math.random() * str.length);
    hint.push(str.splice(rand, 1)[0]);
  }
  return hint;
}

function createGame() {
  let questionDiv = document.querySelector(".questionDiv");
  if (questionDiv) {
    mainDiv.removeChild(questionDiv);
  }
  let qdiv = document.createElement("div");
  qdiv.className = "questionDiv";

  let randWordIndex = parseInt(Math.random() * arrOfStr.length); // Get random index
  let selectedWord = arrOfStr[randWordIndex]; // Get the word string, e.g., "Tiger"

  // MODIFIED: Set image source using the selectedWord (lowercase) and .jpg extension
  id("image").src = `./assets/${selectedWord.toLowerCase()}.jpg`;

  let randWord = selectedWord.split(""); // Split the word into characters for the game logic
  let copy = randWord.slice(0, randWord.length);  

  let hint = getRandHint(copy);
  // console.log(copy); // (Optional: keep or remove, `copy` is modified by getRandHint)


  for (let i = 0; i < randWord.length; i++) {
    if (hint.indexOf(randWord[i]) == -1) {
      let inp = document.createElement("input");
      inp.className = "blanks";
      inp.maxLength = "1"
      // MODIFIED: Store lowercase character in ID for consistent comparison
      inp.id = randWord[i].toLowerCase(); 
      qdiv.appendChild(inp);
    } else {
      let span = document.createElement("span");
      span.className = "hints";
      span.innerText = randWord[i];
      qdiv.appendChild(span);
    }
  }
  mainDiv.appendChild(qdiv);

  var leng = document.getElementsByTagName("input").length;
  clas("blanks")[0].focus();
  for (let i = 0; i < leng; i++) {
    clas("blanks")[i].oninput = function () {
      let ins = document.querySelectorAll(".blanks");
      if (ins[i].value.toLowerCase() === ins[i].id) { // This comparison now works as id is lowercase
        ins[i].style.border = "rgb(157, 255, 0) solid 7px";
        if(i<leng-1){
          clas("blanks")[i + 1].focus();
        }
      } else {
        ins[i].style.border = "7px solid red";
      }
    };
  }
  document.getElementsByTagName("input")[leng-1].onkeypress = function (e) {
    if (e.keyCode == 13) {
      checkAns();
    }
  };
  id("btn").onclick = function (e) {
    checkAns();
  };
}

function checkAns(e) {
  let ins = document.querySelectorAll(".blanks");
  let correct = true;
  for (let i = 0; i < ins.length; i++) {
    if (ins[i].value.toLowerCase() === ins[i].id) { // This comparison now works as id is lowercase
      ins[i].style.border = "rgb(157, 255, 0) solid 7px";
      correct = correct && true;
    } else {
      ins[i].style.border = "7px solid red";
      correct = false;
    }
  }
  if (correct) {
    playSound(correctAudio);
    updateScore(10); // Add 10 points for correct answer
    setTimeout(createGame, 500); // Short delay before next question
  } else {
    playSound(incorrectAudio);
  }
}

createGame();

  </script>
  <script>
    // Initialize score
    let score = 0;
    const scoreElement = document.getElementById('score');
    
    // Function to update score
    function updateScore(points) {
      score += points;
      scoreElement.textContent = score;
      
      // Add animation when score updates
      scoreElement.style.transform = 'scale(1.5)';
      setTimeout(() => {
        scoreElement.style.transform = 'scale(1)';
      }, 300);
    }
    
    // Function to reset score
    function resetScore() {
      score = 0;
      scoreElement.textContent = score;
    }
  </script>

<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top, #fdfbfb 0%, #e8f0ff 40%, #d0e1ff 100%);
        }

        .game-container {
            width: 100vw; /* span the full viewport width */
            max-width: 100%;
            margin: 0;
            padding: 24px 40px;
            background: radial-gradient(circle at top left, #ffffff 0%, #f5f9ff 45%, #eef3ff 100%);
            border-radius: 0;
            box-shadow: none;
            border: none;
            box-sizing: border-box;
            /* override older styles that were shrinking the container */
            transform: none;
            transform-origin: top center;
        }

        .header h1 {
            color: #0f172a;
            font-size: 1.8rem;
            margin: 0 0 8px;
            letter-spacing: 0.03em;
        }

        .game-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .game-stats {
            display: flex;
            gap: 16px;
            font-size: 0.95rem;
            color: #0f172a;
        }

        .score, .level {
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.04);
        }

        .language-selector select.language-dropdown {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.8);
            background: #ffffff;
            font-size: 0.9rem;
            color: #0f172a;
        }

        .sound-control .mute-btn {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.8);
            background: #ffffff;
            cursor: pointer;
        }

        .game-board {
            margin-top: 22px;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 28px;
            justify-items: center;
        }

        .game-item img {
            width: 100%;
            max-width: 260px;
            height: auto;
            border-radius: 14px;
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.18);
            background: #ffffff;
        }

        .feedback {
            margin-top: 20px;
        }

        .feedback .message {
            font-size: 1rem;
            color: #0f172a;
        }

        .button-group {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .quit-btn, .next-btn {
            padding: 8px 16px;
            border-radius: 999px;
            border: none;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
        }

        .quit-btn {
            background: #e11d48;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(190, 24, 93, 0.35);
        }

        .next-btn {
            background: #22c55e;
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(22, 163, 74, 0.35);
        }

        .quit-btn:hover, .next-btn:hover {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .game-container {
                max-width: 100%;
                margin: 10px;
                padding: 16px 10px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 1.3rem;
            }

            .game-item img {
                max-width: 160px;
            }
        }

        /* Extra-large screens: use 4 columns and larger items */
        @media (min-width: 1400px) {
            .game-board {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
            .game-item img {
                max-width: 280px;
            }
        }
    </style>
</head>

    let elems = [];
    for (let i = 0; i < this.length; i++) {
        elems.push(this[i]);
    }
    return elems;
}

Array.prototype.randomize = function () {
    let _arr = [].concat(this);
    _arr.forEach((item, index, __arr) => {
        let a = Math.floor(Math.random() * __arr.length);
        let tempA = __arr[a];
        _arr[index] = tempA;
        _arr[a] = item
    })
    return _arr;
}

    // Set language function
    function setLanguage(lang, skipSave = false) {
        const languageSelect = document.getElementById('languageSelect');

            lang = languageSelect.options[0]?.value || 'en';
        }
        
        // Update UI elements
        document.getElementById('gameTitle').textContent = translations[lang].title;
        document.getElementById('scoreLabel').textContent = translations[lang].score + ':';
        document.getElementById('levelLabel').textContent = translations[lang].level + ':';
        document.getElementById('message').textContent = translations[lang].message;
        document.getElementById('nextBtn').textContent = translations[lang].nextLevel;
        document.getElementById('quitBtn').textContent = translations[lang].quit;
        
        // Save language preference if not skipping
        if (!skipSave) {
            localStorage.setItem('gameLanguage', lang);
        }
        
        // Update dropdown
        languageSelect.value = lang;

    // Always default to Tigrinya on load
    function getCurrentLanguage() {

        const languageSelect = document.getElementById('languageSelect');
        languageSelect.value = currentLang;
        languageSelect.addEventListener('change', (e) => {
            setLanguage(e.target.value);
        });
        const muteBtn = document.getElementById('muteBtn');
        const setMuteIcon = () => { muteBtn.textContent = bgMusic.muted ? '🔇' : '🔊'; };
        setMuteIcon();
        muteBtn.addEventListener('click', () => {
            bgMusic.muted = !bgMusic.muted;
            setMuteIcon();
        });
        
        // Try to play background music (will be muted until user interacts)
        const playMusic = () => {
            bgMusic.volume = 0.3; // Set volume to 30%
            const playPromise = bgMusic.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // Auto-play was prevented, wait for user interaction
                    document.addEventListener('click', function startMusic() {
                        bgMusic.play().catch(e => console.log('Audio play failed:', e));
                        document.removeEventListener('click', startMusic);
                    });
                });
            }
        };
        
        // Start music after a short delay
    setTimeout(playMusic, 1000);

    // Restart the game

    // Category to language mapping

    // Update language selector based on current category
    function updateLanguageSelector(categoryName) {
        const languageSelect = document.getElementById('languageSelect');
        const currentLang = getCurrentLanguage();
        const availableLangs = categoryLanguages[categoryName] || ['en'];
        
        // Clear existing options
        languageSelect.innerHTML = '';
        
        // Add available languages
        availableLangs.forEach(lang => {
            const option = document.createElement('option');
            option.value = lang;
            option.textContent = languageNames[lang] || lang;
            languageSelect.appendChild(option);
        });
        
        // Set the selected language (use current if available, otherwise first available)
        const selectedLang = availableLangs.includes(currentLang) ? currentLang : availableLangs[0];
        setLanguage(selectedLang, true);
    }
    
    // Start a new game level
    async function startGame() {
        const gameBoard = document.getElementById('gameBoard');
        gameBoard.innerHTML = '';
        
        // Select a random category
        const category = categories[Math.floor(Math.random() * categories.length)];
        
        // Update available languages based on category
        updateLanguageSelector(category.name);
        
        // Select two different images from the category
        let commonIndex, differentIndex;
        do {
            commonIndex = Math.floor(Math.random() * category.files.length);
            differentIndex = Math.floor(Math.random() * category.files.length);
        } while (commonIndex === differentIndex);
        
        const commonImage = `assets/images/${category.path}${category.files[commonIndex]}`;
        const differentImage = `assets/images/${category.path}${category.files[differentIndex]}`;
        
        // Randomly select position for the different image (0-8)
        correctAnswerIndex = Math.floor(Math.random() * 9);
        
        // Create the game board
        for (let i = 0; i < 9; i++) {
            const item = document.createElement('div');
            item.className = 'game-item';
            
            const img = document.createElement('img');
            const isDifferent = i === correctAnswerIndex;
            img.src = isDifferent ? differentImage : commonImage;
            img.alt = isDifferent ? 'Different item' : 'Common item';
            img.loading = 'lazy';
            
            item.appendChild(img);
            item.addEventListener('click', function() {
                checkAnswer(i === correctAnswerIndex, this);
            });
            gameBoard.appendChild(item);
        }
        
        // Update level display
        document.getElementById('level').textContent = currentLevel;
    }
    
    // Check if the selected answer is correct
    function checkAnswer(isCorrect, clickedItem) {
        const message = document.getElementById('message');
        const nextBtn = document.getElementById('nextBtn');
        
        if (isCorrect) {
            // Play correct sound
            correctSound.currentTime = 0;
            correctSound.play().catch(e => console.log('Could not play correct sound:', e));
            
            // Update UI for correct answer
            score += 10;
            document.getElementById('score').textContent = score;
            const lang = getCurrentLanguage();
            message.textContent = translations[lang].correct;
            message.style.color = '#4CAF50';
            nextBtn.style.display = 'inline-block';
            
            // Highlight the correct answer in green
            clickedItem.classList.add('correct');
            
            // Disable all items
            const items = document.querySelectorAll('.game-item');
            items.forEach(item => {
                item.style.pointerEvents = 'none';
                if (item !== clickedItem) {
                    item.style.opacity = '0.6';
                }
            });
            
        } else {
            // Play wrong sound
            wrongSound.currentTime = 0;
            wrongSound.play().catch(e => console.log('Could not play wrong sound:', e));
            
            // Update UI for wrong answer
            const lang = getCurrentLanguage();
            message.textContent = translations[lang].tryAgain;
            message.style.color = '#f44336';
            
            // Highlight the wrong answer in red
            clickedItem.classList.add('wrong');
            
            // Allow another try after a short delay
            setTimeout(() => {
                clickedItem.classList.remove('wrong');
                const lang = getCurrentLanguage();
                message.textContent = translations[lang].message;
                message.style.color = '#4a5568';
            }, 1000);
        }
    }
    
    // Move to the next level
    function nextLevel() {
        currentLevel++;
        const nextBtn = document.getElementById('nextBtn');
        nextBtn.style.display = 'none';
        startGame();
    }

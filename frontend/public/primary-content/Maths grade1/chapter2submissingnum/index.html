<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pop Subtraction! | 1-9 ምጉዳል</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #f0f9ff;
            --ocean: #0ea5e9;
            --rose: #f43f5e;
            --amber: #f59e0b;
            --emerald: #10b981;
            --white: #ffffff;
            --ink: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--sky);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--ink); overflow-x: hidden; overflow-y: auto;
        }

        header {
            width: 100%; max-width: 1100px; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .score-card {
            background: var(--white); padding: 8px 20px; border-radius: 20px;
            border: 4px solid var(--ink); display: flex; align-items: center; gap: 8px;
            font-weight: 900; font-size: clamp(1.2rem, 4vw, 2rem); box-shadow: 0 6px 0 var(--ink);
        }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; padding: 10px 10px 120px 10px; z-index: 10; gap: 20px;
        }

        .instruction {
            font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 950; color: var(--rose);
            text-align: center; text-shadow: 2px 2px 0 white; margin-bottom: 10px;
        }

        /* Puzzle Area */
        .puzzle-card {
            background: var(--white); border-radius: 40px; border: 8px solid var(--ink);
            padding: 30px; width: 95%; max-width: 850px;
            box-shadow: 0 15px 0 var(--ink); display: flex; flex-direction: column; gap: 25px;
            position: relative; align-items: center;
        }

        .equation-box {
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 950; display: flex; align-items: center; gap: 15px;
            background: #f8fafc; padding: 10px 30px; border-radius: 25px; border: 4px solid #e2e8f0;
        }
        .minus-sign { color: var(--rose); }
        .equals-sign { color: var(--emerald); }

        .items-area {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
            min-height: 120px; width: 100%; padding: 20px; background: #fff;
            border-radius: 25px; border: 4px dashed #cbd5e1;
        }

        .game-item {
            font-size: clamp(3rem, 10vw, 5rem); position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: sprout 0.5s backwards;
        }
        @keyframes sprout { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .game-item.removed::after {
            content: "✖"; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: var(--rose); font-weight: 900;
            font-size: 1.2em; text-shadow: 0 0 10px white;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .game-item.removed { opacity: 0.4; filter: grayscale(1); transform: scale(0.9); }

        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0); } to { transform: translate(-50%, -50%) scale(1); } }

        /* Number Choices */
        .number-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            width: 100%; max-width: 800px; margin-top: 15px;
        }

        .num-btn {
            aspect-ratio: 1; background: var(--white); border: 6px solid var(--ink);
            border-radius: 25px; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 950;
            cursor: pointer; box-shadow: 0 10px 0 var(--ink); transition: 0.1s;
            display: flex; align-items: center; justify-content: center; color: var(--ink);
        }
        .num-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 var(--ink); }
        .num-btn:hover { background: var(--amber); color: white; border-color: var(--white); }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(255, 255, 255, 0.98); text-align: center; padding: 20px;
        }
        .overlay.error { background: var(--rose); color: white; }
        .big-icon { font-size: clamp(6rem, 15vw, 10rem); margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        .big-x { font-size: clamp(10rem, 30vw, 20rem); font-weight: 950; animation: shake 0.4s infinite; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }

        @media (max-width: 600px) {
            .number-grid { grid-template-columns: repeat(3, 1fr); }
            .equation-box { font-size: 2.5rem; padding: 10px 20px; }
            .puzzle-card { padding: 20px; border-radius: 30px; }
            .num-btn { border-radius: 18px; border-width: 4px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:6000;"></canvas>

    <header>
        <div class="score-card" id="scoreBadge">
            <span>🏆</span> <span id="valScore">0</span>
        </div>
        <select id="langSelect" style="padding: 10px; border-radius: 15px; font-weight: bold; border: 4px solid var(--ink); background: white;" onchange="setLanguage(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="instruction" id="txtInstruction">ክንደይ ተሪፉ?</div>

        <div class="puzzle-card" id="puzzleCard">
            <div class="equation-box">
                <span id="dispV1">7</span>
                <span class="minus-sign">−</span>
                <span id="dispV2">3</span>
                <span class="equals-sign">=</span>
                <span style="color: var(--rose);">?</span>
            </div>

            <div class="items-area" id="itemsArea">
                <!-- Injected icons -->
            </div>
        </div>

        <div class="number-grid" id="numberGrid">
            <!-- Buttons 1-9 generated here -->
        </div>
    </div>

    <!-- Success Feedback -->
    <div id="success-overlay" class="overlay">
        <div class="big-icon">🎈</div>
        <h2 id="txtWin" style="font-size: 3.5rem; font-weight: 950; color: var(--emerald);">ንፉዕ!</h2>
    </div>

    <div id="error-overlay" class="overlay error">
        <div class="big-x">✖</div>
        <h2 id="txtFail" style="font-size: 2.5rem; font-weight: 950;">እንደገና ፈትን!</h2>
    </div>

    <script>
        const i18n = {
            ti: { instruct: "ክንደይ ተሪፉ?", win: "ንፉዕ!", fail: "ጌጋ!" },
            am: { instruct: "ስንት ቀሩ?", win: "ድንቅ ስራ!", fail: "ስህተት!" },
            en: { instruct: "How many are left?", win: "Great!", fail: "Try Again!" },
            om: { instruct: "Meeqa hafe?", win: "Hojii Gaarii!", fail: "Dogoggora!" },
            so: { instruct: "Imisa baa haray?", win: "Shaqo Fiican!", fail: "Khalad!" }
        };

        const icons = ['🍎', '🚗', '🐥', '🍬', '⭐', '🎈', '🍪', '🐶', '🍕', '⚽'];
        let score = 0, lang = 'ti', busy = false;
        let v1 = 0, v2 = 0, ans = 0;
        let highScore = parseInt(localStorage.getItem('sub_g1_high')) || 0;
        
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(800, n);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if (type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.2, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.5);
                o.start(); o.stop(n + 0.5);
            } else if (type === 'err') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(160, n); o.frequency.exponentialRampToValueAtTime(60, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function setLanguage(l) { lang = l; updateUI(); }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('txtInstruction').innerText = t.instruct;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('txtFail').innerText = t.fail;
            document.getElementById('valScore').innerText = score;
        }

        function generateRound() {
            busy = false;
            
            // Randomly pick v1 (2-9) and v2 (1 to v1-1)
            v1 = Math.floor(Math.random() * 8) + 2;
            v2 = Math.floor(Math.random() * (v1 - 1)) + 1;
            ans = v1 - v2;

            document.getElementById('dispV1').innerText = v1;
            document.getElementById('dispV2').innerText = v2;

            const icon = icons[Math.floor(Math.random() * icons.length)];
            const area = document.getElementById('itemsArea');
            area.innerHTML = "";

            for(let i=0; i<v1; i++) {
                const el = document.createElement('div');
                el.className = "game-item";
                el.innerText = icon;
                el.style.animationDelay = (i * 0.05) + "s";
                if(i >= (v1 - v2)) {
                   // Mark as removed
                   setTimeout(() => el.classList.add('removed'), 600 + (i * 50));
                }
                area.appendChild(el);
            }
            updateUI();
        }

        function checkAnswer(choice) {
            if (busy) return;
            busy = true;
            sfx('tap');

            if (choice === ans) {
                sfx('win');
                score += 20;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('sub_g1_high', highScore);
                }
                burst(300);
                const overlay = document.getElementById('success-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    generateRound();
                }, 1500);
            } else {
                sfx('err');
                const overlay = document.getElementById('error-overlay');
                overlay.style.display = 'flex';
                const card = document.getElementById('puzzleCard');
                card.style.animation = 'shake 0.4s';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    card.style.animation = '';
                    busy = false;
                }, 1000);
            }
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#f43f5e', '#0ea5e9', '#f59e0b', '#10b981', '#ffffff'];
            const p = [];
            for(let i=0; i<count; i++) p.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*45, vy: (Math.random()-1.2)*75,
                s: Math.random()*15+10, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 3.0, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=p.length-1; i>=0; i--){
                    const pt=p[i]; if(pt.l>0){
                        al=true; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=1.3; pt.l-=0.01; pt.r+=pt.rv;
                        x.save(); x.translate(pt.x,pt.y); x.rotate(pt.r*Math.PI/180);
                        x.fillStyle=pt.c; x.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s); x.restore();
                    } else p.splice(i,1);
                }
                if(al) requestAnimationFrame(f);
            })();
        }

        window.onload = () => {
            const grid = document.getElementById('numberGrid');
            for(let i=0; i<=9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            }
            generateRound();
        };
    </script>
</body>
</html>

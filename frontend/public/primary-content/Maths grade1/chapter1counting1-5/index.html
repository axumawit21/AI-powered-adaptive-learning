<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Counting Fun! | 1-5 መቁፀሪ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #7dd3fc;
            --grass: #4ade80;
            --sun: #facc15;
            --pink: #f472b6;
            --white: #ffffff;
            --ink: #1e293b;
            --gold: #fbbf24;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--sky);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--ink); 
            overflow-x: hidden;
            overflow-y: auto; /* ALLOW SCROLLING */
        }

        /* Landscape Decor */
        .ground {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 20vh;
            background: var(--grass); border-top: 12px solid #22c55e; z-index: 1;
        }

        .sun {
            position: fixed; top: 20px; right: 20px; width: clamp(80px, 20vw, 150px);
            height: clamp(80px, 20vw, 150px); background: var(--sun); border-radius: 50%;
            box-shadow: 0 0 50px #fef08a; animation: pulse 3s infinite alternate;
            z-index: 0;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        header {
            width: 100%; max-width: 1000px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        /* Large Score Badge */
        .score-trophy {
            background: var(--white); padding: 10px 25px; border-radius: 30px;
            border: 6px solid var(--ink); display: flex; align-items: center; gap: 12px;
            font-weight: 900; font-size: clamp(1.5rem, 5vw, 2.5rem); box-shadow: 0 8px 0 var(--ink);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--ink);
        }
        .score-trophy.pop { transform: scale(1.3) rotate(5deg); background: var(--gold); color: white; }
        .score-icon { font-size: 1.2em; filter: drop-shadow(0 2px 0 rgba(0,0,0,0.1)); }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; padding: 10px 10px 80px 10px; z-index: 10; gap: 40px;
        }

        /* Game Board - BIGGER */
        .game-board {
            background: var(--white); border-radius: 50px; border: 10px solid var(--ink);
            padding: clamp(30px, 6vw, 60px); width: 95%; max-width: 850px;
            box-shadow: 0 20px 0 var(--ink); text-align: center;
            display: flex; flex-direction: column; gap: 30px; position: relative;
        }

        .instruction {
            font-size: clamp(2rem, 7vw, 3.5rem); font-weight: 900; color: var(--pink);
            line-height: 1.1; text-shadow: 3px 3px 0 rgba(0,0,0,0.05);
        }

        .items-grid {
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            gap: 25px; min-height: 180px; padding: 30px;
            background: #f8fafc; border-radius: 35px; border: 6px dashed #cbd5e1;
        }

        .game-item {
            font-size: clamp(5rem, 15vw, 8rem);
            animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            filter: drop-shadow(0 5px 0 rgba(0,0,0,0.1));
        }
        @keyframes pop { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }

        /* Buddy Reaction Character */
        .buddy {
            position: absolute; bottom: -60px; right: -40px; font-size: clamp(5rem, 12vw, 8rem);
            z-index: 20; transition: transform 0.3s;
            filter: drop-shadow(0 5px 0 rgba(0,0,0,0.2));
        }
        .buddy.happy { animation: jump 0.5s ease infinite alternate; }
        .buddy.sad { animation: shake 0.4s; }
        @keyframes jump { from { transform: translateY(0); } to { transform: translateY(-30px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }

        /* Sequence Train - BIGGER */
        .train-container {
            display: flex; gap: 15px; justify-content: center; align-items: center;
        }
        .train-car {
            width: clamp(70px, 15vw, 110px); height: clamp(70px, 15vw, 110px);
            background: #3b82f6; border: 6px solid var(--ink); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 950; color: white;
            box-shadow: 0 8px 0 var(--ink);
        }
        .train-car.empty { background: white; color: var(--pink); border-style: dashed; border-width: 4px; }

        /* Number Choices - GIANT BUTTONS */
        .number-grid {
            display: flex; flex-wrap: wrap; gap: clamp(15px, 4vw, 30px); justify-content: center; width: 100%;
        }

        .num-btn {
            width: clamp(80px, 18vw, 140px); height: clamp(80px, 18vw, 140px);
            background: var(--white); border: 8px solid var(--ink); border-radius: 35px;
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 950; cursor: pointer;
            box-shadow: 0 12px 0 var(--ink); transition: 0.1s;
            display: flex; align-items: center; justify-content: center; color: var(--ink);
        }
        .num-btn:active { transform: translateY(8px); box-shadow: 0 4px 0 var(--ink); }
        .num-btn:hover { background: var(--sun); border-color: var(--ink); }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(255, 255, 255, 0.98); text-align: center;
        }
        .overlay.error-overlay { background: var(--danger); color: white; }
        .big-icon { font-size: 10rem; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }

        .big-x {
            font-size: clamp(12rem, 30vw, 22rem);
            font-weight: 900;
            animation: impactShake 0.4s infinite;
            text-shadow: 10px 10px 0 rgba(0,0,0,0.2);
        }
        @keyframes impactShake {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1) rotate(5deg); }
            75% { transform: scale(1.1) rotate(-5deg); }
        }

        @media (max-width: 600px) {
            .game-board { border-radius: 30px; padding: 25px; width: 98%; }
            .items-grid { min-height: 140px; padding: 15px; }
            .buddy { bottom: -40px; right: -10px; font-size: 4rem; }
            .num-btn { border-radius: 20px; border-width: 6px; }
        }
    </style>
</head>
<body>
    <div class="sun"></div>
    <div class="ground"></div>
    <canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:6000;"></canvas>

    <header>
        <div class="score-trophy" id="scoreBadge">
            <span class="score-icon">🏆</span>
            <span id="valScore">0</span>
        </div>
        <select id="langSelect" style="padding: 12px 20px; border-radius: 20px; font-weight: bold; border: 4px solid var(--ink); font-size: 1rem; box-shadow: 0 4px 0 var(--ink);" onchange="setLanguage(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-board" id="gameBoard">
            <div class="buddy" id="buddyChar">🌟</div>
            <div class="instruction" id="txtInstruction">ክንደይ እዮም?</div>
            
            <!-- Mode 1: Counting Icons -->
            <div class="items-grid" id="itemsArea">
                <!-- Injected icons -->
            </div>

            <!-- Mode 2: Sequence -->
            <div class="train-container" id="trainArea" style="display: none;">
                <!-- Injected train cars -->
            </div>
        </div>

        <div class="number-grid" id="numberGrid">
            <!-- Buttons 1 to 5 -->
        </div>
    </div>

    <!-- Success Feedback Overlay -->
    <div id="success-overlay" class="overlay">
        <div class="big-icon">🌈</div>
        <h2 id="txtWin" style="font-size: clamp(3rem, 10vw, 5rem); color: #10b981; font-weight: 950;">ንፉዕ!</h2>
    </div>

    <!-- Error Feedback Overlay -->
    <div id="error-overlay" class="overlay error-overlay">
        <div class="big-x">✖</div>
        <h2 style="font-size: 3rem; font-weight: 950;">ጌጋ!</h2>
    </div>

    <script>
        const i18n = {
            ti: { count: "ክንደይ እዮም?", order: "እቲ ዝጐደለ ቁፅሪ ኣየናይ እዩ?", win: "ንፉዕ!" },
            am: { count: "ስንት ናቸው?", order: "የጎደለው ቁጥር የትኛው ነው?", win: "ድንቅ ስራ!" },
            en: { count: "How many?", order: "Which number is missing?", win: "Great!" },
            om: { count: "Meeqa?", order: "Lakkoofsi hir'ate isa kami?", win: "Baay'ee Gaarii!" },
            so: { count: "Imisa waaye?", order: "Waa maxay lambarka ka maqan?", win: "Shaqo Fiican!" }
        };

        const itemPool = ['🍎', '🐝', '🚗', '🌳', '🐱', '🐥', '🍬', '⚽', '🍦', '🐵'];
        let score = 0, lang = 'ti', currentAns = 0, busy = false, mode = 'count', muted = false;
        let highScore = parseInt(localStorage.getItem('counting_g1_high')) || 0;
        
        // Web Audio Context for SFX
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            
            if (type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(800, n);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if (type === 'win') {
                o.type = 'triangle';
                [440, 554, 659, 880].forEach((f, i) => {
                    o.frequency.setValueAtTime(f, n + i * 0.1);
                });
                g.gain.setValueAtTime(0.2, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.5);
                o.start(); o.stop(n + 0.5);
            } else if (type === 'err') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n);
                o.frequency.exponentialRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function setLanguage(l) {
            lang = l;
            updateUI();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('txtInstruction').innerText = (mode === 'count') ? t.count : t.order;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('valScore').innerText = score;
        }

        function generateRound() {
            busy = false;
            // Reset buddy
            const buddy = document.getElementById('buddyChar');
            buddy.innerText = "🌟";
            buddy.className = "buddy";
            
            mode = Math.random() > 0.5 ? 'count' : 'order';
            const itemsArea = document.getElementById('itemsArea');
            const trainArea = document.getElementById('trainArea');
            
            if (mode === 'count') {
                itemsArea.style.display = 'flex';
                trainArea.style.display = 'none';
                itemsArea.innerHTML = '';
                currentAns = Math.floor(Math.random() * 5) + 1;
                const icon = itemPool[Math.floor(Math.random() * itemPool.length)];
                for (let i = 0; i < currentAns; i++) {
                    const el = document.createElement('div');
                    el.className = 'game-item';
                    el.style.animationDelay = (i * 0.08) + 's';
                    el.innerText = icon;
                    itemsArea.appendChild(el);
                }
            } else {
                itemsArea.style.display = 'none';
                trainArea.style.display = 'flex';
                trainArea.innerHTML = '';
                currentAns = Math.floor(Math.random() * 5) + 1;
                for (let i = 1; i <= 5; i++) {
                    const car = document.createElement('div');
                    if (i === currentAns) {
                        car.className = 'train-car empty';
                        car.innerText = '?';
                    } else {
                        car.className = 'train-car';
                        car.innerText = i;
                    }
                    trainArea.appendChild(car);
                }
            }
            updateUI();
        }

        function checkAnswer(val) {
            if (busy) return;
            const buddy = document.getElementById('buddyChar');
            
            if (val === currentAns) {
                busy = true;
                sfx('win');
                buddy.innerText = "🤩";
                buddy.classList.add('happy');
                
                score += 10;
                const badge = document.getElementById('scoreBadge');
                badge.classList.add('pop');
                setTimeout(() => badge.classList.remove('pop'), 500);

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('counting_g1_high', highScore);
                }
                handleWin();
            } else {
                busy = true;
                sfx('err');
                buddy.innerText = "🤔";
                buddy.classList.add('sad');
                
                const errOverlay = document.getElementById('error-overlay');
                errOverlay.style.display = 'flex';

                const board = document.getElementById('gameBoard');
                board.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-15px)' },
                    { transform: 'translateX(15px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });

                setTimeout(() => {
                    errOverlay.style.display = 'none';
                    buddy.classList.remove('sad');
                    busy = false;
                }, 700);
            }
        }

        function handleWin() {
            burst(300);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                generateRound();
            }, 1200);
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const p = [];
            const colors = ['#f472b6', '#3b82f6', '#facc15', '#ffffff', '#10b981'];
            for(let i=0; i<count; i++) p.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*50, vy: (Math.random()-1.2)*80,
                s: Math.random()*15+10, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 3.0, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=p.length-1; i>=0; i--){
                    const pt=p[i]; if(pt.l>0){
                        al=true; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=1.2; pt.l-=0.01; pt.r+=pt.rv;
                        x.save(); x.translate(pt.x,pt.y); x.rotate(pt.r*Math.PI/180);
                        x.fillStyle=pt.c; x.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s); x.restore();
                    } else p.splice(i,1);
                }
                if(al) requestAnimationFrame(f);
            })();
        }

        window.onload = () => {
            const grid = document.getElementById('numberGrid');
            for (let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => { sfx('tap'); checkAnswer(i); };
                grid.appendChild(btn);
            }
            generateRound();
        };
    </script>
</body>
</html>

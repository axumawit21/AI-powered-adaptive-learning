<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mystery Math | ዝጎደለ ቁፅሪ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f59e0b;
            --white: #ffffff;
            --ink: #1e293b;
            --success: #10b981;
            --error: #ef4444;
            --sky: #f0f9ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--sky);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--ink); overflow-x: hidden; overflow-y: auto;
        }

        header {
            width: 100%; max-width: 1100px; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .score-pill {
            background: var(--white); padding: 8px 20px; border-radius: 20px;
            border: 4px solid var(--ink); display: flex; align-items: center; gap: 8px;
            font-weight: 900; font-size: clamp(1.2rem, 4vw, 2rem); box-shadow: 0 6px 0 var(--ink);
        }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 10px 10px 120px 10px; z-index: 10; gap: 20px;
        }

        .instruction {
            font-size: clamp(1.8rem, 6vw, 3rem); font-weight: 950; color: var(--primary);
            text-align: center; text-shadow: 2px 2px 0 white;
        }

        /* Puzzle Area */
        .puzzle-board {
            background: var(--white); border-radius: 40px; border: 8px solid var(--ink);
            padding: 30px; width: 95%; max-width: 850px;
            box-shadow: 0 15px 0 var(--ink); display: flex; flex-direction: column; gap: 25px;
            position: relative;
        }

        .equation-row {
            display: flex; align-items: center; justify-content: center; gap: clamp(10px, 3vw, 25px);
            font-size: clamp(3rem, 10vw, 6rem); font-weight: 950;
        }

        .mystery-box {
            width: clamp(80px, 15vw, 130px); height: clamp(80px, 15vw, 130px);
            background: #f1f5f9; border: 6px dashed var(--primary); border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); font-size: clamp(3rem, 8vw, 5.5rem);
            transition: transform 0.2s;
        }
        .mystery-box.filled { border-style: solid; background: var(--white); transform: scale(1.1); }

        .symbol { color: var(--secondary); font-size: 1.2em; }

        .items-block {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
            min-height: 80px; width: 100%; padding: 15px; background: #f8fafc;
            border-radius: 20px; border: 3px solid #e2e8f0;
        }

        .game-item {
            font-size: clamp(2.5rem, 6vw, 3.5rem);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        /* Number Pad */
        .number-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            width: 100%; max-width: 700px; margin-top: 20px;
        }
        .num-btn {
            aspect-ratio: 1; background: var(--white); border: 6px solid var(--ink);
            border-radius: 20px; font-size: clamp(1.8rem, 5vw, 3rem); font-weight: 950;
            cursor: pointer; box-shadow: 0 8px 0 var(--ink); transition: 0.1s;
            display: flex; align-items: center; justify-content: center; color: var(--ink);
        }
        .num-btn:active { transform: translateY(6px); box-shadow: 0 2px 0 var(--ink); }
        .num-btn:hover { background: var(--accent); color: white; border-color: var(--white); }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(255, 255, 255, 0.98); text-align: center;
        }
        .overlay.error { background: var(--error); color: white; }
        .big-icon { font-size: 8rem; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        @media (max-width: 600px) {
            .number-grid { grid-template-columns: repeat(3, 1fr); }
            .equation-row { gap: 10px; }
            .mystery-box { border-width: 4px; }
            .puzzle-board { padding: 20px; border-width: 6px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:6000;"></canvas>

    <header>
        <div class="score-pill" id="scoreBadge">
            <span>🏆</span> <span id="valScore">0</span>
        </div>
        <select id="langSelect" style="padding: 10px; border-radius: 15px; font-weight: bold; border: 3px solid var(--ink);" onchange="setLanguage(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="instruction" id="txtInstruction">ዝጎደለ ቁፅሪ ኣየናይ እዩ?</div>

        <div class="puzzle-board" id="puzzleBoard">
            <div class="equation-row">
                <div class="mystery-box" id="mysteryBox">?</div>
                <div class="symbol">+</div>
                <div id="knownValDisplay">3</div>
                <div class="symbol">=</div>
                <div id="totalValDisplay">7</div>
            </div>

            <div style="display: flex; gap: 15px; justify-content: space-around; width: 100%;">
                <div style="flex: 1; text-align: center;">
                    <div style="font-size: 0.8rem; font-weight: 800; color: #64748b; margin-bottom: 5px;" id="lblKnown">ፍሉጥ</div>
                    <div class="items-block" id="itemsKnown"></div>
                </div>
                <div style="flex: 1; text-align: center;">
                    <div style="font-size: 0.8rem; font-weight: 800; color: #64748b; margin-bottom: 5px;" id="lblTotal">ድምር</div>
                    <div class="items-block" id="itemsTotal"></div>
                </div>
            </div>
        </div>

        <div class="number-grid" id="numberGrid">
            <!-- Buttons 1-9 generated here -->
        </div>
    </div>

    <!-- Feedback -->
    <div id="success-overlay" class="overlay">
        <div class="big-icon">🎁</div>
        <h2 id="txtWin" style="font-size: 3.5rem; font-weight: 950; color: #10b981;">ንፉዕ!</h2>
    </div>

    <div id="error-overlay" class="overlay error">
        <div style="font-size: 15rem; font-weight: 950; animation: shake 0.4s infinite;">✖</div>
        <h2 id="txtFail" style="font-size: 2.5rem; font-weight: 950;">እንደገና ፈትን!</h2>
    </div>

    <script>
        const i18n = {
            ti: { instruct: "ዝጎደለ ቁፅሪ ኣየናይ እዩ?", win: "ንፉዕ!", fail: "ጌጋ!", known: "ፍሉጥ", total: "ድምር" },
            am: { instruct: "የጎደለው ቁጥር የትኛው ነው?", win: "ድንቅ ስራ!", fail: "ስህተት!", known: "የታወቀ", total: "ድምር" },
            en: { instruct: "What is the missing number?", win: "Great!", fail: "Try Again!", known: "Known", total: "Total" },
            om: { instruct: "Lakkoofsi hir'ate isa kami?", win: "Hojii Gaarii!", fail: "Dogoggora!", known: "Bekamaa", total: "Ida'ama" },
            so: { instruct: "Waa maxay lambarka ka maqan?", win: "Shaqo Fiican!", fail: "Khalad!", known: "La yaqaan", total: "Isugeyn" }
        };

        const icons = ['🎁', '⭐', '🎈', '🍪', '🍎', '🐱', '🦋', '🍬'];
        let score = 0, lang = 'ti', busy = false;
        let valAns = 0, valKnown = 0, valTotal = 0;
        let highScore = parseInt(localStorage.getItem('missing_g1_high')) || 0;
        
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(900, n);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if (type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.2, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.5);
                o.start(); o.stop(n + 0.5);
            } else if (type === 'err') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(120, n); o.frequency.exponentialRampToValueAtTime(40, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function setLanguage(l) { lang = l; updateUI(); }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('txtInstruction').innerText = t.instruct;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('txtFail').innerText = t.fail;
            document.getElementById('lblKnown').innerText = t.known;
            document.getElementById('lblTotal').innerText = t.total;
            document.getElementById('valScore').innerText = score;
        }

        function generateRound() {
            busy = false;
            const box = document.getElementById('mysteryBox');
            box.innerText = "?";
            box.classList.remove('filled');

            valAns = Math.floor(Math.random() * 8) + 1;
            valKnown = Math.floor(Math.random() * (9 - valAns)) + 1;
            valTotal = valAns + valKnown;

            document.getElementById('knownValDisplay').innerText = valKnown;
            document.getElementById('totalValDisplay').innerText = valTotal;

            const icon = icons[Math.floor(Math.random() * icons.length)];
            const render = (id, count) => {
                const el = document.getElementById(id);
                el.innerHTML = "";
                for(let i=0; i<count; i++) {
                    const item = document.createElement('div');
                    item.className = "game-item";
                    item.innerText = icon;
                    item.style.animationDelay = (i * 0.05) + "s";
                    el.appendChild(item);
                }
            };

            render('itemsKnown', valKnown);
            render('itemsTotal', valTotal);
            updateUI();
        }

        function checkAnswer(choice) {
            if (busy) return;
            busy = true;
            sfx('tap');

            const box = document.getElementById('mysteryBox');
            box.innerText = choice;
            box.classList.add('filled');

            if (choice === valAns) {
                sfx('win');
                score += 30;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('missing_g1_high', highScore);
                }
                burst(300);
                const overlay = document.getElementById('success-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    generateRound();
                }, 1500);
            } else {
                sfx('err');
                const overlay = document.getElementById('error-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    busy = false;
                    box.innerText = "?";
                    box.classList.remove('filled');
                }, 1000);
            }
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#6366f1', '#a855f7', '#f59e0b', '#10b981', '#ffffff'];
            const p = [];
            for(let i=0; i<count; i++) p.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*50, vy: (Math.random()-1.2)*80,
                s: Math.random()*15+10, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 3.0, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=p.length-1; i>=0; i--){
                    const pt=p[i]; if(pt.l>0){
                        al=true; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=1.2; pt.l-=0.01; pt.r+=pt.rv;
                        x.save(); x.translate(pt.x,pt.y); x.rotate(pt.r*Math.PI/180);
                        x.fillStyle=pt.c; x.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s); x.restore();
                    } else p.splice(i,1);
                }
                if(al) requestAnimationFrame(f);
            })();
        }

        window.onload = () => {
            const grid = document.getElementById('numberGrid');
            for(let i=1; i<=9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            }
            generateRound();
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compare Quest! | 1-9 ምውድዳር</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky: #38bdf8;
            --grass: #22c55e;
            --sun: #facc15;
            --pink: #f472b6;
            --white: #ffffff;
            --ink: #1e293b;
            --gold: #fbbf24;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--sky);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--ink); overflow-x: hidden; overflow-y: auto;
        }

        .ground {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 18vh;
            background: var(--grass); border-top: 10px solid #16a34a; z-index: 1;
        }

        .sun {
            position: fixed; top: 20px; right: 20px; width: 100px;
            height: 100px; background: var(--sun); border-radius: 50%;
            box-shadow: 0 0 40px #fde047; animation: pulse 4s infinite alternate; z-index: 0;
        }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }

        header {
            width: 100%; max-width: 1100px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .score-trophy {
            background: var(--white); padding: 10px 25px; border-radius: 30px;
            border: 6px solid var(--ink); display: flex; align-items: center; gap: 12px;
            font-weight: 900; font-size: clamp(1.5rem, 5vw, 2.5rem); box-shadow: 0 8px 0 var(--ink);
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .score-trophy.pop { transform: scale(1.2) rotate(5deg); background: var(--gold); }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; padding: 10px 10px 120px 10px; z-index: 10; gap: 30px;
        }

        .instruction {
            font-size: clamp(2rem, 8vw, 3.5rem); font-weight: 950; color: white;
            text-align: center; text-shadow: 4px 4px 0 var(--ink);
        }

        /* Battle Area: Side by Side */
        .battle-area {
            display: flex; width: 100%; gap: 20px; justify-content: center; align-items: center;
            flex-wrap: wrap;
        }

        .island {
            background: var(--white); border-radius: 40px; border: 8px solid var(--ink);
            padding: 20px; min-width: clamp(280px, 45vw, 450px); min-height: 280px;
            box-shadow: 0 15px 0 var(--ink); position: relative;
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 12px;
        }

        .buddy {
            position: absolute; bottom: -50px; left: 50%; transform: translateX(-50%);
            font-size: clamp(4rem, 10vw, 6rem); z-index: 20; transition: transform 0.3s;
            filter: drop-shadow(0 5px 0 rgba(0,0,0,0.1));
            min-height: 1.2em;
        }

        .game-item {
            font-size: clamp(3.5rem, 10vw, 5rem);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
        }
        @keyframes popIn { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }

        .vs-circle {
            width: 100px; height: 100px; background: var(--ink); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 950; font-size: 2.5rem; border: 6px solid var(--white);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        /* Symbol Buttons */
        .symbol-grid {
            display: flex; gap: 20px; width: 100%; max-width: 800px; justify-content: center;
            margin-top: 40px;
        }

        .sym-btn {
            flex: 1; height: clamp(100px, 15vh, 140px); background: var(--white);
            border: 8px solid var(--ink); border-radius: 35px;
            font-size: clamp(4rem, 10vw, 7rem); font-weight: 950; cursor: pointer;
            box-shadow: 0 12px 0 var(--ink); transition: 0.1s;
            display: flex; align-items: center; justify-content: center; color: var(--ink);
        }
        .sym-btn:active { transform: translateY(8px); box-shadow: 0 4px 0 var(--ink); }
        .sym-btn:hover { background: var(--sun); }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(255, 255, 255, 0.98); text-align: center;
        }
        .overlay.error { background: var(--danger); color: white; }
        .big-icon { font-size: 10rem; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        .big-x {
            font-size: clamp(12rem, 40vw, 25rem); font-weight: 950;
            animation: shake 0.4s infinite; text-shadow: 10px 10px 0 rgba(0,0,0,0.2);
        }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }

        @media (max-width: 600px) {
            .island { min-width: 95%; min-height: 200px; padding: 15px; }
            .vs-circle { width: 70px; height: 70px; font-size: 1.5rem; }
            .buddy { bottom: -30px; font-size: 4rem; }
            .sym-btn { border-radius: 25px; border-width: 6px; height: 100px; }
        }
    </style>
</head>
<body>
    <div class="sun"></div>
    <div class="ground"></div>
    <canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:6000;"></canvas>

    <header>
        <div class="score-trophy" id="scoreBadge">
            <span style="font-size: 1.2em;">🏆</span>
            <span id="valScore">0</span>
        </div>
        <select id="langSelect" style="padding: 10px 15px; border-radius: 20px; font-weight: bold; border: 4px solid var(--ink); font-size: 1rem;" onchange="setLanguage(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="instruction" id="txtInstruction">ምረፅ!</div>

        <div class="battle-area">
            <div class="island" id="leftIsland">
                <!-- items -->
            </div>
            <div class="vs-circle" id="vsIndicator">?</div>
            <div class="island" id="rightIsland">
                <!-- items -->
            </div>
        </div>

        <div class="symbol-grid">
            <button class="sym-btn" onclick="checkAnswer('<')">&lt;</button>
            <button class="sym-btn" onclick="checkAnswer('=')">=</button>
            <button class="sym-btn" onclick="checkAnswer('>')">&gt;</button>
        </div>

        <div class="buddy" id="buddy"></div>
    </div>

    <!-- Success Overlay -->
    <div id="success-overlay" class="overlay">
        <div class="big-icon">🌈</div>
        <h2 id="txtWin" style="font-size: 4rem; font-weight: 950; color: #10b981;">ንፉዕ!</h2>
    </div>

    <!-- Error Overlay -->
    <div id="error-overlay" class="overlay error">
        <div class="big-x">✖</div>
        <h2 id="txtFail" style="font-size: 3rem; font-weight: 950;">ጌጋ!</h2>
    </div>

    <script>
        const i18n = {
            ti: { instruct: "ኣየናይ ይበልፅ?", win: "ንፉዕ!", fail: "ጌጋ!" },
            am: { instruct: "የትኛው ይበልጣል?", win: "ድንቅ ስራ!", fail: "ስህተት!" },
            en: { instruct: "Which is more?", win: "Great!", fail: "Oops!" },
            om: { instruct: "Kamtu caala?", win: "Hojii Gaarii!", fail: "Dogoggora!" },
            so: { instruct: "Kee baa badan?", win: "Shaqo Fiican!", fail: "Khalad!" }
        };

        const itemPool = ['🍎', '🎈', '🧸', '🚗', '🍓', '🍰', '🐶', '🍕', '🐱', '⚽'];
        let score = 0, lang = 'ti', valL = 0, valR = 0, busy = false;
        let highScore = parseInt(localStorage.getItem('compare_g1_high')) || 0;
        
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            
            if (type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(800, n);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if (type === 'win') {
                o.type = 'triangle';
                [440, 554, 659, 880].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.2, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.5);
                o.start(); o.stop(n + 0.5);
            } else if (type === 'err') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n);
                o.frequency.exponentialRampToValueAtTime(40, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.01, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function setLanguage(l) {
            lang = l;
            updateUI();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('txtInstruction').innerText = t.instruct;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('txtFail').innerText = t.fail;
            document.getElementById('valScore').innerText = score;
        }

        function generateRound() {
            busy = false;
            document.getElementById('vsIndicator').innerText = "?";
            document.getElementById('buddy').innerText = "";
            document.getElementById('buddy').style.transform = "translateX(-50%)";

            valL = Math.floor(Math.random() * 9) + 1;
            valR = Math.floor(Math.random() * 9) + 1;
            
            // Occasionally force equality
            if (Math.random() > 0.8) valR = valL;

            const icon = itemPool[Math.floor(Math.random() * itemPool.length)];
            
            const render = (container, count) => {
                container.innerHTML = "";
                for(let i=0; i<count; i++) {
                    const el = document.createElement('div');
                    el.className = "game-item";
                    el.innerText = icon;
                    el.style.animationDelay = (i * 0.05) + "s";
                    container.appendChild(el);
                }
            };

            render(document.getElementById('leftIsland'), valL);
            render(document.getElementById('rightIsland'), valR);
            updateUI();
        }

        function checkAnswer(choice) {
            if (busy) return;
            busy = true;
            sfx('tap');

            let correct;
            if (valL < valR) correct = '<';
            else if (valL > valR) correct = '>';
            else correct = '=';

            const indicator = document.getElementById('vsIndicator');
            const buddy = document.getElementById('buddy');

            if (choice === correct) {
                sfx('win');
                indicator.innerText = correct;
                buddy.innerText = "🤩";
                buddy.style.transform = "translateX(-50%) scale(1.4) translateY(-30px)";
                
                score += 20;
                const badge = document.getElementById('scoreBadge');
                badge.classList.add('pop');
                setTimeout(() => badge.classList.remove('pop'), 500);

                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('compare_g1_high', highScore);
                }
                handleWin();
            } else {
                sfx('err');
                buddy.innerText = "😵";
                const overlay = document.getElementById('error-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    busy = false;
                    buddy.innerText = "";
                    buddy.style.transform = "translateX(-50%)";
                }, 800);
            }
        }

        function handleWin() {
            burst(300);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                generateRound();
            }, 1200);
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const p = [];
            const colors = ['#f472b6', '#3b82f6', '#facc15', '#ffffff', '#10b981'];
            for(let i=0; i<count; i++) p.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*50, vy: (Math.random()-1.2)*80,
                s: Math.random()*15+10, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 3.0, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=p.length-1; i>=0; i--){
                    const pt=p[i]; if(pt.l>0){
                        al=true; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=1.2; pt.l-=0.01; pt.r+=pt.rv;
                        x.save(); x.translate(pt.x,pt.y); x.rotate(pt.r*Math.PI/180);
                        x.fillStyle=pt.c; x.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s); x.restore();
                    } else p.splice(i,1);
                }
                if(al) requestAnimationFrame(f);
            })();
        }

        window.onload = generateRound;
    </script>
</body>
</html>

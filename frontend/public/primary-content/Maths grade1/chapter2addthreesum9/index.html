<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Hive | ሰለስተ ተደመርቲ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f172a;
            --neon-gold: #fbce03;
            --neon-glow: rgba(251, 206, 3, 0.3);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.15);
            --white: #ffffff;
            --success: #10b981;
            --danger: #f43f5e;
            --ink: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 50%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--ink); overflow-x: hidden;
        }

        header {
            width: 100%; max-width: 1100px; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .score-pill {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
            padding: 10px 22px; border-radius: 20px; border: 2px solid var(--glass-border);
            display: flex; align-items: center; gap: 10px;
            font-weight: 900; font-size: clamp(1rem, 4vw, 1.8rem);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .score-pill span:last-child { color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-glow); }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; padding: 10px 15px 120px 15px; z-index: 10; gap: 20px;
        }

        .instruction {
            font-size: clamp(1.4rem, 6vw, 2.5rem); font-weight: 900; 
            color: var(--white); text-align: center; margin-bottom: 5px;
            letter-spacing: 1px;
        }

        /* Puzzle Board */
        .puzzle-board {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
            border-radius: 40px; border: 2px solid var(--glass-border);
            padding: clamp(20px, 4vw, 40px); width: 100%; max-width: 950px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex; flex-direction: column; gap: 30px;
        }

        .equation-layout {
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            gap: 15px;
        }

        /* Group box and symbol so they wrap together neatly */
        .term-group {
            display: flex; align-items: center; gap: 10px;
        }

        .honey-box {
            background: var(--glass); border: 2px solid var(--glass-border); border-radius: 25px;
            padding: 15px; min-width: clamp(100px, 25vw, 180px); min-height: clamp(120px, 15vh, 160px);
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center;
            gap: 6px; position: relative; transition: 0.3s;
        }
        .honey-box:hover { border-color: var(--neon-gold); background: rgba(251, 206, 3, 0.05); }

        .box-label {
            position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
            background: var(--neon-gold); color: #000; border-radius: 12px;
            padding: 2px 14px; font-weight: 900; font-size: 1.4rem;
            box-shadow: 0 4px 15px var(--neon-glow); z-index: 10;
        }

        .op-symbol { 
            font-size: clamp(2rem, 8vw, 4rem); font-weight: 950; 
            color: var(--white); opacity: 0.8;
        }

        .game-item {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
            filter: drop-shadow(0 0 8px rgba(0,0,0,0.5));
        }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        .ans-preview {
            width: clamp(100px, 20vw, 140px); height: clamp(100px, 20vw, 140px);
            background: rgba(255,255,255,0.05); border: 4px dashed var(--neon-gold);
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            font-size: clamp(3rem, 10vw, 5rem); font-weight: 900; color: var(--neon-gold);
            text-shadow: 0 0 20px var(--neon-glow);
        }
        .ans-preview.filled { border-style: solid; background: var(--neon-gold); color: #000; text-shadow: none; }

        /* Number Pad */
        .number-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
            width: 100%; max-width: 600px;
        }

        .num-btn {
            aspect-ratio: 1; background: rgba(255,255,255,0.1); border: 2px solid var(--glass-border);
            border-radius: 25px; font-size: clamp(2rem, 6vw, 3rem); font-weight: 900;
            cursor: pointer; transition: 0.2s; color: var(--white);
            display: flex; align-items: center; justify-content: center;
        }
        .num-btn:active { transform: scale(0.9); background: var(--neon-gold); color: #000; }
        .num-btn:hover { border-color: var(--neon-gold); box-shadow: 0 0 20px var(--neon-glow); }

        /* Overlay */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(15, 23, 42, 0.95); text-align: center; padding: 20px;
        }
        .overlay.error { background: rgba(244, 63, 94, 0.95); }
        .big-icon { font-size: 8rem; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }

        @media (max-width: 600px) {
            .number-grid { grid-template-columns: repeat(3, 1fr); }
            .honey-box { min-width: 85px; min-height: 110px; padding: 10px; gap: 4px; }
            .game-item { font-size: 1.5rem; }
            .box-label { font-size: 1.1rem; top: -14px; padding: 1px 10px; }
            .puzzle-board { padding: 20px 10px; }
            .ans-preview { width: 90px; height: 90px; }
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>
    <canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:6000;"></canvas>

    <header>
        <div class="score-pill">
            <span>🏆</span> <span id="valScore">0</span>
        </div>
        <select id="langSelect" style="padding: 8px; border-radius: 12px; font-weight: bold; border: none; background: rgba(25, 199, 83, 0.1); color: rgb(233, 230, 86);" onchange="setLanguage(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="instruction" id="txtInstruction">ብድምር ክንደይ እዮም?</div>

        <div class="puzzle-board" id="board">
            <div class="equation-layout">
                <div class="term-group">
                    <div class="honey-box" id="box1">
                        <div class="box-label" id="lbl1">?</div>
                    </div>
                    <div class="op-symbol">+</div>
                </div>
                
                <div class="term-group">
                    <div class="honey-box" id="box2">
                        <div class="box-label" id="lbl2">?</div>
                    </div>
                    <div class="op-symbol">+</div>
                </div>

                <div class="term-group">
                    <div class="honey-box" id="box3">
                        <div class="box-label" id="lbl3">?</div>
                    </div>
                </div>
            </div>

            <div class="equation-layout">
                <div class="op-symbol">=</div>
                <div class="ans-preview" id="ansBox">?</div>
            </div>
        </div>

        <div class="number-grid" id="numberGrid">
            <!-- Buttons 1-9 -->
        </div>
    </div>

    <div id="success-overlay" class="overlay">
        <div class="big-icon">🐝</div>
        <h2 id="txtWin" style="font-size: 3.5rem; font-weight: 900; color: var(--neon-gold);">ንፉዕ!</h2>
    </div>

    <div id="error-overlay" class="overlay error">
        <div style="font-size: 10rem; font-weight: 950; animation: shake 0.4s infinite;">✖</div>
        <h2 id="txtFail" style="font-size: 2.2rem; font-weight: 900;">እንደገና ፈትን!</h2>
    </div>

    <script>
        const i18n = {
            ti: { instruct: "ብድምር ክንደይ እዮም?", win: "ንፉዕ!", fail: "ጌጋ!" },
            am: { instruct: "በጠቅላላ ስንት ናቸው?", win: "ድንቅ ስራ!", fail: "ስህተት!" },
            en: { instruct: "What is the total sum?", win: "Perfect!", fail: "Try Again!" },
            om: { instruct: "Waliigala meeqa?", win: "Hojii Gaarii!", fail: "Dogoggora!" },
            so: { instruct: "Isugeyntu waa imisa?", win: "Shaqo Fiican!", fail: "Khalad!" }
        };

        const icons = ['🐝', '🍯', '🌻', '🌸', '🌼', '🍡', '🍭'];
        let score = 0, lang = 'ti', busy = false;
        let v1 = 0, v2 = 0, v3 = 0, ans = 0;
        let highScore = parseInt(localStorage.getItem('add3_g1_high')) || 0;
        
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(1000, n);
                g.gain.setValueAtTime(0.08, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if (type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.15, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.5);
                o.start(); o.stop(n + 0.5);
            } else if (type === 'err') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(180, n); o.frequency.exponentialRampToValueAtTime(60, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.exponentialRampToValueAtTime(0.001, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function setLanguage(l) { lang = l; updateUI(); }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('txtInstruction').innerText = t.instruct;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('txtFail').innerText = t.fail;
            document.getElementById('valScore').innerText = score;
        }

        function generateRound() {
            busy = false;
            const box = document.getElementById('ansBox');
            box.innerText = "?";
            box.classList.remove('filled');

            ans = Math.floor(Math.random() * 7) + 3; // sum 3 to 9
            v1 = Math.floor(Math.random() * (ans - 2)) + 1;
            v2 = Math.floor(Math.random() * (ans - v1 - 1)) + 1;
            v3 = ans - v1 - v2;

            const icon = icons[Math.floor(Math.random() * icons.length)];
            const render = (boxId, lblId, count) => {
                const b = document.getElementById(boxId);
                const l = document.getElementById(lblId);
                b.querySelectorAll('.game-item').forEach(i => i.remove());
                for(let i=0; i<count; i++) {
                    const el = document.createElement('div');
                    el.className = "game-item";
                    el.innerText = icon;
                    el.style.animationDelay = (i * 0.05) + "s";
                    b.appendChild(el);
                }
                l.innerText = count;
            };

            render('box1', 'lbl1', v1);
            render('box2', 'lbl2', v2);
            render('box3', 'lbl3', v3);
            updateUI();
        }

        function checkAnswer(choice) {
            if (busy) return;
            busy = true;
            sfx('tap');

            const box = document.getElementById('ansBox');
            box.innerText = choice;
            box.classList.add('filled');

            if (choice === ans) {
                sfx('win');
                score += 40;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('add3_g1_high', highScore);
                }
                burst(300);
                const overlay = document.getElementById('success-overlay');
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    generateRound();
                }, 1500);
            } else {
                sfx('err');
                const overlay = document.getElementById('error-overlay');
                overlay.style.display = 'flex';
                const board = document.getElementById('board');
                board.style.animation = 'shake 0.4s';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    board.style.animation = '';
                    busy = false;
                    box.innerText = "?";
                    box.classList.remove('filled');
                }, 1000);
            }
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#fbce03', '#ffffff', '#6366f1', '#f43f5e'];
            const p = [];
            for(let i=0; i<count; i++) p.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*40, vy: (Math.random()-1.2)*75,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 3.0, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=p.length-1; i>=0; i--){
                    const pt=p[i]; if(pt.l>0){
                        al=true; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=1.3; pt.l-=0.01; pt.r+=pt.rv;
                        x.save(); x.translate(pt.x,pt.y); x.rotate(pt.r*Math.PI/180);
                        x.fillStyle=pt.c; x.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s); x.restore();
                    } else p.splice(i,1);
                }
                if(al) requestAnimationFrame(f);
            })();
        }

        window.onload = () => {
            const grid = document.getElementById('numberGrid');
            for(let i=1; i<=9; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => checkAnswer(i);
                grid.appendChild(btn);
            }
            generateRound();
        };
    </script>
</body>
</html>

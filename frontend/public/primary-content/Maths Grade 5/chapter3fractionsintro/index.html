<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractions - ጉዚታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF9F1C;   /* Orange */
            --secondary: #2EC4B6; /* Teal */
            --accent: #FFBF69;    /* Light Orange */
            --success: #20BF55;   /* Green */
            --bg: #F0F4F8;
            --text: #2d3748;
            --fill-color: #2EC4B6;
            --empty-color: #E2E8F0;
            --pizza-crust: #E6A15C;
            --pizza-cheese: #F6C85F;
            --pizza-pep: #D62828;
        }

        * { box-sizing: border-box; transition: all 0.3s ease; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(#CBD5E0 2px, transparent 2px),
                radial-gradient(#CBD5E0 2px, transparent 2px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            user-select: none;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 18%, rgba(255, 159, 28, 0.22), transparent 42%),
                radial-gradient(circle at 88% 16%, rgba(46, 196, 182, 0.18), transparent 45%),
                radial-gradient(circle at 16% 86%, rgba(255, 191, 105, 0.25), transparent 46%),
                radial-gradient(circle at 85% 86%, rgba(32, 191, 85, 0.14), transparent 48%);
            pointer-events: none;
            z-index: -1;
        }

        /* --- Header --- */
        header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--secondary);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 4px 0 #1B7A71;
            border: 2px solid white;
        }

        h1 {
            color: var(--primary);
            font-size: 1.5rem;
            font-weight: 900;
            margin: 0;
        }

        /* Custom Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: bold; color: var(--text);
            height: 40px; background: white; 
            border-radius: 20px; box-shadow: 0 4px 0 #cbd5e0;
            width: 150px; transition: 0.2s;
            border: 2px solid var(--secondary);
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 5px;
            border-radius: 15px; padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid var(--secondary);
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 8px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .custom-option:hover { background: #E0F2FE; color: var(--secondary); }
        .arrow { border: solid var(--text); border-width: 0 3px 3px 0; padding: 3px; transform: rotate(45deg); margin-top: -5px; }

        /* --- Main Content --- */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; text-align: center; } 

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: white;
            border: 2px solid #CBD5E0;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 900;
            color: #718096;
            cursor: pointer;
            box-shadow: 0 4px 0 #CBD5E0;
        }
        .tab-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #CBD5E0; }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: scale(1.05);
            box-shadow: 0 6px 0 #e88d0c;
        }

        /* Card */
        .fraction-card {
            background: white;
            border-radius: 30px;
            padding: 50px; 
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border: 5px solid white;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: row; 
            align-items: flex-start;
            justify-content: space-around;
            gap: 60px;
            min-height: 500px;
        }

        /* Controls Section (Left) */
        .control-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #F7FAFC;
            padding: 40px; 
            border-radius: 30px;
            border: 2px solid #E2E8F0;
            min-width: 300px;
        }

        /* Numerator Group (Top) */
        .num-group {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        /* Denominator Group (Bottom) */
        .denom-group {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 15px;
        }

        /* Fraction Line */
        .frac-divider {
            width: 100%;
            height: 6px;
            background: var(--text);
            border-radius: 3px;
            margin: 15px 0;
        }

        .fraction-number {
            font-size: 4rem; 
            font-weight: 900;
            color: var(--text);
            min-width: 80px;
            text-align: center;
        }

        .control-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .btn-plus { background: var(--success); }
        .btn-minus { background: #E71D36; }
        .control-btn:active { transform: translateY(2px); box-shadow: none; }

        .label-text {
            font-size: 1rem;
            font-weight: bold;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Whole Number for Mixed */
        .whole-number {
            font-size: 5rem;
            font-weight: 900;
            color: var(--primary);
            margin-right: 30px;
        }
        .mixed-wrapper {
            display: flex;
            align-items: center;
        }

        /* Visualization Area (Right) */
        .viz-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .viz-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
            min-height: 300px;
            align-items: center;
            width: 100%;
        }

        /* Pizza Specific Styles */
        .pizza-plate {
            width: 250px; height: 250px;
            border-radius: 50%;
            position: relative;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid #E2E8F0;
        }

        .pizza-clip {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slice {
            fill: var(--pizza-cheese);
            stroke: var(--pizza-crust);
            stroke-width: 0.06; /* Crust thickness (scaled to viewBox units) */
            transition: all 0.3s ease;
            transform-origin: 50% 50%;
            cursor: pointer;
        }
        .slice:hover { 
            fill: #FFE66D; 
            transform: scale(1.05); 
            z-index: 10;
        }
        .slice.empty { 
            fill: #EDF2F7; 
            stroke: var(--pizza-crust);
            stroke-width: 0.02;
            stroke-dasharray: 0.05,0.05;
        }

        .topping {
            fill: var(--pizza-pep);
            opacity: 0.9;
            pointer-events: none;
        }

        /* Info Box */
        .info-box {
            background: #E0F2FE;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--secondary);
            font-size: 1.4rem;
            color: #2C5282;
            font-weight: bold;
            width: 100%;
            text-align: center;
            animation: popIn 0.5s;
        }
        .highlight { color: var(--primary); font-size: 1.6rem; }

        /* Animations */
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* Mobile */
        @media (max-width: 900px) {
            .fraction-card { flex-direction: column; gap: 40px; padding: 20px; }
            .pizza-plate { width: 180px; height: 180px; }
            .control-panel { width: 100%; padding: 20px; }
            h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
        <h1 id="header-title">ጉዚታት (Fractions)</h1>
    </div>
    <div class="header-right">
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div class="arrow"></div>
                </div>
                <div class="custom-select__options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="setMode('proper')" id="btn-proper">ግቡእ (Proper)</button>
        <button class="tab-btn" onclick="setMode('improper')" id="btn-improper">ዘይግቡእ (Improper)</button>
        <button class="tab-btn" onclick="setMode('mixed')" id="btn-mixed">ሕዋስ (Mixed)</button>
    </div>

    <div class="fraction-card">
        
        <!-- Controls (Left Side) -->
        <div class="control-panel">
            <div class="mixed-wrapper">
                <div id="disp-whole" class="whole-number" style="display:none;">1</div>
                
                <div style="display:flex; flex-direction:column; align-items:center;">
                    
                    <!-- Numerator (Top) -->
                    <span class="label-text" id="lbl-num">ቆፃሪ (Top)</span>
                    <div class="num-group">
                        <button class="control-btn btn-minus" onclick="changeNum(-1)">-</button>
                        <span class="fraction-number" id="disp-num">1</span>
                        <button class="control-btn btn-plus" onclick="changeNum(1)">+</button>
                    </div>

                    <div class="frac-divider"></div>

                    <!-- Denominator (Bottom) -->
                    <div class="denom-group">
                        <button class="control-btn btn-minus" onclick="changeDenom(-1)">-</button>
                        <span class="fraction-number" id="disp-denom">4</span>
                        <button class="control-btn btn-plus" onclick="changeDenom(1)">+</button>
                    </div>
                    <span class="label-text" id="lbl-denom">ረቛሒ (Bottom)</span>

                </div>
            </div>
        </div>

        <!-- Visualization Area (Right) -->
        <div class="viz-area">
            <div class="viz-container" id="visual-container">
                <!-- SVG Pizza Circles injected here -->
            </div>
            
            <div class="info-box" id="info-text">
                This is a Proper Fraction because Top < Bottom.
            </div>
        </div>

    </div>
</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playTone(freq, type, duration) {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.stop(this.ctx.currentTime + duration);
        },
        playClick() { this.playTone(600, 'sine', 0.05); },
        playPop() { this.playTone(400, 'sine', 0.1); }
    };

    const translations = {
        ti: {
            title: "ጉዚታት",
            proper: "ግቡእ ጉዚ",
            improper: "ዘይግቡእ ጉዚ",
            mixed: "ሕዋስ ቁፅሪ",
            lblNum: "ቆፃሪ (Top)",
            lblDenom: "ረቛሒ (Bottom)",
            explProper: "እዚ <span class='highlight'>ግቡእ ጉዚ</span> እዩ። ምኽንያቱ ቆፃሪ ካብ ረቛሒ ይንእስ።",
            explImproper: "እዚ <span class='highlight'>ዘይግቡእ ጉዚ</span> እዩ። ምኽንያቱ ቆፃሪ ካብ ረቛሒ ይበልፅ።",
            explMixed: "እዚ <span class='highlight'>ሕዋስ ቁፅሪ</span> እዩ። ሙሉእ ቁፅርን ጉዝን ሓዊሱ ዝሓዘ እዩ።"
        },
        am: {
            title: "ክፍልፋዮች",
            proper: "ትክክለኛ ክፍልፋይ",
            improper: "ኢ-ትክክለኛ ክፍልፋይ",
            mixed: "ድብልቅ ቁጥር",
            lblNum: "ቆጣሪ (Top)",
            lblDenom: "መለያ (Bottom)",
            explProper: "ይህ <span class='highlight'>ትክክለኛ ክፍልፋይ</span> ነው። ምክንያቱም ቆጣሪው ከመለያው ያንሳል።",
            explImproper: "ይህ <span class='highlight'>ኢ-ትክክለኛ ክፍልፋይ</span> ነው። ምክንያቱም ቆጣሪው ከመለያው ይበልጣል።",
            explMixed: "ይህ <span class='highlight'>ድብልቅ ቁጥር</span> ነው። ሙሉ ቁጥር እና ክፍልፋይ ይዟል።"
        },
        en: {
            title: "Fractions",
            proper: "Proper",
            improper: "Improper",
            mixed: "Mixed",
            lblNum: "Numerator",
            lblDenom: "Denominator",
            explProper: "This is a <span class='highlight'>Proper Fraction</span> because Numerator < Denominator.",
            explImproper: "This is an <span class='highlight'>Improper Fraction</span> because Numerator > Denominator.",
            explMixed: "This is a <span class='highlight'>Mixed Number</span>. It has a Whole Number and a Fraction."
        },
        om: {
            title: "Firakshinii",
            proper: "Sirrii",
            improper: "Mit-sirrii",
            mixed: "Makaa",
            lblNum: "Olifaa",
            lblDenom: "Jalafaa",
            explProper: "Kun <span class='highlight'>Firakshinii Sirrii</span> dha.",
            explImproper: "Kun <span class='highlight'>Firakshinii Mit-sirrii</span> dha.",
            explMixed: "Kun <span class='highlight'>Lakkoofsa Makaa</span> dha."
        },
        so: {
            title: "Jajabka",
            proper: "Jajab Toosan",
            improper: "Jajab aan Toosnayn",
            mixed: "Jajab Isku-dhaf",
            lblNum: "Sareeye",
            lblDenom: "Hooseeye",
            explProper: "Kani waa <span class='highlight'>Jajab Toosan</span>.",
            explImproper: "Kani waa <span class='highlight'>Jajab aan Toosnayn</span>.",
            explMixed: "Kani waa <span class='highlight'>Jajab Isku-dhaf</span>."
        }
    };

    let currentLang = 'ti';
    let numerator = 1;
    let denominator = 4;
    let mode = 'proper'; 

    function setMode(m) {
        AudioEngine.playClick();
        mode = m;
        // Set defaults for mode
        if(m === 'proper') { numerator = 1; denominator = 4; }
        if(m === 'improper') { numerator = 5; denominator = 4; }
        if(m === 'mixed') { numerator = 5; denominator = 4; } 

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${m}`).classList.add('active');
        
        updateUI();
    }

    function changeNum(delta) {
        AudioEngine.playClick();
        let newNum = numerator + delta;
        
        if (mode === 'proper') {
            if (newNum >= denominator) return;
            if (newNum < 1) newNum = 1;
        } else {
            if (newNum < 1) newNum = 1;
        }
        
        numerator = newNum;
        updateUI();
    }

    function changeDenom(delta) {
        AudioEngine.playClick();
        let newDenom = denominator + delta;
        if (newDenom < 2) newDenom = 2;
        if (newDenom > 8) newDenom = 8; 

        if (mode === 'proper') {
            if (numerator >= newDenom) numerator = newDenom - 1;
        }

        denominator = newDenom;
        updateUI();
    }

    function updateUI() {
        const t = translations[currentLang];
        
        // Update Numbers
        if (mode === 'mixed') {
            const whole = Math.floor(numerator / denominator);
            const remainder = numerator % denominator;
            
            if (whole > 0) {
                document.getElementById('disp-whole').style.display = 'block';
                document.getElementById('disp-whole').textContent = whole;
            } else {
                document.getElementById('disp-whole').style.display = 'none';
            }
            
            document.getElementById('disp-num').textContent = remainder;
            document.getElementById('info-text').innerHTML = t.explMixed;

        } else {
            document.getElementById('disp-whole').style.display = 'none';
            document.getElementById('disp-num').textContent = numerator;
            
            if (numerator < denominator) document.getElementById('info-text').innerHTML = t.explProper;
            else document.getElementById('info-text').innerHTML = t.explImproper;
        }
        
        document.getElementById('disp-denom').textContent = denominator;

        renderPizzas();
    }

    function renderPizzas() {
        AudioEngine.playPop();
        const container = document.getElementById('visual-container');
        container.innerHTML = '';

        const totalSlices = numerator;
        const slicesPerPizza = denominator;
        const totalPizzas = Math.ceil(totalSlices / slicesPerPizza);

        for (let p = 0; p < totalPizzas; p++) {
            const pizzaDiv = document.createElement('div');
            pizzaDiv.className = 'pizza-plate';

            const clip = document.createElement('div');
            clip.className = 'pizza-clip';
            
            // Create SVG
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("width", "100%");
            svg.setAttribute("height", "100%");
            svg.setAttribute("viewBox", "-1 -1 2 2");
            svg.style.transform = "rotate(-90deg)"; 

            const slicesInThisPizza = Math.min(slicesPerPizza, totalSlices - (p * slicesPerPizza));
            
            // Render Background (Empty Crust)
            for (let i = 0; i < slicesPerPizza; i++) {
                const slice = createSlice(i, slicesPerPizza, svgNS, true); 
                svg.appendChild(slice);
            }

            // Render Filled Slices + Toppings
            for (let i = 0; i < slicesInThisPizza; i++) {
                const g = document.createElementNS(svgNS, "g");
                const slice = createSlice(i, slicesPerPizza, svgNS, false);
                g.appendChild(slice);
                
                // Add Pepperoni Topping
                const angle = ((i + 0.5) / slicesPerPizza) * Math.PI * 2;
                // Center pep
                const r = 0.5;
                const tx = Math.cos(angle) * r;
                const ty = Math.sin(angle) * r;
                
                const pep = document.createElementNS(svgNS, "circle");
                pep.setAttribute("cx", tx);
                pep.setAttribute("cy", ty);
                pep.setAttribute("r", "0.12");
                pep.setAttribute("class", "topping");
                g.appendChild(pep);
                
                // Add 2nd pep closer to edge
                const r2 = 0.75;
                const tx2 = Math.cos(angle) * r2;
                const ty2 = Math.sin(angle) * r2;
                const pep2 = document.createElementNS(svgNS, "circle");
                pep2.setAttribute("cx", tx2);
                pep2.setAttribute("cy", ty2);
                pep2.setAttribute("r", "0.08");
                pep2.setAttribute("class", "topping");
                g.appendChild(pep2);

                svg.appendChild(g);
            }

            // Render Divider Lines on Top (to make slice splits obvious)
            if (slicesPerPizza > 1) {
                for (let i = 0; i < slicesPerPizza; i++) {
                    const a = (i / slicesPerPizza) * Math.PI * 2;
                    const line = document.createElementNS(svgNS, "line");
                    line.setAttribute("x1", "0");
                    line.setAttribute("y1", "0");
                    line.setAttribute("x2", String(Math.cos(a) * 0.98));
                    line.setAttribute("y2", String(Math.sin(a) * 0.98));
                    line.setAttribute("stroke", "#8B4513");
                    line.setAttribute("stroke-width", "0.03");
                    line.setAttribute("stroke-linecap", "round");
                    line.setAttribute("opacity", "0.85");
                    svg.appendChild(line);
                }
            }

            clip.appendChild(svg);
            pizzaDiv.appendChild(clip);
            container.appendChild(pizzaDiv);
        }
    }

    function createSlice(index, total, ns, isEmpty) {
        const path = document.createElementNS(ns, "path");
        const startAngle = (index / total) * Math.PI * 2;
        const endAngle = ((index + 1) / total) * Math.PI * 2;
        
        const x1 = Math.cos(startAngle);
        const y1 = Math.sin(startAngle);
        const x2 = Math.cos(endAngle);
        const y2 = Math.sin(endAngle);
        
        const largeArcFlag = endAngle - startAngle <= Math.PI ? "0" : "1";

        let d;
        if(total === 1) {
             // Full circle
             d = "M 1 0 A 1 1 0 1 1 -1 0 A 1 1 0 1 1 1 0 Z";
        } else {
             d = `M 0 0 L ${x1} ${y1} A 1 1 0 ${largeArcFlag} 1 ${x2} ${y2} Z`;
        }
        
        path.setAttribute("d", d);
        path.setAttribute("class", isEmpty ? "slice empty" : "slice");
        
        return path;
    }

    // --- Dropdown ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() {
        selectCustom.classList.toggle('open');
    });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                currentLang = value;
                updateText();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) {
            selectCustom.classList.remove('open');
        }
    });

    function updateText() {
        const t = translations[currentLang];
        document.getElementById('header-title').textContent = t.title;
        document.getElementById('btn-proper').textContent = t.proper;
        document.getElementById('btn-improper').textContent = t.improper;
        document.getElementById('btn-mixed').textContent = t.mixed;
        document.getElementById('lbl-num').textContent = t.lblNum;
        document.getElementById('lbl-denom').textContent = t.lblDenom;
        
        updateUI();
    }

    // Init
    window.onload = function() {
        updateUI();
    }

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rounding Hill - ምጽጋዕ</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CC9F0;
            --primary-dark: #0096c7;
            --secondary: #F72585;
            --accent: #F9C74F;
            --success: #43AA8B;
            --bg: #e0f2fe;
            --hill: #86efac;
            --hill-stroke: #22c55e;
            --text: #1e293b;
            --sky1: #a5f3fc;
            --sky2: #dbeafe;
            --sky3: #fce7f3;
            --card-glass: rgba(255,255,255,0.78);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 12% 18%, rgba(255,255,255,0.95) 0 10px, transparent 11px),
                radial-gradient(circle at 88% 22%, rgba(255,255,255,0.90) 0 8px, transparent 9px),
                radial-gradient(circle at 22% 76%, rgba(255,255,255,0.85) 0 9px, transparent 10px),
                linear-gradient(135deg, rgba(165,243,252,0.95), rgba(219,234,254,0.92) 45%, rgba(252,231,243,0.88));
            background-size: 220px 220px, 220px 220px, 220px 220px, cover;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(255,255,255,0.88);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 6px solid var(--success);
            border-radius: 0 0 20px 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .header-left, .header-right { width: 140px; }
        .header-center { flex-grow: 1; text-align: center; }

        .grade-badge {
            background: var(--success);
            color: white;
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1.2rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        h1 {
            color: var(--text);
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
        }

        /* --- Custom Dropdown --- */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: bold; color: var(--text);
            height: 45px; background: #fff; border: 2px solid var(--primary);
            border-radius: 25px; box-shadow: 0 4px 0 var(--primary-dark);
            width: 160px; transition: 0.2s;
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: transparent; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 8px;
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { 
            padding: 12px 15px; font-weight: 600; background: white;
            border-radius: 12px; border: 2px solid #e2e8f0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .custom-option:hover { background-color: var(--bg); color: var(--primary); border-color: var(--primary); transform: translateX(5px); }
        .custom-option.selected { background-color: var(--primary); color: #fff; border-color: var(--primary-dark); }
        .arrow { width: 10px; height: 10px; border-left: 2px solid var(--primary); border-bottom: 2px solid var(--primary); transform: rotate(-45deg); transition: 0.3s; margin-top: -5px; }
        .custom-select.open .arrow { transform: rotate(135deg); margin-top: 5px; }

        /* --- Main Content --- */
        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; text-align: center; }

        .card {
            background: var(--card-glass);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid rgba(255,255,255,0.9);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, rgba(247, 37, 133, 0.45), rgba(76, 201, 240, 0.45), rgba(249, 199, 79, 0.45), rgba(67, 170, 139, 0.45));
            z-index: 0;
            filter: blur(18px);
            opacity: 0.75;
            pointer-events: none;
        }

        .card > * { position: relative; z-index: 1; }

        /* Controls */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.75);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 12px 22px rgba(0,0,0,0.08);
        }

        .step-btn {
            border: none;
            width: 46px;
            height: 46px;
            border-radius: 16px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 14px 22px rgba(0,0,0,0.10);
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .step-btn:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0), 0 10px 18px rgba(0,0,0,0.08); }
        .step-btn:hover { filter: brightness(1.04); }
        .step-btn.minus { background: linear-gradient(135deg, #F72585, #B5179E); }
        .step-btn.plus { background: linear-gradient(135deg, #43AA8B, #2F855A); }

        input[type="number"] {
            width: 150px;
            padding: 12px;
            font-size: 1.8rem;
            border: 3px solid var(--primary);
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            outline: none;
            color: var(--text);
            background: rgba(255,255,255,0.9);
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.06);
        }

        input[type="number"]:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 5px rgba(247, 37, 133, 0.18), inset 0 2px 6px rgba(0,0,0,0.06);
            transform: scale(1.02);
        }

        .mode-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid #cbd5e1;
            background: rgba(255,255,255,0.9);
            font-weight: bold;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.10);
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-dark);
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(76, 201, 240, 0.3);
        }

        #btn-10.active { background: linear-gradient(135deg, #4CC9F0, #4895EF); border-color: #4895EF; }
        #btn-100.active { background: linear-gradient(135deg, #F9C74F, #F9844A); border-color: #F9844A; }
        #btn-1000.active { background: linear-gradient(135deg, #43AA8B, #2F855A); border-color: #2F855A; }

        /* --- Hill Visuals --- */
        .hill-wrapper {
            position: relative;
            height: 350px;
            margin-top: 20px;
            overflow: hidden;
            border-radius: 20px;
            background: linear-gradient(to bottom, rgba(224, 242, 254, 0.95) 0%, rgba(216, 180, 254, 0.35) 55%, rgba(253, 186, 116, 0.18) 100%);
            border: 2px solid rgba(255,255,255,0.85);
            box-shadow: inset 0 0 0 2px rgba(191, 219, 254, 0.55);
        }

        .hill-wrapper::before {
            content: '';
            position: absolute;
            top: 18px;
            left: -20%;
            width: 140%;
            height: 90px;
            background:
                radial-gradient(circle at 18% 55%, rgba(255,255,255,0.95) 0 28px, transparent 29px),
                radial-gradient(circle at 30% 45%, rgba(255,255,255,0.92) 0 22px, transparent 23px),
                radial-gradient(circle at 42% 60%, rgba(255,255,255,0.92) 0 26px, transparent 27px),
                radial-gradient(circle at 64% 55%, rgba(255,255,255,0.92) 0 28px, transparent 29px),
                radial-gradient(circle at 76% 45%, rgba(255,255,255,0.88) 0 22px, transparent 23px),
                radial-gradient(circle at 88% 60%, rgba(255,255,255,0.9) 0 26px, transparent 27px);
            opacity: 0.9;
            filter: blur(0.3px);
            animation: floatClouds 10s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes floatClouds {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(6%); }
        }

        .hill-svg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hill-path {
            fill: var(--hill);
            stroke: var(--hill-stroke);
            stroke-width: 5;
        }

        /* Markers & Labels */
        .marker-label {
            position: absolute;
            font-weight: 900;
            color: #064e3b;
            background: rgba(255,255,255,0.92);
            padding: 2px 8px;
            border-radius: 8px;
            transform: translate(-50%, -50%);
            font-size: 1rem;
            border: 2px solid rgba(34, 197, 94, 0.25);
            box-shadow: 0 8px 14px rgba(0,0,0,0.10);
        }

        /* Base Labels */
        .base-label {
            position: absolute;
            bottom: 0;
            font-size: 1.8rem;
            font-weight: 900;
            color: #1e293b;
            background: rgba(255,255,255,0.92);
            padding: 0;
            border-radius: 0;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            border: 2px solid rgba(255,255,255,0.9);
            z-index: 12;
        }

        .base-left { left: 0; border-radius: 14px 0 0 0; padding-left: 8px; padding-right: 4px; }
        .base-right { right: 0; border-radius: 0 14px 0 0; padding-right: 8px; padding-left: 4px; }

        /* Car */
        .car {
            position: absolute;
            width: 60px;
            height: 40px;
            font-size: 40px;
            line-height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transform-origin: center bottom;
            transition: left 0.1s linear, top 0.1s linear, transform 0.1s linear;
        }

        .car { animation: carBob 1.2s ease-in-out infinite; }

        @keyframes carBob {
            0%, 100% { transform: translateX(-50%) translateY(-100%) rotate(var(--car-rot, 0deg)) translateY(0); }
            50% { transform: translateX(-50%) translateY(-100%) rotate(var(--car-rot, 0deg)) translateY(-3px); }
        }

        /* Value Bubble on Car */
        .car-value {
            position: absolute;
            top: -30px;
            background: var(--secondary);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 8px;
            white-space: nowrap;
            box-shadow: 0 10px 18px rgba(0,0,0,0.18);
        }

        .car-value::after {
            content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            border-left: 5px solid transparent; border-right: 5px solid transparent;
            border-top: 5px solid var(--secondary);
        }

        /* Feedback */
        .result-panel {
            margin-top: 20px;
            min-height: 80px;
        }

        .result-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text);
        }

        .highlight {
            color: var(--secondary);
            font-size: 1.8rem;
            display: inline-block;
            animation: pop 0.5s ease;
        }

        .rule-desc {
            color: #64748b;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        .btn-go {
            background: linear-gradient(135deg, #43AA8B, #4CC9F0);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 0 #15803d;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .btn-go:active { transform: translateY(4px); box-shadow: none; }
        .btn-go:disabled { background: #cbd5e0; box-shadow: none; cursor: not-allowed; }

        @keyframes pop { 50% { transform: scale(1.3); } }

        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            .header-center { order: 3; width: 100%; margin-top: 5px; }
            .header-left, .header-right { width: auto; }
            .hill-wrapper { height: 250px; }
            .base-label { font-size: 1.4rem; }
            .container { margin: 18px auto; padding: 0 14px; }
            .card { padding: 22px; border-radius: 24px; }

            h1 { font-size: 1.3rem; line-height: 1.2; }

            .custom-select__trigger {
                width: 150px;
                height: 44px;
                padding: 0 12px;
            }

            .controls { gap: 14px; margin-bottom: 26px; }
            .input-group {
                width: 100%;
                max-width: 520px;
                display: grid;
                grid-template-columns: 44px minmax(140px, 1fr) 44px;
                grid-auto-rows: auto;
                align-items: center;
                justify-items: center;
                padding: 10px 12px;
                gap: 8px;
            }
            .input-group label { font-size: 1.05rem; grid-column: 1 / -1; justify-self: center; }
            .step-btn { width: 44px; height: 44px; border-radius: 14px; font-size: 1.5rem; }
            input[type="number"] {
                width: 100%;
                font-size: 1.6rem;
                padding: 10px;
            }

            .mode-group { gap: 8px; }
            .mode-btn { padding: 10px 14px; font-size: 1.05rem; }
            .btn-go { width: min(340px, 92vw); padding: 12px 18px; }

            .marker-label { font-size: 0.92rem; padding: 2px 7px; }
            .car { width: 54px; height: 36px; font-size: 36px; line-height: 36px; }
            .car-value { font-size: 0.95rem; top: -28px; }
        }

        @media (max-width: 420px) {
            header { gap: 8px; padding: 0.9rem 0.8rem; }
            .header-left, .header-right { flex: 1 1 auto; }
            .grade-badge { width: 40px; height: 40px; font-size: 1.1rem; }
            .custom-select__trigger { width: 138px; }
            .card { padding: 18px; }

            .input-group { border-radius: 16px; }
            .input-group label { font-size: 1rem; }
            .step-btn { width: 42px; height: 42px; border-radius: 14px; font-size: 1.45rem; }
            input[type="number"] { width: 100%; font-size: 1.5rem; }

            .hill-wrapper { height: 230px; border-radius: 18px; }
            .base-label { font-size: 1.2rem; }
            .marker-label { font-size: 0.85rem; }

            .input-group { grid-template-columns: 42px minmax(120px, 1fr) 42px; }
            .input-group label { grid-column: 1 / -1; text-align: center; }
        }
    </style>
</head>

<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="header-title">ምጽጋዕ (Rounding)</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div class="arrow"></div>
                </div>
                <div class="custom-select__options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        
        <div class="controls">
            <div class="input-group">
                <label id="lbl-input" style="font-weight:bold;">ቁጽሪ (Number):</label>
                <button class="step-btn minus" type="button" onclick="changeNum(-1)" aria-label="Decrease number">-</button>
                <input type="number" id="numInput" value="34" oninput="resetCar()">
                <button class="step-btn plus" type="button" onclick="changeNum(1)" aria-label="Increase number">+</button>
            </div>
            
            <div class="mode-group">
                <button class="mode-btn active" onclick="setPrecision(10)" id="btn-10">ናብ 10</button>
                <button class="mode-btn" onclick="setPrecision(100)" id="btn-100">ናብ 100</button>
                <button class="mode-btn" onclick="setPrecision(1000)" id="btn-1000">ናብ 1000</button>
            </div>

            <button class="btn-go" onclick="startAnimation()" id="btn-go">🚀 አጸግዕ (Round)</button>
        </div>

        <div class="hill-wrapper" id="hill-container">
            <svg class="hill-svg" viewBox="0 0 1000 350" preserveAspectRatio="none">
                <!-- Hill Path: Start low, Peak middle, End low -->
                <!-- Use Cubic Bezier for smooth hill -->
                <path d="M0,350 L100,350 C300,350 400,50 500,50 C600,50 700,350 900,350 L1000,350 L1000,400 L0,400 Z" class="hill-path" id="hill-path-el" />
            </svg>
            
            <div class="base-label base-left" id="lbl-start">30</div>
            <div class="base-label base-right" id="lbl-end">40</div>

            <!-- Digit Markers along the hill will be injected -->
            <div id="markers-container"></div>

            <div class="car" id="car">
                🚗
                <div class="car-value" id="car-val">34</div>
            </div>
        </div>

        <div class="result-panel">
            <div id="result-text" class="result-text"></div>
            <div id="rule-text" class="rule-desc"></div>
        </div>

    </div>
</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playTone(freq, type, duration, startTime = 0) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(this.ctx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + startTime + duration);
            osc.stop(this.ctx.currentTime + startTime + duration);
        },
        playRev() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            // Engine rev sound (sawtooth ramping up)
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(300, this.ctx.currentTime + 1);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 1.2);
            osc.stop(this.ctx.currentTime + 1.2);
        },
        playSlide() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            // Slide whistle effect
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, this.ctx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.5);
            osc.stop(this.ctx.currentTime + 0.5);
        },
        playDing() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            this.playTone(800, 'sine', 0.5);
        }
    };

    const translations = {
        ti: {
            title: "ምጽጋዕ (Rounding)",
            lblInput: "ቁጽሪ:",
            btn10: "ናብ 10", btn100: "ናብ 100", btn1000: "ናብ 1000",
            btnGo: "🚀 አጸግዕ",
            res: "{n} ናብ ዝቀረበ {p} ክጸጋዕ ከሎ <span class='highlight'>{r}</span> ይኸውን።",
            ruleUp: "ካብ ፍርቂ ንላዕሊ ስለዝኾነ፡ ንላዕሊ ይጽጋዕ።",
            ruleDown: "ካብ ፍርቂ ንታሕቲ ስለዝኾነ፡ ንታሕቲ ይጽጋዕ።",
            langName: "ትግርኛ"
        },
        am: {
            title: "ማጠጋጋት",
            lblInput: "ቁጥር:",
            btn10: "ወደ 10", btn100: "ወደ 100", btn1000: "ወደ 1000",
            btnGo: "🚀 አጠጋጋ",
            res: "{n} ወደ ቅርብ {p} ሲጠጋጋ <span class='highlight'>{r}</span> ይሆናል።",
            ruleUp: "ከግማሽ በላይ ስለሆነ ወደ ላይ ይጠጋጋል።",
            ruleDown: "ከግማሽ በታች ስለሆነ ወደ ታች ይጠጋጋል።",
            langName: "አማርኛ"
        },
        en: {
            title: "Rounding",
            lblInput: "Number:",
            btn10: "Nearest 10", btn100: "Nearest 100", btn1000: "Nearest 1000",
            btnGo: "🚀 Round It!",
            res: "{n} rounded to nearest {p} is <span class='highlight'>{r}</span>.",
            ruleUp: "Past the top (5 or more), so we slide down to the higher number!",
            ruleDown: "Didn't reach the top (4 or less), so we slide back!",
            langName: "English"
        },
        om: {
            title: "Geeruruu",
            lblInput: "Lakkoofsa:",
            btn10: "Gara 10", btn100: "Gara 100", btn1000: "Gara 1000",
            btnGo: "🚀 Geeruri",
            res: "{n} gara {p} dhiyooti yoo geeruramu <span class='highlight'>{r}</span> ta'a.",
            ruleUp: "Walakkaa ol waan ta'eef, ol geerurama.",
            ruleDown: "Walakkaa gadi waan ta'eef, gadi geerurama.",
            langName: "Afan Oromoo"
        },
        so: {
            title: "Qiyaasta",
            lblInput: "Tiro:",
            btn10: "Ugu dhow 10", btn100: "Ugu dhow 100", btn1000: "Ugu dhow 1000",
            btnGo: "🚀 Qiyaas",
            res: "{n} marka loo qiyaaso {p} waa <span class='highlight'>{r}</span>.",
            ruleUp: "Waa ka badan yahay bartamaha, kor u qiyaas.",
            ruleDown: "Waa ka yar yahay bartamaha, hoos u qiyaas.",
            langName: "Soomaali"
        }
    };

    let currentLang = 'ti';
    let precision = 10;

    function changeNum(delta) {
        const input = document.getElementById('numInput');
        const current = parseInt(input.value);
        const next = (isNaN(current) ? 0 : current) + delta;
        input.value = next;
        resetCar();
    }

    // Hill Path Data (Coordinates approximated from SVG path)
    // We need to map 0-10 progress to X,Y coordinates on the hill.
    // X range: 100 to 900 effectively.
    // 0 -> x=100 (Start of curve up)
    // 5 -> x=500 (Peak)
    // 10 -> x=900 (End of curve down)
    function getHillPoint(progress0to10) {
        // Simple mapping for animation logic
        const startX = 100;
        const peakX = 500;
        const endX = 900;
        
        let x, y, rot;

        if(progress0to10 <= 5) {
            // Climbing up (0 to 5)
            // Linear X map for simplicity: 100 -> 500
            const p = progress0to10 / 5; // 0 to 1
            x = startX + (p * 400);
            
            // Y needs to follow curve roughly. Peak y=50, Base y=350.
            // Using a simple Sine ease-out for height
            // y = 350 - (300 * sin(p * PI/2))
            y = 350 - (300 * Math.sin(p * Math.PI / 2));
            
            // Rotation: Steep at start (-45), Flat at peak (0)
            rot = -45 * (1 - p);
        } else {
            // Sliding down (5 to 10)
            const p = (progress0to10 - 5) / 5; // 0 to 1
            x = peakX + (p * 400);
            
            // y = 50 + (300 * sin(p * PI/2)) -- roughly inverse
            y = 50 + (300 * Math.sin(p * Math.PI / 2));
            
            // Rotation: Flat at peak (0), Steep at end (45)
            rot = 45 * p;
        }
        
        // Adjust for viewBox scaling if needed, but CSS handles layout. 
        // We return percentages for CSS left/top or specific SVG coord logic?
        // Let's return exact SVG coords and map to pixels relative to container.
        return { x, y, rot };
    }

    function setPrecision(p) {
        precision = p;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${p}`).classList.add('active');
        resetCar();
    }

    function resetCar() {
        const car = document.getElementById('car');
        const num = parseInt(document.getElementById('numInput').value) || 0;
        
        // Initial setup visual (labels)
        const lower = Math.floor(num / precision) * precision;
        const upper = lower + precision;
        
        document.getElementById('lbl-start').textContent = lower;
        document.getElementById('lbl-end').textContent = upper;
        document.getElementById('car-val').textContent = num;

        // Place markers 1-4 and 6-9
        const container = document.getElementById('markers-container');
        container.innerHTML = '';
        for(let i=1; i<=9; i++) {
            if(i===5) continue; // 5 is peak
            const pt = getHillPoint(i);
            const mk = document.createElement('div');
            mk.className = 'marker-label';
            mk.textContent = i;
            // Convert SVG coords to % for responsiveness
            mk.style.left = (pt.x / 10) + '%';
            mk.style.top = (pt.y / 3.5) + '%'; 
            container.appendChild(mk);
        }

        // Reset car to start
        const startPt = getHillPoint(0);
        moveCarTo(startPt);
        
        // Clear result
        document.getElementById('result-text').textContent = '';
        document.getElementById('rule-text').textContent = '';
        document.getElementById('btn-go').disabled = false;
    }

    function moveCarTo(pt) {
        const car = document.getElementById('car');
        // SVG width 1000 -> 100%
        // SVG height 350 -> 100% (of container height approx)
        car.style.left = (pt.x / 10) + '%';
        car.style.top = (pt.y / 3.5) + '%';
        car.style.transform = `translateX(-50%) translateY(-100%) rotate(${pt.rot}deg)`;
    }

    function startAnimation() {
        const btn = document.getElementById('btn-go');
        btn.disabled = true;
        
        const num = parseInt(document.getElementById('numInput').value);
        if(isNaN(num)) return;

        // Logic
        const lower = Math.floor(num / precision) * precision;
        const digit = (num % precision) / (precision/10); // Normalized 0-9.99
        // Example: 34 / 10 -> rem 4 -> digit 4. 
        // Example: 134 / 100 -> rem 34 -> digit 3.4.
        
        // We map digit 0-10 to the hill
        
        // Animation Sequence
        // 1. Drive up to the digit position
        AudioEngine.playRev();
        
        let start = 0;
        const duration = 1000;
        const targetDigit = digit;
        
        const animateUp = (timestamp) => {
            if (!start) start = timestamp;
            const progress = (timestamp - start) / duration;
            
            if (progress < 1) {
                const currentD = targetDigit * progress; // 0 to target
                const pt = getHillPoint(currentD);
                moveCarTo(pt);
                requestAnimationFrame(animateUp);
            } else {
                // Arrived at target point
                const pt = getHillPoint(targetDigit);
                moveCarTo(pt);
                
                // Pause then decide fate
                setTimeout(() => decideFate(targetDigit, num), 500);
            }
        };
        
        requestAnimationFrame(animateUp);
    }

    function decideFate(digit, originalNum) {
        const rounded = Math.round(originalNum / precision) * precision;
        const isUp = digit >= 5;
        
        // Animation Phase 2: Slide
        AudioEngine.playSlide();
        
        let start = 0;
        const duration = 800;
        
        // If Up: continue from digit to 10
        // If Down: slide back from digit to 0
        
        const animateSlide = (timestamp) => {
            if (!start) start = timestamp;
            const progress = (timestamp - start) / duration;
            
            if (progress < 1) {
                let d;
                if(isUp) {
                    // Slide forward: digit -> 10
                    d = digit + ((10 - digit) * progress);
                } else {
                    // Slide backward: digit -> 0
                    d = digit - (digit * progress);
                }
                const pt = getHillPoint(d);
                moveCarTo(pt);
                requestAnimationFrame(animateSlide);
            } else {
                // Finish
                const finalPt = getHillPoint(isUp ? 10 : 0);
                moveCarTo(finalPt);
                AudioEngine.playDing();
                showResult(originalNum, rounded, isUp);
                document.getElementById('btn-go').disabled = false;
            }
        };
        requestAnimationFrame(animateSlide);
    }

    function showResult(num, rounded, isUp) {
        const t = translations[currentLang];
        const resText = t.res.replace('{n}', num).replace('{p}', precision).replace('{r}', rounded);
        const ruleText = isUp ? t.ruleUp : t.ruleDown;

        const resEl = document.getElementById('result-text');
        resEl.innerHTML = resText;
        document.getElementById('rule-text').textContent = ruleText;
    }

    // --- Dropdown Logic ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() {
        selectCustom.classList.toggle('open');
    });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                currentLang = value;
                updateText();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) {
            selectCustom.classList.remove('open');
        }
    });

    function updateText() {
        const t = translations[currentLang];
        document.getElementById('header-title').textContent = t.title;
        document.getElementById('lbl-input').textContent = t.lblInput;
        document.getElementById('btn-10').textContent = t.btn10;
        document.getElementById('btn-100').textContent = t.btn100;
        document.getElementById('btn-1000').textContent = t.btn1000;
        document.getElementById('btn-go').textContent = t.btnGo;
        
        // Refresh Result if present
        const resEl = document.getElementById('result-text');
        if(resEl.textContent !== "") {
            // Re-trigger visual update or just clear
            resEl.textContent = ""; 
            document.getElementById('rule-text').textContent = "";
        }
    }

    // Initial Load
    window.onload = function() {
        resetCar();
    };

</script>


<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angle Types - ምደባ ኩርናዓት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant Candy Palette */
            --primary: #FF006E;   /* Hot Pink */
            --secondary: #3A86FF; /* Bright Blue */
            --accent: #FFBE0B;    /* Sunny Yellow */
            --green: #06D6A0;     /* Mint Green */
            --purple: #8338EC;    /* Deep Purple */
            --text: #2B2D42;
            --white: #ffffff;
            --card-bg: #FFF9F0;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            /* Fun Gradient Background with Pattern */
            background: radial-gradient(circle at 10% 20%, rgba(255, 190, 11, 0.2) 0%, transparent 20%),
                        radial-gradient(circle at 90% 80%, rgba(131, 56, 236, 0.2) 0%, transparent 20%),
                        linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 6px solid var(--purple);
            border-radius: 0 0 30px 30px;
        }

        .grade-badge {
            background: var(--purple);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            border: 4px solid white;
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--purple);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0 15px;
            text-align: center;
            background: white;
            padding: 5px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }

        /* Custom Select */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text);
            height: 50px; background: #fff; cursor: pointer;
            border: 3px solid #e2e8f0; border-radius: 25px;
            width: 160px; font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #cbd5e0;
        }
        .custom-select__trigger:hover { border-color: var(--secondary); transform: scale(1.05); }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-options {
            position: absolute; top: 125%; left: 0; right: 0;
            background: #fff; border: 3px solid #e2e8f0; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden; transform: translateY(-15px);
            padding: 8px; display: flex; flex-direction: column; gap: 5px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 10px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .custom-option:hover { background: #E0E7FF; color: var(--purple); }

        /* --- Container --- */
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
            background: rgba(255,255,255,0.6);
            padding: 10px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            background: transparent;
            color: #718096;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #744210;
            box-shadow: 0 5px 0 #D97706;
            transform: translateY(-3px);
            border: 2px solid white;
        }
        .tab-btn.active:active { transform: translateY(0); box-shadow: none; }

        /* Card */
        .card {
            background-color: var(--card-bg);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border: 8px solid white;
            width: 100%;
            min-height: 550px;
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Polka Dot Pattern inside card */
            background-image: radial-gradient(rgba(131, 56, 236, 0.05) 20%, transparent 20%);
            background-size: 30px 30px;
        }
        .card.active { display: flex; }

        /* --- Learn Mode Visuals --- */
        .angle-display {
            width: 100%;
            height: 350px;
            background: white;
            border-radius: 40px;
            border: 4px dashed #CBD5E0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.03);
        }

        .data-panel {
            position: absolute;
            top: 25px;
            right: 25px;
            text-align: right;
            background: rgba(255,255,255,0.95);
            padding: 15px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 2px solid #e2e8f0;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .val-deg { font-size: 3rem; font-weight: 900; color: var(--primary); line-height: 1; text-shadow: 2px 2px 0 rgba(0,0,0,0.05); }
        .val-name { font-size: 1.4rem; font-weight: 800; color: var(--text); margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; }

        /* Controls */
        .slider-wrapper {
            width: 100%;
            max-width: 550px;
            padding: 30px;
            background: white;
            border-radius: 35px;
            border: 4px solid #E2E8F0;
            box-shadow: 0 10px 0 #E2E8F0;
        }

        input[type="range"] {
            width: 100%;
            height: 25px;
            border-radius: 15px;
            background: #CBD5E0;
            outline: none;      
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 50px; height: 50px;
            border-radius: 50%;
            background: var(--purple);
            cursor: pointer;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: scale(1.1);
            transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); background: var(--secondary); }

        .type-indicator {
            display: flex;
            gap: 5px;
            margin-top: 20px;
            justify-content: space-between;
            width: 100%;
            font-size: 0.9rem;
            color: #718096;
            font-weight: 800;
        }

        /* --- Quiz Mode --- */
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .score-pill {
            background: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.3rem;
            border: 3px solid #eee;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 6px 0 #eee;
        }
        .score-pill.high { color: #B7791F; border-color: var(--accent); background: #FFFBEB; }
        .score-pill.curr { color: var(--green); border-color: var(--green); background: #F0FFF4; }

        .quiz-question {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 30px;
            text-align: center;
            background: #E2E8F0;
            padding: 20px 30px;
            border-radius: 25px;
            width: 100%;
            border-left: 8px solid var(--purple);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 700px;
            margin-top: 30px;
        }

        .opt-btn {
            background: white;
            border: 3px solid #E2E8F0;
            padding: 25px;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--text);
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 8px 0 #CBD5E0;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .opt-btn:hover { border-color: var(--secondary); background: #EBF8FF; transform: translateY(-4px); }
        .opt-btn:active { transform: translateY(4px); box-shadow: none; }
        
        /* Feedback Overlay */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s;
        }
        .feedback-overlay.show { display: flex; }

        .fb-icon { font-size: 8rem; margin-bottom: 10px; animation: popIn 0.5s; }
        .fb-title { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
        .fb-sub { font-size: 1.5rem; color: #718096; margin-bottom: 40px; font-weight: bold; }
        
        .btn-action {
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.6rem; font-weight: 900;
            color: white; border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .btn-next { background: var(--secondary); box-shadow: 0 8px 0 #1D4ED8; }
        .btn-next:hover { transform: scale(1.05); }
        .btn-restart { background: var(--primary); box-shadow: 0 8px 0 #C53030; }
        .btn-restart:hover { transform: scale(1.05); }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }

        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 10px 15px; flex-wrap: wrap; justify-content: center; gap: 10px; }
            h1 { font-size: 1.4rem; margin: 0 5px; }
            .grade-badge { width: 40px; height: 40px; font-size: 1.2rem; }
            .container { padding: 0 15px; margin: 20px auto; }
            .card { padding: 20px; border-width: 4px; min-height: 480px; border-radius: 30px; }
            .angle-display { height: 250px; }
            .val-deg { font-size: 2.5rem; }
            .val-name { font-size: 1.2rem; }
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            .opt-btn { padding: 15px; font-size: 1rem; }
            .tabs { gap: 10px; }
            .tab-btn { padding: 10px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="grade-badge">5</div>
    <h1 id="app-title">Angle Types</h1>
    <div class="custom-select-wrapper">
        <div class="custom-select">
            <div class="custom-select__trigger">
                <span id="current-lang-label">🗺️ ትግርኛ</span>
                <div style="font-size:0.8rem">▼</div>
            </div>
            <div class="custom-options">
                <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                <span class="custom-option" data-value="am">አማርኛ</span>
                <span class="custom-option" data-value="en">English</span>
                <span class="custom-option" data-value="om">Afan Oromoo</span>
                <span class="custom-option" data-value="so">Soomaali</span>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('learn')" id="tab-learn">Explore 🧭</button>
        <button class="tab-btn" onclick="switchMode('quiz')" id="tab-quiz">Quiz 🎮</button>
    </div>

    <!-- LEARN MODE -->
    <div id="card-learn" class="card active">
        <div class="angle-display">
            <div class="data-panel">
                <div class="val-deg" id="val-deg">45°</div>
                <div class="val-name" id="val-name">Acute</div>
            </div>
            <svg width="400" height="300" viewBox="0 0 400 300" id="learn-svg" style="width:100%; height:100%;">
                <!-- Drawn by JS -->
            </svg>
        </div>
        
        <div class="slider-wrapper">
            <input type="range" id="angle-slider" min="0" max="360" value="45" oninput="updateLearn()">
            <div class="type-indicator">
                <span>0°</span>
                <span>90°</span>
                <span>180°</span>
                <span>270°</span>
                <span>360°</span>
            </div>
        </div>
        <p style="margin-top:20px; color:#718096; font-weight:bold; text-align:center; font-size: 1.2rem;">Drag the slider to see angle names!</p>
    </div>

    <!-- QUIZ MODE -->
    <div id="card-quiz" class="card">
        <div class="score-board">
            <div class="score-pill high">🏆 <span id="high-score">0</span></div>
            <div class="score-pill curr">⭐ <span id="score">0</span></div>
        </div>

        <div class="quiz-question" id="quiz-q">What type of angle is this?</div>

        <div class="angle-display" style="height: 250px; background: #fff; border-color: #E2E8F0;">
            <svg width="400" height="300" viewBox="0 0 400 300" id="quiz-svg" style="width:100%; height:100%;">
                <!-- Quiz shape -->
            </svg>
        </div>

        <div class="options-grid" id="options-container">
            <!-- Buttons injected here -->
        </div>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedback">
            <div class="fb-icon" id="fb-icon">🎉</div>
            <div class="fb-title" id="fb-title">Correct!</div>
            <div class="fb-sub" id="fb-sub"></div>
            
            <button class="btn-action btn-next" onclick="nextQuestion()" id="btn-next">Next ➡</button>
            <button class="btn-action btn-restart" onclick="restartGame()" id="btn-restart" style="display:none;">Play Again 🔄</button>
        </div>
    </div>

</div>

<canvas id="confetti-canvas"></canvas>

<script>
    // --- Audio ---
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playSuccess() { 
            this.playTone(600, 'sine', 0.1); setTimeout(() => this.playTone(800, 'sine', 0.2), 100); 
        },
        playError() { 
            this.playTone(200, 'sawtooth', 0.2); setTimeout(() => this.playTone(150, 'sawtooth', 0.3), 150);
        },
        playGameOver() {
            this.playTone(300, 'sawtooth', 0.4); setTimeout(() => this.playTone(200, 'sawtooth', 0.6), 400);
        }
    };

        },
        am: {

            tabLearn: "መማሪያ 🧭",
            tabQuiz: "ፈተና 🎮",
            types: {
                zero: "ዜሮ (Zero)",
                acute: "ሹል (Acute)",
                right: "ማዕዘናዊ (Right)",

            },
            qText: "ይህ ምን አይነት አንግል ነው?",
            correct: "ትክክል!",
            wrong: "ስህተት!",
            gameover: "ጨዋታው አብቅቷል!",
            finalScore: "የእርስዎ ውጤት: ",
            btnNext: "ቀጣይ ➡",
            btnRestart: "እንደገና ጀምር 🔄"
        },

            },

            btnNext: "Itti Aanu ➡",

        },
        so: {

            tabLearn: "Baadh 🧭",

            types: {

                acute: "Xagal Yar",
                right: "Xagal Quman",
                obtuse: "Xagal Furan",
                straight: "Xagal Toosan",

            },

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('angleTypesHighScore') || 0;
    let currentQuizKey = '';

    // --- Logic ---

    function init() {
        document.getElementById('high-score').textContent = highScore;
        updateLanguage();
        updateLearn();
    }

    function switchMode(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+mode).classList.add('active');
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+mode).classList.add('active');
        
        if (mode === 'quiz') nextQuestion();
    }

    // --- Drawing Logic ---
    function drawAngle(svg, angle, color) {
        svg.innerHTML = '';
        const cx = 200, cy = 150;
        const r = 100;

        // Base Line (Fixed to Right)
        const lineBase = document.createElementNS("http://www.w3.org/2000/svg", "line");
        lineBase.setAttribute("x1", cx); lineBase.setAttribute("y1", cy);
        lineBase.setAttribute("x2", cx + r + 20); lineBase.setAttribute("y2", cy);
        lineBase.setAttribute("stroke", "#2B2D42");
        lineBase.setAttribute("stroke-width", "4");
        lineBase.setAttribute("stroke-linecap", "round");
        svg.appendChild(lineBase);

        // Rotating Line
        const rad = (angle * Math.PI) / 180;
        const x2 = cx + (r + 20) * Math.cos(-rad);
        const y2 = cy + (r + 20) * Math.sin(-rad);

        const lineRot = document.createElementNS("http://www.w3.org/2000/svg", "line");
        lineRot.setAttribute("x1", cx); lineRot.setAttribute("y1", cy);
        lineRot.setAttribute("x2", x2); lineRot.setAttribute("y2", y2);
        lineRot.setAttribute("stroke", color);
        lineRot.setAttribute("stroke-width", "6");
        lineRot.setAttribute("stroke-linecap", "round");
        svg.appendChild(lineRot);

        // Arc
        if (angle > 0 && angle < 360) {
            const arcR = 50;
            const ax = cx + arcR * Math.cos(-rad);
            const ay = cy + arcR * Math.sin(-rad);
            // Large arc flag: 1 if angle > 180
            const largeArc = angle > 180 ? 1 : 0;
            
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const d = `M ${cx + arcR} ${cy} A ${arcR} ${arcR} 0 ${largeArc} 0 ${ax} ${ay} L ${cx} ${cy} Z`;
            
            path.setAttribute("d", d);
            path.setAttribute("fill", color);
            path.setAttribute("opacity", "0.2");
            svg.appendChild(path);
            
            // Arc Stroke
            const pathStroke = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const dStroke = `M ${cx + arcR} ${cy} A ${arcR} ${arcR} 0 ${largeArc} 0 ${ax} ${ay}`;
            pathStroke.setAttribute("d", dStroke);
            pathStroke.setAttribute("fill", "none");
            pathStroke.setAttribute("stroke", color);
            pathStroke.setAttribute("stroke-width", "3");
            svg.appendChild(pathStroke);
        } else if (angle === 360) {
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", cx); circle.setAttribute("cy", cy); circle.setAttribute("r", 50);
            circle.setAttribute("fill", color); circle.setAttribute("opacity", "0.2");
            circle.setAttribute("stroke", color); circle.setAttribute("stroke-width", "3");
            svg.appendChild(circle);
        }

        // Center Dot
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", cx); dot.setAttribute("cy", cy); dot.setAttribute("r", 8);
        dot.setAttribute("fill", "#2B2D42");
        svg.appendChild(dot);

        // Right Angle Square
        if (angle === 90) {
            const sqSize = 25;
            const sq = document.createElementNS("http://www.w3.org/2000/svg", "path");
            // Draw lines for square: from (cx+sq, cy) to (cx+sq, cy-sq) to (cx, cy-sq)
            const dSq = `M ${cx + sqSize} ${cy} L ${cx + sqSize} ${cy - sqSize} L ${cx} ${cy - sqSize}`;
            sq.setAttribute("d", dSq);
            sq.setAttribute("stroke", color);
            sq.setAttribute("stroke-width", "3");
            sq.setAttribute("fill", "none");
            svg.appendChild(sq);
        }
    }

    // --- Learn Mode ---
    function updateLearn() {
        const slider = document.getElementById('angle-slider');
        const angle = parseInt(slider.value);
        const t = translations[currentLang].types;
        
        let typeKey = '';
        let color = '';

        if (angle === 0) { typeKey = 'zero'; color = "#A0AEC0"; }
        else if (angle < 90) { typeKey = 'acute'; color = "#FFBE0B"; } // Yellow
        else if (angle === 90) { typeKey = 'right'; color = "#FF006E"; } // Pink
        else if (angle < 180) { typeKey = 'obtuse'; color = "#8338EC"; } // Purple
        else if (angle === 180) { typeKey = 'straight'; color = "#3A86FF"; } // Blue
        else if (angle < 360) { typeKey = 'reflex'; color = "#06D6A0"; } // Green
        else if (angle === 360) { typeKey = 'full'; color = "#FB5607"; } // Orange

        document.getElementById('val-deg').textContent = angle + "°";
        document.getElementById('val-deg').style.color = color;
        document.getElementById('val-name').textContent = t[typeKey];
        document.getElementById('val-name').style.color = color;

        drawAngle(document.getElementById('learn-svg'), angle, color);
    }

    // --- Quiz Mode ---
    function nextQuestion() {
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-restart').style.display = 'none';

        // Select Random Type
        const types = ['acute', 'right', 'obtuse', 'straight', 'reflex', 'full'];
        currentQuizKey = types[Math.floor(Math.random() * types.length)];
        
        // Determine Angle
        let angle = 0;
        let color = '#333';
        switch(currentQuizKey) {
            case 'acute': angle = Math.floor(Math.random() * 80) + 5; color="#FFBE0B"; break;
            case 'right': angle = 90; color="#FF006E"; break;
            case 'obtuse': angle = Math.floor(Math.random() * 80) + 95; color="#8338EC"; break;
            case 'straight': angle = 180; color="#3A86FF"; break;
            case 'reflex': angle = Math.floor(Math.random() * 100) + 190; color="#06D6A0"; break;
            case 'full': angle = 360; color="#FB5607"; break;
        }

        drawAngle(document.getElementById('quiz-svg'), angle, color);

        // Generate Options
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const t = translations[currentLang];
        // Create pool of keys including the correct one
        let pool = ['acute', 'right', 'obtuse', 'straight', 'reflex', 'full'];
        // Shuffle pool
        pool.sort(() => Math.random() - 0.5);
        // Ensure correct one is in the first 4, then slice
        if (pool.indexOf(currentQuizKey) >= 4) {
            // swap to be in range
            pool[pool.indexOf(currentQuizKey)] = pool[0];
            pool[0] = currentQuizKey;
        }
        const options = pool.slice(0, 4).sort(() => Math.random() - 0.5);

        options.forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            
            // Split title for formatting if needed, e.g. "Acute (ወጣር)"
            const label = t.types[key];
            btn.innerHTML = `${label}`;
            
            btn.onclick = () => handleAnswer(key);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selectedKey) {
        const t = translations[currentLang];
        const overlay = document.getElementById('feedback');
        const icon = document.getElementById('fb-icon');
        const title = document.getElementById('fb-title');
        const sub = document.getElementById('fb-sub');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');

        if (selectedKey === currentQuizKey) {
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('angleTypesHighScore', highScore);
            }
            document.getElementById('score').textContent = score;
            document.getElementById('high-score').textContent = highScore;
            
            AudioEngine.playSuccess();
            triggerConfetti();
            
            icon.textContent = '🎉';
            title.textContent = t.correct;
            title.style.color = "var(--green)";
            sub.textContent = "";
            btnNext.style.display = 'block';
            btnRestart.style.display = 'none';
        } else {
            AudioEngine.playGameOver();
            AudioEngine.playError();
            
            icon.textContent = '❌';
            title.textContent = t.gameover;
            title.style.color = "var(--primary)";
            sub.textContent = t.finalScore + score;
            
            btnNext.style.display = 'none';
            btnRestart.style.display = 'block';
        }
        overlay.classList.add('show');
    }

    function restartGame() {
        score = 0;
        document.getElementById('score').textContent = 0;
        nextQuestion();
    }

    // --- Language Change ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', (e) => {
        selectCustom.classList.toggle('open'); e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                this.classList.add('selected');
                
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                selectCustom.classList.remove('open');
                
                currentLang = value;
                updateLanguage();
            }
        });
    });

    window.addEventListener('click', (e) => {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('tab-learn').textContent = t.tabLearn;
        document.getElementById('tab-quiz').textContent = t.tabQuiz;
        document.getElementById('quiz-q').textContent = t.qText;
        document.getElementById('btn-next').textContent = t.btnNext;
        document.getElementById('btn-restart').textContent = t.btnRestart;
        
        updateLearn();
        // If in quiz mode and answer pending, update buttons? 
        // Simpler to just update the explore view text immediately.
    }

    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<80; i++) {
            pieces.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20 - 10,
                c: `hsl(${Math.random()*360}, 100%, 50%)`,
                r: Math.random() * 6 + 3
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.5;
                if(p.y < canvas.height) active = true;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            if(active) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;

</script>

<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODMAS Quiz - ቦድማስ ሕቶታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8338EC;   /* Purple */
            --secondary: #FF006E; /* Pink */
            --accent: #FFBE0B;    /* Yellow */
            --success: #3A86FF;   /* Blue */
            --bg: #F0F9FF;
            --text: #2d3748;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(131, 56, 236, 0.2) 0%, transparent 20%),
                radial-gradient(circle at 85% 85%, rgba(255, 0, 110, 0.2) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(58, 134, 255, 0.1) 0%, transparent 50%);
            background-size: 100% 100%;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 8px solid var(--accent);
            border-radius: 0 0 30px 30px;
        }

        .header-left, .header-right { width: 160px; }
        .header-center { flex-grow: 1; text-align: center; }

        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            box-shadow: 0 4px 0 #c90055;
            border: 3px solid white;
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--primary);
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px 0 #e9d5ff;
            letter-spacing: 1px;
        }

        /* --- Custom Dropdown --- */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: bold; color: white;
            height: 50px; background: var(--success); 
            border-radius: 25px; box-shadow: 0 5px 0 #205ebb;
            width: 160px; transition: 0.2s;
            border: 3px solid white;
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 8px;
            border-radius: 20px; padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 4px solid var(--success);
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        
        .custom-option { 
            padding: 10px 15px; font-weight: 700; background: #f0f9ff;
            border-radius: 12px; color: var(--text);
            cursor: pointer; transition: 0.2s;
        }
        .custom-option:hover { background: var(--success); color: white; transform: translateX(5px); }
        .custom-option.selected { background: var(--primary); color: white; }
        
        .arrow { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid white; transition: 0.3s; }
        .custom-select.open .arrow { transform: rotate(180deg); }

        /* --- Game Container --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; text-align: center; }

        .bot-container {
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
            display: inline-block;
            position: relative;
            z-index: 10;
        }
        .bot-face {
            font-size: 4rem;
            display: flex; align-items: center; justify-content: center;
            background: white; border-radius: 50%;
            width: 100px; height: 100px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            border: 5px solid var(--success);
        }
        .bot-msg {
            background: white;
            padding: 15px 25px;
            border-radius: 25px;
            box-shadow: 0 8px 0 #e2e8f0;
            display: inline-block;
            margin-left: 15px;
            font-weight: 800;
            color: var(--primary);
            position: relative;
            transform: translateY(-40px);
            border: 3px solid var(--primary);
            font-size: 1.1rem;
            min-width: 200px;
        }
        .bot-msg::before {
            content: ''; position: absolute; left: -12px; top: 50%;
            border-top: 12px solid transparent; border-bottom: 12px solid transparent;
            border-right: 12px solid var(--primary);
        }

        .quiz-card {
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 0 rgba(0,0,0,0.05);
            border: 6px solid white;
            position: relative;
            overflow: visible;
        }

        /* HUD */
        .hud-bar {
            position: absolute;
            top: -25px; right: 20px;
            background: #2d3748;
            color: white;
            border-radius: 25px;
            padding: 8px 20px;
            display: inline-flex;
            gap: 15px;
            box-shadow: 0 5px 0 #1a202c;
            border: 3px solid white;
            z-index: 20;
        }
        .hud-item { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .hud-label { font-size: 0.7rem; font-weight: bold; color: #a0aec0; text-transform: uppercase; }
        .hud-value { font-size: 1.2rem; font-weight: 900; color: var(--accent); }

        /* Progress */
        .progress-container {
            width: 100%;
            background: #edf2f7;
            height: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
            border: 2px solid #cbd5e1;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--secondary));
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 10px;
        }

        /* Equation */
        .equation-box {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 40px;
            letter-spacing: 2px;
            background: #f8fafc;
            padding: 30px;
            border-radius: 30px;
            border: 4px dashed #cbd5e1;
            display: inline-block;
            min-width: 320px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
            text-shadow: 2px 2px 0 white;
        }

        /* Options */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: white;
            border: 3px solid #e2e8f0;
            border-radius: 25px;
            padding: 25px;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 10px 0 #cbd5e1;
            transition: transform 0.1s;
            position: relative;
        }
        .option-btn:hover { background: #f1f5f9; transform: translateY(-3px); }
        .option-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 #cbd5e1; }
        .option-btn:disabled { cursor: default; opacity: 0.7; }

        .option-btn.correct {
            background: #dcfce7;
            border-color: #22c55e;
            color: #15803d;
            box-shadow: 0 10px 0 #15803d;
            animation: bounce 0.5s;
        }
        .option-btn.wrong {
            background: #fee2e2;
            border-color: #ef4444;
            color: #991b1b;
            box-shadow: 0 10px 0 #991b1b;
            animation: shake 0.5s;
        }

        /* Explanation */
        .explanation-panel {
            background: #e0f2fe;
            border-radius: 25px;
            padding: 25px;
            border: 4px solid var(--success);
            text-align: center;
            display: none;
            animation: popIn 0.3s;
            margin-top: 20px;
        }
        .exp-title { font-size: 1.8rem; font-weight: 900; color: var(--success); display: block; margin-bottom: 10px; }
        .exp-text { font-size: 1.2rem; color: #1e40af; font-weight: bold; margin-bottom: 5px; }
        .exp-step { font-size: 1.4rem; font-weight: 900; color: var(--primary); background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 15px; display: inline-block; }

        /* Next Button */
        .btn-next {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 50px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #5a189a;
            margin-top: 20px;
            display: none;
            animation: popIn 0.3s;
            border: 4px solid white;
        }
        .btn-next:hover { transform: scale(1.05); }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }

        /* BODMAS Badge */
        .bodmas-badge {
            position: absolute;
            top: 20px; left: 20px;
            background: var(--accent);
            color: #744210;
            padding: 8px 15px;
            border-radius: 15px;
            font-weight: 900;
            border: 3px solid white;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transform: rotate(-5deg);
            cursor: help;
        }
        .bodmas-tooltip {
            position: absolute; top: 60px; left: 20px;
            background: white; border: 3px solid var(--accent);
            padding: 15px; border-radius: 15px;
            text-align: left; font-weight: bold;
            display: none; z-index: 50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .bodmas-badge:hover + .bodmas-tooltip { display: block; }

        /* Game Over */
        .game-over-container {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            z-index: 50; border-radius: 35px;
            backdrop-filter: blur(5px);
        }
        .go-title { font-size: 3.5rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; transform: rotate(-3deg); text-shadow: 4px 4px 0 rgba(0,0,0,0.1); }
        .go-score-box { background: var(--accent); color: #2d3748; padding: 20px 40px; border-radius: 25px; margin-bottom: 30px; box-shadow: 0 10px 0 #d97706; border: 4px solid white; }
        .go-val { font-size: 4rem; font-weight: 900; line-height: 1; }
        
        .btn-restart {
            background: var(--secondary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-size: 1.8rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 10px 0 #9f1239; transition: all 0.2s;
            border: 4px solid white;
        }
        .btn-restart:active { transform: translateY(6px); box-shadow: none; }

        /* Utils */
        .hidden { display: none !important; }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 60; border-radius: 40px; }
        .confetti { position: absolute; width: 15px; height: 15px; background: var(--primary); animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(800px) rotate(720deg); opacity: 0; } }

        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 0.5rem 1rem; flex-wrap: wrap; gap: 10px; }
            .header-center { order: 3; width: 100%; margin-top: 5px; }
            .header-left, .header-right { width: auto; }
            .equation-box { font-size: 2.5rem; min-width: 100%; padding: 20px; }
            .bot-face { width: 70px; height: 70px; font-size: 3rem; }
            .bot-msg { font-size: 0.9rem; padding: 10px 15px; min-width: 150px; }
            .option-btn { font-size: 1.8rem; padding: 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="header-title">ቦድማስ ሕቶታት</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div class="arrow"></div>
                </div>
                <div class="custom-select__options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <div class="bot-container">
        <div class="bot-face">🤖</div>
        <div class="bot-msg" id="bot-text">
            ሰላም! ነዚ ሕቶ ፈትሕዎ።
        </div>
    </div>

    <div class="quiz-card">
        <div id="confetti-container"></div>
        
        <div class="bodmas-badge">BODMAS?</div>
        <div class="bodmas-tooltip">
            B = Brackets (ቅንፍ)<br>
            O = Orders (ሓይሊ)<br>
            D = Division (ምምቃል)<br>
            M = Multiplication (ምራብ)<br>
            A = Addition (ምድማር)<br>
            S = Subtraction (ምጉዳል)
        </div>

        <div class="hud-bar">
            <div class="hud-item">
                <span class="hud-label" id="lbl-record">Record</span>
                <span class="hud-value" id="high-score">0</span>
            </div>
            <div style="width: 1px; background: #4a5568;"></div>
            <div class="hud-item">
                <span class="hud-label" id="lbl-score">Score</span>
                <span class="hud-value" id="current-score">0</span>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-fill" id="progress-bar"></div>
        </div>

        <div id="game-view">
            <div class="equation-box" id="equation">
                2 + 3 x 4
            </div>

            <div class="options-grid" id="options-container">
                <!-- Buttons injected by JS -->
            </div>

            <div class="explanation-panel" id="explanation">
                <span class="exp-title" id="exp-title">ብሉጽ!</span>
                <div id="exp-text" class="exp-text"></div>
                <div class="exp-step" id="exp-step"></div>
            </div>

            <button class="btn-next" onclick="nextQuestion()" id="btn-next">
                ቀፃሊ (Next) ➡
            </button>
        </div>

        <!-- Game Over Overlay -->
        <div id="game-over-view" class="game-over-container hidden">
            <div class="go-title" id="lbl-gameover">Game Over!</div>
            <div class="go-score-box">
                <div style="font-weight:bold; margin-bottom:5px;" id="lbl-final">ውፅኢት</div>
                <div class="go-val" id="final-score">0</div>
            </div>
            <button class="btn-restart" onclick="restartGame()">
                <span id="lbl-restart">እንደገና ጸውት</span> 🔄
            </button>
        </div>

    </div>
</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playTone(freq, type, duration, startTime=0) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(this.ctx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + startTime + duration);
            osc.stop(this.ctx.currentTime + startTime + duration);
        },
        playCorrect() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            this.playTone(600, 'sine', 0.1, 0);
            this.playTone(800, 'sine', 0.1, 0.1);
            this.playTone(1200, 'sine', 0.3, 0.2);
        },
        playWrong() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            this.playTone(150, 'sawtooth', 0.3, 0);
            this.playTone(100, 'sawtooth', 0.4, 0.1);
        },
        playWin() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            this.playTone(523, 'sine', 0.2, 0); 
            setTimeout(() => this.playTone(659, 'sine', 0.2), 200);
            setTimeout(() => this.playTone(784, 'sine', 0.4), 400);
        }
    };

    const translations = {

            ruleBrack: "መጀመርታ ቅንፍ ንስራሕ፡"

            botCorrect: "ጎበዝ!",
            botWrong: "አይደለም፣ እንደገና ይሞክሩ።",
            next: "ቀጣይ",
            great: "ትክክል!",

            botStart: "Haye! Xali su'aashan.",
            botCorrect: "Shaqo wacan!",
            botWrong: "Maya, isku day mar kale.",
            next: "Xiga",
            great: "Sax!",
            oops: "Qaldan!",

            record: "Rikoodh",
            gameover: "Ciyaartu way dhamaatay!",
            final: "Dhibco",
            restart: "Mar kale ciyaar",

            ruleDiv: "Qaybinta ayaa horeysa:",
            ruleBrack: "Qawsta ayaa horeysa:"
        }
    };

    // Quiz Data
    const questions = [
        { q: "2 + 3 x 4", ans: 14, distractor: 20, rule: "ruleMult", step: "3 x 4 = 12 → 2 + 12 = 14" },
        { q: "10 - 6 ÷ 2", ans: 7, distractor: 2, rule: "ruleDiv", step: "6 ÷ 2 = 3 → 10 - 3 = 7" },
        { q: "5 + 10 ÷ 5", ans: 7, distractor: 3, rule: "ruleDiv", step: "10 ÷ 5 = 2 → 5 + 2 = 7" },
        { q: "(2 + 3) x 5", ans: 25, distractor: 17, rule: "ruleBrack", step: "2 + 3 = 5 → 5 x 5 = 25" },
        { q: "4 x 2 + 5", ans: 13, distractor: 28, rule: "ruleMult", step: "4 x 2 = 8 → 8 + 5 = 13" },
        { q: "20 ÷ (2 + 3)", ans: 4, distractor: 13, rule: "ruleBrack", step: "2 + 3 = 5 → 20 ÷ 5 = 4" }
    ];

    let currentLang = 'ti';
    let currentQIndex = 0;
    let score = 0;
    let highScore = localStorage.getItem('bodmasHighScore') || 0;
    let answered = false;

    // --- Logic ---

    function restartGame() {
        score = 0;
        currentQIndex = 0;
        updateUI();
        document.getElementById('game-over-view').classList.add('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        answered = false;
        const qData = questions[currentQIndex];
        const t = translations[currentLang];

        document.getElementById('equation').textContent = qData.q;
        document.getElementById('bot-text').textContent = t.botStart;
        document.getElementById('explanation').style.display = 'none';
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('confetti-container').innerHTML = '';
        
        // Progress
        const pct = ((currentQIndex) / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${pct}%`;

        // Generate Options
        let opts = [qData.ans, qData.distractor];
        let rnd = qData.ans + Math.floor(Math.random() * 5) + 1;
        if(rnd === qData.ans || rnd === qData.distractor) rnd += 2;
        opts.push(rnd);
        let rnd2 = qData.ans - Math.floor(Math.random() * 5) - 1;
        if(rnd2 === qData.ans || rnd2 === qData.distractor || rnd2 < 0) rnd2 = qData.ans + 10;
        opts.push(rnd2);

        opts.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        opts.forEach(val => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = val;
            btn.onclick = () => checkAnswer(val, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selectedVal, btnElement) {
        if(answered) return;
        answered = true;

        const qData = questions[currentQIndex];
        const t = translations[currentLang];
        const expPanel = document.getElementById('explanation');
        const botText = document.getElementById('bot-text');

        if(selectedVal === qData.ans) {
            // Correct
            score += 10;
            updateUI();
            btnElement.classList.add('correct');
            botText.textContent = t.botCorrect;
            AudioEngine.playCorrect();
            triggerConfetti();
            
            document.getElementById('exp-title').textContent = t.great;
            document.getElementById('exp-title').style.color = 'var(--success)';
        } else {
            // Wrong
            score = Math.max(0, score - 5); // Penalty
            updateUI();
            btnElement.classList.add('wrong');
            botText.textContent = t.botWrong;
            AudioEngine.playWrong();
            
            // Highlight correct one
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(b => {
                if(parseInt(b.textContent) === qData.ans) {
                    b.classList.add('correct');
                    b.style.opacity = '0.7';
                }
            });

            document.getElementById('exp-title').textContent = t.oops;
            document.getElementById('exp-title').style.color = '#ef4444';
        }

        // Disable all buttons
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);

        // Show Explanation
        expPanel.style.display = 'block';
        document.getElementById('exp-text').textContent = t[qData.rule];
        document.getElementById('exp-step').textContent = qData.step;
        
        document.getElementById('btn-next').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQIndex++;
        if(currentQIndex >= questions.length) {
            // Level Complete
            AudioEngine.playWin();
            
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('bodmasHighScore', highScore);
            }
            updateUI();
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over-view').classList.remove('hidden');
        } else {
            renderQuestion();
        }
    }

    function updateUI() {
        document.getElementById('current-score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    // --- Confetti ---
    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        const colors = ['#8338EC', '#FF006E', '#FFBE0B', '#3A86FF'];
        
        for(let i=0; i<40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            if(Math.random() > 0.5) conf.style.borderRadius = '50%';
            container.appendChild(conf);
        }
    }

    // --- Dropdown ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() {
        selectCustom.classList.toggle('open');
    });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                currentLang = value;
                updateText();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) {
            selectCustom.classList.remove('open');
        }
    });

    function updateText() {
        const t = translations[currentLang];
        document.getElementById('header-title').textContent = t.title;
        document.getElementById('btn-next').textContent = t.next + " ➡";
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-record').textContent = t.record;
        document.getElementById('lbl-gameover').textContent = t.gameover;
        document.getElementById('lbl-final').textContent = t.final;
        document.getElementById('lbl-restart').textContent = t.restart;
        
        // Refresh question view text if mid-game
        if(!answered) document.getElementById('bot-text').textContent = t.botStart;
    }

    // Initial Load
    window.onload = function() {
        updateUI();
        restartGame();
    }

</script>
</body>
</html>

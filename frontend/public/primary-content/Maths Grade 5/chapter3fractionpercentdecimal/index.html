
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraction, Percent, Decimal - ጉዚ፣ ሚኢታዊ፣ ደሲማል</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361EE;   /* Vibrant Blue */
            --secondary: #F72585; /* Pink */
            --accent: #4CC9F0;    /* Cyan */
            --yellow: #FFD93D;    /* Sunny Yellow */
            --success: #6BCB77;   /* Green */
            --bg-gradient: linear-gradient(135deg, #E0C3FC 0%, #8EC5FC 100%);
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text: #2B2D42;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 217, 61, 0.45), transparent 42%),
                radial-gradient(circle at 85% 15%, rgba(247, 37, 133, 0.22), transparent 40%),
                radial-gradient(circle at 20% 85%, rgba(76, 201, 240, 0.24), transparent 45%),
                radial-gradient(circle at 80% 85%, rgba(107, 203, 119, 0.20), transparent 46%),
                var(--bg-gradient);
            background-attachment: fixed; /* Keep gradient fixed on scroll */
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--glass-border);
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.4rem;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--text);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
        }

        /* --- Custom Language Dropdown --- */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            position: relative;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
            font-size: 1.1rem; font-weight: 800;
            color: var(--primary);
            height: 50px;
            background: #ffffff;
            cursor: pointer;
            border: 3px solid var(--primary);
            border-radius: 25px;
            box-shadow: 0 6px 0 rgba(67, 97, 238, 0.2);
            width: 160px;
            transition: transform 0.2s;
        }
        .custom-select__trigger:hover { transform: translateY(-2px); }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-options {
            position: absolute;
            top: 120%; left: 0; right: 0;
            background: #fff;
            border: 3px solid #e9ecef;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden;
            transform: translateY(-15px);
            padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option {
            padding: 10px 15px; font-weight: 700; font-size: 1rem;
            border-radius: 12px; cursor: pointer;
            border: 2px solid transparent;
        }
        .custom-option:hover { background-color: var(--primary); color: white; border-color: var(--primary); transform: scale(1.02); }
        .custom-option.selected { background-color: #e0f2fe; color: var(--primary); border-color: var(--primary); }

        /* --- Main Content --- */
        .container {
            width: 100%;
            max-width: 1200px; /* Bigger max width for desktop */
            margin: 22px auto;
            padding: 0 18px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Balanced layout */
            gap: 26px;
            align-items: start;
        }

        /* --- The Grid (Left Side) --- */
        .grid-panel {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 4px solid white;
            position: sticky;
            top: 96px;
        }

        .grid-panel::before {
            content: "";
            position: absolute;
            inset: -10px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.22), rgba(247, 37, 133, 0.18), rgba(255, 217, 61, 0.18), rgba(76, 201, 240, 0.18));
            filter: blur(16px);
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
        }

        .grid-panel > * { position: relative; z-index: 1; }

        h2 { font-size: 2rem; font-weight: 900; margin-bottom: 20px; color: var(--primary); }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: #2B2D42;
            padding: 8px;
            border-radius: 16px;
            width: 100%;
            max-width: min(420px, calc(100vh - 320px));
            aspect-ratio: 1;
            cursor: pointer;
            touch-action: none;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .cell {
            background-color: #E9ECEF;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            transition: transform 0.1s;
        }
        .cell:hover { transform: scale(0.9); background-color: #DEE2E6; }
        
        .cell.active {
            background-color: var(--secondary);
            box-shadow: 0 0 10px var(--secondary); /* Glowing effect */
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }
        @keyframes popIn { 0% { transform: scale(0.5); } 70% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .slider-container {
            width: 100%;
            max-width: min(420px, calc(100vh - 320px));
            margin-top: 18px;
            padding: 0 10px;
        }

        input[type=range] {
            width: 100%;
            height: 20px;
            border-radius: 15px;
            background: #d3d3d3;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.1); }

        .controls {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            width: 100%;
            max-width: min(420px, calc(100vh - 320px));
        }
        .btn {
            flex: 1;
            padding: 15px 20px;
            border-radius: 25px;
            border: none;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 6px 0 rgba(0,0,0,0.15);
            transition: transform 0.1s;
            display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        .btn:active { transform: translateY(6px); box-shadow: none; }
        .btn-clear { background: #FFD6E0; color: #D00000; border: 3px solid #D00000; }
        .btn-fill { background: #C5F6FA; color: #007EA7; border: 3px solid #007EA7; }

        .btn-clear:hover { transform: translateY(-2px); box-shadow: 0 10px 0 rgba(208, 0, 0, 0.18); }
        .btn-fill:hover { transform: translateY(-2px); box-shadow: 0 10px 0 rgba(0, 126, 167, 0.18); }

        /* --- The Display (Right Side) --- */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .display-card {
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 12px solid;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .display-card::before {
            content: "";
            position: absolute;
            inset: -4px;
            background: radial-gradient(circle at 10% 20%, rgba(255, 217, 61, 0.20), transparent 40%),
                        radial-gradient(circle at 90% 15%, rgba(247, 37, 133, 0.16), transparent 40%),
                        radial-gradient(circle at 85% 85%, rgba(76, 201, 240, 0.16), transparent 45%);
            filter: blur(18px);
            opacity: 0.95;
            z-index: 0;
            pointer-events: none;
        }

        .display-card > * { position: relative; z-index: 1; }
        .display-card:hover { transform: translateX(10px); }

        .card-fraction { border-color: var(--primary); background: linear-gradient(to right, #ffffff, #f0f7ff); }
        .card-percent { border-color: var(--secondary); background: linear-gradient(to right, #ffffff, #fff0f6); }
        .card-decimal { border-color: var(--yellow); background: linear-gradient(to right, #ffffff, #fffdf0); }

        .card-title {
            font-size: 1.5rem;
            color: #555;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .card-icon { font-size: 2.5rem; }
        
        .card-value {
            font-size: 4rem; /* HUGE font for numbers */
            font-weight: 900;
            color: var(--text);
            text-shadow: 2px 2px 0 rgba(255,255,255,1);
        }

        .simplified {
            font-size: 1.5rem;
            color: white;
            background: var(--primary);
            padding: 8px 16px;
            border-radius: 15px;
            margin-top: 10px;
            display: inline-block;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(67, 97, 238, 0.3);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Helper Text --- */
        .helper-text {
            background: #E0F2F1;
            border: 4px dashed #009688;
            padding: 25px;
            border-radius: 25px;
            margin-top: 10px;
            font-size: 1.2rem;
            color: #004D40;
            line-height: 1.6;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        /* Mobile */
        @media (max-width: 900px) {
            .container { 
                grid-template-columns: 1fr;
                gap: 14px; 
                padding: 0 14px;
                margin: 12px auto;
                min-height: auto;
                align-items: start;
            }
            header { flex-wrap: wrap; gap: 10px; padding: 1rem; }
            h1 { font-size: 1.2rem; }
            .grade-badge { width: 40px; height: 40px; font-size: 1.1rem; }

            h2 { font-size: 1.2rem; margin-bottom: 8px; }
            
            .grid-panel {
                padding: 8px;
                width: 100%;
                position: relative;
                top: auto;
                border-radius: 26px;
                height: auto;
                justify-content: flex-start;
            }

            .grid-container { max-width: min(74vw, 40vh); aspect-ratio: 1; }
            .slider-container { max-width: min(74vw, 40vh); margin-top: 8px; padding: 0 6px; }
            .controls { max-width: min(74vw, 40vh); margin-top: 8px; gap: 10px; }

            .info-panel {
                width: 100%;
                gap: 12px;
                height: auto;
                overflow: visible;
                padding-bottom: 0;
            }
            .display-card { padding: 14px; border-radius: 20px; border-left-width: 10px; }
            
            .card-value { font-size: 2.2rem; }
            .card-title { font-size: 1rem; gap: 10px; }
            .card-icon { font-size: 1.8rem; }
            .simplified { font-size: 1.05rem; padding: 6px 10px; border-radius: 12px; }
            .helper-text { padding: 14px; border-radius: 18px; font-size: 1rem; }
            
            .controls { flex-direction: row; }
            .btn { width: auto; font-size: 1.05rem; padding: 12px 10px; }
            
            /* Ensure slider thumb is touch friendly */
            input[type=range]::-webkit-slider-thumb { width: 30px; height: 30px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
        <h1 id="app-title">Fraction, Percent, Decimal</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div style="font-size:0.8rem">▼</div>
                </div>
                <div class="custom-options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <!-- LEFT: Grid Painter -->
    <div class="grid-panel">
        <h2 id="panel-title">Grid Painter</h2>
        <div class="grid-container" id="grid">
            <!-- 100 Cells Generated by JS -->
        </div>

        <div class="slider-container">
            <input type="range" min="0" max="100" value="0" id="range-slider" oninput="updateFromSlider(this.value)">
        </div>

        <div class="controls">
            <button class="btn btn-clear" onclick="clearGrid()" id="btn-clear">Clear 🗑️</button>
            <button class="btn btn-fill" onclick="fillGrid(100)" id="btn-fill">Fill All 🎨</button>
        </div>
    </div>

    <!-- RIGHT: Info Display -->
    <div class="info-panel">
        
        <!-- Fraction -->
        <div class="display-card card-fraction">
            <div>
                <div class="card-title"><span class="card-icon">🍰</span> <span id="lbl-frac">Fraction</span></div>
                <div id="simplified-frac" class="simplified hidden"></div>
            </div>
            <div class="card-value">
                <span id="val-num">0</span>/<span id="val-den">100</span>
            </div>
        </div>

        <!-- Percentage -->
        <div class="display-card card-percent">
            <div>
                <div class="card-title"><span class="card-icon">🔋</span> <span id="lbl-perc">Percentage</span></div>
            </div>
            <div class="card-value" style="color:var(--secondary);"><span id="val-perc">0</span>%</div>
        </div>

        <!-- Decimal -->
        <div class="display-card card-decimal">
            <div>
                <div class="card-title"><span class="card-icon">💠</span> <span id="lbl-dec">Decimal</span></div>
            </div>
            <div class="card-value" style="color:#F59E0B;" id="val-dec">0.00</div>
        </div>

        <div class="helper-text">
            <strong id="helper-title" style="font-size:1.4rem; display:block; margin-bottom:10px;">Did you know?</strong>
            <span id="helper-desc">Percent means "per 100". So 50% is 50 blocks out of 100.</span>
        </div>

    </div>

</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: null,
        init() {
            if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        playPop(pitch = 1) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.frequency.setValueAtTime(400 * pitch, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600 * pitch, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.1);
        },
        playSuccess() {
            this.init();
            const now = this.ctx.currentTime;
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, now + i*0.1);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i*0.1 + 0.3);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now + i*0.1);
                osc.stop(now + i*0.1 + 0.3);
            });
        }
    };

    // --- Translations ---
    const translations = {
        ti: {
            appTitle: "ጉዚ፣ ሚኢታዊ፣ ደሲማል",
            panelTitle: "ግሪድ",
            frac: "ጉዚ (Fraction)",
            perc: "ሚኢታዊ (Percentage)",
            dec: "ደሲማል (Decimal)",
            clear: "ኣጽሪ",
            fill: "ምላእ",
            helperTitle: "ትፈልጡ ዶ?",
            helperDesc: "ሚኢታዊ ማለት 'ካብ 100' ማለት እዩ። ስለዚ 50% ማለት ካብ 100 ሳንዱቅ 50 ማለት እዩ።"
        },
        am: {
            appTitle: "ክፍልፋይ፣ ፐርሰንት፣ አስርዮሽ",
            panelTitle: "ግሪድ",
            frac: "ክፍልፋይ (Fraction)",
            perc: "ፐርሰንት (Percentage)",
            dec: "አስርዮሽ (Decimal)",
            clear: "አጽዳ",
            fill: "ሙላ",
            helperTitle: "ይህንን ያውቃሉ?",
            helperDesc: "ፐርሰንት ማለት 'ከ 100' ማለት ነው። ስለዚህ 50% ማለት ከ 100 ሳጥኖች 50 ማለት ነው።"
        },
        en: {
            appTitle: "Fractions, Percents, Decimals",
            panelTitle: "Grid Painter",
            frac: "Fraction",
            perc: "Percentage",
            dec: "Decimal",
            clear: "Clear",
            fill: "Fill All",
            helperTitle: "Did you know?",
            helperDesc: "Percent means 'per 100'. So 50% is 50 blocks out of 100."
        },
        om: {
            appTitle: "Firakshinii, Dhibbeentaa, Desimaalii",
            panelTitle: "Giriidii",
            frac: "Firakshinii (Fraction)",
            perc: "Dhibbeentaa (Percentage)",
            dec: "Desimaalii (Decimal)",
            clear: "Qulqulleessi",
            fill: "Guuti",
            helperTitle: "Beektuu laata?",
            helperDesc: "Dhibbeentaa jechuun 'dhibba keessaa' jechuudha. Kanaaf 50% jechuun saanduqa 100 keessaa 50 jechuudha."
        },
        so: {
            appTitle: "Jajab, Boqolley, Tobanle",
            panelTitle: "Shabaqa",
            frac: "Jajab (Fraction)",
            perc: "Boqolley (Percentage)",
            dec: "Tobanle (Decimal)",
            clear: "Tirtir",
            fill: "Buuxi",
            helperTitle: "Ma ogtahay?",
            helperDesc: "Boqolley waxay ka dhigan tahay 'boqolkiiba'. Markaa 50% waa 50 sanduuq oo ka mid ah 100."
        }
    };

    let currentLang = 'ti';
    let filledCount = 0;
    let isDrawing = false;

    // --- Init Grid ---
    const gridContainer = document.getElementById('grid');
    for (let i = 0; i < 100; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        
        // Mouse Events
        cell.addEventListener('mousedown', (e) => startDraw(e, i));
        cell.addEventListener('mouseenter', (e) => draw(e, i));
        
        // Touch Events
        cell.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e, i); }, {passive: false});
        
        gridContainer.appendChild(cell);
    }

    // Touch Move Handling (since touchmove doesn't fire on elements like mouseenter)
    gridContainer.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if(!isDrawing) return;
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if(target && target.classList.contains('cell')) {
            const index = parseInt(target.dataset.index);
            toggleCell(index, true); // Force fill on drag
        }
    }, {passive: false});

    window.addEventListener('mouseup', endDraw);
    window.addEventListener('touchend', endDraw);

    function startDraw(e, index) {
        isDrawing = true;
        toggleCell(index);
    }

    function draw(e, index) {
        if (isDrawing) {
            // When dragging, we generally want to paint, not toggle, to avoid flickering
            // But for simplicity, let's just fill if not filled
            const cells = document.querySelectorAll('.cell');
            if(!cells[index].classList.contains('active')) {
                toggleCell(index);
            }
        }
    }

    function endDraw() {
        isDrawing = false;
    }

    function toggleCell(index, forceFill = false) {
        const cells = document.querySelectorAll('.cell');
        const cell = cells[index];
        
        if (forceFill) {
            if (!cell.classList.contains('active')) {
                cell.classList.add('active');
                filledCount++;
                AudioEngine.playPop(1 + (filledCount/100));
            }
        } else {
            if (cell.classList.contains('active')) {
                cell.classList.remove('active');
                filledCount--;
                AudioEngine.playPop(0.8);
            } else {
                cell.classList.add('active');
                filledCount++;
                AudioEngine.playPop(1 + (filledCount/100));
            }
        }
        
        updateUI();
    }

    function updateFromSlider(val) {
        val = parseInt(val);
        const cells = document.querySelectorAll('.cell');
        
        // Fill up to val
        for(let i=0; i<100; i++) {
            if(i < val) {
                if(!cells[i].classList.contains('active')) cells[i].classList.add('active');
            } else {
                if(cells[i].classList.contains('active')) cells[i].classList.remove('active');
            }
        }
        filledCount = val;
        updateUI(false); // Don't move slider since we are moving it
        
        if(filledCount % 10 === 0 && filledCount > 0) AudioEngine.playPop(1.5);
    }

    function clearGrid() {
        updateFromSlider(0);
        updateUI();
    }

    function fillGrid() {
        updateFromSlider(100);
        updateUI();
        AudioEngine.playSuccess();
    }

    function updateUI(updateSlider = true) {
        // Update Slider
        if(updateSlider) document.getElementById('range-slider').value = filledCount;

        // Update Text Values
        document.getElementById('val-num').textContent = filledCount;
        document.getElementById('val-perc').textContent = filledCount;
        
        // Decimal (0.xx)
        let dec = (filledCount / 100).toFixed(2);
        document.getElementById('val-dec').textContent = dec;

        // Simplified Fraction
        const simp = simplifyFraction(filledCount, 100);
        const simpDiv = document.getElementById('simplified-frac');
        if (filledCount > 0 && (simp[0] !== filledCount || simp[1] !== 100)) {
            simpDiv.textContent = `= ${simp[0]}/${simp[1]}`;
            simpDiv.classList.remove('hidden');
        } else {
            simpDiv.classList.add('hidden');
        }

        // Trigger milestone sound
        if([25, 50, 75, 100].includes(filledCount) && isDrawing) {
            AudioEngine.playSuccess();
        }
    }

    function simplifyFraction(numerator, denominator) {
        if (numerator === 0) return [0, 100];
        var gcd = function(a, b) {
            return b ? gcd(b, a % b) : a;
        };
        var common = gcd(numerator, denominator);
        return [numerator / common, denominator / common];
    }

    // --- Language Change ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function(e) {
        selectCustom.classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                // Remove previous selection
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                
                // Select new
                this.classList.add('selected');
                
                // Update Label
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                
                // Close
                selectCustom.classList.remove('open');
                
                // Trigger Change
                currentLang = value;
                changeLanguage();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) {
            selectCustom.classList.remove('open');
        }
    });

    function changeLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.appTitle;
        document.getElementById('panel-title').textContent = t.panelTitle;
        document.getElementById('lbl-frac').textContent = t.frac;
        document.getElementById('lbl-perc').textContent = t.perc;
        document.getElementById('lbl-dec').textContent = t.dec;
        document.getElementById('btn-clear').textContent = t.clear + " 🗑️";
        document.getElementById('btn-fill').textContent = t.fill + " 🎨";
        document.getElementById('helper-title').textContent = t.helperTitle;
        document.getElementById('helper-desc').textContent = t.helperDesc;
    }
    
    // Initial Text Load
    changeLanguage();

</script>
</body>
</html>

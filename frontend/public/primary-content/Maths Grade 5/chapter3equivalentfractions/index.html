
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Equivalent Fractions - ተመጣጠንቲ ጉዚታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* New Color Palette: Fresh Mint & Berry */
            --primary: #06D6A0;   /* Mint Green */
            --secondary: #118AB2; /* Blue */
            --accent: #FFD166;    /* Yellow */
            --highlight: #EF476F; /* Pink/Red */
            --dark: #073B4C;      /* Deep Navy */
            
            /* Fresh, light gradient */
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
            /* Let's try a different one for variety as requested */
            --bg-gradient-new: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            
            --text: #073B4C;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient-new);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(255, 209, 102, 0.45), transparent 42%),
                radial-gradient(circle at 85% 15%, rgba(239, 71, 111, 0.28), transparent 40%),
                radial-gradient(circle at 20% 85%, rgba(6, 214, 160, 0.28), transparent 45%),
                radial-gradient(circle at 80% 85%, rgba(17, 138, 178, 0.28), transparent 46%),
                linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--secondary);
            border-radius: 0 0 25px 25px;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.4rem;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(17, 138, 178, 0.3);
            transform: rotate(-5deg);
        }

        h1 {
            color: var(--dark);
            font-size: 1.6rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 1px 1px 0 white;
        }

        /* --- Custom Language Dropdown --- */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--dark);
            height: 50px; background: #ffffff; cursor: pointer;
            border: 3px solid var(--dark); border-radius: 25px;
            width: 160px;
            box-shadow: 0 5px 0 rgba(7, 59, 76, 0.2);
            transition: all 0.2s;
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: #fff; border: 3px solid #e9ecef; border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .custom-option:hover { background: var(--secondary); color: white; transform: scale(1.05); }

        /* --- Main Content --- */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Score Board */
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            position: absolute;
            top: 30px;
            right: 30px;
        }

        .score-pill {
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 3px solid transparent;
        }
        .score-pill.current { color: var(--primary); border-color: var(--primary); }
        .score-pill.high { color: var(--accent); border-color: var(--accent); color: #b8860b; }

        /* Game Stage */
        .stage {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.08);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 6px solid white;
            position: relative;
            min-height: 500px;
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: -10px;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.30), rgba(17, 138, 178, 0.22), rgba(255, 209, 102, 0.22), rgba(239, 71, 111, 0.18));
            filter: blur(18px);
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
        }

        .stage > * { position: relative; z-index: 1; }

        .instruction {
            font-size: 1.5rem;
            color: var(--dark);
            font-weight: 900;
            margin-bottom: 40px;
            text-align: center;
            background: #D8F3DC; /* Light Mint */
            padding: 15px 30px;
            border-radius: 30px;
            border: 3px solid var(--primary);
            width: 100%;
            max-width: 800px;
            box-shadow: 0 5px 0 rgba(6, 214, 160, 0.3);
        }

        /* The Fractions Area */
        .fractions-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            width: 100%;
            margin-bottom: 40px;
        }

        /* Fraction Card */
        .f-card {
            background: white;
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            border: 4px solid #e9ecef;
            width: 320px;
            transition: transform 0.3s;
        }
        .f-card:hover { transform: translateY(-5px); }

        .f-card.target { border-color: var(--secondary); background: #E0FBFC; }
        .f-card.player { border-color: var(--primary); background: #fff; }

        .f-label {
            font-size: 1.2rem;
            font-weight: 900;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Fraction Text */
        .frac-text {
            font-size: 3rem;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }
        .frac-line {
            width: 70px;
            height: 6px;
            background: var(--dark);
            border-radius: 10px;
            margin: 8px 0;
        }
        .num-text { color: var(--highlight); }
        .den-text { color: var(--dark); }

        /* Pie Chart */
        .pie-container {
            width: 200px;
            height: 200px;
            position: relative;
            border-radius: 50%;
            background: #f1f5f9;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 6px solid white;
        }

        /* Slices for Player Interaction */
        .slice-btn {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            clip-path: polygon(50% 50%, 50% 0%, 100% 0%);
            background: transparent;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            opacity: 0.9;
        }

        /* Radial lines that show the slice boundaries for both pies */
        .slice-border {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 50%;
            background: rgba(255, 255, 255, 0.9);
            transform-origin: bottom center;
            pointer-events: none;
            z-index: 5;
        }

        .slice-btn:hover { opacity: 1; }
        
        /* Equals Sign */
        .equals-sign {
            font-size: 4rem;
            font-weight: 900;
            color: var(--dark);
            background: #fff;
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Controls */
        .btn-check {
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #049f76;
            transition: transform 0.2s;
        }
        .btn-check:hover { transform: scale(1.05); background: #05e0a8; }
        .btn-check:active { transform: translateY(6px); box-shadow: none; }

        /* Feedback */
        .feedback {
            margin-top: 30px;
            min-height: 80px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s;
        }
        .feedback.show { opacity: 1; transform: translateY(0); }
        
        .fb-title { font-size: 2rem; font-weight: 900; margin-bottom: 5px; }
        .fb-correct { color: var(--primary); }
        .fb-wrong { color: var(--highlight); }

        /* Game Over */
        .game-over-area {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }
        .game-over-area.show { display: flex; }
        .game-over-title { font-size: 3rem; color: var(--highlight); font-weight: 900; margin-bottom: 20px; }
        .btn-restart {
            background: var(--accent); color: #744210; border: none;
            padding: 20px 50px; border-radius: 50px; font-size: 1.8rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #d97706;
        }
        .btn-restart:active { transform: translateY(6px); box-shadow: none; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 500;
            background: rgba(7, 59, 76, 0.30);
            backdrop-filter: blur(12px);
        }

        .modal-overlay.show { display: flex; }

        .modal-box {
            width: min(520px, 100%);
            border-radius: 34px;
            padding: 22px;
            background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.90));
            border: 6px solid rgba(255,255,255,0.95);
            box-shadow: 0 26px 70px rgba(0,0,0,0.35);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.22s ease-out;
        }

        .modal-box::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: radial-gradient(circle at 15% 20%, rgba(6, 214, 160, 0.22), transparent 45%),
                        radial-gradient(circle at 85% 10%, rgba(239, 71, 111, 0.18), transparent 45%),
                        radial-gradient(circle at 85% 85%, rgba(255, 209, 102, 0.20), transparent 48%);
            filter: blur(14px);
            opacity: 0.9;
            pointer-events: none;
            z-index: 0;
        }

        .modal-box > * { position: relative; z-index: 1; }

        .modal-icon {
            width: 74px;
            height: 74px;
            border-radius: 22px;
            display: grid;
            place-items: center;
            margin: 0 auto 10px;
            font-size: 2.2rem;
            box-shadow: 0 12px 0 rgba(0,0,0,0.10);
            background: linear-gradient(135deg, rgba(255,209,102,0.95), rgba(239,71,111,0.70));
            border: 4px solid rgba(255,255,255,0.9);
        }

        .modal-title { font-size: 2.1rem; font-weight: 900; margin: 6px 0 6px; color: var(--dark); }
        .modal-sub { font-size: 1.15rem; font-weight: 800; margin: 0 0 12px; color: rgba(7, 59, 76, 0.85); }

        .modal-score {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(255,255,255,0.85);
            border: 3px solid rgba(7, 59, 76, 0.15);
            font-size: 1.2rem;
            font-weight: 900;
            margin: 10px 0 12px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.10);
        }

        .btn-modal {
            border: none;
            border-radius: 999px;
            padding: 14px 22px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            color: white;
            box-shadow: 0 10px 0 rgba(0,0,0,0.14);
            transition: transform 0.12s;
        }

        .btn-modal:active { transform: translateY(7px); box-shadow: none; }
        .btn-modal.next { background: linear-gradient(135deg, var(--primary), var(--secondary)); }
        .btn-modal.restart { background: linear-gradient(135deg, var(--accent), var(--highlight)); color: #4a2c0a; }

        /* Mobile */
        @media (max-width: 900px) {
            header { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            h1 { font-size: 1.3rem; }
            .container { padding: 10px; margin: 10px auto; }
            .stage { padding: 15px; border-width: 4px; border-radius: 25px; }

            /* Parallel Layout for Mobile */
            .fractions-wrapper {
                flex-direction: row; /* Force Row */
                gap: 5px;
                align-items: flex-start;
                justify-content: space-between;
                width: 100%;
                margin-bottom: 20px;
            }
            
            .f-card {
                width: 47%; /* Fit two */
                min-width: 0; /* Allow shrinking */
                padding: 10px;
                border-radius: 20px;
                gap: 10px;
                box-shadow: 0 5px 10px rgba(0,0,0,0.05);
            }

            .pie-container {
                width: 110px; /* Smaller pies */
                height: 110px;
                border-width: 3px;
            }

            .equals-sign {
                font-size: 1.5rem;
                width: 30px; height: 30px;
                min-width: 30px;
                margin-top: 80px; /* Push down to align roughly with centers */
                align-self: flex-start;
                background: transparent;
                box-shadow: none;
            }

            .frac-text { font-size: 1.8rem; }
            .frac-line { width: 40px; height: 3px; }
            .f-label { font-size: 0.9rem; }
            
            .score-board {
                position: static;
                width: 100%;
                justify-content: center;
                margin-bottom: 20px;
            }

            .btn-check { font-size: 1.2rem; padding: 15px 40px; }
            .instruction { font-size: 1.1rem; padding: 10px; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
        <h1 id="app-title">Equivalent Fractions</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div style="font-size:0.8rem">▼</div>
                </div>
                <div class="custom-options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="stage">
        
        <div class="score-board">
            <div class="score-pill high">
                <span>🏆</span> <span id="lbl-record">Record</span>: <span id="high-score">0</span>
            </div>
            <div class="score-pill current">
                <span>⭐</span> <span id="lbl-score">Score</span>: <span id="score">0</span>
            </div>
        </div>

        <div id="game-play-area">
            <p class="instruction" id="instruction">Make the fractions equal!</p>

            <div class="fractions-wrapper">
                
                <!-- Target Fraction (Read Only) -->
                <div class="f-card target">
                    <span class="f-label" id="lbl-target">Target</span>
                    <div class="pie-container" id="pie-target">
                        <!-- Static slices inserted here -->
                    </div>
                    <div class="frac-text">
                        <span class="num-text" id="target-num">1</span>
                        <div class="frac-line"></div>
                        <span class="den-text" id="target-den">2</span>
                    </div>
                </div>

                <div class="equals-sign">=</div>

                <!-- Player Fraction (Interactive) -->
                <div class="f-card player">
                    <span class="f-label" id="lbl-match">Match It!</span>
                    <div class="pie-container" id="pie-player">
                        <!-- Interactive slices inserted here -->
                    </div>
                    <div class="frac-text">
                        <span class="num-text" id="player-num">?</span>
                        <div class="frac-line"></div>
                        <span class="den-text" id="player-den">6</span>
                    </div>
                </div>

            </div>

            <div style="text-align: center;">
                <button class="btn-check" id="btn-action" onclick="checkAnswer()">Check Answer ✔️</button>
            </div>

            <div class="feedback" id="feedback">
                <div id="fb-title" class="fb-title"></div>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-area" class="game-over-area">
            <h2 class="game-over-title" id="lbl-gameover">Game Over!</h2>
            <div class="final-score">
                <span id="lbl-yourscore">Your Score:</span> <span style="color:var(--secondary); font-size:3rem; margin-left:10px;" id="final-score-val">0</span>
            </div>
            <button class="btn-restart" onclick="resetGame()">
                <span id="lbl-restart">Start Again</span> 🔄
            </button>
        </div>

    </div>
</div>

<div class="modal-overlay" id="reward-overlay" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true">
        <div class="modal-icon">🏅</div>
        <div class="modal-title" id="reward-title">Great Job!</div>
        <div class="modal-sub" id="reward-sub">You made them equal!</div>
        <div class="modal-score"><span>⭐</span> <span id="reward-score-label">Score</span>: <span id="reward-score">0</span></div>
        <button class="btn-modal next" id="reward-next" type="button" onclick="hideReward()">Next ➡</button>
    </div>
</div>

<div class="modal-overlay" id="gameover-overlay" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true">
        <div class="modal-icon">😵</div>
        <div class="modal-title" id="gameover-title">Game Over!</div>
        <div class="modal-sub" id="gameover-sub">Try again!</div>
        <div class="modal-score"><span>🏁</span> <span id="gameover-score-label">Your Score</span>: <span id="gameover-score">0</span></div>
        <button class="btn-modal restart" id="gameover-restart" type="button" onclick="hideGameOver()">Start Again 🔄</button>
    </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration, startTime=0) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(this.ctx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + startTime + duration);
            osc.stop(this.ctx.currentTime + startTime + duration);
        },
        playSuccess() { 
            this.playTone(600, 'sine', 0.1); 
            setTimeout(() => this.playTone(900, 'triangle', 0.3), 100);
        },
        playError() { 
            this.playTone(150, 'sawtooth', 0.2); 
            setTimeout(() => this.playTone(100, 'sawtooth', 0.3), 150);
        },
        playClick() {
            this.playTone(400, 'sine', 0.05);
        }
    };

    // --- Translations ---
    const translations = {
        ti: {
            title: "ተመጣጠንቲ ጉዚታት",
            instr: "እቶም ጉዚታት ማዕረ ግበርዎም!",
            check: "ፈትሽ ✔️",
            next: "ቀፃሊ ➡",
            correct: "ትኽክል! ተመጣጣኒ እዩ።",
            wrong: "ተጋግዩ! እቲ ክፋላት ማዕረ ኣይኮኑን።",
            target: "ዕላማ",
            match: "ማዕረ ግበሮ",
            lblScore: "ነጥቢ",
            lblRecord: "ክብረ ወሰን",
            gameover: "ጸወታ ተወዲኡ!",
            yourscore: "ውፅኢትኩም:",
            restart: "እንደገና ጀምር"
        },
        am: {
            title: "ተመጣጣኝ ክፍልፋዮች",
            instr: "ክፍልፋዮቹን እኩል ያድርጉ!",
            check: "ፈትሽ ✔️",
            next: "ቀጣይ ➡",
            correct: "ትክክል! ተመጣጣኝ ነው።",
            wrong: "ስህተት! ክፍሎቹ እኩል አይደሉም።",
            target: "ዒላማ",
            match: "አመጣጥን",
            lblScore: "ውጤት",
            lblRecord: "ከፍተኛ",
            gameover: "ጨዋታው አብቅቷል!",
            yourscore: "የእርስዎ ውጤት:",
            restart: "እንደገና ጀምር"
        },
        en: {
            title: "Equivalent Fractions",
            instr: "Make the fractions equal!",
            check: "Check Answer ✔️",
            next: "Next ➡",
            correct: "Correct! They are equivalent.",
            wrong: "Incorrect! The amounts are not equal.",
            target: "Target",
            match: "Match It",
            lblScore: "Score",
            lblRecord: "Record",
            gameover: "Game Over!",
            yourscore: "Your Score:",
            restart: "Start Again"
        },
        om: {
            title: "Firakshinii Wal-gitu",
            instr: "Firakshinii wal-qixxeessi!",
            check: "Mirkaneessi ✔️",
            next: "Itti Aanu ➡",
            correct: "Sirrii! Isaan wal-gitu.",
            wrong: "Dogoggora! Hinhiramanne.",
            target: "Kaayyoo",
            match: "Wal-qixxeessi",
            lblScore: "Qabxii",
            lblRecord: "Rikardii",
            gameover: "Tapha Dhumate!",
            yourscore: "Qabxii Keessan:",
            restart: "Irra Deebi'ii Jalqabi"
        },
        so: {
            title: "Jajabka Isle'eg",
            instr: "Ka dhig jajabyada isle'eg!",
            check: "Hubi ✔️",
            next: "Xiga ➡",
            correct: "Sax! Waa isle'eg yihiin.",
            wrong: "Qaldan! Ma isle'eka.",
            target: "Bartilmaameed",
            match: "Isku hagaaji",
            lblScore: "Dhibco",
            lblRecord: "Rikoodh",
            gameover: "Ciyaartu way dhamaatay!",
            yourscore: "Dhibcahaaga:",
            restart: "Dib u billow"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('equivFractionsHighScore') || 0;
    
    // Game State
    let target = { num: 1, den: 2 };
    let player = { num: 0, den: 6 }; // Denom will change per level
    let multiplier = 2;
    let isSolved = false;

    // --- Logic ---
    function initGame() {
        score = 0;
        updateScoreBoard();
        document.getElementById('game-over-area').classList.remove('show');
        document.getElementById('game-play-area').style.display = 'block';
        nextLevel();
    }

    function nextLevel() {
        isSolved = false;
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('btn-action').textContent = translations[currentLang].check;
        document.getElementById('btn-action').onclick = checkAnswer;

        // Generate Problem
        // Base fractions: 1/2, 1/3, 2/3, 1/4, 3/4
        const bases = [
            {n:1, d:2}, {n:1, d:3}, {n:2, d:3}, {n:1, d:4}, {n:3, d:4}
        ];
        const base = bases[Math.floor(Math.random() * bases.length)];
        
        target.num = base.n;
        target.den = base.d;
        
        // Multiplier 2 or 3 (to keep denom <= 12 usually)
        multiplier = Math.floor(Math.random() * 2) + 2; // 2 or 3
        
        player.den = target.den * multiplier;
        player.num = 0; // Reset player selection

        renderLevel();
    }

    function renderLevel() {
        // Render Target
        document.getElementById('target-num').textContent = target.num;
        document.getElementById('target-den').textContent = target.den;
        renderPie('pie-target', target.num, target.den, true);

        // Render Player (Empty initially)
        document.getElementById('player-num').textContent = "?";
        document.getElementById('player-den').textContent = player.den;
        renderPie('pie-player', 0, player.den, false); // 0 filled
    }

    function renderPie(id, filled, total, isStatic) {
        const container = document.getElementById(id);
        container.innerHTML = ''; // Clear

        const sliceAngle = 360 / total;

        // If static, simple conic fill using the secondary color
        if(isStatic) {
             const percentage = (filled / total) * 100;
             container.style.background = `conic-gradient(var(--secondary) 0% ${percentage}%, transparent ${percentage}% 100%)`;
        }

        for (let i = 0; i < total; i++) {
            const rotation = i * sliceAngle;
            
            if (!isStatic) {
                // Interactive Buttons
                const btn = document.createElement('div');
                btn.className = 'slice-btn';

                // Alternate subtle colors so slices are visible even before selection
                const baseColor = (i % 2 === 0)
                    ? 'rgba(17, 138, 178, 0.18)'
                    : 'rgba(6, 214, 160, 0.18)';

                btn.style.background = `conic-gradient(${baseColor} 0deg ${sliceAngle-2}deg, transparent ${sliceAngle-2}deg 360deg)`;
                btn.style.transform = `rotate(${rotation}deg)`;
                
                btn.dataset.index = i;
                btn.onclick = () => toggleSlice(i, btn, total);

                container.appendChild(btn);
            }
            
            // Add Borders (Lines) for both
            const line = document.createElement('div');
            line.className = 'slice-border';
            line.style.transform = `translateX(-50%) rotate(${i * sliceAngle}deg)`;
            container.appendChild(line);
        }
    }

    function toggleSlice(index, btn, total) {
        if(isSolved) return;
        AudioEngine.playClick();
        
        // Toggle class
        const isActive = btn.classList.contains('active');
        const sliceAngle = 360 / total;

        // Alternate colors per slice for clearer wedges
        const baseColor = (index % 2 === 0)
            ? 'rgba(17, 138, 178, 0.18)'
            : 'rgba(6, 214, 160, 0.18)';
        const activeColor = (index % 2 === 0)
            ? 'var(--primary)'
            : 'var(--secondary)';

        if (isActive) {
            btn.classList.remove('active');
            btn.style.background = `conic-gradient(${baseColor} 0deg ${sliceAngle-2}deg, transparent ${sliceAngle-2}deg 360deg)`;
            player.num--;
        } else {
            btn.classList.add('active');
            btn.style.background = `conic-gradient(${activeColor} 0deg ${sliceAngle-2}deg, transparent ${sliceAngle-2}deg 360deg)`;
            player.num++;
        }

        document.getElementById('player-num').textContent = player.num;
    }

    function checkAnswer() {
        if(isSolved) return;

        // Logic: Compare values
        const tVal = target.num / target.den;
        const pVal = player.num / player.den;

        // Floating point safe compare
        const isCorrect = Math.abs(tVal - pVal) < 0.001;

        const t = translations[currentLang];
        const fbTitle = document.getElementById('fb-title');
        const fbArea = document.getElementById('feedback');

        if (isCorrect) {
            // Win
            isSolved = true;
            score += 10;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('equivFractionsHighScore', highScore);
            }
            updateScoreBoard();
            
            AudioEngine.playSuccess();
            triggerConfetti();

            fbTitle.textContent = t.correct + " 🎉";
            fbTitle.className = "fb-title fb-correct";
            fbArea.classList.add('show');

            showReward();
        } else {
            // Fail - Game Over
            AudioEngine.playError();
            fbTitle.textContent = t.wrong + " ❌";
            fbTitle.className = "fb-title fb-wrong";
            fbArea.classList.add('show');
            
            setTimeout(() => {
                showGameOver();
            }, 1500);
        }
    }

    function showReward() {
        const t = translations[currentLang];
        const overlay = document.getElementById('reward-overlay');
        overlay.classList.add('show');
        overlay.setAttribute('aria-hidden', 'false');

        document.getElementById('reward-title').textContent = t.correct + ' 🎉';
        document.getElementById('reward-sub').textContent = '';
        document.getElementById('reward-score-label').textContent = t.lblScore;
        document.getElementById('reward-score').textContent = score;
        document.getElementById('reward-next').textContent = t.next;
    }

    function hideReward() {
        const overlay = document.getElementById('reward-overlay');
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden', 'true');
        nextLevel();
    }

    function showGameOver() {
        const t = translations[currentLang];

        document.getElementById('game-play-area').style.display = 'none';
        document.getElementById('game-over-area').classList.remove('show');

        const overlay = document.getElementById('gameover-overlay');
        overlay.classList.add('show');
        overlay.setAttribute('aria-hidden', 'false');

        document.getElementById('gameover-title').textContent = t.gameover;
        document.getElementById('gameover-sub').textContent = t.wrong;
        document.getElementById('gameover-score-label').textContent = t.yourscore;
        document.getElementById('gameover-score').textContent = score;
        document.getElementById('gameover-restart').textContent = t.restart + ' 🔄';
    }

    function hideGameOver() {
        const overlay = document.getElementById('gameover-overlay');
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden', 'true');
        resetGame();
    }

    function resetGame() {
        score = 0;
        updateScoreBoard();
        document.getElementById('game-over-area').classList.remove('show');
        document.getElementById('game-play-area').style.display = 'block';
        nextLevel();
    }

    function updateScoreBoard() {
        document.getElementById('score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    // --- Language Change ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function(e) {
        selectCustom.classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                this.classList.add('selected');
                
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                selectCustom.classList.remove('open');
                
                currentLang = value;
                changeLanguage();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function changeLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('instruction').textContent = t.instr;
        document.getElementById('lbl-target').textContent = t.target;
        document.getElementById('lbl-match').textContent = t.match;
        document.getElementById('lbl-score').textContent = t.lblScore;
        document.getElementById('lbl-record').textContent = t.lblRecord;
        document.getElementById('lbl-gameover').textContent = t.gameover;
        document.getElementById('lbl-yourscore').textContent = t.yourscore;
        document.getElementById('lbl-restart').textContent = t.restart;

        const rewardOverlay = document.getElementById('reward-overlay');
        if (rewardOverlay && rewardOverlay.classList.contains('show')) {
            document.getElementById('reward-title').textContent = t.correct + ' 🎉';
            document.getElementById('reward-score-label').textContent = t.lblScore;
            document.getElementById('reward-next').textContent = t.next;
        }

        const gameoverOverlay = document.getElementById('gameover-overlay');
        if (gameoverOverlay && gameoverOverlay.classList.contains('show')) {
            document.getElementById('gameover-title').textContent = t.gameover;
            document.getElementById('gameover-sub').textContent = t.wrong;
            document.getElementById('gameover-score-label').textContent = t.yourscore;
            document.getElementById('gameover-restart').textContent = t.restart + ' 🔄';
        }

        if(!isSolved) document.getElementById('btn-action').textContent = t.check;
        else document.getElementById('btn-action').textContent = t.next;
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<220; i++) {
            pieces.push({
                x: canvas.width/2,
                y: canvas.height/3,
                vx: (Math.random() - 0.5) * 22,
                vy: (Math.random() - 0.5) * 22 - 10,
                c: `hsl(${Math.random()*360}, 100%, 55%)`,
                r: Math.random() * 7 + 3,
                life: 0,
                rot: Math.random() * Math.PI
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            pieces.forEach(p => {
                p.life += 1;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.55;
                p.vx *= 0.99;
                p.rot += 0.15;

                if (p.y < canvas.height && p.life < 170) active = true;
                ctx.beginPath();
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.rect(-p.r, -p.r/2, p.r*2, p.r);
                ctx.restore();
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            if(active) requestAnimationFrame(anim);
        }
        anim();
    }

    // Init
    window.onload = function() {
        updateScoreBoard();
        changeLanguage();
        initGame();
    }

</script>


<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Angles & Measurement - ኩርናዓትን መዐቀንን</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant Candy Palette */
            --primary: #7209B7;   /* Deep Purple */
            --secondary: #4CC9F0; /* Bright Cyan */
            --accent: #F72585;    /* Hot Pink */
            --yellow: #F9C74F;    /* Sunny Yellow */
            --green: #43AA8B;     /* Mint Green */
            --text: #2B2D42;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            /* Fun Gradient Background */
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--accent);
            border-radius: 0 0 30px 30px;
        }

        .grade-badge {
            background: var(--accent);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            border: 4px solid white;
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--primary);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0 15px;
            text-align: center;
            background: white;
            padding: 5px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.05);
        }

        /* Custom Select */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text);
            height: 50px; background: #fff; cursor: pointer;
            border: 3px solid #e2e8f0; border-radius: 25px;
            width: 160px; font-size: 1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #cbd5e0;
        }
        .custom-select__trigger:hover { border-color: var(--secondary); transform: scale(1.05); }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-options {
            position: absolute; top: 125%; left: 0; right: 0;
            background: #fff; border: 3px solid #e2e8f0; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden; transform: translateY(-15px);
            padding: 8px; display: flex; flex-direction: column; gap: 5px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 10px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .custom-option:hover { background: #E0E7FF; color: var(--primary); }

        /* --- Container --- */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
            background: rgba(255,255,255,0.6);
            padding: 10px;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            background: transparent;
            color: #718096;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--yellow);
            color: #744210;
            box-shadow: 0 5px 0 #D97706;
            transform: translateY(-3px);
            border: 2px solid #FFF;
        }
        .tab-btn.active:active { transform: translateY(0); box-shadow: none; }

        /* Card */
        .card {
            background-color: #FFF9F0; /* Creamy */
            /* Polka Dot Pattern */
            background-image: 
                radial-gradient(rgba(247, 37, 133, 0.1) 20%, transparent 20%),
                radial-gradient(rgba(249, 199, 79, 0.1) 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border: 8px solid white;
            width: 100%;
            min-height: 600px;
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.active { display: flex; }

        /* --- Visual Area (Protractor) --- */
        .protractor-container {
            width: 100%;
            max-width: 550px;
            height: 320px;
            position: relative;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            background: white;
            border-radius: 40px;
            border: 4px dashed #E2E8F0;
            padding-bottom: 20px;
        }

        #protractor-svg {
            overflow: visible;
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.1));
        }

        .angle-readout {
            position: absolute;
            top: -25px;
            background: white;
            padding: 10px 30px;
            border-radius: 25px;
            border: 4px solid var(--primary);
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--primary);
            box-shadow: 0 8px 0 rgba(114, 9, 183, 0.2);
            z-index: 10;
        }

        .slider-group {
            width: 100%;
            max-width: 550px;
            background: white;
            padding: 25px;
            border-radius: 30px;
            border: 4px solid #E2E8F0;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        input[type="range"] {
            width: 100%;
            height: 25px;
            border-radius: 15px;
            background: #CBD5E0;
            outline: none;
            cursor: pointer;
            margin-top: 10px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 45px; height: 45px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 5px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* --- Quiz Mode --- */
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .score-pill {
            background: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.3rem;
            border: 3px solid #eee;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 6px 0 #eee;
        }
        .score-pill.high { color: #B7791F; border-color: var(--yellow); background: #FFFBEB; }
        .score-pill.curr { color: var(--green); border-color: var(--green); background: #F0FFF4; }

        .quiz-question {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 30px;
            text-align: center;
            background: #E2E8F0;
            padding: 20px 30px;
            border-radius: 25px;
            width: 100%;
            border-left: 8px solid var(--primary);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 650px;
            margin-top: 30px;
        }

        .opt-btn {
            background: white;
            border: 3px solid #E2E8F0;
            padding: 25px;
            border-radius: 25px;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text);
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 8px 0 #CBD5E0;
        }
        .opt-btn:hover { border-color: var(--secondary); background: #EBF8FF; transform: translateY(-4px); }
        .opt-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Feedback Overlay */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s;
        }
        .feedback-overlay.show { display: flex; }

        .fb-icon { font-size: 8rem; margin-bottom: 10px; animation: popIn 0.5s; }
        .fb-title { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
        .fb-sub { font-size: 1.5rem; color: #718096; margin-bottom: 40px; font-weight: bold; }
        
        .btn-action {
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.6rem; font-weight: 900;
            color: white; border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .btn-next { background: var(--secondary); box-shadow: 0 8px 0 #1D4ED8; }
        .btn-next:hover { transform: scale(1.05); }
        .btn-restart { background: var(--accent); box-shadow: 0 8px 0 #C53030; }
        .btn-restart:hover { transform: scale(1.05); }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }

        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 10px 15px; flex-wrap: wrap; justify-content: center; gap: 10px; }
            .grade-badge { width: 40px; height: 40px; font-size: 1.2rem; }
            h1 { font-size: 1.3rem; margin: 0 5px; width: 100%; }
            .custom-select-wrapper { width: 100%; display: flex; justify-content: center; }
            .custom-select__trigger { width: 100%; max-width: 250px; }
            
            .container { padding: 0 15px; margin: 20px auto; }
            .card { padding: 20px; border-width: 4px; min-height: 480px; border-radius: 30px; }
            .protractor-container { height: 220px; }
            .angle-readout { font-size: 2rem; padding: 5px 15px; top: -15px; }
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            .opt-btn { padding: 15px; font-size: 1.2rem; }
            .tabs { gap: 10px; }
            .tab-btn { padding: 10px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="grade-badge">5</div>
    <h1 id="app-title">Angles & Measurement</h1>
    <div class="custom-select-wrapper">
        <div class="custom-select">
            <div class="custom-select__trigger">
                <span id="current-lang-label">🗺️ ትግርኛ</span>
                <div style="font-size:0.8rem">▼</div>
            </div>
            <div class="custom-options">
                <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                <span class="custom-option" data-value="am">አማርኛ</span>
                <span class="custom-option" data-value="en">English</span>
                <span class="custom-option" data-value="om">Afan Oromoo</span>
                <span class="custom-option" data-value="so">Soomaali</span>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('learn')" id="tab-learn">Learn 📐</button>
        <button class="tab-btn" onclick="switchMode('quiz')" id="tab-quiz">Quiz 🎮</button>
    </div>

    <!-- LEARN MODE -->
    <div id="card-learn" class="card active">
        <div class="protractor-container">
            <div class="angle-readout" id="learn-val">90°</div>
            <svg id="protractor-svg" width="400" height="250" viewBox="0 0 400 250">
                <!-- Dynamic Content Drawn by JS -->
            </svg>
        </div>
        
        <div class="slider-group">
            <p id="learn-inst" style="text-align:center; font-weight:bold; margin-bottom:10px; color:#555; font-size:1.2rem;">Drag to measure!</p>
            <input type="range" id="angle-slider" min="0" max="180" value="90" oninput="updateLearn()">
        </div>
    </div>

    <!-- QUIZ MODE -->
    <div id="card-quiz" class="card">
        <div class="score-board">
            <div class="score-pill high">🏆 <span id="high-score">0</span></div>
            <div class="score-pill curr">⭐ <span id="score">0</span></div>
        </div>

        <div class="quiz-question" id="quiz-q">Measure this angle!</div>

        <div class="protractor-container" style="height: 220px;">
            <svg id="quiz-svg" width="400" height="250" viewBox="0 0 400 250">
                <!-- Quiz Angle -->
            </svg>
        </div>

        <div class="options-grid" id="options-container">
            <!-- Buttons injected here -->
        </div>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedback">
            <div class="fb-icon" id="fb-icon">🎉</div>
            <div class="fb-title" id="fb-title">Correct!</div>
            <div class="fb-sub" id="fb-sub"></div>
            
            <button class="btn-action btn-next" onclick="nextQuestion()" id="btn-next">Next ➡</button>
            <button class="btn-action btn-restart" onclick="restartGame()" id="btn-restart" style="display:none;">Play Again 🔄</button>
        </div>
    </div>

</div>

<canvas id="confetti-canvas"></canvas>

<script>
    // --- Audio ---
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playSuccess() { 
            this.playTone(600, 'sine', 0.1); setTimeout(() => this.playTone(800, 'sine', 0.2), 100); 
        },
        playError() { 
            this.playTone(200, 'sawtooth', 0.2); setTimeout(() => this.playTone(150, 'sawtooth', 0.3), 150);
        },
        playGameOver() {
            this.playTone(300, 'sawtooth', 0.4); setTimeout(() => this.playTone(200, 'sawtooth', 0.6), 400);
        }
    };

    // --- Translations ---
    const translations = {
        ti: {
            title: "ኩርናዓትን መዐቀንን",
            tabLearn: "መዐቀኒ (Learn) 📐",
            tabQuiz: "ጸወታ (Quiz) 🎮",
            learnInst: "ንምዐቃን ስሓብ!",
            quizQ: "እዚ ኩርናዕ ክንደይ ዲግሪ እዩ?",
            correct: "ትኽክል!",
            wrong: "ተጋግዩ!",
            gameover: "ጸወታ ተወዲኡ!",
            finalScore: "ውፅኢትኩም: ",
            btnNext: "ቀፃሊ ➡",
            btnRestart: "እንደገና ጀምር 🔄"
        },
        am: {
            title: "አንግል እና መለኪያ",
            tabLearn: "መለማመጃ 📐",
            tabQuiz: "ጨዋታ 🎮",
            learnInst: "ለመስራት ይጎትቱ!",
            quizQ: "ይህ አንግል ስንት ዲግሪ ነው?",
            correct: "ትክክል!",
            wrong: "ስህተት!",
            gameover: "ጨዋታው አብቅቷል!",
            finalScore: "የእርስዎ ውጤት: ",
            btnNext: "ቀጣይ ➡",
            btnRestart: "እንደገና ጀምር 🔄"
        },
        en: {
            title: "Angles & Measurement",
            tabLearn: "Learn 📐",
            tabQuiz: "Quiz 🎮",
            learnInst: "Drag to measure!",
            quizQ: "Measure this angle!",
            correct: "Correct!",
            wrong: "Incorrect!",
            gameover: "Game Over!",
            finalScore: "Your Score: ",
            btnNext: "Next ➡",
            btnRestart: "Play Again 🔄"
        },
        om: {
            title: "Kofoo fi Safara",
            tabLearn: "Baradhu 📐",
            tabQuiz: "Qormaata 🎮",
            learnInst: "Safaruuf harkisi!",
            quizQ: "Kofoo kana safari!",
            correct: "Sirrii!",
            wrong: "Dogoggora!",
            gameover: "Tapha Dhumate!",
            finalScore: "Qabxii Keessan: ",
            btnNext: "Itti Aanu ➡",
            btnRestart: "Irra Deebi'ii 🔄"
        },
        so: {
            title: "Xaglaha & Cabbirka",
            tabLearn: "Baro 📐",
            tabQuiz: "Imtixaan 🎮",
            learnInst: "Jiid si aad u cabbirto!",
            quizQ: "Cabbir xagashan!",
            correct: "Sax!",
            wrong: "Qaldan!",
            gameover: "Ciyaartu way dhamaatay!",
            finalScore: "Dhibcahaaga: ",
            btnNext: "Xiga ➡",
            btnRestart: "Dib u billow 🔄"
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('angleHighScore') || 0;
    let currentQuizAngle = 0;

    // --- Core Logic ---

    function init() {
        document.getElementById('high-score').textContent = highScore;
        updateLanguage();
        drawProtractor(document.getElementById('protractor-svg'));
        updateLearn();
    }

    function switchMode(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+mode).classList.add('active');
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+mode).classList.add('active');
        
        if (mode === 'quiz') nextQuestion();
    }

    // --- SVG Drawing ---
    function drawProtractor(svg, angle = 0, showArm = false) {
        svg.innerHTML = '';
        const cx = 200, cy = 220, r = 180;

        // Semi-circle background
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", `M ${cx-r} ${cy} A ${r} ${r} 0 0 1 ${cx+r} ${cy} L ${cx} ${cy} Z`);
        path.setAttribute("fill", "rgba(76, 201, 240, 0.2)"); // Semi-transparent blue
        path.setAttribute("stroke", "#4CC9F0");
        path.setAttribute("stroke-width", "3");
        svg.appendChild(path);

        // Tick Marks & Labels
        for (let i = 0; i <= 180; i += 10) {
            const rad = (i * Math.PI) / 180;
            const x1 = cx - r * Math.cos(rad);
            const y1 = cy - r * Math.sin(rad);
            const r2 = (i % 90 === 0) ? r - 20 : r - 10;
            const x2 = cx - r2 * Math.cos(rad);
            const y2 = cy - r2 * Math.sin(rad);

            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("stroke", "#2B2D42");
            line.setAttribute("stroke-width", (i % 90 === 0) ? "3" : "1");
            svg.appendChild(line);

            // Text Labels (Every 30 deg)
            if (i % 30 === 0) {
                const rText = r - 35;
                const xt = cx - rText * Math.cos(rad);
                const yt = cy - rText * Math.sin(rad);
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", xt); text.setAttribute("y", yt);
                text.setAttribute("text-anchor", "middle");
                text.setAttribute("dominant-baseline", "middle");
                text.setAttribute("fill", "#2B2D42");
                text.setAttribute("font-size", "14");
                text.setAttribute("font-weight", "bold");
                text.textContent = i;
                svg.appendChild(text);
            }
        }

        // Base Line
        const baseLine = document.createElementNS("http://www.w3.org/2000/svg", "line");
        baseLine.setAttribute("x1", cx); baseLine.setAttribute("y1", cy);
        baseLine.setAttribute("x2", cx + r); baseLine.setAttribute("y2", cy);
        baseLine.setAttribute("stroke", "#2B2D42");
        baseLine.setAttribute("stroke-width", "5");
        baseLine.setAttribute("stroke-linecap", "round");
        svg.appendChild(baseLine);

        // Moving Arm (Red)
        if (showArm || angle > 0) {
            const rad = (angle * Math.PI) / 180;
            const xArm = cx + r * Math.cos(-rad); // SVG Y is down, so negative rad for math standard
            const yArm = cy + r * Math.sin(-rad);
            
            const arm = document.createElementNS("http://www.w3.org/2000/svg", "line");
            arm.setAttribute("x1", cx); arm.setAttribute("y1", cy);
            arm.setAttribute("x2", xArm); arm.setAttribute("y2", yArm);
            arm.setAttribute("stroke", "#F72585");
            arm.setAttribute("stroke-width", "5");
            arm.setAttribute("stroke-linecap", "round");
            svg.appendChild(arm);

            // Angle Arc
            const rArc = 50;
            const xArc = cx + rArc * Math.cos(-rad);
            const yArc = cy + rArc * Math.sin(-rad);
            const largeArc = 0;
            const sweep = 0; 
            
            const arcPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
            if (angle > 0) {
                const d = `M ${cx + rArc} ${cy} A ${rArc} ${rArc} 0 ${largeArc} ${sweep} ${xArc} ${yArc}`;
                arcPath.setAttribute("d", d);
                arcPath.setAttribute("fill", "rgba(247, 37, 133, 0.2)");
                arcPath.setAttribute("stroke", "#F72585");
                arcPath.setAttribute("stroke-width", "2");
                svg.appendChild(arcPath);
            }
        }

        // Center Point
        const center = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        center.setAttribute("cx", cx); center.setAttribute("cy", cy); center.setAttribute("r", 6);
        center.setAttribute("fill", "black");
        svg.appendChild(center);
    }

    // --- Learn Mode ---
    function updateLearn() {
        const val = document.getElementById('angle-slider').value;
        document.getElementById('learn-val').textContent = val + "°";
        drawProtractor(document.getElementById('protractor-svg'), val, true);
    }

    // --- Quiz Mode ---
    function nextQuestion() {
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-restart').style.display = 'none';

        // Generate Random Angle (multiples of 5 for easier reading)
        currentQuizAngle = Math.floor(Math.random() * 36) * 5; // 0 to 180
        if(currentQuizAngle === 0) currentQuizAngle = 10;

        drawProtractor(document.getElementById('quiz-svg'), currentQuizAngle, true);

        // Generate Options
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        let opts = [currentQuizAngle];
        while(opts.length < 4) {
            let r = Math.floor(Math.random() * 36) * 5;
            if(!opts.includes(r) && r !== 0) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.textContent = opt + "°";
            btn.onclick = () => handleAnswer(opt);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selected) {
        const t = translations[currentLang];
        const overlay = document.getElementById('feedback');
        const icon = document.getElementById('fb-icon');
        const title = document.getElementById('fb-title');
        const sub = document.getElementById('fb-sub');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');

        if (selected === currentQuizAngle) {
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('angleHighScore', highScore);
            }
            document.getElementById('score').textContent = score;
            document.getElementById('high-score').textContent = highScore;
            
            AudioEngine.playSuccess();
            triggerConfetti();
            
            icon.textContent = '🎉';
            title.textContent = t.correct;
            title.style.color = "var(--green)";
            sub.textContent = "";
            btnNext.style.display = 'block';
            btnRestart.style.display = 'none';
        } else {
            AudioEngine.playGameOver();
            AudioEngine.playError();
            
            icon.textContent = '❌';
            title.textContent = t.gameover;
            title.style.color = "var(--primary)";
            sub.textContent = t.finalScore + score;
            
            btnNext.style.display = 'none';
            btnRestart.style.display = 'block';
        }
        overlay.classList.add('show');
    }

    function restartGame() {
        score = 0;
        document.getElementById('score').textContent = 0;
        nextQuestion();
    }

    // --- Translations ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', (e) => {
        selectCustom.classList.toggle('open'); e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                this.classList.add('selected');
                
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                selectCustom.classList.remove('open');
                
                currentLang = value;
                updateLanguage();
            }
        });
    });

    window.addEventListener('click', (e) => {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('tab-learn').textContent = t.tabLearn;
        document.getElementById('tab-quiz').textContent = t.tabQuiz;
        document.getElementById('learn-inst').textContent = t.learnInst;
        document.getElementById('quiz-q').textContent = t.quizQ;
        document.getElementById('btn-next').textContent = t.btnNext;
        document.getElementById('btn-restart').textContent = t.btnRestart;
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<80; i++) {
            pieces.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20 - 10,
                c: `hsl(${Math.random()*360}, 100%, 50%)`,
                r: Math.random() * 6 + 3
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.5;
                if(p.y < canvas.height) active = true;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            if(active) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;

</script>
</body>
</html>

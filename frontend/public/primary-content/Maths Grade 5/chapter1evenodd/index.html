<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even & Odd Game - ተገማስን ዘይተገማስን</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFBE0B;   /* Bright Yellow */
            --secondary: #FB5607; /* Orange */
            --pink: #FF006E;      /* Hot Pink */
            --purple: #8338EC;    /* Purple */
            --blue: #3A86FF;      /* Blue */
            --bg: #E0F7FA;        /* Light Cyan */
            --text: #2d3748;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 190, 11, 0.4) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 110, 0.3) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(58, 134, 255, 0.2) 0%, transparent 30%);
            background-size: 100% 100%;
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            user-select: none;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 8px solid var(--blue);
            border-radius: 0 0 30px 30px;
        }

        .header-left, .header-right { width: 160px; }
        .header-center { flex-grow: 1; text-align: center; }

        .grade-badge {
            background: var(--pink);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            box-shadow: 0 4px 0 #c90055;
            border: 3px solid white;
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--purple);
            font-size: 2rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 3px 3px 0 #ffd6ff;
            letter-spacing: 1px;
        }

        /* --- Custom Dropdown --- */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: bold; color: white;
            height: 50px; background: var(--blue); 
            border-radius: 25px; box-shadow: 0 5px 0 #205ebb;
            width: 160px; transition: 0.2s;
            border: 3px solid white;
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 8px;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 4px solid var(--blue);
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        
        .custom-option { 
            padding: 10px 15px; font-weight: 700; background: #f0f9ff;
            border-radius: 12px; color: var(--text);
            cursor: pointer; transition: 0.2s;
        }
        .custom-option:hover { background: var(--blue); color: white; transform: translateX(5px); }
        .custom-option.selected { background: var(--secondary); color: white; }
        
        .arrow { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid white; transition: 0.3s; }
        .custom-select.open .arrow { transform: rotate(180deg); }

        /* --- Game Content --- */
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; text-align: center; }

        .card {
            background: white;
            border-radius: 40px;
            padding: 40px 30px;
            box-shadow: 0 20px 0 rgba(0,0,0,0.05);
            border: 6px solid white;
            position: relative;
            overflow: visible; /* Allow HUD to pop out */
        }

        /* HUD (Heads Up Display) */
        .hud-bar {
            background: #2d3748;
            color: white;
            border-radius: 25px;
            padding: 10px 20px;
            display: inline-flex;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            border: 4px solid #4a5568;
            transform: rotate(-2deg);
        }

        .hud-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }
        .hud-label { font-size: 0.8rem; font-weight: bold; color: #a0aec0; text-transform: uppercase; }
        .hud-value { font-size: 1.8rem; font-weight: 900; line-height: 1; color: var(--primary); }
        .hud-icon { font-size: 1.5rem; }

        /* Question & Number */
        .question-label {
            font-size: 1.5rem;
            color: #4a5568;
            font-weight: 800;
            margin-bottom: 20px;
            background: #edf2f7;
            display: inline-block;
            padding: 10px 30px;
            border-radius: 20px;
        }

        .number-display {
            font-size: 5.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin: 10px 0 50px 0;
            color: #2d3748;
            display: flex;
            justify-content: center;
            gap: 5px;
            text-shadow: 4px 4px 0 #e2e8f0;
        }

        .digit { 
            display: inline-block; 
            padding: 0 5px;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .last-digit { 
            position: relative; 
            border-radius: 15px;
            padding: 0 15px;
            transition: all 0.5s;
        }
        
        /* Highlight States */
        .highlight-even { 
            background: var(--blue); color: white; 
            transform: scale(1.1) rotate(-5deg); 
            box-shadow: 0 10px 0 #205ebb;
            text-shadow: none;
        }
        .highlight-odd { 
            background: var(--pink); color: white; 
            transform: scale(1.1) rotate(5deg); 
            box-shadow: 0 10px 0 #c90055;
            text-shadow: none;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .choice-btn {
            flex: 1;
            max-width: 280px;
            padding: 25px;
            border-radius: 30px;
            border: none;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 12px 0 rgba(0,0,0,0.15);
            transition: all 0.1s;
            position: relative;
            color: white;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .choice-btn:active { transform: translateY(8px); box-shadow: 0 4px 0 rgba(0,0,0,0.15); }
        .choice-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: translateY(8px); box-shadow: none; }
        
        .btn-even { background: var(--blue); box-shadow: 0 12px 0 #205ebb; }
        .btn-even:hover { background: #4a90ff; }
        
        .btn-odd { background: var(--pink); box-shadow: 0 12px 0 #c90055; }
        .btn-odd:hover { background: #ff338a; }

        /* Explanation / Feedback */
        .feedback-area {
            min-height: 120px;
            background: #fffbeb;
            border: 4px dashed var(--primary);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
        }
        .feedback-title { font-size: 2rem; font-weight: 900; display: block; margin-bottom: 10px; }
        .feedback-desc { font-size: 1.3rem; color: #4a5568; font-weight: bold; }
        
        .msg-correct { color: var(--blue); animation: pop 0.4s; }
        .msg-wrong { color: var(--pink); animation: shake 0.5s; }

        /* Next Button */
        .btn-next {
            background: var(--purple); color: white; border: none;
            padding: 15px 50px; border-radius: 50px; font-weight: 900;
            cursor: pointer; box-shadow: 0 8px 0 #5a189a; font-size: 1.5rem;
            margin-top: 20px; transition: 0.2s;
            border: 4px solid white;
        }
        .btn-next:hover { transform: scale(1.05); }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }

        /* Game Over Screen */
        .game-over-container {
            position: absolute; top:0; left:0; width:100%; height:100%;
            background: rgba(255,255,255,0.95);
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            z-index: 50; border-radius: 35px;
            backdrop-filter: blur(5px);
        }
        .go-title { font-size: 3.5rem; font-weight: 900; color: var(--pink); margin-bottom: 20px; transform: rotate(-5deg); text-shadow: 4px 4px 0 rgba(0,0,0,0.1); }
        .go-score-box { background: var(--primary); color: #2d3748; padding: 20px 40px; border-radius: 20px; margin-bottom: 30px; box-shadow: 0 10px 0 #e0a800; border: 4px solid white; }
        .go-label { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .go-val { font-size: 4rem; font-weight: 900; line-height: 1; }

        .btn-restart {
            background: var(--secondary); color: white; border: none;
            padding: 20px 60px; border-radius: 50px; font-size: 1.8rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 10px 0 #c2410c; transition: all 0.2s;
            border: 4px solid white;
        }
        .btn-restart:hover { transform: scale(1.1) rotate(2deg); }
        .btn-restart:active { transform: translateY(6px); box-shadow: none; }

        /* Utilities */
        .hidden { display: none !important; }

        /* Animations */
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes pop { 50% { transform: scale(1.2); } }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 60; border-radius: 40px; }
        .confetti { position: absolute; width: 15px; height: 15px; background: var(--primary); animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(800px) rotate(720deg); opacity: 0; } }

        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 0.5rem 1rem; flex-wrap: wrap; gap: 10px; }
            .header-center { order: 3; width: 100%; margin-top: 5px; }
            .header-left, .header-right { width: auto; }
            .number-display { font-size: 3.5rem; letter-spacing: 2px; }
            .btn-group { flex-direction: column; gap: 15px; }
            .choice-btn { width: 100%; max-width: none; padding: 20px; font-size: 1.5rem; }
            .hud-bar { padding: 5px 15px; gap: 15px; transform: none; margin-bottom: 20px; }
            .hud-value { font-size: 1.5rem; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="header-title">ተገማስን ዘይተገማስን</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>

                </div>
                <div class="custom-select__options">

                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="card">
        <div id="confetti-container"></div>
        
        <!-- HUD -->
        <div class="hud-bar">
            <div class="hud-item">
                <span class="hud-label" id="lbl-record">Record</span>
                <span class="hud-value" id="high-score">0</span>
            </div>
            <div style="width: 2px; background: #4a5568;"></div>
            <div class="hud-item">
                <span class="hud-label" id="lbl-score">Score</span>
                <span class="hud-value" id="current-score">0</span>
            </div>
        </div>

        <!-- GAME AREA -->
        <div id="game-view">
            <div>
                <span class="question-label" id="instruction">እዚ ቁጽሪ ተገማሲ ድዩ ወይ ዘይተገማሲ?</span>
            </div>

            <div class="number-display" id="display-area">
                <!-- Digits injected by JS -->
            </div>

            <div class="btn-group">
                <button class="choice-btn btn-even" onclick="checkAnswer('even')">
                    <span style="font-size:2rem; display:block; margin-bottom:5px;">✌️</span>
                    <span id="lbl-even">ተገማሲ (Even)</span>
                </button>
                <button class="choice-btn btn-odd" onclick="checkAnswer('odd')">
                    <span style="font-size:2rem; display:block; margin-bottom:5px;">👆</span>
                    <span id="lbl-odd">ዘይተገማሲ (Odd)</span>
                </button>
            </div>

            <div class="feedback-area">
                <div id="feedback-content" class="hidden" style="width:100%">
                    <div id="feedback-title" class="feedback-title"></div>
                    <div id="feedback-desc" class="feedback-desc"></div>
                    <button class="btn-next" onclick="nextRound()" id="btn-next">
                        <span id="lbl-next">ቀፃሊ (Next)</span> ➡
                    </button>
                </div>
                <div id="feedback-placeholder" style="color:#cbd5e0; font-weight:bold; font-size:1.5rem;">
                    ?
                </div>
            </div>
        </div>

        <!-- GAME OVER OVERLAY -->
        <div id="game-over-view" class="game-over-container hidden">
            <div class="go-title" id="lbl-gameover">Game Over!</div>
            
            <div class="go-score-box">
                <div class="go-label" id="lbl-yourscore">ውፅኢትኩም</div>
                <div class="go-val" id="final-score">0</div>
            </div>
            
            <button class="btn-restart" onclick="resetGame()">
                <span id="lbl-playagain">እንደገና ጸውት</span> 🔄
            </button>
        </div>

    </div>
</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playTone(freq, type, duration, startTime = 0) {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start(this.ctx.currentTime + startTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + startTime + duration);
            osc.stop(this.ctx.currentTime + startTime + duration);
        },
        playCorrect() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            // Happy major chord arpeggio
            this.playTone(523.25, 'sine', 0.1, 0);   // C5
            this.playTone(659.25, 'sine', 0.1, 0.1); // E5
            this.playTone(783.99, 'sine', 0.3, 0.2); // G5
        },
        playWrong() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            // Buzzer
            this.playTone(150, 'sawtooth', 0.2, 0);
            this.playTone(120, 'sawtooth', 0.4, 0.1);
        },
        playNewRound() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            this.playTone(800, 'sine', 0.05, 0);
        }
    };

    const translations = {

            record: "ክብረ ወሰን",
            gameover: "ጸወታ ተወዲኡ!",
            yourscore: "ውፅኢትኩም",
            playagain: "እንደገና ተጻወቱ",
            explEven: "ምክንያቱ ኣብ ዓዲ ሓደ ዝርከብ {d} ተገማሲ ስለዝኮነ።",
            explOdd: "ምክንያቱ ኣብ ዓዲ ሓደ ዝርከብ {d} ዘይተገማሲ ስለዝኮነ።",
            langName: "ትግርኛ"
        },
        am: {
            title: "ተካፋይ እና ኢተካፋይ",
            inst: "ይህ ቁጥር ተካፋይ ነው ወይስ ኢተካፋይ?",
            even: "ተካፋይ",
            odd: "ኢተካፋይ",
            next: "ቀጣይ",
            correct: "ትክክል!",
            score: "ውጤት",
            record: "ከፍተኛ",
            gameover: "ጨዋታው አብቅቷል!",
            yourscore: "የእርስዎ ውጤት",
            playagain: "እንደገና ይጫወቱ",
            explEven: "ምክንያቱም የመጨረሻው ቁጥር {d} ተካፋይ ስለሆነ።",
            explOdd: "ምክንያቱም የመጨረሻው ቁጥር {d} ኢተካፋይ ስለሆነ።",
            langName: "አማርኛ"
        },
        en: {
            title: "Even & Odd",
            inst: "Is this number Even or Odd?",
            even: "Even",
            odd: "Odd",
            next: "Next",
            correct: "Correct!",
            score: "Score",
            record: "Record",
            gameover: "Game Over!",
            yourscore: "Your Score",
            playagain: "Play Again",
            explEven: "Because the last digit {d} is Even.",
            explOdd: "Because the last digit {d} is Odd.",
            langName: "English"
        },
        om: {
            title: "Hiramaa fi Hinhiramne",
            inst: "Lakkoofsi kun Hiramaa moo Hinhiramneedha?",
            even: "Hiramaa",
            odd: "Hinhiramne",
            next: "Itti Aanu",
            correct: "Sirrii!",
            score: "Qabxii",
            record: "Rikardii",
            gameover: "Tapha Dhumate!",
            yourscore: "Qabxii Keessan",
            playagain: "Irra Deebi'ii Taphadhu",
            explEven: "Sababiin isaas lakkoofsi dhumaa {d} hiramaa waan ta'eef.",
            explOdd: "Sababiin isaas lakkoofsi dhumaa {d} hinhiramne waan ta'eef.",
            langName: "Afan Oromoo"
        },
        so: {
            title: "Dhaban iyo Kinsi",
            inst: "Tiradani ma Dhaban baa mise waa Kinsi?",
            even: "Dhaban",
            odd: "Kinsi",
            next: "Xiga",
            correct: "Sax!",
            score: "Dhibco",
            record: "Rikoodh",
            gameover: "Ciyaartu way dhamaatay!",
            yourscore: "Dhibcahaaga",
            playagain: "Mar kale ciyaar",
            explEven: "Sababtoo ah tirada ugu dambaysa {d} waa Dhaban.",
            explOdd: "Sababtoo ah tirada ugu dambaysa {d} waa Kinsi.",
            langName: "Soomaali"
        }
    };

    let currentLang = 'ti';
    let currentNumber = 0;
    let score = 0;
    let highScore = localStorage.getItem('evenOddHighScore') || 0;
    let roundSolved = false;

    // --- Game Logic ---

    function resetGame() {
        score = 0;
        updateScoreUI();
        
        // Switch Views
        document.getElementById('game-over-view').classList.add('hidden');
        
        nextRound();
    }

    function nextRound() {
        roundSolved = false;
        AudioEngine.playNewRound();
        
        // Generate random number (10 - 9999)
        currentNumber = Math.floor(Math.random() * 9990) + 10;
        
        // Reset UI
        document.getElementById('feedback-content').classList.add('hidden');
        document.getElementById('feedback-placeholder').classList.remove('hidden');
        document.getElementById('confetti-container').innerHTML = '';
        
        // Re-enable buttons
        const btns = document.querySelectorAll('.choice-btn');
        btns.forEach(b => {
            b.disabled = false;
            b.style.transform = 'none';
            b.style.opacity = '1';
        });

        renderNumber(currentNumber);
    }

    function renderNumber(num) {
        const str = num.toString();
        const container = document.getElementById('display-area');
        container.innerHTML = '';
        
        const digits = str.split('');
        digits.forEach((d, i) => {
            const span = document.createElement('span');
            span.textContent = d;
            span.className = 'digit';
            // Staggered bounce animation
            span.style.animationDelay = `${i * 0.1}s`;
            
            if(i === digits.length - 1) {
                span.id = 'last-digit-el';
                span.className = 'digit last-digit';
            }
            container.appendChild(span);
        });
    }

    function checkAnswer(choice) {
        if(roundSolved) return;
        roundSolved = true;

        const lastDigit = currentNumber % 10;
        const isEven = lastDigit % 2 === 0;
        const correct = (isEven && choice === 'even') || (!isEven && choice === 'odd');

        const t = translations[currentLang];
        
        if(correct) {
            // --- CORRECT ---
            score++;
            updateScoreUI();
            AudioEngine.playCorrect();
            triggerConfetti();
            
            // Highlight
            const lastDigitEl = document.getElementById('last-digit-el');
            if(isEven) lastDigitEl.classList.add('highlight-even');
            else lastDigitEl.classList.add('highlight-odd');

            // Show Feedback
            document.getElementById('feedback-placeholder').classList.add('hidden');
            document.getElementById('feedback-content').classList.remove('hidden');
            
            const titleEl = document.getElementById('feedback-title');
            titleEl.textContent = t.correct;
            titleEl.className = 'feedback-title msg-correct';
            
            const explanation = isEven 
                ? t.explEven.replace('{d}', lastDigit) 
                : t.explOdd.replace('{d}', lastDigit);
            document.getElementById('feedback-desc').textContent = explanation;

            // Disable buttons visual
            const btns = document.querySelectorAll('.choice-btn');
            btns.forEach(b => {
                b.disabled = true;
                if(!b.classList.contains('btn-'+choice)) b.style.opacity = '0.5';
            });

        } else {
            // --- WRONG ---
            AudioEngine.playWrong();
            gameOver();
        }
    }

    function gameOver() {
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('evenOddHighScore', highScore);
        }
        updateScoreUI();

        document.getElementById('final-score').textContent = score;
        document.getElementById('game-over-view').classList.remove('hidden');
    }

    function updateScoreUI() {
        document.getElementById('current-score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    // --- Visual Effects ---
    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        const colors = ['#FFBE0B', '#FB5607', '#FF006E', '#8338EC', '#3A86FF'];
        
        for(let i=0; i<40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.top = '-20px';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            // Random shapes
            if(Math.random() > 0.5) conf.style.borderRadius = '50%';
            
            container.appendChild(conf);
        }
    }

    // --- Dropdown Logic ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() {
        selectCustom.classList.toggle('open');
    });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                currentLang = value;
                updateText();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) {
            selectCustom.classList.remove('open');
        }
    });

    function updateText() {
        const t = translations[currentLang];
        document.getElementById('header-title').textContent = t.title;
        document.getElementById('instruction').textContent = t.inst;
        document.getElementById('lbl-even').textContent = t.even;
        document.getElementById('lbl-odd').textContent = t.odd;
        document.getElementById('lbl-next').textContent = t.next;
        
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-record').textContent = t.record;

        document.getElementById('lbl-gameover').textContent = t.gameover;
        document.getElementById('lbl-yourscore').textContent = t.yourscore;
        document.getElementById('lbl-playagain').textContent = t.playagain;
        
        if(roundSolved && !document.getElementById('feedback-content').classList.contains('hidden')) {
             const lastDigit = currentNumber % 10;
             const isEven = lastDigit % 2 === 0;
             const explanation = isEven 
                ? t.explEven.replace('{d}', lastDigit) 
                : t.explOdd.replace('{d}', lastDigit);
             document.getElementById('feedback-desc').textContent = explanation;
        }
    }

    // Initial Load
    window.onload = function() {
        updateScoreUI();
        resetGame();
    };

</script>
</body>
</html>

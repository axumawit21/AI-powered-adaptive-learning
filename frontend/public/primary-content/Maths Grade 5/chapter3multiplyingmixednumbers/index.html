
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplying Mixed Numbers</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue-light: #E3F2FD;
            --blue-dark: #1E88E5;
            --pink-light: #FCE4EC;
            --pink-dark: #D81B60;
            --green-light: #E8F5E9;
            --green-dark: #43A047;
            --yellow: #FFD54F;
            --text: #37474F;
            --white: #ffffff;
            --shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; transition: all 0.3s ease; user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-color: #F0F4F8;
            background-image: radial-gradient(#CFD8DC 2px, transparent 2px);
            background-size: 20px 20px;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 12% 18%, rgba(30, 136, 229, 0.18), transparent 42%),
                radial-gradient(circle at 88% 15%, rgba(216, 27, 96, 0.14), transparent 45%),
                radial-gradient(circle at 18% 86%, rgba(255, 213, 79, 0.22), transparent 46%),
                radial-gradient(circle at 85% 86%, rgba(67, 160, 71, 0.16), transparent 48%);
            pointer-events: none;
            z-index: -1;
        }

        /* Header */
        header {
            background: white;
            padding: 15px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 50;
            border-bottom: 5px solid var(--blue-dark);
            background-image: linear-gradient(90deg, rgba(30, 136, 229, 0.10), rgba(216, 27, 96, 0.10), rgba(255, 213, 79, 0.14));
        }

        .topbar {
            width: 100%;
            max-width: 1400px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            text-align: center;
        }

        .header-title span {
            filter: drop-shadow(0 2px 0 rgba(0,0,0,0.10));
        }

        .score-pill {
            background: var(--yellow);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #5D4037;
            border: 2px solid #FBC02D;
            box-shadow: 0 4px 0 rgba(0,0,0,0.08);
        }

        .stats-bar {
            max-width: 1400px;
            width: 100%;
            margin: 12px auto 0;
            padding: 0 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        .lang-wrap {
            display: flex;
            justify-content: flex-start;
        }

        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px;
            font-weight: 900;
            color: var(--text);
            height: 40px;
            background: rgba(255,255,255,0.95);
            border-radius: 999px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.08);
            width: 160px;
            transition: 0.2s;
            border: 2px solid rgba(30, 136, 229, 0.35);
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.2s ease; display: flex; flex-direction: column; gap: 5px;
            border-radius: 16px; padding: 10px;
            box-shadow: 0 12px 22px rgba(0,0,0,0.12);
            border: 2px solid rgba(30, 136, 229, 0.22);
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 8px; border-radius: 12px; cursor: pointer; font-weight: 900; }
        .custom-option:hover { background: rgba(30, 136, 229, 0.10); color: var(--blue-dark); }
        .select-arrow { border: solid var(--text); border-width: 0 3px 3px 0; padding: 3px; transform: rotate(45deg); margin-top: -5px; }

        .score-pill small {
            font-size: 0.95rem;
            font-weight: 900;
            opacity: 0.85;
        }

        /* Container */
        .container {
            max-width: 1400px;
            width: 100%;
            margin: 20px auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .steps-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        /* Problem Header */
        .problem-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            font-size: 2.5rem;
            font-weight: 900;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 4px solid white;
            position: relative;
            overflow: hidden;
        }

        .problem-card::after {
            content: "";
            position: absolute;
            inset: -60px;
            background:
                radial-gradient(circle at 25% 20%, rgba(30, 136, 229, 0.10), transparent 45%),
                radial-gradient(circle at 85% 30%, rgba(216, 27, 96, 0.08), transparent 46%),
                radial-gradient(circle at 35% 85%, rgba(255, 213, 79, 0.12), transparent 48%);
            transform: rotate(8deg);
            pointer-events: none;
        }

        .problem-card > * { position: relative; }

        .fraction-display {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        .mixed-whole { font-size: 1.2em; color: var(--text); }
        
        .fraction-part {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
            font-size: 0.7em;
        }
        
        .frac-line {
            width: 100%;
            height: 4px;
            background: currentColor;
            border-radius: 2px;
            margin: 2px 0;
        }

        /* Step Cards */
        .step-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow);
            border: 3px solid transparent;
            opacity: 0.5;
            pointer-events: none;
            transform: scale(0.95);
            position: relative;
            overflow: hidden;
        }

        .step-card::before {
            content: "";
            position: absolute;
            inset: -30px;
            background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.7), transparent 55%);
            opacity: 0.55;
            pointer-events: none;
        }

        .step-card::after {
            content: "";
            position: absolute;
            inset: -12px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(30, 136, 229, 0.14), rgba(216, 27, 96, 0.10), rgba(255, 213, 79, 0.16));
            filter: blur(18px);
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        .step-card > * { position: relative; }

        .step-card.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .step-card.active::after { opacity: 1; }

        .step-card.completed {
            opacity: 0.8;
            pointer-events: none;
            background: #FAFAFA;
        }
        .step-card.completed::after {
            content: '✔️';
            position: absolute;
            top: 10px; right: 10px;
            font-size: 1.5rem;
        }

        .step-feedback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.75);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
            transform: scale(0.9);
        }

        .step-feedback .mark {
            font-size: 5rem;
            font-weight: 900;
            color: var(--green-dark);
            filter: drop-shadow(0 8px 0 rgba(0,0,0,0.12));
        }

        .step-card.show-correct .step-feedback {
            animation: correctPop 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .step-card.show-wrong .step-feedback {
            animation: wrongPop 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .step-card.show-wrong .step-feedback .mark {
            color: var(--pink-dark);
        }

        @keyframes correctPop {
            0% { opacity: 0; transform: scale(0.85); }
            55% { opacity: 1; transform: scale(1.08); }
            100% { opacity: 0; transform: scale(0.92); }
        }

        @keyframes wrongPop {
            0% { opacity: 0; transform: scale(0.85) rotate(-6deg); }
            55% { opacity: 1; transform: scale(1.05) rotate(6deg); }
            100% { opacity: 0; transform: scale(0.92) rotate(0deg); }
        }

        /* Step Colors */
        .step-1 { border-color: var(--blue-dark); }
        .step-1 .step-title { color: var(--blue-dark); background: var(--blue-light); }
        
        .step-2 { border-color: var(--pink-dark); }
        .step-2 .step-title { color: var(--pink-dark); background: var(--pink-light); }
        
        .step-3 { border-color: var(--green-dark); }
        .step-3 .step-title { color: var(--green-dark); background: var(--green-light); }

        .step-title {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        /* Conversion Layout */
        .conversion-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .arrow { font-size: 2rem; color: #B0BEC5; }

        .input-fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        input[type="number"] {
            width: 80px;
            height: 70px;
            border: 3px solid #CFD8DC;
            border-radius: 15px;
            text-align: center;
            font-size: 2rem;
            font-weight: bold;
            font-family: inherit;
            color: var(--text);
            outline: none;
            background: #F7F9F9;
        }
        
        input[type="number"]:focus {
            background: white;
            border-color: currentColor;
            transform: scale(1.05);
        }

        .step-1 input:focus { border-color: var(--blue-dark); }
        .step-2 input:focus { border-color: var(--pink-dark); }
        .step-3 input:focus { border-color: var(--green-dark); }

        .input-line {
            width: 70px;
            height: 5px;
            background: #CFD8DC;
            border-radius: 3px;
        }

        /* Button */
        .check-btn {
            width: 100%;
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            border: none;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .check-btn:hover { transform: translateY(-2px); }
        .check-btn:active { transform: translateY(4px); box-shadow: none; }

        .btn-blue { background: var(--blue-dark); color: white; }
        .btn-pink { background: var(--pink-dark); color: white; }
        .btn-green { background: var(--green-dark); color: white; }

        /* Multiplication View */
        .multiply-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 2rem;
            font-weight: 900;
        }
        
        .static-frac {
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1;
        }
        .static-frac .line { width: 50px; height: 4px; background: #37474F; margin: 4px 0; }

        /* Next Level Overlay */
        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .success-overlay.show { opacity: 1; pointer-events: auto; }

        .success-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            border: 4px solid rgba(255, 213, 79, 0.55);
            box-shadow: 0 20px 35px rgba(0,0,0,0.18);
        }

        .success-card::before {
            content: "";
            position: absolute;
            inset: -40px;
            background:
                radial-gradient(circle at 20% 20%, rgba(255, 213, 79, 0.24), transparent 48%),
                radial-gradient(circle at 80% 25%, rgba(30, 136, 229, 0.14), transparent 52%),
                radial-gradient(circle at 35% 85%, rgba(216, 27, 96, 0.12), transparent 50%);
            pointer-events: none;
        }

        .success-card > * { position: relative; }

        .success-title { font-size: 2rem; color: var(--green-dark); margin-bottom: 10px; }

        .reward-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 999px;
            background: rgba(30, 136, 229, 0.10);
            border: 2px solid rgba(30, 136, 229, 0.30);
            font-weight: 900;
            margin: 10px 0 12px;
            gap: 10px;
        }

        .reward-badge .emoji {
            font-size: 1.6rem;
        }

        .reward-msg {
            font-size: 1.15rem;
            font-weight: 800;
            margin: 0 0 18px;
            color: #455A64;
        }

        .reward-stats {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .pill {
            padding: 8px 12px;
            border-radius: 999px;
            font-weight: 900;
            border: 2px solid rgba(0,0,0,0.08);
            background: rgba(255,255,255,0.7);
        }

        .pill.blue { border-color: rgba(30, 136, 229, 0.25); background: rgba(30, 136, 229, 0.08); }
        .pill.pink { border-color: rgba(216, 27, 96, 0.22); background: rgba(216, 27, 96, 0.06); }
        .pill.green { border-color: rgba(67, 160, 71, 0.22); background: rgba(67, 160, 71, 0.06); }

        #confetti {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
            display: none;
        }

        #confetti.show { display: block; }
        .next-btn {
            background: var(--yellow);
            color: #5D4037;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 6px 0 #FBC02D;
        }
        .next-btn:active { transform: translateY(4px); box-shadow: none; }

        @keyframes popIn { from { transform: scale(0.5); } to { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .problem-card { font-size: 2rem; padding: 15px; }
            .step-card { padding: 15px; }
            .conversion-row { gap: 10px; }
            input[type="number"] { width: 60px; height: 50px; font-size: 1.5rem; }
            .input-line { width: 50px; }
            .arrow { font-size: 1.5rem; }
        }

        @media (min-width: 980px) {
            .steps-grid {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                align-items: start;
                gap: 14px;
            }

            .step-card {
                height: 100%;
                padding: 40px;
            }

            .problem-card {
                font-size: 3.1rem;
                padding: 30px;
            }

            .step-title {
                font-size: 1.15rem;
                padding: 10px 20px;
            }

            input[type="number"] {
                width: 98px;
                height: 82px;
                font-size: 2.3rem;
                border-radius: 18px;
            }

            .input-line {
                width: 88px;
            }

            .arrow {
                font-size: 2.3rem;
            }

            .check-btn {
                font-size: 1.3rem;
                padding: 18px;
            }
        }
    </style>
</head>
<body>

<canvas id="confetti"></canvas>

<header>
    <div class="topbar">
        <div class="lang-wrap">
            <div class="custom-select-wrapper" id="lang-wrapper">
                <div class="custom-select" id="lang-select">
                    <div class="custom-select__trigger" id="lang-trigger">
                        <span id="current-lang-label">🗺️ English</span>
                        <div class="select-arrow"></div>
                    </div>
                    <div class="custom-select__options" id="lang-options">
                        <span class="custom-option" data-value="ti">ትግርኛ</span>
                        <span class="custom-option" data-value="am">አማርኛ</span>
                        <span class="custom-option selected" data-value="en">English</span>
                        <span class="custom-option" data-value="om">Afan Oromoo</span>
                        <span class="custom-option" data-value="so">Soomaali</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-title">
            <span id="header-title">✖️ Mixed Numbers</span>
        </div>

        <div></div>
    </div>
</header>

<div class="stats-bar">
    <div class="score-pill">
        <span id="lbl-score">Score</span>: <span id="score">0</span>
        <small> • <span id="lbl-best">Best</span>: <span id="best">0</span></small>
    </div>
</div>

<div class="container">

    <!-- Problem Header -->
    <div class="problem-card">
        <div class="fraction-display" style="color: var(--blue-dark)">
            <span class="mixed-whole" id="disp-w1">1</span>
            <div class="fraction-part">
                <span id="disp-n1">1</span>
                <div class="frac-line"></div>
                <span id="disp-d1">2</span>
            </div>
        </div>
        <span style="color:#B0BEC5">×</span>
        <div class="fraction-display" style="color: var(--pink-dark)">
            <span class="mixed-whole" id="disp-w2">2</span>
            <div class="fraction-part">
                <span id="disp-n2">1</span>
                <div class="frac-line"></div>
                <span id="disp-d2">3</span>
            </div>
        </div>
    </div>

    <div class="steps-grid" id="steps-grid">

    <!-- Step 1: Convert First Number -->
    <div class="step-card step-1 active" id="card-1">
        <div class="step-feedback" aria-hidden="true"><div class="mark">✅</div></div>
        <div class="step-title" id="step1-title">1. Convert Blue Number</div>
        <div class="conversion-row">
            <div class="fraction-display" style="color: var(--blue-dark); font-size: 2rem;">
                <span class="mixed-whole" id="s1-w">1</span>
                <div class="fraction-part">
                    <span id="s1-n">1</span>
                    <div class="frac-line"></div>
                    <span id="s1-d">2</span>
                </div>
            </div>
            <div class="arrow">➡</div>
            <div class="input-fraction">
                <input type="number" id="in-n1" placeholder="?">
                <div class="input-line"></div>
                <input type="number" id="in-d1" placeholder="?">
            </div>
        </div>
        <button class="check-btn btn-blue" id="btn-step1" onclick="checkStep1()">Check Blue ✔️</button>
    </div>

    <!-- Step 2: Convert Second Number -->
    <div class="step-card step-2" id="card-2">
        <div class="step-feedback" aria-hidden="true"><div class="mark">✅</div></div>
        <div class="step-title" id="step2-title">2. Convert Pink Number</div>
        <div class="conversion-row">
            <div class="fraction-display" style="color: var(--pink-dark); font-size: 2rem;">
                <span class="mixed-whole" id="s2-w">2</span>
                <div class="fraction-part">
                    <span id="s2-n">1</span>
                    <div class="frac-line"></div>
                    <span id="s2-d">3</span>
                </div>
            </div>
            <div class="arrow">➡</div>
            <div class="input-fraction">
                <input type="number" id="in-n2" placeholder="?">
                <div class="input-line"></div>
                <input type="number" id="in-d2" placeholder="?">
            </div>
        </div>
        <button class="check-btn btn-pink" id="btn-step2" onclick="checkStep2()">Check Pink ✔️</button>
    </div>

    <!-- Step 3: Multiply -->
    <div class="step-card step-3" id="card-3">
        <div class="step-feedback" aria-hidden="true"><div class="mark">✅</div></div>
        <div class="step-title" id="step3-title">3. Multiply Them!</div>
        
        <div class="multiply-row">
            <!-- Filled by JS -->
            <div class="static-frac" style="color:var(--blue-dark)">
                <span id="mul-n1">3</span>
                <div class="line" style="background:var(--blue-dark)"></div>
                <span id="mul-d1">2</span>
            </div>
            <span style="color:#B0BEC5">×</span>
            <div class="static-frac" style="color:var(--pink-dark)">
                <span id="mul-n2">7</span>
                <div class="line" style="background:var(--pink-dark)"></div>
                <span id="mul-d2">3</span>
            </div>
            <span style="color:#B0BEC5">=</span>
            <div class="input-fraction">
                <input type="number" id="in-nf" placeholder="?">
                <div class="input-line"></div>
                <input type="number" id="in-df" placeholder="?">
            </div>
        </div>

        <button class="check-btn btn-green" id="btn-step3" onclick="checkStep3()">Check Answer ✔️</button>
    </div>

    </div>

</div>

<!-- Success Overlay -->
<div class="success-overlay" id="overlay">
    <div class="success-card">
        <h2 class="success-title" id="reward-title">Correct! 🎉</h2>
        <div class="reward-badge" id="reward-badge">
            <span class="emoji" id="reward-emoji">⭐</span>
            <span id="reward-name">Math Star</span>
        </div>
        <p class="reward-msg" id="reward-msg">Great work!</p>
        <div class="reward-stats">
            <div class="pill blue">+<span id="reward-points">10</span> pts</div>
            <div class="pill pink">Streak: <span id="reward-streak">1</span></div>
            <div class="pill green">Level: <span id="reward-level">1</span></div>
            <div class="pill blue">Score: <span id="reward-score">0</span></div>
        </div>
        <button class="next-btn" onclick="nextLevel()">Next Problem ➡</button>
    </div>
</div>

<script>
    // Audio Context
    const AudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if(AudioCtx.state === 'suspended') AudioCtx.resume();
        const osc = AudioCtx.createOscillator();
        const gain = AudioCtx.createGain();
        osc.connect(gain);
        gain.connect(AudioCtx.destination);

        if (type === 'correct') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, AudioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, AudioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 0.3);
            osc.start(); osc.stop(AudioCtx.currentTime + 0.3);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, AudioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, AudioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, AudioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, AudioCtx.currentTime + 0.2);
            osc.start(); osc.stop(AudioCtx.currentTime + 0.2);
        } else if (type === 'pop') {
            osc.frequency.setValueAtTime(800, AudioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, AudioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, AudioCtx.currentTime + 0.1);
            osc.start(); osc.stop(AudioCtx.currentTime + 0.1);
        }
    }

    // State
    let score = 0;
    let bestScore = 0;
    let streak = 0;
    let level = 0;
    let n1, n2; // Mixed number objects: {w, n, d}
    let imp1, imp2; // Improper: {n, d}

    const rewardPool = [
        { emoji: '⭐', name: 'Math Star', title: 'Correct! 🎉', msg: 'You are shining bright!' },
        { emoji: '🏅', name: 'Champion', title: 'Awesome! 🏅', msg: 'That was super fast and smart!' },
        { emoji: '🧠', name: 'Brain Power', title: 'Brilliant! 🧠', msg: 'Your brain is growing!' },
        { emoji: '🚀', name: 'Rocket Learner', title: 'Wow! 🚀', msg: 'You are leveling up!' },
        { emoji: '🌈', name: 'Rainbow Reward', title: 'Yay! 🌈', msg: 'Colorful thinking!' }
    ];

    const translations = {
        ti: {
            headerTitle: '✖️ ሕዋስ ቁፅር',
            score: 'ነጥቢ',
            best: 'ዝበለፀ',
            step1: '1. ናብ ጉዚ ቀይር',
            step2: '2. ናብ ጉዚ ቀይር',
            step3: '3. ምርባሕ (Multiply)!',
            btn1: 'አረጋግፅ ✔️',
            btn2: 'አረጋግፅ ✔️',
            btn3: 'አረጋግፅ✔️',
            next: 'ቀጻሊ ሕቶ ➡'
        },
        am: {
            headerTitle: '✖️ ድብልቅ ቁጥሮች',
            score: 'ነጥብ',
            best: 'ከፍተኛ',
            step1: '1. ወደ ጉዚ ቀይር',
            step2: '2. ወደ ጉዚ ቀይር',
            step3: '3. አባዛ!',
            btn1: 'አረጋግጥ ✔️',
            btn2: 'አረጋግጥ ✔️',
            btn3: 'አረጋግጥ ✔️',
            next: 'ቀጣይ ጥያቄ ➡'
        },
        en: {
            headerTitle: '✖️ Mixed Numbers',
            score: 'Score',
            best: 'Best',
            step1: '1. Convert to fraction',
            step2: '2. Convert to fraction',
            step3: '3. Multiply Them!',
            btn1: 'Check✔️',
            btn2: 'Check ✔️',
            btn3: 'Check ✔️',
            next: 'Next Problem ➡'
        },
        om: {
            headerTitle: '✖️ Lakkoofsa Makaa',
            score: 'Qabxii',
            best: 'Kan Irra Caalu',
            step1: '1. Cuquliisaa Jijjiiri',
            step2: '2. Diimaa-rose Jijjiiri',
            step3: '3. Baayyisi!',
            btn1: 'Mirkaneessi ✔️',
            btn2: 'Mirkaneessi ✔️',
            btn3: 'Mirkaneessi ✔️',
            next: 'Gaaffii Itti Aanu ➡'
        },
        so: {
            headerTitle: '✖️ Tiro Isku-dhaf',
            score: 'Dhibco',
            best: 'Ugu Fiican',
            step1: '1. Buluugga u beddel',
            step2: '2. Pink-ga u beddel',
            step3: '3. Isku dhufo!',
            btn1: 'Hubi ✔️',
            btn2: 'Hubi ✔️',
            btn3: 'Hubi✔️',
            next: 'Su’aal Kale ➡'
        }
    };

    let currentLang = 'en';

    function updateText() {
        const t = translations[currentLang] || translations.en;
        document.getElementById('header-title').innerText = t.headerTitle;
        document.getElementById('lbl-score').innerText = t.score;
        document.getElementById('lbl-best').innerText = t.best;
        document.getElementById('step1-title').innerText = t.step1;
        document.getElementById('step2-title').innerText = t.step2;
        document.getElementById('step3-title').innerText = t.step3;
        document.getElementById('btn-step1').innerText = t.btn1;
        document.getElementById('btn-step2').innerText = t.btn2;
        document.getElementById('btn-step3').innerText = t.btn3;
        const nextBtn = document.querySelector('.next-btn');
        if (nextBtn) nextBtn.innerText = t.next;
    }

    function loadBest() {
        const raw = localStorage.getItem('mmn_bestScore');
        bestScore = raw ? parseInt(raw) : 0;
        document.getElementById('best').innerText = String(bestScore);
    }

    function saveBestIfNeeded() {
        if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('mmn_bestScore', String(bestScore));
            document.getElementById('best').innerText = String(bestScore);
        }
    }

    function initGame() {
        loadBest();
        updateText();
        nextLevel();
    }

    // --- Language Dropdown ---
    const selectWrapper = document.getElementById('lang-wrapper');
    const selectCustom = document.getElementById('lang-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() {
        selectCustom.classList.toggle('open');
    });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                document.querySelectorAll('.custom-option.selected').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = '🗺️ ' + label;
                currentLang = value;
                updateText();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) {
            selectCustom.classList.remove('open');
        }
    });

    function generateMixed() {
        const w = Math.floor(Math.random() * 3) + 1; // 1-3
        const d = Math.floor(Math.random() * 4) + 2; // 2-5
        const n = Math.floor(Math.random() * (d - 1)) + 1; // < d
        return { w, n, d };
    }

    function nextLevel() {
        document.getElementById('overlay').classList.remove('show');

        stopConfetti();
        
        // Reset Cards
        document.querySelectorAll('.step-card').forEach(c => {
            c.classList.remove('active', 'completed');
        });
        document.getElementById('card-1').classList.add('active');

        // Clear Inputs
        document.querySelectorAll('input').forEach(i => i.value = '');

        // Generate Math
        n1 = generateMixed();
        n2 = generateMixed();

        level += 1;

        // Display Header
        document.getElementById('disp-w1').innerText = n1.w;
        document.getElementById('disp-n1').innerText = n1.n;
        document.getElementById('disp-d1').innerText = n1.d;

        document.getElementById('disp-w2').innerText = n2.w;
        document.getElementById('disp-n2').innerText = n2.n;
        document.getElementById('disp-d2').innerText = n2.d;

        // Setup Step 1
        document.getElementById('s1-w').innerText = n1.w;
        document.getElementById('s1-n').innerText = n1.n;
        document.getElementById('s1-d').innerText = n1.d;

        // Setup Step 2
        document.getElementById('s2-w').innerText = n2.w;
        document.getElementById('s2-n').innerText = n2.n;
        document.getElementById('s2-d').innerText = n2.d;
        
        playSound('pop');
    }

    function checkStep1() {
        const uNum = parseInt(document.getElementById('in-n1').value);
        const uDen = parseInt(document.getElementById('in-d1').value);
        
        const correctNum = (n1.w * n1.d) + n1.n;
        
        if (uNum === correctNum && uDen === n1.d) {
            imp1 = { n: correctNum, d: n1.d };
            completeStep('card-1', 'card-2');
        } else {
            shake('card-1');
        }
    }

    function checkStep2() {
        const uNum = parseInt(document.getElementById('in-n2').value);
        const uDen = parseInt(document.getElementById('in-d2').value);
        
        const correctNum = (n2.w * n2.d) + n2.n;
        
        if (uNum === correctNum && uDen === n2.d) {
            imp2 = { n: correctNum, d: n2.d };
            
            // Setup Step 3 visuals
            document.getElementById('mul-n1').innerText = imp1.n;
            document.getElementById('mul-d1').innerText = imp1.d;
            document.getElementById('mul-n2').innerText = imp2.n;
            document.getElementById('mul-d2').innerText = imp2.d;

            completeStep('card-2', 'card-3');
        } else {
            shake('card-2');
        }
    }

    function checkStep3() {
        const uNum = parseInt(document.getElementById('in-nf').value);
        const uDen = parseInt(document.getElementById('in-df').value);

        const correctNum = imp1.n * imp2.n;
        const correctDen = imp1.d * imp2.d;

        if (uNum === correctNum && uDen === correctDen) {
            streak += 1;
            const base = 10;
            const bonus = Math.min(10, (streak - 1) * 2);
            const earned = base + bonus;

            score += earned;
            document.getElementById('score').innerText = score;
            saveBestIfNeeded();

            showReward(earned);
        } else {
            streak = 0;
            shake('card-3');
        }
    }

    function showReward(earnedPoints) {
        playSound('correct');
        const r = rewardPool[Math.floor(Math.random() * rewardPool.length)];

        document.getElementById('reward-title').innerText = r.title;
        document.getElementById('reward-emoji').innerText = r.emoji;
        document.getElementById('reward-name').innerText = r.name;
        document.getElementById('reward-msg').innerText = r.msg;
        document.getElementById('reward-points').innerText = String(earnedPoints);
        document.getElementById('reward-streak').innerText = String(streak);
        document.getElementById('reward-level').innerText = String(level);
        document.getElementById('reward-score').innerText = String(score);

        document.getElementById('overlay').classList.add('show');
        startConfetti();
    }

    function completeStep(currentId, nextId) {
        playSound('correct');
        const current = document.getElementById(currentId);
        const okMark = current.querySelector('.step-feedback .mark');
        if (okMark) okMark.innerText = '✅';
        current.classList.add('show-correct');
        current.classList.remove('active');
        current.classList.add('completed');
        
        setTimeout(() => {
            current.classList.remove('show-correct');
            const next = document.getElementById(nextId);
            next.classList.add('active');
            // Scroll to next
            next.scrollIntoView({behavior: 'smooth', block: 'center'});
            // Focus input
            const firstInput = next.querySelector('input');
            if(firstInput) firstInput.focus();
        }, 550);
    }

    function shake(id) {
        playSound('wrong');
        const el = document.getElementById(id);
        const badMark = el.querySelector('.step-feedback .mark');
        if (badMark) badMark.innerText = '❌';
        el.classList.add('show-wrong');
        el.style.animation = 'shake 0.4s';
        setTimeout(() => el.style.animation = 'none', 400);
        setTimeout(() => el.classList.remove('show-wrong'), 550);
    }

    // Confetti
    let confettiRAF = 0;
    let confettiPieces = [];

    function startConfetti() {
        const canvas = document.getElementById('confetti');
        canvas.classList.add('show');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;

        const resize = () => {
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        };

        resize();
        window.addEventListener('resize', resize, { passive: true });

        const colors = ['#1E88E5', '#D81B60', '#43A047', '#FFD54F', '#7E57C2', '#FF7043'];
        confettiPieces = Array.from({ length: 120 }, () => {
            const size = Math.random() * 7 + 5;
            return {
                x: Math.random() * window.innerWidth,
                y: -Math.random() * window.innerHeight,
                vx: (Math.random() - 0.5) * 3.5,
                vy: Math.random() * 2.5 + 3,
                r: size,
                rot: Math.random() * Math.PI,
                vr: (Math.random() - 0.5) * 0.2,
                color: colors[Math.floor(Math.random() * colors.length)],
                shape: Math.random() < 0.5 ? 'rect' : 'circle'
            };
        });

        const tick = () => {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            for (const p of confettiPieces) {
                p.x += p.vx;
                p.y += p.vy;
                p.rot += p.vr;
                p.vy += 0.02;
                if (p.y > window.innerHeight + 40) {
                    p.y = -20;
                    p.x = Math.random() * window.innerWidth;
                    p.vy = Math.random() * 2.5 + 3;
                }
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                if (p.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, p.r * 0.45, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.7);
                }
                ctx.restore();
            }
            confettiRAF = requestAnimationFrame(tick);
        };

        cancelAnimationFrame(confettiRAF);
        confettiRAF = requestAnimationFrame(tick);
    }

    function stopConfetti() {
        cancelAnimationFrame(confettiRAF);
        confettiRAF = 0;
        confettiPieces = [];
        const canvas = document.getElementById('confetti');
        if (!canvas) return;
        canvas.classList.remove('show');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // Init
    window.onload = initGame;

</script>
</body>
</html>

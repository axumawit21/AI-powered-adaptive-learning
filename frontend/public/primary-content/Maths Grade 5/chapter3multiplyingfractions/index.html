<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplying Fractions - ምብዛሕ ጉዚታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant & Playful Palette for Multiplication */
            --primary: #3F51B5;   /* Indigo Blue */
            --secondary: #FFC107; /* Amber Yellow */
            --accent: #E91E63;    /* Hot Pink */
            --bg-gradient: linear-gradient(135deg, #81D4FA 0%, #A5D6A7 100%); /* Light Blue to Light Green */
            --text: #333333;
            --white: #ffffff;
            --correct: #4CAF50;   /* Green */
            --wrong: #F44336;     /* Red */
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -120px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.9;
        }

        body::before {
            background:
                radial-gradient(circle at 12% 18%, rgba(233, 30, 99, 0.70) 0 85px, transparent 86px), /* Hot Pink */
                radial-gradient(circle at 90% 22%, rgba(255, 193, 7, 0.55) 0 95px, transparent 96px), /* Amber Yellow */
                radial-gradient(circle at 20% 88%, rgba(63, 81, 181, 0.45) 0 130px, transparent 131px), /* Indigo Blue */
                radial-gradient(circle at 86% 86%, rgba(244, 67, 54, 0.25) 0 120px, transparent 121px); /* Red */
            filter: blur(0.5px);
            animation: floatBg 10s ease-in-out infinite;
        }

        body::after {
            background:
                radial-gradient(circle at 40% 35%, rgba(255, 255, 255, 0.30) 0 140px, transparent 141px),
                radial-gradient(circle at 62% 62%, rgba(255, 255, 255, 0.22) 0 180px, transparent 181px);
            animation: floatBg 14s ease-in-out infinite reverse;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--primary);
            border-radius: 0 0 25px 25px;
        }

        .header-left, .header-right { 
            flex: 1; 
            display: flex; 
            align-items: center; 
        }
        
        .header-right {
            justify-content: flex-end;
        }

        .header-center {
            flex: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .grade-badge {
            background: var(--primary);
            color: white;
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.4rem;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(63, 81, 181, 0.3);
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--text);
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
        }

        /* --- Custom Language Dropdown --- */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--secondary);
            height: 45px; background: #ffffff; cursor: pointer;
            border: 2px solid var(--secondary); border-radius: 25px;
            width: 150px;
            box-shadow: 0 4px 0 rgba(255, 193, 7, 0.2);
            transition: all 0.2s;
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: #fff; border: 2px solid #e9ecef; border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            padding: 10px; display: flex; flex-direction: column; gap: 5px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .custom-option:hover { background: var(--secondary); color: white; }

        /* --- Main Content --- */
        .container {
            max-width: 1400px; /* Big container */
            margin: 30px auto;
            padding: 0 20px;
            width: 95%; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Score Board */
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            position: absolute;
            top: 30px;
            right: 30px;
        }

        .score-pill {
            background: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 2px solid transparent;
        }
        .score-pill.current { color: var(--primary); border-color: var(--primary); }
        .score-pill.high { color: #F59E0B; border-color: #F59E0B; } /* Keeping some orange for record */

        /* Stage */
        .stage {
            background: white;
            border-radius: 40px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #f0f0f0;
            position: relative;
            min-height: 600px;
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 42px;
            background: linear-gradient(135deg, rgba(63,81,181,0.35), rgba(255,193,7,0.25), rgba(233,30,99,0.30)); /* New colors */
            filter: blur(18px);
            opacity: 0.75;
            z-index: 0;
            pointer-events: none;
        }

        .stage > * { position: relative; z-index: 1; }

        .instruction {
            font-size: 1.8rem;
            color: var(--primary); /* Use primary for instruction */
            font-weight: 900;
            margin-bottom: 40px;
            text-align: center;
            background: #E8EAF6; /* Light background matching primary */
            padding: 15px 40px;
            border-radius: 30px;
            border: 3px dashed var(--primary);
        }

        /* Equation Layout */
        .equation-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            width: 100%;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .fraction-component {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .operator {
            font-size: 4rem;
            font-weight: 900;
            color: var(--text);
            margin-top: -60px; /* Align with center of larger pies */
        }

        /* Pie Chart */
        .pie-container {
            width: 260px;
            height: 260px;
            position: relative;
            border-radius: 50%;
            background: #edf2f7;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 6px solid white;
            transition: transform 0.2s;
        }
        
        /* Interactive Result Pie */
        .pie-container.interactive {
            border-color: var(--secondary); /* Use secondary for interactive */
            box-shadow: 0 0 0 6px rgba(255, 193, 7, 0.2), inset 0 5px 15px rgba(0,0,0,0.1);
            cursor: pointer;
        }
        .pie-container.interactive:hover { transform: scale(1.02); }

        /* SVG Slices */
        .slice-path {
            fill: transparent;
            stroke: white;
            stroke-width: 2px;
            transition: fill 0.2s;
            cursor: pointer;
        }
        .slice-path:hover {
            fill: rgba(63, 81, 181, 0.2); /* Primary hover */
        }
        .slice-path.active {
            fill: var(--primary); /* Primary active */
        }

        .slice-border {
            position: absolute;
            top: 0; left: 50%;
            width: 2px; 
            height: 50%; /* Scales with container */
            background: white;
            transform-origin: bottom center;
            pointer-events: none;
            z-index: 10;
        }

        /* Fraction Text */
        .frac-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
        }
        .frac-line {
            width: 80px;
            height: 6px;
            background: var(--text);
            border-radius: 3px;
            margin: 8px 0;
        }
        .num-text { color: var(--accent); } /* Hot Pink for numerators */
        .den-text { color: var(--text); }
        
        .result-num { color: var(--accent); animation: popIn 0.3s; }

        /* Controls */
        .action-bar {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-top: 20px;
        }

        .btn-check {
            background: var(--primary); /* Use primary */
            color: white;
            border: none;
            padding: 20px 70px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #303F9F; /* Darker primary */
            transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .btn-check {
            background: linear-gradient(135deg, var(--primary), #5C6BC0); /* Primary to lighter primary */
            box-shadow: 0 10px 0 rgba(48, 63, 159, 0.9), 0 18px 26px rgba(0,0,0,0.12);
            letter-spacing: 0.4px;
        }
        .btn-check:hover { transform: scale(1.05); filter: brightness(1.03); }
        .btn-check:active { transform: translateY(4px); box-shadow: none; }
        .btn-check:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(0.15);
            box-shadow: 0 10px 0 rgba(48, 63, 159, 0.35), 0 18px 26px rgba(0,0,0,0.08);
        }

        /* Feedback */
        .feedback {
            margin-top: 30px;
            min-height: 70px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }
        .feedback.show { opacity: 1; transform: translateY(0); }
        .fb-text { font-size: 1.8rem; font-weight: 900; }
        .fb-correct { color: var(--correct); }
        .fb-wrong { color: var(--wrong); }

        .result-overlay {
            position: absolute;
            inset: 0;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
            background: rgba(0,0,0,0.32);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .result-box {
            width: min(520px, 92vw);
            padding: 22px 24px;
            border-radius: 28px;
            background: rgba(255,255,255,0.94);
            border: 5px solid rgba(76,175,80,0.45); /* Green for correct */
            box-shadow: 0 26px 70px rgba(0,0,0,0.22);
            text-align: center;
            transform: scale(0.98);
            transition: transform 0.18s ease;
        }

        .result-overlay.show .result-box { transform: scale(1); }

        .reward-icon {
            font-size: 4.4rem;
            line-height: 1;
            margin-bottom: 8px;
            animation: bounce 1s infinite;
        }

        .reward-title {
            font-size: 2.4rem;
            font-weight: 900;
            margin: 0 0 8px 0;
            color: var(--text);
        }

        .reward-sub {
            font-size: 1.25rem;
            font-weight: 900;
            color: var(--primary); /* Primary for sub-text */
            margin: 0 0 18px 0;
        }

        .btn-next {
            background: linear-gradient(135deg, var(--secondary), #FFEB3B); /* Secondary to lighter secondary */
            color: #795548; /* Dark brown for contrast */
            border: none;
            padding: 16px 56px;
            border-radius: 60px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 0 #FBC02D, 0 18px 26px rgba(0,0,0,0.12); /* Darker secondary */
        }

        .btn-next:active { transform: translateY(6px); box-shadow: none; }

        /* Game Over Design */
        .game-over-area {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(0,0,0,0.34);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 40px;
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease;
        }
        .game-over-area.show { display: flex; }

        .game-over-content {
            background: rgba(255,255,255,0.96);
            padding: 40px 60px;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            border: 6px solid var(--wrong); /* Red for game over */
            text-align: center;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-width: 90%;
        }

        .result-icon {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: bounce 1s infinite;
        }

        .game-over-title {
            font-size: 3rem;
            font-weight: 900;
            color: var(--text);
            margin: 0 0 30px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .result-stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f7fafc;
            padding: 15px 25px;
            border-radius: 20px;
            border: 3px solid #edf2f7;
            min-width: 120px;
        }

        .stat-label {
            font-size: 1rem;
            font-weight: 800;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary); /* Primary for stats */
        }

        .btn-restart {
            background: var(--secondary); /* Secondary for restart */
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 10px 0 #FBC02D; /* Darker secondary */
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .btn-restart:hover { transform: scale(1.05); background: #FFD740; } /* Lighter secondary */
        .btn-restart:active { transform: translateY(6px); box-shadow: none; }

        @keyframes popUp { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { transform: scale(0.5); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }

        @keyframes floatBg { 0%, 100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-14px,0); } }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }

        /* Mobile */
        @media (max-width: 768px) {
            header { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            
            .header-left { order: 1; flex: 0 0 auto; }
            .header-right { order: 2; flex: 0 0 auto; }
            .header-center { order: 3; flex: 1 0 100%; margin-top: 10px; }
            
            h1 { font-size: 1.5rem; }
            
            .container { padding: 5px; margin: 10px auto; width: 100%; }
            .stage { padding: 15px 5px; border-radius: 20px; }
            
            /* Enforce parallel layout (Single Row) */
            .equation-area { 
                flex-direction: row; 
                flex-wrap: nowrap; /* Keep on one line */
                gap: 2px; 
                justify-content: center;
                align-items: center;
                width: 100%;
                overflow-x: auto; /* Just in case */
                padding-bottom: 5px; /* Scrollbar space if needed */
            }
            
            /* Hide scrollbars */
            .equation-area::-webkit-scrollbar { display: none; }
            
            .fraction-component {
                margin: 0 2px; 
                flex-shrink: 0;
            }

            .operator { 
                margin: 0; 
                font-size: 1.5rem; 
                margin-top: -40px; 
                min-width: 20px;
                text-align: center;
            }
            
            /* Resized Pies for Mobile Row */
            .pie-container { 
                width: 90px; 
                height: 90px; 
                border-width: 3px; 
            }
            
            .frac-display { font-size: 1.8rem; }
            .frac-line { width: 40px; height: 3px; }
            
            .score-board { position: static; width: 100%; justify-content: center; margin-bottom: 20px; }
            .btn-check { padding: 15px 40px; font-size: 1.4rem; }

            /* Game Over Mobile */
            .game-over-content { padding: 30px; width: 95%; }
            .game-over-title { font-size: 2rem; }
            .result-stats { gap: 15px; }
            .stat-value { font-size: 2rem; }
            .btn-restart { font-size: 1.4rem; padding: 15px 40px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="app-title">Multiplying Fractions</h1>
    </div>
    <div class="header-right">
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div style="font-size:0.8rem">▼</div>
                </div>
                <div class="custom-options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="stage">
        
        <div class="score-board">
            <div class="score-pill high">
                <span>🏆</span> <span id="lbl-record">Record</span>: <span id="high-score">0</span>
            </div>
            <div class="score-pill current">
                <span>⭐</span> <span id="lbl-score">Score</span>: <span id="score">0</span>
            </div>
        </div>

        <div id="game-play-area">
            <p class="instruction" id="instruction">Multiply the fractions! (Tap the result pie)</p>

            <div class="equation-area">
                
                <!-- Fraction 1 -->
                <div class="fraction-component">
                    <div class="pie-container" id="pie-1"></div>
                    <div class="frac-display">
                        <span class="num-text" id="num-1">1</span>
                        <div class="frac-line"></div>
                        <span class="den-text" id="den-1">4</span>
                    </div>
                </div>

                <div class="operator">×</div>

                <!-- Fraction 2 -->
                <div class="fraction-component">
                    <div class="pie-container" id="pie-2"></div>
                    <div class="frac-display">
                        <span class="num-text" id="num-2">2</span>
                        <div class="frac-line"></div>
                        <span class="den-text" id="den-2">4</span>
                    </div>
                </div>

                <div class="operator">=</div>

                <!-- Result Fraction (Interactive) -->
                <div class="fraction-component">
                    <div class="pie-container interactive" id="pie-result"></div>
                    <div class="frac-display">
                        <span class="num-text result-num" id="num-result">?</span>
                        <div class="frac-line"></div>
                        <span class="den-text" id="den-result">?</span>
                    </div>
                </div>

            </div>

            <div class="action-bar">
                <button class="btn-check" id="btn-action" onclick="checkAnswer()">Check Answer ✔️</button>
            </div>

            <div class="feedback" id="feedback">
                <div id="fb-text" class="fb-text"></div>
            </div>

            <div class="result-overlay" id="result-overlay">
                <div class="result-box">
                    <div class="reward-icon" id="reward-icon">🎉</div>
                    <div class="reward-title" id="reward-title">Correct!</div>
                    <div class="reward-sub" id="reward-sub">Score: 0</div>
                    <button class="btn-next" id="btn-next" onclick="nextFromReward()">Next ➡</button>
                </div>
            </div>
        </div>

        <!-- GAME OVER -->
        <div id="game-over-area" class="game-over-area">
            <div class="game-over-content">
                <div class="result-icon">🏁</div>
                <h2 class="game-over-title" id="lbl-gameover">Game Over!</h2>
                
                <div class="result-stats">
                    <div class="stat-box">
                        <span class="stat-label" id="lbl-yourscore">Score</span>
                        <span class="stat-value" id="final-score-val">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label" id="lbl-record-go">Record</span>
                        <span class="stat-value" id="final-high-score">0</span>
                    </div>
                </div>

                <button class="btn-restart" onclick="resetGame()">
                    <span id="lbl-restart">Play Again</span> 🔄
                </button>
            </div>
        </div>

    </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playClick() { this.playTone(400, 'sine', 0.1); },

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('multiplyFractionsHighScore') || 0;
    let isSolved = false;
    
    // Problem Data for Multiplication
    let n1 = 1, d1 = 2, n2 = 1, d2 = 3;
    let userNum = 0; // User selected numerator for the result

    function showRewardPopup(t) {
        document.getElementById('reward-title').textContent = t.correct + ' 🎉';
        document.getElementById('reward-sub').textContent = `${t.lblScore}: ${score}`;
        document.getElementById('result-overlay').classList.add('show');
    }

    function hideRewardPopup() {
        document.getElementById('result-overlay').classList.remove('show');
    }

    function nextFromReward() {
        hideRewardPopup();
        nextLevel();
    }

    function initGame() {
        score = 0;
        updateScoreBoard();
        document.getElementById('game-over-area').classList.remove('show');
        document.getElementById('game-play-area').style.display = 'block';
        nextLevel();
    }

    function nextLevel() {
        isSolved = false;
        userNum = 0;
        document.getElementById('feedback').classList.remove('show');
        hideRewardPopup();
        document.getElementById('btn-action').disabled = false;
        document.getElementById('btn-action').textContent = translations[currentLang].check;
        document.getElementById('btn-action').onclick = checkAnswer;

        // Generate Problem for Multiplication (n1/d1 * n2/d2)
        // Denominators between 2 and 5 to keep result denominator manageable (max 25)
        d1 = Math.floor(Math.random() * 4) + 2; // 2 to 5
        d2 = Math.floor(Math.random() * 4) + 2; // 2 to 5

        // Numerators must be less than their denominators, and at least 1
        n1 = Math.floor(Math.random() * (d1 - 1)) + 1;
        n2 = Math.floor(Math.random() * (d2 - 1)) + 1;

        // Render UI
        renderProblem();
    }

    function renderProblem() {
        document.getElementById('num-1').textContent = n1;
        document.getElementById('den-1').textContent = d1;
        document.getElementById('num-2').textContent = n2;
        document.getElementById('den-2').textContent = d2;
        
        document.getElementById('num-result').textContent = "?";
        document.getElementById('den-result').textContent = d1 * d2;

        // Render Static Pies
        renderPie('pie-1', n1, d1, true, 'var(--accent)'); // Hot Pink
        renderPie('pie-2', n2, d2, true, 'var(--secondary)'); // Amber Yellow
        
        // Render Interactive Result Pie
        renderPie('pie-result', 0, d1 * d2, false, 'var(--primary)'); // Indigo Blue for interactive slices
    }

    function renderPie(id, filled, total, isStatic, color) {
        const container = document.getElementById(id);
        container.innerHTML = '';
        const sliceAngle = 360 / total;

        if (isStatic) {
            const percentage = (filled / total) * 100;
            container.style.background = `conic-gradient(${color} 0% ${percentage}%, #edf2f7 ${percentage}% 100%)`;
            
            for(let i=0; i<total; i++) {
                const line = document.createElement('div');
                line.className = 'slice-border';
                line.style.transform = `translateX(-50%) rotate(${i * sliceAngle}deg)`;
                container.appendChild(line);
            }
        } else {
            container.style.background = '#edf2f7'; // Reset background
            
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("width", "100%");
            svg.setAttribute("height", "100%");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.style.position = "absolute";
            svg.style.top = "0";
            svg.style.left = "0";
            svg.style.transform = "rotate(-90deg)"; // Start at 12 o'clock

            const radius = 50;
            const center = 50;

            for (let i = 0; i < total; i++) {
                const path = document.createElementNS(svgNS, "path");
                const d = getSlicePath(i, total, radius, center);
                path.setAttribute("d", d);
                path.setAttribute("class", "slice-path");
                path.onclick = () => toggleResultSlice(path, i);
                
                svg.appendChild(path);
            }
            container.appendChild(svg);
        }
    }

    function getSlicePath(index, total, r, c) {
        const startAngle = (index * 2 * Math.PI) / total;
        const endAngle = ((index + 1) * 2 * Math.PI) / total;

        const x1 = c + r * Math.cos(startAngle);
        const y1 = c + r * Math.sin(startAngle);
        
        const x2 = c + r * Math.cos(endAngle);
        const y2 = c + r * Math.sin(endAngle);

        const largeArc = (endAngle - startAngle) > Math.PI ? 1 : 0;

        return `M ${c} ${c} L ${x1} ${y1} A ${r} ${r} 0 ${largeArc} 1 ${x2} ${y2} Z`;
    }

    function toggleResultSlice(pathEl, index) {
        if(isSolved) return;
        AudioEngine.playClick();

        const isActive = pathEl.classList.contains('active');

        if(isActive) {
            pathEl.classList.remove('active');
            userNum--;
        } else {
            pathEl.classList.add('active');
            userNum++;
        }
        document.getElementById('num-result').textContent = userNum;
    }

    function checkAnswer() {
        if(isSolved) return;

        const correctNum = n1 * n2;
        const correctDen = d1 * d2;
        const feedbackEl = document.getElementById('feedback');
        const feedbackText = document.getElementById('fb-text');
        const t = translations[currentLang];

        if (userNum === correctNum) {
            isSolved = true;
            score += 10;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('multiplyFractionsHighScore', highScore);
            }
            updateScoreBoard();
            
            AudioEngine.playSuccess();
            triggerConfetti();

            feedbackText.textContent = t.correct + " 🎉";
            feedbackText.className = "fb-text fb-correct";
            feedbackEl.classList.add('show');
            showRewardPopup(t);

            document.getElementById('btn-action').disabled = true;

        } else {
            AudioEngine.playError();
            feedbackText.textContent = t.wrong + " ❌";
            feedbackText.className = "fb-text fb-wrong";
            feedbackEl.classList.add('show');

            setTimeout(() => {
                document.getElementById('game-play-area').style.display = 'none';
                document.getElementById('game-over-area').classList.add('show');
                document.getElementById('final-score-val').textContent = score;
                document.getElementById('final-high-score').textContent = highScore;
            }, 2000);
        }
    }

    function resetGame() {
        initGame();
    }

    function updateScoreBoard() {
        document.getElementById('score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    // --- Language Change ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', (e) => {
        selectCustom.classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                this.classList.add('selected');
                
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                
                selectCustom.classList.remove('open');
                currentLang = value;
                changeLanguage();
            }
        });
    });

    window.addEventListener('click', (e) => {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function changeLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('instruction').textContent = t.instr;
        document.getElementById('lbl-score').textContent = t.lblScore;
        document.getElementById('lbl-record').textContent = t.lblRecord;
        document.getElementById('lbl-gameover').textContent = t.gameover;
        document.getElementById('lbl-yourscore').textContent = t.yourscore;
        
        document.getElementById('lbl-record-go').textContent = t.lblRecord;
        document.getElementById('lbl-restart').textContent = t.restart;

        const btn = document.getElementById('btn-action');
        if(isSolved) btn.textContent = t.next;
        else btn.textContent = t.check;
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<220; i++) {
            pieces.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random() - 0.5) * 15,
                vy: (Math.random() - 0.5) * 15 - 8,
                c: `hsl(${Math.random()*360}, 100%, 50%)`,
                r: Math.random() * 6 + 3
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.4;
                if(p.y < canvas.height) active = true;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            if(active) requestAnimationFrame(anim);
        }
        anim();
    }

    // Init
    window.onload = function() {
        updateScoreBoard();
        changeLanguage();
        initGame();
    }

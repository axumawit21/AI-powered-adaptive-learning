
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry - ጂኦሜትሪ</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Candy Palette */
            --primary: #FF006E;   /* Hot Pink */
            --secondary: #3A86FF; /* Bright Blue */
            --accent: #FFBE0B;    /* Sunny Yellow */
            --green: #06D6A0;     /* Mint Green */
            --purple: #8338EC;    /* Deep Purple */
            --text: #2B2D42;
            --white: #ffffff;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-color: #E0F7FA;
            /* Polka Dot Pattern */
            background-image: 
                radial-gradient(var(--secondary) 15%, transparent 16%),
                radial-gradient(var(--primary) 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 6px solid var(--purple);
            border-radius: 0 0 25px 25px;
        }

        .grade-badge {
            background: var(--purple);
            color: white;
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            border: 3px solid white;
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--purple);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0 15px;
            text-align: center;
            text-shadow: 2px 2px 0px white;
        }

        /* Custom Select */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text);
            height: 45px; background: #fff; cursor: pointer;
            border: 3px solid #e2e8f0; border-radius: 25px;
            width: 150px; font-size: 1rem;
            transition: all 0.2s;
        }
        .custom-select__trigger:hover { border-color: var(--secondary); transform: scale(1.05); }
        .custom-options {
            position: absolute; top: 125%; left: 0; right: 0;
            background: #fff; border: 3px solid #e2e8f0; border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden; transform: translateY(-15px);
            padding: 8px; display: flex; flex-direction: column; gap: 5px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 10px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .custom-option:hover { background: #E0E7FF; color: var(--purple); }

        /* --- Container --- */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
            background: white;
            padding: 8px;
            border-radius: 35px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: none;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            background: transparent;
            color: #A0AEC0;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--accent);
            color: #744210;
            box-shadow: 0 4px 0 #D97706;
            transform: translateY(-2px);
        }
        .tab-btn.active:active { transform: translateY(0); box-shadow: none; }

        /* Card */
        .card {
            background: white;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 6px solid white;
            width: 100%;
            min-height: 500px;
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.active { display: flex; }

        /* --- Lab Mode --- */
        .lab-visual {
            width: 100%;
            height: 320px; /* More Compact */
            background: #F0F4F8;
            border-radius: 30px;
            border: 3px dashed #CBD5E0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .angle-info {
            position: absolute;
            top: 20px; right: 20px;
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            text-align: right;
            border: 2px solid #E2E8F0;
        }
        .angle-val { font-size: 2.5rem; font-weight: 900; color: var(--primary); line-height: 1; }
        .angle-type { font-size: 1.2rem; font-weight: 800; color: var(--text); text-transform: uppercase; margin-top: 5px; }

        .slider-container {
            width: 100%;
            max-width: 500px;
            padding: 0 15px;
            background: #EDF2F7;
            border-radius: 25px;
            padding: 15px;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        input[type="range"] {
            width: 100%;
            height: 15px;
            border-radius: 10px;
            background: #CBD5E0;
            outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: 4px solid white;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
            transform: scale(1.1);
            transition: transform 0.2s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        #lab-inst { font-size: 1.1rem; font-weight: bold; color: #718096; margin-top: 15px; }

        /* --- Quiz Mode --- */
        .score-board {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .score-pill {
            background: #fff;
            padding: 8px 25px;
            border-radius: 25px;
            font-weight: 900;
            font-size: 1.2rem;
            border: 3px solid #eee;
            display: flex; gap: 8px; align-items: center;
            box-shadow: 0 4px 0 #eee;
        }
        .score-pill.high { color: #B7791F; border-color: var(--accent); background: #FFFBEB; }
        .score-pill.curr { color: var(--green); border-color: var(--green); background: #F0FFF4; }

        .quiz-question {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 25px;
            text-align: center;
            background: #E2E8F0;
            padding: 12px 25px;
            border-radius: 15px;
            width: 100%;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-top: 25px;
        }

        .opt-btn {
            background: white;
            border: 3px solid #E2E8F0;
            padding: 18px;
            border-radius: 20px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 5px 0 #CBD5E0;
        }
        .opt-btn:hover { border-color: var(--secondary); background: #EBF8FF; transform: translateY(-3px); }
        .opt-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Feedback / Game Over */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s;
        }
        .feedback-overlay.show { display: flex; }

        .fb-icon { font-size: 6rem; margin-bottom: 10px; animation: popIn 0.5s; }
        .fb-title { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; }
        .fb-sub { font-size: 1.3rem; color: #718096; margin-bottom: 30px; font-weight: bold; }
        
        .btn-action {
            padding: 15px 50px;
            border-radius: 40px;
            font-size: 1.4rem; font-weight: 900;
            color: white; border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .btn-next { background: var(--secondary); box-shadow: 0 6px 0 #1D4ED8; }
        .btn-next:hover { transform: scale(1.05); }
        .btn-restart { background: var(--primary); box-shadow: 0 6px 0 #C53030; }
        .btn-restart:hover { transform: scale(1.05); }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }

        /* SVG Styles */
        .geo-shape {
            stroke: var(--purple);
            stroke-width: 5;
            fill: rgba(131, 56, 236, 0.1);
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .angle-arc {
            fill: rgba(255, 0, 110, 0.2);
            stroke: var(--primary);
            stroke-width: 3;
        }

        /* Mobile */
        @media (max-width: 600px) {
            header { padding: 10px 15px; }
            h1 { font-size: 1.4rem; margin: 0 5px; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.3rem; }
            .container { padding: 0 15px; margin: 20px auto; }
            .card { padding: 20px; border-width: 4px; min-height: 480px; border-radius: 30px; }
            .lab-visual { height: 260px; margin-bottom: 20px; }
            .angle-val { font-size: 2.2rem; }
            .options-grid { grid-template-columns: 1fr; gap: 12px; }
            .opt-btn { padding: 15px; font-size: 1.2rem; }
            .quiz-question { font-size: 1.3rem; padding: 12px; }
            .tabs { padding: 5px; }
            .tab-btn { font-size: 1rem; padding: 10px; }
        }
    </style>
</head>
<body>

<header>
    <div class="grade-badge">5</div>
    <h1 id="app-title">Geometry</h1>
    <div class="custom-select-wrapper">
        <div class="custom-select">
            <div class="custom-select__trigger">
                <span id="current-lang-label">🗺️ ትግርኛ</span>
                <div style="font-size:0.8rem">▼</div>
            </div>
            <div class="custom-options">
                <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                <span class="custom-option" data-value="am">አማርኛ</span>
                <span class="custom-option" data-value="en">English</span>
                <span class="custom-option" data-value="om">Afan Oromoo</span>
                <span class="custom-option" data-value="so">Soomaali</span>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('lab')" id="tab-lab">Lab 🧪</button>
        <button class="tab-btn" onclick="switchMode('quiz')" id="tab-quiz">Quiz 🎮</button>
    </div>

    <!-- LAB MODE -->
    <div id="card-lab" class="card active">
        <div class="lab-visual">
            <div class="angle-info">
                <div class="angle-val" id="lab-val">90°</div>
                <div class="angle-type" id="lab-type">Right</div>
            </div>
            <svg width="400" height="300" viewBox="0 0 400 300" id="lab-svg" style="width:100%; height:100%;">
                <!-- Dynamic Content -->
            </svg>
        </div>
        <div class="slider-container">
            <input type="range" id="angle-slider" min="0" max="180" value="90" oninput="updateLab()">
        </div>
        <p id="lab-inst">Drag the slider to explore angles!</p>
    </div>

    <!-- QUIZ MODE -->
    <div id="card-quiz" class="card">
        <div class="score-board">
            <div class="score-pill high">🏆 <span id="high-score">0</span></div>
            <div class="score-pill curr">⭐ <span id="score">0</span></div>
        </div>

        <div class="quiz-question" id="quiz-q">What type of angle is this?</div>

        <div class="lab-visual" style="background:#fff; border-color:#E2E8F0;">
            <svg width="400" height="300" viewBox="0 0 400 300" id="quiz-svg" style="width:100%; height:100%;">
                <!-- Quiz Shape -->
            </svg>
        </div>

        <div class="options-grid" id="options-container">
            <!-- Buttons injected here -->
        </div>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedback">
            <div class="fb-icon" id="fb-icon">🎉</div>
            <div class="fb-title" id="fb-title">Correct!</div>
            <div class="fb-sub" id="fb-sub"></div>
            
            <button class="btn-action btn-next" onclick="nextQuestion()" id="btn-next">Next ➡</button>
            <button class="btn-action btn-restart" onclick="restartGame()" id="btn-restart" style="display:none;">Play Again 🔄</button>
        </div>
    </div>

</div>

<canvas id="confetti-canvas"></canvas>

<script>
    // --- Audio ---
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playSuccess() { 
            this.playTone(600, 'sine', 0.1); setTimeout(() => this.playTone(800, 'sine', 0.2), 100); 
        },
        playError() { 
            this.playTone(200, 'sawtooth', 0.2); setTimeout(() => this.playTone(150, 'sawtooth', 0.3), 150);
        },
        playGameOver() {
            this.playTone(300, 'sawtooth', 0.4); setTimeout(() => this.playTone(200, 'sawtooth', 0.6), 400);
        }
    };

        },

            },

            tabLab: "Sheybaadh 🧪",

                right: "Xagal Quman (Right)",

            },

            qTri: "Waa noocee saddex-xagalkani?",

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('geoHighScore') || 0;
    let currentQuizItem = null;

    // --- Core Logic ---

    function init() {
        document.getElementById('high-score').textContent = highScore;
        updateLanguage();
        updateLab(); // Initial draw
    }

    function switchMode(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+mode).classList.add('active');
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+mode).classList.add('active');
        
        if (mode === 'quiz') nextQuestion();
    }

    // --- Lab Mode ---
    function updateLab() {
        const slider = document.getElementById('angle-slider');
        const angle = parseInt(slider.value);
        const svg = document.getElementById('lab-svg');
        const t = translations[currentLang].types;
        
        // Determine Type
        let type = t.acute;
        let color = "var(--secondary)";
        if (angle === 90) { type = t.right; color = "var(--primary)"; }
        else if (angle > 90 && angle < 180) { type = t.obtuse; color = "var(--accent)"; }
        else if (angle === 180) { type = t.straight; color = "var(--green)"; }

        document.getElementById('lab-val').textContent = angle + "°";
        document.getElementById('lab-val').style.color = color;
        document.getElementById('lab-type').textContent = type;
        document.getElementById('lab-type').style.color = color;

        // Draw Angle
        drawAngle(svg, angle, color);
    }

    function drawAngle(svgElement, angle, color) {
        svgElement.innerHTML = '';
        // Larger SVG coordinates for bigger viewbox (400x300)
        const cx = 200, cy = 250, len = 150;
        
        // Base Line (Right)
        const line1 = createLine(cx, cy, cx + len, cy, "#CBD5E0");
        
        // Moving Line
        const rad = (angle * Math.PI) / 180;
        const x2 = cx + len * Math.cos(-rad); 
        const y2 = cy + len * Math.sin(-rad);
        const line2 = createLine(cx, cy, x2, y2, color);

        // Arc
        const arcRadius = 60; // Bigger arc
        const ax = cx + arcRadius * Math.cos(-rad);
        const ay = cy + arcRadius * Math.sin(-rad);
        const largeArc = 0;
        const sweep = 0; 
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        if (angle > 0) {
            const d = `M ${cx + arcRadius} ${cy} A ${arcRadius} ${arcRadius} 0 ${largeArc} ${sweep} ${ax} ${ay}`;
            path.setAttribute("d", d);
            path.setAttribute("class", "angle-arc");
            path.setAttribute("fill", "none");
            svgElement.appendChild(path);
        }

        // Vertex Point
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx); circle.setAttribute("cy", cy); circle.setAttribute("r", 8);
        circle.setAttribute("fill", "#2B2D42");

        // Special Square for 90
        if (angle === 90) {
            const sq = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const sqSize = 30;
            sq.setAttribute("d", `M ${cx+sqSize} ${cy} L ${cx+sqSize} ${cy-sqSize} L ${cx} ${cy-sqSize}`);
            sq.setAttribute("stroke", color);
            sq.setAttribute("stroke-width", "4");
            sq.setAttribute("fill", "none");
            svgElement.appendChild(sq);
        }

        svgElement.appendChild(line1);
        svgElement.appendChild(line2);
        svgElement.appendChild(circle);
    }

    function createLine(x1, y1, x2, y2, stroke) {
        const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
        l.setAttribute("x1", x1); l.setAttribute("y1", y1);
        l.setAttribute("x2", x2); l.setAttribute("y2", y2);
        l.setAttribute("class", "geo-shape");
        l.setAttribute("stroke", stroke);
        return l;
    }

    // --- Quiz Mode ---
    function nextQuestion() {
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-restart').style.display = 'none';
        
        // Randomly choose Angle or Triangle (50/50)
        const isTriangle = Math.random() > 0.5;
        
        if (isTriangle) setupTriangleQuiz();
        else setupAngleQuiz();
    }

    function setupAngleQuiz() {
        // Angles: Acute (30-80), Right (90), Obtuse (100-170)
        const types = ['acute', 'right', 'obtuse'];
        const targetType = types[Math.floor(Math.random() * types.length)];
        
        let angle = 90;
        if (targetType === 'acute') angle = Math.floor(Math.random() * 50) + 30;
        if (targetType === 'obtuse') angle = Math.floor(Math.random() * 60) + 100;

        const t = translations[currentLang];
        document.getElementById('quiz-q').textContent = t.qAngle;
        
        const svg = document.getElementById('quiz-svg');
        // Random bright color
        const color = ['#FF006E', '#3A86FF', '#06D6A0', '#8338EC'][Math.floor(Math.random()*4)];
        drawAngle(svg, angle, color);

        currentQuizItem = { type: targetType, answer: t.types[targetType] };
        
        // Options
        const opts = [t.types.acute, t.types.right, t.types.obtuse, t.types.straight];
        renderOptions(opts, currentQuizItem.answer);
    }

    function setupTriangleQuiz() {
        // Equilateral, Isosceles, Scalene
        const types = ['equilateral', 'isosceles', 'scalene'];
        const targetType = types[Math.floor(Math.random() * types.length)];
        
        const t = translations[currentLang];
        document.getElementById('quiz-q').textContent = t.qTri;
        
        const svg = document.getElementById('quiz-svg');
        svg.innerHTML = ''; // Clear
        
        // Draw Triangle (Bigger coordinates)
        const cx = 200, cy = 250;
        let p1, p2, p3; // Points string "x,y"
        
        const baseHalf = 80;
        
        if (targetType === 'equilateral') {
            const h = Math.sqrt(3) * baseHalf;
            p1 = `${cx},${cy - h}`; 
            p2 = `${cx - baseHalf},${cy}`;
            p3 = `${cx + baseHalf},${cy}`;
        } else if (targetType === 'isosceles') {
            const h = 200; 
            p1 = `${cx},${cy - h}`;
            p2 = `${cx - baseHalf + 20},${cy}`; // Base
            p3 = `${cx + baseHalf - 20},${cy}`;
        } else {
            // Scalene
            p1 = `${cx - 60},${cy - 180}`;
            p2 = `${cx - 100},${cy}`;
            p3 = `${cx + 120},${cy}`;
        }

        const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        poly.setAttribute("points", `${p1} ${p2} ${p3}`);
        poly.setAttribute("class", "geo-shape");
        poly.setAttribute("stroke", "#3A86FF");
        poly.setAttribute("fill", "rgba(58, 134, 255, 0.2)");
        svg.appendChild(poly);

        // Decorate vertices
        [p1, p2, p3].forEach(p => {
            const [x,y] = p.split(',');
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 8);
            c.setAttribute("fill", "#2B2D42");
            svg.appendChild(c);
        });

        currentQuizItem = { type: targetType, answer: t.types[targetType] };
        
        // Options
        const opts = [t.types.equilateral, t.types.isosceles, t.types.scalene, t.types.right]; // mixed
        renderOptions(opts, currentQuizItem.answer);
    }

    function renderOptions(optionsList, correctAnswer) {
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // Shuffle
        optionsList.sort(() => Math.random() - 0.5);
        
        optionsList.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.textContent = opt;
            btn.onclick = () => handleAnswer(opt, correctAnswer);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selected, correct) {
        const t = translations[currentLang];
        const overlay = document.getElementById('feedback');
        const icon = document.getElementById('fb-icon');
        const title = document.getElementById('fb-title');
        const sub = document.getElementById('fb-sub');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');

        if (selected === correct) {
            // Win
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('geoHighScore', highScore);
            }
            document.getElementById('score').textContent = score;
            document.getElementById('high-score').textContent = highScore;
            
            AudioEngine.playSuccess();
            triggerConfetti();
            
            icon.textContent = '🎉';
            title.textContent = t.correct;
            title.style.color = "var(--green)";
            sub.textContent = "";
            btnNext.style.display = 'block';
            btnRestart.style.display = 'none';
        } else {
            // Lose
            AudioEngine.playGameOver();
            AudioEngine.playError();
            
            icon.textContent = '❌';
            title.textContent = t.gameover;
            title.style.color = "var(--primary)";
            sub.textContent = t.finalScore + score;
            
            btnNext.style.display = 'none';
            btnRestart.style.display = 'block';
        }
        overlay.classList.add('show');
    }

    function restartGame() {
        score = 0;
        document.getElementById('score').textContent = 0;
        nextQuestion();
    }

    // --- Translations ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', (e) => {
        selectCustom.classList.toggle('open'); e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                this.classList.add('selected');
                
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                selectCustom.classList.remove('open');
                
                currentLang = value;
                updateLanguage();
            }
        });
    });

    window.addEventListener('click', (e) => {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('tab-lab').textContent = t.tabLab;
        document.getElementById('tab-quiz').textContent = t.tabQuiz;
        document.getElementById('btn-next').textContent = t.btnNext;
        document.getElementById('btn-restart').textContent = t.btnRestart;
        document.getElementById('lab-inst').textContent = t.labInst;
        
        // Refresh views
        updateLab(); 
        if(currentQuizItem) nextQuestion(); 
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<80; i++) {
            pieces.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20 - 10,
                c: `hsl(${Math.random()*360}, 100%, 50%)`,
                r: Math.random() * 6 + 3
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.5;
                if(p.y < canvas.height) active = true;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            if(active) requestAnimationFrame(anim);
        }
        anim();
    }

    window.onload = init;

</script>

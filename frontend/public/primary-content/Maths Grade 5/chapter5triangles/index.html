
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Triangles - ስሉስ ኩርናዓት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Vibrant & Fun Palette */
            --bg-gradient: linear-gradient(120deg, #84fab0 0%, #8fd3f4 100%);
            --card-bg: #ffffff;
            --primary: #FF006E;
            --secondary: #3A86FF;
            --accent: #FFBE0B;
            --green: #00b4d8;
            --text: #2B2D42;
            --panel-bg: #F0F4F8;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-image: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 0, 110, 0.16), transparent 45%),
                radial-gradient(circle at 88% 18%, rgba(58, 134, 255, 0.16), transparent 45%),
                radial-gradient(circle at 16% 86%, rgba(255, 190, 11, 0.18), transparent 50%),
                radial-gradient(circle at 86% 88%, rgba(131, 56, 236, 0.14), transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--secondary);
            border-radius: 0 0 30px 30px;
            background-image: linear-gradient(90deg, rgba(255, 0, 110, 0.10), rgba(58, 134, 255, 0.10), rgba(255, 190, 11, 0.12));
        }

        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.6rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            border: 4px solid white;
            transform: rotate(-5deg);
        }

        h1 {
            color: var(--secondary);
            font-size: 2rem;
            font-weight: 900;
            margin: 0 15px;
            text-align: center;
            text-shadow: 2px 2px 0px white;
        }

        /* Custom Select */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--text);
            height: 50px; background: #fff; cursor: pointer;
            border: 3px solid #e2e8f0; border-radius: 25px;
            width: 160px; font-size: 1.1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #cbd5e0;
        }
        .custom-select__trigger:hover { border-color: var(--primary); transform: scale(1.05); }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-options {
            position: absolute; top: 130%; left: 0; right: 0;
            background: #fff; border: 3px solid #e2e8f0; border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden; transform: translateY(-15px);
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .custom-option:hover { background: #E0E7FF; color: var(--primary); }

        /* --- Container --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -14px;
            border-radius: 60px;
            background:
                linear-gradient(135deg, rgba(255, 190, 11, 0.18), rgba(58, 134, 255, 0.14), rgba(255, 0, 110, 0.14)),
                radial-gradient(circle at 18% 18%, rgba(255,255,255,0.7), transparent 45%),
                radial-gradient(circle at 82% 70%, rgba(255,255,255,0.55), transparent 48%);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            pointer-events: none;
            z-index: 0;
        }

        .container > * { position: relative; z-index: 1; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
            background: rgba(255,255,255,0.8);
            padding: 10px;
            border-radius: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .tab-btn {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            font-weight: 900;
            font-size: 1.3rem;
            cursor: pointer;
            background: transparent;
            color: #555;
            transition: all 0.2s;
        }
        .tab-btn:hover { transform: translateY(-2px); }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 6px 0 #D90050;
            transform: translateY(-3px);
        }
        .tab-btn.active:active { transform: translateY(0); box-shadow: none; }

        /* Card */
        .card {
            background-color: var(--card-bg);
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            border: 8px solid white;
            width: 100%;
            min-height: 600px;
            display: none;
            flex-direction: column;
            align-items: center;
            position: relative;
            animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card.active { display: flex; }

        .card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(255, 190, 11, 0.10), rgba(58, 134, 255, 0.10), rgba(255, 0, 110, 0.10));
            opacity: 0.55;
            pointer-events: none;
            z-index: 0;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: radial-gradient(circle at 18% 18%, rgba(255,255,255,0.92), transparent 36%);
            opacity: 0.45;
            pointer-events: none;
            z-index: 0;
        }

        .card > * { position: relative; z-index: 1; }

        /* --- Explore Mode Layout --- */
        .learn-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* Visual gets slightly more */
            gap: 40px;
            width: 100%;
            align-items: center;
            margin-bottom: 30px;
        }

        .visual-display {
            width: 100%;
            height: 450px;
            background: var(--panel-bg);
            border-radius: 40px;
            border: 4px dashed #CBD5E0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: visible;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.03);
        }

        .visual-display::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 40px;
            background:
                radial-gradient(circle at 22% 20%, rgba(58, 134, 255, 0.12), transparent 45%),
                radial-gradient(circle at 82% 70%, rgba(255, 0, 110, 0.10), transparent 45%);
            pointer-events: none;
        }

        /* Large Info Box */
        .info-container {
            background: #FFF9C4; /* Soft Yellow */
            padding: 40px;
            border-radius: 40px;
            border: 4px solid var(--accent);
            box-shadow: 10px 10px 0 rgba(255, 190, 11, 0.2);
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .info-title { 
            font-size: 3.5rem; 
            font-weight: 900; 
            color: var(--secondary); 
            margin-bottom: 15px; 
            line-height: 1.1;
        }
        
        .info-desc { 
            font-size: 2rem; 
            color: #4A5568; 
            font-weight: 800; 
            line-height: 1.4;
        }

        /* Controls Grid (Explore) */
        .controls-container {
            width: 100%;
        }
        
        .section-label {
            font-size: 1.6rem; font-weight: 900; color: #718096; margin: 30px 0 15px 0;
            display: flex; align-items: center; gap: 10px;
        }
        .section-label::before { content: ''; display: inline-block; width: 12px; height: 12px; background: #CBD5E0; border-radius: 50%; }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .control-btn {
            background: white;
            border: 3px solid #e2e8f0;
            padding: 20px;
            border-radius: 25px;
            font-weight: 800;
            color: var(--text);
            cursor: pointer;
            box-shadow: 0 6px 0 #cbd5e0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
            font-size: 1.2rem;
            min-height: 100px;
            transition: transform 0.1s, background-color 0.2s;
        }
        .control-btn:hover { border-color: var(--secondary); background: #EBF8FF; transform: translateY(-4px); }
        .control-btn.active { 
            border-color: var(--primary); 
            background: #FFF0F5; 
            color: var(--primary); 
            transform: translateY(-4px); 
            box-shadow: 0 8px 0 #D90050;
        }
        .control-btn:active { transform: translateY(4px); box-shadow: none; }

        /* --- Quiz Mode --- */
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }
        .score-pill {
            background: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.4rem;
            border: 3px solid #eee;
            display: flex; gap: 10px; align-items: center;
            box-shadow: 0 6px 0 #eee;
        }
        .score-pill.high { color: #B7791F; border-color: var(--accent); background: #FFFBEB; }
        .score-pill.curr { color: var(--green); border-color: var(--green); background: #F0FFF4; }

        .quiz-question {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--text);
            margin-bottom: 30px;
            text-align: center;
            background: #E2E8F0;
            padding: 20px 40px;
            border-radius: 30px;
            width: 100%;
            border-left: 10px solid var(--secondary);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 700px;
            margin-top: 20px;
        }

        .opt-btn {
            background: white;
            border: 4px solid #E2E8F0;
            padding: 25px;
            border-radius: 25px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            cursor: pointer;
            transition: all 0.1s;
            box-shadow: 0 8px 0 #CBD5E0;
        }
        .opt-btn:hover { border-color: var(--secondary); background: #EBF8FF; transform: translateY(-4px); }
        .opt-btn:active { transform: translateY(4px); box-shadow: none; }

        /* Feedback Overlay */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            border-radius: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s;
        }
        .feedback-overlay.show { display: flex; }

        .fb-icon { font-size: 8rem; margin-bottom: 10px; animation: popIn 0.5s; }
        .fb-title { font-size: 3.5rem; font-weight: 900; margin-bottom: 10px; }
        .fb-sub { font-size: 1.8rem; color: #718096; margin-bottom: 40px; font-weight: bold; }
        
        .btn-action {
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.8rem; font-weight: 900;
            color: white; border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .btn-next { background: var(--secondary); box-shadow: 0 8px 0 #1D4ED8; }
        .btn-next:hover { transform: scale(1.05); }
        .btn-restart { background: var(--primary); box-shadow: 0 8px 0 #C53030; }
        .btn-restart:hover { transform: scale(1.05); }
        .btn-action:active { transform: translateY(4px); box-shadow: none; }

        @keyframes popIn { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #confetti-canvas.show { opacity: 1; }

        /* SVG Styles */
        .tri-shape {
            stroke: var(--text);
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: rgba(255, 255, 255, 0.5); /* Transparent white fill */
            transition: d 0.5s ease;
        }
        
        /* HALO Effect for text visibility */
        .geo-label-text, .angle-text {
            font-size: 24px;
            font-weight: 900;
            fill: var(--text);
            text-anchor: middle;
            dominant-baseline: middle;
            paint-order: stroke;
            stroke: rgba(255, 255, 255, 0.9);
            stroke-width: 8px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .angle-text { fill: var(--primary); }

        .mark-line { stroke: var(--primary); stroke-width: 4; }
        .angle-arc { fill: rgba(255, 190, 11, 0.3); stroke: var(--accent); stroke-width: 4; }
        .right-angle { fill: none; stroke: var(--text); stroke-width: 4; }

        /* Mobile */
        @media (max-width: 900px) {
            .learn-layout { grid-template-columns: 1fr; gap: 20px; }
            .visual-display { height: 350px; }
            .info-container { padding: 20px; text-align: center; }
            .info-title { font-size: 2rem; }
            .info-desc { font-size: 1.2rem; }
            
            header { padding: 10px 15px; flex-wrap: wrap; justify-content: center; gap: 10px; }
            h1 { font-size: 1.5rem; margin: 0; width: 100%; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.3rem; }
            .container { padding: 0 15px; margin: 20px auto; }
            .card { padding: 20px; border-width: 4px; min-height: 480px; border-radius: 30px; }
            .opt-btn { padding: 15px; font-size: 1.1rem; }
            .quiz-question { font-size: 1.3rem; padding: 15px; }
            .controls-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="grade-badge">5</div>
    <h1 id="app-title">Triangles</h1>
    <div class="custom-select-wrapper">
        <div class="custom-select">
            <div class="custom-select__trigger">
                <span id="current-lang-label">🗺️ ትግርኛ</span>
                <div style="font-size:0.8rem">▼</div>
            </div>
            <div class="custom-options">
                <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                <span class="custom-option" data-value="am">አማርኛ</span>
                <span class="custom-option" data-value="en">English</span>
                <span class="custom-option" data-value="om">Afan Oromoo</span>
                <span class="custom-option" data-value="so">Soomaali</span>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchMode('learn')" id="tab-learn">Explore 🔍</button>
        <button class="tab-btn" onclick="switchMode('quiz')" id="tab-quiz">Quiz 🎮</button>
    </div>

    <!-- LEARN MODE -->
    <div id="card-learn" class="card active">
        
        <div class="learn-layout">
            <!-- Visual Side -->
            <div class="visual-display">
                <svg width="400" height="300" viewBox="0 0 400 300" id="learn-svg" style="width:100%; height:100%;">
                    <!-- Drawn by JS -->
                </svg>
            </div>
            
            <!-- Info Side -->
            <div class="info-container">
                <div class="info-title" id="info-title">Equilateral</div>
                <div class="info-desc" id="info-desc">All sides equal</div>
            </div>
        </div>
        
        <div class="controls-container">
            <div class="section-label" id="lbl-by-side">By Side Length</div>
            <div class="controls-grid" id="controls-side"></div>

            <div class="section-label" id="lbl-by-angle">By Angle</div>
            <div class="controls-grid" id="controls-angle"></div>
        </div>
    </div>

    <!-- QUIZ MODE -->
    <div id="card-quiz" class="card">
        <div class="score-board">
            <div class="score-pill high">🏆 <span id="high-score">0</span></div>
            <div class="score-pill curr">⭐ <span id="score">0</span></div>
        </div>

        <div class="quiz-question" id="quiz-q">What type of triangle is this?</div>

        <div class="visual-display" style="background:#fff; border-color:#E2E8F0; height:300px; justify-content:center;">
            <svg width="400" height="300" viewBox="0 0 400 300" id="quiz-svg" style="width:100%; height:100%;">
                <!-- Quiz shape -->
            </svg>
        </div>

        <div class="options-grid" id="options-container">
            <!-- Buttons injected here -->
        </div>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedback">
            <div class="fb-icon" id="fb-icon">🎉</div>
            <div class="fb-title" id="fb-title">Correct!</div>
            <div class="fb-sub" id="fb-sub"></div>
            
            <button class="btn-action btn-next" onclick="nextQuestion()" id="btn-next">Next ➡</button>
            <button class="btn-action btn-restart" onclick="restartGame()" id="btn-restart" style="display:none;">Play Again 🔄</button>
        </div>
    </div>

</div>

<canvas id="confetti-canvas"></canvas>

<script>
    // --- Audio ---
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playTone(freq, type, duration) {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.start();
            osc.stop(this.ctx.currentTime + duration);
        },
        playSuccess() { 
            this.playTone(600, 'sine', 0.1); setTimeout(() => this.playTone(800, 'sine', 0.2), 100); 
        },
        playError() { 
            this.playTone(200, 'sawtooth', 0.2); setTimeout(() => this.playTone(150, 'sawtooth', 0.3), 150);
        },
        playGameOver() {
            this.playTone(300, 'sawtooth', 0.4); setTimeout(() => this.playTone(200, 'sawtooth', 0.6), 400);
        }
    };

    // --- Translations & Data ---
    const types = {
        // Sides
        equilateral: "equilateral",
        isosceles: "isosceles",
        scalene: "scalene",
        // Angles
        acute: "acute",
        right: "right",
        obtuse: "obtuse"
    };

    // Data definitions for shapes including visual props
    const triangleData = {
        equilateral: { sideLabels: [5, 5, 5], angleLabels: [60, 60, 60], type: 'side' },
        isosceles: { sideLabels: [5, 5, 3], angleLabels: [72, 72, 36], type: 'side' },
        scalene: { sideLabels: [3, 4, 5], angleLabels: [37, 53, 90], type: 'side' },
        acute: { sideLabels: [5, 5, 5], angleLabels: [60, 60, 60], type: 'angle' }, 
        right: { sideLabels: [3, 4, 5], angleLabels: [90, 53, 37], type: 'angle' },
        obtuse: { sideLabels: [4, 4, 7], angleLabels: [120, 30, 30], type: 'angle' }
    };

    const translations = {
        ti: {
            title: "ስሉስ ኩርናዓት",
            tabLearn: "መሰልጠኒ 🔍",
            tabQuiz: "ፈተና 🎮",
            lblBySide: "ብጎኒ (By Side)",
            lblByAngle: "ብኩርናዕ (By Angle)",
            terms: {
                equilateral: { label: "ማዕረ ጎኒ", desc: "ኩሎም ጎንታት ማዕረ (5, 5, 5)" },
                isosceles: { label: "ክልተ ማዕረ", desc: "ክልተ ጎንታት ማዕረ (5, 5, 3)" },
                scalene: { label: "ኢ-ማዕረ ጎኒ", desc: "ኩሎም ጎንታት ዝተፈላለዩ (3, 4, 5)" },
                acute: { label: "ወሻጥ", desc: "ኩሎም ኩርናዓት < 90° (60°, 60°, 60°)" },
                right: { label: "ማአዝናዊ", desc: "ሓደ ኩርናዕ 90°" },
                obtuse: { label: "ጋሕጣጥ", desc: "ሓደ ኩርናዕ > 90° (120°)" }
            },
            qSide: "ብጎኒ፡ እዚ እንታይ እዩ?",
            qAngle: "ብኩርናዕ፡ እዚ እንታይ እዩ?",
            correct: "ትኽክል!",

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('triangleHighScore') || 0;
    let currentQuizKey = '';
    let currentQuizCategory = 'side'; // 'side' or 'angle'

    // --- Core Logic ---

    function init() {
        document.getElementById('high-score').textContent = highScore;
        
        // Setup Control Buttons
        setupButtons('controls-side', ['equilateral', 'isosceles', 'scalene']);
        setupButtons('controls-angle', ['acute', 'right', 'obtuse']);

        updateLanguage();
        selectExplore('equilateral'); // Default
    }

    function setupButtons(containerId, keys) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        keys.forEach(key => {
            const btn = document.createElement('div');
            btn.className = 'control-btn';
            btn.dataset.key = key;
            btn.onclick = () => selectExplore(key);
            // Label will be set by updateLanguage
            btn.innerHTML = `<span class="btn-text"></span>`;
            container.appendChild(btn);
        });
    }

    function switchMode(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-'+mode).classList.add('active');
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById('card-'+mode).classList.add('active');
        
        if (mode === 'quiz') nextQuestion();
    }

    // --- Explore Mode ---
    function selectExplore(key) {
        // Update Buttons
        document.querySelectorAll('.control-btn').forEach(b => {
            b.classList.remove('active');
            if(b.dataset.key === key) b.classList.add('active');
        });

        // Update Text
        const t = translations[currentLang].terms[key];
        document.getElementById('info-title').textContent = t.label;
        document.getElementById('info-desc').textContent = t.desc;

        // Draw Visual
        // Decide display mode based on key type
        const data = triangleData[key];
        const displayType = data.type; // 'side' or 'angle'
        drawTriangle(document.getElementById('learn-svg'), key, "#3A86FF", displayType, data);
    }

    // --- Drawing Logic (SVG) ---
    function drawTriangle(svg, type, color, displayMode, dataOverride) {
        svg.innerHTML = '';
        const cx = 200, cy = 220; // Centered
        let p1, p2, p3;
        
        // Coordinates Calculation
        if (type === 'equilateral' || type === 'acute') {
            const s = 180;
            const h = s * Math.sqrt(3)/2;
            p1 = {x: cx, y: cy - h + 40};
            p2 = {x: cx - s/2, y: cy + 40};
            p3 = {x: cx + s/2, y: cy + 40};
        } else if (type === 'isosceles') {
            p1 = {x: cx, y: 50};
            p2 = {x: cx - 60, y: 250};
            p3 = {x: cx + 60, y: 250};
        } else if (type === 'scalene') {
            p1 = {x: cx - 40, y: 60};
            p2 = {x: cx - 100, y: 250};
            p3 = {x: cx + 120, y: 250};
        } else if (type === 'right') {
            p1 = {x: cx - 60, y: 60};
            p2 = {x: cx - 60, y: 250};
            p3 = {x: cx + 100, y: 250};
        } else if (type === 'obtuse') {
            p1 = {x: cx, y: 80};
            p2 = {x: cx - 120, y: 250};
            p3 = {x: cx + 60, y: 250};
        }

        // Draw Polygon
        const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        poly.setAttribute("points", `${p1.x},${p1.y} ${p2.x},${p2.y} ${p3.x},${p3.y}`);
        poly.setAttribute("class", "tri-shape");
        poly.setAttribute("stroke", color);
        svg.appendChild(poly);

        // Labels
        const data = dataOverride || triangleData[type];
        
        if (displayMode === 'side') {
            // Draw Side Labels
            drawLabel(svg, p1, p2, data.sideLabels[0]);
            drawLabel(svg, p2, p3, data.sideLabels[1]);
            drawLabel(svg, p3, p1, data.sideLabels[2]);
        } else {
            // Draw Angle Labels
            drawAngleLabel(svg, p2, p1, p3, data.angleLabels[0] + "°", type==='right' && data.angleLabels[0]===90);
            drawAngleLabel(svg, p3, p2, p1, data.angleLabels[1] + "°", false);
            drawAngleLabel(svg, p1, p3, p2, data.angleLabels[2] + "°", false);
        }
    }

    function drawLabel(svg, a, b, text) {
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        let nx = -dy;
        let ny = dx;
        const len = Math.sqrt(nx*nx + ny*ny);
        nx /= len; ny /= len;
        
        const dist = 30; // Increased distance
        const tx = mx + nx * dist;
        const ty = my + ny * dist;

        const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
        t.setAttribute("x", tx); t.setAttribute("y", ty);
        t.setAttribute("class", "geo-label-text");
        t.textContent = text;
        svg.appendChild(t);
    }

    function drawAngleLabel(svg, vertex, pA, pB, text, isRight) {
        // Draw Arc
        const r = 35;
        const startAngle = Math.atan2(pA.y - vertex.y, pA.x - vertex.x);
        const endAngle = Math.atan2(pB.y - vertex.y, pB.x - vertex.x);
        
        // Ensure arc is drawn correctly
        // Simple Arc drawing logic or just use a circle at corner for simplicity
        
        if (isRight) {
            const size = 25;
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            // Simple right angle mark assuming orthogonal visual
            // More robust: calculate points along vectors
            // For simplicity in this low-code, just drawing the text clearly is key
            // But let's try a small square
            path.setAttribute("d", `M ${vertex.x} ${vertex.y-size} L ${vertex.x+size} ${vertex.y-size} L ${vertex.x+size} ${vertex.y}`);
            // This is hardcoded orientation, might be wrong. 
            // Better: just draw the text.
        } else {
             const arc = document.createElementNS("http://www.w3.org/2000/svg", "circle");
             arc.setAttribute("cx", vertex.x); arc.setAttribute("cy", vertex.y);
             arc.setAttribute("r", r);
             arc.setAttribute("fill", "rgba(255, 190, 11, 0.3)");
             arc.setAttribute("stroke", "none");
             // Clip path would be better but complex. Just a circle behind text helps visibility.
             // Actually, let's just place the text with the Halo effect.
        }

        // Position text
        const cx = (vertex.x + pA.x + pB.x) / 3;
        const cy = (vertex.y + pA.y + pB.y) / 3;
        
        const t = 0.35; 
        const lx = vertex.x + (cx - vertex.x) * t;
        const ly = vertex.y + (cy - vertex.y) * t;

        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", lx); txt.setAttribute("y", ly);
        txt.setAttribute("class", "angle-text");
        txt.textContent = text;
        svg.appendChild(txt);
    }

    // --- Quiz Mode ---
    function nextQuestion() {
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('btn-restart').style.display = 'none';

        // 1. Choose Category (Side or Angle)
        currentQuizCategory = Math.random() > 0.5 ? 'side' : 'angle';
        
        let pool = [];
        if (currentQuizCategory === 'side') pool = ['equilateral', 'isosceles', 'scalene'];
        else pool = ['acute', 'right', 'obtuse'];

        currentQuizKey = pool[Math.floor(Math.random() * pool.length)];

        // Update Question Text
        const t = translations[currentLang];
        document.getElementById('quiz-q').textContent = (currentQuizCategory === 'side') ? t.qSide : t.qAngle;

        // Draw
        const color = ['#FF006E', '#3A86FF', '#06D6A0', '#8338EC'][Math.floor(Math.random()*4)];
        drawTriangle(document.getElementById('quiz-svg'), currentQuizKey, color, currentQuizCategory);

        // Options
        renderOptions(pool, currentQuizKey);
    }

    function renderOptions(pool, correctKey) {
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        // Shuffle
        const options = [...pool].sort(() => Math.random() - 0.5);
        
        const t = translations[currentLang];

        options.forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.textContent = t.terms[key].label;
            btn.onclick = () => handleAnswer(key);
            container.appendChild(btn);
        });
    }

    function handleAnswer(selected) {
        const t = translations[currentLang];
        const overlay = document.getElementById('feedback');
        const icon = document.getElementById('fb-icon');
        const title = document.getElementById('fb-title');
        const sub = document.getElementById('fb-sub');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');

        if (selected === currentQuizKey) {
            // Win
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('triangleHighScore', highScore);
            }
            document.getElementById('score').textContent = score;
            document.getElementById('high-score').textContent = highScore;
            
            AudioEngine.playSuccess();
            triggerConfetti();
            
            icon.textContent = '🎉';
            title.textContent = t.correct;
            title.style.color = "var(--green)";
            sub.textContent = "";
            btnNext.style.display = 'block';
            btnRestart.style.display = 'none';
        } else {
            // Lose
            AudioEngine.playGameOver();
            AudioEngine.playError();
            
            icon.textContent = '❌';
            title.textContent = t.gameover;
            title.style.color = "var(--primary)";
            sub.textContent = t.finalScore + score;
            
            btnNext.style.display = 'none';
            btnRestart.style.display = 'block';
        }
        overlay.classList.add('show');
    }

    function restartGame() {
        score = 0;
        document.getElementById('score').textContent = 0;
        nextQuestion();
    }

    // --- Translations ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', (e) => {
        selectCustom.classList.toggle('open'); e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                this.classList.add('selected');
                
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                selectCustom.classList.remove('open');
                
                currentLang = value;
                updateLanguage();
            }
        });
    });

    window.addEventListener('click', (e) => {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function updateLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('tab-learn').textContent = t.tabLearn;
        document.getElementById('tab-quiz').textContent = t.tabQuiz;
        document.getElementById('lbl-by-side').textContent = t.lblBySide;
        document.getElementById('lbl-by-angle').textContent = t.lblByAngle;
        document.getElementById('btn-next').textContent = t.btnNext;
        document.getElementById('btn-restart').textContent = t.btnRestart;

        // Update control labels
        document.querySelectorAll('.control-btn').forEach(btn => {
            const key = btn.dataset.key;
            btn.querySelector('.btn-text').textContent = t.terms[key].label;
        });

        // Update current learn view
        const currentBtn = document.querySelector('.control-btn.active');
        if(currentBtn) selectExplore(currentBtn.dataset.key);
        
        // Update quiz question if active
        if(currentQuizCategory) {
            document.getElementById('quiz-q').textContent = (currentQuizCategory === 'side') ? t.qSide : t.qAngle;
        }
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.classList.add('show');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<80; i++) {
            pieces.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20 - 10,
                c: `hsl(${Math.random()*360}, 100%, 50%)`,
                r: Math.random() * 6 + 3
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.5;
                if(p.y < canvas.height) active = true;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            if(active) {
                requestAnimationFrame(anim);
            } else {
                canvas.classList.remove('show');
            }
        }
        anim();
    }

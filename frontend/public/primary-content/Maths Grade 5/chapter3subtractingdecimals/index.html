<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subtracting Decimals - ምጉዳል ደሲማላት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* New Color Palette for Subtraction (Teal, Orange, Gold) */
            --primary: #00897B;   /* Teal Green - for main math elements, input border */
            --secondary: #FF6E40; /* Vibrant Orange - for header border, grade badge, error feedback */
            --accent: #FFD700;    /* Gold Yellow - for highlights, focus */
            --success: #66BB6A;   /* Light Green - for correct feedback */
            --error: #EF5350;     /* Red - for incorrect/restart button */
            --purple: #795548;    /* Brownish-Purple - for title */
            --text: #3E2723;      /* Dark Brown - for general text */
            --white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #E8F5E9 0%, #E0F2F7 100%); /* Light green-blue background */

            --juice-main: #42A5F5; /* Blue for the main quantity */
            --juice-subtract: #FF7043; /* Orange for the quantity being subtracted */
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 110, 64, 0.18), transparent 45%), /* secondary */
                radial-gradient(circle at 86% 20%, rgba(0, 137, 123, 0.16), transparent 48%), /* primary */
                radial-gradient(circle at 18% 88%, rgba(255, 215, 0, 0.16), transparent 52%), /* accent */
                radial-gradient(circle at 86% 86%, rgba(102, 187, 106, 0.12), transparent 55%); /* success */
            pointer-events: none;
            z-index: -1;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--secondary); /* Changed color */
            border-radius: 0 0 25px 25px;
            background-image: linear-gradient(90deg, rgba(255, 215, 0, 0.12), rgba(255, 110, 64, 0.12), rgba(0, 137, 123, 0.10)); /* Changed colors */
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        
        .header-center { 
            flex: 2; 
            text-align: center; 
            display: flex; 
            justify-content: center;
        }

        .grade-badge {
            background: var(--secondary); /* Changed color */
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(255, 110, 64, 0.3); /* Changed color */
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--purple); /* Changed color */
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            background: rgba(255,255,255,0.6);
            padding: 5px 20px;
            border-radius: 20px;
        }

        /* Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text);
            height: 45px; background: white; 
            border-radius: 25px;
            width: 160px; transition: 0.2s;
            border: 3px solid var(--primary); /* Changed color */
            box-shadow: 0 4px 0 rgba(0, 137, 123, 0.2); /* Changed color */
        }
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 5px;
            border-radius: 15px; padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #eee;
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .custom-option:hover { background: #FFECB3; color: var(--accent); } /* Changed colors */
        .arrow { border: solid var(--primary); border-width: 0 3px 3px 0; padding: 3px; transform: rotate(45deg); margin-bottom: 2px; }

        /* --- Main Content --- */
        .container {
            max-width: 980px;
            margin: 34px auto;
            padding: 0 20px;
            text-align: center;
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -14px;
            border-radius: 60px;
            background:
                linear-gradient(135deg, rgba(0, 137, 123, 0.14), rgba(255, 110, 64, 0.10), rgba(255, 215, 0, 0.10)), /* Changed colors */
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.75), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.55), transparent 55%);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            pointer-events: none;
            z-index: 0;
        }

        .container > * { position: relative; z-index: 1; }

        /* Score Board */
        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .score-pill {
            background: white;
            border: 3px solid #eee;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            display: flex; gap: 10px; align-items: center;
        }
        .score-pill.high { border-color: var(--accent); color: var(--accent); background: #FFFDE7; } /* Changed colors */
        .score-pill.curr { border-color: var(--primary); color: var(--primary); background: #E0F7FA; } /* Changed colors */

        /* Card */
        .lesson-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 6px solid white;
            border-radius: 50px;
            padding: 40px;
            position: relative;
            min-height: 550px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .lesson-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(0, 137, 123, 0.10), rgba(255, 110, 64, 0.10), rgba(255, 215, 0, 0.08)); /* Changed colors */
            opacity: 0.70;
            pointer-events: none;
            z-index: 0;
        }

        .lesson-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: radial-gradient(circle at 20% 18%, rgba(255,255,255,0.92), transparent 40%);
            opacity: 0.55;
            pointer-events: none;
            z-index: 0;
        }

        .lesson-card > * { position: relative; z-index: 1; }

        .instruction-text {
            color: #555; 
            margin-bottom: 30px; 
            font-size: 1.4rem; 
            font-weight: 800;
            background: #E0F7FA;
            display: inline-block;
            padding: 12px 25px;
            border-radius: 25px;
            border: 2px dashed var(--primary);
        }

        .instruction-text {
            background: linear-gradient(135deg, rgba(102, 187, 106, 0.18), rgba(255, 215, 0, 0.18)); /* Changed colors */
            border-color: rgba(0, 137, 123, 0.55); /* Changed colors */
        }

        /* Juice Shop Visualization */
        .visual-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-bottom: 40px;
            height: 250px;
        }

        .pitcher-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .pitcher {
            width: 80px;
            height: 120px;
            background: rgba(255, 255, 255, 0.3);
            border: 4px solid #eee;
            border-radius: 10px 10px 30px 30px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .pitcher {
            border-color: rgba(0, 137, 123, 0.18); /* Changed color */
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05), 0 10px 22px rgba(0,0,0,0.08);
        }

        .juice {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            transition: height 1s ease-in-out;
        }
        .juice-1 { background: var(--juice-main); } /* Changed color for main liquid */
        .juice-2 { background: var(--juice-subtract); } /* Changed color for subtracted liquid */

        .pitcher-label {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--text);
            background: white;
            padding: 2px 10px;
            border-radius: 10px;
            box-shadow: 0 4px 0 #eee;
        }

        .bottle-target {
            width: 120px;
            height: 200px;
            background: white;
            border: 6px solid var(--primary); /* Changed color */
            border-radius: 20px 20px 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .bottle-target {
            box-shadow: 0 12px 26px rgba(0,0,0,0.12);
        }

        .target-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: var(--juice-main); /* Changed to show remaining main juice */
            transition: height 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Subtraction Workspace */
        .workspace {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .vertical-math {
            font-family: 'Comic Neue', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: right;
            display: inline-block;
            padding: 20px 40px;
            background: #F8F9FA;
            border-radius: 30px;
            border: 4px solid #E9ECEF;
            position: relative;
        }

        .math-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            height: 70px;
        }

        .minus-sign { /* Changed from plus-sign */
            position: absolute;
            left: 20px;
            bottom: 55px; /* Adjusted for subtraction visual position */
            color: var(--error); /* Changed color */
            font-size: 2.5rem;
        }

        @media (min-width: 601px) {
            .minus-sign { bottom: 80px; } /* Adjusted for subtraction visual position */
        }

        .math-line {
            width: 100%;
            height: 6px;
            background: var(--text);
            margin: 10px 0;
            border-radius: 3px;
        }

        .decimal-input {
            width: 180px;
            height: 80px;
            font-size: 3.5rem;
            background: white;
            border: 4px solid var(--primary); /* Changed color */
            color: var(--primary); /* Changed color */
            text-align: right;
            border-radius: 15px;
            outline: none;
            font-weight: 900;
            padding-right: 15px;
            box-shadow: 0 4px 0 #E0F7FA; /* Changed color */
        }
        .decimal-input:focus { border-color: var(--accent); box-shadow: 0 10px 24px rgba(255, 215, 0, 0.35); transform: scale(1.05); } /* Changed colors */

        .btn-check {
            background: var(--success); /* Changed color */
            color: white;
            border: none;
            padding: 15px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #388E3C; /* Changed color */
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-check:hover { transform: scale(1.06) translateY(-3px); box-shadow: 0 12px 0 #388E3C; filter: brightness(1.03); } /* Changed color */
        .btn-check:active { transform: translateY(4px); box-shadow: none; }

        /* Feedback Overlay */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s;
            border-radius: 40px;
        }
        .feedback-overlay.show { display: flex; }

        .fb-icon { font-size: 8rem; margin-bottom: 20px; animation: popIn 0.5s; }
        .fb-title { font-size: 3rem; font-weight: 900; margin-bottom: 10px; color: var(--text); }
        .fb-sub { font-size: 1.8rem; color: #718096; margin-bottom: 40px; font-weight: bold; }
        
        .btn-next {
            background: var(--success); /* Changed color */
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #388E3C; /* Changed color */
        }
        .btn-next:hover { transform: scale(1.1); }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }

        .btn-restart {
            background: var(--error); /* Changed color */
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #D32F2F; /* Changed color */
        }
        .btn-restart:hover { transform: scale(1.1); }
        .btn-restart:active { transform: translateY(4px); box-shadow: none; }

        /* Confetti */
        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 5; }
        .confetti { position: absolute; width: 12px; height: 12px; background: white; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(600px) rotate(720deg); opacity: 0; } }

        /* Animations */
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        @media (max-width: 600px) {
            h1 { font-size: 1.3rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.2rem; }
            .header-center { flex: 3; }
            .container { padding: 0 10px; }
            .lesson-card { padding: 20px; border-radius: 30px; }
            .vertical-math { font-size: 2rem; padding: 15px; }
            .math-row { height: 40px; }
            .decimal-input { width: 120px; height: 50px; font-size: 2rem; }
            .visual-area { height: 180px; gap: 15px; }
            .pitcher { width: 50px; height: 80px; }
            .bottle-target { width: 80px; height: 130px; }
        }
    </style>
</head>

    <div class="header-center">
        <h1 id="header-title">ምጉዳል ደሲማላት</h1> <!-- Changed Title -->
    </div>
    <div class="header-right">
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>

                <div class="custom-select__options">

                    <span class="custom-option" data-value="en">English</span>

                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill high"><span id="lbl-high">High Score</span>: <span id="high-score">0</span></div>
        <div class="score-pill curr"><span id="lbl-score">Score</span>: <span id="current-score">0</span></div>
    </div>

    <div class="lesson-card">
        <div id="confetti-container"></div>
        <p class="instruction-text" id="instr">ነቶም ደሲማላት ኣጉድልዎም እሞ ነቲ ጠርሙዝ ምልእዎ!</p> <!-- Changed Instruction -->

        <div class="visual-area">
            <div class="pitcher-container">
                <div class="pitcher"><div class="juice juice-1" id="j1"></div></div>
                <div class="pitcher-label" id="p1-val">0.0</div>
            </div>
            <div style="font-size:3rem; padding-bottom:40px;">➖</div> <!-- Changed operator -->
            <div class="pitcher-container">
                <div class="pitcher"><div class="juice juice-2" id="j2"></div></div>
                <div class="pitcher-label" id="p2-val">0.0</div>
            </div>
            <div style="font-size:3rem; padding-bottom:40px;">➡</div>
            <div class="bottle-target">
                <div class="target-fill" id="bottle-fill"></div>
            </div>
        </div>

        <div class="workspace">
            <div class="vertical-math" id="math-box">
                <div class="minus-sign">-</div> <!-- Changed class and operator -->
                <div class="math-row" id="row-1">1.5</div>
                <div class="math-row" id="row-2">2.7</div>
                <div class="math-line"></div>
                <div class="math-row">
                    <input type="number" step="0.01" class="decimal-input" id="user-input" placeholder="?.?">
                </div>
            </div>
        </div>

        <button class="btn-check" onclick="checkAnswer()" id="btn-check">ፈትሽ (Check)</button>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedback">
            <div class="fb-icon" id="fb-icon">🎉</div>
            <div class="fb-title" id="fb-title">Correct!</div>
            <div class="fb-sub" id="fb-sub">Awesome Job!</div>
            <button class="btn-next" onclick="nextQuestion()" id="btn-next">Next ➡</button>
            <button class="btn-restart" onclick="restartGame()" id="btn-restart" style="display:none;">Play Again 🔄</button> <!-- Changed background via CSS var -->
        </div>
    </div>
</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playTone(freq, type, duration) {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.stop(this.ctx.currentTime + duration);
        },
        playPour() { this.playTone(300, 'sine', 0.5); },
        playClap() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            for (let i = 0; i < 10; i++) {
                const offset = Math.random() * 0.5;
                setTimeout(() => this.playTone(400 + Math.random()*200, 'triangle', 0.1), offset * 1000);
            }
        },
        playWrong() {
            this.playTone(150, 'sawtooth', 0.2);
            setTimeout(() => this.playTone(100, 'sawtooth', 0.3), 200);
        }
    };

            gameover: "ጸወታ ተወዲኡ!",

        },
        am: {

            instr: "አስርዮሾቹን ይቀንሱ እና ጠርሙሱን ይሙሉ!", /* Changed */
            score: "ውጤት",
            high: "ከፍተኛ",
            check: "ፈትሽ",
            next: "ቀጣይ",
            restart: "እንደገና ጀምር",
            correct: "ትክክል! ጎበዝ!",
            wrong: "ስህተት! እንደገና ይሞክሩ።",
            gameover: "ጨዋታው አብቅቷል!",
            final: "የእርስዎ ውጤት: "
        },
        en: {
            title: "Subtracting Decimals", /* Changed */
            instr: "Subtract the decimals and fill the bottle!", /* Changed */
            score: "Score",
            high: "High Score",
            check: "Check",
            next: "Next",
            restart: "Play Again",
            correct: "Correct! Awesome!",
            wrong: "Oops! Try again.",
            gameover: "Game Over!",
            final: "Your Score: "

        om: {
            title: "Desimaalii Hir'isuu", /* Changed */
            instr: "Desimaalota hir'isiitii qaruuraa guuti!", /* Changed */
            score: "Qabxii",
            high: "Olaanaa",
            check: "Mirkaneessi",
            next: "Itti Aanu",
            restart: "Irra Deebi'ii",
            correct: "Sirrii! Cimina!",
            wrong: "Dogoggora! Irra deebi'i.",
            gameover: "Tapha Dhumate!",
            final: "Qabxii Keessan: "
        },
        so: {
            title: "Kala-jaridda Tobanlaha", /* Changed */
            instr: "Kala jar tobanlaha oo buuxi dhalada!", /* Changed */
            score: "Dhibco",
            high: "Rikoodh",
            check: "Hubi",
            next: "Xiga",
            restart: "Dib u billow",
            correct: "Sax! Waa hagaag!",
            wrong: "Qaldan! Isku day mar kale.",
            gameover: "Ciyaartu way dhamaatay!",
            final: "Dhibcahaaga: "
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('decimalSubtractHigh') || 0; /* Changed localStorage key */
    let val1, val2, correctSum;

    function init() {
        document.getElementById('high-score').textContent = highScore;
        updateText();
        nextQuestion();
    }

    function nextQuestion() {
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('user-input').value = '';
        document.getElementById('confetti-container').innerHTML = '';
        document.getElementById('bottle-fill').style.height = '0%';
        
        // Generate values for subtraction (tenths), ensuring val1 > val2
        val1 = (Math.floor(Math.random() * 80) + 20) / 10; // 2.0 to 9.9
        val2 = (Math.floor(Math.random() * 60) + 5) / 10;  // 0.5 to 6.4

        // Ensure val1 is greater than val2 by a sufficient amount
        if (val2 >= val1 - 0.5) { // Ensure at least 0.5 difference
            val2 = parseFloat((val1 - (Math.random() * 3 + 0.5)).toFixed(1)); // Subtract 0.5 to 3.5
            if (val2 < 0.1) val2 = 0.1; // Prevent too small val2 or negative
        }
        val1 = parseFloat(val1.toFixed(1));
        val2 = parseFloat(val2.toFixed(1));
        
        correctSum = parseFloat((val1 - val2).toFixed(1));

        // Fallback for edge cases where correctSum might be zero or negative due to float precision
        if (correctSum <= 0.0) {
            val1 = (Math.floor(Math.random() * 50) + 50) / 10; // 5.0 to 9.9
            val2 = (Math.floor(Math.random() * 40) + 5) / 10;  // 0.5 to 4.4
            val1 = parseFloat(val1.toFixed(1));
            val2 = parseFloat(val2.toFixed(1));
            correctSum = parseFloat((val1 - val2).toFixed(1));
        }


        document.getElementById('row-1').textContent = val1.toFixed(1);
        document.getElementById('row-2').textContent = val2.toFixed(1);
        document.getElementById('p1-val').textContent = val1.toFixed(1) + "L";
        document.getElementById('p2-val').textContent = val2.toFixed(1) + "L";
        
        // Visual Fill (scale max 10L total)
        setTimeout(() => {
            document.getElementById('j1').style.height = (val1 * 10) + '%';
            document.getElementById('j2').style.height = (val2 * 10) + '%';
            AudioEngine.playPour();
        }, 100);
    }

    function checkAnswer() {
        const input = parseFloat(document.getElementById('user-input').value);
        const t = translations[currentLang];
        const overlay = document.getElementById('feedback');
        const icon = document.getElementById('fb-icon');
        const title = document.getElementById('fb-title');
        const sub = document.getElementById('fb-sub');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');

        if (Math.abs(input - correctSum) < 0.01) {
            // Correct
            score += 10;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('decimalSubtractHigh', highScore); /* Changed localStorage key */
            }
            updateScoreUI();
            
            AudioEngine.playClap();
            triggerConfetti();
            
            // Pour remaining into bottle
            document.getElementById('bottle-fill').style.height = ((correctSum / 10) * 100) + '%';
            
            icon.textContent = '🍹';
            title.textContent = t.correct;
            title.style.color = "var(--success)";
            sub.textContent = "";
            btnNext.style.display = 'block';
            btnRestart.style.display = 'none';
        } else {
            // Wrong
            let finalScore = score;
            score = 0; 
            updateScoreUI();
            
            AudioEngine.playWrong();
            const mathBox = document.getElementById('math-box');
            mathBox.style.animation = 'shake 0.5s';
            setTimeout(() => mathBox.style.animation = '', 500);

            icon.textContent = '❌';
            title.textContent = t.gameover;
            title.style.color = "var(--error)"; /* Changed color */
            sub.innerHTML = `${t.wrong}<br>${t.final} ${finalScore}`;
            btnNext.style.display = 'none';
            btnRestart.style.display = 'block';
        }
        overlay.classList.add('show');
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        nextQuestion();
    }

    function updateScoreUI() {
        document.getElementById('current-score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        const colors = ['#FF6E40', '#00BFA5', '#FFD700', '#66BB6A']; /* Updated colors */
        for(let i=0; i<40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            container.appendChild(conf);
        }
    }

    // Dropdown Logic
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() { selectCustom.classList.toggle('open'); });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                currentLang = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + this.textContent;
                updateText();
            }
        });
    });

    window.addEventListener('click', (e) => { if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open'); });

    function updateText() {
        const t = translations[currentLang];
        document.getElementById('header-title').textContent = t.title;
        document.getElementById('instr').textContent = t.instr;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-high').textContent = t.high;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    window.onload = init;
</script>
</body>
</html>

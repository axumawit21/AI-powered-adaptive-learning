
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exponent Rules - ሕግታት ሓይልታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Candy Cloud Palette */
            --primary: #FF006E;   /* Hot Pink */
            --secondary: #3A86FF; /* Bright Blue */
            --accent: #FFBE0B;    /* Sunny Yellow */
            --success: #06D6A0;   /* Mint Green */
            --purple: #8338EC;    /* Deep Purple */
            --text: #2B2D42;      /* Dark Slate */
            --white: #ffffff;
            
            --bg-gradient: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--secondary);
            border-radius: 0 0 25px 25px;
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        
        .header-center { 
            flex: 2; 
            text-align: center; 
            display: flex; 
            justify-content: center;
        }

        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(58, 134, 255, 0.3);
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--purple);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.6);
            padding: 5px 20px;
            border-radius: 20px;
        }

        /* Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text);
            height: 45px; background: white; 
            border-radius: 25px;
            width: 160px; transition: 0.2s;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 0 rgba(255, 0, 110, 0.2);
        }
        .custom-select__trigger:hover { transform: scale(1.05); }
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 5px;
            border-radius: 15px; padding: 10px;
            color: var(--text);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #eee;
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .custom-option:hover { background: #FFE5EC; color: var(--primary); }
        .arrow { border: solid var(--primary); border-width: 0 3px 3px 0; padding: 3px; transform: rotate(45deg); margin-bottom: 2px; }

        /* --- Main Content --- */
        .container { max-width: 900px; margin: 30px auto; padding: 0 20px; text-align: center; }

        /* Score Board */
        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .score-pill {
            background: white;
            border: 3px solid #eee;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--text);
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            display: flex; gap: 10px; align-items: center;
        }
        .score-pill.high { border-color: var(--accent); color: #B7791F; background: #FFFBEB; }
        .score-pill.curr { border-color: var(--secondary); color: var(--secondary); background: #E3F2FD; }

        /* Rule Tabs */
        .rule-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.6);
            color: var(--text);
            border: 3px solid white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .tab-btn:hover { background: white; transform: translateY(-3px); }
        .tab-btn.active { 
            background: var(--primary); 
            color: white;
            border-color: var(--primary); 
            box-shadow: 0 8px 20px rgba(255, 0, 110, 0.4); 
            transform: scale(1.05);
        }

        /* Card */
        .rule-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border: 6px solid white;
            border-radius: 50px;
            padding: 40px;
            position: relative;
            min-height: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        /* Instruction */
        .instruction-text {
            color: #555; 
            margin-bottom: 30px; 
            font-size: 1.4rem; 
            font-weight: 800;
            background: #E0F7FA;
            display: inline-block;
            padding: 12px 25px;
            border-radius: 25px;
            border: 2px dashed var(--secondary);
        }

        /* Formula Visualization */
        .formula-box {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 40px;
            background: white;
            display: inline-block;
            padding: 20px 50px;
            border-radius: 30px;
            border: 4px solid var(--accent);
            color: var(--text);
            box-shadow: 0 10px 0 #eee;
        }
        .f-var { color: var(--text); }
        .f-exp { color: var(--primary); vertical-align: super; font-size: 1.8rem; }
        .f-op { color: var(--secondary); margin: 0 15px; }

        /* Visualization Area (Orbs) */
        .viz-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 50px;
            height: 180px;
            perspective: 1000px;
        }

        .orb-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.5s;
            position: relative;
        }

        .orb {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            /* Glossy Orb Gradient */
            background: radial-gradient(circle at 30% 30%, #fff, var(--secondary));
            box-shadow: 0 10px 20px rgba(58, 134, 255, 0.4), inset -5px -5px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            position: relative;
            z-index: 10;
            animation: float 4s ease-in-out infinite;
            border: 2px solid white;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }
        
        .orb-label {
            margin-top: 15px;
            font-weight: 900;
            color: var(--primary);
            font-size: 1.5rem;
            background: white;
            padding: 2px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 0 #eee;
        }

        /* Practice Controls */
        .practice-controls {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            width: 100%;
        }

        .equation-container {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Neue', sans-serif;
            font-weight: 900;
            color: var(--text);
            gap: 15px;
            background: #F8F9FA;
            padding: 25px 40px;
            border-radius: 35px;
            border: 4px solid #E9ECEF;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.03);
        }

        .term {
            display: flex;
            align-items: flex-start;
            position: relative;
        }

        .base {
            font-size: 4rem;
            line-height: 1;
            color: var(--text);
        }

        .exponent {
            font-size: 2rem;
            color: var(--primary);
            margin-left: 2px;
            margin-top: -10px;
        }

        .operator {
            font-size: 3rem;
            color: var(--secondary);
            margin: 0 10px;
        }

        .exponent-input-wrapper {
            margin-top: -15px;
            margin-left: 5px;
        }

        .exponent-input {
            width: 80px;
            height: 60px;
            font-size: 2rem;
            background: white;
            border: 4px solid var(--purple);
            color: var(--purple);
            text-align: center;
            border-radius: 15px;
            outline: none;
            font-weight: 900;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #E2D9F3;
        }
        
        .exponent-input:focus {
            transform: scale(1.1);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(255, 190, 11, 0.3);
        }

        .btn-check {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #047857;
            margin-top: 30px;
            transition: all 0.2s;
        }
        .btn-check:hover { transform: scale(1.05) translateY(-3px); box-shadow: 0 12px 0 #047857; }
        .btn-check:active { transform: translateY(4px); box-shadow: none; }

        /* Feedback Overlay */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s;
            backdrop-filter: blur(10px);
            border-radius: 40px;
        }
        .feedback-overlay.show { display: flex; }

        .fb-icon { font-size: 8rem; margin-bottom: 20px; animation: popIn 0.5s; }
        .fb-title { font-size: 3rem; font-weight: 900; margin-bottom: 10px; color: var(--text); }
        .fb-sub { font-size: 1.8rem; color: #718096; margin-bottom: 40px; font-weight: bold; }
        
        .btn-next {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #1D4ED8;
            transition: all 0.2s;
        }
        .btn-next:hover { transform: scale(1.1); }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }

        /* Confetti */
        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 5; }
        .confetti { position: absolute; width: 12px; height: 12px; background: white; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(600px) rotate(720deg); opacity: 0; } }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes grow { 0% { transform: scale(1); } 50% { transform: scale(1.3); filter: brightness(1.1); } 100% { transform: scale(1); } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.5rem; }
            .header-left, .header-right { width: auto; }
            .formula-box { font-size: 1.8rem; padding: 15px; width: 100%; }
            .orb { width: 70px; height: 70px; font-size: 1.8rem; }
            .base { font-size: 3rem; }
            .exponent { font-size: 1.5rem; margin-top: -5px; }
            .exponent-input { width: 50px; height: 40px; font-size: 1.5rem; }
            .viz-area { gap: 5px; height: 120px; }
            .score-board { gap: 10px; }
            .score-pill { padding: 5px 15px; font-size: 1rem; }
            .equation-container { padding: 15px; gap: 5px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="header-title">ሕግታት ሓይልታት</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div class="arrow"></div>
                </div>
                <div class="custom-select__options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    
    <div class="score-board">
        <div class="score-pill high"><span id="lbl-high">High Score</span>: <span id="high-score">0</span></div>
        <div class="score-pill curr"><span id="lbl-score">Score</span>: <span id="current-score">0</span></div>
    </div>

    <div class="rule-tabs">
        <button class="tab-btn active" onclick="setMode('product')" id="btn-prod">ርብሒት (Product)</button>
        <button class="tab-btn" onclick="setMode('quotient')" id="btn-quot">ብፅሒት (Quotient)</button>
    </div>

    <div class="rule-card">
        <div id="confetti-container"></div>
        
        <div id="instruction" class="instruction-text">
            መሰረት ሓደ እንተኾይኑ፡ ሓይልታት ንደመር።
        </div>

        <!-- Formula Visualization -->
        <div class="formula-box" id="formula-display">
            <span class="f-var">ቀ</span><span class="f-exp">ሀ</span>
            <span class="f-op" id="op-symbol">×</span>
            <span class="f-var">ቀ</span><span class="f-exp">ለ</span>
            <span class="f-op">=</span>
            <span class="f-var">ቀ</span><span class="f-exp" id="res-exp">ሀ+ለ</span>
        </div>

        <!-- Visual Metaphor -->
        <div class="viz-area" id="viz-container">
            <!-- Injected by JS -->
        </div>

        <!-- Practice -->
        <div class="practice-controls">
            <div class="equation-container">
                <div class="term">
                    <span class="base" id="q-base">4</span>
                    <span class="exponent" id="q-exp1">3</span>
                </div>
                <div class="operator" id="q-op">×</div>
                <div class="term">
                    <span class="base" id="q-base2">4</span>
                    <span class="exponent" id="q-exp2">2</span>
                </div>
                <div class="operator">=</div>
                <div class="term">
                    <span class="base" id="q-base-res">4</span>
                    <div class="exponent-input-wrapper">
                        <input type="number" id="user-input" class="exponent-input" placeholder="?">
                    </div>
                </div>
            </div>
        </div>
        
        <div style="margin-top:10px;">
            <button class="btn-check" onclick="checkAnswer()" id="btn-check">ፈትሽ (Check)</button>
        </div>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedback">
            <div class="fb-icon" id="fb-icon">🎉</div>
            <div class="fb-title" id="fb-title">Correct!</div>
            <div class="fb-sub" id="fb-sub">Great Job!</div>
            
            <button class="btn-next" onclick="nextQuestion()" id="btn-next">Next ➡</button>
            <button class="btn-next" onclick="restartGame()" id="btn-restart" style="display:none; background:var(--secondary);">Play Again 🔄</button>
        </div>
    </div>
</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playTone(freq, type, duration) {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.stop(this.ctx.currentTime + duration);
        },
        playMerge() {
            this.playTone(300, 'sine', 0.1);
            setTimeout(() => this.playTone(600, 'sine', 0.4), 100);
        },
        playSplit() {
            this.playTone(600, 'sine', 0.1);
            setTimeout(() => this.playTone(300, 'sine', 0.4), 100);
        },
        playClap() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            
            // Synthesize applause with multiple random noise bursts
            const duration = 1.5;
            const now = this.ctx.currentTime;
            
            for (let i = 0; i < 15; i++) {
                const offset = Math.random() * duration * 0.5;
                const bufferSize = this.ctx.sampleRate * 0.1; 
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let j = 0; j < bufferSize; j++) {
                    data[j] = (Math.random() * 2 - 1) * (1 - j/bufferSize); // Decay
                }
                
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.value = 1200;
                
                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.3, now + offset);
                gain.gain.exponentialRampToValueAtTime(0.01, now + offset + 0.1);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);
                noise.start(now + offset);
            }
            
            // Add a cheerful chord
            setTimeout(() => {
                this.playTone(523.25, 'triangle', 0.3); // C5
                setTimeout(() => this.playTone(659.25, 'triangle', 0.3), 100); // E5
                setTimeout(() => this.playTone(783.99, 'triangle', 0.6), 200); // G5
            }, 100);
        },
        playWrong() {
            this.playTone(150, 'sawtooth', 0.2);
            setTimeout(() => this.playTone(100, 'sawtooth', 0.3), 200);
        }
    };

    // Translations
    const translations = {
        ti: {
            title: "ሕግታት ሓይልታት",
            prod: "ርብሒት (Product)",
            quot: "ብፅሒት (Quotient)",
            instProd: "መሰረት ሓደ እንተኾይኑ፡ ሓይልታት ንደመር።",
            instQuot: "መሰረት ሓደ እንተኾይኑ፡ ሓይልታት ነጉድል።",
            check: "ፈትሽ",
            next: "ቀፃሊ",
            restart: "እንደገና ጀምር",
            correct: "ትኽክል! ጀግና!",
            wrong: "ጌጋ!",
            gameover: "ጸወታ ተወዲኡ!",
            score: "ነጥቢ",
            high: "ክብረ ወሰን",
            final: "ውፅኢትኩም:"
        },
        am: {
            title: "የኤክስፖነንት ህጎች",
            prod: "ማባዛት (Product)",
            quot: "ማካፈል (Quotient)",
            instProd: "መሰረቱ አንድ ከሆነ፣ ርቢዎቹን እንደምራለን።",
            instQuot: "መሰረቱ አንድ ከሆነ፣ ርቢዎቹን እንቀንሳለን።",
            check: "ፈትሽ",
            next: "ቀጣይ",
            restart: "እንደገና ጀምር",
            correct: "ትክክል! ጎበዝ!",
            wrong: "ስህተት!",
            gameover: "ጨዋታው አብቅቷል!",
            score: "ውጤት",
            high: "ከፍተኛ",
            final: "የእርስዎ ውጤት:"
        },
        en: {
            title: "Exponent Rules",
            prod: "Product Rule",
            quot: "Quotient Rule",
            instProd: "Multiply same bases -> ADD exponents.",
            instQuot: "Divide same bases -> SUBTRACT exponents.",
            check: "Check",
            next: "Next",
            restart: "Play Again",
            correct: "Correct! Awesome!",
            wrong: "Incorrect!",
            gameover: "Game Over!",
            score: "Score",
            high: "High Score",
            final: "Your Score:"
        },
        om: {
            title: "Seerota Aangoo",
            prod: "Baay'isuu",
            quot: "Hiru",
            instProd: "Yoo hundeen tokko ta'e, aangoo ida'i.",
            instQuot: "Yoo hundeen tokko ta'e, aangoo hir'isi.",
            check: "Mirkaneessi",
            next: "Itti Aanu",
            restart: "Irra Deebi'ii",
            correct: "Sirrii! Cimina!",
            wrong: "Dogoggora!",
            gameover: "Tapha Dhumate!",
            score: "Qabxii",
            high: "Olaanaa",
            final: "Qabxii Keessan:"
        },
        so: {
            title: "Xeerarka Awoodda",
            prod: "Iskudhufasho",
            quot: "Qaybin",
            instProd: "Haddii salka isku mid yahay, isku dar awoodaha.",
            instQuot: "Haddii salka isku mid yahay, ka jar awoodaha.",
            check: "Hubi",
            next: "Xiga",
            restart: "Dib u billow",
            correct: "Sax! Waa hagaag!",
            wrong: "Qaldan!",
            gameover: "Ciyaartu way dhamaatay!",
            score: "Dhibco",
            high: "Rikoodh",
            final: "Dhibcahaaga:"
        }
    };

    let currentLang = 'ti';
    let currentMode = 'product'; // product or quotient
    let score = 0;
    let highScore = localStorage.getItem('exponentHighScore') || 0;
    let qBase = 4;
    let qExp1 = 3;
    let qExp2 = 2;

    // --- Logic ---

    function init() {
        document.getElementById('high-score').textContent = highScore;
        updateText();
        nextQuestion();
    }

    function setMode(mode) {
        currentMode = mode;
        // Update Tabs
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(mode === 'product' ? 'btn-prod' : 'btn-quot').classList.add('active');
        
        // Update Formula Display
        const opSym = mode === 'product' ? '×' : '÷';
        const resExp = mode === 'product' ? 'ሀ+ለ' : 'ሀ-ለ';
        document.getElementById('op-symbol').textContent = opSym;
        document.getElementById('res-exp').textContent = resExp;

        // Play sound
        if(mode === 'product') AudioEngine.playMerge();
        else AudioEngine.playSplit();

        updateText();
        nextQuestion();
    }

    function nextQuestion() {
        // Reset UI
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('user-input').value = '';
        document.getElementById('confetti-container').innerHTML = '';

        // Generate Numbers
        qBase = Math.floor(Math.random() * 8) + 2; 
        qExp1 = Math.floor(Math.random() * 6) + 3; // 3 to 8
        qExp2 = Math.floor(Math.random() * (qExp1 - 1)) + 1; // 1 to exp1-1

        // Update Question UI
        document.getElementById('q-base').textContent = qBase;
        document.getElementById('q-base2').textContent = qBase;
        document.getElementById('q-base-res').textContent = qBase;
        
        document.getElementById('q-exp1').textContent = qExp1;
        document.getElementById('q-exp2').textContent = qExp2;
        
        const opSym = currentMode === 'product' ? '×' : '÷';
        document.getElementById('q-op').textContent = opSym;

        renderVisualization();
    }

    function renderVisualization() {
        const container = document.getElementById('viz-container');
        container.innerHTML = '';

        // Create Left Orb
        const orb1 = createOrbGroup(qBase, qExp1);
        
        // Operator
        const op = document.createElement('div');
        op.style.fontSize = "3rem";
        op.style.color = "var(--text)";
        op.style.textShadow = "0 0 10px white";
        op.textContent = currentMode === 'product' ? '×' : '÷';

        // Create Right Orb
        const orb2 = createOrbGroup(qBase, qExp2);

        // Equals
        const eq = document.createElement('div');
        eq.style.fontSize = "3rem";
        eq.style.color = "var(--text)";
        eq.style.textShadow = "0 0 10px white";
        eq.textContent = '=';

        // Result Placeholder (faded)
        const orbRes = createOrbGroup(qBase, '?');
        orbRes.style.opacity = '0.3';
        orbRes.id = 'orb-res';

        container.append(orb1, op, orb2, eq, orbRes);
    }

    function createOrbGroup(base, exp) {
        const g = document.createElement('div');
        g.className = 'orb-group';
        g.innerHTML = `
            <div class="orb">${base}</div>
            <div class="orb-label">^ ${exp}</div>
        `;
        return g;
    }

    function checkAnswer() {
        const input = parseInt(document.getElementById('user-input').value);
        const correct = currentMode === 'product' ? (qExp1 + qExp2) : (qExp1 - qExp2);
        const t = translations[currentLang];
        const overlay = document.getElementById('feedback');
        const icon = document.getElementById('fb-icon');
        const title = document.getElementById('fb-title');
        const sub = document.getElementById('fb-sub');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');

        if(input === correct) {
            // Correct
            score += 10;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('exponentHighScore', highScore);
            }
            updateScoreUI();
            
            AudioEngine.playClap();
            triggerConfetti();
            animateResult(correct);
            
            icon.textContent = '🎉';
            title.textContent = t.correct;
            title.style.color = "var(--success)";
            sub.textContent = "";
            btnNext.style.display = 'block';
            btnRestart.style.display = 'none';
        } else {
            // Wrong
            let finalScore = score;
            score = 0; // Reset score on wrong
            updateScoreUI();
            
            AudioEngine.playWrong();
            
            icon.textContent = '❌';
            title.textContent = t.gameover;
            title.style.color = "var(--primary)";
            sub.innerHTML = `${t.wrong}<br>${t.final} ${finalScore}`;
            btnNext.style.display = 'none';
            btnRestart.style.display = 'block';
        }
        overlay.classList.add('show');
    }
    
    function restartGame() {
        score = 0;
        updateScoreUI();
        nextQuestion();
    }

    function updateScoreUI() {
        document.getElementById('current-score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    function animateResult(val) {
        const resOrb = document.getElementById('orb-res');
        resOrb.querySelector('.orb-label').textContent = `^ ${val}`;
        resOrb.style.opacity = '1';
        resOrb.querySelector('.orb').style.animation = 'grow 0.5s ease';
    }

    // --- Confetti ---
    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        const colors = ['#FF006E', '#3A86FF', '#FFBE0B', '#06D6A0'];
        for(let i=0; i<40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            container.appendChild(conf);
        }
    }

    // --- Dropdown ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() {
        selectCustom.classList.toggle('open');
    });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                currentLang = value;
                updateText();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) {
            selectCustom.classList.remove('open');
        }
    });

    function updateText() {
        const t = translations[currentLang];
        document.getElementById('header-title').textContent = t.title;
        document.getElementById('btn-prod').textContent = t.prod;
        document.getElementById('btn-quot').textContent = t.quot;
        document.getElementById('instruction').textContent = currentMode === 'product' ? t.instProd : t.instQuot;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('btn-restart').textContent = t.restart;
        
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-high').textContent = t.high;
    }

    // Initial Load
    window.onload = function() {
        init();
        setMode('product');
    };

</script>
</body>
</html>

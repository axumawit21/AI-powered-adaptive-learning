
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comparing Fractions - ምውድዳር ጉዚታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF595E;   /* Red */
            --secondary: #1982C4; /* Blue */
            --tertiary: #8AC926;  /* Green */
            --yellow: #FFCA3A;    /* Yellow */
            --purple: #6A4C93;    /* Purple */
            --bg-gradient: linear-gradient(135deg, #8EC5FC 0%, #E0C3FC 100%);
            --text: #2B2D42;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -140px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.95;
        }

        body::before {
            background:
                radial-gradient(circle at 12% 18%, rgba(255, 89, 94, 0.34) 0 110px, transparent 111px),
                radial-gradient(circle at 88% 20%, rgba(25, 130, 196, 0.30) 0 120px, transparent 121px),
                radial-gradient(circle at 20% 86%, rgba(255, 202, 58, 0.28) 0 150px, transparent 151px),
                radial-gradient(circle at 86% 84%, rgba(138, 201, 38, 0.22) 0 140px, transparent 141px);
            animation: floatBg 10s ease-in-out infinite;
        }

        body::after {
            background:
                radial-gradient(circle at 35% 40%, rgba(255, 255, 255, 0.26) 0 180px, transparent 181px),
                radial-gradient(circle at 65% 60%, rgba(255, 255, 255, 0.22) 0 220px, transparent 221px);
            animation: floatBg 14s ease-in-out infinite reverse;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--primary);
            border-radius: 0 0 20px 20px;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }

        .grade-badge {
            background: var(--primary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.4rem;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--text);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            text-shadow: 2px 2px 0 white;
        }

        /* --- Custom Language Dropdown --- */
        .custom-select-wrapper { position: relative; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; font-weight: 800; color: var(--secondary);
            height: 50px; background: #ffffff; cursor: pointer;
            border: 3px solid var(--secondary); border-radius: 25px;
            width: 160px;
            box-shadow: 0 5px 0 rgba(25, 130, 196, 0.3);
            transition: all 0.2s;
        }
        .custom-select__trigger:active { transform: translateY(4px); box-shadow: none; }
        
        .custom-options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: #fff; border: 3px solid #e9ecef; border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            padding: 10px; display: flex; flex-direction: column; gap: 8px;
        }
        .custom-select.open .custom-options { opacity: 1; visibility: visible; transform: translateY(0); }
        .custom-option { padding: 10px 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .custom-option:hover { background: var(--secondary); color: white; transform: scale(1.05); }

        /* --- Main Content --- */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Comparison Stage */
        .stage {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 8px solid white;
            position: relative;
            min-height: 500px;
        }

        .stage::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 52px;
            background: linear-gradient(135deg, rgba(255,89,94,0.30), rgba(25,130,196,0.22), rgba(255,202,58,0.22), rgba(138,201,38,0.20));
            filter: blur(18px);
            opacity: 0.75;
            pointer-events: none;
            z-index: 0;
        }

        .stage > * { position: relative; z-index: 1; }

        .instruction {
            font-size: 2rem;
            color: var(--purple);
            font-weight: 900;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 2px 2px 0 #fff;
            background: #F3E5F5;
            padding: 15px 40px;
            border-radius: 30px;
            border: 3px dashed var(--purple);
        }

        /* The Visuals */
        .comparison-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            margin-bottom: 40px;
            flex-wrap: nowrap;
        }

        .fraction-model {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            background: #fff;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 4px solid #f1f5f9;
            transition: transform 0.3s;
        }
        .fraction-model:hover {
            transform: translateY(-10px) scale(1.01);
            border-color: var(--yellow);
            box-shadow: 0 14px 28px rgba(255, 202, 58, 0.22), 0 12px 22px rgba(0,0,0,0.08);
        }

        .pie {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: #e2e8f0;
            border: 6px solid #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .fraction-text {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text);
            background: white;
            padding: 10px 30px;
            border-radius: 25px;
            box-shadow: 0 6px 0 #e2e8f0;
            border: 3px solid #cbd5e0;
            min-width: 120px;
            text-align: center;
        }

        .numerator { color: var(--primary); }
        .denominator { color: var(--secondary); }
        .slash { color: #cbd5e0; margin: 0 5px; font-weight: 400; }

        /* Comparator Slot */
        .comparator-slot {
            width: 100px;
            height: 100px;
            background: #f8fafc;
            border: 5px dashed var(--secondary);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            color: var(--secondary);
            margin: 0 10px;
            transition: all 0.3s;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
        }
        .comparator-slot.filled {
            background: var(--yellow);
            color: white;
            border-style: solid;
            border-color: #F59E0B;
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(255, 190, 11, 0.4);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            justify-content: center;
        }

        .btn-op {
            width: 90px; height: 90px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 8px 0 rgba(0,0,0,0.1);
            font-size: 2.5rem;
            font-weight: 900;
            cursor: pointer;
            color: var(--text);
            transition: transform 0.1s;
            border: 3px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-op:hover {
            background: linear-gradient(135deg, rgba(25,130,196,0.12), rgba(255,202,58,0.20));
            transform: translateY(-4px) scale(1.02);
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .btn-op:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-op.selected { 
            background: var(--secondary); 
            color: white; 
            border-color: var(--secondary); 
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.2); 
            transform: translateY(4px);
        }

        .btn-check {
            background: var(--tertiary);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #5c940d;
            margin: 40px auto 0;
            display: flex; align-items: center; gap: 15px;
            transition: transform 0.2s;
        }
        .btn-check {
            background: linear-gradient(135deg, #8AC926, #2EC4B6);
            box-shadow: 0 10px 0 rgba(92, 148, 13, 0.9), 0 18px 26px rgba(0,0,0,0.14);
            letter-spacing: 0.4px;
        }
        .btn-check:hover { transform: scale(1.05); filter: brightness(1.03); }
        .btn-check:active { transform: translateY(6px); box-shadow: none; }
        .btn-check:disabled { background: #cbd5e0; box-shadow: none; cursor: not-allowed; opacity: 0.7; transform: none; }

        /* Feedback */
        .feedback {
            margin-top: 30px;
            min-height: 80px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s;
        }
        .feedback.show { opacity: 1; transform: translateY(0); }
        .correct-text { color: var(--tertiary); font-size: 2rem; font-weight: 900; text-shadow: 1px 1px 0 #fff; }
        .wrong-text { color: var(--primary); font-size: 1.5rem; font-weight: 900; text-shadow: 1px 1px 0 #fff; }

        /* Score Board */
        .score-board {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            position: absolute;
            top: 30px;
            right: 30px;
        }

        .score-pill {
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 8px;
            border: 3px solid transparent;
        }

        .score-pill.current { color: var(--secondary); border-color: var(--secondary); }
        .score-pill.high { color: #F59E0B; border-color: #F59E0B; }

        /* GAME OVER */
        .game-over-area {
            display: none; /* Hidden by default */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        .game-over-area.show { display: flex; }

        .game-over-title {
            font-size: 3rem;
            color: var(--primary);
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #fff;
        }

        .final-score {
            font-size: 2.5rem;
            color: var(--text);
            font-weight: bold;
            margin-bottom: 40px;
        }

        .final-score span {
            color: var(--secondary);
            font-size: 3.5rem;
            font-weight: 900;
        }

        .btn-restart {
            background: var(--yellow);
            color: #744210;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.8rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #d97706;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 15px;
        }
        .btn-restart:hover { transform: scale(1.05); background: #fcd34d; }
        .btn-restart:active { transform: translateY(6px); box-shadow: none; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        @keyframes floatBg { 0%, 100% { transform: translate3d(0,0,0); } 50% { transform: translate3d(0,-14px,0); } }


        /* Confetti */
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }

        /* Mobile Responsive */
        @media (max-width: 900px) {
            header { padding: 1rem; flex-wrap: wrap; gap: 10px; }
            h1 { font-size: 1.3rem; }
            .container { padding: 10px; margin: 10px auto; }
            .stage { padding: 20px; border-width: 4px; }
            
            /* Score board adjust */
            .score-board {
                position: static;
                width: 100%;
                justify-content: center;
                margin-bottom: 20px;
            }

            /* KEEP PARALLEL (Row) on Mobile */
            .comparison-area {
                flex-direction: row; 
                gap: 5px;
                justify-content: space-between;
                align-items: center;
            }

            .fraction-model {
                padding: 10px;
                background: transparent; 
                box-shadow: none;
                border: none;
                gap: 10px;
            }
            .fraction-model:hover { transform: none; }

            .pie {
                width: 110px;
                height: 110px;
                border-width: 3px;
            }

            .comparator-slot {
                width: 50px;
                height: 50px;
                font-size: 1.8rem;
                border-width: 3px;
                border-radius: 15px;
                margin: 0 5px;
            }

            .fraction-text {
                font-size: 1.4rem;
                padding: 5px 10px;
                min-width: auto;
                border-radius: 15px;
                border-width: 2px;
                box-shadow: 0 3px 0 #e2e8f0;
            }

            .instruction { font-size: 1.1rem; padding: 10px; margin-bottom: 20px; }
            
            .controls { gap: 10px; }
            .btn-op { width: 60px; height: 60px; font-size: 1.5rem; }
            
            .btn-check { font-size: 1.2rem; padding: 15px 30px; }

            .game-over-title { font-size: 2rem; }
            .final-score { font-size: 1.5rem; }
            .btn-restart { font-size: 1.4rem; padding: 15px 30px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
        <h1 id="app-title">Comparing Fractions</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div style="font-size:0.8rem">▼</div>
                </div>
                <div class="custom-options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="stage">
        
        <div class="score-board">
            <div class="score-pill high">
                <span>🏆</span> <span id="lbl-record">Record</span>: <span id="high-score">0</span>
            </div>
            <div class="score-pill current">
                <span>⭐</span> <span id="lbl-score">Score</span>: <span id="score">0</span>
            </div>
        </div>

        <!-- GAME PLAY AREA -->
        <div id="game-play-area">
            <p class="instruction" id="instruction">Compare the two fractions!</p>

            <div class="comparison-area">
                
                <!-- Left Fraction -->
                <div class="fraction-model">
                    <div class="pie" id="pie-1"></div>
                    <div class="fraction-text">
                        <span class="numerator" id="num-1">2</span>
                        <span class="slash">/</span>
                        <span class="denominator" id="den-1">4</span>
                    </div>
                </div>

                <!-- Comparator Slot -->
                <div class="comparator-slot" id="slot">
                    <span>?</span>
                </div>

                <!-- Right Fraction -->
                <div class="fraction-model">
                    <div class="pie" id="pie-2"></div>
                    <div class="fraction-text">
                        <span class="numerator" id="num-2">3</span>
                        <span class="slash">/</span>
                        <span class="denominator" id="den-2">4</span>
                    </div>
                </div>

            </div>

            <div class="controls">
                <button class="btn-op" onclick="selectOp('<')">&lt;</button>
                <button class="btn-op" onclick="selectOp('=')">=</button>
                <button class="btn-op" onclick="selectOp('>')">&gt;</button>
            </div>

            <button class="btn-check" id="btn-action" onclick="checkAnswer()">Check Answer ✔️</button>

            <div class="feedback" id="feedback"></div>
        </div>

        <!-- GAME OVER AREA -->
        <div id="game-over-area" class="game-over-area">
            <h2 class="game-over-title" id="lbl-gameover">Game Over!</h2>
            <div class="final-score">
                <span id="lbl-yourscore">Your Score:</span> <span id="final-score-val">0</span>
            </div>
            <button class="btn-restart" onclick="resetGame()">
                <span id="lbl-restart">Start Again</span> 🔄
            </button>
        </div>

    </div>
</div>

<canvas id="confetti-canvas"></canvas>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: null,
        init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
        playSuccess() {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.frequency.setValueAtTime(500, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.3);
        },
        playError() {
            this.init();
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.2);
        },
        playPop() {
            this.init();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.frequency.setValueAtTime(800, this.ctx.currentTime);
            gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + 0.05);
        }
    };

    // --- Translations ---
    const translations = {
        ti: {
            title: "ምውድዳር ጉዚታት",
            instr: "ኣየናይ ጉዚ ይበልጽ? (<, >, =)",
            check: "ፈትሽ ✔️",
            next: "ቀፃሊ ➡",
            correct: "ትኽክል!",
            wrong: "ተጋግዩ! ሓደ ዓይነት ረቃሒ ስለዘለዎም፡ እቲ ዝዓበየ ቆጻሪ ዘለዎ ይበልጽ።",
            sameDenom: "ረቃሒ ሓደ ዓይነት እዩ።",
            lblScore: "ነጥቢ",
            lblRecord: "ክብረ ወሰን",
            gameover: "ጸወታ ተወዲኡ!",
            yourscore: "ውፅኢትኩም:",
            restart: "እንደገና ጀምር"
        },
        am: {
            title: "ክፍልፋዮችን ማወዳደር",
            instr: "የትኛው ክፍልፋይ ይበልጣል? (<, >, =)",
            check: "ፈትሽ ✔️",
            next: "ቀጣይ ➡",
            correct: "ትክክል!",
            wrong: "ስህተት! ተመሳሳይ ታህት ስላላቸው፣ ትልቅ ላዕል ያለው ይበልጣል።",
            sameDenom: "ታህት ተመሳሳይ ነው።",
            lblScore: "ውጤት",
            lblRecord: "ከፍተኛ",
            gameover: "ጨዋታው አብቅቷል!",
            yourscore: "የእርስዎ ውጤት:",
            restart: "እንደገና ጀምር"
        },
        en: {
            title: "Comparing Fractions",
            instr: "Which fraction is greater? (<, >, =)",
            check: "Check Answer ✔️",
            next: "Next ➡",
            correct: "Correct!",
            wrong: "Incorrect! Since the denominators are the same, the one with the bigger numerator is bigger.",
            sameDenom: "Same Denominator.",
            lblScore: "Score",
            lblRecord: "Record",
            gameover: "Game Over!",
            yourscore: "Your Score:",
            restart: "Start Again"
        },
        om: {
            title: "Firakshinii Wal-dorgomsiisuu",
            instr: "Firakshinii kamtu caala? (<, >, =)",
            check: "Mirkaneessi ✔️",
            next: "Itti Aanu ➡",
            correct: "Sirrii!",
            wrong: "Dogoggora! Jalaan walqixa waan ta'eef, kan irraan guddaa ta'etu caala.",
            sameDenom: "Jalaan walqixa.",
            lblScore: "Qabxii",
            lblRecord: "Rikardii",
            gameover: "Tapha Dhumate!",
            yourscore: "Qabxii Keessan:",
            restart: "Irra Deebi'ii Jalqabi"
        },
        so: {
            title: "Isbarbardhigga Jajabka",
            instr: "Jajabkee weyn? (<, >, =)",
            check: "Hubi ✔️",
            next: "Xiga ➡",
            correct: "Sax!",
            wrong: "Qaldan! Maadaama hooseeyayaashu isku mid yihiin, ka sareeyaha weyn leh ayaa weyn.",
            sameDenom: "Hooseeye isku mid ah.",
            lblScore: "Dhibco",
            lblRecord: "Rikoodh",
            gameover: "Ciyaartu way dhamaatay!",
            yourscore: "Dhibcahaaga:",
            restart: "Dib u billow"
        }
    };

    let currentLang = 'ti';
    let currentOp = null;
    let score = 0;
    let highScore = localStorage.getItem('comparingFractionsHighScore') || 0;
    let problem = { n1: 0, n2: 0, d: 0 };
    let isSolved = false;

    // --- Game Logic ---
    function generateProblem() {
        isSolved = false;
        currentOp = null;
        
        // Reset UI
        document.getElementById('slot').className = 'comparator-slot';
        document.getElementById('slot').innerHTML = '<span>?</span>';
        document.getElementById('feedback').className = 'feedback';
        document.getElementById('feedback').innerHTML = '';
        
        const btn = document.getElementById('btn-action');
        btn.textContent = translations[currentLang].check;
        btn.onclick = checkAnswer;
        btn.disabled = false;

        document.querySelectorAll('.btn-op').forEach(b => b.classList.remove('selected'));

        // Logic
        const den = Math.floor(Math.random() * 8) + 3; // 3 to 10
        let n1 = Math.floor(Math.random() * den) + 1; // 1 to den
        let n2 = Math.floor(Math.random() * den) + 1;

        // Ensure not same too often
        if(n1 === n2 && Math.random() > 0.3) {
            n2 = (n1 % den) + 1;
        }

        problem = { n1, n2, d: den };

        // Render
        document.getElementById('num-1').textContent = n1;
        document.getElementById('den-1').textContent = den;
        document.getElementById('num-2').textContent = n2;
        document.getElementById('den-2').textContent = den;

        drawPie('pie-1', n1, den, '#FF595E');
        drawPie('pie-2', n2, den, '#1982C4');
    }

    function drawPie(id, num, den, color) {
        const el = document.getElementById(id);
        const deg = (num / den) * 360;
        const segAngle = 360 / den;
        const gridGradient = `repeating-conic-gradient(from 0deg, transparent 0deg ${segAngle-2}deg, white ${segAngle-2}deg ${segAngle}deg)`;
        const fillGradient = `conic-gradient(${color} 0deg ${deg}deg, transparent ${deg}deg 360deg)`;

        el.style.backgroundImage = `${gridGradient}, ${fillGradient}`;
    }

    function selectOp(op) {
        if(isSolved) return;
        currentOp = op;
        AudioEngine.playPop();
        
        // Update UI
        document.querySelectorAll('.btn-op').forEach(b => {
            b.classList.remove('selected');
            if(b.textContent.includes(op)) b.classList.add('selected'); // rough match
            // better:
            if(b.innerText === op) b.classList.add('selected');
            if(op === '<' && b.innerHTML.includes('&lt;')) b.classList.add('selected');
            if(op === '>' && b.innerHTML.includes('&gt;')) b.classList.add('selected');
        });

        // Update Slot
        const slot = document.getElementById('slot');
        slot.innerHTML = `<span>${op.replace('<', '&lt;').replace('>', '&gt;')}</span>`;
        slot.classList.add('filled');
    }

    function checkAnswer() {
        if (!currentOp) return;
        
        const { n1, n2 } = problem;
        let correctOp = '=';
        if (n1 > n2) correctOp = '>';
        if (n1 < n2) correctOp = '<';

        const fb = document.getElementById('feedback');
        const t = translations[currentLang];

        if (currentOp === correctOp) {
            // Correct
            isSolved = true;
            score += 10;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('comparingFractionsHighScore', highScore);
            }

            AudioEngine.playSuccess();
            triggerConfetti();

            fb.innerHTML = `<div class="correct-text">${t.correct} 🎉</div>`;
            fb.classList.add('show');

            const btn = document.getElementById('btn-action');
            btn.textContent = t.next;
            btn.onclick = generateProblem;

        } else {
            // Wrong - GAME OVER Logic
            AudioEngine.playError();
            
            // Show Game Over Screen
            document.getElementById('game-play-area').style.display = 'none';
            document.getElementById('game-over-area').classList.add('show');
            document.getElementById('final-score-val').textContent = score;
        }
        updateScoreBoard();
    }

    function resetGame() {
        score = 0;
        updateScoreBoard();
        
        // Restore UI
        document.getElementById('game-over-area').classList.remove('show');
        document.getElementById('game-play-area').style.display = 'block';
        
        // Reset Feedback
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('feedback').innerHTML = '';
        
        generateProblem();
    }

    function updateScoreBoard() {
        document.getElementById('score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    // --- Language Change ---
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function(e) {
        selectCustom.classList.toggle('open');
        e.stopPropagation();
    });

    options.forEach(option => {
        option.addEventListener('click', function(e) {
            e.stopPropagation();
            if (!this.classList.contains('selected')) {
                const prev = this.parentNode.querySelector('.custom-option.selected');
                if(prev) prev.classList.remove('selected');
                this.classList.add('selected');
                
                const label = this.textContent;
                const value = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + label;
                
                selectCustom.classList.remove('open');
                
                currentLang = value;
                changeLanguage();
            }
        });
    });

    window.addEventListener('click', function(e) {
        if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open');
    });

    function changeLanguage() {
        const t = translations[currentLang];
        document.getElementById('app-title').textContent = t.title;
        document.getElementById('instruction').textContent = t.instr;
        document.getElementById('lbl-score').textContent = t.lblScore;
        document.getElementById('lbl-record').textContent = t.lblRecord;
        document.getElementById('lbl-gameover').textContent = t.gameover;
        document.getElementById('lbl-yourscore').textContent = t.yourscore;
        document.getElementById('lbl-restart').textContent = t.restart;
        
        const btn = document.getElementById('btn-action');
        if(isSolved) btn.textContent = t.next;
        else btn.textContent = t.check;
    }

    // --- Confetti ---
    function triggerConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const pieces = [];
        for(let i=0; i<100; i++) {
            pieces.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20 - 10,
                c: `hsl(${Math.random()*360}, 100%, 50%)`,
                r: Math.random() * 8 + 4
            });
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            let active = false;
            pieces.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.vy += 0.5;
                if(p.y < canvas.height) active = true;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.fill();
            });
            if(active) requestAnimationFrame(anim);
        }
        anim();
    }

    // Init
    window.onload = function() {
        updateScoreBoard();
        generateProblem();
        changeLanguage();
    }

</script>

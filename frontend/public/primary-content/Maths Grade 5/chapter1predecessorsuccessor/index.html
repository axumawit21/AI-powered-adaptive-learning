<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predecessor & Successor - ቀዳማይን ሰዓባይን</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CC9F0;
            --primary-dark: #00b4d8;
            --secondary: #F72585;
            --accent: #F9C74F;
            --success: #43AA8B;
            --purple: #7209B7;
            --text: #2d3748;
            --bg: #e0f2fe; /* Light Sky Blue */
            --track: #718096;
        }

        * {
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 255, 255, 0.4) 10%, transparent 10.2%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.4) 10%, transparent 10.2%);
            background-size: 100% 100%;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Header & Custom Dropdown --- */
        header {
            background: white;
            padding: 1rem 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 6px solid var(--primary);
            border-radius: 0 0 20px 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 140px; /* Fixed width for alignment */
        }

        .header-center {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            text-align: center;
        }

        .header-right {
            display: flex;
            justify-content: flex-end;
            width: 140px; /* Fixed width for alignment */
        }

        .grade-badge {
            background: var(--purple);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            border: 2px solid white;
        }

        h1 {
            color: var(--purple);
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0;
            text-shadow: 2px 2px 0px #e9d5ff;
            line-height: 1.2;
        }

        /* Custom Language Select */
        .custom-select-wrapper {
            position: relative;
            display: inline-block;
            user-select: none;
        }

        .custom-select {
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .custom-select__trigger {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text);
            height: 40px;
            line-height: 40px;
            background: #ffffff;
            cursor: pointer;
            border: 2px solid var(--primary);
            border-radius: 25px;
            box-shadow: 0 3px 0 var(--primary-dark);
            width: 140px;
            transition: all 0.2s;
        }

        .custom-select__trigger:active {
            transform: translateY(3px);
            box-shadow: none;
        }

        .custom-select__options {
            position: absolute;
            display: block;
            top: 110%;
            left: 0;
            right: 0;
            border: 2px solid var(--primary);
            border-radius: 15px;
            background: #fff;
            transition: all 0.3s;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            z-index: 50;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .custom-select.open .custom-select__options {
            opacity: 1;
            visibility: visible;
            pointer-events: all;
            top: 120%;
        }

        .custom-option {
            position: relative;
            display: block;
            padding: 10px 15px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .custom-option:last-child { border-bottom: none; }

        .custom-option:hover {
            background-color: var(--bg);
            color: var(--purple);
            padding-left: 20px;
        }

        .custom-option.selected {
            background-color: var(--primary);
            color: #fff;
        }

        .arrow {
            position: relative;
            height: 10px;
            width: 10px;
        }

        .arrow::before, .arrow::after {
            content: "";
            position: absolute;
            bottom: 0px;
            width: 0.15rem;
            height: 100%;
            transition: all 0.3s;
        }

        .arrow::before { left: -3px; transform: rotate(-45deg); background-color: var(--primary); }
        .arrow::after { left: 3px; transform: rotate(45deg); background-color: var(--primary); }

        .open .arrow::before { left: -3px; transform: rotate(45deg); }
        .open .arrow::after { left: 3px; transform: rotate(-45deg); }

        /* Layout */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* --- Input Section --- */
        .input-card {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(76, 201, 240, 0.15);
            max-width: 500px;
            margin: 0 auto 50px auto;
            text-align: center;
            border: 4px solid white;
            position: relative;
            z-index: 10;
        }

        label {
            display: block;
            font-size: 1.2rem;
            color: var(--text);
            margin-bottom: 15px;
            font-weight: 700;
        }

        .input-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .input-group button {
            background: var(--secondary) !important;
            color: #fff !important;
            border: none !important;
            font-weight: 900;
            box-shadow: 0 8px 0 rgba(0,0,0,0.12);
            transform: translateY(0);
            padding: 15px 25px;
            font-size: 1.5rem;
            border-radius: 10px;
        }

        .input-group button:first-child {
            background: linear-gradient(135deg, #F72585, #B5179E) !important;
        }

        .input-group button:last-child {
            background: linear-gradient(135deg, #43AA8B, #2F855A) !important;
        }

        .input-group button:hover {
            filter: brightness(1.05);
            box-shadow: 0 10px 0 rgba(0,0,0,0.14);
            transform: translateY(-1px);
        }

        .input-group button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 rgba(0,0,0,0.14);
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 2.2rem;
            border: 3px solid var(--primary);
            border-radius: 20px;
            text-align: center;
            font-weight: 800;
            outline: none;
            color: var(--purple);
            background: #fdfdfd;
        }
        
        input[type="number"]:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(247, 37, 133, 0.1);
        }

        /* --- Train Visualization --- */
        .train-wrapper {
            position: relative;
            padding: 20px 0 60px 0;
            overflow-x: auto;
            text-align: center;
        }

        .train-container {
            display: inline-flex;
            align-items: flex-end;
            gap: 15px;
            padding: 0 20px;
        }

        /* Tracks */
        .track {
            position: absolute;
            bottom: 25px;
            left: 5%;
            right: 5%;
            height: 8px;
            background: #718096;
            border-radius: 4px;
            z-index: 0;
        }
        
        .track::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 10px;
            background: repeating-linear-gradient(
                90deg,
                #A0AEC0,
                #A0AEC0 15px,
                transparent 15px,
                transparent 40px
            );
            transform: skewX(-20deg);
        }

        .carriage {
            position: relative;
            width: 220px;
            height: 160px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
            border: 4px solid rgba(255,255,255,0.3);
            z-index: 10;
        }

        /* Wheels */
        .carriage::after, .carriage::before {
            content: '';
            position: absolute;
            bottom: -20px;
            width: 40px;
            height: 40px;
            background: #2d3748;
            border-radius: 50%;
            border: 4px solid #a0aec0;
            box-shadow: inset 0 0 0 8px #4a5568;
            animation: spin 1s infinite linear paused; 
        }
        .carriage::after { right: 30px; }
        .carriage::before { left: 30px; }

        /* Connector */
        .connector {
            width: 25px;
            height: 12px;
            background: #4a5568;
            border-radius: 6px;
            align-self: center;
            margin-bottom: 40px;
        }

        /* Carriage Styles */
        .c-prev { 
            background: linear-gradient(135deg, #FF9F1C, #F9844A);
        }
        .c-curr { 
            background: linear-gradient(135deg, #4361EE, #3F37C9);
            transform: scale(1.1);
            z-index: 20;
        }
        .c-next { 
            background: linear-gradient(135deg, #4CC9F0, #4895EF);
        }

        .c-label {
            font-size: 1rem;
            background: rgba(255,255,255,0.25);
            padding: 5px 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .c-number {
            font-size: 3.5rem;
            font-weight: 900;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            line-height: 1;
        }

        .c-calc {
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 5px;
            opacity: 0.9;
            background: rgba(0,0,0,0.2);
            padding: 2px 10px;
            border-radius: 8px;
        }

        /* --- Explanation Section --- */
        .explanation-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 40px;
        }

        .exp-card {
            background: white;
            border-radius: 25px;
            padding: 25px;
            text-align: left;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .exp-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 8px;
        }

        .exp-prev::before { background: var(--accent); }
        .exp-next::before { background: var(--primary); }

        .math-bubble {
            display: inline-block;
            background: #edf2f7;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 15px;
            border-left: 5px solid;
        }
        .exp-prev .math-bubble { border-color: var(--accent); color: #d97706; background: #fffbeb; }
        .exp-next .math-bubble { border-color: var(--primary); color: #0284c7; background: #e0f2fe; }

        .text-desc {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #4a5568;
        }

        .highlight {
            font-weight: 800;
            color: var(--purple);
            background: #f3e8ff;
            padding: 0 5px;
            border-radius: 5px;
        }

        /* Mobile Responsive */
        @media (max-width: 850px) {
            header {
                padding: 1rem;
                flex-wrap: wrap;
                gap: 10px;
            }

            .header-left, .header-right {
                width: auto;
            }

            .header-center {
                order: 3;
                width: 100%;
                margin-top: 5px;
            }

            h1 {
                font-size: 1.25rem;
            }

            .custom-select__trigger {
                width: 140px;
            }

            .input-card {
                padding: 15px;
                width: 90%;
            }

            input[type="number"] {
                font-size: 1.8rem;
                padding: 12px;
            }

            .train-container {
                flex-direction: row;
                justify-content: center;
                align-items: flex-end;
                gap: 16px;
                padding: 0 10px;
            }

            .carriage {
                width: auto;
                max-width: none;
                height: 125px;
                flex: 1 1 0;
                min-width: 90px;
            }

            .connector {
                display: none;
            }

            .track { display: block; }

            .c-curr { transform: scale(1.05); }

            .c-number {
                font-size: 3rem;
            }

            .explanation-box {
                grid-template-columns: 1fr;
            }

            .text-desc {
                font-size: 1.05rem;
            }
        }

        @media (max-width: 420px) {
            header { padding: 0.8rem; }

            h1 { font-size: 1.1rem; }

            .custom-select__trigger {
                width: 130px;
                padding: 0 12px;
                font-size: 0.85rem;
            }

            .input-card {
                width: 100%;
            }

            label {
                font-size: 1.05rem;
            }

            input[type="number"] {
                font-size: 1.6rem;
            }

            .carriage {
                max-width: 260px;
                height: 130px;
            }

            .c-number {
                font-size: 2.7rem;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="header-lesson-title">ቀዳማይን ሰዓባይን</h1>
    </div>
    <div class="header-right">
        <!-- Custom Dropdown -->
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div class="arrow"></div>
                </div>
                <div class="custom-select__options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
        <!-- Hidden select for logic compatibility -->
        <select id="lang-select" onchange="changeLanguage()" style="display:none">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Afan Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </div>
</header>

<div class="container">
    
    <div class="input-card">
        <label id="input-label">🔢 ቁጽሪ ጽሓፍ (Enter a Number):</label>
        <div class="input-group">
            <button onclick="changeNum(-1)" style="background:#f3f4f6; border:none; padding:10px 20px; font-size:1.5rem; border-radius:15px; cursor:pointer; color:var(--text)">-</button>
            <input type="number" id="numInput" value="8" oninput="calculate()">
            <button onclick="changeNum(1)" style="background:#f3f4f6; border:none; padding:10px 20px; font-size:1.5rem; border-radius:15px; cursor:pointer; color:var(--text)">+</button>
        </div>
    </div>

    <div class="train-wrapper">
        <div class="track"></div>
        <div class="train-container">
            <!-- Predecessor -->
            <div class="carriage c-prev">
                <span class="c-label" id="lbl-prev">ቀዳማይ</span>
                <span class="c-number" id="val-prev">7</span>
                <div class="c-calc">- 1</div>
            </div>
            
            <div class="connector"></div>

            <!-- Current -->
            <div class="carriage c-curr">
                <span class="c-label" id="lbl-curr">ቁጽሪ</span>
                <span class="c-number" id="val-curr">8</span>
                <div class="c-calc">n</div>
            </div>

            <div class="connector"></div>

            <!-- Successor -->
            <div class="carriage c-next">
                <span class="c-label" id="lbl-next">ሰዓባይ</span>
                <span class="c-number" id="val-next">9</span>
                <div class="c-calc">+ 1</div>
            </div>
        </div>
    </div>

    <div class="explanation-box">
        <div class="exp-card exp-prev">
            <div class="math-bubble" id="math-prev">8 - 1 = 7</div>
            <p class="text-desc" id="desc-prev">
                7 ቀዳማይ ናይ 8 እዩ።
            </p>
        </div>
        <div class="exp-card exp-next">
            <div class="math-bubble" id="math-next">8 + 1 = 9</div>
            <p class="text-desc" id="desc-next">
                9 ሰዓባይ ናይ 8 እዩ።
            </p>
        </div>
    </div>

</div>

<script>
    const translations = {
        ti: {
            title: "ቀዳማይን ሰዓባይን",
            inputLabel: "ቁጽሪ ጽሓፍ:",
            labels: { prev: "ቀዳማይ", curr: "ቁጽሪ", next: "ሰዓባይ" },
            descPrev: "<span class='highlight'>{p}</span> ቀዳማይ ናይ {n} እዩ።",
            descNext: "<span class='highlight'>{s}</span> ሰዓባይ ናይ {n} እዩ።",
            langName: "ትግርኛ"
        },
        am: {
            title: "ቀዳሚ እና ተከታይ",
            inputLabel: "ቁጥር ያስገቡ:",
            labels: { prev: "ቀዳሚ", curr: "ቁጥር", next: "ተከታይ" },
            descPrev: "<span class='highlight'>{p}</span> የ{n} ቀዳሚ ነው።",
            descNext: "<span class='highlight'>{s}</span> የ{n} ተከታይ ነው።",
            langName: "አማርኛ"
        },
        en: {
            title: "Predecessor & Successor",
            inputLabel: "Enter a Number:",
            labels: { prev: "Predecessor", curr: "Number", next: "Successor" },
            descPrev: "<span class='highlight'>{p}</span> is the predecessor of {n}.",
            descNext: "<span class='highlight'>{s}</span> is the successor of {n}.",
            langName: "English"
        },
        om: {
            title: "Duraa fi Duubaa",
            inputLabel: "Lakkoofsa galchi:",
            labels: { prev: "Duraa", curr: "Lakk.", next: "Itti Aanu" },
            descPrev: "<span class='highlight'>{p}</span> lakkoofsa duraa {n} ti.",
            descNext: "<span class='highlight'>{s}</span> lakkoofsa itti aanu {n} ti.",
            langName: "Afan Oromoo"
        },
        so: {
            title: "Horeeye iyo Dambeeye",
            inputLabel: "Geli Tiro:",
            labels: { prev: "Horeeye", curr: "Tiro", next: "Dambeeye" },
            descPrev: "<span class='highlight'>{p}</span> waa horeeyaha {n}.",
            descNext: "<span class='highlight'>{s}</span> waa dambeeyaha {n}.",
            langName: "Soomaali"
        }
    };

    let currentLang = 'ti';

    function calculate() {
        const inputVal = document.getElementById('numInput').value;
        const n = parseInt(inputVal);

        if (isNaN(n)) return;

        const prev = n - 1;
        const next = n + 1;

        // Update Numbers
        document.getElementById('val-curr').textContent = n.toLocaleString();
        document.getElementById('val-prev').textContent = prev.toLocaleString();
        document.getElementById('val-next').textContent = next.toLocaleString();

        // Update Math
        document.getElementById('math-prev').textContent = `${n.toLocaleString()} - 1 = ${prev.toLocaleString()}`;
        document.getElementById('math-next').textContent = `${n.toLocaleString()} + 1 = ${next.toLocaleString()}`;

        // Update Descriptions
        const t = translations[currentLang];
        document.getElementById('desc-prev').innerHTML = t.descPrev.replace('{p}', prev.toLocaleString()).replace('{n}', n.toLocaleString());
        document.getElementById('desc-next').innerHTML = t.descNext.replace('{s}', next.toLocaleString()).replace('{n}', n.toLocaleString());
    }

    function changeNum(delta) {
        const input = document.getElementById('numInput');
        const val = parseInt(input.value) || 0;
        input.value = val + delta;
        calculate();
    }

    function changeLanguage() {
        // Logic handled by the custom dropdown click listeners
        const t = translations[currentLang];

        document.getElementById('header-lesson-title').textContent = t.title;
        document.getElementById('input-label').textContent = t.inputLabel;
        
        document.getElementById('lbl-prev').textContent = t.labels.prev;
        document.getElementById('lbl-curr').textContent = t.labels.curr;
        document.getElementById('lbl-next').textContent = t.labels.next;

        calculate(); 
    }

    // Custom Dropdown Logic
    document.querySelector('.custom-select-wrapper').addEventListener('click', function() {
        this.querySelector('.custom-select').classList.toggle('open');
    });

    for (const option of document.querySelectorAll(".custom-option")) {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                // UI Updates
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                const langLabel = this.textContent;
                const langValue = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + langLabel;
                
                // Logic Update
                currentLang = langValue;
                changeLanguage();
            }
        })
    }

    // Close dropdown on outside click
    window.addEventListener('click', function(e) {
        const select = document.querySelector('.custom-select');
        if (!select.contains(e.target)) {
            select.classList.remove('open');
        }
    });

    // Initial Load
    window.onload = function() {
        calculate();
    }
</script>
</body>
</html>

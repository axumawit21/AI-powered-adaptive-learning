
<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adding Decimals - ምድማር ደሲማላት</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700;900&family=Noto+Sans+Ethiopic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361EE;   /* Blue */
            --secondary: #F72585; /* Pink */
            --accent: #FFBE0B;    /* Sunny Yellow */
            --success: #06D6A0;   /* Mint Green */
            --orange: #FB5607;
            --purple: #8338EC;
            --text: #2B2D42;
            --white: #ffffff;
            --bg-gradient: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); user-select: none; }

        body {
            font-family: 'Comic Neue', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 12% 18%, rgba(247, 37, 133, 0.18), transparent 45%),
                radial-gradient(circle at 86% 20%, rgba(67, 97, 238, 0.16), transparent 48%),
                radial-gradient(circle at 18% 88%, rgba(255, 190, 11, 0.16), transparent 52%),
                radial-gradient(circle at 86% 86%, rgba(6, 214, 160, 0.12), transparent 55%);
            pointer-events: none;
            z-index: -1;
        }

        /* --- Header --- */
        header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 5px solid var(--secondary);
            border-radius: 0 0 25px 25px;
            background-image: linear-gradient(90deg, rgba(255, 190, 11, 0.12), rgba(247, 37, 133, 0.12), rgba(67, 97, 238, 0.10));
        }

        .header-left, .header-right { flex: 1; display: flex; align-items: center; }
        .header-right { justify-content: flex-end; }
        
        .header-center { 
            flex: 2; 
            text-align: center; 
            display: flex; 
            justify-content: center;
        }

        .grade-badge {
            background: var(--secondary);
            color: white;
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1.5rem;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(247, 37, 133, 0.3);
            transform: rotate(-10deg);
        }

        h1 {
            color: var(--purple);
            font-size: 1.8rem;
            font-weight: 900;
            margin: 0;
            background: rgba(255,255,255,0.6);
            padding: 5px 20px;
            border-radius: 20px;
        }

        /* Dropdown */
        .custom-select-wrapper { position: relative; display: inline-block; cursor: pointer; z-index: 200; }
        .custom-select { position: relative; display: flex; flex-direction: column; }
        .custom-select__trigger {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; font-weight: 800; color: var(--text);
            height: 45px; background: white; 
            border-radius: 25px;
            width: 160px; transition: 0.2s;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 0 rgba(67, 97, 238, 0.2);
        }
        .custom-select__options {
            position: absolute; top: 120%; left: 0; right: 0;
            background: white; opacity: 0; visibility: hidden;
            pointer-events: none; transform: translateY(-10px);
            transition: all 0.3s ease; display: flex; flex-direction: column; gap: 5px;
            border-radius: 15px; padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border: 3px solid #eee;
        }
        .custom-select.open .custom-select__options { opacity: 1; visibility: visible; pointer-events: all; transform: translateY(0); }
        .custom-option { padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .custom-option:hover { background: #FFE5EC; color: var(--secondary); }
        .arrow { border: solid var(--primary); border-width: 0 3px 3px 0; padding: 3px; transform: rotate(45deg); margin-bottom: 2px; }

        /* --- Main Content --- */
        .container {
            max-width: 980px;
            margin: 34px auto;
            padding: 0 20px;
            text-align: center;
            position: relative;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: -14px;
            border-radius: 60px;
            background:
                linear-gradient(135deg, rgba(67, 97, 238, 0.14), rgba(247, 37, 133, 0.10), rgba(255, 190, 11, 0.10)),
                radial-gradient(circle at 20% 20%, rgba(255,255,255,0.75), transparent 45%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.55), transparent 55%);
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
            pointer-events: none;
            z-index: 0;
        }

        .container > * { position: relative; z-index: 1; }

        /* Score Board */
        .score-board {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .score-pill {
            background: white;
            border: 3px solid #eee;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
            display: flex; gap: 10px; align-items: center;
        }
        .score-pill.high { border-color: var(--accent); color: #B7791F; background: #FFFBEB; }
        .score-pill.curr { border-color: var(--primary); color: var(--primary); background: #E3F2FD; }

        /* Card */
        .lesson-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 6px solid white;
            border-radius: 50px;
            padding: 40px;
            position: relative;
            min-height: 550px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }

        .lesson-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.10), rgba(247, 37, 133, 0.10), rgba(255, 190, 11, 0.08));
            opacity: 0.70;
            pointer-events: none;
            z-index: 0;
        }

        .lesson-card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 50px;
            background: radial-gradient(circle at 20% 18%, rgba(255,255,255,0.92), transparent 40%);
            opacity: 0.55;
            pointer-events: none;
            z-index: 0;
        }

        .lesson-card > * { position: relative; z-index: 1; }

        .instruction-text {
            color: #555; 
            margin-bottom: 30px; 
            font-size: 1.4rem; 
            font-weight: 800;
            background: #E0F7FA;
            display: inline-block;
            padding: 12px 25px;
            border-radius: 25px;
            border: 2px dashed var(--primary);
        }

        .instruction-text {
            background: linear-gradient(135deg, rgba(6, 214, 160, 0.18), rgba(255, 190, 11, 0.18));
            border-color: rgba(67, 97, 238, 0.55);
        }

        /* Juice Shop Visualization */
        .visual-area {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 40px;
            margin-bottom: 40px;
            height: 250px;
        }

        .pitcher-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .pitcher {
            width: 80px;
            height: 120px;
            background: rgba(255, 255, 255, 0.3);
            border: 4px solid #eee;
            border-radius: 10px 10px 30px 30px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .pitcher {
            border-color: rgba(67, 97, 238, 0.18);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05), 0 10px 22px rgba(0,0,0,0.08);
        }

        .juice {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            transition: height 1s ease-in-out;
        }
        .juice-1 { background: var(--orange); }
        .juice-2 { background: var(--success); }

        .pitcher-label {
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--text);
            background: white;
            padding: 2px 10px;
            border-radius: 10px;
            box-shadow: 0 4px 0 #eee;
        }

        .bottle-target {
            width: 120px;
            height: 200px;
            background: white;
            border: 6px solid var(--purple);
            border-radius: 20px 20px 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .bottle-target {
            box-shadow: 0 12px 26px rgba(0,0,0,0.12);
        }

        .target-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--orange), var(--success));
            transition: height 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Addition Workspace */
        .workspace {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .vertical-math {
            font-family: 'Comic Neue', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            text-align: right;
            display: inline-block;
            padding: 20px 40px;
            background: #F8F9FA;
            border-radius: 30px;
            border: 4px solid #E9ECEF;
            position: relative;
        }

        .math-row {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 10px;
            height: 70px;
        }

        .plus-sign {
            position: absolute;
            left: 20px;
            bottom: 95px;
            color: var(--secondary);
            font-size: 2.5rem;
        }

        @media (min-width: 601px) {
            .plus-sign { bottom: 120px; }
        }

        .math-line {
            width: 100%;
            height: 6px;
            background: var(--text);
            margin: 10px 0;
            border-radius: 3px;
        }

        .decimal-input {
            width: 180px;
            height: 80px;
            font-size: 3.5rem;
            background: white;
            border: 4px solid var(--primary);
            color: var(--primary);
            text-align: right;
            border-radius: 15px;
            outline: none;
            font-weight: 900;
            padding-right: 15px;
            box-shadow: 0 4px 0 #E3F2FD;
        }
        .decimal-input:focus { border-color: var(--accent); box-shadow: 0 10px 24px rgba(255, 190, 11, 0.35); transform: scale(1.05); }

        .btn-check {
            background: var(--success);
            color: white;
            border: none;
            padding: 15px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #047857;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn-check:hover { transform: scale(1.06) translateY(-3px); box-shadow: 0 12px 0 #047857; filter: brightness(1.03); }
        .btn-check:active { transform: translateY(4px); box-shadow: none; }

        /* Feedback Overlay */
        .feedback-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.96);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            animation: fadeIn 0.3s;
            border-radius: 40px;
        }
        .feedback-overlay.show { display: flex; }

        .fb-icon { font-size: 8rem; margin-bottom: 20px; animation: popIn 0.5s; }
        .fb-title { font-size: 3rem; font-weight: 900; margin-bottom: 10px; color: var(--text); }
        .fb-sub { font-size: 1.8rem; color: #718096; margin-bottom: 40px; font-weight: bold; }
        
        .btn-next, .btn-restart {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 1.6rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 0 #1D4ED8;
        }
        .btn-next:hover { transform: scale(1.1); }
        .btn-next:active { transform: translateY(4px); box-shadow: none; }

        /* Confetti */
        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 5; }
        .confetti { position: absolute; width: 12px; height: 12px; background: white; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(600px) rotate(720deg); opacity: 0; } }

        /* Animations */
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        @media (max-width: 600px) {
            h1 { font-size: 1.3rem; }
            .grade-badge { width: 45px; height: 45px; font-size: 1.2rem; }
            .header-center { flex: 3; }
            .container { padding: 0 10px; }
            .lesson-card { padding: 20px; border-radius: 30px; }
            .vertical-math { font-size: 2rem; padding: 15px; }
            .math-row { height: 40px; }
            .decimal-input { width: 120px; height: 50px; font-size: 2rem; }
            .visual-area { height: 180px; gap: 15px; }
            .pitcher { width: 50px; height: 80px; }
            .bottle-target { width: 80px; height: 130px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="grade-badge">5</div>
    </div>
    <div class="header-center">
        <h1 id="header-title">ምድማር ደሲማላት</h1>
    </div>
    <div class="header-right">
        <div class="custom-select-wrapper">
            <div class="custom-select">
                <div class="custom-select__trigger">
                    <span id="current-lang-label">🗺️ ትግርኛ</span>
                    <div class="arrow"></div>
                </div>
                <div class="custom-select__options">
                    <span class="custom-option selected" data-value="ti">ትግርኛ</span>
                    <span class="custom-option" data-value="am">አማርኛ</span>
                    <span class="custom-option" data-value="en">English</span>
                    <span class="custom-option" data-value="om">Afan Oromoo</span>
                    <span class="custom-option" data-value="so">Soomaali</span>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="container">
    <div class="score-board">
        <div class="score-pill high"><span id="lbl-high">High Score</span>: <span id="high-score">0</span></div>
        <div class="score-pill curr"><span id="lbl-score">Score</span>: <span id="current-score">0</span></div>
    </div>

    <div class="lesson-card">
        <div id="confetti-container"></div>
        <p class="instruction-text" id="instr">ነቶም ደሲማላት ደምርዎም እሞ ነቲ ጠርሙዝ ምልእዎ!</p>

        <div class="visual-area">
            <div class="pitcher-container">
                <div class="pitcher"><div class="juice juice-1" id="j1"></div></div>
                <div class="pitcher-label" id="p1-val">0.0</div>
            </div>
            <div style="font-size:3rem; padding-bottom:40px;">➕</div>
            <div class="pitcher-container">
                <div class="pitcher"><div class="juice juice-2" id="j2"></div></div>
                <div class="pitcher-label" id="p2-val">0.0</div>
            </div>
            <div style="font-size:3rem; padding-bottom:40px;">➡</div>
            <div class="bottle-target">
                <div class="target-fill" id="bottle-fill"></div>
            </div>
        </div>

        <div class="workspace">
            <div class="vertical-math" id="math-box">
                <div class="plus-sign">+</div>
                <div class="math-row" id="row-1">1.5</div>
                <div class="math-row" id="row-2">2.7</div>
                <div class="math-line"></div>
                <div class="math-row">
                    <input type="number" step="0.01" class="decimal-input" id="user-input" placeholder="?.?">
                </div>
            </div>
        </div>

        <button class="btn-check" onclick="checkAnswer()" id="btn-check">ፈትሽ (Check)</button>

        <!-- Feedback Overlay -->
        <div class="feedback-overlay" id="feedback">
            <div class="fb-icon" id="fb-icon">🎉</div>
            <div class="fb-title" id="fb-title">Correct!</div>
            <div class="fb-sub" id="fb-sub">Awesome Job!</div>
            <button class="btn-next" onclick="nextQuestion()" id="btn-next">Next ➡</button>
            <button class="btn-restart" onclick="restartGame()" id="btn-restart" style="display:none; background:var(--orange);">Play Again 🔄</button>
        </div>
    </div>
</div>

<script>
    // --- Audio Engine ---
    const AudioEngine = {
        ctx: new (window.AudioContext || window.webkitAudioContext)(),
        playTone(freq, type, duration) {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
            osc.stop(this.ctx.currentTime + duration);
        },
        playPour() { this.playTone(300, 'sine', 0.5); },
        playClap() {
            if(this.ctx.state === 'suspended') this.ctx.resume();
            for (let i = 0; i < 10; i++) {
                const offset = Math.random() * 0.5;
                setTimeout(() => this.playTone(400 + Math.random()*200, 'triangle', 0.1), offset * 1000);
            }
        },
        playWrong() {
            this.playTone(150, 'sawtooth', 0.2);
            setTimeout(() => this.playTone(100, 'sawtooth', 0.3), 200);
        }
    };

    const translations = {
        ti: {
            title: "ምድማር ደሲማላት",
            instr: "ነቶም ደሲማላት ደምርዎም እሞ ነቲ ጠርሙዝ ምልእዎ!",
            score: "ነጥቢ",
            high: "ክብረ ወሰን",
            check: "ፈትሽ",
            next: "ቀፃሊ",
            restart: "እንደገና ጀምር",
            correct: "ትኽክል! ጀግና!",
            wrong: "ተጋግዩ! ደጊምካ ፈትን።",
            gameover: "ጸወታ ተወዲኡ!",
            final: "ውፅኢትኩም: "
        },
        am: {
            title: "የአስርዮሽ መደመር",
            instr: "አስርዮሾቹን ይደምሩ እና ጠርሙሱን ይሙሉ!",
            score: "ውጤት",
            high: "ከፍተኛ",
            check: "ፈትሽ",
            next: "ቀጣይ",
            restart: "እንደገና ጀምር",
            correct: "ትክክል! ጎበዝ!",
            wrong: "ስህተት! እንደገና ይሞክሩ።",
            gameover: "ጨዋታው አብቅቷል!",
            final: "የእርስዎ ውጤት: "
        },
        en: {
            title: "Adding Decimals",
            instr: "Add the decimals and fill the bottle!",
            score: "Score",
            high: "High Score",
            check: "Check",
            next: "Next",
            restart: "Play Again",
            correct: "Correct! Awesome!",
            wrong: "Oops! Try again.",
            gameover: "Game Over!",
            final: "Your Score: "
        },
        om: {
            title: "Desimaalii Ida'uu",
            instr: "Desimaalota ida'iitii qaruuraa guuti!",
            score: "Qabxii",
            high: "Olaanaa",
            check: "Mirkaneessi",
            next: "Itti Aanu",
            restart: "Irra Deebi'ii",
            correct: "Sirrii! Cimina!",
            wrong: "Dogoggora! Irra deebi'i.",
            gameover: "Tapha Dhumate!",
            final: "Qabxii Keessan: "
        },
        so: {
            title: "Isku-darka Tobanlaha",
            instr: "Isku dar tobanlaha oo buuxi dhalada!",
            score: "Dhibco",
            high: "Rikoodh",
            check: "Hubi",
            next: "Xiga",
            restart: "Dib u billow",
            correct: "Sax! Waa hagaag!",
            wrong: "Qaldan! Isku day mar kale.",
            gameover: "Ciyaartu way dhamaatay!",
            final: "Dhibcahaaga: "
        }
    };

    let currentLang = 'ti';
    let score = 0;
    let highScore = localStorage.getItem('decimalAddHigh') || 0;
    let val1, val2, correctSum;

    function init() {
        document.getElementById('high-score').textContent = highScore;
        updateText();
        nextQuestion();
    }

    function nextQuestion() {
        document.getElementById('feedback').classList.remove('show');
        document.getElementById('user-input').value = '';
        document.getElementById('confetti-container').innerHTML = '';
        document.getElementById('bottle-fill').style.height = '0%';
        
        // Generate values (tenths)
        val1 = (Math.floor(Math.random() * 50) + 5) / 10;
        val2 = (Math.floor(Math.random() * 40) + 5) / 10;
        correctSum = parseFloat((val1 + val2).toFixed(1));

        document.getElementById('row-1').textContent = val1.toFixed(1);
        document.getElementById('row-2').textContent = val2.toFixed(1);
        document.getElementById('p1-val').textContent = val1.toFixed(1) + "L";
        document.getElementById('p2-val').textContent = val2.toFixed(1) + "L";
        
        // Visual Fill (scale max 10L total)
        setTimeout(() => {
            document.getElementById('j1').style.height = (val1 * 10) + '%';
            document.getElementById('j2').style.height = (val2 * 10) + '%';
            AudioEngine.playPour();
        }, 100);
    }

    function checkAnswer() {
        const input = parseFloat(document.getElementById('user-input').value);
        const t = translations[currentLang];
        const overlay = document.getElementById('feedback');
        const icon = document.getElementById('fb-icon');
        const title = document.getElementById('fb-title');
        const sub = document.getElementById('fb-sub');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');

        if (Math.abs(input - correctSum) < 0.01) {
            // Correct
            score += 10;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('decimalAddHigh', highScore);
            }
            updateScoreUI();
            
            AudioEngine.playClap();
            triggerConfetti();
            
            // Pour into bottle
            document.getElementById('bottle-fill').style.height = ((correctSum / 10) * 100) + '%';
            
            icon.textContent = '🍹';
            title.textContent = t.correct;
            title.style.color = "var(--success)";
            sub.textContent = "";
            btnNext.style.display = 'block';
            btnRestart.style.display = 'none';
        } else {
            // Wrong
            let finalScore = score;
            score = 0; 
            updateScoreUI();
            
            AudioEngine.playWrong();
            const mathBox = document.getElementById('math-box');
            mathBox.style.animation = 'shake 0.5s';
            setTimeout(() => mathBox.style.animation = '', 500);

            icon.textContent = '❌';
            title.textContent = t.gameover;
            title.style.color = "var(--secondary)";
            sub.innerHTML = `${t.wrong}<br>${t.final} ${finalScore}`;
            btnNext.style.display = 'none';
            btnRestart.style.display = 'block';
        }
        overlay.classList.add('show');
    }

    function restartGame() {
        score = 0;
        updateScoreUI();
        nextQuestion();
    }

    function updateScoreUI() {
        document.getElementById('current-score').textContent = score;
        document.getElementById('high-score').textContent = highScore;
    }

    function triggerConfetti() {
        const container = document.getElementById('confetti-container');
        const colors = ['#FF006E', '#3A86FF', '#FFBE0B', '#06D6A0'];
        for(let i=0; i<40; i++) {
            const conf = document.createElement('div');
            conf.className = 'confetti';
            conf.style.left = Math.random() * 100 + '%';
            conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            conf.style.animationDuration = (Math.random() * 2 + 1) + 's';
            container.appendChild(conf);
        }
    }

    // Dropdown Logic
    const selectWrapper = document.querySelector('.custom-select-wrapper');
    const selectCustom = document.querySelector('.custom-select');
    const options = document.querySelectorAll('.custom-option');

    selectWrapper.addEventListener('click', function() { selectCustom.classList.toggle('open'); });

    options.forEach(option => {
        option.addEventListener('click', function() {
            if (!this.classList.contains('selected')) {
                this.parentNode.querySelector('.custom-option.selected').classList.remove('selected');
                this.classList.add('selected');
                currentLang = this.getAttribute('data-value');
                document.getElementById('current-lang-label').textContent = "🗺️ " + this.textContent;
                updateText();
            }
        });
    });

    window.addEventListener('click', (e) => { if (!selectCustom.contains(e.target)) selectCustom.classList.remove('open'); });

    function updateText() {
        const t = translations[currentLang];
        document.getElementById('header-title').textContent = t.title;
        document.getElementById('instr').textContent = t.instr;
        document.getElementById('lbl-score').textContent = t.score;
        document.getElementById('lbl-high').textContent = t.high;
        document.getElementById('btn-check').textContent = t.check;
        document.getElementById('btn-next').textContent = t.next;
        document.getElementById('btn-restart').textContent = t.restart;
    }

    window.onload = init;
</script>
</body>
</html>

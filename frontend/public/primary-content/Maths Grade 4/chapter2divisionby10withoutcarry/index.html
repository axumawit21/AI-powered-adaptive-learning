<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Division Vacuum | ብ10 ምምቃል</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --space-dark: #0f172a;
            --neon-blue: #38bdf8;
            --neon-green: #10b981;
            --neon-purple: #a855f7;
            --neon-pink: #f472b6;
            --amber: #f59e0b;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background-color: var(--space-dark);
            background-image: 
                radial-gradient(at 0% 0%, #1e1b4b 0px, transparent 50%),
                radial-gradient(at 100% 0%, #312e81 0px, transparent 50%),
                radial-gradient(at 50% 100%, #020617 0px, transparent 50%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background-color 0.2s;
        }

        /* Noticeable Error Effect */
        body.error-flash {
            background-color: #7f1d1d !important;
            animation: glitch 0.2s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9000; }

        header {
            width: 100%; max-width: 1200px; padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 15px;
        }

        .stats-group { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .pill {
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
            padding: 8px 18px; border-radius: 50px; border: 2px solid var(--glass-border);
            display: flex; align-items: center; gap: 8px; font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-size: 0.9rem;
        }
        .pill-lvl { border-color: var(--neon-purple); color: var(--neon-purple); }
        .pill-high { border-color: var(--amber); color: var(--amber); }
        .pill-score { border-color: var(--neon-blue); color: var(--neon-blue); }

        .control-btns { display: flex; gap: 10px; align-items: center; }
        .btn-icon {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            transition: 0.2s;
        }
        .btn-icon:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }

        .lang-select {
            padding: 8px 15px; border-radius: 15px; border: 2px solid var(--neon-blue);
            background: #1e1b4b; color: #fff; font: inherit; font-weight: 600;
            cursor: pointer; outline: none; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .container {
            flex: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px; gap: 25px;
        }

        .machine-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(30px);
            border-radius: 40px; padding: 40px 20px; width: 100%;
            border: 3px solid var(--glass-border);
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            text-align: center; position: relative;
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        .quest-text { font-size: 1.4rem; margin-bottom: 20px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        .display-area {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 25px; flex-wrap: wrap;
        }

        .number-box {
            font-size: clamp(2rem, 8vw, 5rem); font-weight: 900; letter-spacing: 4px;
            color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.3);
            display: flex; align-items: center;
        }
        .zero-digit { color: var(--neon-pink); animation: glowPulse 2s infinite; margin-left: 2px; }
        @keyframes glowPulse { 0%, 100% { opacity: 1; text-shadow: 0 0 10px var(--neon-pink); } 50% { opacity: 0.4; text-shadow: none; } }

        .operator { font-size: clamp(1.5rem, 5vw, 3rem); color: var(--neon-blue); font-weight: 700; }

        .input-box {
            min-width: clamp(120px, 30vw, 220px); height: clamp(70px, 12vw, 100px); background: rgba(0,0,0,0.5);
            border: 4px dashed var(--neon-green); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.8rem, 6vw, 4rem); font-weight: 900; color: var(--neon-green);
            transition: 0.3s;
        }
        .input-box.active { 
            border-style: solid; border-color: var(--neon-cyan);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.4); background: rgba(16, 185, 129, 0.1);
        }
        .input-box.wrong { border-color: var(--danger) !important; background: rgba(244, 63, 94, 0.2) !important; animation: shake 0.4s; }

        .keypad-section { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key {
            height: 65px; background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border);
            border-radius: 18px; font-size: 1.8rem; font-weight: 700; color: #fff;
            cursor: pointer; transition: 0.1s; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 0 rgba(0,0,0,0.4);
        }
        .key:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); background: rgba(255,255,255,0.1); }
        .key.del { color: var(--neon-pink); border-color: rgba(244, 63, 94, 0.3); }
        .key.check { 
            grid-column: span 4; background: linear-gradient(to right, var(--neon-green), var(--neon-blue));
            height: 80px; font-size: 2rem; text-transform: uppercase; letter-spacing: 3px;
            border-radius: 25px; font-weight: 900; margin-top: 5px; color: #fff; border: none;
            box-shadow: 0 8px 0 rgba(2, 44, 34, 0.8);
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 8000; text-align: center;
            backdrop-filter: blur(15px);
        }
        .success-icon { font-size: 8rem; margin-bottom: 20px; animation: bounceIn 0.8s; }
        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        #wrong-overlay {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.4);
            display: none; align-items: center; justify-content: center;
            z-index: 9500; pointer-events: none;
        }
        #wrong-overlay span { font-size: clamp(10rem, 30vw, 20rem); color: #fff; text-shadow: 0 0 60px rgba(0,0,0,0.8); animation: popX 0.4s forwards; }
        @keyframes popX { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 600px) {
            header { justify-content: center; padding: 10px; }
            .badges { width: 100%; justify-content: center; }
            .container { padding: 10px; gap: 15px; }
            .machine-card { padding: 30px 15px; }
            .key { height: 55px; font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="wrong-overlay"><span>❌</span></div>

    <header>
        <div class="header-left">
            <div class="stats-group">
                <div class="pill pill-lvl">🆙 <span id="lblLvl">ደረጃ</span>: <span id="valLvl">1</span></div>
                <div class="pill pill-high">👑 <span id="lblHigh">ዝለዓለ</span>: <span id="valHigh">0</span></div>
                <div class="pill pill-score">⭐ <span id="lblScore">ነጥቢ</span>: <span id="valScore">0</span></div>
            </div>
        </div>
        <div class="control-btns">
            <button class="btn-icon" id="btnMute" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="machine-card" id="machine">
            <div class="quest-text" id="txtQuest">ብ 10 ኣካፍሎ!</div>
            <div class="display-area">
                <div class="number-box" id="dividendBox">
                    <span id="numPart">1000</span><span class="zero-digit">0</span>
                </div>
                <div class="operator">÷ 10 =</div>
                <div class="input-box active" id="inputBox">?</div>
            </div>
            <div id="txtHint" style="color: #64748b; font-weight: 700; font-size: 1rem;">ምምቃል ብ10 ማለት ንሓንቲ ዜሮ ምጥፋእ ማለት እዩ።</div>
        </div>

        <div class="keypad-section">
            <div class="keypad" id="keypad">
                <!-- Keys injected by JS -->
            </div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ኣረጋግፅ (Check)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="success-icon" id="successEmoji">🚀</div>
        <h2 id="successTitle" style="font-size: clamp(2.5rem, 8vw, 4rem); color: var(--neon-green);">ንኡድ ስራሕ!</h2>
        <div id="successLevel" style="font-size: clamp(1.5rem, 5vw, 2.5rem); color: var(--neon-purple); margin-top: 10px; font-weight: 800;">ደረጃ 1</div>
        <p id="successSub" style="font-size: clamp(1rem, 3vw, 1.8rem); opacity: 0.8; margin-top: 15px;">ብትኽክል መሊስካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { quest: "ብ 10 ኣካፍሎ!", hint: "ምምቃል ብ10 ማለት ንሓንቲ ዜሮ ምጥፋእ ማለት እዩ።", check: "ኣረጋግፅ", win: "ፅቡቅ ስራሕ!", winsub: "ብትኽክል ተመሊሱ!", score: "ነጥቢ", high: "ዝለዓለ", level: "ደረጃ" },
            am: { quest: "በ 10 አካፍል!", hint: "በ 10 ማካፈል ማለት አንዲት ዜሮን መሰረዝ ማለት ነው።", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", score: "ነጥብ", high: "ከፍተኛ", level: "ደረጃ" },
            en: { quest: "Divide by 10!", hint: "Dividing by 10 is like removing one zero!", check: "Check", win: "Great Job!", winsub: "You answered correctly!", score: "Score", high: "High", level: "Level" },
            om: { quest: "10'n hiri!", hint: "10'n hiruun zeeroo tokko haqsuu dha.", check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriitti deebisteetta!", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa" },
            so: { quest: "10 u qaybi!", hint: "In 10 loo qaybiyo waxay la mid tahay in hal eber laga saaro!", check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad u jawaabtay!", score: "Dhibco", high: "Sare", level: "Heerka" }
        };

        let state = {
            lang: 'ti',
            score: 0,
            level: 1,
            highScore: parseInt(localStorage.getItem('div_high_score')) || 0,
            target: 0,
            userInput: "",
            busy: false,
            muted: false,
            particles: [],
            successLoop: null
        };

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSfx(type) {
            if (state.muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.05, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046, 1318].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function generate() {
            state.busy = false;
            state.userInput = "";
            
            state.level = Math.floor(state.score / 50) + 1;
            let range = state.level === 1 ? 100 : (state.level === 2 ? 1000 : (state.level === 3 ? 10000 : 100000));
            
            const base = Math.floor(Math.random() * range) + 10;
            state.target = base;
            const dividend = base * 10;
            const divStr = dividend.toString();

            document.getElementById('numPart').innerText = divStr.slice(0, -1);
            document.getElementById('inputBox').innerText = "?";
            document.getElementById('inputBox').classList.remove('wrong');
            updateUI();
        }

        function pressKey(k) {
            if (state.busy) return;
            playSfx('tap');
            if (k === 'bk') {
                state.userInput = state.userInput.slice(0, -1);
            } else {
                if (state.userInput.length < 8) state.userInput += k;
            }
            document.getElementById('inputBox').innerText = state.userInput || "?";
        }

        function checkAnswer() {
            if (state.busy || !state.userInput) return;
            
            if (parseInt(state.userInput) === state.target) {
                handleSuccess();
            } else {
                handleError();
            }
        }

        function handleSuccess() {
            state.busy = true;
            state.score += 10;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('div_high_score', state.highScore);
            }
            
            playSfx('win');
            
            // CONTINUOUS PARTY CONFETTI on the success screen
            burst(300);
            state.successLoop = setInterval(() => {
                burst(50);
            }, 250);

            const overlay = document.getElementById('success-overlay');
            const t = i18n[state.lang];
            const emojis = ['🚀', '🌟', '🛸', '🛰️', '🪐', '💎', '🛸', '🛰️'];
            document.getElementById('successEmoji').innerText = emojis[Math.floor(Math.random() * emojis.length)];
            document.getElementById('successTitle').innerText = t.win;
            document.getElementById('successSub').innerText = t.winsub;
            document.getElementById('successLevel').innerText = `${t.level} ${state.level}`;
            
            overlay.style.display = 'flex';
            setTimeout(() => {
                clearInterval(state.successLoop);
                overlay.style.display = 'none';
                generate();
            }, 3000);
        }

        function handleError() {
            playSfx('err');
            const box = document.getElementById('inputBox');
            box.classList.add('wrong');
            
            // VERY NOTICEABLE ERROR: Full screen glitch red and X overlay
            document.body.classList.add('error-flash');
            document.getElementById('wrong-overlay').style.display = 'flex';
            
            setTimeout(() => {
                box.classList.remove('wrong');
                document.body.classList.remove('error-flash');
                document.getElementById('wrong-overlay').style.display = 'none';
                state.userInput = "";
                box.innerText = "?";
            }, 800);
        }

        function toggleMute() {
            state.muted = !state.muted;
            document.getElementById('btnMute').innerText = state.muted ? '🔇' : '🔊';
        }

        function changeLang(l) {
            state.lang = l;
            updateUI();
        }

        function updateUI() {
            const t = i18n[state.lang];
            document.getElementById('txtQuest').innerText = t.quest;
            document.getElementById('txtHint').innerText = t.hint;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('valScore').innerText = state.score;
            document.getElementById('valHigh').innerText = state.highScore;
            document.getElementById('valLvl').innerText = state.level;
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#38bdf8', '#a855f7', '#f472b6', '#10b981', '#ffffff', '#fb923c', '#00f2fe', '#facc15'];
            for(let i=0; i<count; i++) state.particles.push({
                x: Math.random() * c.width, y: c.height + 20, vx: (Math.random()-0.5)*45, vy: (Math.random()-0.8)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*25
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=state.particles.length-1; i>=0; i--){
                    const p=state.particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.985; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else state.particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,0].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; b.innerText = k; b.onclick = () => pressKey(k); kp.appendChild(b);
            });
            const del = document.createElement('button');
            del.className = 'key del'; del.innerText = '⌫'; del.onclick = () => pressKey('bk'); 
            kp.appendChild(del);

            generate();
        };

        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') pressKey(e.key);
            if (e.key === 'Backspace') pressKey('bk');
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>

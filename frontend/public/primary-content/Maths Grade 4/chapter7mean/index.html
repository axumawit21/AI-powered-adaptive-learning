<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mean Master | ማእኸላይ ውፅኢት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #e0f2fe;
            --ink: #1e1b4b;
            --primary: #f97316;
            --secondary: #0ea5e9;
            --success: #10b981;
            --error: #f43f5e;
            --white: #ffffff;
            --crate-bg: #fbbf24;
            --btn-shadow: #7c2d12;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(135deg, #bae6fd 0%, #e0f2fe 100%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--ink); overflow-x: hidden; position: relative;
        }

        .background-decoration {
            position: fixed; inset: 0; opacity: 0.1; z-index: 0; pointer-events: none;
            background-image: radial-gradient(var(--ink) 2px, transparent 2px);
            background-size: 40px 40px;
        }

        header {
            width: 100%; max-width: 1200px; padding: 10px 15px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            gap: 10px; flex-wrap: wrap;
        }

        .stat-pill {
            background: var(--white); padding: 6px 12px; border-radius: 15px; border: 3px solid var(--ink);
            display: flex; align-items: center; gap: 6px; font-weight: 800; 
            font-size: clamp(0.7rem, 2.5vw, 0.9rem); box-shadow: 0 4px 0 var(--ink);
        }
        .stat-val { color: var(--primary); }

        .container {
            flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 10px 15px 30px 15px; z-index: 10; gap: 20px;
        }

        .game-card {
            background: var(--white); border-radius: 35px; border: 5px solid var(--ink);
            padding: 20px; width: 100%; max-width: 600px; box-shadow: 0 12px 0 var(--ink);
            text-align: center; display: flex; flex-direction: column; gap: 20px;
            position: relative;
        }

        .formula-hint {
            background: #fff7ed; border: 3px dashed var(--primary); color: #c2410c;
            padding: 8px; border-radius: 15px; font-weight: 800; font-size: 0.85rem;
        }

        .items-area {
            display: flex; justify-content: center; align-items: flex-end; gap: 10px;
            min-height: 120px; flex-wrap: wrap; padding: 10px 0;
        }

        .crate {
            background: var(--crate-bg); border: 4px solid var(--ink); border-radius: 18px;
            width: clamp(65px, 15vw, 90px); padding: 12px 5px; color: var(--ink); position: relative;
            box-shadow: 0 6px 0 var(--ink); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
        .crate::before { content: '📦'; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-size: 1.2rem; }
        .crate-val { font-size: clamp(1.4rem, 4vw, 2.2rem); font-weight: 900; }

        .question-text { font-size: clamp(1.1rem, 3.5vw, 1.6rem); font-weight: 950; color: var(--ink); line-height: 1.2; }

        .ans-box {
            min-width: clamp(100px, 30vw, 150px); height: 80px; background: #fff; border: 5px solid var(--secondary);
            border-radius: 25px; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 900; color: var(--secondary);
            box-shadow: 0 8px 0 var(--secondary); margin: 0 auto;
        }
        .ans-box.active { border-color: var(--primary); box-shadow: 0 8px 0 var(--primary); color: var(--primary); }

        /* KEYPAD STYLING - FULLY MOBILE RESPONSIVE */
        .keypad-wrapper {
            width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px;
        }

        .keypad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%;
        }

        .key {
            height: clamp(55px, 8vh, 70px); background: var(--white); border: 4px solid var(--ink); border-radius: 18px;
            font-size: 1.6rem; font-weight: 900; cursor: pointer; transition: 0.1s;
            box-shadow: 0 6px 0 var(--ink); display: flex; align-items: center; justify-content: center;
            color: var(--ink);
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--ink); }
        
        .key.del { color: var(--white); background: var(--error); }
        .key.del:active { box-shadow: 0 2px 0 #991b1b; }

        .key.check {
            grid-column: 1 / -1; background: var(--success); color: white; height: clamp(70px, 10vh, 85px); 
            font-size: 1.8rem; box-shadow: 0 8px 0 #065f46; border-color: var(--ink); margin-top: 5px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .key.check:active { box-shadow: 0 3px 0 #065f46; }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(255, 255, 255, 0.98); text-align: center; padding: 20px;
        }
        .big-icon { font-size: clamp(6rem, 15vw, 9rem); margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }

        @media (min-width: 1024px) {
            .container { flex-direction: row; gap: 50px; align-items: stretch; max-width: 1200px; }
            .game-card { flex: 1.2; justify-content: center; padding: 40px; }
            .keypad-wrapper { flex: 0.8; justify-content: center; }
        }

        @media (max-width: 480px) {
            header { padding: 10px; }
            .container { padding: 5px 10px 20px 10px; gap: 15px; }
            .game-card { border-radius: 25px; padding: 15px; }
            .items-area { min-height: 100px; }
            .crate { width: clamp(60px, 18vw, 75px); }
        }
    </style>
</head>
<body>
    <div class="background-decoration"></div>
    <canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:6000;"></canvas>

    <header>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div class="stat-pill">⭐ <span id="lblScore">Score</span>: <span id="valScore" class="stat-val">0</span></div>
            <div class="stat-pill">👑 <span id="lblHigh">High</span>: <span id="valHigh" class="stat-val">0</span></div>
            <div class="stat-pill">🆙 <span id="lblLvl">Lvl</span>: <span id="valLvl" class="stat-val">1</span></div>
        </div>
        <div style="display: flex; gap: 8px; align-items: center;">
            <button class="stat-pill" style="width: 40px; height: 40px; border-radius: 50%; padding:0; justify-content:center; cursor: pointer;" onclick="toggleMute()" id="muteBtn">🔊</button>
            <select id="langSelect" class="stat-pill" style="cursor: pointer;" onchange="setLanguage(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card">
            <h1 id="txtTitle" style="font-weight: 900; color: var(--primary); font-size: clamp(1.4rem, 4vw, 2rem); text-transform: uppercase;">ማእኸላይ ውፅኢት</h1>
            <div class="formula-hint" id="txtHint">ማእኸላይ ውፅኢት = ድምር ÷ ብዝሒ</div>
            
            <div class="items-area" id="itemsArea">
                <!-- Crates injected here -->
            </div>

            <div class="question-text" id="txtQuestion">እዞም ቁፅርታት ማእኸላይ ውፅኢቶም ክንደይ እዩ?</div>
            
            <div class="ans-box active" id="ansBox">?</div>
        </div>

        <div class="keypad-wrapper">
            <div class="keypad" id="keypad">
                <!-- Keys injected here -->
            </div>
        </div>
    </div>

    <!-- Feedback Overlays -->
    <div id="success-overlay" class="overlay">
        <div class="big-icon">🏆</div>
        <h2 id="txtWin" style="font-size: 3rem; color: var(--success); font-weight: 950;">ንፉዕ!</h2>
        <p id="txtWinSub" style="font-size: 1.5rem; color: #64748b;">ልክዕ መልሲ!</p>
    </div>

    <div id="error-overlay" class="overlay" style="background: #fee2e2;">
        <div class="big-icon">❌</div>
        <h2 id="txtFail" style="font-size: 3rem; color: var(--error); font-weight: 950;">ጌጋ!</h2>
        <p id="txtFailSub" style="font-size: 1.5rem; color: var(--error);">እንደገና ፈትን</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "ማእኸላይ ውፅኢት", hint: "ማእኸላይ ውፅኢት = ድምር ÷ ብዝሒ", question: "እዞም ቁፅርታት ማእኸላይ ውፅኢቶም ክንደይ እዩ?", win: "ንፉዕ!", winsub: "ልክዕ ማእኸላይ ውፅኢት!", fail: "ጌጋ!", failsub: "እንደገና ፈትን", score: "ውፅኢት", high: "ዝለዓለ", level: "ደረጃ", check: "ኣረጋግፅ" },
            am: { title: "አማካይ ውጤት", hint: "አማካይ = ድምር ÷ ብዛት", question: "የነዚህ ቁጥሮች አማካይ ስንት ነው?", win: "ድንቅ ስራ!", winsub: "ትክክለኛ አማካይ!", fail: "ስህተት!", failsub: "እንደገና ይሞክሩ", score: "ውጤት", high: "ከፍተኛ", level: "ደረጃ", check: "አረጋግጥ" },
            en: { title: "Mean / Average", hint: "Mean = Sum ÷ Count", question: "What is the mean of these numbers?", win: "Excellent!", winsub: "Correct Average!", fail: "Oops!", failsub: "Try Again!", score: "Score", high: "High", level: "Level", check: "Check" },
            om: { title: "Giddu-galeessa", hint: "Giddu-galeessa = Ida'ama ÷ Baay'ina", question: "Giddu-galeessi lakkoofsota kanaa meeqa?", win: "Baay'ee Gaarii!", winsub: "Giddu-galeessa sirrii!", fail: "Dogoggora!", failsub: "Irra deebi'i yaali", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa", check: "Check" },
            so: { title: "Celceliska", hint: "Celceliska = Isugeynta ÷ Tirada", question: "Waa maxay celceliska tirooyinkaan?", win: "Shaqo Fiican!", winsub: "Celcelis sax ah!", fail: "Khalad!", failsub: "Markale isku day", score: "Dhibco", high: "Sare", level: "Heerka", check: "Check" }
        };

        let score = 0, lang = 'ti', currentData = [], currentMean = 0, busy = false, userVal = "", muted = false;
        let highScore = parseInt(localStorage.getItem('mean_73_high')) || 0;
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'tap') { o.type = 'sine'; o.frequency.setValueAtTime(800, n); g.gain.setValueAtTime(0.05, n); o.start(); o.stop(n + 0.05); }
            else if (type === 'win') { o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1)); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.5); }
            else if (type === 'err') { o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.exponentialRampToValueAtTime(40, n + 0.3); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.3); }
        }

        function toggleMute() { muted = !muted; document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊'; }

        function setLanguage(l) {
            lang = l;
            localStorage.setItem('mean_lang', lang);
            updateUI();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('txtTitle').innerText = t.title;
            document.getElementById('txtHint').innerText = t.hint;
            document.getElementById('txtQuestion').innerText = t.question;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('txtWinSub').innerText = t.winsub;
            document.getElementById('txtFail').innerText = t.fail;
            document.getElementById('txtFailSub').innerText = t.failsub;
            document.getElementById('valScore').innerText = score;
            document.getElementById('valHigh').innerText = highScore;
            document.getElementById('valLvl').innerText = Math.floor(score / 200) + 1;
            
            const checkBtn = document.getElementById('btnCheck');
            if(checkBtn) checkBtn.innerText = t.check;
        }

        function generateTask() {
            busy = false; userVal = "";
            const level = Math.floor(score / 200) + 1;
            const count = Math.min(5, level + 2); 
            
            const targetMean = Math.floor(Math.random() * (10 * level)) + 5;
            const totalSum = targetMean * count;
            
            let tempSum = 0;
            currentData = [];
            for (let i = 0; i < count - 1; i++) {
                const val = Math.floor(Math.random() * (targetMean * 1.5)) + 1;
                currentData.push(val);
                tempSum += val;
            }
            
            let lastVal = totalSum - tempSum;
            if (lastVal < 1) return generateTask();
            
            currentData.push(lastVal);
            currentMean = targetMean;

            renderTask();
        }

        function renderTask() {
            const area = document.getElementById('itemsArea');
            area.innerHTML = '';
            currentData.forEach((val, i) => {
                const crate = document.createElement('div');
                crate.className = 'crate';
                crate.style.animationDelay = (i * 0.1) + 's';
                crate.innerHTML = `<div class="crate-val">${val}</div>`;
                area.appendChild(crate);
            });
            document.getElementById('ansBox').innerText = '?';
        }

        function press(k) {
            if (busy) return;
            sfx('tap');
            if (k === 'bk') userVal = userVal.slice(0, -1);
            else if (userVal.length < 5) userVal += k;
            document.getElementById('ansBox').innerText = userVal || '?';
        }

        function checkAnswer() {
            if (busy || userVal === "") return;
            busy = true;
            if (parseInt(userVal) === currentMean) {
                score += 50;
                if (score > highScore) { 
                    highScore = score; 
                    localStorage.setItem('mean_73_high', highScore); 
                }
                handleWin();
            } else {
                handleErr();
            }
        }

        function handleWin() {
            sfx('win'); burst(300);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                generateTask();
                updateUI();
            }, 2000);
        }

        function handleErr() {
            sfx('err');
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                userVal = ""; busy = false;
                document.getElementById('ansBox').innerText = '?';
            }, 1800);
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const p = [];
            const colors = ['#f97316', '#0ea5e9', '#22c55e', '#ffffff'];
            for(let i=0; i<count; i++) p.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*40, vy: (Math.random()-1.2)*65,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 2.5, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=p.length-1; i>=0; i--){
                    const pt=p[i]; if(pt.l>0){
                        al=true; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.85; pt.l-=0.01; pt.r+=pt.rv;
                        x.save(); x.translate(pt.x,pt.y); x.rotate(pt.r*Math.PI/180);
                        x.fillStyle=pt.c; x.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s); x.restore();
                    } else p.splice(i,1);
                }
                if(al) requestAnimationFrame(f);
            })();
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,0,'00','bk'].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; 
                if(k === 'bk') { b.innerText = '⌫'; b.classList.add('del'); }
                else b.innerText = k;
                b.onclick = () => press(k); 
                kp.appendChild(b);
            });
            const checkBtn = document.createElement('button');
            checkBtn.id = 'btnCheck';
            checkBtn.className = 'key check';
            checkBtn.onclick = checkAnswer;
            kp.appendChild(checkBtn);

            const savedLang = localStorage.getItem('mean_lang') || 'ti';
            document.getElementById('langSelect').value = savedLang;
            setLanguage(savedLang);
            generateTask();
        };
    </script>
</body>
</html>

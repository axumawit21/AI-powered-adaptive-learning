<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hydro-Logic Lab | ምስራሕ ሕቶታት ትሕዝቶ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --secondary: #10b981;
            --danger: #ef4444;
            --accent: #f59e0b;
            --glass: rgba(255, 255, 255, 0.9);
            --bg-grad: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 50%, #7dd3fc 100%);
            --card-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-grad);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #0c4a6e;
            overflow-x: hidden;
            transition: background-color 0.2s;
        }

        /* Intense Error State */
        body.wrong-flash {
            background: #dc2626 !important; /* Deep red */
            color: white !important;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        #wrong-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4);
            display: none; align-items: center; justify-content: center;
            z-index: 9500; pointer-events: none;
        }
        #wrong-overlay span { 
            font-size: clamp(15rem, 50vw, 30rem); 
            color: #fff; 
            text-shadow: 0 0 70px rgba(0,0,0,0.8); 
            font-weight: 900; 
            animation: popX 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
        }
        @keyframes popX { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1.1); opacity: 1; } }

        header {
            width: 100%;
            max-width: 1100px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            flex-wrap: wrap;
            gap: 15px;
        }

        .badges { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .stat-pill {
            background: white;
            padding: 8px 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 2px solid #f1f5f9;
        }
        .stat-label { color: #64748b; font-size: 0.8rem; text-transform: uppercase; }
        .stat-val { color: var(--primary); }
        .pill-high { border-color: var(--accent); }
        .pill-high .stat-val { color: var(--accent); }

        .header-controls { display: flex; gap: 10px; align-items: center; }
        .btn-mute {
            width: 45px; height: 45px; border-radius: 50%; border: none;
            background: white; color: #64748b; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .lang-select {
            padding: 10px 15px; border-radius: 15px; border: 2px solid var(--primary);
            background: white; color: var(--primary); font: inherit; font-weight: 700;
            cursor: pointer; outline: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 1000px;
            display: flex;
            padding: 20px;
            gap: 30px;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .main-title {
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            color: #0369a1;
            text-shadow: 2px 2px 0 white;
            margin-bottom: 10px;
        }

        .game-area {
            width: 100%;
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Lab Visuals */
        .lab-equipment {
            flex: 1;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .beaker {
            width: 180px;
            height: 350px;
            background: rgba(255, 255, 255, 0.4);
            border: 6px solid #64748b;
            border-top: none;
            border-radius: 0 0 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05);
        }
        .beaker::after {
            content: ''; position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.05) 2px, transparent 2px);
            background-size: 100% 35px;
        }

        .liquid {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(to bottom, #38bdf8, #0ea5e9);
            transition: height 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: inset 0 0 30px rgba(255,255,255,0.4);
        }
        .liquid::before {
            content: ''; position: absolute; top: -10px; left: 0; width: 100%; height: 20px;
            background: rgba(255,255,255,0.5); border-radius: 50%; filter: blur(5px);
        }

        /* Math Section */
        .math-card {
            flex: 1.2;
            min-width: 350px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 4px solid white;
            border-radius: 50px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            box-shadow: var(--card-shadow);
        }

        .vertical-math {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: 4.5rem;
            font-weight: 900;
            line-height: 1;
            position: relative;
            color: #0f172a;
        }
        .op-sign { position: absolute; left: -70px; bottom: 110px; font-size: 4rem; color: var(--danger); }
        .math-line { width: calc(100% + 80px); height: 8px; background: #334155; border-radius: 10px; margin: 15px 0; margin-right: -40px; }
        .unit-lbl { font-size: 1.5rem; color: var(--primary); font-weight: 800; width: 60px; text-align: left; margin-left: 10px; }
        .row { display: flex; align-items: center; width: 100%; justify-content: flex-end; }

        .ans-box {
            width: 180px;
            height: 90px;
            background: #f8fafc;
            border: 5px dashed #cbd5e1;
            border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; color: var(--primary); cursor: pointer; transition: 0.3s;
        }
        .ans-box.active { background: white; color: var(--primary); border-style: solid; border-color: var(--primary); box-shadow: 0 0 30px rgba(14, 165, 233, 0.2); transform: scale(1.05); }

        /* Keypad */
        .keypad-section {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .key {
            height: 70px; background: white; border: 2px solid #f1f5f9; border-radius: 20px;
            font-size: 1.8rem; font-weight: 800; color: #334155; cursor: pointer;
            box-shadow: 0 6px 0 #e2e8f0; transition: all 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 #e2e8f0; }
        .key.del { background: #fff1f2; color: var(--danger); border-color: #fee2e2; }

        .btn-check {
            grid-column: span 4; background: linear-gradient(to right, var(--secondary), #059669);
            color: white; border: none; height: 85px; border-radius: 25px;
            font-size: 2rem; font-weight: 900; box-shadow: 0 8px 0 #064e3b;
            cursor: pointer; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-check:active { transform: translateY(6px); box-shadow: 0 2px 0 #064e3b; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9000; text-align: center;
            backdrop-filter: blur(25px);
        }
        .win-icon { font-size: 10rem; margin-bottom: 20px; animation: bouncePop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bouncePop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 600px) {
            .vertical-math { font-size: 3rem; }
            .ans-box { width: 120px; height: 75px; font-size: 2.5rem; }
            .beaker { height: 250px; width: 140px; }
            .key { height: 60px; font-size: 1.5rem; }
            .btn-check { height: 75px; font-size: 1.6rem; }
            .main-title { font-size: 1.5rem; }
            header { padding: 10px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="wrong-overlay"><span>❌</span></div>

    <header>
        <div class="badges">
            <div class="stat-pill"><span class="stat-label" id="txtLvl">ደረጃ</span><span id="valLvl" class="stat-val">1</span></div>
            <div class="stat-pill pill-high"><span class="stat-label" id="txtHigh">ዝለዓለ</span><span id="valHigh" class="stat-val">0</span></div>
            <div class="stat-pill">⭐ <span id="valScore" class="stat-val">0</span></div>
        </div>
        <div class="header-controls">
            <button class="btn-mute" id="btnMute" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <h1 class="main-title" id="pageTitle">ኣሃድታት ትሕዝቶ ምድማርን ምጉዳልን</h1>

        <div class="game-area">
            <div class="lab-equipment">
                <div class="beaker">
                    <div class="liquid" id="liquid"></div>
                </div>
                <div id="visualLabel" style="font-size: 1.5rem; font-weight: 800; color: var(--primary);">40 ሊ</div>
            </div>

            <div class="math-card" id="mathCard">
                <div class="vertical-math">
                    <div class="row"><span id="n1">40</span> <span class="unit-lbl" id="u1">ሊ</span></div>
                    <div class="row"><span class="op-sign" id="op">+</span> <span id="n2">30</span> <span class="unit-lbl" id="u2">ሊ</span></div>
                    <div class="math-line"></div>
                    <div class="row"><div class="ans-box active" id="ansBox">?</div> <span class="unit-lbl" id="uAns">ሊ</span></div>
                </div>

                <div class="keypad-section">
                    <div class="keypad" id="keypad"></div>
                    <button class="key check" id="btnCheck" onclick="check()">ኣረጋግፅ</button>
                </div>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <div class="win-icon" id="successEmoji">🏆</div>
        <h2 id="txtWin" style="font-size: 4rem; color: var(--secondary);">ፅቡቅ ስራሕ!</h2>
        <p style="font-size: 1.8rem; opacity: 0.8;" id="txtWinSub">ብትኽክል ሰሪሕካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { units: { L: "ሊ", ml: "ሚ.ሊ" }, check: "ኣረጋግፅ", win: "ፅቡቅ ስራሕ!", winsub: "ብትኽክል ሰሪሕካዮ ኣለኻ!", title: "ኣሃድታት ትሕዝቶ ምድማርን ምጉዳልን", lvl: "ደረጃ", high: "ዝለዓለ" },
            am: { units: { L: "ሊ", ml: "ሚ.ሊ" }, check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል ሰርተሃል!", title: "የይዘት መለኪያዎች መደመርና መቀነስ", lvl: "ደረጃ", high: "ከፍተኛ" },
            en: { units: { L: "L", ml: "ml" }, check: "Check", win: "Great Job!", winsub: "You answered correctly!", title: "Add/Subtract Capacity Units", lvl: "Level", high: "Highest" },
            om: { units: { L: "L", ml: "ml" }, check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriitti hojjetteetta!", title: "Yuunitii Qabiyyee Ida'uu fi Hir'isuu", lvl: "Sadarkaa", high: "Olaanaa" },
            so: { units: { L: "L", ml: "ml" }, check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad u xallisay!", title: "Isku-darka iyo Kala-goynta Cabbirka", lvl: "Heerka", high: "Sare" }
        };

        let state = {
            lang: 'ti', score: 0, level: 1,
            highScore: parseInt(localStorage.getItem('capacity_math_high')) || 0,
            n1: 0, n2: 0, op: '+', unit: 'L',
            userVal: "", busy: false, particles: [], muted: false,
            successTimer: null
        };

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();
        function sfx(type) {
            if (state.muted) return;
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type==='win') { o.type='triangle'; [523,659,783,1046].forEach((f,i)=>o.frequency.setValueAtTime(f,n+i*0.1)); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.6); }
            else if(type==='err') { o.type='sawtooth'; o.frequency.value=120; g.gain.setValueAtTime(0.15,n); o.start(); o.stop(n+0.4); }
            else { o.type='sine'; o.frequency.value=400; g.gain.setValueAtTime(0.05,n); o.start(); o.stop(n+0.1); }
        }

        function generate() {
            state.busy = false; state.userVal = "";
            state.level = Math.floor(state.score / 50) + 1;
            state.op = Math.random() > 0.5 ? '+' : '-';
            state.unit = Math.random() > 0.5 ? 'L' : 'ml';
            
            const maxVal = state.unit === 'L' ? (state.level * 10 + 50) : (state.level * 100 + 500);
            
            if (state.level === 1) {
                const step = state.unit === 'L' ? 5 : 50;
                state.n1 = (Math.floor(Math.random() * (maxVal / step)) + 1) * step;
                state.n2 = (Math.floor(Math.random() * (state.n1 / step)) + 1) * step;
            } else if (state.level === 2) {
                state.n1 = Math.floor(Math.random() * (maxVal * 0.7)) + 10;
                state.n2 = Math.floor(Math.random() * (state.n1 * 0.5)) + 5;
            } else {
                state.n1 = Math.floor(Math.random() * maxVal) + (state.level * 5);
                state.n2 = Math.floor(Math.random() * state.n1) + 1;
            }

            if (state.op === '+') {
                if (state.n1 + state.n2 > maxVal) state.n2 = maxVal - state.n1;
            } else {
                if (state.n1 < state.n2) [state.n1, state.n2] = [state.n2, state.n1];
            }

            document.getElementById('n1').innerText = Math.round(state.n1);
            document.getElementById('n2').innerText = Math.round(state.n2);
            document.getElementById('op').innerText = state.op;
            document.getElementById('ansBox').innerText = "?";
            
            state.currentMax = maxVal;
            updateI18n();
            updateLiquid(state.n1);
        }

        function updateI18n() {
            const t = i18n[state.lang];
            const u = t.units[state.unit];
            document.getElementById('u1').innerText = u;
            document.getElementById('u2').innerText = u;
            document.getElementById('uAns').innerText = u;
            document.getElementById('btnCheck').innerText = t.check ;
            document.getElementById('visualLabel').innerText = Math.round(state.n1) + " " + u;
            document.getElementById('pageTitle').innerText = t.title;
            document.getElementById('txtLvl').innerText = t.lvl;
            document.getElementById('txtHigh').innerText = t.high;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('txtWinSub').innerText = t.winsub;
            document.getElementById('valScore').innerText = state.score;
            document.getElementById('valHigh').innerText = state.highScore;
            document.getElementById('valLvl').innerText = state.level;
        }

        function updateLiquid(val) {
            const pct = (val / state.currentMax) * 100;
            document.getElementById('liquid').style.height = Math.min(pct, 100) + "%";
        }

        function press(k) {
            if (state.busy) return;
            sfx('tap');
            if (k === 'bk') state.userVal = state.userVal.slice(0, -1);
            else if (state.userVal.length < 5) state.userVal += k;
            document.getElementById('ansBox').innerText = state.userVal || "?";
        }

        function check() {
            if (state.busy || !state.userVal) return;
            const ans = state.op === '+' ? (state.n1 + state.n2) : (state.n1 - state.n2);
            if (parseInt(state.userVal) === Math.round(ans)) {
                handleSuccess(ans);
            } else {
                handleError();
            }
        }

        function handleSuccess(ans) {
            state.busy = true; state.score += 10;
            if(state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('capacity_math_high', state.highScore);
            }
            updateLiquid(ans);
            document.getElementById('visualLabel').innerText = Math.round(ans) + " " + i18n[state.lang].units[state.unit];
            sfx('win'); 
            
            // INTENSE PARTY CONFETTI
            burst(400);
            let count = 0;
            const celebrate = setInterval(() => {
                burst(100);
                count++;
                if (count > 8) clearInterval(celebrate);
            }, 200);
            
            document.getElementById('successEmoji').innerText = ['🏆', '✨', '💎', '🚀', '🔥'][Math.floor(Math.random()*5)];
            document.getElementById('success-overlay').style.display = 'flex';
            setTimeout(() => {
                clearInterval(celebrate);
                document.getElementById('success-overlay').style.display = 'none';
                generate();
            }, 3000);
        }

        function handleError() {
            sfx('err');
            // AGGRESSIVE ERROR FEEDBACK
            document.body.classList.add('wrong-flash');
            document.getElementById('wrong-overlay').style.display = 'flex';
            document.getElementById('mathCard').classList.add('shake');
            
            setTimeout(() => {
                document.body.classList.remove('wrong-flash');
                document.getElementById('wrong-overlay').style.display = 'none';
                document.getElementById('mathCard').classList.remove('shake');
                state.userVal = "";
                document.getElementById('ansBox').innerText = "?";
            }, 1000); // 1 second duration for clear reaction
        }

        function changeLang(l) { state.lang = l; updateI18n(); }
        function toggleMute() { state.muted = !state.muted; document.getElementById('btnMute').innerText = state.muted ? '🔇' : '🔊'; }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            if (c.width !== window.innerWidth) { c.width = window.innerWidth; c.height = window.innerHeight; }
            const colors = ['#0ea5e9','#10b981','#ffffff','#f59e0b','#ec4899','#38bdf8','#a855f7','#ff00ff'];
            for(let i=0; i<count; i++) state.particles.push({
                x: Math.random() * c.width, y: c.height + 20,
                vx: (Math.random()-0.5)*40, vy: (Math.random()-0.8)*55,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 2.2, r: Math.random()*360, rv: (Math.random()-0.5)*30
            });
            if(!window.animating) { window.animating=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=state.particles.length-1; i>=0; i--){
                    const p=state.particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.985; p.l-=0.012; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0);
                        x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else state.particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.animating=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,'bk',4,5,6,0,7,8,9].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key' + (k==='bk' ? ' del' : '');
                b.innerText = k === 'bk' ? '⌫' : k;
                b.onclick = () => press(k);
                kp.appendChild(b);
            });
            generate();
        };
    </script>
</body>
</html>

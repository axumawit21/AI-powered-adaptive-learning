<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplication Properties | ጠባያት ምርባሕ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-study: #0f172a;
            --gold: #facc15;
            --amber: #f59e0b;
            --lavender: #c084fc;
            --mint: #10b981;
            --glass: rgba(255, 255, 255, 0.05);
            --ink: #f8fafc;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-study);
            background-image: 
                radial-gradient(at 0% 0%, #1e1b4b 0px, transparent 50%),
                radial-gradient(at 100% 0%, #312e81 0px, transparent 50%),
                radial-gradient(at 50% 100%, #0f172a 0px, transparent 50%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: var(--ink);
            transition: background-color 0.3s;
        }

        body.wrong-flash { background-color: #450a0a !important; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; }

        header {
            width: 100%; max-width: 1100px; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            gap: 15px;
        }

        .badges { display: flex; gap: 8px; align-items: center; flex-wrap: nowrap; }
        .stat-pill { 
            background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 15px; font-weight: 800; font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .stat-val { color: var(--mint); }
        .high-score-pill { border-color: var(--gold); }
        .high-score-pill .stat-val { color: var(--gold); }

        .controls-row {
            display: flex; gap: 10px; align-items: center;
        }

        .btn-mute {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            color: white; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; transition: 0.2s; flex-shrink: 0;
        }

        .lang-select {
            padding: 8px 12px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.2); font: inherit; font-weight: bold; cursor: pointer;
            background: #1e1b4b; color: white; outline: none; font-size: 0.85rem;
        }

        .container {
            flex: 1; width: 100%; max-width: 1300px; display: flex; flex-direction: column; 
            padding: 10px; gap: 15px; z-index: 10; justify-content: center; align-items: center;
        }

        .game-card {
            background: rgba(15, 12, 41, 0.7); backdrop-filter: blur(20px);
            border-radius: 40px; padding: 20px 15px 35px 15px; 
            border: 4px solid rgba(250, 204, 21, 0.3);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            width: 100%; max-width: 700px; text-align: center; display: flex; flex-direction: column; gap: 5px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .property-title {
            font-size: 1.4rem; font-weight: 900; color: var(--gold);
            text-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
            margin-bottom: 5px;
        }

        /* Scale Visual - Improved separation */
        .scale-visual {
            height: 100px; width: 100%; position: relative; display: flex; justify-content: center; align-items: flex-end;
            margin: 0 0 25px 0;
        }
        .scale-beam {
            width: 80%; height: 8px; background: #94a3b8; border-radius: 4px; position: relative;
            transform-origin: center center; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .scale-pivot {
            width: 35px; height: 35px; background: #64748b; border-radius: 8px 8px 0 0;
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
        }
        .pan {
            position: absolute; top: 10px; width: 100px; height: 50px;
            background: rgba(255,255,255,0.03); border: 2px solid #94a3b8; border-radius: 0 0 50% 50%;
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; padding: 4px; gap: 2px;
        }
        .pan-left { left: 0; transform: translateX(-50%); }
        .pan-right { right: 0; transform: translateX(50%); }
        
        .star-item { font-size: 0.7rem; color: var(--gold); filter: drop-shadow(0 0 3px var(--gold)); }

        /* Equation Display */
        .equation-area {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            font-size: 2rem; font-weight: 900; flex-wrap: wrap;
            margin-top: 15px; padding-top: 10px;
        }
        .num-box {
            padding: 10px 18px; background: rgba(255,255,255,0.08); border-radius: 15px; border: 2px solid rgba(255,255,255,0.15);
        }
        .ans-box {
            min-width: 75px; height: 75px; background: rgba(255,255,255,0.05); border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 2.2rem; cursor: pointer;
            border: 4px dashed var(--gold); transition: 0.3s;
            padding: 0 10px;
        }
        .ans-box.active { border-style: solid; background: white; color: var(--bg-study); box-shadow: 0 0 40px var(--gold); transform: scale(1.1); }
        .ans-box.wrong { border-color: var(--danger) !important; background: rgba(239, 68, 68, 0.3) !important; color: white !important; }

        /* Keypad */
        .keypad-section { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }
        .key {
            height: 60px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.05); border-radius: 15px;
            font-size: 1.6rem; font-weight: 800; color: #fff; cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.3); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        .key.del { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        .key.check { 
            grid-column: 1 / -1; background: var(--mint); color: #064e3b; 
            box-shadow: 0 8px 0 #064e3b; font-size: 1.8rem; height: 75px; margin-top: 5px;
            text-transform: uppercase; letter-spacing: 2px; border-radius: 20px; font-weight: 900;
        }
        .key.show-ans {
            grid-column: 1 / -1; background: rgba(255, 255, 255, 0.05); color: var(--gold);
            border: 2px solid var(--glass-border); font-size: 0.9rem; height: 45px; border-radius: 12px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 75% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(15, 12, 41, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 5000; color: white; text-align: center;
            backdrop-filter: blur(25px);
        }
        #success-overlay h2 { font-size: 3rem; margin-top: 15px; }

        /* Desktop specific */
        @media (min-width: 1024px) {
            header { padding: 25px 40px; max-width: 1300px; }
            .stat-pill { font-size: 1.1rem; padding: 10px 20px; }
            .container { flex-direction: row; gap: 80px; padding: 40px; max-width: 1500px; }
            .game-card { max-width: 800px; padding: 40px 40px 50px 40px; gap: 10px; }
            .property-title { font-size: 2.2rem; }
            .scale-visual { height: 160px; margin-bottom: 25px; }
            .scale-pivot { height: 50px; width: 45px; }
            .pan { width: 130px; height: 65px; }
            .equation-area { font-size: 3.5rem; gap: 20px; margin-top: 25px; }
            .ans-box { min-width: 110px; height: 100px; font-size: 4.5rem; border-radius: 22px; }
            .num-box { padding: 15px 30px; border-radius: 22px; }
            .keypad-section { max-width: 480px; gap: 15px; }
            .key { height: 75px; font-size: 2rem; border-radius: 20px; }
            .key.check { height: 95px; font-size: 2.2rem; border-radius: 25px; }
        }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: center; gap: 12px; }
            .badges { justify-content: center; width: 100%; }
            .controls-row { justify-content: center; width: 100%; }
            .equation-area { font-size: 1.6rem; gap: 8px; margin-top: 40px; } /* Pushed further down */
            .ans-box { min-width: 65px; height: 65px; font-size: 1.8rem; }
            .num-box { padding: 8px 15px; }
            .property-title { font-size: 1.3rem; }
            .scale-visual { height: 75px; margin-bottom: 30px; } /* More bottom margin */
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="badges">
            <div class="stat-pill">🆙 <span id="lblLvl">ደረጃ</span>: <span id="valLvl" class="stat-val">1</span></div>
            <div class="stat-pill high-score-pill">👑 <span id="lblHigh">High</span>: <span id="valHigh" class="stat-val">0</span></div>
            <div class="stat-pill">⭐ <span id="lblScore">Score</span>: <span id="valScore" class="stat-val">0</span></div>
        </div>
        <div class="controls-row">
            <button class="btn-mute" id="muteBtn" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="property-title" id="pageTitle">ጠባይ ምቅይያር (Commutative)</h1>
            
            <div class="scale-visual">
                <div class="scale-pivot"></div>
                <div class="scale-beam" id="beam">
                    <div class="pan pan-left" id="panLeft"></div>
                    <div class="pan pan-right" id="panRight"></div>
                </div>
            </div>

            <div class="equation-area" id="equation">
                <!-- Injected by JS -->
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad" id="keypad"></div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ፈትሽ (Check)</button>
            <button class="key show-ans" id="btnShow" onclick="showAnswer()">💡 መልሲ ኣርእየኒ (Show Answer)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 8rem; animation: bounce 1s infinite alternate;">⚖️</div>
        <h2 id="txtWin">ብጣዕሚ ጎበዝ!</h2>
        <p style="font-size: 1.5rem;" id="txtWinSub">ብትኽክል ሚዛኑ ሓሊኻዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { commutative: "ጠባይ ምቅይያር", associative: "ጠባይ ምሽራኽ", check: "ኣረጋግፅ", show: "መልሲ ኣርእየኒ", win: "ፅቡቅ ስራሕ!", winsub: "ብትኽክል ሚዛኑ ሓሊኻዮ ኣለኻ!", score: "ነጥቢ", high: "ዝለዓለ", level: "ደረጃ" },
            am: { commutative: "የመቀያየር ጠባይ", associative: "የመሻረክ ጠባይ", check: "አረጋግጥ", show: "መልሱን አሳይ", win: "ድንቅ ስራ!", winsub: "በትክክል ሚዛኑን ጠብቀሃል!", score: "ነጥብ", high: "ከፍተኛ", level: "ደረጃ" },
            en: { commutative: "Commutative Property", associative: "Associative Property", check: "Check", show: "Show Answer", win: "Great Job!", winsub: "You balanced the equation perfectly!", score: "Score", high: "High", level: "Level" },
            om: { commutative: "Amala Wal-jijjiiraa", associative: "Amala Wal-shiraa", check: "Mirkaneessi", show: "Deebii agarsiisi", win: "Hojii Gaarii!", winsub: "Mizaanicha qixxee gooteetta!", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa" },
            so: { commutative: "Hantida Is-weydaarsiga", associative: "Hantida Is-biirsiga", check: "Hubi", show: "Tusi jawaabta", win: "Shaqo Fiican!", winsub: "Si fiican ayaad u dheellitirtay!", score: "Dhibco", high: "Sare", level: "Heerka" }
        };

        let score = 0, lang = 'ti', currentQ = null, busy = false, muted = false;
        let highScore = parseInt(localStorage.getItem('multi_prop_high')) || 0;
        let userVals = []; 
        let activeIdx = 0; 
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.05, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046, 1318].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(120, n);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateQuestion() {
            const isCommutative = Math.random() > 0.4;
            userVals = [];
            activeIdx = 0;
            busy = false;
            
            if (isCommutative) {
                const a = Math.floor(Math.random() * 10) + 2;
                const b = Math.floor(Math.random() * 10) + 2;
                const mode = Math.floor(Math.random() * 3); 
                
                if (mode === 0) {
                    currentQ = { type: 'commutative', a, b, answers: [a], template: (uv) => `<div class="ans-box ${activeIdx===0?'active':''}" onclick="setFocus(0)">${uv[0]||'?'}</div> <span>×</span> <div class="num-box">${b}</div> <span>=</span> <div class="num-box">${b}</div> <span>×</span> <div class="num-box">${a}</div>` };
                } else if (mode === 1) {
                    currentQ = { type: 'commutative', a, b, answers: [a], template: (uv) => `<div class="num-box">${a}</div> <span>×</span> <div class="num-box">${b}</div> <span>=</span> <div class="num-box">${b}</div> <span>×</span> <div class="ans-box ${activeIdx===0?'active':''}" onclick="setFocus(0)">${uv[0]||'?'}</div>` };
                } else {
                    currentQ = { type: 'commutative', a, b, answers: [b, a], template: (uv) => `<div class="num-box">${a}</div> <span>×</span> <div class="num-box">${b}</div> <span>=</span> <div class="ans-box ${activeIdx===0?'active':''}" onclick="setFocus(0)">${uv[0]||'?'}</div> <span>×</span> <div class="ans-box ${activeIdx===1?'active':''}" onclick="setFocus(1)">${uv[1]||'?'}</div>` };
                }
            } else {
                const a = Math.floor(Math.random() * 5) + 2;
                const b = Math.floor(Math.random() * 4) + 2;
                const c = Math.floor(Math.random() * 3) + 2;
                const mode = Math.floor(Math.random() * 3);
                
                if (mode === 0) {
                    currentQ = { type: 'associative', a, b, c, answers: [b], template: (uv) => `(${a} <span>×</span> <div class="ans-box ${activeIdx===0?'active':''}" onclick="setFocus(0)">${uv[0]||'?'}</div>) <span>×</span> ${c} <span>=</span> ${a} <span>×</span> (${b} <span>×</span> ${c})` };
                } else if (mode === 1) {
                    currentQ = { type: 'associative', a, b, c, answers: [a, c], template: (uv) => `(<div class="ans-box ${activeIdx===0?'active':''}" onclick="setFocus(0)">${uv[0]||'?'}</div> <span>×</span> ${b}) <span>×</span> ${c} <span>=</span> ${a} <span>×</span> (${b} <span>×</span> <div class="ans-box ${activeIdx===1?'active':''}" onclick="setFocus(1)">${uv[1]||'?'}</div>)` };
                } else {
                    currentQ = { type: 'associative', a, b, c, answers: [b, c], template: (uv) => `(${a} <span>×</span> ${b}) <span>×</span> ${c} <span>=</span> ${a} <span>×</span> (<div class="ans-box ${activeIdx===0?'active':''}" onclick="setFocus(0)">${uv[0]||'?'}</div> <span>×</span> <div class="ans-box ${activeIdx===1?'active':''}" onclick="setFocus(1)">${uv[1]||'?'}</div>)` };
                }
            }
            
            userVals = currentQ.answers.map(() => "");
            renderUI();
        }

        function renderUI() {
            const t = i18n[lang];
            const levelNum = Math.floor(score / 50) + 1;
            document.getElementById('pageTitle').innerText = t[currentQ.type];
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('valScore').innerText = score;
            document.getElementById('valHigh').innerText = highScore;
            document.getElementById('valLvl').innerText = levelNum;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('btnShow').innerText = t.show;
            document.getElementById('equation').innerHTML = currentQ.template(userVals);
            
            const leftPan = document.getElementById('panLeft');
            const rightPan = document.getElementById('panRight');
            leftPan.innerHTML = ''; rightPan.innerHTML = '';
            
            const total = Math.min((currentQ.a || 1) * (currentQ.b || 1) * (currentQ.c || 1), 35);
            const icon = currentQ.type === 'commutative' ? '★' : '💎';
            for(let i=0; i<total; i++) {
                leftPan.innerHTML += `<div class="star-item">${icon}</div>`;
                rightPan.innerHTML += `<div class="star-item">${icon}</div>`;
            }

            updateScale();
        }

        function setFocus(idx) {
            if (busy) return;
            sfx('tap');
            activeIdx = idx;
            renderUI();
        }

        function updateScale() {
            const beam = document.getElementById('beam');
            const userSum = userVals.reduce((acc, v) => acc + (parseInt(v) || 0), 0);
            const targetSum = currentQ.answers.reduce((acc, v) => acc + v, 0);

            if (userSum === 0) {
                beam.style.transform = 'rotate(0deg)';
            } else if (userSum < targetSum) {
                beam.style.transform = 'rotate(-8deg)';
            } else if (userSum > targetSum) {
                beam.style.transform = 'rotate(8deg)';
            } else {
                beam.style.transform = 'rotate(0deg)';
            }
        }

        function press(k) {
            if (busy) return;
            sfx('tap');
            if (k === 'bk') {
                userVals[activeIdx] = userVals[activeIdx].slice(0, -1);
            } else {
                if (userVals[activeIdx].length < 3) {
                    userVals[activeIdx] += k;
                    const targetLen = currentQ.answers[activeIdx].toString().length;
                    if (userVals[activeIdx].length >= targetLen) {
                        if (activeIdx < userVals.length - 1) {
                            setTimeout(() => setFocus(activeIdx + 1), 150);
                        }
                    }
                }
            }
            renderUI();
        }

        function checkAnswer() {
            if (busy) return;
            const allFilled = userVals.every(v => v !== "");
            if (!allFilled) return;

            const isCorrect = userVals.every((v, i) => parseInt(v) === currentQ.answers[i]);

            if (isCorrect) {
                busy = true;
                score += 10;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('multi_prop_high', highScore);
                }
                sfx('win'); 
                
                // MULTIPLE MASSIVE BURSTS for background effect
                burst(300);
                setTimeout(() => burst(300), 400);
                setTimeout(() => burst(250), 800);
                setTimeout(() => burst(200), 1200);

                document.getElementById('success-overlay').style.display = 'flex';
                document.getElementById('txtWin').innerText = i18n[lang].win;
                document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
                setTimeout(() => {
                    document.getElementById('success-overlay').style.display = 'none';
                    generateQuestion();
                }, 2500);
            } else {
                sfx('err');
                document.body.classList.add('wrong-flash');
                document.getElementById('gameCard').classList.add('shake');
                document.querySelectorAll('.ans-box').forEach((box, i) => {
                    if (parseInt(userVals[i]) !== currentQ.answers[i]) {
                        box.classList.add('wrong');
                    }
                });
                setTimeout(() => {
                    document.body.classList.remove('wrong-flash');
                    document.getElementById('gameCard').classList.remove('shake');
                    document.querySelectorAll('.ans-box').forEach(box => box.classList.remove('wrong'));
                    userVals = currentQ.answers.map(() => "");
                    activeIdx = 0;
                    renderUI();
                }, 800);
            }
        }

        function showAnswer() {
            if (busy) return;
            sfx('tap');
            userVals = currentQ.answers.map(a => a.toString());
            renderUI();
        }

        function changeLang(l) { lang = l; renderUI(); }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#facc15','#2dd4bf','#c084fc','#f472b6','#ffffff','#0ea5e9','#10b981'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*45, vy: (Math.random()-0.9)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*30
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.012; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,0].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; b.innerText = k; b.onclick = () => press(k); kp.appendChild(b);
            });
            const del = document.createElement('button');
            del.className = 'key del'; del.innerText = '⌫'; del.onclick = () => press('bk'); kp.appendChild(del);
            generateQuestion();
        };
    </script>
</body>

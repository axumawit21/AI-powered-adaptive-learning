<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sum Architect | ሃናጺ ምድማር</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --danger: #ef4444;
            --blueprint: #1e40af;
            --ink: #ffffff;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: #f1f5f9;
            background-image: 
                linear-gradient(rgba(30, 64, 175, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 64, 175, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #1e293b;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 1100px; padding: 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 15px;
        }

        .badges { display: flex; gap: 15px; align-items: center; }
        .stat-pill { 
            background: white; padding: 12px 24px; border-radius: 20px; font-weight: 800; font-size: 1.2rem; color: var(--primary);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 3px solid #dbeafe;
            display: flex; align-items: center; gap: 10px;
        }
        .stat-val { color: var(--secondary); }
        .high-score { border-color: var(--accent); }
        .high-score .stat-val { color: var(--accent); }

        .btn-icon {
            background: white; border: none; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--primary); font-size: 1.4rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .btn-icon:active { transform: scale(0.9); }

        .lang-select {
            padding: 12px 20px; border-radius: 20px; border: 3px solid white; font: inherit; font-weight: bold; cursor: pointer;
            background: var(--glass); color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column; 
            padding: 20px; gap: 30px; z-index: 10; justify-content: center;
        }

        .game-card {
            background: var(--blueprint);
            border-radius: 50px; padding: 60px 40px; 
            border: 10px solid #ffffff;
            box-shadow: 0 40px 100px rgba(0,0,0,0.15);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 40px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; color: white;
        }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .game-title {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(to right, #facc15, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        /* Vertical Addition UI */
        .math-container {
            display: flex; flex-direction: column; align-items: flex-end; 
            font-size: 6rem; font-weight: 900; line-height: 1;
            font-family: 'monospace'; letter-spacing: 20px;
            width: fit-content; margin: 0 auto; position: relative;
        }

        .plus-sign { position: absolute; left: -80px; bottom: 120px; font-size: 5rem; color: var(--accent); }
        .math-line { width: calc(100% + 100px); height: 10px; background: white; margin: 20px 0; border-radius: 5px; margin-right: -40px; }

        .answer-row { display: flex; gap: 20px; justify-content: flex-end; width: 100%; padding-right: 10px; }
        
        .digit-box {
            width: 100px; height: 130px; background: rgba(255,255,255,0.1);
            border: 5px dashed rgba(255,255,255,0.3); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; font-weight: 900; color: var(--accent);
            cursor: pointer; transition: 0.3s;
        }
        .digit-box.active { 
            background: white; border-style: solid; border-color: var(--accent); 
            color: var(--blueprint); transform: scale(1.1); box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
        }
        .digit-box.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.3); animation: shake 0.4s; }

        /* Keypad */
        .keypad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; width: 100%; max-width: 600px; margin: 0 auto; }
        .key {
            height: 80px; background: white; border: none; border-radius: 20px;
            font-size: 2.2rem; font-weight: 800; color: #1e293b; cursor: pointer;
            box-shadow: 0 8px 0 #cbd5e1; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 4px 0 #cbd5e1; }
        .key.del { background: #fee2e2; color: var(--danger); box-shadow: 0 8px 0 #fca5a5; }
        .key.check { 
            grid-column: span 5; background: var(--secondary); color: white; 
            box-shadow: 0 10px 0 #065f46; font-size: 2.2rem; height: 90px; margin-top: 15px;
            text-transform: uppercase; letter-spacing: 2px;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.3);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 15rem; color: white; opacity: 0.5; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(16, 185, 129, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: white; text-align: center;
            backdrop-filter: blur(15px);
        }
        #success-overlay h2 { font-size: 5rem; margin-top: 20px; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 850px) {
            .math-container { font-size: 3rem; letter-spacing: 10px; }
            .plus-sign { font-size: 2.5rem; left: -40px; bottom: 65px; }
            .math-line { width: calc(100% + 50px); margin-right: -25px; }
            .digit-box { width: 60px; height: 80px; font-size: 2.5rem; border-width: 3px; }
            .key { height: 60px; font-size: 1.6rem; border-radius: 15px; }
            .game-card { padding: 40px 20px; border-radius: 35px; }
            header { padding: 15px; justify-content: center; }
            .stat-pill { padding: 8px 15px; font-size: 0.9rem; }
            .game-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-left">
            <button class="btn-icon" id="muteBtn" onclick="toggleMute()" title="Sound Toggle">🔊</button>
            <div class="badges">
                <div class="stat-pill high-score">
                    <span id="highLabel" class="stat-label">ዝለዓለ</span>
                    <span id="highScoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                    <span id="scoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="lvlLabel" class="stat-label">ደረጃ</span>
                    <span id="levelVal" class="stat-val">1</span>
                </div>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="game-title" id="pageTitle">ኣለኒ ዘይብሉ ምድማር</h1>
            
            <div class="math-container">
                <div id="num1">000000</div>
                <div id="num2"><span class="plus-sign">+</span>000000</div>
                <div class="math-line"></div>
                <div class="answer-row" id="answerRow">
                    <!-- Digit boxes injected here -->
                </div>
            </div>

            <div class="keypad" id="keypad">
                <!-- Keys 1-9, 0, Del -->
            </div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ኣረጋግፅ (Check)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 10rem; animation: bounce 1s infinite alternate;">🏢</div>
        <h2 id="txtWin">ንኡድ ስራሕ!</h2>
        <p style="font-size: 2rem;" id="txtWinSub">ብትኽክል ተመሊሱ!</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "ኣለኒ ዘይብሉ ምድማር", win: "ብጣዕሚ ጎበዝ!", winsub: "ብትኽክል ተመሊሱ!", level: "ደረጃ", score: "ነጥቢ", high: "ዝለዓለ", check: "ኣረጋግፅ" },
            am: { title: "ኣለኝ የሌለበት መደመር", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", level: "ደረጃ", score: "ነጥብ", high: "ከፍተኛ", check: "አረጋግጥ" },
            en: { title: "Addition (No Carry)", win: "Great Job!", winsub: "You answered correctly!", level: "Level", score: "Score", high: "High", check: "Check" },
            om: { title: "Ida'uu (Carry kan hin qabne)", win: "Guddina!", winsub: "Sirriitti deebisteetta!", level: "Sadarkaa", score: "Qabxii", high: "Olaanaa", check: "Mirkaneessi" },
            so: { title: "Isku-darka (Sidasho la'aan)", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad uga jawaabtay!", level: "Heerka", score: "Dhibco", high: "Sare", check: "Hubi" }
        };

        let score = 0, level = 1, lang = 'ti', currentQuestion = null, muted = false;
        let activeDigitIdx = 0; // 0 is ones place
        let userDigits = []; 
        let highScore = parseInt(localStorage.getItem('sum_arch_high_score')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateQuestion() {
            const digitCount = level === 1 ? (Math.random() > 0.5 ? 3 : 4) : (level === 2 ? 5 : 6);
            let n1Str = "", n2Str = "", ansStr = "";
            
            for (let i = 0; i < digitCount; i++) {
                // Ensure sum of columns is <= 9 (no carry)
                let d1 = Math.floor(Math.random() * 9);
                if (i === digitCount - 1 && d1 === 0) d1 = 1; // Leading digit can't be 0
                
                let d2 = Math.floor(Math.random() * (9 - d1 + 1));
                
                n1Str = d1 + n1Str;
                n2Str = d2 + n2Str;
                ansStr = (d1 + d2) + ansStr;
            }

            currentQuestion = { n1: parseInt(n1Str), n2: parseInt(n2Str), ans: parseInt(ansStr), digitCount };
            userDigits = new Array(digitCount).fill("?");
            activeDigitIdx = 0; // Start at ones place
            renderLevel();
        }

        function renderLevel() {
            const q = currentQuestion;
            const t = i18n[lang];
            
            document.getElementById('num1').innerText = q.n1.toLocaleString();
            document.getElementById('num2').innerHTML = `<span class="plus-sign">+</span>${q.n2.toLocaleString()}`;
            document.getElementById('pageTitle').innerText = t.title;
            
            const row = document.getElementById('answerRow');
            row.innerHTML = '';
            
            // Render digit boxes from left to right (highest to lowest place value)
            for (let i = q.digitCount - 1; i >= 0; i--) {
                const box = document.createElement('div');
                box.className = 'digit-box';
                if (i === activeDigitIdx) box.classList.add('active');
                box.innerText = userDigits[i];
                box.onclick = () => { sfx('tap'); activeDigitIdx = i; renderLevel(); };
                row.appendChild(box);
            }

            updateStats();
        }

        function press(k) {
            sfx('tap');
            if (k === 'bk') {
                userDigits[activeDigitIdx] = "?";
                // Optionally move back to previous place value
                if (activeDigitIdx > 0 && userDigits[activeDigitIdx] === "?") activeDigitIdx--;
            } else {
                userDigits[activeDigitIdx] = k;
                // Auto advance to next place value (to the left)
                if (activeDigitIdx < currentQuestion.digitCount - 1) activeDigitIdx++;
            }
            renderLevel();
        }

        function checkAnswer() {
            if (userDigits.includes("?")) {
                handleError();
                return;
            }

            const constructed = parseInt(userDigits.slice().reverse().join(''));
            if (constructed === currentQuestion.ans) {
                handleSuccess();
            } else {
                handleError();
            }
        }

        function handleSuccess() {
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('sum_arch_high_score', highScore);
            }
            level = Math.floor(score / 50) + 1;
            sfx('win');
            burst(500);
            
            const overlay = document.getElementById('success-overlay');
            document.getElementById('txtWin').innerText = i18n[lang].win;
            document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
            overlay.style.display = 'flex';

            setTimeout(() => {
                overlay.style.display = 'none';
                generateQuestion();
            }, 2000);
        }

        function handleError() {
            sfx('err');
            const card = document.getElementById('gameCard');
            card.classList.add('shake');
            document.getElementById('error-screen').style.display = 'flex';
            
            // Highlight all digit boxes as wrong
            document.querySelectorAll('.digit-box').forEach(b => b.classList.add('wrong'));

            setTimeout(() => {
                card.classList.remove('shake');
                document.getElementById('error-screen').style.display = 'none';
                document.querySelectorAll('.digit-box').forEach(b => b.classList.remove('wrong'));
                // Optional: Clear or keep digits
            }, 600);
        }

        function updateStats() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('scoreLabel').innerText = t.score;
            document.getElementById('lvlLabel').innerText = t.level;
            document.getElementById('highLabel').innerText = t.high;
            document.getElementById('btnCheck').innerText = t.check;
        }

        function changeLang(l) {
            lang = l;
            renderLevel();
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#ffffff', '#6366f1'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20,
                vx: (Math.random()-0.5)*40, vy: (Math.random()-0.8)*55,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*25
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); 
                        x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,0].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key';
                b.innerText = k;
                b.onclick = () => press(k);
                kp.appendChild(b);
            });
            const del = document.createElement('button');
            del.className = 'key del';
            del.innerText = '⌫';
            del.onclick = () => press('bk');
            kp.appendChild(del);

            generateQuestion();
        };
    </script>
</body>
</html>

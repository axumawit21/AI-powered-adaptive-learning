<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplication Carry Master | ኣለኒ ዘለዎ ምርባሕ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --magma-dark: #0c0401;
            --magma-lava: #ef4444;
            --magma-glow: #f97316;
            --magma-ash: #4b5563;
            --magma-gold: #facc15;
            --success: #10b981;
            --danger: #ef4444;
            --glass-lava: rgba(239, 68, 68, 0.1);
            --guide-cyan: #00f2fe;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--magma-dark);
            background-image: 
                radial-gradient(at 0% 0%, #450a0a 0px, transparent 50%),
                radial-gradient(at 100% 0%, #7c2d12 0px, transparent 50%),
                radial-gradient(at 50% 100%, #1e1b4b 0px, transparent 50%);
            background-size: 200% 200%;
            animation: magmaFlow 15s infinite alternate linear;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #fff;
        }

        @keyframes magmaFlow { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 1200px; padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 15px;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .badges { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        .stat-pill { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(15px);
            padding: 10px 22px; border-radius: 20px; font-weight: 800; font-size: 1rem; color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 8px;
        }
        .stat-label { opacity: 0.6; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { color: var(--magma-glow); text-shadow: 0 0 10px rgba(249, 115, 22, 0.5); }
        .high-score-pill { border-color: var(--magma-gold); }
        .high-score-pill .stat-val { color: var(--magma-gold); }

        .lang-select {
            padding: 10px 20px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.2); font: inherit; font-weight: bold; cursor: pointer;
            background: #1e1b4b; color: white; outline: none; transition: 0.3s;
        }
        .lang-select:hover { border-color: var(--magma-glow); }
        .lang-select option { background: #1e1b4b; color: white; }

        .container {
            flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column; 
            padding: 10px; gap: 20px; z-index: 10; justify-content: center;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px);
            border-radius: 50px; padding: 40px 30px; 
            border: 8px solid transparent;
            background-clip: padding-box;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 20px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card::before {
            content: ''; position: absolute; top: -8px; bottom: -8px; left: -8px; right: -8px;
            background: linear-gradient(45deg, var(--magma-lava), var(--magma-glow), var(--magma-gold));
            z-index: -1; border-radius: 58px; opacity: 0.6;
        }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .game-title {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--magma-glow), var(--magma-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(249, 115, 22, 0.4);
        }

        /* Perfectly Aligned Vertical Math */
        .math-container {
            display: flex; flex-direction: column; align-items: flex-end; 
            width: fit-content; margin: 0 auto; position: relative;
            gap: 10px;
        }

        .row-grid { display: flex; gap: 15px; justify-content: flex-end; position: relative; }
        
        .box-base {
            width: 80px; height: 110px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4.5rem; font-weight: 900; transition: 0.3s;
            font-family: 'Fredoka', serif;
        }

        .digit-text { color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .digit-text.highlighted { color: var(--guide-cyan); text-shadow: 0 0 25px var(--guide-cyan); transform: scale(1.1); }
        
        .mult-sign { position: absolute; left: -75px; bottom: 135px; font-size: 5rem; color: var(--magma-lava); }
        .math-line { width: calc(100% + 95px); height: 8px; background: #fff; border-radius: 4px; margin-right: -40px; box-shadow: 0 0 15px #fff; }

        .carry-box {
            width: 55px; height: 55px; background: rgba(255,255,255,0.05);
            border: 3px dashed rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; color: var(--magma-gold);
            cursor: pointer; transition: 0.3s;
            margin: 0 12px;
        }
        .carry-box.active { 
            background: white; border-style: solid; border-color: var(--magma-gold); 
            color: var(--magma-dark); transform: scale(1.15); box-shadow: 0 0 25px rgba(250, 204, 21, 0.6);
        }

        .digit-box {
            background: rgba(255,255,255,0.05);
            border: 4px dashed rgba(255,255,255,0.2);
            color: var(--magma-glow);
            cursor: pointer;
        }
        .digit-box.active { 
            background: white; border-style: solid; border-color: var(--magma-lava); 
            color: var(--magma-dark); transform: scale(1.08); box-shadow: 0 0 40px rgba(239, 68, 68, 0.6);
        }
        .digit-box.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.3); animation: shake 0.4s; }

        /* Keypad */
        .keypad-section {
            width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; align-items: center;
        }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; }

        .key {
            height: 75px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 22px;
            font-size: 2.2rem; font-weight: 800; color: #fff; cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.5); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .key:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.5); }
        .key.del { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-color: rgba(239, 68, 68, 0.2); }
        
        .key.check { 
            width: 100%; background: linear-gradient(135deg, var(--success), #059669); color: white; 
            box-shadow: 0 10px 0 #064e3b; font-size: 2.5rem; height: 95px; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 4px; border-radius: 30px; font-weight: 900;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.3);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 15rem; color: white; opacity: 0.5; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(16, 185, 129, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: white; text-align: center;
            backdrop-filter: blur(15px); padding: 20px;
        }
        #success-overlay h2 { font-size: 4.5rem; margin-top: 20px; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 768px) {
            .box-base { width: 60px; height: 80px; font-size: 3rem; }
            .carry-box { width: 40px; height: 40px; font-size: 1.4rem; margin: 0 8px; }
            .row-grid { gap: 10px; }
            .mult-sign { left: -55px; bottom: 100px; font-size: 3.5rem; }
            .math-line { width: calc(100% + 75px); }
            .key { height: 65px; font-size: 1.6rem; }
            .key.check { height: 80px; font-size: 1.8rem; }
            .game-card { padding: 30px 15px; }
            .game-title { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            .box-base { width: 45px; height: 65px; font-size: 2.2rem; border-radius: 10px; border-width: 3px; }
            .carry-box { width: 32px; height: 32px; font-size: 1.1rem; margin: 0 5px; }
            .row-grid { gap: 8px; }
            .mult-sign { left: -45px; bottom: 80px; font-size: 2.8rem; }
            .math-line { width: calc(100% + 60px); margin-right: -30px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-left">
            <button class="lang-select" id="muteBtn" onclick="toggleMute()">🔊</button>
            <div class="badges">
                <div class="stat-pill high-score-pill">
                    <span id="highLabel" class="stat-label">ዝለዓለ</span>
                    <span id="highScoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                    <span id="scoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="lvlLabel" class="stat-label">ደረጃ</span>
                    <span id="levelVal" class="stat-val">1</span>
                </div>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="game-title" id="pageTitle">ኣለኒ ዘለዎ ምርባሕ</h1>
            
            <div class="math-container" id="mathContainer">
                <div class="row-grid" id="carryRow"></div>
                <div class="row-grid" id="num1Row"></div>
                <div class="row-grid" id="num2Row">
                    <span class="mult-sign">×</span>
                </div>
                <div class="math-line"></div>
                <div class="row-grid" id="answerRow"></div>
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad" id="keypad"></div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">Check (ኣረጋግፅ)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 8rem; animation: rotate 2s linear infinite;">🌋</div>
        <h2 id="txtWin">Excellent!</h2>
        <p style="font-size: 1.5rem;" id="txtWinSub">You mastered the carries!</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "ኣለኒ ዘለዎ ምርባሕ", win: "ፅቡቅ ስራሕ!", winsub: "ብትኽክል ተመሊሱ!", level: "ደረጃ", score: "ነጥቢ", high: "ዝለዓለ", check: "ኣረጋግፅ" },
            am: { title: "ኣለኝ ያለበት ማባዛት", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", level: "ደረጃ", score: "ነጥብ", high: "ከፍተኛ", check: "አረጋግጥ" },
            en: { title: "Multiplication (With Carry)", win: "Great Job!", winsub: "You mastered the carries!", level: "Level", score: "Score", high: "High", check: "Check" },
            om: { title: "Baayʼisuu (Carry kan qabu)", win: "Guddina!", winsub: "Sirriitti deebisteetta!", level: "Sadarkaa", score: "Qabxii", high: "Olaanaa", check: "Mirkaneessi" },
            so: { title: "Isku-dhufasho (Sidasho leh)", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad uga jawaabtay!", level: "Heerka", score: "Dhibco", high: "Sare", check: "Hubi" }
        };

        let score = 0, level = 1, lang = 'ti', currentQuestion = null, muted = false;
        let activeIdx = { type: 'ans', idx: 0 }; 
        let userDigits = []; 
        let userCarries = [];
        let highScore = parseInt(localStorage.getItem('multi_carry_high')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateQuestion() {
            let digitCount = level === 1 ? 3 : (level === 2 ? 4 : (level === 3 ? 5 : 6));
            let n1Arr = [];
            let multiplier = Math.floor(Math.random() * 8) + 2; // Single digit 2-9

            let hasCarry = false;
            while(!hasCarry) {
                n1Arr = [];
                let currentCarry = 0;
                for (let i = 0; i < digitCount; i++) {
                    let d = Math.floor(Math.random() * 10);
                    if (i === digitCount - 1) d = Math.max(1, d);
                    
                    if ((d * multiplier) + currentCarry >= 10) hasCarry = true;
                    currentCarry = Math.floor(((d * multiplier) + currentCarry) / 10);
                    n1Arr.push(d);
                }
            }

            const n1 = parseInt(n1Arr.slice().reverse().join(''));
            const ans = n1 * multiplier;
            const ansDigitCount = ans.toString().length;

            currentQuestion = { n1, multiplier, ans, n1Arr, ansDigitCount };
            userDigits = new Array(ansDigitCount).fill("?");
            userCarries = new Array(ansDigitCount).fill(""); 
            activeIdx = { type: 'ans', idx: 0 }; 
            renderLevel();
        }

        function renderLevel() {
            const q = currentQuestion;
            const t = i18n[lang];
            document.getElementById('pageTitle').innerText = t.title;
            
            const rows = {
                carry: document.getElementById('carryRow'),
                num1: document.getElementById('num1Row'),
                num2: document.getElementById('num2Row'),
                ans: document.getElementById('answerRow')
            };

            Object.values(rows).forEach(r => {
                const sign = r.querySelector('.mult-sign');
                r.innerHTML = '';
                if(sign) r.appendChild(sign);
            });

            for (let i = q.ansDigitCount - 1; i >= 0; i--) {
                // Carry Box (above)
                const cBox = document.createElement('div');
                cBox.className = 'carry-box';
                if (i === 0) cBox.style.visibility = 'hidden'; // No carry above ones
                else {
                    cBox.innerText = userCarries[i];
                    if (activeIdx.type === 'carry' && activeIdx.idx === i) cBox.classList.add('active');
                    cBox.onclick = () => { sfx('tap'); activeIdx = { type: 'carry', idx: i }; renderLevel(); };
                }
                rows.carry.appendChild(cBox);

                // Num1 digits
                const n1Digit = q.n1Arr[i] ?? "";
                const n1Box = document.createElement('div');
                n1Box.className = 'box-base digit-text';
                n1Box.innerText = n1Digit;
                if (activeIdx.idx === i) n1Box.classList.add('highlighted');
                rows.num1.appendChild(n1Box);

                // Multiplier (bottom row)
                const multStr = q.multiplier.toString();
                const multDigit = multStr.split('').reverse()[i] ?? "";
                const multBox = document.createElement('div');
                multBox.className = 'box-base digit-text';
                multBox.innerText = multDigit;
                if (i === 0) multBox.classList.add('highlighted'); // Multiplier is always fixed at ones place
                rows.num2.appendChild(multBox);

                // Result Input
                const aBox = document.createElement('div');
                aBox.className = 'box-base digit-box';
                aBox.innerText = userDigits[i];
                if (activeIdx.type === 'ans' && activeIdx.idx === i) aBox.classList.add('active');
                aBox.onclick = () => { sfx('tap'); activeIdx = { type: 'ans', idx: i }; renderLevel(); };
                rows.ans.appendChild(aBox);
            }

            updateStats();
        }

        function press(k) {
            sfx('tap');
            const { type, idx } = activeIdx;
            if (k === 'bk') {
                if (type === 'ans') userDigits[idx] = "?";
                else userCarries[idx] = "";
            } else {
                if (type === 'ans') {
                    userDigits[idx] = k;
                    // Auto advance logic: if we typed ans, move to carry for next column (if exists)
                    if (idx < currentQuestion.ansDigitCount - 1) {
                        activeIdx = { type: 'carry', idx: idx + 1 };
                    }
                } else {
                    userCarries[idx] = k;
                    // Move focus back to the answer slot for this column
                    activeIdx = { type: 'ans', idx: idx };
                }
            }
            renderLevel();
        }

        function checkAnswer() {
            if (userDigits.includes("?")) { handleError(); return; }
            const constructed = parseInt(userDigits.slice().reverse().join(''));
            if (constructed === currentQuestion.ans) handleSuccess();
            else handleError();
        }

        function handleSuccess() {
            score += 10;
            if (score > highScore) { highScore = score; localStorage.setItem('multi_carry_high', highScore); }
            level = Math.floor(score / 50) + 1;
            sfx('win'); burst(700);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; generateQuestion(); }, 2000);
        }

        function handleError() {
            sfx('err');
            document.getElementById('gameCard').classList.add('shake');
            document.getElementById('error-screen').style.display = 'flex';
            document.querySelectorAll('.digit-box').forEach(b => b.classList.add('wrong'));
            setTimeout(() => {
                document.getElementById('gameCard').classList.remove('shake');
                document.getElementById('error-screen').style.display = 'none';
                document.querySelectorAll('.digit-box').forEach(b => b.classList.remove('wrong'));
            }, 600);
        }

        function updateStats() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('scoreLabel').innerText = t.score;
            document.getElementById('lvlLabel').innerText = t.level;
            document.getElementById('highLabel').innerText = t.high;
            document.getElementById('btnCheck').innerText = t.check;
        }

        function changeLang(l) { lang = l; renderLevel(); }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#ef4444', '#f97316', '#facc15', '#ffffff', '#10b981'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20, vx: (Math.random()-0.5)*40, vy: (Math.random()-0.8)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*15
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,0].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; b.innerText = k; b.onclick = () => press(k); kp.appendChild(b);
            });
            const del = document.createElement('button');
            del.className = 'key del'; del.innerText = '⌫'; del.onclick = () => press('bk'); kp.appendChild(del);
            generateQuestion();
        };
    </script>
</body>
</html>

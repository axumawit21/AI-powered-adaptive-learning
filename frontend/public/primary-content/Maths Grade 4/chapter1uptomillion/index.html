<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Millionaire Quest | ጉዕዞ ሚልዮናት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --secondary: #10b981;
            --danger: #ef4444;
            --sky: #0ea5e9;
            --royal: #4f46e5;
            --glass: rgba(255, 255, 255, 0.95);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: #1e1b4b;
            background-image: 
                radial-gradient(at 0% 0%, #312e81 0px, transparent 50%),
                radial-gradient(at 100% 0%, #4c1d95 0px, transparent 50%),
                radial-gradient(at 50% 100%, #1e1b4b 0px, transparent 50%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #fff;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 1200px; padding: 25px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: nowrap; gap: 40px;
        }

        .header-left { display: flex; align-items: center; gap: 30px; }
        .badges { display: flex; gap: 20px; align-items: center; }
        
        .stat-pill { 
            background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
            padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 1.1rem; color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .stat-label { opacity: 0.6; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { color: #fbbf24; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }

        .btn-icon {
            background: white; border: none; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: #1e1b4b; font-size: 1.3rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn-icon:active { transform: scale(0.9); }
        .btn-reset { background: #fef3c7; color: #b45309; }

        .lang-select {
            padding: 12px 24px; border-radius: 20px; border: none; font: inherit; font-weight: bold; cursor: pointer;
            background: white; color: #1e1b4b; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .container {
            flex: 1; width: 100%; max-width: 1000px; display: flex; flex-direction: column; 
            padding: 20px; gap: 30px; z-index: 10; justify-content: center;
        }

        .game-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 45px; padding: 50px; 
            border: 8px solid #f59e0b;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 35px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #1e293b;
            position: relative;
            overflow: hidden;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .quest-visual { font-size: 6rem; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .story-box {
            background: #fffbeb; border-radius: 25px; padding: 25px; border-left: 12px solid var(--primary);
            text-align: left; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .story-text { font-size: 1.8rem; font-weight: 700; color: #92400e; line-height: 1.5; }

        .problem-area { display: flex; flex-direction: column; align-items: center; gap: 25px; width: 100%; }

        .ans-box {
            width: 100%; max-width: 500px; height: 110px; background: white; border: 6px dashed #cbd5e1;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; color: var(--royal); cursor: pointer; transition: 0.3s;
        }
        .ans-box.active { border-style: solid; border-color: var(--royal); background: #f5f3ff; box-shadow: 0 0 40px rgba(79, 70, 229, 0.3); }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 600px; }
        .key {
            height: 75px; background: white; border: none; border-radius: 20px;
            font-size: 2.2rem; font-weight: 800; color: #475569; cursor: pointer;
            box-shadow: 0 6px 0 #e2e8f0; transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 4px 0 #e2e8f0; }
        .key.del { background: #fff1f2; color: #ef4444; box-shadow: 0 6px 0 #fecdd3; }
        .key.check { 
            grid-column: span 4; background: linear-gradient(135deg, var(--secondary), #059669); 
            color: white; box-shadow: 0 10px 0 #064e3b; font-size: 2.4rem; text-transform: uppercase;
            height: 100px; margin-top: 15px; width: 100%; font-weight: 900;
        }

        .choices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; }
        .choice-btn {
            background: white; border: 5px solid #f1f5f9; border-radius: 25px; padding: 25px;
            font-size: 1.8rem; font-weight: 800; color: #334155; cursor: pointer;
            box-shadow: 0 8px 0 #e2e8f0; transition: all 0.1s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .choice-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #e2e8f0; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.4);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 20rem; color: white; opacity: 0.8; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(16, 185, 129, 0.96);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: white; text-align: center;
            backdrop-filter: blur(15px);
        }
        #success-overlay h2 { font-size: 5rem; margin-top: 20px; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 850px) {
            header { padding: 15px; flex-direction: row; flex-wrap: wrap; justify-content: space-between; gap: 15px; }
            .badges { gap: 10px; }
            .stat-pill { padding: 8px 12px; font-size: 0.9rem; }
            .lang-select { padding: 8px 15px; font-size: 0.9rem; }
            .story-text { font-size: 1.4rem; }
            .ans-box { height: 80px; font-size: 2.2rem; }
            .key { height: 60px; font-size: 1.6rem; }
            .choice-btn { font-size: 1.3rem; padding: 15px; }
            .game-card { padding: 30px 20px; border-radius: 35px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-left">
            <button class="btn-icon" id="muteBtn" onclick="toggleMute()" title="Sound Toggle">🔊</button>
            <button class="btn-icon btn-reset" onclick="resetGame()" title="Reset Game">🔄</button>
            <div class="badges">
                <div class="stat-pill">
                    <span id="lvlLabel" class="stat-label">ደረጃ</span>
                    <span id="levelVal" class="stat-val">1</span>
                </div>
                <div class="stat-pill">
                    <span id="highLabel" class="stat-label">ዝለዓለ</span>
                    <span id="highScoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                    <span id="scoreVal" class="stat-val">0</span>
                </div>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <div class="quest-visual" id="questVisual">💰</div>
            <div class="story-box">
                <p class="story-text" id="storyText">...</p>
            </div>

            <div class="problem-area" id="problemArea">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 10rem; animation: bounce 1s infinite alternate;">💎</div>
        <h2 id="txtWin">ንኡድ ስራሕ!</h2>
        <p style="font-size: 2.2rem;" id="txtWinSub">ብትኽክል መሊስካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { check: "ኣረጋግፅ", win: "ብጣዕሚ ጎበዝ!", winsub: "ብትኽክል ተመሊሱ!", level: "ደረጃ", highest: "ዝለዓለ", score: "ነጥቢ", 
                  qDigit: "ኣብዚ ቁፅሪ {n}፡ ኣሃዝ ዓዲ {p} ኣየናይ እዩ?", 
                  qValue: "ኣብዚ ቁፅሪ {n}፡ ኣሃዝ {d} ዝውክል ዋጋ ክንደይ እዩ?", 
                  qWrite: "ብአሃዝ ፅሓፍ፡ {w}", 
                  qComp: "ኣየናይ ይዓቢ?", 
                  places: ["ሓደ", "ዓሰርተ", "ሚኢቲ", "ሽሕ", "ዓሰርተ ሽሕ", "ሚኢቲ ሽሕ", "ሚልዮን"],
                  words: [
                      "ሸውዓተ ሽሕን ሸሞንተ ሚኢትን ሰላሳን ሓሙሽተን",
                      "ዓሰርተ ሸሞንተ ሽሕን ኣርባዕተ ሚኢትን ክልተን",
                      "ኣርባዓን ሓሙሽተን ሽሕን ሰለስተ ሚኢትን ሰብዓን ሓደን",
                      "ቴስዓን ሽደሽተን ሽሕን ሸሞንተ ሚኢትን ኣርባዓን ኣርባዕተን",
                      "ሓደ ሚኢትን ሰለስተን ሽሕን ሰለስተ ሚኢትን ሰብዓን",
                      "ሽደሽተ ሚኢትን ሓምሳን ሸሞንተን ሽሕን ሰለስተ ሚኢትን ዓሰርተ ክልተን",
                      "ትሽዓተ ሚኢትን ቴስዓን ትሽዓተን ሽሕን ትሽዓተ ሚኢትን ቴስዓን ትሽዓተን"
                  ] },
            am: { check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", level: "ደረጃ", highest: "ከፍተኛ", score: "ነጥብ",
                  qDigit: "በዚህ ቁጥር {n} ውስጥ የ{p} ቤት አሃዝ የትኛው ነው?", 
                  qValue: "በዚህ ቁጥር {n} ውስጥ አሃዝ {d} የሚወክለው ዋጋ ስንት ነው?", 
                  qWrite: "በቁጥር ጻፍ፡ {w}", 
                  qComp: "የትኛው ይበልጣል?",
                  places: ["አንድ", "አስር", "መቶ", "አንድ ሺ", "አስር ሺ", "መቶ ሺ", "አንድ ሚሊዮን"],
                  words: [
                      "ሰባት ሺህ ስምንት መቶ ሰላሳ አምስት",
                      "አስራ ስምንት ሺህ አራት መቶ ሁለት",
                      "አርባ አምስት ሺህ ሶስት መቶ ሰባ አንድ",
                      "ዘጠና ስድስት ሺህ ስምንት መቶ አርባ አራት",
                      "አንድ መቶ ሶስት ሺህ ሶስት መቶ ሰባ",
                      "ስድስት መቶ አምሳ ስምንት ሺህ ሶስት መቶ አስራ ሁለት",
                      "ዘጠኝ መቶ ዘጠና ዘጠኝ ሺህ ዘጠኝ መቶ ዘጠና ዘጠኝ"
                  ] },
            en: { check: "Check", win: "Great Job!", winsub: "You answered correctly!", level: "Level", highest: "Highest", score: "Score",
                  qDigit: "In the number {n}, which digit is in the {p} place?", 
                  qValue: "In the number {n}, what is the value of the digit {d}?", 
                  qWrite: "Write in digits: {w}", 
                  qComp: "Which is greater?",
                  places: ["ones", "tens", "hundreds", "thousands", "ten-thousands", "hundred-thousands", "millions"],
                  words: [
                      "Seven thousand eight hundred thirty-five",
                      "Eighteen thousand four hundred two",
                      "Forty-five thousand three hundred seventy-one",
                      "Ninety-six thousand eight hundred forty-four",
                      "One hundred three thousand three hundred seventy",
                      "Six hundred fifty-eight thousand three hundred twelve",
                      "Nine hundred ninety-nine thousand nine hundred ninety-nine"
                  ] },
            om: { check: "Mirkaneessi", win: "Guddina!", winsub: "Sirriitti deebisteetta!", level: "Sadarkaa", highest: "Olaanaa", score: "Qabxii",
                  qDigit: "Lakkoofsa {n} keessatti, lakkoofsi iddoo {p} jiru isa kami?", 
                  qValue: "Lakkoofsa {n} keessatti lakkoofsi {d} gatiin isaa meeqa?", 
                  qWrite: "Lakkoofsaan barreessi: {w}", 
                  qComp: "Isa kamtu caala?",
                  places: ["tokko", "kudhan", "dhibba", "kuma", "kudhan-kuma", "dhibba-kuma", "miliyoona"],
                  words: [
                      "Kuma torba dhibba saddeet soddomii shan",
                      "Kuma kudha saddeet dhibba afurii lama",
                      "Kuma afurtamii shan dhibba sadii torbaatamii tokko",
                      "Kuma sagaltamii jaha dhibba saddeet afurtamii afur",
                      "Kuma dhibba tokkoo fi sadii dhibba sadii torbaatama",
                      "Kuma dhibba jahaffaa fi shantamii saddeet dhibba sadii kudha lama",
                      "Kuma dhibba sagal sagaltamii sagal dhibba sagal sagaltamii sagal"
                  ] },
            so: { check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad uga jawaabtay!", level: "Heerka", highest: "Sare", score: "Dhibco",
                  qDigit: "Lambarka {n}, kee baa ku jira booska {p}?", 
                  qValue: "Lambarka {n} dhexdiisa, waa maxay qiimaha lambarka {d}?", 
                  qWrite: "Ku qor lambar: {w}", 
                  qComp: "Kee baa weyn?",
                  places: ["kowad", "toban", "boqol", "kun", "toban-kun", "boqol-kun", "milyan"],
                  words: [
                      "Todoba kun siddeed boqol soddon iyo shan",
                      "Siddeed iyo toban kun afar boqol iyo labo",
                      "Afartan iyo shan kun saddex boqol toddobaatan iyo kow",
                      "Sagaashan iyo lix kun siddeed boqol afartan iyo afar",
                      "Boqol iyo saddex kun saddex boqol toddobaatan",
                      "Lix boqol konton iyo siddeed kun saddex boqol labo iyo toban",
                      "Sagaal boqol sagaashan iyo sagaal kun sagaal boqol sagaashan iyo sagaal"
                  ] }
        };

        let score = 0, level = 1, lang = 'ti', userVal = "", currentQuestion = null, muted = false;
        let highScore = parseInt(localStorage.getItem('revision_millions_high')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function resetGame() {
            sfx('tap');
            score = 0; level = 1;
            updateStats();
            generateQuestion();
        }

        function generateQuestion() {
            const type = Math.floor(Math.random() * 4); 
            // Range up to 1,000,000 based on level
            const max = level === 1 ? 100000 : (level === 2 ? 500000 : 1000000);
            const num = Math.floor(Math.random() * (max - 1000)) + 1000;
            const sNum = num.toString();
            const len = sNum.length;

            if (type === 0) {
                // Place value identification
                const pIdx = Math.floor(Math.random() * len);
                currentQuestion = { type, num, pIdx, ans: sNum[len - 1 - pIdx], mode: 'input' };
            } else if (type === 1) {
                // Value identification (e.g. value of 5 in 500)
                // Ensure only unique digits are chosen to avoid multiple correct answers
                let pIdx, digit;
                let attempts = 0;
                do {
                    pIdx = Math.floor(Math.random() * len);
                    digit = sNum[len - 1 - pIdx];
                    attempts++;
                } while (sNum.split(digit).length - 1 > 1 && attempts < 10);

                // If still not unique after 10 tries, restart generation to get a better number
                if (sNum.split(digit).length - 1 > 1) return generateQuestion();

                const value = parseInt(digit) * Math.pow(10, pIdx);
                currentQuestion = { type, num, digit, ans: value.toString(), mode: 'choice' };
            } else if (type === 2) {
                // Writing from words
                const pairIdx = Math.floor(Math.random() * i18n[lang].words.length);
                currentQuestion = { type, pairIdx, mode: 'input' };
            } else {
                // Comparison
                const num2 = Math.floor(Math.random() * (max - 1000)) + 1000;
                currentQuestion = { type, num1: num, num2: num2, mode: 'choice' };
            }
            userVal = "";
            renderProblem();
        }

        function getQuestionText() {
            const t = i18n[lang];
            const q = currentQuestion;
            if (q.type === 0) return t.qDigit.replace('{n}', q.num.toLocaleString()).replace('{p}', t.places[q.pIdx]);
            if (q.type === 1) return t.qValue.replace('{n}', q.num.toLocaleString()).replace('{d}', q.digit);
            if (q.type === 2) return t.qWrite.replace('{w}', t.words[q.pairIdx]);
            if (q.type === 3) return t.qComp;
            return "...";
        }

        function renderProblem() {
            const area = document.getElementById('problemArea');
            document.getElementById('storyText').innerText = getQuestionText();
            area.innerHTML = '';

            if (currentQuestion.mode === 'input') {
                area.innerHTML = `
                    <div class="ans-box active" id="ansBox">?</div>
                    <div class="keypad" id="keypad"></div>
                    <button class="key check" onclick="check()">${i18n[lang].check}</button>
                `;
                const kp = document.getElementById('keypad');
                [1,2,3,'bk',4,5,6,0,7,8,9,'00'].forEach(k => {
                    const b = document.createElement('button');
                    b.className = 'key' + (k==='bk'?' del':'');
                    b.innerText = k === 'bk' ? '⌫' : (k === '00' ? '000' : k);
                    b.onclick = () => press(k);
                    kp.appendChild(b);
                });
            } else {
                const grid = document.createElement('div');
                grid.className = 'choices-grid';
                let options = [];
                
                if (currentQuestion.type === 1) {
                    const ans = parseInt(currentQuestion.ans);
                    options = [ans, ans * 10, ans / 10, Math.floor(ans * 1.5)].filter(v => v > 0);
                    // Ensure 4 choices
                    while(options.length < 4) options.push(options[0] + 5000);
                    options = [...new Set(options)].map(v => v.toLocaleString());
                    currentQuestion.finalAns = ans.toLocaleString();
                } else {
                    options = [currentQuestion.num1.toLocaleString(), currentQuestion.num2.toLocaleString()];
                    currentQuestion.finalAns = Math.max(currentQuestion.num1, currentQuestion.num2).toLocaleString();
                }

                const shuffled = [...options].sort(() => Math.random() - 0.5);
                shuffled.forEach(opt => {
                    const b = document.createElement('button');
                    b.className = 'choice-btn';
                    b.innerText = opt;
                    b.onclick = () => { userVal = opt; check(); };
                    grid.appendChild(b);
                });
                area.appendChild(grid);
            }
            updateStats();
        }

        function press(k) {
            sfx('tap');
            if (k === 'bk') userVal = userVal.slice(0, -1);
            else if (k === '00') userVal += "000";
            else if (userVal.length < 10) userVal += k;
            const box = document.getElementById('ansBox');
            if(box) box.innerText = userVal || "?";
        }

        function check() {
            let correctAns = "";
            const q = currentQuestion;
            if (q.type === 0) correctAns = q.ans;
            else if (q.type === 1) correctAns = q.finalAns;
            else if (q.type === 2) {
                const wordAnswers = ["7835", "18402", "45371", "96844", "103370", "658312", "999999"];
                correctAns = wordAnswers[q.pairIdx];
            }
            else correctAns = q.finalAns;

            // Remove commas from user input for numeric comparison if needed
            let cleanUserVal = userVal.replace(/,/g, "");
            let cleanCorrectAns = correctAns.replace(/,/g, "");

            if (userVal === "") return;
            if (cleanUserVal === cleanCorrectAns) {
                score += 10;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('revision_millions_high', highScore);
                }
                level = Math.floor(score / 50) + 1;
                sfx('win');
                burst(500);
                
                const overlay = document.getElementById('success-overlay');
                document.getElementById('txtWin').innerText = i18n[lang].win;
                document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
                overlay.style.display = 'flex';

                setTimeout(() => {
                    overlay.style.display = 'none';
                    generateQuestion();
                }, 2000);
            } else {
                sfx('err');
                const card = document.getElementById('gameCard');
                const errScreen = document.getElementById('error-screen');
                card.classList.add('shake');
                errScreen.style.display = 'flex';
                
                setTimeout(() => {
                    card.classList.remove('shake');
                    errScreen.style.display = 'none';
                    userVal = "";
                    const box = document.getElementById('ansBox');
                    if (box) box.innerText = "?";
                }, 800);
            }
            updateStats();
        }

        function updateStats() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('lvlLabel').innerText = t.level;
            document.getElementById('highLabel').innerText = t.highest;
            document.getElementById('scoreLabel').innerText = t.score;
        }

        function changeLang(l) {
            lang = l;
            renderProblem();
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#f59e0b', '#10b981', '#4f46e5', '#ef4444', '#0ea5e9', '#ffffff'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20,
                vx: (Math.random()-0.5)*50, vy: (Math.random()-0.9)*65,
                s: Math.random()*14+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 2.2, r: Math.random()*360, rv: (Math.random()-0.5)*35
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.95; p.vx *= 0.99; p.l-=0.015; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); 
                        x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = generateQuestion;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraction Lab | ተመጣጠንቲ ጉዚታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #0ea5e9;
            --success: #10b981;
            --danger: #ef4444;
            --amber: #f59e0b;
            --pink: #ec4899;
            --glass: rgba(255, 255, 255, 0.95);
            --bg-deep: #f5f3ff;
            --card-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-deep);
            /* Colorful mesh background */
            background-image: 
                radial-gradient(at 0% 0%, #ddd6fe 0px, transparent 50%),
                radial-gradient(at 100% 0%, #bae6fd 0px, transparent 50%),
                radial-gradient(at 100% 100%, #fde68a 0px, transparent 50%),
                radial-gradient(at 0% 100%, #fbcfe8 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #1e293b;
            transition: background-color 0.2s;
        }

        /* Noticeable Error Feedback */
        body.error-active { background-color: #fee2e2 !important; background-image: none !important; }
        #wrong-overlay {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2);
            display: none; align-items: center; justify-content: center;
            z-index: 5500; pointer-events: none;
        }
        #wrong-overlay span { font-size: clamp(10rem, 40vw, 25rem); color: #fff; text-shadow: 0 0 70px rgba(0,0,0,0.5); font-weight: 900; animation: popX 0.4s forwards; }
        @keyframes popX { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1.1); opacity: 1; } }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; }

        header {
            width: 100%; max-width: 1200px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100;
        }

        .stats-bar {
            display: flex; gap: 15px; width: 100%; justify-content: center; flex-wrap: wrap;
        }

        .pill {
            background: white; border: 3px solid #ddd6fe; padding: 12px 24px; border-radius: 50px;
            font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .pill-score { border-color: var(--secondary); color: var(--secondary); }
        .pill-lvl { border-color: var(--primary); color: var(--primary); }
        .pill-high { border-color: var(--amber); color: var(--amber); }

        .header-controls {
            display: flex; gap: 12px; align-items: center; margin-top: 10px;
        }

        .btn-round {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: white; color: #1e293b; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.1); transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-round:active { transform: scale(0.9); }

        .lang-select {
            padding: 12px 22px; border-radius: 20px; border: 3px solid var(--primary);
            background: white; color: #1e293b; font: inherit; font-weight: 700;
            cursor: pointer; outline: none; box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .container {
            flex: 1; width: 100%; max-width: 1300px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px;
            z-index: 10;
        }

        .game-card {
            background: white; border-radius: 50px; width: 100%; padding: 50px 40px;
            box-shadow: var(--card-shadow); border: 10px solid white; text-align: center;
            position: relative; animation: slideUp 0.6s ease-out;
            max-width: 850px;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .quest-text { font-size: 2.2rem; font-weight: 800; color: #4338ca; margin-bottom: 35px; }

        /* Fraction Visuals */
        .visual-lab {
            display: flex; align-items: center; justify-content: center; gap: 60px;
            margin-bottom: 40px;
        }

        .circle-container {
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }

        .fraction-circle {
            width: 200px; height: 200px; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.12));
            transition: transform 0.3s;
        }

        .math-display {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            font-size: 4.5rem; font-weight: 900;
        }

        .fraction-box { display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .frac-line { width: 90px; height: 10px; background: #1e293b; border-radius: 5px; margin: 10px 0; }
        
        .ans-slot {
            width: 120px; height: 120px; background: #f5f3ff; border: 6px dashed #c084fc;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            color: var(--primary); transition: 0.3s; cursor: pointer;
        }
        .ans-slot.active { border-style: solid; border-color: var(--primary); background: #fdfaff; transform: scale(1.08); box-shadow: 0 0 40px rgba(139, 92, 246, 0.3); }

        /* Keypad */
        .keypad {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 500px;
        }
        .key {
            height: 85px; background: white; border: 3px solid #f1f5f9; border-radius: 24px;
            font-size: 2.5rem; font-weight: 800; color: #1e293b; cursor: pointer;
            box-shadow: 0 10px 0 #f1f5f9; transition: all 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(5px); box-shadow: 0 3px 0 #f1f5f9; }
        .key.del { color: var(--danger); background: #fff1f2; border-color: #fecaca; box-shadow: 0 10px 0 #fecaca; }
        .key.check { 
            grid-column: span 4; background: linear-gradient(to bottom, var(--success), #059669); color: white; border: none;
            box-shadow: 0 12px 0 #065f46; font-size: 2.5rem; height: 100px; margin-top: 15px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .key.check:active { transform: translateY(8px); box-shadow: 0 4px 0 #065f46; }

        .shake { animation: shakeAnim 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-7px, 0, 0); }
            40%, 60% { transform: translate3d(7px, 0, 0); }
        }

        /* Success Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 6000; backdrop-filter: blur(15px); text-align: center;
        }
        .overlay-icon { font-size: 12rem; margin-bottom: 30px; animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounceIn { from { transform: scale(0); } to { transform: scale(1); } }

        /* Desktop Layout (Parallel) */
        @media (min-width: 1024px) {
            .container {
                flex-direction: row;
                align-items: center;
                gap: 70px;
                padding-top: 50px;
            }
            .game-card {
                flex: 1.4;
                max-width: none;
                padding: 70px 50px;
                border-radius: 60px;
            }
            .keypad {
                flex: 0.6;
                max-width: 550px;
            }
            .math-display { font-size: 5.5rem; }
            .ans-slot { width: 140px; height: 140px; font-size: 5rem; }
            .quest-text { font-size: 2.8rem; }
            .fraction-circle { width: 240px; height: 240px; }
        }

        @media (max-width: 600px) {
            .visual-lab { gap: 20px; }
            .math-display { font-size: 2.5rem; }
            .ans-slot { width: 85px; height: 85px; font-size: 2.8rem; }
            .fraction-circle { width: 150px; height: 150px; }
            .key { height: 65px; font-size: 1.8rem; }
            .pill { padding: 8px 16px; font-size: 0.95rem; }
            .quest-text { font-size: 1.3rem; }
            .container { gap: 25px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="wrong-overlay"><span>❌</span></div>

    <header>
        <div class="stats-bar">
            <div class="pill pill-lvl">🆙 <span id="lblLvl">ደረጃ</span>: <span id="valLvl">1</span></div>
            <div class="pill pill-high">👑 <span id="lblHigh">ዝለዓለ</span>: <span id="valHigh">0</span></div>
            <div class="pill pill-score">⭐ <span id="lblScore">ነጥቢ</span>: <span id="valScore">0</span></div>
        </div>
        <div class="header-controls">
            <button class="btn-round" id="btnMute" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti" selected>ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <div class="quest-text" id="txtQuest">ነዞም ተመጣጠንቲ ጉዚታት ምልኣዮም!</div>
            
            <div class="visual-lab">
                <div class="circle-container">
                    <div id="svgA" class="fraction-circle"></div>
                </div>
                <div class="circle-container">
                    <div id="svgB" class="fraction-circle"></div>
                </div>
            </div>

            <div class="math-display">
                <div class="fraction-box">
                    <span id="n1">1</span>
                    <div class="frac-line"></div>
                    <span id="d1">2</span>
                </div>
                <span style="color: var(--primary); transform: scale(1.2);">=</span>
                <div class="fraction-box">
                    <div class="ans-slot active" id="ansSlot">?</div>
                    <div class="frac-line"></div>
                    <span id="d2">4</span>
                </div>
            </div>
        </div>

        <div class="keypad">
            <button class="key" onclick="press(1)">1</button>
            <button class="key" onclick="press(2)">2</button>
            <button class="key" onclick="press(3)">3</button>
            <button class="key del" onclick="press('bk')">⌫</button>
            <button class="key" onclick="press(4)">4</button>
            <button class="key" onclick="press(5)">5</button>
            <button class="key" onclick="press(6)">6</button>
            <button class="key" onclick="press(0)">0</button>
            <button class="key" onclick="press(7)">7</button>
            <button class="key" onclick="press(8)">8</button>
            <button class="key" onclick="press(9)">9</button>
            <button class="key check" id="btnCheck" onclick="check()">CHECK (ፈትሽ)</button>
        </div>
    </div>

    <div id="overlay">
        <div class="overlay-icon" id="ovlIcon">🧪</div>
        <h2 id="ovlTitle" style="font-size: 5rem; color: var(--success); text-shadow: 0 4px 10px rgba(0,0,0,0.1);">ንፉዕ!</h2>
        <p id="ovlSub" style="font-size: 2.5rem; color: #64748b; margin-top: 15px;">ብትኽክል ተመሊሱ!</p>
    </div>

    <script>
        const i18n = {
            ti: { quest: "ነዞም ተመጣጠንቲ ጉዚታት ምልኣዮም!", check: "ኣረጋግፅ", win: "ንፉዕ!", winsub: "ብትኽክል ተመሊሱ!", score: "ነጥቢ", high: "ዝለዓለ", level: "ደረጃ" },
            am: { quest: "እነዚህን ተመጣጣኝ ክፍልፋዮች ሙላ!", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", score: "ነጥብ", high: "ከፍተኛ", level: "ደረጃ" },
            en: { quest: "Fill in the equivalent fractions!", check: "Check", win: "Great Job!", winsub: "You answered correctly!", score: "Score", high: "Highest", level: "Level" },
            om: { quest: "Firaakshinii wal-qixa ta'an guuti!", check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriitti deebisteetta!", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa" },
            so: { quest: "Buuxi jajabyada u dhigma!", check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad u jawaabtay!", score: "Dhibco", high: "Sare", level: "Heerka" }
        };

        let state = {
            lang: 'ti', score: 0, level: 1,
            highScore: parseInt(localStorage.getItem('equiv_high')) || 0,
            n1: 1, d1: 2, n2: 0, d2: 4, userAns: "",
            busy: false, muted: false, particles: []
        };

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (state.muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type==='win') { o.type='triangle'; [523,659,783,1046].forEach((f,i)=>o.frequency.setValueAtTime(f,n+i*0.1)); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.6); }
            else if(type==='tap') { o.type='sine'; o.frequency.setValueAtTime(600,n); g.gain.setValueAtTime(0.05,n); o.start(); o.stop(n+0.1); }
            else { o.type='sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.4); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.4); }
        }

        function generate() {
            state.busy = false;
            state.userAns = "";
            state.level = Math.floor(state.score / 50) + 1;
            
            const bases = [[1,2], [1,3], [2,3], [1,4], [3,4], [1,5], [2,5], [3,5], [4,5]];
            const base = bases[Math.floor(Math.random() * (state.level < 3 ? 5 : bases.length))];
            
            state.n1 = base[0];
            state.d1 = base[1];
            
            const multipliers = [2, 3, 4];
            const m = multipliers[Math.floor(Math.random() * multipliers.length)];
            
            state.d2 = state.d1 * m;
            state.target = state.n1 * m;

            renderMath();
            renderCircle('svgA', state.n1, state.d1, '#8b5cf6');
            renderCircle('svgB', 0, state.d2, '#0ea5e9'); 
            updateUI();
        }

        function renderMath() {
            document.getElementById('n1').innerText = state.n1;
            document.getElementById('d1').innerText = state.d1;
            document.getElementById('d2').innerText = state.d2;
            document.getElementById('ansSlot').innerText = "?";
        }

        function renderCircle(id, n, d, color) {
            const el = document.getElementById(id);
            let html = `<svg viewBox="0 0 100 100" style="width:100%;height:100%;">`;
            const cx=50, cy=50, r=45;
            
            for (let i = 0; i < d; i++) {
                const start = (i * 360 / d) - 90;
                const end = ((i + 1) * 360 / d) - 90;
                const x1 = cx + r * Math.cos(Math.PI * start / 180);
                const y1 = cy + r * Math.sin(Math.PI * start / 180);
                const x2 = cx + r * Math.cos(Math.PI * end / 180);
                const y2 = cy + r * Math.sin(Math.PI * end / 180);
                
                const fill = i < n ? color : '#f8fafc';
                const stroke = i < n ? 'rgba(0,0,0,0.05)' : '#cbd5e1';
                
                html += `<path d="M 50 50 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z" fill="${fill}" stroke="${stroke}" stroke-width="1.8"/>`;
            }
            html += `</svg>`;
            el.innerHTML = html;
        }

        function press(k) {
            if (state.busy) return;
            sfx('tap');
            if (k === 'bk') state.userAns = state.userAns.slice(0, -1);
            else if (state.userAns.length < 2) state.userAns += k;
            
            document.getElementById('ansSlot').innerText = state.userAns || "?";
            
            const val = parseInt(state.userAns) || 0;
            renderCircle('svgB', Math.min(val, state.d2), state.d2, '#0ea5e9');
        }

        function check() {
            if (state.busy || state.userAns === "") return;
            
            if (parseInt(state.userAns) === state.target) {
                handleSuccess();
            } else {
                handleError();
            }
        }

        function handleSuccess() {
            state.busy = true;
            state.score += 10;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('equiv_high', state.highScore);
            }
            sfx('win'); 
            
            // MASSIVE CONFETTI CELEBRATION
            let waves = 0;
            const partyInterval = setInterval(() => {
                burst(250);
                waves++;
                if (waves > 12) clearInterval(partyInterval);
            }, 120);

            const ovl = document.getElementById('overlay');
            const t = i18n[state.lang];
            const icons = ['🍰','🧁','🔬','🧪','🏆','🌟','💎','🎂'];
            document.getElementById('ovlIcon').innerText = icons[Math.floor(Math.random()*icons.length)];
            document.getElementById('ovlTitle').innerText = t.win;
            document.getElementById('ovlSub').innerText = t.winsub;
            
            ovl.style.display = 'flex';
            setTimeout(() => {
                ovl.style.display = 'none';
                generate();
            }, 2800);
        }

        function handleError() {
            sfx('err');
            const card = document.getElementById('gameCard');
            card.classList.add('shake');
            document.body.classList.add('error-active');
            document.getElementById('wrong-overlay').style.display = 'flex';
            
            setTimeout(() => {
                card.classList.remove('shake');
                document.body.classList.remove('error-active');
                document.getElementById('wrong-overlay').style.display = 'none';
                state.userAns = "";
                document.getElementById('ansSlot').innerText = "?";
                renderCircle('svgB', 0, state.d2, '#0ea5e9');
            }, 800);
        }

        function changeLang(l) { state.lang = l; updateUI(); }
        function toggleMute() { state.muted = !state.muted; document.getElementById('btnMute').innerText = state.muted ? '🔇' : '🔊'; }

        function updateUI() {
            const t = i18n[state.lang];
            document.getElementById('txtQuest').innerText = t.quest;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('valScore').innerText = state.score;
            document.getElementById('valHigh').innerText = state.highScore;
            document.getElementById('valLvl').innerText = state.level;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblLvl').innerText = t.level;
        }

        function burst(count) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            if (c.width !== window.innerWidth) { c.width = window.innerWidth; c.height = window.innerHeight; }
            const colors = ['#8b5cf6', '#0ea5e9', '#ec4899', '#facc15', '#10b981', '#ffffff', '#fb923c'];
            for(let i=0; i<count; i++) state.particles.push({
                x: Math.random() * c.width, y: c.height + 20, vx: (Math.random()-0.5)*50, vy: (Math.random()-0.8)*65,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], l: 2.0, r: Math.random()*360, rv: (Math.random()-0.5)*30
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=state.particles.length-1; i>=0; i--){
                    const p=state.particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.985; p.l-=0.008; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else state.particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => { generate(); };
    </script>
</body>
</html>

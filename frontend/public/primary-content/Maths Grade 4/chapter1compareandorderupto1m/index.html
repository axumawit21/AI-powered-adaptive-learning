<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peak Navigator | ምውድዳርን ቅደም ሰዓብን</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --secondary: #0ea5e9;
            --accent: #f59e0b;
            --danger: #ef4444;
            --deep-forest: #064e3b;
            --glass: rgba(255, 255, 255, 0.96);
            --royal-grad: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: #ecfdf5;
            background-image: 
                radial-gradient(at 0% 0%, #dcfce7 0px, transparent 50%),
                radial-gradient(at 100% 0%, #bae6fd 0px, transparent 50%),
                radial-gradient(at 50% 100%, #fef3c7 0px, transparent 50%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #1e293b;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 1300px; padding: 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 20px;
        }

        .badges { display: flex; gap: 15px; align-items: center; }
        
        /* Unique Mountain-Themed Badges */
        .stat-pill { 
            background: white; padding: 12px 24px; border-radius: 20px 5px 20px 5px; font-weight: 800; font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 3px solid transparent;
            background-clip: padding-box; position: relative;
            display: flex; align-items: center; gap: 10px;
        }
        .stat-pill::after {
            content: ''; position: absolute; inset: -3px; border-radius: 22px 7px 22px 7px;
            background: var(--royal-grad); z-index: -1;
        }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #64748b; letter-spacing: 1px; }
        .stat-val { color: #1e293b; font-size: 1.4rem; }
        .high-score { border-color: var(--accent); }
        .high-score .stat-val { color: var(--accent); }

        .btn-icon {
            background: white; border: 4px solid #fff; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--primary); font-size: 1.4rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .btn-icon:active { transform: scale(0.9); }

        .lang-select {
            padding: 12px 20px; border-radius: 20px; border: 3px solid white; font: inherit; font-weight: bold; cursor: pointer;
            background: var(--glass); color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .lang-select:hover { transform: translateY(-2px); border-color: var(--secondary); }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column; 
            padding: 20px; gap: 30px; z-index: 10; justify-content: center;
        }

        .game-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 50px; padding: 60px 40px; 
            border: 10px solid white;
            box-shadow: 0 40px 100px rgba(0,0,0,0.12);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 40px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Fancy Question Box */
        .story-box {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border-radius: 30px; padding: 30px; border-left: 15px solid var(--secondary);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.02); position: relative;
            max-width: 800px; margin: 0 auto;
        }
        .story-box::after {
            content: '⛰️'; position: absolute; right: 20px; top: -30px; font-size: 3rem; opacity: 0.2;
        }

        .quest-text { 
            font-size: 2.2rem; font-weight: 900; 
            background: linear-gradient(to right, #1e3a8a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
        }

        /* Comparison View */
        .comp-row { display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; margin: 20px 0; }
        .num-stone {
            background: white; padding: 40px 60px; border-radius: 40px; border: 6px solid #e2e8f0;
            font-size: 4.5rem; font-weight: 900; color: #0f172a;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .num-stone.active { border-color: var(--primary); background: #f0fdf4; transform: scale(1.08) rotate(1deg); box-shadow: 0 25px 50px rgba(16, 185, 129, 0.15); }

        .op-box {
            width: 110px; height: 110px; background: white; border: 6px dashed #cbd5e1;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 4rem; font-weight: 900; color: var(--accent); transition: 0.3s;
        }
        .op-box.filled { border-style: solid; border-color: var(--accent); background: #fffbeb; }

        .op-grid { display: flex; gap: 20px; justify-content: center; margin-top: 20px; }
        .op-btn {
            width: 100px; height: 100px; border-radius: 25px; border: none;
            background: white; color: var(--primary); font-size: 3rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 10px 0 #d1fae5; transition: all 0.1s;
        }
        .op-btn:hover { background: #f0fdf4; transform: translateY(-5px); }
        .op-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #d1fae5; }

        /* Ordering View */
        .order-list { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .order-item {
            width: 100%; max-width: 650px; padding: 25px 40px; background: white; border-radius: 30px;
            border: 5px solid #f1f5f9; font-size: 2.5rem; font-weight: 900; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.04);
        }
        .order-item:hover { border-color: var(--secondary); transform: scale(1.02) translateX(10px); background: #f0f9ff; }
        
        .order-item.selected { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; border-color: white; 
            transform: scale(1.05) translateX(20px);
            box-shadow: 0 15px 35px rgba(14, 165, 233, 0.3);
        }
        .order-item .rank { 
            width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.3); 
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem; 
            border: 2px solid white;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 15rem; color: white; opacity: 0.5; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(16, 185, 129, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: white; text-align: center;
            backdrop-filter: blur(15px);
        }
        #success-overlay h2 { font-size: 5rem; margin-top: 20px; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 850px) {
            .num-stone { font-size: 2.2rem; padding: 20px 30px; border-radius: 25px; }
            .op-box { width: 80px; height: 80px; font-size: 2.8rem; }
            .op-btn { width: 70px; height: 70px; font-size: 2rem; }
            .quest-text { font-size: 1.4rem; }
            .order-item { font-size: 1.6rem; padding: 18px 25px; border-radius: 20px; }
            .game-card { padding: 40px 20px; border-radius: 35px; }
            header { padding: 15px; justify-content: center; }
            .stat-pill { padding: 8px 15px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-left">
            <button class="btn-icon" id="muteBtn" onclick="toggleMute()" title="Sound Toggle">🔊</button>
            <div class="badges">
                <div class="stat-pill high-score">
                    <span id="highLabel" class="stat-label">ዝለዓለ</span>
                    <span id="highScoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                    <span id="scoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="lvlLabel" class="stat-label">ደረጃ</span>
                    <span id="levelVal" class="stat-val">1</span>
                </div>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <div class="story-box">
                <p class="quest-text" id="questText">...</p>
            </div>
            
            <div id="compareView" style="display: none;">
                <div class="comp-row">
                    <div class="num-stone active" id="stone1">0</div>
                    <div class="op-box" id="opBox">?</div>
                    <div class="num-stone active" id="stone2">0</div>
                </div>
                <div class="op-grid">
                    <button class="op-btn" onclick="checkCompare('<')"><</button>
                    <button class="op-btn" onclick="checkCompare('=')">=</button>
                    <button class="op-btn" onclick="checkCompare('>')">></button>
                </div>
            </div>

            <div id="orderView" style="display: none;">
                <div class="order-list" id="orderList">
                    <!-- Numbers injected here -->
                </div>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 10rem; animation: bounce 1s infinite alternate;">🏔️</div>
        <h2 id="txtWin">ዝነኣድ ስራሕ!</h2>
        <p style="font-size: 2rem;" id="txtWinSub">ብትኽክል ተመሊሱ ጎበዝ!</p>
    </div>

    <script>
        const i18n = {
            ti: { win: "ንኡድ ስራሕ!", winsub: "ብትኽክል ተመሊሱ ጎበዝ!", level: "ደረጃ", score: "ነጥቢ", high: "ዝለዓለ",
                  qCompare: "ነዞም ቁፅርታት ኣወዳድር",
                  qOrderAsc: "ነዞም ቁፅርታት ካብ ዝነኣሰ ናብ ዝዓበየ ስርዑ",
                  qOrderDesc: "ነዞም ቁፅርታት ካብ ዝዓበየ ናብ ዝነኣሰ ስርዑ"
                },
            am: { win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", level: "ደረጃ", score: "ነጥብ", high: "ከፍተኛ",
                  qCompare: "ቁጥሮቹን አወዳድር",
                  qOrderAsc: "ቁጥሮቹን ከትንሽ ወደ ትልቅ ደርድር",
                  qOrderDesc: "ቁጥሮቹን ከትልቅ ወደ ትንሽ ደርድር"
                },
            en: { win: "Great Job!", winsub: "You answered correctly!", level: "Level", score: "Score", high: "High",
                  qCompare: "Compare the numbers",
                  qOrderAsc: "Order from Smallest to Largest (Ascending)",
                  qOrderDesc: "Order from Largest to Smallest (Descending)"
                },
            om: { win: "Guddina!", winsub: "Sirriitti deebisteetta!", level: "Sadarkaa", score: "Qabxii", high: "Olaanaa",
                  qCompare: "Lakkoofsota wal dorgomsiisi",
                  qOrderAsc: "Xiqqaarraa gara guddaatti hiriirsi",
                  qOrderDesc: "Guddaarraa gara xiqqaatti hiriirsi"
                },
            so: { win: "Shaqo Fiican!", winsub: "Si sax ah ayaad uga jawaabtay!", level: "Heerka", score: "Dhibco", high: "Sare",
                  qCompare: "Is barbar dhig lambarada",
                  qOrderAsc: "Lambarrada u kala horeey si kordheysa",
                  qOrderDesc: "Lambarrada u kala horeey si dhimaneysa"
                }
        };

        let score = 0, level = 1, lang = 'ti', currentQuestion = null, muted = false;
        let highScore = parseInt(localStorage.getItem('peak_nav_high_score')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateQuestion() {
            const type = Math.floor(Math.random() * 3); // 0: Compare, 1: Ascending, 2: Descending
            const max = level === 1 ? 100000 : (level === 2 ? 500000 : 1000000);
            
            if (type === 0) {
                const n1 = Math.floor(Math.random() * max);
                const n2 = Math.random() > 0.8 ? n1 : Math.floor(Math.random() * max);
                currentQuestion = { type: 'compare', n1, n2, ans: n1 > n2 ? '>' : (n1 < n2 ? '<' : '=') };
            } else {
                let nums = [];
                while(nums.length < 4) {
                    let r = Math.floor(Math.random() * max);
                    if(!nums.includes(r)) nums.push(r);
                }
                const sorted = [...nums].sort((a,b) => type === 1 ? a - b : b - a);
                currentQuestion = { type: type === 1 ? 'asc' : 'desc', nums, sorted, userSelection: [] };
            }

            renderLevel();
        }

        function renderLevel() {
            const q = currentQuestion;
            const t = i18n[lang];
            const qTxt = document.getElementById('questText');
            const compView = document.getElementById('compareView');
            const orderView = document.getElementById('orderView');

            if (q.type === 'compare') {
                qTxt.innerText = t.qCompare;
                compView.style.display = 'block';
                orderView.style.display = 'none';
                document.getElementById('stone1').innerText = q.n1.toLocaleString();
                document.getElementById('stone2').innerText = q.n2.toLocaleString();
                document.getElementById('opBox').innerText = "?";
                document.getElementById('opBox').classList.remove('filled');
            } else {
                qTxt.innerText = q.type === 'asc' ? t.qOrderAsc : t.qOrderDesc;
                compView.style.display = 'none';
                orderView.style.display = 'block';
                const list = document.getElementById('orderList');
                list.innerHTML = '';
                
                q.nums.forEach(n => {
                    const btn = document.createElement('div');
                    btn.className = 'order-item';
                    const sIdx = q.userSelection.indexOf(n);
                    if (sIdx > -1) {
                        btn.classList.add('selected');
                        const rank = sIdx + 1;
                        btn.innerHTML = `<span>${n.toLocaleString()}</span> <span class="rank">${rank}</span>`;
                    } else {
                        btn.innerText = n.toLocaleString();
                    }
                    btn.onclick = () => selectOrder(n);
                    list.appendChild(btn);
                });
            }
            updateStats();
        }

        function checkCompare(op) {
            sfx('tap');
            const opBox = document.getElementById('opBox');
            opBox.innerText = op;
            opBox.classList.add('filled');
            if (op === currentQuestion.ans) {
                handleSuccess();
            } else {
                handleError();
            }
        }

        function selectOrder(n) {
            sfx('tap');
            const idx = currentQuestion.userSelection.indexOf(n);
            if (idx > -1) {
                // Deselect logic
                currentQuestion.userSelection.splice(idx, 1);
            } else {
                // Select logic
                currentQuestion.userSelection.push(n);
            }
            renderLevel();

            if (currentQuestion.userSelection.length === 4) {
                const isCorrect = currentQuestion.userSelection.every((val, idx) => val === currentQuestion.sorted[idx]);
                if (isCorrect) handleSuccess();
                else handleError();
            }
        }

        function handleSuccess() {
            score += 10;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('peak_nav_high_score', highScore);
            }
            level = Math.floor(score / 50) + 1;
            sfx('win');
            burst(500);
            
            const overlay = document.getElementById('success-overlay');
            document.getElementById('txtWin').innerText = i18n[lang].win;
            document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
            overlay.style.display = 'flex';

            setTimeout(() => {
                overlay.style.display = 'none';
                generateQuestion();
            }, 2000);
        }

        function handleError() {
            sfx('err');
            const card = document.getElementById('gameCard');
            card.classList.add('shake');
            document.getElementById('error-screen').style.display = 'flex';
            setTimeout(() => {
                card.classList.remove('shake');
                document.getElementById('error-screen').style.display = 'none';
                if (currentQuestion.type !== 'compare') {
                    currentQuestion.userSelection = [];
                    renderLevel();
                } else {
                    const opBox = document.getElementById('opBox');
                    opBox.innerText = "?";
                    opBox.classList.remove('filled');
                }
            }, 600);
        }

        function updateStats() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('scoreLabel').innerText = t.score;
            document.getElementById('lvlLabel').innerText = t.level;
            document.getElementById('highLabel').innerText = t.high;
        }

        function changeLang(l) {
            lang = l;
            renderLevel();
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#10b981', '#0ea5e9', '#f59e0b', '#ef4444', '#ffffff', '#6366f1'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20,
                vx: (Math.random()-0.5)*45, vy: (Math.random()-0.9)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*25
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.015; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); 
                        x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            generateQuestion();
            updateStats();
        };
    </script>
</body>
</html>

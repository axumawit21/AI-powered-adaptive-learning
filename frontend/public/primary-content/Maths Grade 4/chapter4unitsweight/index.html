<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weight Master | መዐቀንታት ክብደት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --weight-blue: #34495e;
            --cargo-orange: #e67e22;
            --steel-gray: #bdc3c7;
            --success-green: #27ae60;
            --danger-red: #e74c3c;
            --sky-bg: #ecf0f1;
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--sky-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--weight-blue);
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; }

        header {
            width: 100%; max-width: 1100px; padding: clamp(10px, 3vw, 20px);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 10px;
        }

        .stat-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; flex: 1; }
        .pill {
            background: var(--white); border: 2.5px solid var(--weight-blue);
            padding: 8px 15px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px; font-weight: 700;
            box-shadow: 0 4px 0 var(--weight-blue); font-size: 0.9rem;
        }
        .val { color: var(--cargo-orange); font-size: 1.1em; }

        .header-controls { display: flex; gap: 10px; align-items: center; }
        .icon-btn {
            background: white; border: 2.5px solid var(--weight-blue); width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 0 var(--weight-blue); transition: transform 0.1s;
        }
        .icon-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--weight-blue); }

        .lang-select {
            padding: 8px 12px; border-radius: 20px; border: 2.5px solid var(--weight-blue);
            background: white; font-weight: bold; cursor: pointer; outline: none;
            box-shadow: 0 4px 0 var(--weight-blue);
        }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            padding: 10px; gap: 20px; justify-content: center; align-items: center; z-index: 10;
        }

        .game-card {
            background: var(--white); border-radius: 30px; padding: clamp(20px, 5vw, 40px);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 20px 40px var(--shadow); border: 5px solid var(--weight-blue);
            position: relative;
        }

        .weight-display {
            width: 100%; height: 120px; background: #dfe6e9; border-radius: 20px;
            border: 3px solid var(--steel-gray); display: flex; align-items: center;
            justify-content: center; position: relative; overflow: hidden;
        }
        .cargo-box {
            font-size: 4rem; animation: drop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes drop { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .title { font-size: 1.8rem; font-weight: 900; color: var(--weight-blue); text-transform: uppercase; }
        .question-box {
            padding: 25px; background: #f8f9fa; border-radius: 20px;
            border: 3.5px dashed var(--cargo-orange); display: flex; flex-direction: column; gap: 10px;
        }

        .operation-text { font-size: clamp(1.4rem, 5vw, 2.5rem); font-weight: 900; color: var(--weight-blue); line-height: 1.3; }

        .ans-container {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin: 10px 0; flex-wrap: wrap;
        }

        .ans-input-wrapper { display: flex; align-items: center; gap: 8px; }

        .ans-box {
            min-width: 120px; height: 90px; background: #fff; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            color: var(--cargo-orange); font-size: 3rem; cursor: pointer;
            border: 5px solid var(--cargo-orange); box-shadow: 0 6px 0 var(--cargo-orange);
            font-family: 'Fredoka', sans-serif; font-weight: 900; transition: all 0.2s;
        }
        .ans-box.active { transform: scale(1.05); border-color: var(--success-green); box-shadow: 0 6px 0 var(--success-green); color: var(--success-green); }
        .ans-box.small { min-width: 100px; height: 80px; font-size: 2.2rem; }

        .unit-label { font-weight: 900; color: var(--weight-blue); font-size: 1.4rem; }

        /* Keypad */
        .keypad-section { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .key {
            height: 70px; background: #fff; border: 2.5px solid var(--weight-blue); border-radius: 15px;
            font-size: 2rem; font-weight: 800; color: var(--weight-blue); cursor: pointer;
            box-shadow: 0 5px 0 var(--weight-blue); transition: 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--weight-blue); }
        .key.del { color: var(--danger-red); }
        .key.check {
            grid-column: 1 / -1; background: var(--success-green); color: white;
            font-size: 2rem; height: 80px; margin-top: 10px; border: 3px solid var(--weight-blue);
            box-shadow: 0 6px 0 var(--weight-blue); font-weight: 900; text-transform: uppercase;
        }
        .key.check:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--weight-blue); }

        /* Overlays */
        #success-overlay, #error-overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000; padding: 20px;
            text-align: center;
        }
        #success-overlay { background: rgba(255, 255, 255, 0.95); }
        #error-overlay { background: var(--danger-red); color: white; }
        .big-icon { font-size: 6rem; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }

        /* Desktop Layout - Parallel */
        @media (min-width: 1024px) {
            .container { flex-direction: row; align-items: stretch; max-width: 1300px; gap: 40px; }
            .game-card { flex: 1.2; justify-content: center; }
            .keypad-section { flex: 0.8; max-width: 450px; justify-content: center; }
        }

        @media (max-width: 480px) {
            header { flex-direction: column; align-items: stretch; }
            .header-controls { justify-content: center; }
            .operation-text { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="stat-group">
            <div class="pill">⚖️ <span id="lblScore">Score</span>: <span id="valScore" class="val">0</span></div>
            <div class="pill">🏆 <span id="lblHigh">High</span>: <span id="valHigh" class="val">0</span></div>
            <div class="pill">🚚 <span id="lblLvl">Level</span>: <span id="valLvl" class="val">1</span></div>
        </div>
        <div class="header-controls">
            <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="title" id="pageTitle">Weight Master</h1>
            <div class="weight-display" id="weightDisplay">
                <div class="cargo-box">📦</div>
            </div>
            <div class="question-box">
                <div id="operationDisplay" class="operation-text">---</div>
            </div>
            <div class="ans-container" id="ansContainer">
                <!-- Inputs here -->
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad" id="keypad"></div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ፈትሽ (Confirm)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="big-icon">🎯</div>
        <h2 id="txtWin" style="font-size: 3rem; color: var(--success-green);">ንፉዕ!</h2>
        <p id="txtWinSub" style="font-size: 1.5rem;">Correct weight calculation!</p>
    </div>

    <div id="error-overlay">
        <div class="big-icon">❌</div>
        <h2 id="txtFail" style="font-size: 3rem;">ጌጋ!</h2>
        <p id="txtFailSub" style="font-size: 1.5rem;">Try Again</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "መዐቀንታት ክብደት", check: "ኣረጋግፅ", win: "ንፉዕ!", winsub: "ልክዕ መልሲ!", fail: "ጌጋ!", failsub: "እንደገና ፈትን", score: "ውፅኢት", high: "ዝለዓለ", level: "ደረጃ", units: { mg: "ሚ.ግ", g: "ግ", kg: "ኪ.ግ", q: "ኩ" }, and: "ን" },
            am: { title: "የክብደት መለኪያዎች", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "ትክክል!", fail: "ስህተት!", failsub: "እንደገና ይሞክሩ", score: "ውጤት", high: "ከፍተኛ", level: "ደረጃ", units: { mg: "ሚ.ግ", g: "ግ", kg: "ኪ.ግ", q: "ኩ" }, and: "እና" },
            en: { title: "Weight Lab", check: "Confirm", win: "Great!", winsub: "Correct!", fail: "Wrong!", failsub: "Try Again", score: "Score", high: "High", level: "Level", units: { mg: "mg", g: "g", kg: "kg", q: "q" }, and: "and" },
            om: { title: "Safartuu Ulfaatinaa", check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriidha!", fail: "Dogoggora!", failsub: "Irra deebi'i yaali", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa", units: { mg: "mg", g: "g", kg: "kg", q: "q" }, and: "fi" },
            so: { title: "Cabbirka Miisaanka", check: "Hubi", win: "Shaqo Fiican!", winsub: "Waa sax!", fail: "Khalad!", failsub: "Markale isku day", score: "Dhibco", high: "Sare", level: "Heerka", units: { mg: "mg", g: "g", kg: "kg", q: "q" }, and: "iyo" }
        };

        const cargoIcons = ['📦', '🏗️', '🚜', '🚛', '🐘', '🧱', '🚢'];
        let score = 0, lang = 'ti', currentTask = null, busy = false, muted = false;
        let activeIdx = 0, userVals = ["", ""];
        let highScore = parseInt(localStorage.getItem('weight_lab_high')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'tap') { o.type = 'sine'; o.frequency.setValueAtTime(500, n); g.gain.setValueAtTime(0.05, n); o.start(); o.stop(n + 0.1); }
            else if (type === 'win') { o.type = 'triangle'; [523, 659, 783].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1)); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.5); }
            else if (type === 'err') { o.type = 'sawtooth'; o.frequency.setValueAtTime(100, n); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.3); }
        }

        function toggleMute() { muted = !muted; document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊'; }

        function generateTask() {
            busy = false; userVals = ["", ""]; activeIdx = 0;
            const lvl = Math.floor(score / 100) + 1;
            
            const pairs = [
                { large: 'kg', small: 'g', factor: 1000 },
                { large: 'g', small: 'mg', factor: 1000 },
                { large: 'q', small: 'kg', factor: 100 }
            ];
            const p = pairs[Math.floor(Math.random() * pairs.length)];
            const isAdd = Math.random() > 0.4;
            const isDouble = lvl > 1 && Math.random() > 0.5;

            let task = { op: isAdd ? '+' : '-' };

            if (!isDouble) {
                task.type = 'single';
                task.unit = Math.random() > 0.5 ? p.large : p.small;
                task.v1 = Math.floor(Math.random() * 80) + 20;
                task.v2 = isAdd ? (Math.floor(Math.random() * 50) + 5) : (Math.floor(Math.random() * task.v1) + 1);
                task.ans = isAdd ? (task.v1 + task.v2) : (task.v1 - task.v2);
            } else {
                task.type = 'double';
                task.u1 = p.large; task.u2 = p.small;
                if (isAdd) {
                    task.v1 = Math.floor(Math.random() * 10) + 1;
                    task.e1 = Math.floor(Math.random() * p.factor);
                    task.v2 = Math.floor(Math.random() * 10) + 1;
                    task.e2 = Math.floor(Math.random() * p.factor);
                    let sSum = task.e1 + task.e2;
                    task.ans1 = task.v1 + task.v2 + Math.floor(sSum / p.factor);
                    task.ans2 = sSum % p.factor;
                } else {
                    task.v1 = Math.floor(Math.random() * 10) + 10;
                    task.e1 = Math.floor(Math.random() * p.factor);
                    task.v2 = Math.floor(Math.random() * 5) + 1;
                    task.e2 = Math.floor(Math.random() * p.factor);
                    let t1 = (task.v1 * p.factor) + task.e1;
                    let t2 = (task.v2 * p.factor) + task.e2;
                    let diff = t1 - t2;
                    task.ans1 = Math.floor(diff / p.factor);
                    task.ans2 = diff % p.factor;
                }
            }
            currentTask = task;
            renderUI();
            document.querySelector('.cargo-box').innerText = cargoIcons[Math.floor(Math.random() * cargoIcons.length)];
        }

        function renderUI() {
            if (!currentTask) return;
            const t = i18n[lang], u = t.units;
            document.getElementById('valLvl').innerText = Math.floor(score / 100) + 1;
            document.getElementById('valScore').innerText = score;
            document.getElementById('valHigh').innerText = highScore;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('pageTitle').innerText = t.title;

            const fmt = (v, uL, e, uS) => {
                if (e === undefined) return `${v} ${u[uL]}`;
                return (lang==='ti'||lang==='am') ? `${v} ${u[uL]}${t.and} ${e} ${u[uS]}` : `${v} ${u[uL]} ${t.and} ${e} ${u[uS]}`;
            };

            let opStr = "";
            if (currentTask.type === 'single') {
                opStr = `${currentTask.v1}${u[currentTask.unit]} ${currentTask.op} ${currentTask.v2}${u[currentTask.unit]}`;
            } else {
                opStr = `${fmt(currentTask.v1, currentTask.u1, currentTask.e1, currentTask.u2)} ${currentTask.op} ${fmt(currentTask.v2, currentTask.u1, currentTask.e2, currentTask.u2)}`;
            }
            document.getElementById('operationDisplay').innerText = opStr;

            const container = document.getElementById('ansContainer');
            container.innerHTML = "";
            if (currentTask.type === 'single') {
                container.innerHTML = `<div class="ans-box active" id="ans0" onclick="activeIdx=0; renderUI()">${userVals[0] || '?'}</div><div class="unit-label">${u[currentTask.unit]}</div>`;
            } else {
                container.innerHTML = `
                    <div class="ans-input-wrapper"><div class="ans-box small ${activeIdx===0?'active':''}" id="ans0" onclick="activeIdx=0; renderUI()">${userVals[0] || '?'}</div><div class="unit-label">${u[currentTask.u1]}</div></div>
                    <div class="ans-input-wrapper"><div class="ans-box small ${activeIdx===1?'active':''}" id="ans1" onclick="activeIdx=1; renderUI()">${userVals[1] || '?'}</div><div class="unit-label">${u[currentTask.u2]}</div></div>
                `;
            }
        }

        function press(k) {
            if (busy) return;
            sfx('tap');
            if (k === 'bk') userVals[activeIdx] = userVals[activeIdx].slice(0, -1);
            else if (userVals[activeIdx].length < 7) userVals[activeIdx] += k;
            document.getElementById(`ans${activeIdx}`).innerText = userVals[activeIdx] || "?";
        }

        function checkAnswer() {
            if (busy || userVals[0] === "" || (currentTask.type === 'double' && userVals[1] === "")) return;
            let ok = currentTask.type === 'single' ? (parseInt(userVals[0]) === currentTask.ans) : (parseInt(userVals[0]) === currentTask.ans1 && parseInt(userVals[1]) === currentTask.ans2);
            if (ok) {
                score += 20; if (score > highScore) { highScore = score; localStorage.setItem('weight_lab_high', highScore); }
                handleWin();
            } else handleErr();
        }

        function handleWin() {
            busy = true; sfx('win'); burst(300);
            const ov = document.getElementById('success-overlay'); ov.style.display = 'flex';
            document.getElementById('txtWin').innerText = i18n[lang].win;
            document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
            setTimeout(() => { ov.style.display = 'none'; generateTask(); }, 1800);
        }

        function handleErr() {
            busy = true; sfx('err');
            const ov = document.getElementById('error-overlay'); ov.style.display = 'flex';
            document.getElementById('txtFail').innerText = i18n[lang].fail;
            document.getElementById('txtFailSub').innerText = i18n[lang].failsub;
            setTimeout(() => { ov.style.display = 'none'; userVals = ["", ""]; busy = false; renderUI(); }, 1200);
        }

        function changeLang(l) { lang = l; renderUI(); }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#e67e22', '#2ecc71', '#3498db', '#f1c40f', '#fff'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*40, vy: (Math.random()-1.2)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], l: 2.5, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,'.',0,'bk'].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; 
                if(k === 'bk') { b.innerText = '⌫'; b.classList.add('del'); }
                else b.innerText = k;
                b.onclick = () => press(k); 
                kp.appendChild(b);
            });
            generateTask();
        };
    </script>
</body>
</html>

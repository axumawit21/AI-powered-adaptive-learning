<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Place Value Vault | ዓድታት ቁፅሪ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f2fe;
            --neon-blue: #4facfe;
            --neon-purple: #a855f7;
            --neon-pink: #ec4899;
            --deep-space: #0f172a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --royal: #4f46e5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--deep-space);
            background-image: 
                radial-gradient(at 0% 0%, #1e1b4b 0px, transparent 50%),
                radial-gradient(at 100% 0%, #312e81 0px, transparent 50%),
                radial-gradient(at 50% 100%, #0f172a 0px, transparent 50%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #fff;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 1200px; padding: 25px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: nowrap; gap: 40px;
        }

        .header-left { display: flex; align-items: center; gap: 30px; }
        .badges { display: flex; gap: 20px; align-items: center; }
        
        .stat-pill { 
            background: rgba(255,255,255,0.08); backdrop-filter: blur(10px);
            padding: 10px 22px; border-radius: 50px; font-weight: 800; font-size: 1.1rem; color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 10px;
        }
        .stat-label { opacity: 0.6; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-val { color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0, 242, 254, 0.5); }

        .btn-icon {
            background: white; border: none; width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--deep-space); font-size: 1.3rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: transform 0.1s;
        }
        .btn-icon:active { transform: scale(0.9); }

        .lang-select {
            padding: 12px 24px; border-radius: 20px; border: none; font: inherit; font-weight: bold; cursor: pointer;
            background: white; color: var(--deep-space); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .container {
            flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column; 
            padding: 20px; gap: 20px; z-index: 10; justify-content: center;
        }

        .vault-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 45px; padding: 40px; 
            border: 4px solid var(--glass-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 30px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }

        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .quest-text { font-size: 1.8rem; font-weight: 700; line-height: 1.4; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .highlight { color: var(--neon-cyan); }

        /* Place Value Grid */
        .pv-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
            width: 100%; max-width: 900px; margin: 0 auto;
        }

        .pv-col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        
        .pv-box {
            width: 100%; height: 100px; background: rgba(0,0,0,0.3);
            border: 4px dashed var(--glass-border); border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; transition: 0.3s;
            color: var(--neon-blue);
        }
        .pv-box.active { border-style: solid; border-color: var(--neon-cyan); background: rgba(0, 242, 254, 0.1); box-shadow: 0 0 30px rgba(0, 242, 254, 0.3); transform: scale(1.05); }
        .pv-box.fixed { border-style: solid; border-color: rgba(255,255,255,0.3); color: #fff; }

        .pv-label { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: #94a3b8; letter-spacing: 0.5px; height: 35px; display: flex; align-items: center; text-align: center; line-height: 1.1; }

        .ans-box {
            width: 100%; max-width: 500px; height: 110px; background: rgba(255,255,255,0.05); border: 6px dashed #cbd5e1;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; font-weight: 900; color: var(--neon-cyan); cursor: pointer; transition: 0.3s;
            margin: 0 auto;
        }
        .ans-box.active { border-style: solid; border-color: var(--neon-cyan); background: rgba(0, 242, 254, 0.1); box-shadow: 0 0 40px rgba(0, 242, 254, 0.3); }

        /* Controls */
        .interaction-panel { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; max-width: 500px; }
        .key {
            height: 70px; background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border); border-radius: 18px;
            font-size: 2rem; font-weight: 800; color: #fff; cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
        .key.del { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border-color: rgba(239, 68, 68, 0.3); }
        .key.check { 
            grid-column: span 4; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); 
            color: white; box-shadow: 0 8px 0 rgba(0,0,0,0.4); font-size: 2rem; text-transform: uppercase;
            height: 85px; margin-top: 10px; font-weight: 900; width: 100%;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 15rem; color: white; opacity: 0.5; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(16, 185, 129, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: white; text-align: center;
            backdrop-filter: blur(15px);
        }
        #success-overlay h2 { font-size: 5rem; margin-top: 20px; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 850px) {
            .pv-box { height: 70px; font-size: 2rem; border-width: 3px; }
            .ans-box { height: 80px; font-size: 2.2rem; }
            .pv-label { font-size: 0.65rem; }
            .quest-text { font-size: 1.3rem; }
            .key { height: 60px; font-size: 1.6rem; }
            .vault-card { padding: 30px 15px; border-radius: 35px; }
            header { padding: 15px; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-left">
            <button class="btn-icon" id="muteBtn" onclick="toggleMute()" title="Sound Toggle">🔊</button>
            <div class="badges">
                <div class="stat-pill">
                    <span id="lvlLabel" class="stat-label">ደረጃ</span>
                    <span id="levelVal" class="stat-val">1</span>
                </div>
                <div class="stat-pill">
                    <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                    <span id="scoreVal" class="stat-val">0</span>
                </div>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="vault-card" id="gameCard">
            <p class="quest-text" id="questText">...</p>
            
            <!-- Grid for Digit and Fill questions -->
            <div class="pv-grid" id="pvGrid">
                <div class="pv-col">
                    <div class="pv-box" id="box-5">?</div>
                    <div class="pv-label" id="lbl-5">...</div>
                </div>
                <div class="pv-col">
                    <div class="pv-box" id="box-4">?</div>
                    <div class="pv-label" id="lbl-4">...</div>
                </div>
                <div class="pv-col">
                    <div class="pv-box" id="box-3">?</div>
                    <div class="pv-label" id="lbl-3">...</div>
                </div>
                <div class="pv-col">
                    <div class="pv-box" id="box-2">?</div>
                    <div class="pv-label" id="lbl-2">...</div>
                </div>
                <div class="pv-col">
                    <div class="pv-box" id="box-1">?</div>
                    <div class="pv-label" id="lbl-1">...</div>
                </div>
                <div class="pv-col">
                    <div class="pv-box" id="box-0">?</div>
                    <div class="pv-label" id="lbl-0">...</div>
                </div>
            </div>

            <!-- Single Input Box for Value questions -->
            <div class="ans-box" id="ansBox" style="display: none;">?</div>

            <div class="interaction-panel">
                <div class="keypad" id="keypad">
                    <!-- Keys 1-9, 0, Del -->
                </div>
                <button class="key check" id="btnCheck" onclick="checkAnswer()">ኣረጋግፅ (Check)</button>
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 10rem; animation: bounce 1s infinite alternate;">🛡️</div>
        <h2 id="txtWin">ንኡድ ስራሕ!</h2>
        <p style="font-size: 2rem;" id="txtWinSub">ብትኽክል መሊስካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { check: "ኣረጋግፅ", win: "ንኡድ ስራሕ!", winsub: "ብትኽክል መሊስካዮ ኣለኻ!", level: "ደረጃ", score: "ነጥቢ",
                  places: ["ሓደ", "ዓሰርተ", "ሚኢቲ", "ሽሕ", "ዓሰርተ ሽሕ", "ሚኢቲ ሽሕ"],
                  qDigit: "ኣብዚ ቁፅሪ {n}፡ ኣሃዝ ዓዲ {p} ኣየናይ እዩ?",
                  qValue: "ኣብዚ ቁፅሪ {n}፡ ኣሃዝ {d} ዝውክል ዋጋ ክንደይ እዩ?",
                  qFill: "ነቲ ቑፅሪ {n} ኣብ ሰሌዳ ምልኣዮ"
                },
            am: { check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", level: "ደረጃ", score: "ነጥብ",
                  places: ["አንድ", "አስር", "መቶ", "አንድ ሺ", "አስር ሺ", "መቶ ሺ"],
                  qDigit: "በዚህ ቁጥር {n} ውስጥ የ{p} ቤት አሃዝ የትኛው ነው?",
                  qValue: "በዚህ ቁጥር {n} ውስጥ አሃዝ {d} የሚወክለው ዋጋ ስንት ነው?",
                  qFill: "ቁጥሩን {n} በሰሌዳው ላይ ሙላ"
                },
            en: { check: "Check", win: "Great Job!", winsub: "You answered correctly!", level: "Level", score: "Score",
                  places: ["Ones", "Tens", "Hundreds", "Thousands", "Ten-Thousands", "Hundred-Thousands"],
                  qDigit: "In {n}, which digit is in the {p} place?",
                  qValue: "In {n}, what is the value of the digit {d}?",
                  qFill: "Fill the number {n} into the grid"
                },
            om: { check: "Mirkaneessi", win: "Guddina!", winsub: "Sirriitti deebisteetta!", level: "Sadarkaa", score: "Qabxii",
                  places: ["Tokko", "Kudhan", "Dhibba", "Kuma", "Kudhan-Kuma", "Dhibba-Kuma"],
                  qDigit: "Lakkoofsa {n} keessatti, lakkoofsi iddoo {p} jiru isa kami?",
                  qValue: "Lakkoofsa {n} keessatti, gatiin lakkoofsa {d} meeqa?",
                  qFill: "Lakkoofsa {n} hiriira keessa guuti"
                },
            so: { check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad uga jawaabtay!", level: "Heerka", score: "Dhibco",
                  places: ["Kowad", "Toban", "Boqol", "Kun", "Toban-Kun", "Boqol-Kun"],
                  qDigit: "Lambarka {n}, kee baa ku jira booska {p}?",
                  qValue: "Lambarka {n}, waa maxay qiimaha lambarka {d}?",
                  qFill: "Ku qor lambarka {n} shaxda"
                }
        };

        let score = 0, level = 1, lang = 'ti', userVal = "", currentQuestion = null, muted = false;
        let particles = [];
        let activeBoxIdx = 5;
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.15, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateQuestion() {
            const type = Math.floor(Math.random() * 3); // 0: Identify Digit, 1: Identify Value, 2: Fill Grid
            const num = Math.floor(Math.random() * 899999) + 100000;
            const sNum = num.toString();
            
            const pIdx = Math.floor(Math.random() * 6);
            
            if (type === 0) {
                // Which digit is in the thousands place?
                currentQuestion = { type, num, pIdx, ans: sNum[5 - pIdx], mode: 'grid' };
            } else if (type === 1) {
                // What is the value of 5 in 150,000?
                let digitIdx = Math.floor(Math.random() * 6);
                let digit = sNum[5 - digitIdx];
                // Ensure unique digit for value question
                if (sNum.split(digit).length - 1 > 1) {
                    for (let i = 0; i < 6; i++) {
                        if (sNum.split(sNum[i]).length - 1 === 1) {
                            digitIdx = 5 - i;
                            digit = sNum[i];
                            break;
                        }
                    }
                }
                const val = parseInt(digit) * Math.pow(10, digitIdx);
                currentQuestion = { type, num, digit, ans: val.toString(), mode: 'input' };
            } else {
                // Fill the grid with 123,456
                currentQuestion = { type, num, ans: sNum, mode: 'grid' };
            }

            userVal = "";
            renderLevel();
        }

        function renderLevel() {
            const q = currentQuestion;
            const t = i18n[lang];
            const qTxt = document.getElementById('questText');
            const grid = document.getElementById('pvGrid');
            const ansBox = document.getElementById('ansBox');
            
            if (q.type === 0) {
                qTxt.innerHTML = t.qDigit.replace('{n}', `<span class="highlight">${q.num.toLocaleString()}</span>`).replace('{p}', `<span class="highlight">${t.places[q.pIdx]}</span>`);
            } else if (q.type === 1) {
                qTxt.innerHTML = t.qValue.replace('{n}', `<span class="highlight">${q.num.toLocaleString()}</span>`).replace('{d}', `<span class="highlight">${q.digit}</span>`);
            } else {
                qTxt.innerHTML = t.qFill.replace('{n}', `<span class="highlight">${q.num.toLocaleString()}</span>`);
            }

            // Mode Logic
            if (q.mode === 'input') {
                grid.style.display = 'none';
                ansBox.style.display = 'flex';
                ansBox.innerText = "?";
                ansBox.classList.add('active');
            } else {
                grid.style.display = 'grid';
                ansBox.style.display = 'none';
                
                // Initialize Grid Boxes
                for (let i = 0; i < 6; i++) {
                    const box = document.getElementById(`box-${i}`);
                    const lbl = document.getElementById(`lbl-${i}`);
                    lbl.innerText = t.places[i];
                    box.className = 'pv-box';
                    box.innerText = "?";
                    box.classList.remove('fixed');
                    
                    if (q.type === 0) {
                        // "Identify Digit" - Grid is fixed showing number, only one box is active for answer
                        box.classList.add('fixed');
                        box.innerText = q.num.toString()[5 - i];
                        if (i === q.pIdx) {
                            box.classList.remove('fixed');
                            box.classList.add('active');
                            box.innerText = "?";
                            activeBoxIdx = i;
                        }
                    } else {
                        // "Fill Grid" - All boxes are active, user fills them all
                        box.classList.add('active');
                        box.onclick = () => { sfx('tap'); setActiveBox(i); };
                    }
                }
                
                if (q.type === 2) {
                    setActiveBox(5); // Start at hundred-thousands for filling
                }
            }

            updateStats();
        }

        function setActiveBox(idx) {
            activeBoxIdx = idx;
            document.querySelectorAll('.pv-box').forEach(b => b.classList.remove('active'));
            const target = document.getElementById(`box-${idx}`);
            if (target) target.classList.add('active');
        }

        function press(k) {
            sfx('tap');
            const q = currentQuestion;
            if (q.mode === 'input') {
                if (k === 'bk') userVal = userVal.slice(0, -1);
                else if (userVal.length < 7) userVal += k;
                document.getElementById('ansBox').innerText = userVal || "?";
            } else {
                const box = document.getElementById(`box-${activeBoxIdx}`);
                if (k === 'bk') {
                    box.innerText = "?";
                    if (q.type === 2 && activeBoxIdx < 5) setActiveBox(activeBoxIdx + 1);
                } else {
                    box.innerText = k;
                    if (q.type === 2 && activeBoxIdx > 0) setActiveBox(activeBoxIdx - 1);
                }
            }
        }

        function checkAnswer() {
            const q = currentQuestion;
            let isCorrect = false;
            
            if (q.mode === 'grid') {
                if (q.type === 0) {
                    const val = document.getElementById(`box-${q.pIdx}`).innerText;
                    isCorrect = val === q.ans;
                } else {
                    let constructed = "";
                    for (let i = 5; i >= 0; i--) constructed += document.getElementById(`box-${i}`).innerText;
                    isCorrect = constructed === q.ans;
                }
            } else {
                isCorrect = userVal === q.ans;
            }

            if (isCorrect) {
                score += 10;
                level = Math.floor(score / 50) + 1;
                sfx('win');
                burst(500);
                
                const overlay = document.getElementById('success-overlay');
                document.getElementById('txtWin').innerText = i18n[lang].win;
                document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
                overlay.style.display = 'flex';

                setTimeout(() => {
                    overlay.style.display = 'none';
                    generateQuestion();
                }, 2000);
            } else {
                sfx('err');
                const card = document.getElementById('gameCard');
                card.classList.add('shake');
                document.getElementById('error-screen').style.display = 'flex';
                setTimeout(() => {
                    card.classList.remove('shake');
                    document.getElementById('error-screen').style.display = 'none';
                    if (q.mode === 'input') {
                        userVal = "";
                        document.getElementById('ansBox').innerText = "?";
                    }
                }, 600);
            }
            updateStats();
        }

        function updateStats() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('lvlLabel').innerText = t.level;
            document.getElementById('scoreLabel').innerText = t.score;
        }

        function changeLang(l) {
            lang = l;
            renderLevel();
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#00f2fe', '#4facfe', '#a855f7', '#ec4899', '#ffffff'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20,
                vx: (Math.random()-0.5)*45, vy: (Math.random()-0.8)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*25
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); 
                        x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,'bk',4,5,6,0,7,8,9].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key' + (k === 'bk' ? ' del' : '');
                b.innerText = k === 'bk' ? '⌫' : k;
                b.onclick = () => press(k);
                kp.appendChild(b);
            });
            generateQuestion();
        };
    </script>
</body>
</html>

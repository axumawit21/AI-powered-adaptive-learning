<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Garden Builder | ምድማርን ምጉዳልን ኣሃድታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --garden-green: #2ecc71;
            --sky-blue: #3498db;
            --flower-pink: #ff6b81;
            --sun-yellow: #f1c40f;
            --dirt-brown: #795548;
            --leaf-dark: #1b5e20;
            --white: #ffffff;
            --danger: #ff4757;
            --success: #2ed573;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: linear-gradient(180deg, #a1c4fd 0%, #c2e9fb 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2c3e50;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Animated Clouds */
        .cloud {
            position: fixed; background: white; border-radius: 50px; opacity: 0.8; z-index: 1;
            animation: moveCloud linear infinite;
        }
        .cloud::before, .cloud::after {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        .cloud1 { width: clamp(80px, 15vw, 120px); height: clamp(35px, 6vw, 50px); top: 10%; left: -150px; animation-duration: 35s; }
        .cloud2 { width: clamp(100px, 20vw, 160px); height: clamp(40px, 8vw, 60px); top: 20%; left: -200px; animation-duration: 55s; }
        @keyframes moveCloud { from { left: -200px; } to { left: 110vw; } }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; }

        header {
            width: 100%; max-width: 1100px; padding: clamp(10px, 3vw, 20px);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 10px;
        }

        .stat-group { display: flex; gap: clamp(5px, 2vw, 15px); flex-wrap: wrap; justify-content: center; flex: 1; }
        .pill {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 8px clamp(12px, 3vw, 25px); border-radius: 20px; border: 2.5px solid var(--white);
            display: flex; align-items: center; gap: 6px; font-weight: 700;
            box-shadow: 0 5px 10px var(--shadow); font-size: clamp(0.8rem, 2.5vw, 1.1rem);
        }
        .val { color: var(--leaf-dark); font-size: 1.1em; }

        .header-controls { display: flex; gap: 10px; align-items: center; }
        .icon-btn {
            background: white; border: none; width: clamp(40px, 10vw, 50px); height: clamp(40px, 10vw, 50px); border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; box-shadow: 0 5px 15px var(--shadow); transition: transform 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); }

        .lang-select {
            padding: 8px 12px; border-radius: 20px; border: 2.5px solid white;
            background: white; font-weight: bold; cursor: pointer; outline: none; font-size: 0.9rem;
            box-shadow: 0 5px 15px var(--shadow);
        }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            padding: clamp(10px, 4vw, 20px); gap: clamp(15px, 5vw, 40px); justify-content: center; align-items: center; z-index: 10;
        }

        .game-card {
            background: var(--white); border-radius: clamp(30px, 8vw, 50px); padding: clamp(20px, 6vw, 40px);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: clamp(15px, 4vw, 30px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.15); border: clamp(6px, 2vw, 15px) solid rgba(255,255,255,0.7);
            position: relative; overflow: hidden;
        }

        .garden-display {
            width: 100%; height: clamp(80px, 15vh, 120px); background: #f1f8e9; border-radius: 25px;
            border: 3px solid #c8e6c9; display: flex; align-items: flex-end;
            justify-content: center; padding: 10px; gap: 8px; position: relative;
        }
        .flower { font-size: clamp(1.8rem, 5vw, 2.5rem); animation: grow 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes grow { from { transform: scale(0) translateY(20px); } to { transform: scale(1) translateY(0); } }

        .title { font-size: clamp(1.4rem, 5vw, 2.5rem); font-weight: 900; color: var(--leaf-dark); text-transform: uppercase; letter-spacing: 1px; }
        .question-box {
            padding: clamp(20px, 5vw, 40px); background: #e8f5e9; border-radius: clamp(20px, 5vw, 40px);
            border: 3.5px dashed var(--garden-green); display: flex; flex-direction: column; gap: 10px;
            position: relative;
        }

        .operation-text { font-size: clamp(1.6rem, 5vw, 3.5rem); font-weight: 900; color: #1b5e20; letter-spacing: 1px; line-height: 1.2; }
        .sub-text { font-size: clamp(0.9rem, 3vw, 1.3rem); font-weight: 700; color: #555; }

        .ans-container {
            display: flex; align-items: center; justify-content: center; gap: clamp(10px, 4vw, 25px);
            margin: 10px 0; flex-wrap: wrap;
        }

        .ans-input-wrapper { display: flex; align-items: center; gap: 8px; }

        .ans-box {
            min-width: clamp(100px, 25vw, 150px); height: clamp(75px, 12vh, 120px); background: #fff; border-radius: clamp(15px, 4vw, 30px);
            display: flex; align-items: center; justify-content: center;
            color: var(--sky-blue); font-size: clamp(2.5rem, 9vw, 4.5rem); cursor: pointer;
            border: 7px solid var(--sky-blue); box-shadow: 0 8px 0 var(--sky-blue);
            font-family: 'Fredoka', monospace; font-weight: 900; transition: all 0.2s;
        }
        .ans-box.active { transform: scale(1.05); border-color: var(--sun-yellow); box-shadow: 0 8px 0 var(--sun-yellow); }
        .ans-box.small { min-width: clamp(80px, 20vw, 120px); height: clamp(65px, 10vh, 100px); font-size: clamp(2rem, 7vw, 3.5rem); border-width: 6px; }

        .unit-label { font-weight: 900; color: var(--leaf-dark); font-size: clamp(1.1rem, 3.5vw, 1.8rem); }

        /* Keypad */
        .keypad-section { width: 100%; max-width: 550px; display: flex; flex-direction: column; gap: 10px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(8px, 2vw, 15px); }
        .key {
            height: clamp(55px, 10vh, 85px); background: #fdfdfd; border: none; border-radius: clamp(12px, 3vw, 25px);
            font-size: clamp(1.4rem, 5vw, 2.5rem); font-weight: 800; color: #333; cursor: pointer;
            box-shadow: 0 5px 0 #ddd; transition: 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 1px 0 #ddd; }
        .key.del { color: var(--danger); }
        .key.check {
            grid-column: 1 / -1; background: var(--success); color: white;
            font-size: clamp(1.6rem, 6vw, 3rem); height: clamp(70px, 12vh, 100px); margin-top: 10px; border-radius: clamp(15px, 4vw, 30px);
            box-shadow: 0 8px 0 #219d53; font-weight: 900;
        }

        /* Feedback Overlay */
        #success-overlay, #error-overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000; padding: 30px;
        }
        #success-overlay { background: rgba(255, 255, 255, 0.96); }
        #error-overlay { background: rgba(255, 71, 87, 0.98); }
        .big-icon { font-size: clamp(5rem, 15vw, 10rem); margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }
        .x-mark { font-size: clamp(6rem, 20vw, 15rem); color: white; font-weight: 900; animation: shake 0.4s infinite; }
        @keyframes shake { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }

        /* Desktop specific styles - Keyboard Parallel with Question Box */
        @media (min-width: 1024px) {
            .container {
                flex-direction: row;
                align-items: stretch;
                padding: 40px;
                gap: 50px;
                max-width: 1400px;
            }
            .game-card {
                flex: 1.3;
                justify-content: center;
            }
            .keypad-section {
                flex: 0.7;
                max-width: 480px;
                justify-content: center;
            }
            .operation-text {
                font-size: 3rem;
            }
        }

        @media (max-width: 480px) {
            header { flex-direction: column; align-items: stretch; }
            .header-controls { justify-content: center; }
            .container { padding: 10px; gap: 15px; }
            .game-card { padding: 15px; border-width: 5px; }
            .operation-text { line-height: 1.1; }
        }
    </style>
</head>
<body>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="stat-group">
            <div class="pill">🌱 <span id="lblScore">ውፅኢት</span>: <span id="valScore" class="val">0</span></div>
            <div class="pill">👑 <span id="lblHigh">ዝለዓለ</span>: <span id="valHigh" class="val">0</span></div>
            <div class="pill">🌳 <span id="lblLvl">ደረጃ</span>: <span id="valLvl" class="val">1</span></div>
        </div>
        <div class="header-controls">
            <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="title" id="pageTitle">Garden Builder</h1>
            <div class="garden-display" id="gardenDisplay">
                <!-- Flowers bloom here based on score -->
            </div>
            <div class="question-box">
                <div id="operationDisplay" class="operation-text">---</div>
            </div>
            <div class="ans-container" id="ansContainer">
                <!-- Dynamic input boxes -->
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad" id="keypad"></div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ኣረጋግፅ (Confirm)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="big-icon">🌸</div>
        <h2 id="txtWin" style="font-size: clamp(2.5rem, 8vw, 4rem); color: var(--leaf-dark);">ንፉዕ!</h2>
        <p id="txtWinSub" style="font-size: clamp(1.2rem, 4vw, 2rem);">Correct operation!</p>
    </div>

    <div id="error-overlay">
        <div class="x-mark">✖</div>
        <h2 id="txtFail" style="font-size: clamp(2.5rem, 8vw, 4rem); color: white;">ጌጋ!</h2>
        <p id="txtFailSub" style="font-size: clamp(1.2rem, 4vw, 2rem); color: white;">Try Again</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "ምድማርን ምጉዳልን ኣሃድታት ንዉሓት", check: "ኣረጋግፅ", win: "ንፉዕ!", winsub: "ብትክክል ተመሊሱ!", fail: "ጌጋ!", failsub: "እንደገና ፈትን", score: "ውፅኢት", high: "ዝለዓለ", level: "ደረጃ", units: { mm: "ሚ.ሜ", cm: "ሳ.ሜ", m: "ሜ", km: "ኪ.ሜ" }, and: "ን" },
            am: { title: "የርቀት መለኪያዎችን መደመር እና መቀነስ", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "ትክክል!", fail: "ስህተት!", failsub: "እንደገና ይሞክሩ", score: "ውጤት", high: "ከፍተኛ", level: "ደረጃ", units: { mm: "ሚ.ሜ", cm: "ሳ.ሜ", m: "ሜ", km: "ኪ.ሜ" }, and: "እና" },
            en: { title: "Length Operations", check: "Confirm", win: "Great!", winsub: "Correct Answer!", fail: "Wrong!", failsub: "Try Again", score: "Score", high: "High", level: "Level", units: { mm: "mm", cm: "cm", m: "m", km: "km" }, and: "and" },
            om: { title: "Dheerina Ida'uu fi Hir'isuu", check: "Mirkaneessi", win: "Baay'ee Gaarii!", winsub: "Sirriidha!", fail: "Dogoggora!", failsub: "Irra deebi'i yaali", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa", units: { mm: "mm", cm: "cm", m: "m", km: "km" }, and: "fi" },
            so: { title: "Isugeynta & Ka-goynta", check: "Hubi", win: "Shaqo Fiican!", winsub: "Waa sax!", fail: "Khalad!", failsub: "Markale isku day", score: "Dhibco", high: "Sare", level: "Heerka", units: { mm: "mm", cm: "cm", m: "m", km: "km" }, and: "iyo" }
        };

        const flowerPool = ['🌻', '🌸', '🌼', '🌺', '🌷', '🌹', '💮', '🏵️'];
        let score = 0, lang = 'ti', currentTask = null, busy = false, muted = false;
        let activeInputIdx = 0, userVals = ["", ""]; 
        let highScore = parseInt(localStorage.getItem('unit_ops_high')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'tap') { o.type = 'sine'; o.frequency.setValueAtTime(600, n); g.gain.setValueAtTime(0.05, n); o.start(); o.stop(n + 0.1); }
            else if (type === 'win') { o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1)); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.5); }
            else if (type === 'err') { o.type = 'sawtooth'; o.frequency.setValueAtTime(120, n); o.frequency.exponentialRampToValueAtTime(40, n + 0.3); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.3); }
        }

        function toggleMute() { muted = !muted; document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊'; }

        function generateTask() {
            busy = false; userVals = ["", ""]; activeInputIdx = 0;
            const lvl = Math.floor(score / 100) + 1;
            
            const unitPairs = [
                { large: 'm', small: 'cm', factor: 100 },
                { large: 'km', small: 'm', factor: 1000 },
                { large: 'cm', small: 'mm', factor: 10 }
            ];
            const up = unitPairs[Math.floor(Math.random() * unitPairs.length)];
            const isAdd = Math.random() > 0.4;
            const isComplex = lvl > 1 && Math.random() > 0.4;

            let task = { op: isAdd ? '+' : '-' };

            if (!isComplex) {
                task.type = 'single';
                task.unit = Math.random() > 0.5 ? up.large : up.small;
                task.v1 = Math.floor(Math.random() * 50) + 10;
                task.v2 = isAdd ? (Math.floor(Math.random() * 40) + 5) : (Math.floor(Math.random() * task.v1) + 1);
                task.ans = isAdd ? (task.v1 + task.v2) : (task.v1 - task.v2);
            } else {
                task.type = 'double';
                task.u1 = up.large;
                task.u2 = up.small;
                task.targetU1 = up.large;
                task.targetU2 = up.small;

                if (isAdd) {
                    task.v1 = Math.floor(Math.random() * 10) + 1;
                    task.extra1 = Math.floor(Math.random() * up.factor);
                    task.v2 = Math.floor(Math.random() * 10) + 1;
                    task.extra2 = Math.floor(Math.random() * up.factor);
                    
                    let totalSmall = task.extra1 + task.extra2;
                    let carry = Math.floor(totalSmall / up.factor);
                    task.ans1 = task.v1 + task.v2 + carry;
                    task.ans2 = totalSmall % up.factor;
                } else {
                    task.v1 = Math.floor(Math.random() * 10) + 10;
                    task.extra1 = Math.floor(Math.random() * up.factor);
                    task.v2 = Math.floor(Math.random() * 5) + 1;
                    task.extra2 = Math.floor(Math.random() * up.factor);
                    
                    if (Math.random() > 0.5) task.extra1 = Math.floor(task.extra2 / 2);

                    let total1 = (task.v1 * up.factor) + task.extra1;
                    let total2 = (task.v2 * up.factor) + task.extra2;
                    let diff = total1 - total2;

                    task.ans1 = Math.floor(diff / up.factor);
                    task.ans2 = diff % up.factor;
                }
            }
            
            currentTask = task;
            renderUI();
            updateGarden();
        }

        function renderUI() {
            if (!currentTask) return;
            const t = i18n[lang];
            const u = t.units;
            document.getElementById('valLvl').innerText = Math.floor(score / 100) + 1;
            document.getElementById('valScore').innerText = score;
            document.getElementById('valHigh').innerText = highScore;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('pageTitle').innerText = t.title;

            const formatPart = (v, uL, e, uS) => {
                if (e === undefined || e === null) return `${v} ${u[uL]}`;
                let unitMain = u[uL];
                let conj = t.and;
                if (lang === 'ti' || lang === 'am') {
                    return `${v} ${unitMain}${conj} ${e} ${u[uS]}`;
                } else {
                    return `${v} ${unitMain} ${conj} ${e} ${u[uS]}`;
                }
            };

            let opStr = "";
            if (currentTask.type === 'single') {
                opStr = `${currentTask.v1}${u[currentTask.unit]} ${currentTask.op} ${currentTask.v2}${u[currentTask.unit]}`;
            } else {
                let p1 = formatPart(currentTask.v1, currentTask.u1, currentTask.extra1, currentTask.u2);
                let p2 = formatPart(currentTask.v2, currentTask.u1, currentTask.extra2, currentTask.u2);
                opStr = `${p1} ${currentTask.op} ${p2}`;
            }
            document.getElementById('operationDisplay').innerText = opStr;

            const container = document.getElementById('ansContainer');
            container.innerHTML = "";
            if (currentTask.type === 'single') {
                container.innerHTML = `
                    <div class="ans-box active" id="ans0" onclick="activeInputIdx=0; renderUI()">${userVals[0] || '?'}</div>
                    <div class="unit-label">${u[currentTask.unit]}</div>
                `;
            } else {
                container.innerHTML = `
                    <div class="ans-input-wrapper">
                        <div class="ans-box small ${activeInputIdx===0?'active':''}" id="ans0" onclick="activeInputIdx=0; renderUI()">${userVals[0] || '?'}</div>
                        <div class="unit-label">${u[currentTask.targetU1]}</div>
                    </div>
                    <div class="ans-input-wrapper">
                        <div class="ans-box small ${activeInputIdx===1?'active':''}" id="ans1" onclick="activeInputIdx=1; renderUI()">${userVals[1] || '?'}</div>
                        <div class="unit-label">${u[currentTask.targetU2]}</div>
                    </div>
                `;
            }
        }

        function press(k) {
            if (busy) return;
            sfx('tap');
            if (k === 'bk') {
                userVals[activeInputIdx] = userVals[activeInputIdx].slice(0, -1);
            } else if (k === '.') {
                if (!userVals[activeInputIdx].includes('.')) userVals[activeInputIdx] += '.';
            } else {
                if (userVals[activeInputIdx].length < 6) userVals[activeInputIdx] += k;
            }
            document.getElementById(`ans${activeInputIdx}`).innerText = userVals[activeInputIdx] || "?";
        }

        function checkAnswer() {
            if (busy || userVals[0] === "" || (currentTask.type === 'double' && userVals[1] === "")) return;
            let isCorrect = false;
            const val0 = parseFloat(userVals[0]);
            const val1 = parseFloat(userVals[1] || 0);

            if (currentTask.type === 'single') {
                isCorrect = Math.abs(val0 - currentTask.ans) < 0.001;
            } else {
                isCorrect = Math.abs(val0 - currentTask.ans1) < 0.001 && Math.abs(val1 - currentTask.ans2) < 0.001;
            }

            if (isCorrect) {
                score += (currentTask.type === 'double' ? 30 : 20);
                if (score > highScore) { highScore = score; localStorage.setItem('unit_ops_high', highScore); }
                handleWin();
            } else {
                handleErr();
            }
        }

        function handleWin() {
            busy = true; sfx('win'); burst(300);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            document.getElementById('txtWin').innerText = i18n[lang].win;
            document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
            setTimeout(() => { overlay.style.display = 'none'; generateTask(); }, 1800);
        }

        function handleErr() {
            busy = true; sfx('err');
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'flex';
            document.getElementById('txtFail').innerText = i18n[lang].fail;
            document.getElementById('txtFailSub').innerText = i18n[lang].failsub;
            setTimeout(() => { overlay.style.display = 'none'; userVals = ["", ""]; busy = false; renderUI(); }, 1200);
        }

        function updateGarden() {
            const garden = document.getElementById('gardenDisplay');
            const count = Math.min(10, Math.floor(score / 50));
            garden.innerHTML = "";
            for (let i = 0; i < count; i++) {
                const f = document.createElement('div');
                f.className = 'flower';
                f.innerText = flowerPool[i % flowerPool.length];
                garden.appendChild(f);
            }
        }

        function changeLang(l) { lang = l; renderUI(); }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#2ecc71','#3498db','#ff6b81','#f1c40f','#ffffff'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*40, vy: (Math.random()-1.2)*65,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 2.5, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,'.',0,'bk'].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; 
                if(k === 'bk') { b.innerText = '⌫'; b.classList.add('del'); }
                else b.innerText = k;
                b.onclick = () => press(k); 
                kp.appendChild(b);
            });
            generateTask();
        };
    </script>
</body>
</html>

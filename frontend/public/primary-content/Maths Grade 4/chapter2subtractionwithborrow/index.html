<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Borrowing Pro | ብምልቃሕ ምጉዳል</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f59e0b;
            --secondary: #10b981;
            --accent: #6366f1;
            --danger: #ef4444;
            --midnight: #0f172a;
            --gold-glow: rgba(245, 158, 11, 0.4);
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--midnight);
            background-image: 
                radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #1e1b4b 0%, transparent 40%);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #fff;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 1100px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 15px;
        }

        .badges { display: flex; gap: 10px; align-items: center; }
        .stat-pill { 
            background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 20px; font-weight: 800; font-size: 1rem; color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 8px;
        }
        .stat-val { color: var(--primary); }
        .high-score { border-color: var(--primary); }

        .btn-icon {
            background: white; border: none; width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--midnight); font-size: 1.2rem; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        .btn-icon:active { transform: scale(0.9); }

        .lang-select {
            padding: 10px 15px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.2); font: inherit; font-weight: bold; cursor: pointer;
            background: var(--midnight); color: #fff; outline: none;
        }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column; 
            padding: 10px; gap: 25px; z-index: 10; justify-content: center;
        }

        .game-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border-radius: 40px; padding: 40px 20px; 
            border: 4px solid rgba(255,255,255,0.1);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 15px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .game-title {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* Perfectly Aligned Vertical Math */
        .math-container {
            display: flex; flex-direction: column; align-items: flex-end; 
            width: fit-content; margin: 0 auto; position: relative;
            gap: 12px;
        }

        .row-grid { display: flex; gap: 20px; justify-content: flex-end; }
        
        .box-base {
            width: 85px; height: 110px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4.5rem; font-weight: 900; transition: 0.3s;
        }

        .digit-text { color: #fff; background: transparent; }
        
        .minus-sign { position: absolute; left: -75px; bottom: 135px; font-size: 5rem; color: var(--primary); }
        .math-line { width: calc(100% + 95px); height: 8px; background: #fff; border-radius: 4px; margin-right: -40px; }

        .borrow-box {
            width: 60px; height: 60px; background: rgba(255,255,255,0.05);
            border: 3px dashed rgba(255,255,255,0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: 900; color: #fbbf24;
            cursor: pointer; transition: 0.3s;
            margin: 0 12.5px;
        }
        .borrow-box.active { 
            background: #fff; border-style: solid; border-color: var(--primary); 
            color: var(--midnight); transform: scale(1.1); box-shadow: 0 0 20px var(--gold-glow);
        }

        .digit-box {
            background: rgba(255,255,255,0.05);
            border: 4px dashed rgba(255,255,255,0.2);
            color: var(--secondary);
            cursor: pointer;
        }
        .digit-box.active { 
            background: white; border-style: solid; border-color: var(--secondary); 
            color: var(--midnight); transform: scale(1.05); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4);
        }
        .digit-box.wrong { border-color: var(--danger); background: rgba(239, 68, 68, 0.3); animation: shake 0.4s; }

        /* Keypad Section */
        .keypad-section {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; }

        .key {
            height: 75px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.1); border-radius: 20px;
            font-size: 2.2rem; font-weight: 800; color: #fff; cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .key.del { background: rgba(239, 68, 68, 0.15); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }
        
        .key.check { 
            width: 100%;
            background: var(--primary); 
            color: var(--midnight); 
            box-shadow: 0 10px 0 #b45309; 
            font-size: 2.2rem; 
            height: 95px; 
            margin-top: 10px;
            text-transform: uppercase; 
            letter-spacing: 4px;
            border-radius: 25px;
            font-weight: 900;
        }
        .key.check:active { transform: translateY(6px); box-shadow: 0 4px 0 #b45309; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 15rem; color: white; opacity: 0.5; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(245, 158, 11, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: var(--midnight); text-align: center;
            backdrop-filter: blur(15px); padding: 20px;
        }
        #success-overlay h2 { font-size: 4.5rem; margin-top: 20px; text-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        /* Media Queries */
        @media (max-width: 768px) {
            .box-base { width: 60px; height: 80px; font-size: 2.8rem; border-radius: 12px; }
            .borrow-box { width: 40px; height: 40px; font-size: 1.4rem; margin: 0 10px; }
            .row-grid { gap: 10px; }
            .minus-sign { left: -55px; bottom: 100px; font-size: 3.5rem; }
            .math-line { width: calc(100% + 75px); }
            .key { height: 65px; font-size: 1.8rem; }
            .key.check { height: 80px; font-size: 1.8rem; }
            .game-card { padding: 30px 15px; }
            .game-title { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            .box-base { width: 45px; height: 65px; font-size: 2.2rem; border-radius: 10px; border-width: 3px; }
            .borrow-box { width: 32px; height: 32px; font-size: 1.1rem; margin: 0 6.5px; }
            .row-grid { gap: 8px; }
            .minus-sign { left: -45px; bottom: 80px; font-size: 2.8rem; }
            .math-line { width: calc(100% + 60px); margin-right: -30px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-left">
            <button class="btn-icon" id="muteBtn" onclick="toggleMute()" title="Sound Toggle">🔊</button>
            <div class="badges">
                <div class="stat-pill high-score">
                    <span id="highLabel" class="stat-label">ዝለዓለ</span>
                    <span id="highScoreVal">0</span>
                </div>
                <div class="stat-pill">
                    <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                    <span id="scoreVal">0</span>
                </div>
                <div class="stat-pill">
                    <span id="lvlLabel" class="stat-label">ደረጃ</span>
                    <span id="levelVal">1</span>
                </div>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="game-title" id="pageTitle">ብምልቃሕ ምጉዳል</h1>
            
            <div class="math-container">
                <div class="row-grid" id="borrowRow"></div>
                <div class="row-grid" id="num1Row"></div>
                <div class="row-grid" id="num2Row">
                    <span class="plus-sign minus-sign">-</span>
                </div>
                <div class="math-line"></div>
                <div class="row-grid" id="answerRow"></div>
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad" id="keypad"></div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ኣረጋግፅ (Check)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 8rem; animation: rotate 2s linear infinite;">🌟</div>
        <h2 id="txtWin">ፅቡቅ ስራሕ!</h2>
        <p style="font-size: 1.5rem;" id="txtWinSub">ብትኽክል መሊስካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "ብምልቃሕ ምጉዳል", win: "ብጣዕሚ ጎበዝ!", winsub: "ብትኽክል ተመሊሱ!", level: "ደረጃ", score: "ነጥቢ", high: "ዝለዓለ", check: "ኣረጋግፅ" },
            am: { title: "ብድር ያለበት መቀነስ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", level: "ደረጃ", score: "ነጥብ", high: "ከፍተኛ", check: "አረጋግጥ" },
            en: { title: "Subtraction (With Borrow)", win: "Great Job!", winsub: "You answered correctly!", level: "Level", score: "Score", high: "High", check: "Check" },
            om: { title: "Hir'isuu (Ergaa kan qabu)", win: "Guddina!", winsub: "Sirriitti deebisteetta!", level: "Sadarkaa", score: "Qabxii", high: "Olaanaa", check: "Mirkaneessi" },
            so: { title: "Kala-goyn (Sidasho leh)", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad uga jawaabtay!", level: "Heerka", score: "Dhibco", high: "Sare", check: "Hubi" }
        };

        let score = 0, level = 1, lang = 'ti', currentQuestion = null, muted = false;
        let activeIdx = { type: 'ans', idx: 0 }; 
        let userDigits = []; 
        let userBorrows = [];
        let highScore = parseInt(localStorage.getItem('sub_borrow_arch_high')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046, 1318].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateQuestion() {
            let digitCount = level === 1 ? 3 : (level === 2 ? 4 : (level === 3 ? 5 : 6));
            let n1Arr = [], n2Arr = [];
            
            // To ensure borrowing, we purposefully make d2 > d1 in at least one column
            let forcedBorrowIdx = Math.floor(Math.random() * (digitCount - 1));

            for (let i = 0; i < digitCount; i++) {
                let d1 = Math.floor(Math.random() * 9);
                if (i === digitCount - 1) d1 = Math.max(3, d1); // Ensure leading digit is large enough
                
                let d2;
                if (i === forcedBorrowIdx) {
                    d1 = Math.floor(Math.random() * 5); // 0-4
                    d2 = Math.floor(Math.random() * 4) + 6; // 6-9 (d2 > d1)
                } else {
                    d2 = Math.floor(Math.random() * (d1 + 1));
                }
                
                n1Arr.unshift(d1); n2Arr.unshift(d2);
            }

            const n1 = parseInt(n1Arr.join(''));
            const n2 = parseInt(n2Arr.join(''));
            if (n1 < n2) return generateQuestion(); // Safety fallback

            const ans = n1 - n2;
            const ansArr = ans.toString().padStart(digitCount, '0').split('').map(Number);

            currentQuestion = { n1, n2, ans, n1Arr: n1Arr.reverse(), n2Arr: n2Arr.reverse(), digitCount };
            userDigits = new Array(digitCount).fill("?");
            userBorrows = new Array(digitCount).fill(""); 
            activeIdx = { type: 'ans', idx: 0 }; 
            renderLevel();
        }

        function renderLevel() {
            const q = currentQuestion;
            const t = i18n[lang];
            document.getElementById('pageTitle').innerText = t.title;
            
            const rows = {
                borrow: document.getElementById('borrowRow'),
                num1: document.getElementById('num1Row'),
                num2: document.getElementById('num2Row'),
                ans: document.getElementById('answerRow')
            };

            Object.values(rows).forEach(r => {
                const plus = r.querySelector('.minus-sign');
                r.innerHTML = '';
                if(plus) r.appendChild(plus);
            });

            for (let i = q.digitCount - 1; i >= 0; i--) {
                // Borrow Note Box
                const bBox = document.createElement('div');
                bBox.className = 'borrow-box';
                bBox.innerText = userBorrows[i];
                if (activeIdx.type === 'borrow' && activeIdx.idx === i) bBox.classList.add('active');
                bBox.onclick = () => { sfx('tap'); activeIdx = { type: 'borrow', idx: i }; renderLevel(); };
                rows.borrow.appendChild(bBox);

                // Num1 Box
                const n1Box = document.createElement('div');
                n1Box.className = 'box-base digit-text';
                n1Box.innerText = q.n1Arr[i];
                rows.num1.appendChild(n1Box);

                // Num2 Box
                const n2Box = document.createElement('div');
                n2Box.className = 'box-base digit-text';
                n2Box.innerText = q.n2Arr[i];
                rows.num2.appendChild(n2Box);

                // Ans Box
                const aBox = document.createElement('div');
                aBox.className = 'box-base digit-box';
                aBox.innerText = userDigits[i];
                if (activeIdx.type === 'ans' && activeIdx.idx === i) aBox.classList.add('active');
                aBox.onclick = () => { sfx('tap'); activeIdx = { type: 'ans', idx: i }; renderLevel(); };
                rows.ans.appendChild(aBox);
            }

            updateStats();
        }

        function press(k) {
            sfx('tap');
            if (k === 'bk') {
                if (activeIdx.type === 'ans') userDigits[activeIdx.idx] = "?";
                else userBorrows[activeIdx.idx] = "";
            } else {
                if (activeIdx.type === 'ans') {
                    userDigits[activeIdx.idx] = k;
                    if (activeIdx.idx < currentQuestion.digitCount - 1) {
                        // Advance to next column's answer or current column's borrow?
                        // Usually students borrow first. Let's auto-switch to next answer.
                        activeIdx = { type: 'ans', idx: activeIdx.idx + 1 };
                    }
                } else {
                    userBorrows[activeIdx.idx] = (userBorrows[activeIdx.idx] + k).slice(-2);
                }
            }
            renderLevel();
        }

        function checkAnswer() {
            if (userDigits.includes("?")) { handleError(); return; }
            const userTotal = parseInt(userDigits.slice().reverse().join(''));
            if (userTotal === currentQuestion.ans) handleSuccess();
            else handleError();
        }

        function handleSuccess() {
            score += 10;
            if (score > highScore) { highScore = score; localStorage.setItem('sub_borrow_arch_high', highScore); }
            level = Math.floor(score / 50) + 1;
            sfx('win'); burst(500);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.style.display = 'none'; generateQuestion(); }, 2000);
        }

        function handleError() {
            sfx('err');
            document.getElementById('gameCard').classList.add('shake');
            document.getElementById('error-screen').style.display = 'flex';
            document.querySelectorAll('.digit-box').forEach(b => b.classList.add('wrong'));
            setTimeout(() => {
                document.getElementById('gameCard').classList.remove('shake');
                document.getElementById('error-screen').style.display = 'none';
                document.querySelectorAll('.digit-box').forEach(b => b.classList.remove('wrong'));
            }, 600);
        }

        function updateStats() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('scoreLabel').innerText = t.score;
            document.getElementById('lvlLabel').innerText = t.level;
            document.getElementById('highLabel').innerText = t.high;
            document.getElementById('btnCheck').innerText = t.check;
        }

        function changeLang(l) { lang = l; renderLevel(); }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#f59e0b', '#10b981', '#6366f1', '#fbbf24', '#ffffff'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.8)*45,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*15
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.6; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,0].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; b.innerText = k; b.onclick = () => press(k); kp.appendChild(b);
            });
            const del = document.createElement('button');
            del.className = 'key del'; del.innerText = '⌫'; del.onclick = () => press('bk'); kp.appendChild(del);
            generateQuestion();
        };
    </script>
</body>
</html>

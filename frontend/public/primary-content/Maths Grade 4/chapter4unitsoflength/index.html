<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Length Lab Pro | መዐቀንታት ንውሓት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2fe;
            --neon-purple: #a855f7;
            --neon-pink: #ec4899;
            --cyber-dark: #020617;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --success: #10b981;
            --danger: #ef4444;
            --amber: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--cyber-dark);
            background-image: 
                radial-gradient(at 0% 0%, #1e1b4b 0px, transparent 50%),
                radial-gradient(at 100% 0%, #312e81 0px, transparent 50%),
                radial-gradient(at 50% 100%, #0f172a 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
            transition: background-color 0.3s;
        }

        /* Animated Data Particles */
        .particle {
            position: fixed; background: white; border-radius: 50%; pointer-events: none; opacity: 0.1;
            animation: floatParticle 10s infinite linear; z-index: 0;
        }
        @keyframes floatParticle {
            0% { transform: translateY(110vh) translateX(0); }
            100% { transform: translateY(-10vh) translateX(20px); }
        }

        body.wrong-flash { background-color: #450a0a !important; animation: glitch 0.2s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            50% { transform: translate(-5px, 2px); }
            100% { transform: translate(5px, -2px); }
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; }

        header {
            width: 100%;
            max-width: 1200px;
            padding: env(safe-area-inset-top, 20px) 20px 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .badges { display: flex; gap: 10px; align-items: center; }
        .stat-pill { 
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 15px; font-weight: 800; font-size: 0.9rem;
            border: 1px solid var(--glass-border); display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .stat-val { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }
        .high-score-pill { border-color: var(--amber); }
        .high-score-pill .stat-val { color: var(--amber); }

        .btn-mute {
            background: rgba(255,255,255,0.1); border: 2px solid var(--glass-border);
            color: white; width: 45px; height: 45px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; transition: 0.2s;
        }
        .btn-mute:active { transform: scale(0.9); }

        .lang-select {
            padding: 10px 15px; border-radius: 15px; border: 2px solid var(--neon-blue);
            background: #1e1b4b; color: white; font: inherit; font-weight: bold;
            cursor: pointer; outline: none; box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .container {
            flex: 1; width: 100%; max-width: 1300px; display: flex; flex-direction: column; 
            padding: 10px 20px; gap: 20px; z-index: 10; justify-content: center; align-items: center;
        }

        .game-card {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(30px);
            border-radius: 45px; padding: 40px 30px; 
            border: 4px solid var(--glass-border);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            width: 100%; max-width: 800px; text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .problem-title {
            font-size: 1.8rem; font-weight: 900; color: var(--neon-blue);
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
            margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;
        }

        .question-text { font-size: 1.4rem; font-weight: 700; color: #cbd5e1; margin-bottom: 25px; }

        /* Ruler Visualization */
        .visual-hub {
            height: 160px; width: 100%; position: relative; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin-bottom: 25px;
        }
        
        .ruler-body {
            width: 100%; height: 80px; background: #fffbeb; border: 4px solid #d97706;
            border-radius: 15px; display: flex; align-items: flex-end; position: relative;
            box-shadow: 0 10px 30px rgba(217, 119, 6, 0.2);
        }

        .laser-line {
            height: 12px; background: linear-gradient(90deg, var(--neon-pink), #ff00ff); 
            border-radius: 10px; position: absolute; top: -35px; left: 4px; 
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 25px var(--neon-pink), 0 0 5px white;
            border: 2px solid white;
        }
        .laser-line::after {
            content: 'SCANNING...'; position: absolute; top: -20px; right: 0; font-size: 0.6rem;
            color: var(--neon-pink); font-weight: 900; letter-spacing: 1px;
        }

        .tick { flex: 1; height: 18px; border-left: 1px solid #d97706; opacity: 0.5; }
        .tick.major { height: 40px; border-left: 3px solid #b45309; position: relative; opacity: 1; }
        .tick.major::after {
            content: attr(data-num); position: absolute; top: -30px; left: -8px;
            font-size: 14px; font-weight: 900; color: #b45309;
        }

        /* Interactive Area */
        .interactive-panel {
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 25px; flex-wrap: wrap;
        }

        .unit-display {
            padding: 15px 30px; background: rgba(0, 242, 254, 0.08); border-radius: 20px; 
            border: 2px solid rgba(0, 242, 254, 0.3);
            color: var(--neon-blue); font-family: monospace; font-size: 2rem; font-weight: 900;
        }

        .ans-box {
            min-width: 140px; height: 95px; background: rgba(255,255,255,0.05); border-radius: 25px;
            display: flex; align-items: center; justify-content: center;
            color: var(--neon-blue); font-size: 3.5rem; cursor: pointer;
            border: 5px dashed var(--neon-blue); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 0 20px; font-family: 'Fredoka', sans-serif;
        }
        .ans-box.active { border-style: solid; background: white; color: var(--cyber-dark); box-shadow: 0 0 50px var(--neon-blue); transform: scale(1.05); }
        .ans-box.wrong { border-color: var(--danger) !important; background: rgba(239, 68, 68, 0.3) !important; color: white !important; }

        /* Categorization Buttons */
        .choice-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; margin: 0 auto; }
        .choice-btn {
            background: rgba(255,255,255,0.05); border: 2px solid var(--glass-border); padding: 25px;
            border-radius: 25px; font-weight: 800; cursor: pointer; transition: 0.2s;
            color: white; font-size: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .choice-btn:hover { background: rgba(255,255,255,0.1); border-color: var(--neon-blue); transform: translateY(-5px); }
        .choice-btn .sub-text { font-size: 0.8rem; color: #94a3b8; font-weight: 400; text-transform: uppercase; }
        .choice-btn.correct { background: var(--success) !important; border-color: white; box-shadow: 0 0 30px var(--success); }
        .choice-btn.wrong { background: var(--danger) !important; border-color: white; box-shadow: 0 0 30px var(--danger); animation: shake 0.4s; }

        /* Numeric Keypad */
        .keypad-section { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; width: 100%; }
        .key {
            height: 75px; background: rgba(255,255,255,0.08); border: 2px solid var(--glass-border); border-radius: 20px;
            font-size: 2.2rem; font-weight: 800; color: #fff; cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.4); transition: all 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
        .key.del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: rgba(239, 68, 68, 0.2); }

        .btn-check { 
            grid-column: span 4; background: linear-gradient(to right, var(--success), #059669); 
            color: white; box-shadow: 0 8px 0 #064e3b; font-size: 2.2rem; height: 95px; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 2px; border-radius: 25px; font-weight: 900;
            border: none; cursor: pointer;
        }
        .btn-check:active { transform: translateY(6px); box-shadow: 0 2px 0 #064e3b; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px); } 75% { transform: translateX(12px); } }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 5500; color: white; text-align: center;
            backdrop-filter: blur(20px);
        }
        .win-icon { font-size: 10rem; margin-bottom: 20px; animation: glow 2s infinite alternate; }
        @keyframes glow { from { filter: drop-shadow(0 0 10px var(--neon-blue)); } to { filter: drop-shadow(0 0 40px var(--neon-blue)); } }

        @media (min-width: 1024px) {
            .container { flex-direction: row; gap: 60px; padding: 40px; }
            .game-card { flex: 1.4; padding: 60px 40px; max-width: none; }
            .keypad-section { flex: 0.6; }
        }

        @media (max-width: 600px) {
            .ans-box { min-width: 110px; height: 80px; font-size: 2.8rem; }
            .key { height: 60px; font-size: 1.8rem; }
            .choice-btn { padding: 15px; font-size: 1.2rem; }
            .problem-title { font-size: 1.4rem; }
            header { padding: 10px; flex-wrap: wrap; justify-content: center; }
            .badges { width: 100%; justify-content: center; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="badges">
            <div class="stat-pill">🆙 <span id="lblLvl">ደረጃ</span>: <span id="valLvl" class="stat-val">1</span></div>
            <div class="stat-pill high-score-pill">👑 <span id="lblHigh">ዝለዓለ</span>: <span id="valHigh" class="stat-val">0</span></div>
            <div class="stat-pill">⭐ <span id="lblScore">Score</span>: <span id="valScore" class="stat-val">0</span></div>
        </div>
        <div class="header-controls">
            <button class="btn-mute" id="btnMute" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="problem-title" id="pageTitle">መዐቀንታት ንውሓት</h1>
            <p id="questionText" class="question-text">Loading...</p>
            
            <div class="visual-hub" id="visualHub" style="display:none">
                <div class="ruler-body">
                    <div id="laserLine" class="laser-line"></div>
                    <div id="rulerTicks" style="display:contents"></div>
                </div>
            </div>

            <div class="interactive-panel" id="interactivePanel">
                <!-- Injected via JS -->
            </div>
            
            <div class="choice-grid" id="choiceGrid" style="display:none">
                <!-- Buttons injected via JS -->
            </div>
        </div>

        <div class="keypad-section" id="keypadSection">
            <div class="keypad" id="keypad"></div>
            <button class="btn-check" id="btnCheck" onclick="checkAnswer()">ፈትሽ (Check)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="win-icon">📐</div>
        <h2 id="txtWin" style="font-size: 4.5rem; color: var(--neon-blue);">ንኡድ ስራሕ!</h2>
        <p style="font-size: 2.2rem; opacity: 0.8;" id="txtWinSub">ብትኽክል መሊስካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "መዐቀንታት ንውሓት", check: "ፈትሽ", win: "ንኡድ ስራሕ!", winsub: "ብትኽክል መሊስካዮ ኣለኻ!", score: "ነጥቢ", high: "ዝለዓለ", level: "ደረጃ", qRuler: "ነዛ ሌዘር መስመር ዓቅና (cm)!", qConvert: "መልኡ:", qWhich: "ዝበለፀ ኣሃድ ኣየናይ እዩ?", mm: "ሚሜ", cm: "ሴሜ", m: "ሜ", km: "ኪሜ" },
            am: { title: "የርዝመት መለኪያዎች", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", score: "ነጥብ", high: "ከፍተኛ", level: "ደረጃ", qRuler: "ይህንን የሌዘር መስመር ይለኩ (cm)!", qConvert: "ሙሉ:", qWhich: "ትክክለኛው መለኪያ የትኛው ነው?", mm: "ሚሜ", cm: "ሴሜ", m: "ሜ", km: "ኪሜ" },
            en: { title: "Length Units", check: "Check", win: "Great Job!", winsub: "You answered correctly!", score: "Score", high: "High", level: "Level", qRuler: "Measure the laser line (cm)!", qConvert: "Complete:", qWhich: "Which unit is best?", mm: "mm", cm: "cm", m: "m", km: "km" },
            om: { title: "Safartuu Dheerinaa", check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriitti deebisteetta!", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa", qRuler: "Saffartuu kana safari (cm)!", qConvert: "Guuti:", qWhich: "Safartuu isa kami?", mm: "mm", cm: "sm", m: "m", km: "km" },
            so: { title: "Cabbirka Dhererka", check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad u jawaabtay!", score: "Dhibco", high: "Sare", level: "Heerka", qRuler: "Cabbir khadkan (cm)!", qConvert: "Buuxi:", qWhich: "Waa kuwee cabbirka ugu fiican?", mm: "mm", cm: "cm", m: "m", km: "km" }
        };

        const taskData = {
            objects: {
                ti: ["ርሳስ (Pencil)", "ካብ መቐለ ናብ ዓዲግራት (Mekelle to Adigrat)", "ሓሰኻ (Tiny Bug)", "ገዛ (House)", "ቆፅሊ (Leaf)", "ስንታሕ (Grain)"],
                am: ["እርሳስ (Pencil)", "ከመቐለ ወደ አዲግራት (Mekelle to Adigrat)", "ትንሽ ነፍሳት (Tiny Bug)", "ቤት (House)", "ቅጠል (Leaf)", "የስንዴ ቅንጣት (Grain)"],
                en: ["Pencil", "Distance between cities", "Small bug", "House", "Leaf", "Grain of rice"],
                om: ["Qalamii (Pencil)", "Mekelle gara Adigrat", "Ilbiisa (Tiny Bug)", "Mana (House)", "Baala (Leaf)", "Midhaan (Grain)"],
                so: ["Qalin (Pencil)", "Mekelle ilaa Adigrat", "Cayayaan (Small bug)", "Guri (House)", "Caleen (Leaf)", "Hadhuudh (Grain)"]
            },
            objUnits: ["cm", "km", "mm", "m", "cm", "mm"]
        };

        let state = {
            lang: 'ti', score: 0, level: 1,
            highScore: parseInt(localStorage.getItem('length_lab_high')) || 0,
            task: null, userVal: "",
            busy: false, muted: false, particles: []
        };

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSfx(type) {
            if (state.muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.6);
                o.start(); o.stop(n + 0.6);
            } else if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.05, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function createParticles() {
            for(let i=0; i<12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                p.style.animationDelay = (Math.random() * 5) + 's';
                document.body.appendChild(p);
            }
        }

        function generate() {
            state.busy = false; state.userVal = "";
            state.level = Math.floor(state.score / 50) + 1;
            
            const r = Math.random();
            if (r < 0.4) {
                state.task = { type: 'ruler', ans: Math.floor(Math.random() * 9) + 1 };
            } else if (r < 0.7) {
                const sub = Math.random();
                if (sub < 0.34) state.task = { type: 'conv', q: '1 cm', unit: 'mm', ans: 10 };
                else if (sub < 0.67) state.task = { type: 'conv', q: '1 m', unit: 'cm', ans: 100 };
                else state.task = { type: 'conv', q: '1 km', unit: 'm', ans: 1000 };
            } else {
                const idx = Math.floor(Math.random() * taskData.objUnits.length);
                state.task = { type: 'which', idx: idx, ans: taskData.objUnits[idx] };
            }
            render();
        }

        function render() {
            const t = i18n[state.lang];
            const qEl = document.getElementById('questionText');
            const visual = document.getElementById('visualHub');
            const panel = document.getElementById('interactivePanel');
            const grid = document.getElementById('choiceGrid');
            const kpSection = document.getElementById('keypadSection');

            document.getElementById('valScore').innerText = state.score;
            document.getElementById('valHigh').innerText = state.highScore;
            document.getElementById('valLvl').innerText = state.level;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('btnCheck').innerText = t.check;

            panel.innerHTML = '';
            grid.innerHTML = '';
            grid.style.display = 'none';
            kpSection.style.display = 'flex';
            visual.style.display = 'none';

            if (state.task.type === 'ruler') {
                qEl.innerText = t.qRuler;
                visual.style.display = 'flex';
                initRuler(state.task.ans);
                panel.innerHTML = `<div class="ans-box active" id="ansBox">?</div> <span style="font-size:2rem; font-weight:800; color:var(--neon-pink)">cm</span>`;
            } else if (state.task.type === 'conv') {
                qEl.innerText = t.qConvert;
                panel.innerHTML = `<div class="unit-display">${state.task.q}</div> <span style="color:var(--neon-pink)">=</span> <div class="ans-box active" id="ansBox">?</div> <span style="font-size:2rem; font-weight:800; color:var(--neon-pink)">${state.task.unit}</span>`;
            } else {
                qEl.innerText = t.qWhich;
                kpSection.style.display = 'none';
                grid.style.display = 'grid';
                panel.innerHTML = `<div class="unit-display" style="font-size:1.5rem; border-color:var(--neon-purple); color:var(--neon-purple);">${taskData.objects[state.lang][state.task.idx]}</div>`;
                ['mm', 'cm', 'm', 'km'].forEach(u => {
                    const b = document.createElement('button');
                    b.className = 'choice-btn';
                    b.innerHTML = `${t[u]} <span class="sub-text">${u}</span>`;
                    b.onclick = () => selectChoice(u, b);
                    grid.appendChild(b);
                });
            }
            updateAnsBox();
        }

        function initRuler(val) {
            const ticks = document.getElementById('rulerTicks');
            ticks.innerHTML = '';
            for (let i = 0; i <= 10; i++) {
                const tick = document.createElement('div');
                tick.className = 'tick major';
                tick.setAttribute('data-num', i);
                ticks.appendChild(tick);
                if (i < 10) {
                    for (let j = 0; j < 9; j++) {
                        const m = document.createElement('div');
                        m.className = 'tick';
                        ticks.appendChild(m);
                    }
                }
            }
            // Accurate width based on 100% ruler width / 10 major segments
            setTimeout(() => {
                document.getElementById('laserLine').style.width = `calc(${val * 10}% - 8px)`;
            }, 50);
        }

        function press(k) {
            if (state.busy) return;
            playSfx('tap');
            if (k === 'bk') state.userVal = state.userVal.slice(0, -1);
            else if (state.userVal.length < 5) state.userVal += k;
            updateAnsBox();
        }

        function updateAnsBox() {
            const box = document.getElementById('ansBox');
            if (box) box.innerText = state.userVal || "?";
        }

        function selectChoice(u, btn) {
            if (state.busy) return;
            if (u === state.task.ans) {
                btn.classList.add('correct');
                handleWin();
            } else {
                btn.classList.add('wrong');
                handleErr();
            }
        }

        function checkAnswer() {
            if (state.busy || state.userVal === "") return;
            if (parseInt(state.userVal) === state.task.ans) handleWin();
            else handleErr();
        }

        function handleWin() {
            state.busy = true;
            state.score += 10;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('length_lab_high', state.highScore);
            }
            playSfx('win'); burst(300);
            document.getElementById('success-overlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('success-overlay').style.display = 'none';
                generate();
            }, 2500);
        }

        function handleErr() {
            playSfx('err');
            document.body.classList.add('wrong-flash');
            document.getElementById('gameCard').classList.add('shake');
            const box = document.getElementById('ansBox');
            if (box) box.classList.add('wrong');
            
            setTimeout(() => {
                document.body.classList.remove('wrong-flash');
                document.getElementById('gameCard').classList.remove('shake');
                if (box) box.classList.remove('wrong');
                state.userVal = "";
                render();
            }, 800);
        }

        function changeLang(l) { state.lang = l; render(); }
        function toggleMute() { state.muted = !state.muted; document.getElementById('btnMute').innerText = state.muted ? '🔇' : '🔊'; }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#00f2fe','#a855f7','#ec4899','#ffffff','#10b981','#f59e0b'];
            for(let i=0; i<count; i++) state.particles.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*40, vy: (Math.random()-0.9)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 2.0, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            if(!window.animLoop) { window.animLoop=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=state.particles.length-1; i>=0; i--){
                    const p=state.particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.015; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else state.particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.animLoop=false;
            })()}
        }

        window.onload = () => {
            createParticles();
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,'bk',0].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key' + (k==='bk' ? ' del' : '');
                b.innerText = k === 'bk' ? '⌫' : k;
                b.onclick = () => press(k);
                kp.appendChild(b);
            });
            generate();
        };
    </script>
</body>
</html>

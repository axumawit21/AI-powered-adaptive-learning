<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capacity Compare | ምውድዳር ትሕዝቶ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-purple: #1e1b4b;
            --liquid-cyan: #06b6d4;
            --liquid-blue: #3b82f6;
            --liquid-pink: #f43f5e;
            --white: #ffffff;
            --error-red: #ef4444;
            --success-green: #22c55e;
            --gold: #d97706;
            --shadow: rgba(0, 0, 0, 0.15);
            --sky: #87ceeb;
            --grass: #4ade80;
            --hill: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--sky);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--deep-purple); overflow: hidden; transition: background 0.3s ease;
            position: relative;
        }

        /* Cartoon Background Elements */
        .landscape {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 35vh;
            background: var(--grass); z-index: 1;
            border-top: 10px solid rgba(0,0,0,0.05);
        }
        .hill {
            position: fixed; bottom: 30vh; width: 150%; height: 200px;
            background: var(--hill); border-radius: 50%; z-index: 0; opacity: 0.6;
        }
        .hill-1 { left: -25%; bottom: 25vh; }
        .hill-2 { right: -25%; bottom: 22vh; background: #16a34a; }

        .sun {
            position: fixed; top: 40px; right: 40px; width: 80px; height: 80px;
            background: #facc15; border-radius: 50%; z-index: 0;
            box-shadow: 0 0 40px #fde047;
            animation: sunGlow 3s infinite alternate;
        }
        @keyframes sunGlow { from { transform: scale(1); box-shadow: 0 0 30px #fde047; } to { transform: scale(1.1); box-shadow: 0 0 60px #fde047; } }

        .cloud {
            position: fixed; background: white; border-radius: 50px; opacity: 0.8; z-index: 0;
            animation: moveCloud linear infinite;
        }
        .cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
        .cloud1 { width: 120px; height: 45px; top: 10%; left: -150px; animation-duration: 40s; }
        .cloud2 { width: 160px; height: 55px; top: 25%; left: -200px; animation-duration: 60s; }
        @keyframes moveCloud { from { left: -250px; } to { left: 110vw; } }

        body.wrong-bg { background: var(--error-red) !important; color: white !important; }
        body.wrong-bg .landscape, body.wrong-bg .hill, body.wrong-bg .sun, body.wrong-bg .cloud { display: none; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; }

        header {
            width: 100%; max-width: 1100px; padding: 20px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 10px;
        }

        .stat-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
            padding: 10px 18px; border-radius: 20px; border: 3px solid var(--white);
            font-weight: 800; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            color: var(--deep-purple);
        }
        .stat-val { color: var(--gold); font-size: 1.1rem; }

        .header-controls { display: flex; gap: 10px; align-items: center; }
        .icon-btn {
            background: white; border: 3px solid #e2e8f0; width: 44px; height: 44px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; box-shadow: 0 4px 10px var(--shadow); transition: 0.2s;
        }
        .icon-btn:active { transform: scale(0.9); }

        .container {
            flex: 1; width: 100%; max-width: 900px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; padding: 20px; z-index: 10; gap: 30px;
            margin-bottom: 5vh;
        }

        .balance-stage {
            position: relative; width: 100%; height: 350px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            transition: transform 0.3s ease;
        }

        .shake { animation: shakeAnim 0.4s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px); }
            40%, 80% { transform: translateX(15px); }
        }

        .beam-wrapper {
            width: 100%; height: 20px; position: absolute; top: 35%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: space-between; align-items: center;
        }

        .beam {
            width: 100%; height: 16px; background: #64748b; border-radius: 10px;
            position: relative; border-bottom: 5px solid #475569;
        }

        .plate {
            width: clamp(140px, 25vw, 200px); height: 12px; background: #475569; border-radius: 6px;
            position: absolute; bottom: -140px; display: flex; justify-content: center;
        }
        .plate-left { left: -20px; }
        .plate-right { right: -20px; }

        .beaker {
            width: clamp(100px, 20vw, 130px); height: clamp(130px, 25vh, 160px); 
            background: rgba(255,255,255,0.85);
            border: 6px solid var(--deep-purple); border-top: none; border-radius: 0 0 30px 30px;
            position: absolute; bottom: 10px; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1), inset 0 0 20px rgba(255,255,255,0.5);
        }

        .liquid {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            background: linear-gradient(to top, var(--liquid-blue), var(--liquid-cyan));
            opacity: 0.95; transition: height 0.5s;
        }

        .beaker-label {
            position: relative; z-index: 5; font-size: clamp(1.4rem, 4.5vw, 2.2rem); font-weight: 900;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.9); text-align: center;
            line-height: 1.1; color: var(--deep-purple);
        }
        .beaker-unit { font-size: 0.75em; display: block; opacity: 0.9; }

        .base-pillar { width: 40px; height: 60%; background: #64748b; border-radius: 12px; border-right: 5px solid #475569; }
        .base-floor { width: 220px; height: 40px; background: #334155; border-radius: 20px 20px 0 0; border-bottom: 8px solid #1e293b; }

        .tilt-left { transform: rotate(-12deg); }
        .tilt-right { transform: rotate(12deg); }
        .tilt-none { transform: rotate(0deg); }

        .controls {
            display: flex; gap: 20px; width: 100%; max-width: 500px;
            position: relative; z-index: 10;
        }
        .btn-comp {
            flex: 1; height: 100px; background: white; border: none; border-radius: 30px;
            font-size: 4rem; font-weight: 900; color: var(--deep-purple);
            cursor: pointer; box-shadow: 0 12px 0 #cbd5e1; transition: 0.1s;
            display: flex; align-items: center; justify-content: center;
            border: 4px solid var(--deep-purple);
        }
        .btn-comp:active { transform: translateY(6px); box-shadow: 0 6px 0 #cbd5e1; }
        .btn-comp:hover { background: var(--gold); color: white; border-color: var(--white); }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(255,255,255,0.98); color: var(--deep-purple); text-align: center;
            padding: 20px;
        }

        .big-icon { font-size: 10rem; margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }

        .error-overlay { background: var(--error-red); color: white; }
        .big-x { font-size: 18rem; font-weight: 900; line-height: 1; animation: popX 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popX { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .hint-text { font-size: 2rem; font-weight: 800; margin-top: 10px; opacity: 0.9; }

        @media (max-width: 600px) {
            header { justify-content: center; }
            .beam-wrapper { top: 40%; }
            .plate { width: 140px; bottom: -110px; }
            .beaker { width: 100px; height: 130px; }
            .controls { gap: 10px; }
            .btn-comp { height: 85px; font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div class="hill hill-1"></div>
    <div class="hill hill-2"></div>
    <div class="landscape"></div>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="stat-group">
            <div class="pill">⭐ <span id="lblScore">Score</span>: <span id="valScore" class="stat-val">0</span></div>
            <div class="pill">👑 <span id="lblHigh">High</span>: <span id="valHigh" class="stat-val">0</span></div>
            <div class="pill">🆙 <span id="lblLvl">Level</span>: <span id="valLvl" class="stat-val">1</span></div>
        </div>
        <div class="header-controls">
            <button class="icon-btn" id="muteBtn" onclick="toggleMute()">🔊</button>
            <select id="langSelect" style="padding: 10px; border-radius: 15px; font-weight: bold;" onchange="setLanguage(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <h1 id="pageTitle" style="font-weight: 900; letter-spacing: 2px; text-align: center; font-size: 2.5rem; text-shadow: 2px 2px 0 white;">ምውድዳር ኣሃድታት ትሕዝቶ</h1>

        <div class="balance-stage" id="balanceStage">
            <div class="beam-wrapper tilt-none" id="beamWrapper">
                <div class="beam">
                    <div class="plate plate-left">
                        <div class="beaker">
                            <div class="liquid" id="liquidLeft" style="height: 50%;"></div>
                            <div class="beaker-label" id="labelLeft">? <span class="beaker-unit" id="unitLeft">L</span></div>
                        </div>
                    </div>
                    <div class="plate plate-right">
                        <div class="beaker">
                            <div class="liquid" id="liquidRight" style="height: 50%; background: var(--liquid-pink);"></div>
                            <div class="beaker-label" id="labelRight">? <span class="beaker-unit" id="unitRight">ml</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="base-pillar"></div>
            <div class="base-floor"></div>
        </div>

        <div class="controls">
            <button class="btn-comp" onclick="checkAnswer('<')">&lt;</button>
            <button class="btn-comp" onclick="checkAnswer('=')">=</button>
            <button class="btn-comp" onclick="checkAnswer('>')">&gt;</button>
        </div>
    </div>

    <!-- Success Feedback -->
    <div id="success-overlay" class="overlay">
        <div class="big-icon">🌈</div>
        <h2 id="txtWin">ንፉዕ!</h2>
        <p class="hint-text" id="txtWinSub">ልክዕ መልሲ!</p>
    </div>

    <!-- Error Feedback -->
    <div id="error-overlay" class="overlay error-overlay">
        <div class="big-x">✕</div>
        <h2 id="txtFail">ጌጋ!</h2>
        <p class="hint-text" id="txtFailSub">እንደገና ፈትን</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "ምውድዳር ኣሃድታት ትሕዝቶ", win: "ንፉዕ!", winsub: "ልክዕ መልሲ!", fail: "ጌጋ!", failsub: "እንደገና ፈትን", score: "ውፅኢት", high: "ዝለዓለ", level: "ደረጃ", units: { l: "ሊ", ml: "ሚ.ሊ" }, isIt: "እዩ?" },
            am: { title: "የይዘት መለኪያዎች ማወዳደር", win: "ድንቅ ስራ!", winsub: "ትክክል!", fail: "ስህተት!", failsub: "እንደገና ይሞክሩ", score: "ውጤት", high: "ከፍተኛ", level: "ደረጃ", units: { l: "ሊ", ml: "ሚ.ሊ" }, isIt: "ነው?" },
            en: { title: "Capacity Comparison", win: "Excellent!", winsub: "Correct Answer!", fail: "Wrong!", failsub: "Try Again", score: "Score", high: "High", level: "Level", units: { l: "L", ml: "ml" }, isIt: "is it?" },
            om: { title: "Qabiyyee Wal-dorgomsiisuu", win: "Baay'ee Gaarii!", winsub: "Sirriidha!", fail: "Dogoggora!", failsub: "Irra deebi'i yaali", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa", units: { l: "L", ml: "ml" }, isIt: "ta'a?" },
            so: { title: "Isbarbardhigga Miisaanka", win: "Shaqo Fiican!", winsub: "Waa sax!", fail: "Khalad!", failsub: "Markale isku day", score: "Dhibco", high: "Sare", level: "Heerka", units: { l: "L", ml: "ml" }, isIt: "waaye?" }
        };

        let score = 0, lang = 'ti', busy = false, currentTask = null, muted = false;
        let highScore = parseInt(localStorage.getItem('cap_compare_high')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'win') { 
                o.type = 'triangle'; 
                [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1)); 
                g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.5); 
            }
            else if (type === 'err') { 
                o.type = 'sawtooth'; 
                o.frequency.setValueAtTime(120, n); 
                o.frequency.exponentialRampToValueAtTime(40, n + 0.3); 
                g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.3); 
            }
            else if (type === 'tap') {
                o.type = 'sine';
                o.frequency.setValueAtTime(600, n);
                g.gain.setValueAtTime(0.05, n);
                o.start(); o.stop(n + 0.1);
            }
        }

        function setLanguage(l) {
            lang = l;
            document.getElementById('pageTitle').innerText = i18n[lang].title;
            document.getElementById('lblScore').innerText = i18n[lang].score;
            document.getElementById('lblHigh').innerText = i18n[lang].high;
            document.getElementById('lblLvl').innerText = i18n[lang].level;
            document.getElementById('txtWin').innerText = i18n[lang].win;
            document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
            document.getElementById('txtFail').innerText = i18n[lang].fail;
            document.getElementById('txtFailSub').innerText = i18n[lang].failsub;
            if(currentTask) renderTask();
        }

        function generateTask() {
            busy = false;
            document.getElementById('beamWrapper').className = "beam-wrapper tilt-none";
            const level = Math.floor(score / 100) + 1;
            
            let v1, u1, v2, u2, w1, w2;

            if (level === 1) {
                v1 = Math.floor(Math.random() * 10) + 1;
                u1 = 'l';
                v2 = Math.random() > 0.5 ? v1 * 1000 : (Math.floor(Math.random() * 9) + 1) * 1000;
                u2 = 'ml';
            } else if (level === 2) {
                const fracs = [{disp: '1/2', val: 0.5}, {disp: '1/4', val: 0.25}, {disp: '3/4', val: 0.75}, {disp: '3/2', val: 1.5}];
                const f = fracs[Math.floor(Math.random() * fracs.length)];
                v1 = f.disp; u1 = 'l';
                v2 = Math.random() > 0.5 ? f.val * 1000 : Math.floor(Math.random() * 2000);
                u2 = 'ml';
            } else if (level === 3) {
                v1 = (Math.floor(Math.random() * 20) / 10) + 0.1;
                u1 = 'l';
                v2 = Math.random() > 0.5 ? v1 * 1000 : Math.floor(Math.random() * 3000);
                u2 = 'ml';
            } else {
                const specials = [
                    { v1: '188.5', u1: 'l', v2: '188000', u2: 'ml' },
                    { v1: '3/2', u1: 'l', v2: '500', u2: 'ml' },
                    { v1: '1.25', u1: 'l', v2: '1250', u2: 'ml' },
                    { v1: '5.75', u1: 'l', v2: '5750', u2: 'ml' },
                    { v1: '0.05', u1: 'l', v2: '50', u2: 'ml' }
                ];
                const s = specials[Math.floor(Math.random() * specials.length)];
                v1 = s.v1; u1 = s.u1; v2 = s.v2; u2 = s.u2;
            }

            const parseVal = (v) => {
                if (typeof v === 'string' && v.includes('/')) {
                    const parts = v.split('/');
                    return parseFloat(parts[0]) / parseFloat(parts[1]);
                }
                return parseFloat(v);
            };

            w1 = parseVal(v1) * (u1 === 'l' ? 1000 : 1);
            w2 = parseVal(v2) * (u2 === 'l' ? 1000 : 1);
            const correctOp = w1 === w2 ? '=' : (w1 > w2 ? '>' : '<');

            currentTask = { v1, u1, v2, u2, w1, w2, correctOp };
            renderTask();
        }

        function renderTask() {
            const t = i18n[lang];
            document.getElementById('labelLeft').innerHTML = `${currentTask.v1} <span class="beaker-unit">${t.units[currentTask.u1]}</span>`;
            document.getElementById('labelRight').innerHTML = `${currentTask.v2} <span class="beaker-unit">${t.units[currentTask.u2]}</span>`;
            
            const maxW = Math.max(currentTask.w1, currentTask.w2, 1000);
            document.getElementById('liquidLeft').style.height = `${(currentTask.w1 / maxW) * 90}%`;
            document.getElementById('liquidRight').style.height = `${(currentTask.w2 / maxW) * 90}%`;

            document.getElementById('valScore').innerText = score;
            document.getElementById('valHigh').innerText = highScore;
            document.getElementById('valLvl').innerText = Math.floor(score / 100) + 1;
        }

        function checkAnswer(userOp) {
            if (busy) return;
            busy = true;
            sfx('tap');

            const beam = document.getElementById('beamWrapper');
            const { w1, w2, correctOp } = currentTask;

            if (w1 > w2) beam.className = "beam-wrapper tilt-left";
            else if (w1 < w2) beam.className = "beam-wrapper tilt-right";
            else beam.className = "beam-wrapper tilt-none";

            setTimeout(() => {
                if (userOp === correctOp) {
                    score += 25;
                    if (score > highScore) { 
                        highScore = score; 
                        localStorage.setItem('cap_compare_high', highScore); 
                    }
                    handleSuccess();
                } else {
                    handleError();
                }
            }, 600);
        }

        function handleSuccess() {
            sfx('win');
            burst(500); 
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            const celebrator = setInterval(() => {
                if(overlay.style.display === 'flex') burst(100);
                else clearInterval(celebrator);
            }, 400);

            setTimeout(() => {
                overlay.style.display = 'none';
                generateTask();
            }, 2500);
        }

        function handleError() {
            sfx('err');
            document.body.classList.add('wrong-bg');
            document.getElementById('balanceStage').classList.add('shake');
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                overlay.style.display = 'none';
                document.body.classList.remove('wrong-bg');
                document.getElementById('balanceStage').classList.remove('shake');
                busy = false;
                document.getElementById('beamWrapper').className = "beam-wrapper tilt-none";
            }, 2000);
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#06b6d4', '#3b82f6', '#facc15', '#ffffff', '#ff0080', '#2dd4bf', '#a855f7'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*45, vy: (Math.random()-1.2)*65,
                s: Math.random()*15+8, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 3.0, r: Math.random()*360, rv: (Math.random()-0.5)*30
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            setLanguage('ti');
            generateTask();
        };
    </script>
</body>
</html>

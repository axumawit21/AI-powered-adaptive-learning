<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peak Rounder | ብቕርበት ምፅግጋዕ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f43f5e;
            --secondary: #6366f1;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg-grad: linear-gradient(135deg, #fff1f2 0%, #fae8ff 100%);
            --glass: rgba(255, 255, 255, 0.9);
            --royal-grad: linear-gradient(135deg, #f43f5e, #881337);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-grad);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
            color: #1e293b;
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 4000; }

        header {
            width: 100%; max-width: 1200px; padding: 30px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            flex-wrap: wrap; gap: 20px;
        }

        .badges { display: flex; gap: 15px; align-items: center; }
        
        .stat-pill { 
            background: white; padding: 12px 24px; border-radius: 20px; font-weight: 800; font-size: 1.2rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06); border: 3px solid #ffe4e6;
            display: flex; align-items: center; gap: 10px;
        }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        .stat-val { color: var(--primary); font-size: 1.4rem; }
        .high-score { border-color: var(--accent); }
        .high-score .stat-val { color: var(--accent); }

        .btn-icon {
            background: white; border: none; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: var(--primary); font-size: 1.4rem; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .btn-icon:active { transform: scale(0.9); }

        .lang-select {
            padding: 12px 20px; border-radius: 20px; border: 3px solid white; font: inherit; font-weight: bold; cursor: pointer;
            background: var(--glass); color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        .container {
            flex: 1; width: 100%; max-width: 1100px; display: flex; flex-direction: column; 
            padding: 20px; gap: 30px; z-index: 10; justify-content: center;
        }

        .game-card {
            background: var(--glass); backdrop-filter: blur(40px);
            border-radius: 50px; padding: 60px 40px; 
            border: 10px solid white;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            width: 100%; text-align: center; display: flex; flex-direction: column; gap: 40px;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Fancy Gradient Question Box */
        .story-box {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 30px; padding: 40px; 
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.2); 
            position: relative; max-width: 800px; margin: 0 auto;
            color: white;
        }
        .story-box::after { content: '🎯'; position: absolute; right: 20px; top: -30px; font-size: 3rem; opacity: 0.3; }

        .quest-text { font-size: 2.2rem; font-weight: 900; line-height: 1.3; }
        .highlight-num { color: #fef3c7; background: rgba(0,0,0,0.1); padding: 2px 12px; border-radius: 12px; }

        /* Rounding Hill Visual */
        .hill-visual {
            width: 100%; height: 250px; position: relative; display: flex; align-items: flex-end; 
            justify-content: center; overflow: hidden; margin: 20px 0;
        }
        .hill {
            width: 80%; height: 180px; background: #e2e8f0; border-radius: 100% 100% 0 0;
            position: relative; border: 6px solid #cbd5e1; border-bottom: none;
        }
        .hill::before {
            content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; 
            background: dashed #94a3b8; transform: translateX(-50%); opacity: 0.5;
        }
        .peak-label {
            position: absolute; bottom: 10px; font-size: 1.8rem; font-weight: 900; color: #475569;
        }
        .peak-left { left: -60px; text-align: right; width: 150px; }
        .peak-right { right: -60px; text-align: left; width: 150px; }
        
        .rolling-ball {
            width: 80px; height: 80px; background: var(--primary); border-radius: 50%;
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2), inset -5px -5px 15px rgba(0,0,0,0.2);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
        }

        /* Interaction Panel */
        .choices-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; }
        .choice-btn {
            background: white; border: 5px solid #f1f5f9; border-radius: 30px; padding: 25px;
            font-size: 2.2rem; font-weight: 900; color: #334155; cursor: pointer;
            box-shadow: 0 10px 0 #e2e8f0; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .choice-btn:hover { border-color: var(--secondary); color: var(--secondary); transform: translateY(-5px); }
        .choice-btn:active { transform: translateY(8px); box-shadow: 0 2px 0 #e2e8f0; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-15px); } 40%, 80% { transform: translateX(15px); } }
        .shake { animation: shake 0.4s; }

        #error-screen {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2);
            display: none; pointer-events: none; z-index: 2500;
            align-items: center; justify-content: center;
        }
        #error-screen span { font-size: 15rem; color: white; opacity: 0.5; }

        #success-overlay {
            position: fixed; inset: 0; background: rgba(16, 185, 129, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; z-index: 3000; color: white; text-align: center;
            backdrop-filter: blur(15px);
        }
        #success-overlay h2 { font-size: 5rem; margin-top: 20px; text-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        @media (max-width: 850px) {
            .quest-text { font-size: 1.5rem; }
            .choice-btn { font-size: 1.6rem; padding: 18px; border-radius: 20px; }
            .game-card { padding: 40px 20px; border-radius: 35px; }
            header { padding: 15px; justify-content: center; }
            .stat-pill { padding: 8px 15px; font-size: 0.9rem; }
            .rolling-ball { width: 60px; height: 60px; font-size: 1rem; top: -35px; }
            .hill { height: 120px; }
            .hill-visual { height: 180px; }
            .peak-label { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="error-screen"><span>❌</span></div>

    <header>
        <div class="header-left">
            <button class="btn-icon" id="muteBtn" onclick="toggleMute()" title="Sound Toggle">🔊</button>
            <div class="badges">
                <div class="stat-pill high-score">
                    <span id="highLabel" class="stat-label">ዝለዓለ</span>
                    <span id="highScoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="scoreLabel" class="stat-label">ነጥቢ</span>
                    <span id="scoreVal" class="stat-val">0</span>
                </div>
                <div class="stat-pill">
                    <span id="lvlLabel" class="stat-label">ደረጃ</span>
                    <span id="levelVal" class="stat-val">1</span>
                </div>
            </div>
        </div>
        <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
            <option value="ti">ትግርኛ</option>
            <option value="am">አማርኛ</option>
            <option value="en">English</option>
            <option value="om">Oromoo</option>
            <option value="so">Soomaali</option>
        </select>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <div class="story-box">
                <p class="quest-text" id="questText">...</p>
            </div>
            
            <div class="hill-visual">
                <div class="hill" id="hill">
                    <div class="peak-label peak-left" id="peakLeft">0</div>
                    <div class="peak-label peak-right" id="peakRight">0</div>
                    <div class="rolling-ball" id="ball">?</div>
                </div>
            </div>

            <div class="choices-grid" id="choices">
                <!-- Choice buttons injected by JS -->
            </div>
        </div>
    </div>

    <div id="success-overlay">
        <div style="font-size: 10rem; animation: bounce 1s infinite alternate;">⚖️</div>
        <h2 id="txtWin">ብጣዕሚ ጎበዝ!</h2>
        <p style="font-size: 2rem;" id="txtWinSub">ብትኽክል መሊስካዮ ኣለኻ!</p>
    </div>

    <script>
        const i18n = {
            ti: { win: "ብጣዕሚ ጎበዝ!", winsub: "ብትኽክል ተመሊሱ!", level: "ደረጃ", score: "ነጥቢ", high: "ዝለዓለ",
                  qText: "ነቲ ቁፅሪ <span class='highlight-num'>{n}</span> ናብ ዝቐረበ <span class='highlight-num'>{p}</span> ኣፀጋግዑ",
                  places: { 10: "ዓዲ ዓሰርተ", 100: "ዓዲ ሚኢቲ", 1000: "ዓዲ ሽሕ", 10000: "ዓዲ ዓሰርተ ሽሕ", 100000: "ዓዲ ሚኢቲ ሽሕ" }
                },
            am: { win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", level: "ደረጃ", score: "ነጥብ", high: "ከፍተኛ",
                  qText: "ቁጥር <span class='highlight-num'>{n}</span>ን ወደ ቅርብ <span class='highlight-num'>{p}</span> አፅጋጋ",
                  places: { 10: "አስር", 100: "መቶ", 1000: "ሺህ", 10000: "አስር ሺህ", 100000: "መቶ ሺህ" }
                },
            en: { win: "Great Job!", winsub: "You answered correctly!", level: "Level", score: "Score", high: "High",
                  qText: "Round the number <span class='highlight-num'>{n}</span> to the nearest <span class='highlight-num'>{p}</span>",
                  places: { 10: "ten", 100: "hundred", 1000: "thousand", 10000: "ten-thousand", 100000: "hundred-thousand" }
                },
            om: { win: "Hojii gaarii!", winsub: "Sirriitti deebisteetta!", level: "Sadarkaa", score: "Qabxii", high: "Olaanaa",
                  qText: "Lakkoofsa <span class='highlight-num'>{n}</span> gara <span class='highlight-num'>{p}</span> dhiyootti siqsi",
                  places: { 10: "kudhaniitti", 100: "dhibbaatti", 1000: "kumaatti", 10000: "kudhan-kumaatti", 100000: "dhibba-kumaatti" }
                },
            so: { win: "Shaqo fiican!", winsub: "Si sax ah ayaad u jawaabtay!", level: "Heerka", score: "Dhibco", high: "Sare",
                  qText: "U ku dhowey nambarka <span class='highlight-num'>{n}</span> ka ugu dhow <span class='highlight-num'>{p}</span>",
                  places: { 10: "tobnaad", 100: "boqlaad", 1000: "kunaad", 10000: "toban-kunaad", 100000: "boqol-kunaad" }
                }
        };

        let score = 0, level = 1, lang = 'ti', currentQuestion = null, muted = false;
        let highScore = parseInt(localStorage.getItem('peak_rounder_high_score')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, n); o.frequency.exponentialRampToValueAtTime(300, n + 0.1);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if(type === 'win') {
                o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1));
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.8);
                o.start(); o.stop(n + 0.8);
            } else {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3);
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.3);
                o.start(); o.stop(n + 0.3);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateQuestion() {
            // Pick place based on level
            const placeOptions = level === 1 ? [10, 100] : (level === 2 ? [100, 1000] : [1000, 10000, 100000]);
            const place = placeOptions[Math.floor(Math.random() * placeOptions.length)];
            
            const base = Math.floor(Math.random() * (1000000 / place)) * place;
            const offset = Math.floor(Math.random() * place);
            const num = base + offset;
            
            const low = Math.floor(num / place) * place;
            const high = low + place;
            const ans = Math.round(num / place) * place;

            currentQuestion = { num, place, low, high, ans };
            renderLevel();
        }

        function renderLevel() {
            const q = currentQuestion;
            const t = i18n[lang];
            
            document.getElementById('questText').innerHTML = t.qText
                .replace('{n}', q.num.toLocaleString())
                .replace('{p}', t.places[q.place]);

            document.getElementById('peakLeft').innerText = q.low.toLocaleString();
            document.getElementById('peakRight').innerText = q.high.toLocaleString();
            
            const ball = document.getElementById('ball');
            ball.innerText = q.num.toLocaleString();
            ball.style.left = '50%';
            ball.style.transform = 'translateX(-50%)';
            ball.style.background = 'var(--primary)';

            const container = document.getElementById('choices');
            container.innerHTML = '';
            
            const options = [q.low, q.high].sort(() => Math.random() - 0.5);
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.innerHTML = `<span>${opt.toLocaleString()}</span>`;
                btn.onclick = () => checkAnswer(opt);
                container.appendChild(btn);
            });

            updateStats();
        }

        function checkAnswer(val) {
            const q = currentQuestion;
            const ball = document.getElementById('ball');
            
            if (val === q.ans) {
                // Roll animation
                if (val === q.low) {
                    ball.style.left = '0%';
                    ball.style.transform = 'translateX(-100%)';
                } else {
                    ball.style.left = '100%';
                    ball.style.transform = 'translateX(0%)';
                }
                ball.style.background = 'var(--success)';
                
                score += 10;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('peak_rounder_high_score', highScore);
                }
                level = Math.floor(score / 50) + 1;
                sfx('win');
                burst(500);
                
                const overlay = document.getElementById('success-overlay');
                document.getElementById('txtWin').innerText = i18n[lang].win;
                document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
                
                setTimeout(() => {
                    overlay.style.display = 'flex';
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        generateQuestion();
                    }, 1500);
                }, 1000);
            } else {
                sfx('err');
                document.getElementById('gameCard').classList.add('shake');
                document.getElementById('error-screen').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('gameCard').classList.remove('shake');
                    document.getElementById('error-screen').style.display = 'none';
                }, 600);
            }
            updateStats();
        }

        function updateStats() {
            const t = i18n[lang];
            document.getElementById('scoreVal').innerText = score;
            document.getElementById('levelVal').innerText = level;
            document.getElementById('highScoreVal').innerText = highScore;
            document.getElementById('scoreLabel').innerText = t.score;
            document.getElementById('lvlLabel').innerText = t.level;
            document.getElementById('highLabel').innerText = t.high;
        }

        function changeLang(l) {
            lang = l;
            renderLevel();
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#f43f5e', '#6366f1', '#f59e0b', '#10b981', '#ffffff'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random() * c.width, y: c.height + 20,
                vx: (Math.random()-0.5)*40, vy: (Math.random()-0.8)*55,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)],
                l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*25
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.99; p.l-=0.012; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); 
                        x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = generateQuestion;
    </script>
</body>
</html>

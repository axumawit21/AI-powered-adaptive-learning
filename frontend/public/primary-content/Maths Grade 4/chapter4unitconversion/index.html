<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unit Master Pro | ምስላሕ ኣሃድታት ንውሓት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-grad: linear-gradient(to top, #a18cd1 0%, #fbc2eb 100%);
            --candy-blue: #00d2ff;
            --candy-pink: #ff758c;
            --candy-orange: #ff9a9e;
            --success: #10b981;
            --danger: #ef4444;
            --white: #ffffff;
            --text: #2d3436;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--secondary-grad);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: var(--text);
            transition: background 0.3s ease;
            padding-bottom: env(safe-area-inset-bottom);
        }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 6000; }

        header {
            width: 100%;
            max-width: 1000px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            gap: 10px;
        }

        .stat-group { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-pill { 
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            padding: 6px 12px;
            border-radius: 15px;
            border: 1.5px solid var(--white);
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: clamp(0.7rem, 2vw, 0.9rem);
        }
        .stat-val { color: var(--danger); font-size: 1.1em; }

        .header-controls { display: flex; gap: 8px; align-items: center; }

        .btn-icon {
            background: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .btn-icon:active { transform: scale(0.9); }

        .lang-select {
            padding: 6px 10px;
            border-radius: 15px;
            border: 2px solid var(--white);
            background: rgba(255, 255, 255, 0.9);
            font-weight: bold;
            outline: none;
            cursor: pointer;
            color: var(--text);
            font-size: 0.85rem;
        }

        .container {
            flex: 1;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .game-card {
            background: var(--white);
            border-radius: clamp(25px, 5vw, 40px);
            padding: clamp(20px, 4vw, 30px);
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            border: 6px solid rgba(255, 255, 255, 0.5);
        }

        .problem-title {
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            font-weight: 900;
            color: #6c5ce7;
        }

        .question-box {
            padding: 15px;
            background: #f0f3ff;
            border-radius: 20px;
            border: 2px dashed #a29bfe;
        }

        .question-text { font-size: clamp(1rem, 3vw, 1.3rem); font-weight: 700; color: #2d3436; }

        .interactive-area {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 900;
            flex-wrap: wrap;
        }
        
        .val-pill {
            padding: 12px 18px;
            background: #ffeaa7;
            border-radius: 18px;
            color: #d63031;
            border: 3px solid #fab1a0;
            font-size: 0.9em;
        }

        .ans-box {
            min-width: 120px;
            height: clamp(70px, 15vh, 90px);
            background: #fff;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0984e3;
            font-size: clamp(2rem, 8vw, 3rem);
            cursor: pointer;
            border: 5px solid #74b9ff;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: monospace;
            box-shadow: 0 6px 0 #74b9ff;
        }
        .ans-box.active { transform: scale(1.05); border-color: #00cec9; box-shadow: 0 6px 0 #00cec9; }

        /* Keypad */
        .keypad-section { 
            width: 100%; 
            max-width: 450px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 5px;
        }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(8px, 2vw, 12px); }
        .key {
            height: clamp(55px, 8vh, 65px);
            background: #f1f2f6;
            border: none;
            border-radius: 18px;
            font-size: clamp(1.5rem, 4vw, 1.8rem);
            font-weight: 800;
            color: #2f3542;
            cursor: pointer;
            box-shadow: 0 4px 0 #ced6e0;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .key:active { transform: translateY(3px); box-shadow: 0 1px 0 #ced6e0; background: #dfe4ea; }
        .key.del { color: #ff4757; }

        .key.check { 
            grid-column: 1 / -1;
            background: #2ed573;
            color: white; 
            font-size: clamp(1.8rem, 5vw, 2.2rem);
            height: clamp(70px, 10vh, 80px);
            margin-top: 5px;
            border: none;
            border-radius: 22px;
            font-weight: 900;
            box-shadow: 0 6px 0 #26af5c;
        }
        .key.check:active { transform: translateY(4px); box-shadow: 0 2px 0 #26af5c; }

        /* Overlays */
        #success-overlay, #error-overlay {
            position: fixed;
            inset: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            text-align: center;
            padding: 20px;
        }
        #success-overlay { background: rgba(255, 255, 255, 0.97); }
        #error-overlay { background: rgba(239, 68, 68, 0.97); }

        .big-icon { font-size: clamp(5rem, 15vw, 8rem); margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }

        .x-mark { font-size: clamp(8rem, 20vw, 12rem); color: white; font-weight: 900; animation: shake 0.4s infinite; }
        @keyframes shake { 0% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } 100% { transform: rotate(0); } }

        /* Small screen adjustments */
        @media (max-width: 480px) {
            header { flex-direction: column; align-items: stretch; padding: 10px; gap: 10px; }
            .header-controls { justify-content: space-between; }
            .container { gap: 10px; padding: 5px 10px; }
            .game-card { padding: 15px; border-width: 4px; gap: 10px; }
            .interactive-area { gap: 8px; }
            .val-pill { padding: 8px 12px; }
            .ans-box { min-width: 100px; height: 75px; border-radius: 18px; }
            .keypad { gap: 8px; }
            .key { height: 55px; border-radius: 14px; }
            .key.check { height: 70px; border-radius: 16px; margin-top: 5px; }
        }

        /* Landscape orientation safety */
        @media (max-height: 600px) and (orientation: landscape) {
            .container { flex-direction: row; align-items: center; max-width: 1000px; gap: 20px; }
            .game-card { flex: 1; height: 100%; }
            .keypad-section { flex: 1; max-width: 300px; }
            .key { height: 45px; }
            .key.check { height: 60px; }
            .big-icon, .x-mark { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>

    <header>
        <div class="stat-group">
            <div class="stat-pill">⭐ <span id="lblScore">Score</span>: <span id="valScore" class="stat-val">0</span></div>
            <div class="stat-pill">👑 <span id="lblHigh">High</span>: <span id="valHigh" class="stat-val">0</span></div>
            <div class="stat-pill">🆙 <span id="lblLvl">Level</span>: <span id="valLvl" class="stat-val">1</span></div>
        </div>
        <div class="header-controls">
            <button class="btn-icon" id="muteBtn" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <h1 class="problem-title" id="pageTitle">Unit Master</h1>
            <div class="question-box">
                <p id="questionText" class="question-text">Loading...</p>
            </div>
            <div class="interactive-area" id="interactiveArea">
                <!-- Injected via JS -->
            </div>
        </div>

        <div class="keypad-section">
            <div class="keypad" id="keypad"></div>
            <button class="key check" id="btnCheck" onclick="checkAnswer()">ፈትሽ (Confirm)</button>
        </div>
    </div>

    <div id="success-overlay">
        <div class="big-icon">🎉</div>
        <h2 id="txtWin" style="font-size: clamp(2rem, 6vw, 3rem); color: #6c5ce7;">ንፉዕ!</h2>
        <p style="font-size: clamp(1.2rem, 4vw, 1.5rem);" id="txtWinSub">ምቅይያር ተዓዊቱ!</p>
    </div>

    <div id="error-overlay">
        <div class="x-mark">✖</div>
        <h2 id="txtFail" style="font-size: clamp(2rem, 6vw, 3rem); color: white;">ጌጋ!</h2>
        <p style="font-size: clamp(1.2rem, 4vw, 1.5rem); color: white;" id="txtFailSub">እንደገና ፈትን</p>
    </div>

    <script>
        const i18n = {
            ti: { title: "ምቅይያር ኣሃድታት መዐቀኒ ንውሓት", check: "ኣረጋግፅ", win: "ንፉዕ!", winsub: "ብትክክል ምቅይያር ተዓዊቱ!", fail: "ጌጋ!", failsub: "እንደገና ፈትን", score: "ውፅኢት", high: "ዝለዓለ", level: "ደረጃ", q: "ቀይሩ:", and: "ን", units: { mm: "ሚ.ሜ", cm: "ሳ.ሜ", m: "ሜ", km: "ኪ.ሜ" } },
            am: { title: "የርዝመት መለኪያዎች መቀየር", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "ተቀይሯል!", fail: "ስህተት!", failsub: "እንደገና ይሞክሩ", score: "ውጤት", high: "ከፍተኛ", level: "ደረጃ", q: "ቀይሩ:", and: "እና", units: { mm: "ሚ.ሜ", cm: "ሳ.ሜ", m: "ሜ", km: "ኪ.ሜ" } },
            en: { title: "Unit Conversion Mastery", check: "Confirm", win: "Great Job!", winsub: "Correct Conversion!", fail: "Wrong!", failsub: "Try Again", score: "Score", high: "High", level: "Level", q: "Convert:", and: "and", units: { mm: "mm", cm: "cm", m: "m", km: "km" } },
            om: { title: "Safartuu Dheerinaa", check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriitti deebisteetta!", fail: "Dogoggora!", failsub: "Irra deebi'i yaali", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa", q: "Gedaali:", and: "fi", units: { mm: "mm", cm: "cm", m: "m", km: "km" } },
            so: { title: "Cabbirka Dhererka", check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad u jawaabtay!", fail: "Khalad!", failsub: "Markale isku day", score: "Dhibco", high: "Sare", level: "Heerka", q: "Beddel:", and: "iyo", units: { mm: "mm", cm: "cm", m: "m", km: "km" } }
        };

        let score = 0, lang = 'ti', currentTask = null, busy = false, userVal = "", muted = false;
        let highScore = parseInt(localStorage.getItem('unit_master_high')) || 0;
        let particles = [];
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            
            if (type === 'tap') {
                o.type = 'sine'; o.frequency.setValueAtTime(800, n); o.frequency.exponentialRampToValueAtTime(400, n + 0.1);
                g.gain.setValueAtTime(0.05, n); g.gain.linearRampToValueAtTime(0, n + 0.1);
                o.start(); o.stop(n + 0.1);
            } else if (type === 'win') {
                o.type = 'triangle'; 
                [440, 554, 659, 880].forEach((f, i) => {
                    o.frequency.setValueAtTime(f, n + i * 0.1);
                });
                g.gain.setValueAtTime(0.1, n); g.gain.linearRampToValueAtTime(0, n + 0.5);
                o.start(); o.stop(n + 0.5);
            } else if (type === 'err') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(100, n);
                g.gain.setValueAtTime(0.15, n); g.gain.linearRampToValueAtTime(0, n + 0.4);
                o.start(); o.stop(n + 0.4);
            }
        }

        function toggleMute() {
            muted = !muted;
            document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊';
        }

        function generateTask() {
            busy = false; userVal = "";
            const pool = [
                { v1: 120, u1: 'cm', v2: 5, u2: 'mm', target: 'mm', ans: 1205 },
                { v1: 57240, u1: 'mm', v2: null, u2: null, target: 'cm', ans: 5724 },
                { v1: 780000, u1: 'm', v2: null, u2: null, target: 'km', ans: 780 },
                { v1: 15, u1: 'm', v2: 40, u2: 'cm', target: 'cm', ans: 1540 },
                { v1: 2, u1: 'km', v2: 300, u2: 'm', target: 'm', ans: 2300 },
                { v1: 840, u1: 'cm', v2: null, u2: null, target: 'mm', ans: 8400 },
                { v1: 12, u1: 'km', v2: null, u2: null, target: 'm', ans: 12000 },
                { v1: 9000, u1: 'mm', v2: null, u2: null, target: 'cm', ans: 900 },
                { v1: 4500, u1: 'cm', v2: null, u2: null, target: 'm', ans: 45 },
                { v1: 1, u1: 'm', v2: 25, u2: 'cm', target: 'cm', ans: 125 }
            ];
            currentTask = pool[Math.floor(Math.random() * pool.length)];
            renderUI();
        }

        function renderUI() {
            if (!currentTask) return;
            const t = i18n[lang];
            const u = t.units;
            const levelNum = Math.floor(score / 100) + 1;
            
            document.getElementById('valLvl').innerText = levelNum;
            document.getElementById('valScore').innerText = score;
            document.getElementById('valHigh').innerText = highScore;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('pageTitle').innerText = t.title;
            document.getElementById('questionText').innerText = t.q;

            let qStr = `${currentTask.v1} ${u[currentTask.u1]}`;
            if (currentTask.v2 !== null) {
                qStr += ` ${t.and} ${currentTask.v2} ${u[currentTask.u2]}`;
            }

            const interactive = document.getElementById('interactiveArea');
            interactive.innerHTML = `
                <div class="val-pill">${qStr}</div>
                <div style="color:#6c5ce7; font-size:1.5em">➜</div>
                <div class="ans-box active" id="ansBox">?</div>
                <div style="font-weight:900; color:#2d3436; font-size:0.8em">${u[currentTask.target]}</div>
            `;
            if (document.getElementById('ansBox')) document.getElementById('ansBox').innerText = userVal || "?";
        }

        function press(k) {
            if (busy) return;
            sfx('tap');
            if (k === 'bk') userVal = userVal.slice(0, -1);
            else if (userVal.length < 8) userVal += k;
            const box = document.getElementById('ansBox');
            if (box) box.innerText = userVal || "?";
        }

        function checkAnswer() {
            if (busy || userVal === "") return;
            if (parseInt(userVal) === currentTask.ans) {
                score += 20;
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem('unit_master_high', highScore);
                }
                handleWin();
            } else {
                handleErr();
            }
        }

        function handleWin() {
            busy = true;
            sfx('win');
            burst(window.innerWidth < 480 ? 150 : 300);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            document.getElementById('txtWin').innerText = i18n[lang].win;
            document.getElementById('txtWinSub').innerText = i18n[lang].winsub;
            setTimeout(() => {
                overlay.style.display = 'none';
                generateTask();
            }, 1800);
        }

        function handleErr() {
            busy = true;
            sfx('err');
            const overlay = document.getElementById('error-overlay');
            overlay.style.display = 'flex';
            document.getElementById('txtFail').innerText = i18n[lang].fail;
            document.getElementById('txtFailSub').innerText = i18n[lang].failsub;
            setTimeout(() => {
                overlay.style.display = 'none';
                userVal = "";
                busy = false;
                renderUI();
            }, 1200);
        }

        function changeLang(l) { 
            lang = l; 
            renderUI(); 
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const colors = ['#00d2ff','#ff758c','#ff9a9e','#ffffff','#10b981'];
            for(let i=0; i<count; i++) particles.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*40, vy: (Math.random()-1.0)*60,
                s: Math.random()*10+5, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 2.0, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=particles.length-1; i>=0; i--){
                    const p=particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.8; p.vx *= 0.99; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => {
            const kp = document.getElementById('keypad');
            [1,2,3,4,5,6,7,8,9,0,'00','bk'].forEach(k => {
                const b = document.createElement('button');
                b.className = 'key'; 
                if(k === 'bk') { b.innerText = '⌫'; b.classList.add('del'); }
                else b.innerText = k;
                b.onclick = () => press(k); 
                kp.appendChild(b);
            });
            generateTask();
        };
    </script>
</body>
</html>

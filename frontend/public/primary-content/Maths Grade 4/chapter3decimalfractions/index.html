<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Decimal Discovery | ደሲማል</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #7000ff;
            --success: #00ff88;
            --danger: #ff4b2b;
            --amber: #facc15;
            --indigo: #6366f1;
            --pink: #ff007f;
            --bg-canvas: #020617;
            --card-glass: rgba(15, 23, 42, 0.85);
            --cell-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--bg-canvas);
            background-image: 
                radial-gradient(at 0% 0%, #1e1b4b 0px, transparent 50%),
                radial-gradient(at 100% 0%, #312e81 0px, transparent 50%),
                radial-gradient(at 50% 100%, #1e1b4b 0px, transparent 50%),
                radial-gradient(at 0% 100%, #0f172a 0px, transparent 50%);
            background-size: 200% 200%;
            animation: aurora 15s infinite alternate ease-in-out;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #fff;
            transition: background-color 0.2s;
        }

        @keyframes aurora {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* Confetti on Top of Everything */
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

        body.error-active { background-color: #450a0a !important; background-image: none !important; }
        #wrong-overlay {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.3);
            display: none; align-items: center; justify-content: center;
            z-index: 5500; pointer-events: none;
        }
        #wrong-overlay span { font-size: clamp(12rem, 50vw, 25rem); color: #fff; text-shadow: 0 0 60px rgba(0,0,0,0.5); font-weight: 900; animation: popX 0.4s forwards; }
        @keyframes popX { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1.1); opacity: 1; } }

        header {
            width: 100%; max-width: 1200px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100;
        }

        .stats-bar {
            display: flex; gap: 15px; width: 100%; justify-content: center; flex-wrap: wrap;
        }

        .pill {
            background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 50px; border: 2px solid rgba(255,255,255,0.1);
            font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .pill-score { border-color: var(--primary); color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .pill-lvl { border-color: var(--pink); color: var(--pink); text-shadow: 0 0 10px var(--pink); }
        .pill-high { border-color: var(--amber); color: var(--amber); text-shadow: 0 0 10px var(--amber); }

        .header-controls {
            display: flex; gap: 12px; align-items: center; margin-top: 10px;
        }

        .btn-round {
            width: 55px; height: 55px; border-radius: 50%; border: none;
            background: rgba(255,255,255,0.1); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
            box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.3); transition: transform 0.2s;
        }
        .btn-round:active { transform: scale(0.9); }

        .lang-select {
            padding: 12px 20px; border-radius: 20px; border: 3px solid var(--primary);
            background: var(--bg-canvas); color: #fff; font: inherit; font-weight: 700;
            cursor: pointer; outline: none; box-shadow: 0 8px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .container {
            flex: 1; width: 100%; max-width: 1300px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px;
            z-index: 10;
        }

        .game-card {
            background: var(--card-glass); backdrop-filter: blur(40px);
            border-radius: 50px; width: 100%; padding: 40px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.5); border: 4px solid rgba(255,255,255,0.1); text-align: center;
            position: relative; animation: slideUp 0.6s ease-out;
            max-width: 850px;
        }

        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .quest-text { 
            font-size: 2rem; font-weight: 800; color: var(--primary); 
            margin-bottom: 30px; text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        /* Visual Model Styles with Improved Grid Clarity */
        .decimal-visual {
            width: 100%; display: flex; justify-content: center; margin-bottom: 30px;
        }

        .grid-100 {
            display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px;
            width: 320px; height: 320px; background: rgba(255,255,255,0.15); border: 4px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 4px;
        }
        .cell-100 { 
            background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 1px; transition: 0.3s; 
        }
        .cell-100.filled { 
            background: var(--primary); 
            border: 1px solid rgba(0,0,0,0.4); /* High contrast border for counting */
            box-shadow: 0 0 8px var(--primary); 
            animation: pulseIn 0.5s ease-out;
        }

        .bar-10 {
            display: flex; width: 100%; max-width: 500px; height: 100px;
            background: rgba(255,255,255,0.15); border: 4px solid rgba(255,255,255,0.2); border-radius: 20px; overflow: hidden;
            padding: 4px; gap: 4px;
        }
        .seg-10 { 
            flex: 1; 
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 8px; transition: 0.3s; 
        }
        .seg-10.filled { 
            background: var(--pink); 
            border: 2px solid rgba(0,0,0,0.4); /* High contrast border for counting */
            box-shadow: 0 0 20px var(--pink);
            animation: pulseIn 0.5s ease-out;
        }

        @keyframes pulseIn {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Display Area */
        .display-area {
            margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 20px;
        }
        .ans-slot {
            width: 250px; height: 100px; background: rgba(0,0,0,0.4); border: 4px dashed rgba(255,255,255,0.2);
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            font-size: 4rem; font-weight: 900; color: var(--primary); transition: 0.3s;
            text-shadow: 0 0 20px var(--primary);
        }
        .ans-slot.active { border-style: solid; border-color: var(--primary); background: rgba(0, 242, 254, 0.05); transform: scale(1.05); }

        /* Keypad */
        .keypad {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 500px;
        }
        .key {
            height: 80px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px;
            font-size: 2.2rem; font-weight: 800; color: #fff; cursor: pointer;
            box-shadow: 0 8px 0 rgba(0,0,0,0.4); transition: all 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 3px 0 rgba(0,0,0,0.4); }
        .key.del { color: var(--danger); background: rgba(255, 75, 43, 0.1); border-color: rgba(255, 75, 43, 0.2); }
        .key.dot { color: var(--amber); text-shadow: 0 0 10px var(--amber); }
        
        .key:nth-child(4n+1) { color: var(--primary); }
        .key:nth-child(4n+2) { color: var(--pink); }
        .key:nth-child(4n+3) { color: var(--indigo); }

        .key.check { 
            grid-column: span 4; background: linear-gradient(to right, var(--success), #059669); color: white; border: none;
            box-shadow: 0 12px 0 #064e3b; font-size: 2.5rem; height: 100px; margin-top: 15px;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .key.check:active { transform: translateY(8px); box-shadow: 0 4px 0 #064e3b; }

        .shake { animation: shakeAnim 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-3px, 0, 0); }
            20%, 80% { transform: translate3d(5px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-7px, 0, 0); }
            40%, 60% { transform: translate3d(7px, 0, 0); }
        }

        /* Success Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9000; backdrop-filter: blur(15px); text-align: center;
        }
        .overlay-icon { font-size: 12rem; margin-bottom: 20px; animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounceIn { from { transform: scale(0); } to { transform: scale(1); } }
        #ovlTitle { font-size: 5rem; color: var(--success); text-shadow: 0 0 30px var(--success); }
        #ovlSub { font-size: 2.5rem; color: #94a3b8; margin-top: 15px; }

        /* Desktop Layout (Parallel) */
        @media (min-width: 1024px) {
            .container {
                flex-direction: row;
                align-items: center;
                gap: 70px;
                padding-top: 50px;
            }
            .game-card {
                flex: 1.4;
                max-width: none;
                padding: 60px 40px;
                border-radius: 60px;
            }
            .keypad {
                flex: 0.6;
                max-width: 550px;
            }
            .quest-text { font-size: 2.5rem; }
            .grid-100 { width: 380px; height: 380px; }
        }

        @media (max-width: 600px) {
            .quest-text { font-size: 1.3rem; }
            .ans-slot { width: 180px; height: 80px; font-size: 2.8rem; }
            .grid-100 { width: 260px; height: 260px; }
            .bar-10 { height: 70px; }
            .key { height: 65px; font-size: 1.8rem; }
            .pill { padding: 8px 16px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="wrong-overlay"><span>❌</span></div>

    <header>
        <div class="stats-bar">
            <div class="pill pill-lvl">🆙 <span id="lblLvl">ደረጃ</span>: <span id="valLvl">1</span></div>
            <div class="pill pill-high">👑 <span id="lblHigh">ዝለዓለ</span>: <span id="valHigh">0</span></div>
            <div class="pill pill-score">⭐ <span id="lblScore">ነጥቢ</span>: <span id="valScore">0</span></div>
        </div>
        <div class="header-controls">
            <button class="btn-round" id="btnMute" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti" selected>ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <div class="quest-text" id="txtQuest">ነዚ ተቀቢኡ ዘሎ ክፋል ብደሲማል ፅሓፎ</div>
            
            <div class="decimal-visual" id="visualArea">
                <!-- Injected by JS -->
            </div>

            <div class="display-area">
                <div class="ans-slot active" id="ansSlot">?</div>
            </div>
        </div>

        <div class="keypad">
            <button class="key" onclick="press(1)">1</button>
            <button class="key" onclick="press(2)">2</button>
            <button class="key" onclick="press(3)">3</button>
            <button class="key del" onclick="press('bk')">⌫</button>
            <button class="key" onclick="press(4)">4</button>
            <button class="key" onclick="press(5)">5</button>
            <button class="key" onclick="press(6)">6</button>
            <button class="key dot" onclick="press('.')">.</button>
            <button class="key" onclick="press(7)">7</button>
            <button class="key" onclick="press(8)">8</button>
            <button class="key" onclick="press(9)">9</button>
            <button class="key" onclick="press(0)">0</button>
            <button class="key check" id="btnCheck" onclick="check()">CHECK (ፈትሽ)</button>
        </div>
    </div>

    <div id="overlay">
        <div class="overlay-icon" id="ovlIcon">🧪</div>
        <h2 id="ovlTitle">ንፉዕ!</h2>
        <p id="ovlSub">ብትኽክል ተመሊሱ!</p>
    </div>

    <script>
        const i18n = {
            ti: { quest: "ነዚ ተቀቢኡ ዘሎ ክፋል ብደሲማል ፅሓፎ", check: "ኣረጋግፅ", win: "ንፉዕ!", winsub: "ብትኽክል ተመሊሱ!", score: "ነጥቢ", high: "ዝለዓለ", level: "ደረጃ" },
            am: { quest: "የተቀባውን ክፍል በደሲማል ጻፍ", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", score: "ነጥብ", high: "ከፍተኛ", level: "ደረጃ" },
            en: { quest: "Write the shaded part in decimals", check: "Check", win: "Great Job!", winsub: "You answered correctly!", score: "Score", high: "Highest", level: "Level" },
            om: { quest: "Kutaa halluu dibame deesimaaliin barreessi", check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriitti deebisteetta!", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa" },
            so: { quest: "Ku qor qaybta rinjeysan jajab tobanle", check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad u jawaabtay!", score: "Dhibco", high: "Sare", level: "Heerka" }
        };

        let state = {
            lang: 'ti', score: 0, level: 1,
            highScore: parseInt(localStorage.getItem('decimal_high')) || 0,
            type: 'tenths', // or 'hundredths'
            target: 0,
            userAns: "",
            busy: false, muted: false, particles: []
        };

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (state.muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type==='win') { o.type='triangle'; [523,659,783,1046].forEach((f,i)=>o.frequency.setValueAtTime(f,n+i*0.1)); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.6); }
            else if(type==='tap') { o.type='sine'; o.frequency.setValueAtTime(600,n); g.gain.setValueAtTime(0.05,n); o.start(); o.stop(n+0.1); }
            else { o.type='sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.4); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.4); }
        }

        function generate() {
            state.busy = false;
            state.userAns = "";
            state.level = Math.floor(state.score / 50) + 1;
            
            state.type = (state.level === 1) ? 'tenths' : (Math.random() > 0.5 ? 'hundredths' : 'tenths');
            
            if (state.type === 'tenths') {
                const val = Math.floor(Math.random() * 9) + 1;
                state.target = (val / 10).toFixed(1);
                renderTenths(val);
            } else {
                const val = Math.floor(Math.random() * 95) + 1;
                state.target = (val / 100).toFixed(2);
                renderHundredths(val);
            }

            document.getElementById('ansSlot').innerText = "?";
            updateUI();
        }

        function renderTenths(val) {
            const area = document.getElementById('visualArea');
            let html = `<div class="bar-10">`;
            for(let i=0; i<10; i++) {
                html += `<div class="seg-10 ${i < val ? 'filled' : ''}"></div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function renderHundredths(val) {
            const area = document.getElementById('visualArea');
            let html = `<div class="grid-100">`;
            for(let i=0; i<100; i++) {
                html += `<div class="cell-100 ${i < val ? 'filled' : ''}"></div>`;
            }
            html += `</div>`;
            area.innerHTML = html;
        }

        function press(k) {
            if (state.busy) return;
            sfx('tap');
            if (k === 'bk') state.userAns = state.userAns.slice(0, -1);
            else if (state.userAns.length < 5) state.userAns += k;
            document.getElementById('ansSlot').innerText = state.userAns || "?";
        }

        function check() {
            if (state.busy || state.userAns === "") return;
            const normalizedUser = parseFloat(state.userAns).toFixed(state.type === 'tenths' ? 1 : 2);
            if (normalizedUser === state.target) {
                handleSuccess();
            } else {
                handleError();
            }
        }

        function handleSuccess() {
            state.busy = true;
            state.score += 10;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('decimal_high', state.highScore);
            }
            sfx('win'); 
            
            // MASSIVE CONFETTI CELEBRATION RAINING OVER THE MESSAGE
            let waves = 0;
            const partyInterval = setInterval(() => {
                burst(300);
                waves++;
                if (waves > 15) clearInterval(partyInterval);
            }, 100);

            const ovl = document.getElementById('overlay');
            const t = i18n[state.lang];
            const icons = ['💎','✨','📈','🔬','🌟','🏆','⚡','🧬'];
            document.getElementById('ovlIcon').innerText = icons[Math.floor(Math.random()*icons.length)];
            document.getElementById('ovlTitle').innerText = t.win;
            document.getElementById('ovlSub').innerText = t.winsub;
            
            ovl.style.display = 'flex';
            setTimeout(() => {
                ovl.style.display = 'none';
                generate();
            }, 3000);
        }

        function handleError() {
            sfx('err');
            const card = document.getElementById('gameCard');
            card.classList.add('shake');
            document.body.classList.add('error-active');
            document.getElementById('wrong-overlay').style.display = 'flex';
            
            setTimeout(() => {
                card.classList.remove('shake');
                document.body.classList.remove('error-active');
                document.getElementById('wrong-overlay').style.display = 'none';
                state.userAns = "";
                document.getElementById('ansSlot').innerText = "?";
            }, 800);
        }

        function changeLang(l) { state.lang = l; updateUI(); }
        function toggleMute() { state.muted = !state.muted; document.getElementById('btnMute').innerText = state.muted ? '🔇' : '🔊'; }

        function updateUI() {
            const t = i18n[state.lang];
            document.getElementById('txtQuest').innerText = t.quest;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('valScore').innerText = state.score;
            document.getElementById('valHigh').innerText = state.highScore;
            document.getElementById('valLvl').innerText = state.level;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblLvl').innerText = t.level;
        }

        function burst(count) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            if (c.width !== window.innerWidth) { c.width = window.innerWidth; c.height = window.innerHeight; }
            const colors = ['#00f2fe', '#ff007f', '#00ff88', '#facc15', '#6366f1', '#ffffff'];
            for(let i=0; i<count; i++) state.particles.push({
                x: Math.random() * c.width, y: c.height + 20, vx: (Math.random()-0.5)*50, vy: (Math.random()-0.8)*65,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], l: 2.0, r: Math.random()*360, rv: (Math.random()-0.5)*30
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=state.particles.length-1; i>=0; i--){
                    const p=state.particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.985; p.l-=0.008; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else state.particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => { generate(); };
    </script>
</body>
</html>

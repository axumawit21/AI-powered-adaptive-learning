<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraction Bakery | ምድማርን ምጉዳልን ጉዚታት</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bakery-orange: #f59e0b;
            --bakery-pink: #ec4899;
            --bakery-blue: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --white: #ffffff;
            --card-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: #fff7ed;
            background-image: radial-gradient(#ffedd5 2px, transparent 2px);
            background-size: 30px 30px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            color: #451a03;
            transition: background-color 0.2s;
        }

        body.error-active { background-color: #fee2e2 !important; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5000; }

        #wrong-overlay {
            position: fixed; inset: 0; background: rgba(239, 68, 68, 0.2);
            display: none; align-items: center; justify-content: center;
            z-index: 5500; pointer-events: none;
        }
        #wrong-overlay span { font-size: 15rem; color: white; opacity: 0.8; text-shadow: 0 0 50px rgba(0,0,0,0.5); font-weight: 900; animation: popX 0.4s forwards; }
        @keyframes popX { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1.1); opacity: 1; } }

        header {
            width: 100%; max-width: 1200px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100;
        }

        .stats-bar {
            display: flex; gap: 12px; width: 100%; justify-content: center; flex-wrap: wrap;
        }

        .pill {
            background: white; border: 3px solid #fde68a; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .pill-score { border-color: var(--bakery-blue); color: var(--bakery-blue); }
        .pill-lvl { border-color: var(--bakery-pink); color: var(--bakery-pink); }

        .header-controls {
            display: flex; gap: 10px; align-items: center; margin-top: 10px;
        }

        .btn-round {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: white; color: #451a03; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: transform 0.2s;
        }
        .btn-round:active { transform: scale(0.9); }

        .lang-select {
            padding: 10px 18px; border-radius: 20px; border: 2px solid var(--bakery-orange);
            background: white; color: #451a03; font: inherit; font-weight: 700;
            cursor: pointer; outline: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .container {
            flex: 1; width: 100%; max-width: 1200px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 30px;
            z-index: 10;
        }

        .game-card {
            background: white; border-radius: 40px; width: 100%; padding: 40px 30px;
            box-shadow: var(--card-shadow); border: 8px solid white; text-align: center;
            position: relative; animation: slideUp 0.6s ease-out;
            max-width: 700px;
        }

        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .quest-text { font-size: 1.6rem; font-weight: 700; color: #92400e; margin-bottom: 30px; }

        /* Math Layout */
        .math-display {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            margin-bottom: 40px; font-size: 4rem; font-weight: 900;
        }

        .fraction-box { display: flex; flex-direction: column; align-items: center; line-height: 1; }
        .frac-line { width: 80px; height: 10px; background: #451a03; border-radius: 5px; margin: 8px 0; }
        .operator { color: var(--bakery-pink); margin: 0 10px; }
        
        .ans-slot {
            width: 110px; height: 110px; background: #fefce8; border: 5px dashed #fcd34d;
            border-radius: 30px; display: flex; align-items: center; justify-content: center;
            color: var(--bakery-orange); transition: 0.3s; cursor: pointer;
        }
        .ans-slot.active { border-style: solid; border-color: var(--bakery-orange); background: #fffbeb; transform: scale(1.05); box-shadow: 0 0 30px rgba(245, 158, 11, 0.2); }

        /* Real-time Result Bar */
        .model-container {
            width: 100%; max-width: 500px; height: 80px; background: #f1f5f9;
            border: 6px solid #cbd5e1; border-radius: 20px; overflow: hidden;
            display: flex; margin: 0 auto 10px; position: relative;
        }
        .bar-segment { flex: 1; border-right: 2px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .bar-segment.filled { background: var(--bakery-blue); box-shadow: inset 0 0 20px rgba(0,0,0,0.1); }
        .bar-segment.target { background: rgba(59, 130, 246, 0.2); border: 2px dashed var(--bakery-blue); }

        /* Keypad */
        .keypad {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; width: 100%; max-width: 450px;
        }
        .key {
            height: 80px; background: white; border: 2px solid #f1f5f9; border-radius: 22px;
            font-size: 2.2rem; font-weight: 800; color: #451a03; cursor: pointer;
            box-shadow: 0 8px 0 #f1f5f9; transition: all 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .key:active { transform: translateY(4px); box-shadow: 0 2px 0 #f1f5f9; }
        .key.del { color: var(--danger); background: #fef2f2; border-color: #fee2e2; box-shadow: 0 8px 0 #fee2e2; }
        .key.check { 
            grid-column: span 4; background: var(--success); color: white; border: none;
            box-shadow: 0 10px 0 #065f46; font-size: 2.2rem; height: 100px; margin-top: 10px;
        }

        .shake { animation: shakeAnim 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shakeAnim {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }

        /* Success Overlay */
        #overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.98);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 6000; backdrop-filter: blur(10px); text-align: center;
        }
        .overlay-icon { font-size: 10rem; margin-bottom: 20px; animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes bounceIn { from { transform: scale(0); } to { transform: scale(1); } }

        /* Desktop specific layout */
        @media (min-width: 1024px) {
            .container {
                flex-direction: row;
                align-items: center;
                gap: 50px;
                padding-top: 40px;
            }
            .game-card {
                flex: 1.3;
                max-width: none;
                padding: 60px 40px;
                border-radius: 60px;
            }
            .keypad {
                flex: 0.7;
                max-width: 500px;
            }
            .math-display { font-size: 5rem; }
            .frac-line { width: 100px; }
            .ans-slot { width: 130px; height: 130px; font-size: 4.5rem; }
            .quest-text { font-size: 2rem; }
        }

        @media (max-width: 600px) {
            .math-display { font-size: 2.5rem; }
            .ans-slot { width: 75px; height: 75px; font-size: 2.5rem; }
            .frac-line { width: 55px; }
            .key { height: 60px; font-size: 1.5rem; }
            .pill { padding: 6px 12px; font-size: 0.85rem; }
            .quest-text { font-size: 1.1rem; }
            .container { gap: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="confetti-canvas"></canvas>
    <div id="wrong-overlay"><span>❌</span></div>

    <header>
        <div class="stats-bar">
            <div class="pill pill-lvl">🆙 <span id="lblLvl">Level</span>: <span id="valLvl">1</span></div>
            <div class="pill high-score">👑 <span id="lblHigh">ዝለዓለ</span>: <span id="valHigh">0</span></div>
            <div class="pill pill-score">⭐ <span id="lblScore">Score</span>: <span id="valScore">0</span></div>
        </div>
        <div class="header-controls">
            <button class="btn-round" id="btnMute" onclick="toggleMute()">🔊</button>
            <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                <option value="ti" selected>ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="game-card" id="gameCard">
            <div class="quest-text" id="txtQuest">ነዞም ተመሳሳሊ ረቛሒ ዘለዎም ጉዚታት ደምር ወይ ቀንሰ!</div>
            
            <div class="math-display">
                <div class="fraction-box">
                    <span id="n1">1</span>
                    <div class="frac-line"></div>
                    <span id="d1">4</span>
                </div>
                <span class="operator" id="opSign">+</span>
                <div class="fraction-box">
                    <span id="n2">2</span>
                    <div class="frac-line"></div>
                    <span id="d2">4</span>
                </div>
                <span>=</span>
                <div class="fraction-box">
                    <div class="ans-slot active" id="ansSlot">?</div>
                    <div class="frac-line"></div>
                    <span id="dAns">4</span>
                </div>
            </div>

            <div class="model-container" id="modelBar">
                <!-- Visual segments -->
            </div>
        </div>

        <div class="keypad">
            <button class="key" onclick="press(1)">1</button>
            <button class="key" onclick="press(2)">2</button>
            <button class="key" onclick="press(3)">3</button>
            <button class="key del" onclick="press('bk')">⌫</button>
            <button class="key" onclick="press(4)">4</button>
            <button class="key" onclick="press(5)">5</button>
            <button class="key" onclick="press(6)">6</button>
            <button class="key" onclick="press(0)">0</button>
            <button class="key" onclick="press(7)">7</button>
            <button class="key" onclick="press(8)">8</button>
            <button class="key" onclick="press(9)">9</button>
            <button class="key check" id="btnCheck" onclick="check()">CHECK (ፈትሽ)</button>
        </div>
    </div>

    <div id="overlay">
        <div class="overlay-icon" id="ovlIcon">🍰</div>
        <h2 id="ovlTitle" style="font-size: 4rem; color: var(--success);">ንፉዕ!</h2>
        <p id="ovlSub" style="font-size: 2rem; color: #64748b; margin-top: 15px;">ብትኽክል ተመሊሱ!</p>
    </div>

    <script>
        const i18n = {
            ti: { quest: "ነዞም ተመሳሳሊ ረቛሒ ዘለዎም ጉዚታት ደምር ወይ ቀንስ!", check: "ኣረጋግፅ", win: "ንፉዕ!", winsub: "ብትኽክል ተመሊሱ!", score: "ነጥቢ", high: "ዝለዓለ", level: "ደረጃ" },
            am: { quest: "ክፍልፋዮቹን ደምር ወይም ቀንስ!", check: "አረጋግጥ", win: "ድንቅ ስራ!", winsub: "በትክክል መልሰዋል!", score: "ነጥብ", high: "ከፍተኛ", level: "ደረጃ" },
            en: { quest: "Add or Subtract the fractions!", check: "Check", win: "Great Job!", winsub: "You answered correctly!", score: "Score", high: "Highest", level: "Level" },
            om: { quest: "Firaakshinii ida'i ykn hir'isi!", check: "Mirkaneessi", win: "Hojii Gaarii!", winsub: "Sirriitti deebisteetta!", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa" },
            so: { quest: "Isku dar ama kala gooy jajabka!", check: "Hubi", win: "Shaqo Fiican!", winsub: "Si sax ah ayaad u jawaabtay!", score: "Dhibco", high: "Sare", level: "Heerka" }
        };

        let state = {
            lang: 'ti', score: 0, level: 1,
            highScore: parseInt(localStorage.getItem('bakery_high')) || 0,
            n1: 0, n2: 0, den: 0, op: '+', userAns: "",
            busy: false, muted: false, particles: []
        };

        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function sfx(type) {
            if (state.muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if(type==='win') { o.type='triangle'; [523,659,783,1046].forEach((f,i)=>o.frequency.setValueAtTime(f,n+i*0.1)); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.6); }
            else if(type==='tap') { o.type='sine'; o.frequency.setValueAtTime(600,n); g.gain.setValueAtTime(0.05,n); o.start(); o.stop(n+0.1); }
            else { o.type='sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.linearRampToValueAtTime(50, n + 0.3); g.gain.setValueAtTime(0.1,n); o.start(); o.stop(n+0.3); }
        }

        function generate() {
            state.busy = false;
            state.userAns = "";
            state.level = Math.floor(state.score / 50) + 1;
            
            const dens = state.level === 1 ? [2, 3, 4] : (state.level === 2 ? [5, 6, 8] : [10, 12]);
            state.den = dens[Math.floor(Math.random() * dens.length)];
            state.op = Math.random() > 0.5 ? '+' : '-';

            if (state.op === '+') {
                state.n1 = Math.floor(Math.random() * (state.den - 1)) + 1;
                state.n2 = Math.floor(Math.random() * (state.den - state.n1 + 1));
            } else {
                state.n1 = Math.floor(Math.random() * (state.den - 1)) + 1;
                state.n2 = Math.floor(Math.random() * (state.n1 + 1));
            }

            renderMath();
            renderModel();
            updateUI();
        }

        function renderMath() {
            document.getElementById('n1').innerText = state.n1;
            document.getElementById('n2').innerText = state.n2;
            document.getElementById('d1').innerText = state.den;
            document.getElementById('d2').innerText = state.den;
            document.getElementById('dAns').innerText = state.den;
            document.getElementById('opSign').innerText = state.op;
            document.getElementById('ansSlot').innerText = "?";
        }

        function renderModel() {
            const bar = document.getElementById('modelBar');
            bar.innerHTML = '';
            for(let i=0; i<state.den; i++) {
                const seg = document.createElement('div');
                seg.className = 'bar-segment';
                if (state.op === '+') {
                    if (i < state.n1) seg.classList.add('filled');
                    else if (i < state.n1 + state.n2) seg.classList.add('target');
                } else {
                    if (i < state.n1) seg.classList.add('filled');
                    if (i >= (state.n1 - state.n2) && i < state.n1) {
                        seg.style.opacity = "0.4";
                        seg.innerHTML = "<span style='color:white; font-weight:bold;'>×</span>";
                    }
                }
                bar.appendChild(seg);
            }
        }

        function press(k) {
            if (state.busy) return;
            sfx('tap');
            if (k === 'bk') state.userAns = state.userAns.slice(0, -1);
            else if (state.userAns.length < 2) state.userAns += k;
            document.getElementById('ansSlot').innerText = state.userAns || "?";
        }

        function check() {
            if (state.busy || state.userAns === "") return;
            const correct = state.op === '+' ? (state.n1 + state.n2) : (state.n1 - state.n2);
            
            if (parseInt(state.userAns) === correct) {
                handleSuccess();
            } else {
                handleError();
            }
        }

        function handleSuccess() {
            state.busy = true;
            state.score += 10;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('bakery_high', state.highScore);
            }
            sfx('win'); burst(300);
            
            const ovl = document.getElementById('overlay');
            const t = i18n[state.lang];
            const icons = ['🍰','🧁','🥐','🥯','🥖','🥨','🍩','🍪','🥞'];
            document.getElementById('ovlIcon').innerText = icons[Math.floor(Math.random()*icons.length)];
            document.getElementById('ovlTitle').innerText = t.win;
            document.getElementById('ovlSub').innerText = t.winsub;
            
            ovl.style.display = 'flex';
            setTimeout(() => {
                ovl.style.display = 'none';
                generate();
            }, 2500);
        }

        function handleError() {
            playSfx('err');
            const card = document.getElementById('gameCard');
            card.classList.add('shake');
            document.body.classList.add('error-active');
            document.getElementById('wrong-overlay').style.display = 'flex';
            
            setTimeout(() => {
                card.classList.remove('shake');
                document.body.classList.remove('error-active');
                document.getElementById('wrong-overlay').style.display = 'none';
                state.userAns = "";
                document.getElementById('ansSlot').innerText = "?";
            }, 800);
        }

        function changeLang(l) { state.lang = l; updateUI(); }

        function toggleMute() {
            state.muted = !state.muted;
            document.getElementById('btnMute').innerText = state.muted ? '🔇' : '🔊';
        }

        function updateUI() {
            const t = i18n[state.lang];
            document.getElementById('txtQuest').innerText = t.quest;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('valScore').innerText = state.score;
            document.getElementById('valHigh').innerText = state.highScore;
            document.getElementById('valLvl').innerText = state.level;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblLvl').innerText = t.level;
        }

        function burst(count) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            if (c.width !== window.innerWidth) { c.width = window.innerWidth; c.height = window.innerHeight; }
            const colors = ['#f59e0b', '#ec4899', '#3b82f6', '#10b981', '#ffffff', '#fb923c'];
            for(let i=0; i<count; i++) state.particles.push({
                x: Math.random() * c.width, y: c.height + 20, vx: (Math.random()-0.5)*40, vy: (Math.random()-0.8)*60,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], l: 1.8, r: Math.random()*360, rv: (Math.random()-0.5)*25
            });
            if(!window.anim) { window.anim=true; (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=state.particles.length-1; i>=0; i--){
                    const p=state.particles[i]; if(p.l>0){
                        al=true; p.x+=p.vx; p.y+=p.vy; p.vy+=0.85; p.vx *= 0.985; p.l-=0.01; p.r+=p.rv;
                        x.save(); x.translate(p.x,p.y); x.rotate(p.r*Math.PI/180);
                        x.fillStyle=p.c; x.globalAlpha=Math.min(p.l, 1.0); x.fillRect(-p.s/2,-p.s/2,p.s,p.s); x.restore();
                    } else state.particles.splice(i,1);
                }
                if(al) requestAnimationFrame(f); else window.anim=false;
            })()}
        }

        window.onload = () => { generate(); };
    </script>
</body>
</html>

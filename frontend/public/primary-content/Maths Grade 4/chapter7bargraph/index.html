<!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Data Architect | ባር ግራፍ ምስራሕ</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+Ethiopic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blueprint: #f0f9ff;
            --ink: #1e293b;
            --grid: rgba(14, 165, 233, 0.2);
            --gold: #facc15;
            --danger: #ef4444;
            --success: #22c55e;
            --white: #ffffff;
            --ghost: rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            font-family: 'Fredoka', 'Noto Sans Ethiopic', sans-serif;
            background: var(--blueprint);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            color: var(--ink); overflow-x: hidden; position: relative;
        }

        /* Architect Background */
        .stars {
            position: fixed; inset: 0;
            background-image: radial-gradient(var(--grid) 2px, transparent 2px);
            background-size: 40px 40px; z-index: 0; pointer-events: none;
        }

        header {
            width: 100%; max-width: 1200px; padding: clamp(10px, 2vw, 20px) 25px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            gap: 10px; flex-wrap: wrap;
        }

        .stat-pill {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px);
            padding: 8px 16px; border-radius: 15px; border: 3px solid var(--ink);
            display: flex; align-items: center; gap: 8px; font-weight: 800; 
            font-size: clamp(0.7rem, 1.2vw, 1rem); box-shadow: 0 4px 0 var(--ink);
        }
        .stat-val { color: var(--danger); }
        .stat-val.gold { color: #b45309; }

        .container {
            flex: 1; width: 100%; max-width: 1200px; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: center; padding: 0 20px 40px 20px; z-index: 10; gap: 25px;
        }

        /* Top Panel: Data + Controls */
        .top-panel {
            width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px;
        }

        .data-card {
            background: var(--white); border-radius: 25px; border: 4px solid var(--ink);
            padding: 20px; width: 100%; max-width: 800px; box-shadow: 0 10px 0 var(--ink);
            text-align: center;
        }

        .data-table {
            display: flex; justify-content: space-around; gap: 15px; margin-top: 15px;
            flex-wrap: wrap;
        }

        .data-item {
            display: flex; flex-direction: column; align-items: center;
            background: #f8fafc; padding: 12px; border-radius: 18px;
            min-width: 90px; border: 2.5px solid var(--ink);
            box-shadow: 0 4px 0 var(--ink); flex: 1; max-width: 150px;
        }

        .item-icon { font-size: 2.5rem; margin-bottom: 5px; }
        .item-val { font-size: 1.8rem; font-weight: 900; color: var(--danger); line-height: 1; }
        .item-name { font-size: 0.8rem; font-weight: 800; margin-top: 4px; color: #64748b; }

        /* Graph Card */
        .graph-card {
            background: var(--white); border-radius: 35px; border: 6px solid var(--ink);
            padding: clamp(30px, 4vw, 50px); width: 100%; max-width: 900px; 
            box-shadow: 0 15px 0 var(--ink);
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        .graph-area {
            width: 100%; height: clamp(300px, 40vh, 500px); 
            border-left: 6px solid var(--ink); border-bottom: 6px solid var(--ink);
            position: relative; display: flex; align-items: flex-end; justify-content: space-around;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px);
            background-size: 100% calc(100% / 10); /* 10 horizontal divisions */
            padding: 0 10px; margin-left: 30px;
        }

        .y-axis-labels {
            position: absolute; left: -45px; top: 0; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            font-weight: 900; color: #64748b; font-size: 1.1rem;
            /* Adjust Y-axis label position so 10 is at top grid line and 0 at bottom grid line */
            padding: 0; margin-top: -0.6rem; margin-bottom: -0.6rem;
            height: calc(100% + 1.2rem);
        }

        .bar-slot {
            width: 18%; height: 100%; position: relative; display: flex; 
            align-items: flex-end; justify-content: center; cursor: pointer;
        }

        .bar-target-ghost {
            position: absolute; bottom: 0; width: 85%; background: var(--ghost);
            border: 2px dashed #cbd5e1; border-bottom: none; border-radius: 12px 12px 0 0;
            pointer-events: none; transition: height 0.5s;
        }

        .bar {
            width: 85%; background: var(--gold); border: 4px solid var(--ink);
            border-bottom: none; border-radius: 12px 12px 0 0; position: relative;
            transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: inset -10px 0 0 rgba(0,0,0,0.1); z-index: 2;
        }

        .bar-val-badge {
            position: absolute; top: -45px; left: 50%; transform: translateX(-50%);
            background: var(--white); border: 3px solid var(--ink); border-radius: 12px;
            padding: 4px 10px; font-weight: 900; font-size: 1.2rem;
            box-shadow: 0 4px 0 var(--ink); opacity: 0; transition: 0.2s;
        }
        .bar-slot:hover .bar-val-badge { opacity: 1; }

        .bar-label-container {
            position: absolute; bottom: -55px; width: 100%; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .bar-icon-small { font-size: 1.8rem; }
        .bar-name-small { font-weight: 800; font-size: 0.85rem; color: var(--ink); }

        /* Controls Area */
        .controls {
            display: flex; gap: 20px; width: 100%; max-width: 600px; margin-top: 10px;
        }
        .btn {
            flex: 1; height: 80px; border-radius: 25px; font-weight: 900; border: 5px solid var(--ink);
            cursor: pointer; transition: 0.1s; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem;
        }
        .btn:active { transform: translateY(6px); }

        .btn-check { background: var(--success); color: white; box-shadow: 0 10px 0 var(--ink); }
        .btn-reset { background: white; color: var(--ink); box-shadow: 0 10px 0 var(--ink); }

        /* Overlays */
        .overlay {
            position: fixed; inset: 0; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 5000;
            background: rgba(255, 255, 255, 0.98); text-align: center; padding: 20px;
        }
        .big-icon { font-size: clamp(8rem, 20vw, 12rem); margin-bottom: 30px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.15); } }

        .big-x { 
            font-size: clamp(15rem, 50vw, 30rem); font-weight: 950; color: var(--danger); 
            animation: shake 0.5s infinite; line-height: 1;
        }

        @keyframes shake {
            0%, 100% { transform: translate(0,0) rotate(0); }
            25% { transform: translate(-10px, 0) rotate(-5deg); }
            75% { transform: translate(10px, 0) rotate(5deg); }
        }

        @media (min-width: 1024px) {
            .container { flex-direction: row; align-items: stretch; gap: 40px; padding-top: 20px; }
            .top-panel { flex: 0.8; justify-content: center; }
            .graph-card { flex: 1.2; }
            .data-table { grid-template-columns: 1fr 1fr; display: grid; }
        }

        @media (max-width: 640px) {
            header { padding: 10px 15px; }
            .graph-area { margin-left: 20px; height: 260px; }
            .y-axis-labels { left: -35px; font-size: 0.9rem; margin-top: -0.5rem; margin-bottom: -0.5rem; height: calc(100% + 1rem); }
            .data-item { min-width: 70px; padding: 8px; }
            .item-icon { font-size: 1.5rem; }
            .item-val { font-size: 1.4rem; }
            .bar-slot { width: 22%; }
            .bar-icon-small { font-size: 1.4rem; }
            .bar-val-badge { top: -35px; font-size: 1rem; }
            .btn { height: 70px; font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <canvas id="confetti-canvas" style="position:fixed; inset:0; pointer-events:none; z-index:6000;"></canvas>

    <header>
        <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <div class="stat-pill">⭐ <span id="lblScore">Score</span>: <span id="valScore" class="stat-val">0</span></div>
            <div class="stat-pill">👑 <span id="lblHigh">High</span>: <span id="valHigh" class="stat-val gold">0</span></div>
            <div class="stat-pill">🆙 <span id="lblLvl">Level</span>: <span id="valLvl" class="stat-val">1</span></div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button class="stat-pill" style="width: 44px; height: 44px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; padding:0; justify-content:center; box-shadow: 0 4px 0 var(--ink);" onclick="toggleMute()" id="muteBtn">🔊</button>
            <select id="langSelect" class="stat-pill" style="cursor: pointer; box-shadow: 0 4px 0 var(--ink);" onchange="setLanguage(this.value)">
                <option value="ti">ትግርኛ</option>
                <option value="am">አማርኛ</option>
                <option value="en">English</option>
                <option value="om">Oromoo</option>
                <option value="so">Soomaali</option>
            </select>
        </div>
    </header>

    <div class="container">
        <div class="top-panel">
            <div class="data-card">
                <h2 id="txtInstruction" style="font-weight: 900; font-size: clamp(1rem, 3vw, 1.6rem);">እዞም ዝስዕቡ ዳታ ኣብቲ ግራፍ ኣርእዩ፡</h2>
                <div class="data-table" id="dataTable">
                    <!-- Injected via JS -->
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-reset" onclick="resetBars()" id="btnReset">እንደገና</button>
                <button class="btn btn-check" onclick="checkAnswer()" id="btnCheck">ኣረጋግፅ</button>
            </div>
        </div>

        <div class="graph-card" id="graphCard">
            <div class="graph-area" id="graphArea">
                <div class="y-axis-labels" id="yLabels">
                    <!-- 10 to 0 labels injected here -->
                </div>
                <!-- 4 Bar slots injected here -->
            </div>
        </div>
    </div>

    <!-- Feedback Overlays -->
    <div id="success-overlay" class="overlay">
        <div class="big-icon">📊</div>
        <h2 id="txtWin" style="font-size: 4rem; color: var(--success); font-weight: 900;">ንፉዕ!</h2>
        <p id="txtWinSub" style="font-size: 2rem; color: #64748b; font-weight: 700;">ልክዕ ግራፍ ሰሪሕኻ!</p>
    </div>

    <div id="error-overlay" class="overlay" style="background: #fee2e2;">
        <div class="big-x">✕</div>
        <h2 id="txtFail" style="font-size: 4rem; color: var(--danger); font-weight: 900;">ጌጋ!</h2>
        <p id="txtFailSub" style="font-size: 2rem; color: var(--danger); font-weight: 700;">እንደገና ፈትን</p>
    </div>

    <script>
        const themes = [
            { id: 'fruits', icons: { a: "🍎", b: "🍌", c: "🍊", d: "🍇" }, names: { ti: ["ቱፋሕ", "ባናና", "ኣራንሺ", "ወይኒ"], am: ["ፖም", "ሙዝ", "ብርቱካን", "ወይን"], en: ["Apple", "Banana", "Orange", "Grape"], om: ["Apple", "Muuzii", "Burtukaana", "Wayinii"], so: ["Tufaax", "Muus", "Liin", "Canab"] } },
            { id: 'animals', icons: { a: "🦁", b: "🐘", c: "🦒", d: "🦓" }, names: { ti: ["ኣንበሳ", "ሓርማዝ", "ዘራፍ", "ኣድጊ በረኻ"], am: ["አንበሳ", "ዝሆን", "ቀጭኔ", "የሜዳ አህያ"], en: ["Lion", "Elephant", "Giraffe", "Zebra"], om: ["Leenca", "Arba", "Zeraffaa", "Harre", "Badii"], so: ["Libaax", "Maroodi", "Gari", "Dameer-faro"] } },
            { id: 'school', icons: { a: "✏️", b: "📚", c: "🎒", d: "🎨" }, names: { ti: ["ርሳስ", "መፅሓፍ", "ቦርሳ", "ሕብሪ"], am: ["እርሳስ", "መፅሐፍ", "ቦርሳ", "ቀለም"], en: ["Pencil", "Book", "Bag", "Paint"], om: ["Qalama", "Kitaaba", "Borsaa", "Bifa"], so: ["Qalin", "Buug", "Shandad", "Rinjiga"] } },
            { id: 'weather', icons: { a: "☀️", b: "☁️", c: "🌧️", d: "❄️" }, names: { ti: ["ፀሓይ", "ደበና", "ዝናብ", "በረድ"], am: ["ፀሐይ", "ደመና", "ዝናብ", "በረዶ"], en: ["Sunny", "Cloudy", "Rainy", "Snowy"], om: ["Aduu", "Duumessa", "Rooba", "Cabbi"], so: ["Qorra", "Daruur", "Roob", "Baraf"] } }
        ];

        const i18n = {
            ti: { instruction: "እዞም ዝስዕቡ ዳታ ኣብቲ ግራፍ ኣርእዩ፡", win: "ንፉዕ!", winsub: "ልክዕ ግራፍ ሰሪሕኻ!", fail: "ጌጋ!", failsub: "እንደገና ፈትን", score: "ውፅኢት", high: "ዝለዓለ", level: "ደረጃ", reset: "እንደገና", check: "ኣረጋግፅ" },
            am: { instruction: "የሚከተሉትን መረጃዎች በግራፉ ላይ አሳዩ፡", win: "ድንቅ ስራ!", winsub: "ትክክለኛ ግራፍ ሰርተሃል!", fail: "ስህተት!", failsub: "እንደገና ይሞክሩ", score: "ውጤት", high: "ከፍተኛ", level: "ደረጃ", reset: "እንደገና", check: "አረጋግጥ" },
            en: { instruction: "Plot the following data on the bar graph:", win: "Excellent!", winsub: "You built a perfect graph!", fail: "Oops!", failsub: "Try again!", score: "Score", high: "High", level: "Level", reset: "Reset", check: "Check" },
            om: { instruction: "Midiyaalee kanneen giraafii irratti agarsiisi:", win: "Baay'ee Gaarii!", winsub: "Giraafii sirrii hojjettee jirta!", fail: "Dogoggora!", failsub: "Irra deebi'i yaali", score: "Qabxii", high: "Olaanaa", level: "Sadarkaa", reset: "Reset", check: "Check" },
            so: { instruction: "Xogtaan soo socota ku muuji garaafyada:", win: "Shaqo Fiican!", winsub: "Garaaf sax ah ayaad samaysay!", fail: "Khalad!", failsub: "Markale isku day", score: "Dhibco", high: "Sare", level: "Heerka", reset: "Reset", check: "Check" }
        };

        const colors = ["#fbbf24", "#60a5fa", "#f87171", "#34d399"];
        let score = 0, lang = 'ti', currentTheme = null, currentTask = [], userValues = [0, 0, 0, 0], busy = false, muted = false;
        let highScore = parseInt(localStorage.getItem('bargraph_71_high')) || 0;
        const aCtx = new (window.AudioContext || window.webkitAudioContext)();

        function toggleMute() { muted = !muted; document.getElementById('muteBtn').innerText = muted ? '🔇' : '🔊'; }

        function sfx(type) {
            if (muted) return;
            if (aCtx.state === 'suspended') aCtx.resume();
            const o = aCtx.createOscillator(), g = aCtx.createGain(), n = aCtx.currentTime;
            o.connect(g); g.connect(aCtx.destination);
            if (type === 'tap') { o.type = 'sine'; o.frequency.setValueAtTime(800, n); g.gain.setValueAtTime(0.05, n); o.start(); o.stop(n + 0.05); }
            else if (type === 'win') { o.type = 'triangle'; [523, 659, 783, 1046].forEach((f, i) => o.frequency.setValueAtTime(f, n + i * 0.1)); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.5); }
            else if (type === 'err') { o.type = 'sawtooth'; o.frequency.setValueAtTime(150, n); o.frequency.exponentialRampToValueAtTime(40, n + 0.3); g.gain.setValueAtTime(0.1, n); o.start(); o.stop(n + 0.3); }
        }

        function setLanguage(l) {
            lang = l;
            localStorage.setItem('bargraph_lang', lang);
            updateUI();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('lblScore').innerText = t.score;
            document.getElementById('lblHigh').innerText = t.high;
            document.getElementById('lblLvl').innerText = t.level;
            document.getElementById('btnReset').innerText = t.reset;
            document.getElementById('btnCheck').innerText = t.check;
            document.getElementById('txtWin').innerText = t.win;
            document.getElementById('txtWinSub').innerText = t.winsub;
            document.getElementById('txtFail').innerText = t.fail;
            document.getElementById('txtFailSub').innerText = t.failsub;
            document.getElementById('txtInstruction').innerText = t.instruction;
            document.getElementById('valScore').innerText = score;
            document.getElementById('valHigh').innerText = highScore;
            document.getElementById('valLvl').innerText = Math.floor(score / 200) + 1;
            renderData();
            updateLabels();
        }

        function updateLabels() {
            if(!currentTheme) return;
            const tNames = currentTheme.names[lang];
            document.querySelectorAll('.bar-name-small').forEach((el, i) => el.innerText = tNames[i]);
            document.querySelectorAll('.item-name').forEach((el, i) => el.innerText = tNames[i]);
        }

        function generateTask() {
            busy = false;
            currentTheme = themes[Math.floor(Math.random() * themes.length)];
            const level = Math.floor(score / 200) + 1;
            
            currentTask = ['a', 'b', 'c', 'd'].map((id, i) => ({
                id,
                val: Math.floor(Math.random() * 9) + 1,
                icon: currentTheme.icons[id],
                name: currentTheme.names[lang][i]
            }));
            
            userValues = [0, 0, 0, 0];
            renderData();
            renderGraph();
        }

        function renderData() {
            const table = document.getElementById('dataTable');
            table.innerHTML = currentTask.map((item, i) => `
                <div class="data-item">
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-val">${item.val}</div>
                    <div class="item-name">${item.name}</div>
                </div>
            `).join('');
        }

        function renderGraph() {
            const area = document.getElementById('graphArea');
            const yLabels = document.getElementById('yLabels');
            
            // Y-Axis: Ensure 10 is at top and 0 at bottom
            yLabels.innerHTML = '';
            for(let i=10; i>=0; i--) {
                const l = document.createElement('div');
                l.innerText = i;
                yLabels.appendChild(l);
            }

            area.querySelectorAll('.bar-slot').forEach(s => s.remove());

            currentTask.forEach((item, idx) => {
                const slot = document.createElement('div');
                slot.className = 'bar-slot';
                
                const ghost = document.createElement('div');
                ghost.className = 'bar-target-ghost';
                ghost.style.height = '0%';
                
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.backgroundColor = colors[idx];
                bar.style.height = '0%';
                
                const badge = document.createElement('div');
                badge.className = 'bar-val-badge';
                badge.innerText = '0';
                
                const labels = document.createElement('div');
                labels.className = 'bar-label-container';
                labels.innerHTML = `
                    <div class="bar-icon-small">${item.icon}</div>
                    <div class="bar-name-small">${item.name}</div>
                `;

                // INTERACTION: Click anywhere in slot to set height
                slot.onclick = (e) => {
                    if (busy) return;
                    sfx('tap');
                    const rect = slot.getBoundingClientRect();
                    const clickY = e.clientY - rect.top;
                    const percent = 1 - (clickY / rect.height);
                    let val = Math.round(percent * 10);
                    val = Math.max(0, Math.min(10, val));
                    
                    userValues[idx] = val;
                    bar.style.height = (val * 10) + '%';
                    badge.innerText = val;
                };

                bar.appendChild(badge);
                slot.appendChild(ghost);
                slot.appendChild(bar);
                slot.appendChild(labels);
                area.appendChild(slot);
            });
        }

        function resetBars() {
            if (busy) return;
            sfx('tap');
            userValues = [0, 0, 0, 0];
            document.querySelectorAll('.bar').forEach(b => b.style.height = '0%');
            document.querySelectorAll('.bar-val-badge').forEach(b => b.innerText = '0');
        }

        function checkAnswer() {
            if (busy) return;
            busy = true;
            
            const isCorrect = currentTask.every((item, idx) => item.val === userValues[idx]);

            if (isCorrect) {
                score += 50;
                if (score > highScore) { 
                    highScore = score; 
                    localStorage.setItem('bargraph_71_high', highScore); 
                }
                handleWin();
            } else {
                handleErr();
            }
        }

        function handleWin() {
            sfx('win'); burst(300);
            const overlay = document.getElementById('success-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                generateTask();
                updateUI();
            }, 2000);
        }

        function handleErr() {
            sfx('err');
            const overlay = document.getElementById('error-overlay');
            const card = document.getElementById('graphCard');
            card.style.animation = 'shake 0.5s';
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.style.display = 'none';
                card.style.animation = '';
                busy = false; 
            }, 1800);
        }

        function burst(count = 150) {
            const c = document.getElementById('confetti-canvas'), x = c.getContext('2d');
            c.width = window.innerWidth; c.height = window.innerHeight;
            const p = [];
            for(let i=0; i<count; i++) p.push({
                x: Math.random()*c.width, y: c.height+20, vx: (Math.random()-0.5)*40, vy: (Math.random()-1.2)*65,
                s: Math.random()*12+6, c: colors[Math.floor(Math.random()*colors.length)], 
                l: 2.5, r: Math.random()*360, rv: (Math.random()-0.5)*20
            });
            (function f(){
                x.clearRect(0,0,c.width,c.height); let al=false;
                for(let i=p.length-1; i>=0; i--){
                    const pt=p[i]; if(pt.l>0){
                        al=true; pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.85; pt.l-=0.01; pt.r+=pt.rv;
                        x.save(); x.translate(pt.x,pt.y); x.rotate(pt.r*Math.PI/180);
                        x.fillStyle=pt.c; x.fillRect(-pt.s/2,-pt.s/2,pt.s,pt.s); x.restore();
                    } else p.splice(i,1);
                }
                if(al) requestAnimationFrame(f);
            })();
        }

        window.onload = () => {
            const savedLang = localStorage.getItem('bargraph_lang') || 'ti';
            document.getElementById('langSelect').value = savedLang;
            setLanguage(savedLang);
            generateTask();
        };
    </script>
